, "How Sweet - NewJeans(当代)"]}, "techno bass": {"name": "Techno Bass", "ups": ["Miami Bass", "Electronic Dance Music"], "downs": ["Car Audio Bass"], "aka": "", "related": "", "desc": "Miami Bass的一个子类，一种更精简的类型，强调低频的出众表现，但太不强调Hip-Hop元素。Techno Bass受电子音乐的影响很大，通常以鼓和合成器为特色，主要在美国南部和加利福尼亚流行。Car Audio Bass是Techno Bass的一个分支，来源于迈阿密汽车文化，经常被用作车展上的BGM。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Cars With the Boom - L'Trimm"]}, "bounce": {"name": "Bounce", "ups": ["Southern Hip-Hop", "Breakbeat"], "downs": [], "aka": "New Orlean Bounce", "related": "", "desc": "Bounce，或者叫做New Orlean Bounce，是一种美国南部Hip-Hop风格，起源于80年代的纽约布朗克斯区。这种风格起初跟当地的Hip-Hop别无二致，但随后传到其他南方城市并逐渐流行起来，尤其是路易斯安那州的新奥尔良。第一个让Bounce流行起来的制作人是MC T. Tucker (Kevin Ventry)，知名的唱片公司有No Limit Records和Cash Money Records。Bounce在听感上不仅继承了南部Hip-Hop的味道，还添加了古早Breakbeat音乐的元素，使其更有弹跳感。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Bounce (For The Juvenile) - D.J. Jimi"]}, "crunk": {"name": "Crunk", "ups": ["Memphis Rap", "Atlanta Rap", "Miami Bass", "Bounce", "Electronic Dance Music"], "downs": ["Snap", "Crunkcore", "Trap", "Crunkstep"], "aka": "", "related": "", "desc": "Crunk发源于90年代初的孟菲斯，后被亚特兰大改良，在00年代盛极一时。Crunk通常不使用采样，而是大量使用TR-808和909鼓机以及中高频突出的锯齿波和口哨般的正弦波合成器音色，听感充满活力，适合在俱乐部和夜店播放。“Crunk”一词最早在主流乐坛被使用是在1993年南部嘻哈代表团体Outkast的歌曲《Player's Ball》中，在音乐上则成形于Tommy Right III的《Getting Crunk》(1996)和Three 6 Mafia的《Gette'm Crunk》(1997)。90年代末00年代初，Rapper兼制作人Lil Jon将这一流派改良，使其在00年代中期成为主流，并融合R&B发展出了“Crunk&B”。进入10年代后，这种音乐影响力逐渐下降，但还是诞生了诸如Eurocrunk、Crunkcore、Crunkczar、Aquacrunk、Acid Crunk等风格，并深深影响了早期的Trap。代表音乐人和团体有Lil Jon & The East Side Boyz、Lil Wayne、Gucci Mane。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Get Money - Lil Wayne / T-Pain", "Run It! - Chris Brown / Juelz Santana(Crunk&B)"]}, "crunkcore": {"name": "Crunkcore", "ups": ["Crunk", "Post Hardcore", "Electro Pop"], "downs": [], "aka": "Scrunk", "related": "", "desc": "Crunkcore是一种将Crunk、Electro-pop和后硬核结合在一起的音乐风格，有时还会结合说唱摇滚的元素，从 2000 年代中期的Scenecore亚文化发展而来的。波士顿凤凰城媒体将其称为是“极简主义嘻哈、Autotune说唱、Techno Breakdowns、吠叫般的人声和‘party-til-you-puke’的‘诗意’”的结合体。Crunkcore团体包括Brokencyde、3OH!3、Millionaires、Breathe Carolina、Hollywood Undead、Family Force 5等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Anything - All Out"]}, "snap": {"name": "Snap", "ups": ["Crunk"], "downs": ["Snap&B"], "aka": "Snap Rap、Ringtone Rap", "related": "", "desc": "Snap是一种从Crunk发展而来的流派，可追溯到2005年的美国南方城市亚特兰大。典型配器是TR-808鼓机、响指声和Crunk乐里常用的合成器音色， 可以说是Crunk的“悠闲版”。这种曲风在2005到2008年风靡一时，甚至结合R&B衍生出了流派“Snap&B”，但在2009年之后这种音乐逐渐消失，但其中的重要元素(响指声)被保留，在2010s的Ratchet(见Trap分支)和R&B中广泛应用。代表的音乐人和团体有Dem Franchize Boyz、D4L、K-Rab。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Jig Wit It - Street Runnaz Click", "Unappreciated - Cherish(Snap&B)"]}, "trap": {"name": "Trap", "ups": ["Crunk", "Memphis Rap", "Atlanta Rap"], "downs": ["Drill", "EDM Trap", "Trapstep"], "aka": "Trap Rap", "related": "", "desc": "Trap是00年代末起源于亚特兰大的Hip-Hop流派，虽然后来诞生的子流派风格各异，但基本上都是140~150BPM加上厚重的808鼓的配置。“Trap”一词是亚特兰大俚语，意为出售毒品的地方，后来代指南部Hip-Hop以及南部Hip-Hop的精神和生活方式。最早的Trap听感继承了Crunk的舞曲性质(同样TR-808鼓机、相似的合成器音色)，但是在BPM和Hit-Hat编排方面有一定区别(更加突出，规整且密集)。进入10年代后，Trap开始变成一种侵略性的风格，这一浪潮催生了Chicago Drill的出现。10年代中期，亚特兰大制作人Metro Boomin对这一流派进行改良，放慢了BPM，削弱了舞曲性质，最终形成了现在这种阴暗、迷幻、催眠、极具氛围感的Trap(更多地受到Memphis Rap的影响)。如今，Trap已经发展成为继Boom Bap之后影响力最大的Hip-Hop流派，不仅成为了当代流行音乐的标配编曲风格，也影响了EDM界，至今还在催生像Super Trap、Plugg、Rage这样的新兴流派。其他代表制作人有Juicy J、Lex Luger、Mike WiLL Made-It、Southside、London On Da Track、Murda Beatz、Tay Keith、Wheezy。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["MotorSport - Migos / Nicki Minaj / Cardi B / Murda Beatz", "Street Niggaz - Gucci Mane (早期)"]}, "futuristic swag": {"name": "Futuristic Swag", "ups": ["Trap", "Pop Rap"], "downs": [], "aka": "Futuristic", "related": "", "desc": "一种注重旋律的Trap类型，出现在21世纪后期的亚特兰大，最初是由J Money和Yung L.A.开创的，采用了一种更有趣、受Snap影响、更注重派对的方式来创作音乐，使用舞蹈节奏，歌手也常常加入说唱、演唱入耳的旋律。这种类型只活跃于2008~2010年间，大多数音乐在2012年后消失，尽管如此，这一类型也产生了很多有巨大影响力的说唱歌手，并且其中有不少被认为是Bop的先驱。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Relationahip - Yong Thug / Future"]}, "detroit trap": {"name": "Detroit Trap", "ups": ["Trap", "Detroit Techno"], "downs": [], "aka": "", "related": "", "desc": "Detroit Trap是Trap的一个分支，起源于2010年代初的底特律。特点是BPM较快，听感比普通的Trap更“摇”，808 Bass更加突出，且编曲明显受到当地电子乐根基的影响，通常会使用Detroit Techno中的合成器音色，以及木槌声和硬邦邦的“砸钢琴”声或钢琴旋律。这些元素看似杂乱，却都被和谐地融入进Trap的节奏中，整体呈现出黑暗、恐怖的氛围。Detroit Trap的人声常常比较催眠、怪异且带有来自湾区的Layback(一种Rap唱法)，歌词主题往往和匪帮有关。代表制作人和Rapper有Hellva Beats、Enrgy Beats、Tee Grizzley、YN Jay、Ysr Gramz等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Jetski Grizzley - Tee Grizzley / Lil Pump / Hellva Beats"]}, "ratchet": {"name": "Ratchet", "ups": ["Trap", "G-Funk", "Jerk", "Snap"], "downs": [], "aka": "", "related": "", "desc": "Ratchet是Trap的一个分支，你可能从来没听说过这个名字，但是一定听过这种风格的歌曲，并且误以为这只是Trap。Ratchet在2010s初由Hip-Hop制作人DJ Mustard开创，特点是编曲同时受到西海岸和南部Hip-Hop的影响。在制作上通常会使用G-Funk味道的合成器，Jerk式的稀松鼓组编排，以及来自Snap的响指音色。整体的听感不像传统的Trap那样阴暗，Hit-Hat排列也不是那么整齐、机械，而是更加多变、灵活，充满了活力和律动。早期的Ratchet既有BPM较快，听起来很“摇”的；也有BPM较慢，氛围与传统的Trap更为接近的(如今的Ratchet基本上是前者)。目前唯一还在制作这种风格的制作人依然是DJ Mustard，与其紧密合作的Rapper有YG和Tyga，知名单曲有《Pure Water》、《Ballin’》以及今年的热单《Not Like Us》", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Not Like Us - Kendrick Lamar", "My Nigga - YG / Jeezy / Rich Homie Quan(早期)"]}, "tread": {"name": "Tread", "ups": ["Trap", "Cloud Rap", "Mumble Rap", "Freestyle Rap"], "downs": ["Surge"], "aka": "", "related": "", "desc": "Tread是Trap一个较冷门的分支，起源于2010s中期，源于working on dying团队的作品。Tread的特点是高BPM(通常超过140BPM，设定在160BPM到190BPM之间)，冰冷的合成器音色，更繁复的鼓编，具有独特的808模板，快速地Mumble Rap或Cloud Rap和施加off beat的Hi-hat。某些制作人强调原始的混音，进一步添加了刺耳的声音；有些则是注重曲子的氛围，添加了大量华丽的合成器pad和大混响高延迟。曲目很少超过三分钟，与Freestyle文化有很大交集。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Gatekeeper - Bladee"]}, "emo trap": {"name": "Emo Trap", "ups": ["Trap", "Hip-Hop"], "downs": [], "aka": "Emo Rap、Emo Hip-Hop", "related": "", "desc": "Emo Trap是嘻哈音乐的一种形式，出现于2010年代早期至中期，诞生于互联网地下嘻哈场景中，根源于Cloud Rap和Trap，因融入了emo音乐所以和上述流派变得与众不同。制作风格通常非常情绪化、忧郁，结合了Cloud Rap的大气感和Trap的鼓组模式，并从Midwest Emo、Emo-pop、流行朋克和Alternative Rock等中采样。最早的Emo Trap是由Cloud Rap制作人Bones制作，到2010年代后期，Emo Trap成为主流，之后Emo Trap对更“深奥”的实验形式的嘻哈产生了影响，比如与Bubblegum Bass等其他电子类型融合。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Hopes Up (feat. Dashboard Confessional) - nothing,nowhere."]}, "phonk": {"name": "Phonk", "ups": ["Trap", "Instrumental Hip-Hop", "Memphis Rap"], "downs": ["Drift Phonk"], "aka": "Rare Phonk、Chill Phonk、Cloud Phonk、Trap Phonk", "related": "", "desc": "Phonk是21世纪10年代早期至中期由DJ Smokey开创的嘻哈风格，源于2010年代初Memphis Rap的复兴，很快便在网上流传开来。主要特点是鼓的模式符合2010年代Trap的风格、少量的Cloud Rap元素、Lofi Hip-Hop的爵士乐采样、Downtempo元素等，其他流派的元素也会出现。2010年代中期逐渐形成一系列标签和制作人集体，这类音乐以受老式动画片影响的超现实主义图像为视觉特色，此外还涉及了怀旧的视觉效果，以引起怀旧感。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["BETTA WATCH OUT - SOUDIERE"]}, "drift phonk": {"name": "Drift Phonk", "ups": [], "downs": [], "aka": "", "related": "", "desc": "(本条及其子分支详见Hip-Hop/Trap部分)", "chapter": "Post-Internet", "examples": []}, "drift house": {"name": "Drift House", "ups": ["Drift Phonk", "Hard House"], "downs": ["Brazilian Phonk [Tag]"], "aka": "Phonk House", "related": "", "desc": "“Phonk”这个名词在近年来已经脱离其作为风格的概念了，更多的是以一种音色的形象出现，其中最为“出名”的一支就是Drift House，彻底摒弃808鼓组和2-step节奏型，直接把808 Kick加大失真排成四四拍节奏。这种音乐实际上在制作层面相当简单，很多不懂音乐的“制作人”都能去上手制作，这也严重降低了Drift House的平均制作水平，有些曲子曲调甚至怪到让人怀疑制作人根本不懂音乐。由于其模因性和易制作性和高产出性，Drift House也是电子音乐饭圈文化的另一大重灾区，大量“冯小鬼”频繁在各类电子音乐作品相关论坛平台上ky或跳脸，经常引发众怒。不过Drift House制作人里还有一些制作精良一些的制作人比方说АДЛИН等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Ночь - АДЛИН"]}, "brazilian funk": {"name": "Brazilian Funk", "ups": ["Drift House", "Brazilian Bass"], "downs": [], "aka": "Brazilian Phonk", "related": "", "desc": "由巴西Drift House制作人提出的标签，将Brazilian Bass/Slap House的弹性Bassline融入高度失真的Drift House/Drift Phonk的产物。但是意外的是，这类Drift House即使融合了两种高度商业化的风格，热度却远不如主流Drift House。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["VUK VUK - Kordhell / Dragon Boys"]}, "super trap": {"name": "Super Trap", "ups": ["Trap", "Electro Pop", "Glitch", "Melodic Trap"], "downs": [], "aka": "", "related": "", "desc": "Super Trap的概念生成于2018年，是Trap的一种夸张演绎手法，听觉上跟Wave有异曲同工之妙。Super Trap融合了Trap、Synth Pop、Glitch和其他EDM的影响，使其听觉上很具有跳脱性。Super Trap在2020~2021年间流行起来，创始人是DxvidGotK、Grim Brxzy和JodyB，代表人物包括darkspin、illka dreamy super trap、616 Zadkiel等，alienz的Alien Trap/Space Trap是Super Trap的变体，因此Super Trap也有一个戏谑性的称号——“来自外星的Trap音乐”。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["High Tech Six - Grim Brxzy"]}, "chill trap": {"name": "Chill Trap", "ups": ["Trap", "Chillout"], "downs": [], "aka": "", "related": "", "desc": "Chill Trap是一种注重旋律和氛围的Trap子分支，和同样注重旋律的Heaven Trap相比要深沉和内敛许多，一般来说不属于EDM Trap。Chill Trap削弱了传统Trap的特征，弱化了808鼓，更稀疏的鼓组、踩镲和更明亮的军鼓，BPM可能比常规Trap更低，显得幽静、空灵、舒缓、凄凉，简单可以理解为这种Trap继承了“Chillout/Ambient”的特点和意境。近年来也不断出现流行化的Chill Trap，变成了Trap中较主流的一个风格。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Fuck U Love U - Alison Wonderland"]}, "liquid trap": {"name": "Liquid Trap", "ups": ["Trap"], "downs": [], "aka": "", "related": "", "desc": "和Chill Trap也有一定的区分度，Chill Trap的808Bass更显眼，仍然是一板一眼的Trap鼓组，而且偏向流行化，而Liquid Trap的Bass及各组分都很沉稳，氛围迷幻清澈，人声与配器常常加上大混响，两者的区别可以理解为传统Tropical House和传统Chill House的区别，即Liquid Trap比Chill Trap更“Chill”。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["One Last Night (Hippie Sabotage Remix) - Vaults"]}, "dark trap": {"name": "Dark Trap", "ups": ["Trap"], "downs": [], "aka": "", "related": "", "desc": "Dark Trap是Trap中很特殊的一个子分支，一定程度削弱了传统Trap的元素，与EDM化程度较高的Trap相差很大。主题通常会围绕一些尘世之外甚至生命以外的事物展开，诸如宗教、死亡、轮回、鬼神、祭祀等，更侧重于黑暗恐怖氛围的营造，并且拥有更清晰正宗的808鼓机的低音。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["救贖 - Anti-General"]}, "ethnic trap": {"name": "Ethnic Trap", "ups": ["Trap"], "downs": ["Arabic Trap", "Latin Trap"], "aka": "Tribal Trap、Exotic Trap、Folk Trap", "related": "", "desc": "Ethnic Trap是指结合了民族音乐风情的Trap，旗下最重要的子分支是Arabic Trap，带有极其浓郁地理特色，侧重于使用Trap自身的神秘和深厚来描写阿拉伯/中东/异域/神秘国度等背景下的场面，特征是依赖中东一代民族乐器来塑造神秘感、异域气息。Arabic Trap/Ethnic Trap与Dark Trap也有一定的交集，但两者还是有不同的倾向性的。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["向 - Howie Lee"]}, "arabic trap": {"name": "Arabic Trap", "ups": ["Ethnic Trap", "Drak Trap"], "downs": ["Dark Trap"], "aka": "", "related": "", "desc": "Arabic Trap，顾名思义就是以阿拉伯文化为描述主题或元素的Ethnic Trap。这类Ethnic Trap特点是诡秘的合成器音色、歌剧合唱般的宏大和声以及充满西域风情的旋律或女声的呢喃采样。由于Ethnic Trap主流形式大多数都是Arabic Trap，因此很多情况下视为Arabic Trap=Ethnic Trap。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Lambo (NextRO & Defox Remix) - NextRO / Gameface / DEFOX"]}, "afro trap": {"name": "Afro Trap", "ups": ["Ethnic Trap", "Afrobeat", "Drill"], "downs": [], "aka": "", "related": "", "desc": "Afro Trap是近年来刚刚兴起的一种Trap，定义上属于Ethnic Trap的分支。这类Trap受到Afrobeats音乐的影响，通常会改变Trap Beat固定的808节奏型，加入类似Reggaeton的鼓组，辅以充满南非风情的法语说唱等。Afro Trap的定义跟Afro Drill很相似，因此大多数时候提及Afro Trap常常都包括其他节奏型+南非说唱+Afrobeats的形式。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Mafuzzy Style - Dadju"]}, "edm trap": {"name": "EDM Trap", "ups": ["Trap", "Electronic Dance Music"], "downs": ["Hybrid Trap", "Hard Trap", "Carnival"], "aka": "", "related": "", "desc": "EDM Trap于2012年正式成为一种独立于传统Trap之外的风格，除了它Hip-Hop的根源，还受到了Dubstep/Post-Dubstep、Wonky、Grime、UK Bass等的影响。Youtube的一些频道包括Trap City、All Trap Music、Trap Nation等都加速了EDM Trap的流行与普及。近年来在EDM Trap场景中也诞生了不少子风格，如Twerk，以及其他影响（如Hard Trap、Festival Trap、Heaven Trap、Chill Trap等）。2010年代中期出现了一批新的艺术家，他们混合Brostep于EDM Trap中诞生了Hybrid Trap，后来也包括了Halftime和Riddim等的影响，并发展成了一种更Leftfield、更实验性的风格，2010年代后期，受Trap、Wave Music影响的Hardwave也诞生了。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Jewels N' Drugs - DJ White Shadow / Lady Gaga / T.I. / Too $hort / Twista"]}, "hybrid trap": {"name": "Hybrid Trap", "ups": ["EDM Trap", "Brostep"], "downs": ["Hybrid Breaks"], "aka": "Hybrid", "related": "", "desc": "Hybrid Trap是EDM Trap的子类，将808Kick、强有力的Sub Bass与来自Brostep的金属感Bass、复杂的音色设计相融合。2010年代后期，进一步变得更古怪、更失真、更加多样化与实验性，进一步向其他音乐流派/Bass Music靠拢，如Riddim、Halftime，甚至是Deconstructed Club、Bubblegum Bass等，鼓组的音色也进一步倾向Breakbeat/Drum & Bass。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["鬼媒 - 李化禹"]}, "hard trap": {"name": "Hard Trap", "ups": ["EDM Trap"], "downs": [], "aka": "Hardtrap、Rawtrap", "related": "", "desc": "Hard Trap是EDM Trap的一个更粗粝、更原始的分支，起源于2010年代初，由Flosstradamus、Yellow Claw开创。特点是使用Hardstyle的Lead和Vocal采样，以及极度失真的侵略感极强的白噪音Bass。现在已经成为EDM Trap中最主流的分支之一。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["I Can't Escape - SLANDER / SAYMYNAME / Feli Ferraro"]}, "raw trap": {"name": "Raw Trap", "ups": ["Hard Trap", "Hardstyle/Rawstyle"], "downs": [], "aka": "", "related": "", "desc": "一般情况下Raw Trap的定义与Hard Trap是一样的，但是在主流EDM场景下，Raw Trap还有另一种定义，即原先的Hard Trap的808 Kick全部替换成Hardstyle的Crunky Kick，或类比Dubstyle制作。这类Trap跟Trapstyle最大的区别实际上是Trapstyle一般是EDM Trap/Festival Trap生硬拼接Hardstyle的结果。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Alerlsmf - AlanMF (GasBomb) / Xeris"]}, "carnival": {"name": "Carnival", "ups": ["EDM Trap"], "downs": [], "aka": "Carnival Trap", "related": "", "desc": "Carnival是一种集合了Jungle Terror/Big Room/Trap/Dubstep/Hard Dance等等多种风格元素结合的一种风格，常见BPM是150BPM，在如此高的BPM下采用4/4拍的Kick编排而不是2-step，一般不会单独作为曲风出现而是作为主要元素融入到其他风格中，最典型的是与Trap/Moombahtrap实现黄金搭配或作为Jungle Terror的核心元素成分之一。Carnival的玩法很多，2016至今更是经常出现在各大音乐节和Club party里面。几乎所有Bass艺人与EDM艺人都会在Set加入Carnival风格的音乐。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Supernoize - Yellow Claw / Juyen Sebulba / RayRay"]}, "heaven trap": {"name": "Heaven Trap", "ups": ["EDM Trap"], "downs": [], "aka": "Progressive Trap", "related": "", "desc": "Heaven Trap是2014年初首次出现的EDM Trap的分支，特点是保留了Trap鼓组的特点和Sub Bass，但强调优美、振奋的旋律，结合了Trance、兼具了Chill Trap和Fututre Bass的部分特征，结构大起大落，氛围纯净空荡，更具有空灵性，情绪一般是偏向低沉的。代表制作人：Slander、Jinco、Graves、RL Grime、ARMNHMR、Getter。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Breathe - Adam K / SLANDER / Steeper & HALIENE"]}, "festival trap": {"name": "Festival Trap", "ups": ["EDM Trap", "Big Room House"], "downs": [], "aka": "", "related": "", "desc": "Festival Trap是EDM Trap的一个子分支，出现于2012年，该术语由制作人Carnage提出并成为主要先驱。一般来说结合Big Room元素较多，歌曲一般是大响度的、Big Room式的嘈杂混响、Supersaw的大量使用、极简的Pluck以及入耳的旋律。Festival Trap在2013~2015年大受欢迎，这之后便几乎消失，被Hybrid Trap逐渐取代，尽管如此一些制作人（如Hopex）在21世纪10年代末至20年代初仍然在制作这种风格。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Paradise - HOPEX"]}, "twerk": {"name": "Twerk", "ups": ["EDM Trap", "Bounce", "Miami Bass"], "downs": ["Hybrid Twerk", "Twerkcore (Tag)", "Stutter Twerk (Microgerne)"], "aka": "100 BPM Trap", "related": "", "desc": "Twerk是EDM Trap的一个子类，受Bounce（Hip-Hop分支）和Miami Bass的影响，该词来源于在新奥尔良发展起来的跳Bounce音乐用的同名舞蹈。特点是具有有活力、更快速的节拍，通常在100BPM左右。这种风格起源于21世纪初，许多制作人的大力推广使它不久后便达到了主流顶峰。在2010年代中期便鲜有制作人继续制作，但它在今天的EDM Trap场景中依然存在。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["In Da Getto - Skrillex / J. Balvin"]}, "hybrid twerk": {"name": "Hybrid Twerk", "ups": ["Twerk", "Hybrid Trap", "Brostep"], "downs": [], "aka": "", "related": "", "desc": "Hybrid Twerk是2010年代中期与Hybrid Trap一起兴起的一种Trap [EDM]风格，它是在Twerk大受欢迎的基础上发展起来的，也是Trap从直接、简约的Festival Trap向更复杂、更“Heavy”的声音过渡的产物。快速的Twerk鼓点模式与典型的Hybrid Trap特点相结合，如肮脏而失真的Wobble Bass、Growl Bass等Bass音色，并受到Brostep和其他2010年代Bass音乐的影响。在Hybrid Trap中常见与其他元素的融合，Hybrid Twerk也一样，但通常融合的是其他“中速”流派，如Glitch Hop [EDM]、Moombahcore。尽管有一些流行曲目，但该流派总体上仍较为小众，只得到某些艺术家和Soundcloud社区的认可。2010年代中期，随着Twerk热潮的褪去，这一音乐流派也逐渐淡出了人们的视线，但仍有相关作品发行。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Break Them - Aero Chord"]}, "moombahtrap": {"name": "Moombahtrap", "ups": ["EDM Trap", "Moombahton", "Miami Bass"], "downs": [], "aka": "Trap-ah-ton、Trapahton", "related": "", "desc": "Moombahtrap是Moombahton与EDM Trap的结合体，既属于Moombahton分支又属于Trap分支，节奏上结合了Moombahton特有的Dancehall节奏型，跟Twerk比较相像，只不过Moombah元素要更多些。有些Moombahtrap听感上跟Ethnic Trap比较像，也属于正常情况。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Perreo Android - King Doudou"]}, "melodic trap": {"name": "Melodic Trap", "ups": ["Trap"], "downs": ["Future Bass"], "aka": "", "related": "", "desc": "Melodic Trap是一种注重旋律的Trap类型，是Trap向Future Bass演化的体现风格，Drop突出锯齿化的主音色，依赖断续的Wobble Lead，Chord一般连续而不间断、不切片化，与Heaven Trap相比要更积极，并且已经具有了Future Bass的雏形。代表制作人有Marshmello、Slushii、Ookay。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Reasons To Run - Crankdat"]}, "wavy trap": {"name": "Wavy Trap", "ups": ["Melodic Trap", "Festival Trap", "Wave"], "downs": ["Wavy Phonk [Tag]"], "aka": "", "related": "", "desc": "Wavy Trap专指一类听感上像Hard Wave或结合了Wave音乐的Melodic Trap。这类Mleodic Trap常常添加大混响大延迟，也拥有Hard Wave的那种朦胧感、冰冷感和阴暗感。一般情况下Rare Phonk、Wavy Trap和Hardwave会出现于同一语境，这三种风格互相有借鉴影响，因此也诞生了很多标签。有些制作人会制作IDM类似的声音设计并添加到Wavy Trap里，这里不做展示。代表制作人包括æstral等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Reasons - æstral"]}, "future trap": {"name": "Future Trap", "ups": ["Trap", "Future Bass"], "downs": [], "aka": "", "related": "", "desc": "Future Trap是Future Bass进一步向EDM Trap靠近的曲风，Trap的小军鼓元素会更加明显，一般会融入Hard Trap风格的Drop，仍然保留了Trap鼓组的特点（如808等），Bass Chords呈现切片式，也可以描述为“以Trap底板为代表的一类Future Bass”。制作人：Electric Mantis、StayLoose、Just A Gent。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Call Me - StayLoose / MYRNE"]}, "experimental trap": {"name": "Experimental Trap", "ups": ["Trap"], "downs": ["Trap Metal"], "aka": "Avant-Trap", "related": "", "desc": "2010年代中期出现的一种非常规、具有挑战性、制作奇特的Trap，最初起源于美国南部，但现在已经传播到各个地方。特点是快速的Hi-hats，过载的Bass和808，不稳定、非常规的鼓组模式，混响/延迟效果的大量加入，如果有人声/说唱一般会含糊不清不能分辨，音乐风格从小清新到邪恶黑暗等应有尽有。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Jundo - Ekali / YOOKiE"]}, "crushed trap": {"name": "Crushed Trap", "ups": ["Experimental Trap", "HexD/Surge"], "downs": [], "aka": "", "related": "", "desc": "Crushed Trap是HexD在Trap中的体现，发展相对比较成熟，台风更为固定。Crushed Trap拥有Surge般朦胧粗糙的氛围，并且加入了很多处理过后的奇怪采样和Mumble Rap，整个音乐常常不超过三分钟，充满了实验性质。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["FANTASY AND MANA - Yabujin"]}, "trap metal": {"name": "Trap Metal", "ups": ["Hardcore Hip-Hop", "Experimental Trap"], "downs": ["Death Trap"], "aka": "Rap Metal、Hardcore Trap、Industrial Trap", "related": "", "desc": "Trap的一个分支，由Bones、Sybyr和XXXTENTACION等说唱歌手在21世纪10年代中期开创，特点是具有独特的Trap节拍，响亮而失真的808 Bassline，配器往往是极简的，主要靠大量的侵略性人声或者喊叫填充曲子，主题往往是暴力、黑暗、神秘的主题，歌曲中使用金属吉他演奏也是常见的手法。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Do Not Be Afraid Of Agony - Xerogi"]}, "necro trap": {"name": "Necro Trap", "ups": ["Experimental Trap", "Dark Trap", "Trap Metal"], "downs": [], "aka": "Necrotrap", "related": "", "desc": "Necro Trap是Trap Metal的一个地下子流派，诞生于2020s早期的Soundcloud。这种音乐类型的美学特征是强调谋杀、血腥、死亡、毒品、美化中东恐怖主义、自杀和多种其他形式的图形内容等黑暗话题。Necro Trap的音乐特点是嘈杂的氛围、严重失真且生涩干硬的人声、反社会式的歌词、诡异的混响与旋律和咄咄逼人的高度失真节拍。该流派与Soundcloud一个地下团体Necrosociety有关，团体内成员Gorejit被认为是该风格的创始人(创始风格后加入团体)。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["i DESPISE - Hauntgat"]}, "death trap": {"name": "Death Trap", "ups": ["Trap Metal"], "downs": [], "aka": "", "related": "", "desc": "Death Trap是Trap Metal一个更极端的子风格，一般来说存在两种形式，一种(A.K.A. Screamo Trap)的特点是使用极端金属嗓的说唱、更重更失真的Trap Beats；另一种则是偏向Hard Trap，但是拥有更加尖利的金属感Bass和失真的重节拍。代表制作人有MUGXTSU、HXNJV、ghostofblu、LOPSIZM、Akira Khan。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["5402, Three Thousand Years - Akira Khan"]}, "drill": {"name": "Drill", "ups": ["Trap"], "downs": ["UK Drill", "US Drill", "Bop"], "aka": "", "related": "", "desc": "A.K.A Chicago Drill、Drill Rap Drill是2010s初起源于芝加哥的Trap形式，Drill有些不同于Trap的特征，例如受到大量Footwork的影响和极其尖锐的Snare音色，听感阴森、凶狠，主题通常是暴力、虚无主义，并且经常与匪帮联系在一起。代表制作人和Rapper分别是Young Chop和Chief Keef。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["I Don't Like - Chief Keef"]}, "bop": {"name": "Bop", "ups": ["Drill", "Futuristic Swag", "Pop Rap"], "downs": [], "aka": "", "related": "", "desc": "A.K.A Bop Music、Bopping、Chicago Bop 流行说唱的一个子分支，产生于21世纪初芝加哥的Drill场景，特点是快乐的合成器旋律、紧凑的鼓组，以及其他类似Atlanta Futuristic Swag的元素，这类音乐的歌手经常使用Autotune，主题主要是派对和舞蹈（舞蹈名为Bopping），营造一种令人振奋的氛围。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Same Damn Time - Future"]}, "uk drill": {"name": "UK Drill", "ups": ["Drill"], "downs": [], "aka": "", "related": "", "desc": "UK Drill是21世纪10年代起源于伦敦南部布里克斯顿区的一种Drill风格，后来扩展到了整个伦敦地区。最早形式的UK Drill出现在2012~2013年，2015年左右UK Drill才开始变成独立的流派。特点是更深重的低音和更复杂的节拍，融入了一些Grime的影响，经常使用小军鼓点缀，以及听感黑暗的钢琴和弦，频繁使用滑动808，歌手几乎不用Autotune等。歌词主题非常暴力，涉及装X、毒品交易、匪帮等，以至于被媒体察觉了危险性经常被报道。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Polémique (feat. Central Cee) - Central Cee / Freeze Corleone"]}, "brooklyn drill": {"name": "Brooklyn Drill", "ups": ["NY Drill", "Chicago Drill"], "downs": [], "aka": "BK Drill", "related": "", "desc": "2020年2月初，Pop Smoke宣布Brooklyn Drill正式确立，Drill正式从芝加哥搬迁到纽约市并生根发芽，自2019年以来正式形成了新的声音。Brooklyn Drill具有更严肃、硬核而更有“诗意”的措辞，沉重到令人眩晕的808 Kick、来回交错的Snare和Hi-Hat比比皆是。一些古怪阴森的合成器模拟器乐声 loop 隐隐萦绕，歌手则操着纽约地方口音粗粝地吐出铿锵有力的 rhyme——甚至可以说直接帮助振兴了纽约长久以来相对“无聊”的传统 lyrical rap 形式。这个风格如此受欢迎以至于短时间涌现了大量优秀唱作人如Sheff G、22Gz、Smoove’L、Sleepy Hallow等，连Drake都参与到制作当中。不幸的是，2020年2月19日，Pop Smoke被枪击身亡，Brooklyn Drill艰难发展一段时间后逐渐平庸，一直停滞到现在，再没了当时的繁荣。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Moody - Sheff G"]}, "bronx drill": {"name": "Bronx Drill", "ups": ["US Drill"], "downs": ["Bronx Jersey Drill", "Bronx Snap [Microtag]"], "aka": "", "related": "", "desc": "所幸的是，纽约Drill场景并没有因为Pop Smoke的逝去而完全停止发展走向消亡。与布鲁克林相隔皇后区和曼哈顿区的布朗克斯区诞生了另一种区别甚大的Drill音乐，这种音乐就是Bronx Drill。Bronx Drill由19岁新型说唱歌手Sha Ek创造，其拥有更加硬核的唱词和节拍，毫不留情的表达对帮派的diss，或者表达其他的斗争等。在听感上，Bronx Drill拥有比其他NY Drill (New York Drill)更快的速度，末日般的氛围伴随着杂乱失真的节拍贯穿整曲，并且具有良好的包容性，可以与任何Hip Hop风格任何韵律搭配，因此在Brooklyn Drill沉默的这段时间Bronx Drill从最冷门的Drill风格一跃成为最流行的Drill风格，并在2024年井喷式增长，不断有创新作品涌现，一定程度上成为了现今NY Drill的代名词代表人物包括DThang、Sha Ek、41等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Drid - TaTa / Kyle Richh / Dee Billz"]}, "sample drill": {"name": "Sample Drill", "ups": ["UK Drill", "US Drill", "Pop Music"], "downs": ["Sexy Drill"], "aka": "Soul Drill", "related": "", "desc": "Sample Drill起源于2010s末，从Plugg(Trap分支)中获得灵感，在此基础上融入UK Drill的节拍，加入了大量非重拍的小军鼓和细碎的Hi-Hat，创造出独特的切分音节奏，并且将传统的808鼓进行了替代，融入旋律和各种采样，听感更加易于大众接受。由于经常采样灵魂乐和各类主流化的流行音乐，Sample Drill也被称为“Soul Drill”。2020s初，随着Tik Tok的兴起，Sample Drill开始进入主流大众视野并获得商业成功。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["What's My Name - Fivio Foreign / Queen Naija / Coi Leray"]}, "sexy drill": {"name": "Sexy Drill", "ups": ["Sample Drill", "US Drill"], "downs": [], "aka": "", "related": "", "desc": "Sexy Drill是US Drill的一个分支，受到了Sample Drill的影响，通常会采样灵魂乐或使用R&B感觉的合成器音色，不具有通常Brooklyn或者Bronx Drill里刺耳的声音，但保留了部分Hi-Hat以及清脆的鼓点，并且没有通常在Drill里出现的暴力、匪帮等歌词内容。Sexy Drill更多地给人一种轻松的氛围，歌词方面往往与爱情和性挂钩，使其更容易在日常生活中播放。代表人物有FLEE、Cash Cobain、Chow Lee等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Fisherrr (Remix) - Cash Cobain / Ice Spice / Bay Swag"]}, "jersey drill": {"name": "Jersey Drill", "ups": ["US Drill", "Jersey Club"], "downs": [], "aka": "Jersey Club Rap", "related": "", "desc": "2019年时，Ace Mula受委托为Killa Kherk Cobain制作Jersey Club风格的伴奏以进行说唱。Ace Mula的伴奏在Trap、Drill和Jersey Club之间切换，使每张唱片都具有独特的声音，可以很容易地识别出源自新泽西州的声音。这些Jersey Club Drill激发了新泽西州纽瓦克的许多说唱歌手和周边地区拥抱他们本土的声音，越来越多的歌曲开始被注入进Jersey Club的声音。但也正是因为地域性太强，不能像Brooklyn Drill那样肆意传播开，但这种音乐就是从俱乐部中来，到俱乐部中去，当地人也不会在乎传播性。幸运的是，通过互联网和日韩音乐的日趋国际化，Jersey Club和Jersey Drill逐渐脱离俱乐部走向商业化。可是，Jersey Club也日渐失去其本意了......", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Ain't Going Back - Rican Da Menace"]}, "plugg": {"name": "Plugg", "ups": ["Trap"], "downs": ["PluggnB", "Regalia", "Dark Plugg"], "aka": "Plug", "related": "", "desc": "Plugg是Trap的一个子分支，诞生于2010年代中期，由制作人MexikoDro以及他的团队BeatPluggz的其他人所提出，受到了Trap先驱Zaytoven的极简的鼓组的影响。特点是一般使用极简的鼓组和Hi-hats编排，极其黑暗、深沉、厚重的Sub Bass，也常使用钢琴采样、轻柔的Pad、冰冷的合成器等，歌曲BPM一般在130~145。制作人/歌手有Playboi Carti、Chinatown、DJ Young Kash、CashCache、Xangang、Goyxrd、Yeat等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Dough - Eddy Baker / Bones / Mexiko Dro", "Lookin - Playboi Carti / Lil Uzi Vert"]}, "regalia": {"name": "Regalia", "ups": ["Plugg"], "downs": [], "aka": "", "related": "", "desc": "由Royalansem创作的Plugg子风格，基于弦乐的伴奏，钢琴、合成器也经常使用，常常描绘美丽的音景，给人怀旧的感觉，十分强调旋律性，也是一场视觉上的运动。制作人/歌手：Royalansem、Reset、Weloveyouty、layze、Devstacks、Ame。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Roll The Dice - Braxton Knight", "God - layze", "Now They Know Us Pt 2 - Devstacks", "Gilly - Ame", "Trust - NorthXan"]}, "hyper plugg": {"name": "Hyper Plugg", "ups": ["Plugg", "Hyper Pop"], "downs": [], "aka": "Hyperplugg", "related": "", "desc": "Hyper Plugg是Hyper Pop与Plugg/PluggnB交融的产物，特点是将Hyper Pop(尤其是第二阶段)的制作理念融合到Plugg制作当中，形成一种类似Digicore/New Wave Rap的听感。该风格起源于2014~2016的俄罗斯互联网，并逐渐在美国走红，甚至有人抓住其特点，使用虚拟歌姬Yameii进行制作Hyperplugg音乐，进一步深化了Hyperplugg的网络性。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["E-Girl - Yameii (网易云无资源，下面是以此为Beat的Hyper Plugg)", "404Not Found! - Goldenbaby17"]}, "pluggnb": {"name": "PluggnB", "ups": ["Plugg", "Contemporary R&B"], "downs": ["Sexxnb"], "aka": "", "related": "", "desc": "将Hip-Hop/Trap融入旋律性的R&B中诞生的风格，但Beats主要还是Hip-Hop/Trap主导，Xangang、Thrillboy、RobSurreal等制作人是第一批推动PluggnB的声音发展的人，代表制作人和歌手有Xangang、Goyxrd、30Nickk、Summrs、Autumn、Texako、RewindRaps。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["OG PluggnB：Summrs - Too Divine", "Autumn - Illustrations", "RewindRaps - Coming Home Late", "Texako - Dont Pop Pills", "Summrs - Da Boss"]}, "asian rock": {"name": "Asian Rock", "ups": ["PluggnB"], "downs": [], "aka": "AR&B、ARnB、Asian Rock & Blues", "related": "", "desc": "Asian Rock是一种PluggnB风格，由2010年代后期SoundCloud上的Plugg地下音乐制作人的作品发展而来，这种风格由说唱歌手兼制作人Benjicold首创，将Plugg/PluggnB中明亮的方波旋律替换为略带忧郁的Synth Pluck和空灵清脆的Bell音色，并加入了密集的鼓组与打击乐，有时还会使用吉他或者笛声作为Lead音色，更注重舒缓的氛围。该名称来源是Benjicold对2000年代日韩电影的喜好，题材涵盖文艺到邪典，Asian Rock则是为了模仿配乐的声景而被创造的。Asian Rock在封面设计、合辑图片等方面所表现出的美学，参考了许多类似的作品，其中最著名的是电影《大逃杀》（バトル・ロワイアル）和真人版《死亡笔记》（デスノート）。代表制作人/歌手：Goonie、Vonte。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["zaza - Goonie/KanKan/Yeat", "Designer Drugs - Goonie", "Death Note - Yeat", "Hold Me Down - Vonte"]}, "sexxnb": {"name": "Sexxnb", "ups": ["PluggnB", "Comtemporary R&B"], "downs": [], "aka": "90s RnB", "related": "", "desc": "Sexxnb是PluggnB的一个子流派，拥有更加柔和的RnB旋律和Autotuned的人声，且延续了Plugg Beat的特点，更加受互联网Plugg制作人的青睐。Sexxnb是Lawsy在2022年的专辑《Sexxnb, Vol. 1》定义的说法，Sexxnb意义上来说应该指的是“Sex”+“RnB”，也就是情爱性感话题的R&B，再加上制作人常采样1990s的R&B Revival场景的音乐，因而也叫90s RnB。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Do That - Lawsy"]}, "ambient plugg": {"name": "Ambient Plugg", "ups": ["Plugg", "Glitch", "Ambient", "Cloud Rap", "Minimalism"], "downs": [], "aka": "", "related": "", "desc": "Ambient Plugg是2020年SoundCloud社区掀起的一种新Plugg潮流。Ambient Plugg不是那种把Ambient/Cloud Rap/Liquid Trap采样与Plugg鼓组简单结合的Youtube Type Beat，它在制作上会更精良复杂，具有独特的氛围听感。该风格的起源是Soundcloud一些Rapper尝试采用“Ambient Type Beat”进行说唱，这类音乐常常拥有平稳的、嗡嗡长鸣的Atmospheric Pad奠定歌曲基调，并加入声景采样增加氛围感。Plugg鼓组上，进一步弱化了Hi-Hat的占比，并且使用了干脆利落的808 Kick&Bassline进行极简编排，另外也会添加大量杂乱无章的鼓组和FX/Sample等。 Ambient Plugg受到地下说唱团体Slayworld的影响，搭配自身独特的音景效果，创造了独属于自己的Vibe，让你联想到大自然、树林、秘境、溪流等一系列与自然有关的主题或是夜晚的乡村、空无一人的都市街道等反常场景。目前该风格在国外基本成型，而在国内基本无人制作这种风格。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["specs+ - Tonedeaf"]}, "rage": {"name": "Rage", "ups": ["Trap", "Future Bass", "Plugg"], "downs": [], "aka": "", "related": "", "desc": "Rage是Trap在近几年最火的分支之一，发展于20年代初，听起来充满能量且疯狂。这种风格通常使用刺耳且迷幻的合成器音色(受2010年代EDM的影响，主要是Future Bass)，密集的Hi-Hat鼓点和追求粗劣质感的混音。Rage音乐人们通常会在Beat上使用激进且充满表现力的唱腔。这种风格在整体上是一种对传统Hip-Hop的背离，追求“朋克精神”。Rage原本来自地下，但在2020年，艺术家Playboi Carti汲取地下元素发行的专辑《Whole Lotta Red》意外地获得了成功，并使这种风格走向主流。而这张专辑的主要制作人F1lthy也为Rage的发展作出了不可磨灭的贡献。其他代表人物有Yeat、Lancey Foux、Ken Carson、SoFaygo、Homixide Gang。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Fighting My Demons - Ken Carson"]}, "future bass": {"name": "Future Bass", "ups": ["Melodic Trap", "EDM Trap", "Electronic Dance Music"], "downs": ["Future Beats", "Future R&B", "Kawaii Bass", "Heaven Trap"], "aka": "", "related": "", "desc": "Future Bass是电子舞曲的一个大家族，出现于2010年代早期至中期，受到Wonky、EDM Trap、一些Post-Dubstep和Purple Sound的影响。通常以模糊、失谐的合成器为特征，主要使用Supersaw，并通过Automation和其他调制使得Saw Chords产生旋律优美、轻松愉快的氛围。第一首被认定为是Future Bass的作品是Flume的Remix作品《You & Me》，而这首歌还保留着浓浓的Post-Dubstep风味。Future Bass最早的根源/雏形可以追溯到2009年，一些2010年代早期的Chillwave/Cloud Rap制作人也做出了贡献，2013年一种被称为“Lovetrap”的Trap音乐脱离了Trap的固定形式，使用了一种粗糙且潮湿的形式，更多关注旋律和合成器的使用。2014年Future Bass变得流行起来，并且许多制作人对其进行了实验，包括但不限于Electro-pop、Contemporary/Alternative R&B、Jersey Club、一些House（Tropical House、Electro House、Future House、Nu-Disco等）、Bubblegum Bass，甚至Downtempo和Instrumental Hip-Hop，并且诞生了Future Bass下唯一官方认定子分支Kawaii Future Bass。2010年代后期Future Bass变得流行化，进入了EDM主流市场。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Команда - DJ Smash / Polina Gagarina / Egor Kreed【https://www.youtube.com/watch?v=DEkNFao5IdU】"]}, "future beats": {"name": "Future Beats", "ups": ["Future Bass", "Hip-Hop"], "downs": [], "aka": "", "related": "", "desc": "Future Beats和早期的Future Bass有较高的重合度，依旧在Future Garage衍生及节奏驱动的类别内，底鼓低沉，融合了Trap、Groove、Funk、Boom Bap等音乐元素，相比Future Bass节拍变化更多，如Hip-Hop Beats般的鼓点。Bass同样变化多样，元素更加丰富，一般没有Buildup的结构，Drop的配器与全曲相对统一，相比传统Future Bass多了份另类的惬意。制作人：Flume、Louis the Child、Haywyre。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Shower - OrO【https://www.youtube.com/watch?v=JdGxCMato-o】"]}, "future chill": {"name": "Future Chill", "ups": ["Future Bass", "Hip-Hop"], "downs": [], "aka": "", "related": "Chill Future Bass", "desc": "Future Chill是一种标签，虽然还没有具体的定义但该词已经被大量使用，简单概括就是“未来感的流行化Chillout”，一般使用类似Hip-Hop的节拍，鼓组编排是极简的，氛围或者是忧郁黯淡或者是慵懒放松。Future Chill Beats常常为说唱/人声服务，大多数Future Chill偏向流行，但也会出现单独作为一种独立的电子音乐存在的情况。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Invention - Naia【https://www.youtube.com/watch?v=YdV_n7FOqWk】", "Birds on the Moon - Egyptian Art / Sickick"]}, "dofflin": {"name": "Dofflin", "ups": ["Future Bass", "Trap"], "downs": ["Kawaii Bass"], "aka": "", "related": "", "desc": "Dofflin用来描述Future Bass一段过渡时期的音乐，在2011年Rustie的专辑《Glass Swords》发布之后，“Dofflin”这一词由此产生，这种音乐继承了此专辑中的电子游戏元素，保留了Purple Sound的Percussion写法、G-Funk/Skweee的节奏，以及Chiptune的合成器音色，并融入了Trap[EDM]的鼓组音色，创造出一种富有“空气感”和“商业感”的未来主义声音，唤起人们对海滩/海边等意象的想象（类似于Seapunk、Aquacrunk的美学），以及电子游戏中的意象，尤其是任天堂的像素化美学以及马里奥卡丁车彩虹路系列赛道的太空风格视觉效果等。Dofflin的兴起时间不长，主要是在2011年至2014年期间，随着更有活力、旋律更优美的Kawaii Bass在日本崭露头角，Dofflin也被取而代之。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Bubble Wrap - Wave Racer【https://www.youtube.com/watch?v=IxmM9OlO5Ow】"]}, "kawaii bass": {"name": "Kawaii Bass", "ups": ["Future Bass", "Dofflin", "Chiptune", "J-Pop"], "downs": [], "aka": "Kawaii Future Bass", "related": "", "desc": "Kawaii Bass是Future Bass的一个子流派，以动漫/电子游戏文化为基础，更迎合小众听众（二次元）的口味，是普通Future Bass更“快乐”、“可爱”、“萌”的变体。Kawaii Bass是由制作人Wave Racer及其圈子的Future Bass场景发展而来的，当时此场景被称为“Dofflin”。Dofflin制作人更注重电子游戏的、更可爱的声音，便形成了Kawaii Bass的模板和早期例子。与标准的Future Bass不同的是，Kawaii Bass的节奏稍快，有时会在同一首歌曲中变换成各种各样的鼓组类型，甚至于直接4/4拍，也具有更高的能量和复杂性，经常使用Chiptune的声音、高音人声、Kawaii的采样（如玩具声、摇床声、动漫采样等）。与现代Future Bass不同的是，Kawaii Bass的大多数曲目都不是带人声的歌曲，而是偏爱采样的纯器乐曲。Kawaii Bass在视觉效果上（封面上）也通常会带有电子游戏、小动物、动漫女生的主题。这一场景的艺术家大多是日本艺术家，以及一些在Soundcloud和Bandcamp上志同道合的音乐人。日本音乐人Snail's House是Kawaii Bass最著名又多产的代表制作人之一。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Hot Chocolate - dark cat【https://www.youtube.com/watch?v=y69QZxO4G2s】", "Lost My Mind - PIKASONIC / なこたんまる / nakotanmaru（1st Drop是Kawaii Bass，2nd Drop是 Artcore          [J]）", "Constant Moderato - ミツキヨ"]}, "neon": {"name": "Neon", "ups": ["Future Bass"], "downs": [], "aka": "Neon Future Bass", "related": "", "desc": "Neon是Future Bass偏向旋律型的一个分支，曲目通常不遵循标准结构，而是混合使用各种类型的节奏、古怪的声音设计、“霓虹灯”式的旋律和氛围。它受到了Wonky、爵士、Purple Sound、Bitpop/Chiptune、Glitch和一些日本流行音乐（如Shibuya-kei）的影响。这种音乐的主要特点便是节奏的自由性和结构的不可预测，例如从4/4节奏变为6/4节奏，或每8拍增加额外的拍数、每四小节一循环增加额外小节等，这使得歌曲的旋律大多难以预测。此外这种音乐普遍使用爵士的即兴演奏和和弦走向，使用随机采样（水滴声、瀑布声、自然声、摇床声、随机Vocal Chop等），还有（很多时候是经过处理的）高音人声。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["You Know - VALENTINE / 3lo【https://www.youtube.com/watch?v=wW2k-rt6Rxg】"]}, "groove bass": {"name": "Groove Bass", "ups": ["Future Bass", "Nu-Disco", "Midtempo"], "downs": [], "aka": "Future Groove", "related": "", "desc": "此Future Groove与Groove House的子分支无关，仅仅是撞名。Groove Bass是Future Bass的一种子风格，侧重于Funk/Disco式的节拍，同时又不脱离合成器、“Bass Waves”等Future Bass的特点。与Lovestep、Neon等其他次风格相比，它更有活力、更欢快、更容易跳舞。Groove Bass的BPM一般在90-120，鼓组大多数都是稀疏但固定的Nu-Disco式4/4的舞池节拍，很多时候也注重歌曲氛围感，这种音乐可以粗浅理解为“Funky+EDM Trap”。第一批尝试这种音乐的制作人有Geotheory、Mura Masa和Snakehips（2020年后不再做了），随后是Cosmo's Midnight、BAYNK、FLYES（LOWSELF）和53 Thieves。2015年Night Owl Collective等厂牌开始发行Neon以及部分Groove Bass音乐，联合了一大批独立新人制作人，创作了很多富有Jazzy、Funky感的Future Bass的单曲或EP。正如他们在网站上所说：“我们并不是创造一种‘流派’，而是一种‘风格’。无论是Downtempo、House、DnB、Glitch Hop、Lofi、Neuro、Minimal、Garage、Future Bass、Hip-Hop、R&B还是这些风格的各种排列组合的融合，真正重要的是这种音乐需要你去‘感受’，那种Chill、Jazzy、Funky的氛围。”", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Remember - Audiobot【https://www.youtube.com/watch?v=cIyBBKHBO58】"]}, "future r&b": {"name": "Future R&B", "ups": ["Future Bass", "Alternative R&B"], "downs": ["Future Urban"], "aka": "", "related": "", "desc": "Future R&B是一个尚未被认可的标签，可以属于Future Bass分支也可以属于Alternative R&B分支，即这个标签描述的是二者的结合体。特点是具有较为明快的R&B鼓点和律动、Soulful的器乐演奏（有时会有即兴），以及少量Future Bass元素。很少使用人声切片，大量使用Bass与电子音乐元素，给予R&B更多的未来感。该流派旗下还有一个说法“Future Urban”就是指Future R&B融合更多的音乐风格形成的一类音乐。制作人：James Blake、Eartheater、Vindata。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["There For You - Martin Garrix / Troye Sivan【https://www.youtube.com/watch?v=pNNMr5glICM】"]}, "future bass pop": {"name": "Future Bass Pop", "ups": ["Future Bass", "Pop", "Contemporary R&B", "EDM"], "downs": ["4963|2013年Flume的You & Me Remix将Future Bass推向了主流", "2010年代中后期", "Future Bass开始影响许多流行艺术家", "帮助这一流派在主流音乐界取得成功。例如Troye Sivan", "MØ", "Ariana Grande", "Tove Lo", "Hailee Steinfeld", "Bebe Rexha", "Katy Perry", "Selena Gomez", "Charli XCX", "Anne-Marie", "Ava Max", "Dua Lipa", "Zara Larsson", "Ellie Goulding", "Rita Ora和Alessia Cara。这几年", "The Chainsmokers", "Marshmello和Martin Garrix等制作人与其他流行歌手合作", "推出了《Roses》", "《Happier》和《In the Name of Love》等热门歌曲", "取得了巨大成功。许多先前与2010年代早至中期的EDM浪潮（Trap/Electro-pop）有关的制作人（如Diplo和Skrillex等）", "也开始制作Future Bass", "并将Future Bass的影响融入到他们的音乐中", "进一步促进了这一流派的广泛成功和影响。"], "aka": "", "related": "", "desc": "", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Sweet but Psycho - Ava Max【https://www.youtube.com/watch?v=WXBHCQYxwr0】"]}, "bubblegum dance": {"name": "Bubblegum Dance", "ups": ["Dance-pop", "Eurodance"], "downs": [], "aka": "", "related": "", "desc": "Bubblegum Dance/泡泡糖舞曲用来描述一种特殊的欧陆舞曲或流行/舞曲风格，是“Bubblegum Pop”与“Eurodance”两词的结合体，起源于斯堪的纳维亚，主要流行在丹麦，在20世纪90年代至21世纪初发展到了顶峰。Bubblegum Dance通常由一位女歌手演唱节奏欢快、旋律优美的主旋律，由一位男歌手演唱伴唱或说唱。Bubblegum Dance的音乐风格和歌词通常充满童趣，常见的主题包括魔法、公主、玩乐、爱情、聚会等，很多时候还会带有性暗示。值得注意的是，Bubblegum Dance这一术语是在第一批真正的Bubblegum Dance发行多年后才出现的，在使用该术语之前，这些作品通常被贴上一般的“欧陆舞曲”或者“流行舞曲”的标签，这使得该流派的详细历史很难考究。泡泡糖舞曲从90年代早期的Hardstyle音乐风格过渡到了21世纪初流行的Teen Pop音乐。", "chapter": "Disco/Hi-NRG", "examples": ["Bumble Bee - Bambee【https://www.youtube.com/watch?v=CmOraUYvUNE】", "Kissy Kissy - Smile.DK"]}, "disco": {"name": "Disco", "ups": ["Funk", "Philly Soul"], "downs": ["Afro/Cosmic Disco", "Euro-Disco", "Boogie"], "aka": "Discotheque", "related": "", "desc": "迪斯科是一种舞曲流派，起源于20世纪70年代初的非裔美国人、同性恋和西班牙裔社区，并最初在这些社区中流行。第一张迪斯科播放列表出现于1974年。特点是4/4拍的低音鼓、突出的十六分音符Hi-Hats与在非重拍上的Open Hats。早期的迪斯科结合了Funk的吉他和Philly Soul的弦乐、管弦乐，以及来自西班牙裔美国音乐与非洲音乐的打击乐，与20世纪60年代末期的放克与灵魂乐中较为简单的四人乐队不同，迪斯科音乐通常包括主唱、多种乐器（吉他、键盘、合成器）、多种鼓或打击乐器（架子鼓、拉丁打击乐器、电子鼓）、管弦乐组以及各种可以solo的乐器。迪斯科在后来也进一步影响了更多音乐流派，包括爵士、迷幻音乐（Psychedelia）以及一些摇滚风格。迪斯科作为一种引入了DJ、舞厅、Extended Mix和Remix等概念的音乐流派，是所有舞曲的真正开端和基础。", "chapter": "Disco/Hi-NRG", "examples": ["Welcome To The Disco - Air Power【https://www.youtube.com/watch?v=WtA50xhi4-k】", "YMCA - Village People", "Love Train - The O'Jays"]}, "afro/cosmic disco": {"name": "Afro/Cosmic Disco", "ups": ["Disco"], "downs": [], "aka": "Cosmic Sound、Free-style Sound、Afro Disco、Cosmic Disco", "related": "", "desc": "20世纪70年代后期到80年代中期出现并流行的迪斯科，由意大利DJ Beppe Loda和Daniele Baldelli开创，BPM一般限制在90~110，强调加入很多的打击乐，融入了电子、Funk、Jazz Fusion、巴西音乐等元素。这种音乐听起来“迷幻而催眠”，充满部落感与异国情调，常常可以在音乐中见到非洲音乐中常见的手段和技巧（如Call and Response），听感上类似Afro House的降速版，并且有着更柔和的鼓组和Funk、Soul元素的参与。", "chapter": "Disco/Hi-NRG", "examples": ["Hafi Deo - Tabu Ley Rochereau【https://www.youtube.com/watch?v=t4fMISqDLlk】", "Talk To Me - Iam Siam", "Jungle Dogs (Tiago Remix) - Secret Circuit"]}, "euro-disco": {"name": "Euro-Disco", "ups": ["Disco"], "downs": ["Eurobeat", "Eurodance"], "aka": "Eurodisco、Euro Disco", "related": "", "desc": "与早期的美国迪斯科相比，欧洲迪斯科更像是节奏蓝调和灵魂乐的乐器被更多的电子声音取代的迪斯科，使用合成器、鼓机、更高的BPM、重复的节奏，通常也使用丰富的弦乐，强调欧洲流行音乐的旋律。在80年代初期，意大利迪斯科成为了欧洲迪斯科的主导力量。90年代初，随着新的舞曲风格（House、Techno、Trance）的成功，欧洲迪斯科开始衰落，但对Eurodance的发展产生了影响。其实一些在90年代复兴的欧洲迪斯科也有出现，只不过都被归入了Eurodance的领域。", "chapter": "Disco/Hi-NRG", "examples": ["Gimme! Gimme! Gimme! (A Man After Midnight) - ABBA【https://www.youtube.com/watch?v=XEjLoHdbVeE】"]}, "french disco": {"name": "French Disco", "ups": ["Disco"], "downs": ["French House", "Space Disco"], "aka": "", "related": "", "desc": "许多博客都对极具影响力的House子流派“French Touch”（即French House）大加赞赏，正如XL8R的Brandon Ivers所说：“它是Filter效果、Space Disco和Rock 'n' Roll与House、Techno的混合体”。80年代末至90年代初，David Guetta和Martin Solveig等后来的世界著名DJ在巴黎的俱乐部掀起了“French Touch”的风潮。据《Guardian》报道，“Daft Punk、St Germain等人在90年代中期重塑了法国音乐，他们将老式迪斯科Loop与House节奏相结合，创造出了美妙的音乐。”当时，法国和欧洲其他国家也在创造令人着迷的舞曲，这些歌曲有时被归类为Space Disco、French Boogie或Euro Disco。这一类别由Cerrone、Ottawan和Amanda Lear等法国艺术家率先发起。", "chapter": "Disco/Hi-NRG", "examples": ["D.I.S.C.O. - Ottawan【https://www.youtube.com/watch?v=mJpymZpk-t8】", "Carry On, Turn Me On - Space"]}, "latin disco": {"name": "Latin Disco", "ups": ["Disco", "Hispanic American Music"], "downs": [], "aka": "", "related": "", "desc": "迪斯科音乐起源于20世纪70年代纽约的地下夜总会，与纽约的拉丁裔社区有着密切的联系，其中有着许多制作人、唱片公司，同时也为迪斯科音乐提供了大量粉丝。拉丁打击乐器是迪斯科音乐的核心，在许多曲目中都能听到Salsa舞的强烈影响，主要就是由于纽约老牌唱片公司Fania Records的强大影响力。另一家颇具影响力的唱片公司Salsoul Records则被誉为史上最伟大的迪斯科厂牌，并主要发行Latin Disco。随着迪斯科风靡全球，加勒比海地区、南美洲、中美洲以及世界各地的拉丁音乐家们也开始以拉丁迪斯科为主题，创作属于自己的音乐。", "chapter": "Disco/Hi-NRG", "examples": ["Me No Pop I - Kid Creole / The Coconuts Presents Coati Mundi【https://www.youtube.com/watch?v=6bqtKEiKZQQ&t=156s】", "Candido - Jingo"]}, "disco country": {"name": "Disco Country", "ups": ["Disco", "Urban Cowboy"], "downs": [], "aka": "", "related": "", "desc": "Urban Cowboy是一种乡村音乐和West Coast Pop（西海岸流行音乐）之间的交叉风格。Disco Country被认为是它的一个子流派，在声音和名称上与迪斯科有更明显的交叉，即在保留迪斯科基本节奏与结构的基础上加入乡村音乐风格的原声吉他（非电吉他）演奏。Donna Summer、Bee Gees等艺术家参与创作了多首Disco Country歌曲，其中部分歌曲一直流行到了80年代。", "chapter": "Disco/Hi-NRG", "examples": ["High Horse - Kacey Musgraves【https://www.youtube.com/watch?v=fbNDJRwXKGc】"]}, "disco rock": {"name": "Disco Rock", "ups": ["Disco", "Rock"], "downs": [], "aka": "", "related": "", "desc": "70年代末期迪斯科音乐的兴起，让许多摇滚音乐人开始涉足迪斯科音乐，毕竟在70年代，Bee Gees乐队从一个流行/摇滚乐队摇身一变，成为迪斯科乐坛最耀眼的明星之一。迪斯科和摇滚两种音乐风格的混合，主张将两个不同的音乐流派融合到舞池中。其中许多曲目在当时的迪斯科舞厅和Billboard排行榜上都大受欢迎，进一步收获了大量迪斯科的支持者及加入该流派的音乐人。到1979年底，经典摇滚和迪斯科都逐渐消亡，而新浪潮的兴起则为下一个十年的音乐带来了巨大的变革。", "chapter": "Disco/Hi-NRG", "examples": ["Stayin' Alive - Bee Gees【https://www.youtube.com/watch?v=fNFzfwLM72c】", "Staying Power - Queen"]}, "sleaze disco": {"name": "Sleaze Disco", "ups": ["Disco", "Boogie", "Funk"], "downs": [], "aka": "", "related": "Morning Music、Deep Disco", "desc": "“Sleaze”（有时也被称为“Morning Music”，这里不做区分）是在一些同性恋Club（如旧金山的Trocadero Transfer或纽约的The Saint）中出现的术语，是对凌晨时分播放的慢节奏迪斯科舞曲的称呼（大约在早上6点后，那时只剩下Hardcore爱好者），所以并不是一种严格的风格，一般指代BPM较低的Boogie、Funk、Pop Soul、Smooth Soul、Euro-pop等音乐，少有电子元素的参与，且很多作品带有“性爱”元素。Sleaze Disco和Morning Music都是旧术语，在大多数情况下都可以形容为“Deep Disco”并几乎划等号，这一流派只能在较高BPM的音乐派对夜晚结束时播放，目的是让听众放松下来，催他们回家。", "chapter": "Disco/Hi-NRG", "examples": ["Do You Wanna Get Funky With Me - Peter Brown【https://www.youtube.com/watch?v=ml9KgPHBc2o】"]}, "boogie/post-disco": {"name": "Boogie/Post-Disco", "ups": ["Disco", "Soul", "Pop Funk", "Contemporary R&B"], "downs": ["Baggy"], "aka": "Disco Boogie、Post Disco", "related": "Synth Funk", "desc": "许多人将其视为迪斯科的延续，Boogie的发展恰逢迪斯科音乐开始走向商业衰退，融合了迪斯科、Funk和Soul的元素。与迪斯科相比，Boogie的节奏相对较慢，强调R&B风格的歌曲创作，以及更突出重音的军鼓，机械化的节奏和合成器的使用也很常见。Boogie在纽约特别受欢迎，相关的唱片公司有Prelude Records、Sam Records、Easy Street Records和Salsoul Records。尽管这种类型在80年代后期开始走下坡路，但如今它拥有大量的狂热追随者，发行仍然受到唱片收藏家的高度追捧。一些重要的Boogie乐队有D Train、Leroy Burgess、Sharon Redd、The Brooklyn、Bronx & Queens Band、Skyy和Inner Life。“后迪斯科”一词用来描述70年代末至80年代初之间诞生的迪斯科以及迪斯科流派，Boogie就是其主要形式（“Boogie”一词主要用在R&B领域而不是电子音乐领域），其他流派还有Synth Funk。", "chapter": "Disco/Hi-NRG", "examples": ["I'm In Love - Evelyn \"Champagne\" King【https://www.youtube.com/watch?v=p9f_4F-GZgY】", "Ain't No Mountain High Enough - Inner Life", "Can You Feel My Love - Khemistry", "And the Beat Goes On - The Whispers", "Get Down Saturday Night (Special Extended Version) - Oliver Cheatham"]}, "canadian disco": {"name": "Canadian Disco", "ups": ["Disco", "Space Disco"], "downs": ["Italo-Disco"], "aka": "", "related": "", "desc": "“蒙特利尔是除纽约之外第二重要的迪斯科市场。”1979年Billboard发表了上述言论。20世纪70年代末，在纽约的迪斯科之火熄灭后，蒙特利尔仍在继续。相当一部分加拿大迪斯科也可以被视为Space Disco场景的一部分。加拿大迪斯科的声音与Euro Disco的声音截然不同——这些音乐通常节奏明快、未来感十足、听感流畅，依靠的是Patrick Cowley和Azul Y Negro的合成器迪斯科模式，而不是Moroder、Simonetti和Cerrone的更古典的欧洲声音。虽然多伦多也对此流派发挥了重要作用，但加拿大的主要中心还是在蒙特利尔。可以看出，加拿大的迪斯科音乐很好地过渡成为了80年代的Hi-NRG和Italo Disco，因为它没有受到美国迪斯科音乐很大的影响。", "chapter": "Disco/Hi-NRG", "examples": ["Dancer - Gino Soccio【https://www.youtube.com/watch?v=LNfjp58vkPY】"]}, "mutant disco": {"name": "Mutant Disco", "ups": ["Disco", "Post-Punk"], "downs": [], "aka": "Disco-Not-Disco", "related": "", "desc": "变异迪斯科出现在20世纪80年代的纽约，当时正是迪斯科逐渐衰落与朋克流行的时期，它将迪斯科与Funk、后朋和实验元素相结合，融合了爵士、西班牙裔美国音乐、Dub和嘻哈等元素。它将后朋克美学融入到节奏驱动的框架中，与早期New Wave并列。音乐通常是古怪的、颠覆性的，有时也包括说唱、尖叫等。", "chapter": "Disco/Hi-NRG", "examples": ["Out Come the Freaks - Was (Not Was)【https://www.youtube.com/watch?v=ItfWet5VoZs】"]}, "oslo-disco": {"name": "Oslo-Disco", "ups": ["Modern Disco", "Space Disco", "House"], "downs": [], "aka": "", "related": "", "desc": "奥斯陆迪斯科一词常被用来指挪威奥斯陆繁荣的地下电子音乐/迪斯科场景，该场景始于本世纪初。这一场景还有其他名称，如北欧迪斯科（Nordic Disco）、挪威场景的Space Disco、Cosmic Disco和一些挪威语名字：skjeggdisko（译为“胡须迪斯科”）和fjorddisko（译为“峡湾迪斯科”）。虽然该名称形容的是一种Disco场景，但该场景完全由电子舞曲（更确切地说是House）构成。虽然奥斯陆迪斯科并不被认为是一种独立且独特的House/Disco子流派，但它仍以独特的风格融合而闻名于世。奥斯陆迪斯科融合了Space Disco的氛围、Nu-Disco的旋律、大量使用的合成器和琶音，以及早期House和Techno空旷、稀疏的制作风格。近年来，该场景还与当代Nu-Disco场景混合，从更“温暖”的迪斯科子流派中汲取灵感。", "chapter": "Disco/Hi-NRG", "examples": ["Music (In My Mind) - Lindstrøm / Christabelle【https://www.youtube.com/watch?v=tE76ssT5zOg】"]}, "dark disco": {"name": "Dark Disco", "ups": ["Modern Disco", "EBM", "Midtempo"], "downs": [], "aka": "Black Heart Disco", "related": "", "desc": "“这种音乐太具有反乌托邦色彩，不能称之为Disco；太忧郁，又不能称之为House；太有旋律，又不能称之为Techno。”Dark Disco是一种属于闪光灯和烟雾机的音乐。它粗犷而原始，有着东方化的旋律和带感的节奏，“烟草味”十足的合成器和棱角分明的旋律，是一种能吸引鬼火少年和哥特女孩的音乐。Dark Disco的“黑暗”更像是性感的黑暗，而不是恐怖的黑暗。与Nu-Disco不同，它是重音/闷音吉他音色与阴郁紧张的电子乐的结合体。它的速度通常也比原始迪斯科慢，大约在80到130 BPM之间，一般都是中速，并且总是非常适合跳舞。它的声音根源可能在比利时、柏林和土耳其，但目前Dark Disco正在墨西哥蓬勃发展。其主要起源于80年代早期的EBM、New Beat、Acid、Proto-House、Italo Disco、Cosmic Disco、Electroclash、Slo-Mo Techno、Synth、New Wave和Coldwave。与许多其他子流派不同的是，Dark Disco可以融入各种元素，同时保持其核心的粗犷和魅力。", "chapter": "Disco/Hi-NRG", "examples": ["Power to the People (Damon Jee Remix) - Pardon Moi【https://www.youtube.com/watch?v=ROgYmQA65Y8】", "Are Friends Electric (Curses Remix) - Djedjotronic / Lokier", "Magico Disco - Margot"]}, "disco pop": {"name": "Disco Pop", "ups": ["Dance Pop", "Disco"], "downs": ["Disco Polo", "J-Pop Disco", "Nu Disco"], "aka": "Disco-pop", "related": "", "desc": "Disco Pop是Disco与Dance Pop的交叉，既保持了Disco的可跳舞性和经典旋律，又有流行乐的形式，或许也可以把这种风格视为Dance Pop的前身或第一种形式。该风格常常与Euro Pop、HI-NRG有交叉，中国的“的士高”场景尝尝包含这类音乐，以及中早期House和Techno等。代表乐队一般与Euro Disco制作人或乐团交叉，包括ABBA、Hot Chocolate、Rick Astley等。", "chapter": "Fusion", "examples": ["Searching - Hazell Dean", "Colder Than Ice - Grant Miller"]}, "indie dance [edm]": {"name": "Indie Dance [EDM]", "ups": ["Modern Disco", "Nu-Disco", "Alternative Dance", "Midtempo"], "downs": [], "aka": "", "related": "", "desc": "", "chapter": "Disco/Hi-NRG", "examples": ["One Look (feat. Mammals) - LVTHER【https://www.youtube.com/watch?v=RJOkI8k_VU0】"]}, "electro-disco": {"name": "Electro-Disco", "ups": ["Disco"], "downs": ["Space Disco", "Italo Disco", "Hi-NRG"], "aka": "Synth Disco、Electro Disco", "related": "", "desc": "电子迪斯科是一个有很大影响力的迪斯科子流派，迪斯科的经典音色在很大程度上被合成器取代，也增加了一定的未来感元素，如声码器的使用，这种流派受到了Kraftwerk的强烈影响，最受欢迎、最有影响力的制作人是Giorgio Moroder。Hi-NRG由电子迪斯科发展而来，但是去掉了Disco的Funk元素。电子迪斯科人气火爆的期间诞生了很多重要曲目，被人熟知的专辑/单曲有Giorgio的From Here to Eternity；ABBA的Gimme! Gimme! Gimme! (A Man After Midnight) / The King Has Lost His Crown；Patrick Cowley的Megatron Man；Lipps Inc.的Mouth to Mouth，专辑中的《Funkytown》在1980年美国Billboard百大热门歌曲排行榜上连续四周排名第一。", "chapter": "Disco/Hi-NRG", "examples": ["Funkytown - Lipps Inc.【https://www.youtube.com/watch?v=uhzy7JaU2Zc】"]}, "space disco": {"name": "Space Disco", "ups": ["Electro-Disco", "French Disco", "Progressive Electronic"], "downs": [], "aka": "", "related": "", "desc": "如果说Electro-Disco试图将你带入未来，那么Space Disco则试图将你带入一个完全不同的世界。太空迪斯科最流行的时期是1977-1979年，当时正值电影《星球大战》和《第三类接触》上映，迪斯科舞厅也首次使用了新的灯光效果。许多太空迪斯科艺人在表演时，穿着打扮都受到Glam Rock和科幻小说风格的启发，他们的音乐也反映了他们对科幻、太空主题的迷恋。太空迪斯科主要在法国和德国流行（加拿大和俄罗斯也有一些）。从音乐风格上看，太空迪斯科通常是Progressive Electronic元素与迪斯科的融合，是电子迪斯科的一个分支，大多数曲目没有人声，如果有人声也依然会以科幻或太空主题为中心。太空迪斯科是电子迪斯科最早的形式之一，但自诞生很长时间后才逐渐受到大众的关注。", "chapter": "Disco/Hi-NRG", "examples": ["The Ultimate Warlord - The Immortals【https://www.youtube.com/watch?v=fIdFlhvItno】", "Quasar 3C 273 - Patrick Remy", "Just Blue - Space"]}, "italo-disco": {"name": "Italo-Disco", "ups": ["Electro-Disco", "Euro-Disco"], "downs": ["Spacesynth", "Italo Body Disco", "Eurobeat"], "aka": "Spaghetti Disco、Spaghetti-Dance、Italo Disco", "related": "", "desc": "Italo-Disco是20世纪70年代末起源于欧洲的一种舞曲风格，随着迪斯科的衰落，它在80年代初至中期达到了巅峰，不局限于意大利，德国和其他欧洲国家也制作这种风格。特点是使用合成器、鼓机（Linn Drum）和八度奏法的反拍Bass，有时使用声码器，强调动听的旋律和有空间感、未来感的氛围，相比Euro-Disco更轻盈、流行。80年代末，Italo-Disco的受欢迎程度开始下降，Italo House和Eurodance相关流派后来居上。代表制作人有Modern Talking和Ken Laszlo。", "chapter": "Disco/Hi-NRG", "examples": ["Self Control - Laura Branigan【https://www.youtube.com/watch?v=RP0_8J7uxhs】"]}, "spacesynth": {"name": "Spacesynth", "ups": ["Italo-Disco", "Space Music"], "downs": [], "aka": "Synthdance、Synthesizer Dance、Spacedance", "related": "", "desc": "不等于Space Synth/Spacewave。Spacesynth是从Italo-Disco演变而来的一种流派。最初Spacesynth只是Italo-Disco的一个专注于其合成器演奏方面的一个分支，但最终它成为了一种独特的流派。这种音乐的特点是宇宙感和大量使用的合成器音色，几乎所有曲目都没有人声，但有些曲目也包含用声码器处理过的人声。KOTO创作了他自己独特的的意大利式合成器音乐的风格，单曲《Visitors》在1985年大受欢迎。不久之后，意大利以外也出现了其他类似的团体。来自荷兰的Erik van Vliet与Michiel van der Kuy一起成立了Laserdance，成为了最成功的Spacesynth乐队。他们的首张专辑《Future Generation》（1987年）销量约为150000张，单曲《Power Run》和《Humanoid Invasion》在欧洲大受欢迎。KOTO和Laserdance是这一类型的开创者，自Spacesynth的黄金时代以来，许多制作人都开始制作这种音乐。", "chapter": "Disco/Hi-NRG", "examples": ["Power Run - Laserdance【https://www.youtube.com/watch?v=ak5P_FVbs9k】"]}, "italo body disco": {"name": "Italo Body Disco", "ups": ["Italo-Disco", "TBM"], "downs": [], "aka": "Italo Body Music", "related": "", "desc": "Italo Body Disco是一种诞生于2020年的新的音乐流派，由Techno Body Music和Italo-Disco融合而成。通常情况下，Italo Body Disco的曲目将EBM的强劲低音和鼓的音色与Italo-Disco的合成器旋律结合在一起。在法国南部的图卢兹市，这种音乐场景尤为突出，这一流派的标志性厂牌Ritmo Fatale就诞生于此。法国制作人Pablo Bozzi是这一流派无可争议的王者。", "chapter": "Disco/Hi-NRG", "examples": ["Machina - Boy Harsher【https://www.youtube.com/watch?v=3vfzZg7hl7Y】"]}, "hi-nrg": {"name": "Hi-NRG", "ups": ["Electro-Disco"], "downs": ["Eurobeat", "British Eurobeat"], "aka": "High-Energy、High Energy、High-Energy Disco", "related": "", "desc": "Hi-NRG在20世纪70年代末紧随电子迪斯科之后发展而来，并迅速成为旧金山和纽约LGBT俱乐部中最受欢迎的电子舞曲类型。Hi-NRG是一种快节奏的迪斯科音乐，也是一种更为特殊的衍生电子舞曲流派，更多地使用电子乐器，在20世纪80年代中后期成为主流的流行音乐。1977年，Donna Summer接受了关于其单曲《I Feel Love》的采访。在采访中，她说：“这首歌之所以成为热门歌曲，是因为它有一种高能量的氛围”。在那次采访之后，“高能量/High-Energy”一词越来越多地被用于形容快节奏的迪斯科音乐，尤其是以电子音色为主的歌曲。High-Energy Disco音乐的BPM约为125至127。20世纪80年代，“High-Energy”一词被简称为“Hi-NRG”，并且，“Hi-NRG”不再仅指快节奏的舞曲，而是指一种特定的流派，只是有点像迪斯科。Hi-NRG的典型特征是充满活力、错落有致、序列化的合成器音色，八度奏法的反拍Bass，通过音符的强弱交替来强调歌曲的节奏，还经常大量使用鼓机（Linn Drum或TR-707）的Cowbell（牛铃）和Clap音色。这一流派对House音乐产生了影响，到了1990年，House音乐逐渐取代Hi-NRG成为俱乐部音乐的首选。代表制作人有Patrick Cowley和Sylvester。", "chapter": "Disco/Hi-NRG", "examples": ["Once Is Not Enough - Oh Romeo【https://www.youtube.com/watch?v=2Ub54LpbHbw】"]}, "british eurobeat": {"name": "British Eurobeat", "ups": ["Hi-NRG", "Synth Pop", "Dance-pop", "Italo-Disco", "Euro Disco"], "downs": ["Eurobeat"], "aka": "S.A.W.-style", "related": "", "desc": "虽然名字中有“Eurobeat”但该流派在音乐形式上与Eurobeat无关，仅与Eurobeat场景有相互影响。British Eurobeat是一种Hi-NRG衍生的Dance-pop，深受Italo-Disco、Euro Disco的影响，特点是高能量的合成器音色、朗朗上口的旋律、明显突出的Bassline、丰富而强劲的打击乐、简单的歌曲结构，并且通常加入大量可供摇摆的元素，强调歌曲的切分音和弹跳感。80年代初期至中期，Hi-NRG从美国传入欧洲俱乐部，在Euro Disco的影响下，Hi-NRG开始发生变化：节奏变得缓慢，鼓点间开始有了更多空间，使得Hi-NRG在保留了能量感的基础上变得节奏更加清晰有力。与此同时，Italo-Disco和Euro Disco也开始受到Hi-NRG的反向影响：旋律变得更快、更有活力、更具舞蹈性，也更加强调合成器音色。这种产物仍与经典的Hi-NRG十分相似，并且在同性恋俱乐部中占据主导地位。80年代中期获得了自己的名字——“Eurobeat”。British Eurobeat是一个独特的分支，起源于1984年（不过该流派的元素也可以在更早的作品中找到），主要由Stock-Aitken-Waterman三人组（昵称“the Hit Factory”）创作，他们自称受到了欧洲Disco场景的启发，以及Synth-pop和Motown Sound的影响。1985年底，Dead or Alive的《You Spin Me Round (Like a Record)》在全球大获成功，Eurobeat瞬间成为了英国流行音乐的主要形式，并传播到了欧洲各地。", "chapter": "Disco/Hi-NRG", "examples": ["Never Gonna Give You Up - Rick Astley【https://www.youtube.com/watch?v=dQw4w9WgXcQ】"]}, "eurodance": {"name": "Eurodance", "ups": ["Electronic Dance Music", "Hi-NRG"], "downs": ["Bubblegum Dance", "Italo Dance", "Euro Techno"], "aka": "Euro-NRG、Euro Dance", "related": "", "desc": "欧陆舞曲是一种电子舞曲风格，在20世纪90年代非常流行。在世纪之交的欧洲，制作人们将当时流行的欧洲迪斯科、House、Electro、嘻哈、Hi-NRG和舞蹈音乐文化融合在一起，创造出了Eurodance，很快也在欧洲之外得到了流行，在澳大利亚和加拿大取得了巨大的商业成功，在加拿大还出现了地域分化的变体“Candance”。欧陆舞曲的BPM一般为110~150，通常和采样、女声主唱等有关。随着Euro House和Trance的发展，欧陆舞曲成功见证了20世纪90年代各种子风格和融合流派的出现，Euro Trance和Italo Dance在90年代后期获得了巨大的成功。", "chapter": "Disco/Hi-NRG", "examples": ["What Is Love - Haddaway【https://www.youtube.com/watch?v=HEXWRTEbj1I】"]}, "euro techno": {"name": "Euro Techno", "ups": ["Eurodance", "Hi-NRG"], "downs": [], "aka": "", "related": "", "desc": "Euro Techno是一种90年代的跳舞音乐，其名称的由来是一个意外，注意Euro Techno在音乐形式上与Techno毫无关系。Euro Techno是与Eurodance相似的继承曲风，但与欧陆舞曲相比，Euro Techno更有活力，融合了House、Hip-Hop、Synth-pop和Hi-NRG等元素。典型的Euro Techno作品有强劲的鼓点、Miami Bass节奏、女声和合成器音色。这种风格的代表艺术家有Snap!、Dr. Alban、E-Type、2Unlimited、Masterboy、Health Hunter等。在俄罗斯，Кар-Мэн和Русский Размер等制作人制作过Euro Techno。", "chapter": "Disco/Hi-NRG", "examples": ["I Need Your Love - Increase Joy【https://www.youtube.com/watch?v=dffG8WS-fvs】"]}, "euro reggae": {"name": "Euro Reggae", "ups": ["Eurodance", "Reggae", "House"], "downs": [], "aka": "", "related": "", "desc": "20世纪90年代初，雷鬼Fusion的热潮发展到了欧洲后形成了一种新的风格Euro Reggae，凭着当时Ace of Base位居榜首的热门歌曲《All That She Wants》、《The Sign》、《Happy Nation》和《Don't Turn Around》掀起了热潮。Dr. Alban、Dreamhouse、E-Rotic等欧陆舞曲艺术家也经常将他们的风格与雷鬼音乐相融合。这一流派在整个20世纪90年代成为欧陆舞曲的一种趋势。", "chapter": "Disco/Hi-NRG", "examples": ["Coco Jamboo - Mr. President【https://www.youtube.com/watch?v=EScLmWJs82I】"]}, "mediterranean progressive": {"name": "Mediterranean Progressive", "ups": ["Eurodance", "Trance"], "downs": ["Italo Dance"], "aka": "Italian Progressive Trance", "related": "", "desc": "地中海渐进用来描述Italo Dance包含有Trance元素的短暂时期（大约在1994-1997年）时的音乐，这类音乐的两大代表人物是Gigi D'Agostino和Mauro Picotto。Italian Progressive Trance（一般等于地中海渐进）一直专注于Trance的声音，而与Progressive House没有什么关系。Dream Trance与Mediterranean Progressive几乎诞生在同一时间，在声音上有一些共同的特点，也得到了许多意大利DJ的支持。到了90年代末，意大利舞曲的声音变得更像是欧陆舞曲的一个变体，在接下来的十年里，Eiffel 65和其他意大利舞曲代表人物逐渐变得更加广为人知。", "chapter": "Disco/Hi-NRG", "examples": ["Pyramid Soundwave - Saccoman【https://www.youtube.com/watch?v=0D18ULe87Vs】"]}, "italo dance": {"name": "Italo Dance", "ups": ["Eurodance", "Mediterranean Progressive"], "downs": ["Lento Violento"], "aka": "Italodance、Nu Italo Disco、Nu Italo、Nu-Italo", "related": "", "desc": "意大利舞曲出现于20世纪90年代，在80年代末意大利迪斯科的衰落之后，欧陆舞曲的一个新的衍生“Mediterranean Progressive”（地中海渐进）成为了意大利舞曲的前身。这种音乐在90年代后期成为主流，并在1999年至2003年达到巅峰。一般来说歌词是英语，但也有意大利语，流行音乐/嘻哈音乐的采样以及声码器的使用十分频繁，典型的BPM在140左右，也可以在60~165之间变化，打击乐和节拍都继承自意大利迪斯科，一些经典的音色有Hoover和303音色，以及1980年代后期的钢琴Riff，带劲的Kick与明显的反拍Bass（且基本上像是连在一起的）成为了这种流派的专属特点。", "chapter": "Disco/Hi-NRG", "examples": ["Bla Bla Bla - Gigi D'Agostino【https://www.youtube.com/watch?v=Hrph2EW9VjY】"]}, "lento violento": {"name": "Lento Violento", "ups": ["Hardstyle", "Italo Dance", "Midtempo"], "downs": [], "aka": "Slowstyle、Hard Slowstyle、Lento", "related": "", "desc": "1990s后期出现在意大利的一个风格，不过在2003年由意大利知名DJ Gigi D'Agostino确立了这一名词。听上去很像我们平时听到的“土嗨”，但是BPM慢很多，通常在85-115之间，更像我们认知中的“慢摇”。由于“Lento Violento”是Gigi D'Agostino注册的一个商标，后来制作人都用“Slowstyle”来形容这些音乐。Lento Violento跟HDM场景关系不大，故不归类至HDM。该流派在商业上早已衰落，现在也很少欧洲制作人制作这一类音乐。", "chapter": "Disco/Hi-NRG", "examples": ["In The Beginning - Lento Violento【https://www.youtube.com/watch?v=yfTKHCOYJdA】"]}, "kabuki synth": {"name": "Kabuki Synth", "ups": ["Dungeon Synth", "Dark Ambient", "Japanese Folk Music"], "downs": [], "aka": "Kabuki Ambient", "related": "Samurai Synth、Japan Synth、Koto Ambient", "desc": "一种偏向纯器乐的风格，主要由Dark Ambient和Dungeon Synth艺术家制作，艺术家们在音乐上受到Ritual Ambient和日本民谣的启发，以此来讲述日本的恐怖民间故事。艺术家们经常使用十三弦古筝、三味线、木管和太鼓。黑暗、不和谐和悬疑的音景为曲子讲述日本关于鬼、恶魔和妖怪的超自然故事定下了不安、恐怖的基调。", "chapter": "Ambient", "examples": ["My heart turns Black - Kyūketsuki"]}, "ambient": {"name": "Ambient", "ups": [], "downs": ["Dark Ambient", "Drone", "Lowercase"], "aka": "", "related": "", "desc": "Ambient的起源早在1917年就已经存在，作曲家、钢琴家Eric Satie在1917年提出了一种叫“装饰音乐”（Furnishing Music）的流派，是最早的将音乐作为“背景”、“氛围”理解的流派，1960s~70s由英国的Brian Eno提出Ambient的概念，1978年被正式命名。Ambient音乐是电子音乐的分支之一，源于70年代艺术家们所创造的一种实验性的电子合成音乐，代表人物如Kraftwerk、Brian Eno以及Harold Budd，是一种有着足够空间能让制作人发挥实力的电子音乐。很多Ambient制作人会选择实录采样加入他们的作品中。Ambient算是科技进步的产物，也是实验音乐的产物，随着新乐器的产生后来日渐发展。Ambient音乐的特殊之处就在于音乐人必须要了解各种各样不同形式的音乐风格，从而拆穿创造，实现一种特殊且多样化的表达，而不会局限于任何理论知识与规定。", "chapter": "Ambient", "examples": ["Rains Lit By Neon - Celer", "Stolen Fire - Silent Vigils"]}, "dark ambient": {"name": "Dark Ambient", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Ambient分支） Deconstructed Club （见Post-Internet分支）", "chapter": "Industrial Music", "examples": []}, "black ambient": {"name": "Black Ambient", "ups": ["Dark Ambient", "Black Metal"], "downs": [], "aka": "Blackened Ambient", "related": "", "desc": "融入了黑金属场景相关元素的Dark Ambient子流派，甚至比大多数经典Dark Ambient场景更加活跃，听感黑暗、危险，甚至比较“肮脏”，通常描绘的是漆黑一片、无法逃脱的氛围，特点是带有音调很低的音符、灵魂受折磨的声音、一些吟唱，有时也会有“恶魔”般的歌声。有时会融合更黑暗的交响乐元素，听起来像恐怖电影的背景音乐。Black Ambient的另一个变种是带有邪恶色彩的更“平静”的音乐，响度通常很小，带有难以辨认的嗡嗡声、噪音和远处的吟唱声。", "chapter": "Ambient", "examples": ["Irrlicht - Yellow Eyes【专辑：Master's Murmur】"]}, "ritual ambient": {"name": "Ritual Ambient", "ups": ["Dark Ambient"], "downs": [], "aka": "Ritual Dark Ambient", "related": "", "desc": "Ritual Ambient是Dark Ambient的一个子流派，侧重于黑暗、深沉、令人不安、神秘的仪式般的氛围。它通常在歌曲中加入吟唱声、使用部落鼓组等适配氛围的采样，比较类似于Tribal Ambient，但Ritual Ambient的氛围更神秘，与Tribal Ambient相比，该流派与Dark Ambient的联系更大。", "chapter": "Ambient", "examples": ["Gate Of All Directions - Zoät-Aon【专辑：The Triplex Bestial】"]}, "clinical ambient": {"name": "Clinical Ambient", "ups": ["Dark Ambient", "Power Electronics"], "downs": [], "aka": "", "related": "", "desc": "一种Dark Ambient子风格，起源于Power Electronics领域。这是一种听起来非常“临床化”，而且像是正在腐烂化脓的声音，给人一种身处充满福尔马林味道的医院或者停尸房的感觉。歌曲中类似鬼魅的声音和沉闷的金属声音更加强调了这种音乐的典型氛围。", "chapter": "Ambient", "examples": ["Anoxi - Diagnose: lebensgefahr【专辑：Transformalin】"]}, "arctic ambient": {"name": "Arctic Ambient", "ups": ["Dark Ambient", "Drone"], "downs": [], "aka": "", "related": "", "desc": "北极氛围音乐是氛围音乐中一种凄凉、寒冷、荒废的分支，被认为是一种Dark Ambient的延续。Dark Ambient着重于阴郁的质感和不和谐的声音，而北极氛围音乐则营造一种与世隔绝、荒凉的感觉，有时这种音乐的极简制作方法也会给人一种舒缓的感觉。由于北极氛围单调、普遍无节拍、缺乏明显的旋律，北极氛围往往与Drone有很多的相似之处。创作这一类型的重点是寒冷质感的独特合成器音色，一般来说，该流派的艺术家会实录自然风声。该流派最早的作品是Klaus Schulze于1977年发行的专辑《Mirage》和1979年的专辑《Eskimo》，这两张专辑的主题都与北极的自然环境有关，被认为是该流派的开创专辑，为后来一波又一波的音乐浪潮奠定了基础。北极氛围音乐是一个相对较新的流派术语，在许多圈子里都有激烈的争议。虽然在许多地方它还不是一个正式的流派名称，但它的标志性专辑却已经存在了几十年，并承载了这一主题。", "chapter": "Ambient", "examples": ["Daikan - Thomas Köner"]}, "dark ambient video game music": {"name": "Dark Ambient Video Game Music", "ups": ["Dark Ambient", "Video Game Music"], "downs": [], "aka": "Dark Ambient VGM", "related": "", "desc": "游戏原声音乐已成为Dark Ambient的重要组成部分，许多创作者都将精力集中在这一媒介上，尤其是在日本。这些作品始于上世纪90年代的《雷神之锤》、《辐射》和《生化危机》，在接下来的十年中，《寂静岭》和《星际迷航》系列更是广受好评。游戏原声带曲目通常比典型的Dark Ambient作品中的长曲目要短，因此在发行中包含的曲目也更多。", "chapter": "Ambient", "examples": ["SCARE SHADOW - 神保伸太郎"]}, "drone": {"name": "Drone", "ups": ["Ambient", "Minimalism"], "downs": [], "aka": "Diggin", "related": "", "desc": "Drone/嗡鸣音乐/蜂鸣音乐是一种极简主义音乐，1960s诞生于美国，2000年有了明确定义，顾名思义，主要特点是重复、延续、共鸣的乐器合奏，而音高变化幅度较小，往往不知不觉地游离到另一个音符上，直观听感便是持续不断的“嗡嗡声”、“蜂鸣声”。实验音乐制作人们将以上特质与Ambient、极简主义融合，造就了Drone音乐。该流派的起源可追溯到世界各地，例如欧洲平原歌的声乐嗡鸣、南亚古典音乐中的拉加（rāga）中经常出现的持续音符、日本Gagaku的“aitake”、阿巴拉契亚民乐中的“noter-drone”以及苏格兰音乐的“bagpipe drone”。现代古典不少流派也对Drone音乐产生了影响，如极简主义/Minimalism提供了重复的声音，而序列主义/Serialism对曲目时长和音色的探索提供了拓展。20世纪中期，西方音乐开始正式将Drone作为一种流派。Yves Klein于1949年创作的《Monotone Silence Symphony》就是早期的尝试之一，这首歌曲由20分钟的嗡鸣声和20分钟的无声组成。后来，La Monte Young开始推广这一流派，先是在1958年创作了《Trio for Strings》，然后在20世纪60年代创作了《Theatre of Eternal Music》。后来的The Velvet Underground乐队也开创了摇滚乐中的Drone元素，于是从此Drone开始影响了无数其他流派，包括氛围音乐、Drone Metal和后摇滚。", "chapter": "Ambient", "examples": ["7-Methoxy-β-Carboline - Time Machines【专辑：Time Machines】"]}, "lowercase": {"name": "Lowercase", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Ambient分支）", "chapter": "早期流派/手法/理念", "examples": []}, "microsound": {"name": "Microsound", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Ambient分支）", "chapter": "早期流派/手法/理念", "examples": []}, "dream ambient": {"name": "Dream Ambient", "ups": ["Ambient"], "downs": [], "aka": "", "related": "", "desc": "一个标签化的叫法，用来形容更唯美、更注重旋律、听感更“梦幻”的Ambient，也是最容易被大众接受的氛围音乐之一。某些音色和编排上偏向Ibiza/Balearic式的梦幻，注意和另一注重旋律的Ambient分支Progressive Electronic区分。", "chapter": "Ambient", "examples": ["Nature People - Helios"]}, "progressive electronic": {"name": "Progressive Electronic", "ups": ["Ambient", "Progressive Rock"], "downs": ["Berlin School", "Space Ambient"], "aka": "", "related": "", "desc": "Progressive Electronic是一种始于20世纪60年代末的音乐流派，受到前卫摇滚、古典音乐和Ambient的影响，被描述为“前卫摇滚的另类音乐”，相当于Ambient中的Progressive House，音色层和情感一步步慢慢铺垫，主要注重体现“渐进”和电子合成器的应用。Progressive Electronic包含了一个重要的子流派Berlin School，特点是不断变化的、多层次的合成器质感，但往往缺乏更直观的氛围感。其他国际电子乐先驱，如法国的Jean Michel Jarre、希腊的Vangelis和英国的Steve Hillage，都多少受到了Berlin School的影响，并有很多作品被纳入了这一流派。", "chapter": "Ambient", "examples": ["Garden Of Paradise - Steve Hillage【专辑：Rainbow Dome Musick】"]}, "space ambient": {"name": "Space Ambient", "ups": ["Ambient", "Berlin School"], "downs": ["​"], "aka": "Space Music", "related": "", "desc": "“Space Music”这个词自诞生以来便众说纷纭，一直都没有规定具体的指代范围，有人认为“Space Music”可以指Space Age Pop、Space Disco、Spacesynth等所有“与太空相关”的音乐，而大多数选择认同狭义的Space Music，即形容一种Progressive Electronic、Ambient、New Age的融合音乐。本词条便采用这种说法。Space Ambient于1970年代初期从Berlin School和其他Progressive Electronic风格中脱离出来，常常使用音序器，听感流动且放松，常用渐进手法，声音遥远、迷幻且空灵，与Dream Ambient类似，但主题是空间、科幻等。70年代初，先锋艺术家Tangerine Dream和Klaus Schulze分别在《Zeit》和《Irrlicht》等作品中展示了Space Ambient的声音。与大多数氛围音乐一样，Space Ambient氛围轻松而不刺耳，非常适合影视配乐等。", "chapter": "Ambient", "examples": ["Palace of Nectar - Steve Roach【专辑：Mystic Chords & Sacred Spaces】"]}, "tribal ambient": {"name": "Tribal Ambient", "ups": ["Ambient", "Nature Recordings", "Drone"], "downs": [], "aka": "Ethnic Ambient、Ethno Ambient", "related": "", "desc": "Tribal Ambient将氛围音乐与传统乐器相结合，打击乐的使用是这一流派的特点，利用来自西非、东南亚等地区的传统民间音乐的鼓声来营造出“催眠”的效果。这些鼓包括康加鼓、塔布拉鼓、迪肯贝鼓、邦戈鼓、葫芦鼓、高脚鼓和陶斯鼓，同时还经常使用木棒、编钟、笛子和管子等乐器，再加上Nature Recordings和令人平静的Drone的使用，这些都赋予了这种风格一种自然、平和的听感。同时，Muslimgauze和:zoviet*france:等艺术家也将这种风格与Dark Ambient融合在一起，营造出一种更加令人不安的氛围。这种音乐很少使用人声，由于将现场传统乐器与序列合成器混合在一起，Tribal Ambient有时与New Age的音乐形式相似或有重叠。", "chapter": "Ambient", "examples": ["Delta Rain Dream - Brian Eno / Jon Hassell【专辑：Fourth World Vol. 1: Possible Musics】"]}, "ambient americana": {"name": "Ambient Americana", "ups": ["Ambient", "Northern American Music"], "downs": [], "aka": "Ambient Country", "related": "", "desc": "美国氛围音乐是使用与美国音乐或乡村音乐相关的乐器制作的一种氛围音乐。通常是器乐形式，包括原声吉他、贝斯、钢吉他、口琴，有时还会辅以多布罗、曼陀林、鼓和一些电子乐器，这种风格通常强调田园感。美国氛围音乐的根源可以追溯到20世纪80年代，尤其是Brian Eno的《Apollo: Atmospheres & Soundtracks》，成为了先驱，同时还带有美国音乐和其他北美音乐中常见的旋律或结构。Hank & Slim于2000年发行的专辑《The World Turned Gingham》对这一流派进行了更现代的诠释，将采样、Drone与令人着迷的音景相结合。这种风格在2010年代获得了更多的人气，Suss、Barn Owl、Marisa Anderson和William Tyler等艺术家进一步探索和扩展了这种声音。", "chapter": "Ambient", "examples": ["Track 4 - Buckethead【专辑：Pike 13（注意专辑，桶哥有很多首Track 4）】"]}, "illbient": {"name": "Illbient", "ups": ["Ambient", "Downtempo"], "downs": ["Trillbient"], "aka": "", "related": "", "desc": "以纽约市（尤其是布鲁克林）为中心，Illbient是一种“有意识的”城市电子音乐形式，旨在表达周围环境中多样文化的肮脏腐朽，由DJ Spooky定义。Illbient根植于氛围音乐，有着不拘一格的氛围感，在此之上一般会融入Dub、嘻哈和DnB的元素，再加上偶尔会出现的民族音乐元素，这些都很好地与Illbient融合在了一起。Illbient可以是怪诞的、略黑暗的，也可以是脱离听众、满是噪音的，但其类似“在夜间踱步”的场景一般都保持不变。Asphadel和WordSound唱片公司为大多数Illbient作品提供了展示平台。标签Trillbient是用来形容Illbient与Trip Hop结合的一类音乐。", "chapter": "Ambient", "examples": ["Believe Porpoise - We ™【专辑：As Is】"]}, "sci-fi ambient": {"name": "Sci-fi Ambient", "ups": ["Ambient"], "downs": [], "aka": "", "related": "", "desc": "一个标签，直译为“科幻氛围”，往往使用奇怪的音效，营造出太空、漫游、科幻等广阔的音景。与Space Ambient不同，Sci-fi Ambient在听感上并不强调“宇宙的广阔”，而是使用各种各样奇怪的音效（称作Sci-fi FX），让人联想到太空中发送信号、接收信号的场景，以及人造太空机器/卫星/探测器等给人的“人工智能”感。", "chapter": "Ambient", "examples": ["Gruener Mond 3 - Elektrohorror（Youtube上没有，Bandcamp上有）"]}, "ambient noise wall": {"name": "Ambient Noise Wall", "ups": ["Ambient", "Harsh Noise Wall"], "downs": [], "aka": "ANW", "related": "", "desc": "Ambient Noise Wall是一种将Harsh Noise Wall的无动态、一成不变的噪音与更柔和、更平易近人的质感相结合的音乐形式，偏向于是一种“背景音效”。与Harsh Noise Wall一样，Ambient Noise Wall主要强调一成不变的噪音，几乎不考虑音乐性，但Ambient Noise Wall艺术家可以更自由地探索音乐质感的细微差别和变化，因为与典型的噪音墙相比，ANW的音乐大多更安静，侵略性更弱。除了Ambient之外，艺术家们还可能受到Dark Ambient、Drone和Lowercase的影响。虽然开始使用这一术语是在2009年左右，当时是为了将Missing Girls在Harsh Fucked for Life厂牌上发布的更安静、更有分寸的噪音墙音乐进行分类，但这一流派在2010年代后半期随着Small Hours、Dosis Letalis、Yume Hayashi等艺术家的出现才开始更受欢迎。虽然这仍然是噪音/氛围界的一个小众音乐流派，但随着越来越多的艺术家在此框架内探索更多的音色和动态变化，这一流派也在不断发展壮大。", "chapter": "Ambient", "examples": ["Fermionic Field - Dirac Sea【专辑：Static Universe】"]}, "brobient": {"name": "Brobient", "ups": ["Ambient", "Drone", "Vaporwave", "Plunderphonics"], "downs": [], "aka": "Brone", "related": "", "desc": "Brone/Brobient（名字为“Brostep”与“Drone/Ambient”的融合）起源于2020年6月的Deep Cuts Discord，最初的特点是将Drone/Ambient与Heavy Bass（以及其他Bass类型）相融合。随着越来越多的艺术家加入其中，其风格也从最初的Drone/Ambient转变为更刺耳的声音，并更多地受到了Noise或Plunderphonics的影响。它最初只是一个玩笑，但现在已经发展成为一个非常酷的Drone/Ambient制作人的小团体，在这个小概念上发挥着自己的独特魅力。", "chapter": "Ambient", "examples": ["Blood - no29【专辑：Death Is My Reward（Youtube上只有Full Album视频）】"]}, "fuzzbient": {"name": "Fuzzbient", "ups": ["Ambient", "Noise", "Drone", "Shoegaze"], "downs": [], "aka": "Ambientgaze、Drambientnoisegaze", "related": "", "desc": "这些名称都是此类型的爱好者自己取的，目前还没有一个确定且权威的名字。这是一种混合了Ambient、Noise、Drone和Shoegaze的音乐的总称，主要来源于00年代中期的艺术家的作品，这是一种追求空灵的音乐，同时又不失粗犷。这种独特的氛围/噪音音乐的灵感主要来自于90年代早期许多迷幻乐队采用的失真和混响效果（如MBV和Lovesliescrushing）。音乐家通过电子设备和多层次制作手法，将制作出的独特的Fuzzy Noise（Fuzz是一种失真形式）与厚重的Drone音乐结合起来。Tim Hecker、Aidan Baker、Fennesz和Jefre Cantu-Ledesma等艺术家已经为这种声音带来了新的阐释，但目前却没有一个正式的名称。无论如何称呼这一时期或这一音乐风格，它都是一种在这些截然不同的声音之间找到一种美妙的平衡的独特音乐。", "chapter": "Ambient", "examples": ["Whitecaps of White Noise I - Tim Hecker【专辑：Harmony in Ultraviolet】"]}, "post-classical ambient": {"name": "Post-Classical Ambient", "ups": ["Ambient", "Modern Classical"], "downs": [], "aka": "Neo-Classical、Ambient Classical、Post-Classical", "related": "", "desc": "Post-Classical是Modern Classical的一个子流派，自20世纪中期以来逐渐崭露头角。它的主要特点是：使用简单重复的音乐素材（通常由钢琴主导），营造放松的氛围，并保留由于录音而留下的噪音以增加“有机感”。Post-Classical在流媒体平台上已经大受欢迎，这要归功于“Classical Music for Studying”等Playlist。除了氛围音乐，ECM Style Jazz、Neoclassical New Age、Minimalism以及后摇也对其产生了重要影响。与更“高雅”的Modern Classical形式相比，该流派因其制作简单和缺乏原创性而招致乐评人的强烈反对。代表制作人：Max Richter。", "chapter": "Ambient", "examples": ["Solo - Max Richter【专辑：Sleep（Part 1 Part 2均可）】"]}, "psybient/psychill": {"name": "Psybient/Psychill", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Ambient分支）", "chapter": "Indie", "examples": []}, "acid ambient": {"name": "Acid Ambient", "ups": ["Ambient"], "downs": [], "aka": "", "related": "", "desc": "一个标签，Acid Ambient直译“酸性氛围”，主要营造迷幻的音景，虽然音乐中常用“Acid”音色，但这里的“Acid”指的是Acid Rock里面“迷幻”的意思，而并不要求必须含有Acid音色。", "chapter": "Ambient", "examples": ["Pulsatille - Martin Nonstatic"]}, "ambient pop": {"name": "Ambient Pop", "ups": ["Alternative Pop", "Ambient"], "downs": [], "aka": "Pop Ambient", "related": "", "desc": "一种实验性的流行风格，源于1980年代末至1990年代初的Dream-pop和正在分裂的Indie-pop场景，通常保留了柔和的旋律和人声以及Dream-pop/Indie-pop的摇滚乐器，同时也大量借鉴了1980年代Synth-pop的电子乐器和Ambient音色，甚至更现代的风格Downtempo、Trip Hop、IDM。该流派在1990年代中期在独立场景中崭露头角，起初主要以摇滚为导向，1990年代后期融入了Space Age Pop的影响，对2000年代的Indietronica的发展有巨大影响，也对2000年代后期Chillwave的发展产生了影响。", "chapter": "Fusion", "examples": ["Overflowing - WAV"]}, "isolationism": {"name": "Isolationism", "ups": ["Classical Music"], "downs": ["Ambient", "Avant-Garde Music", "Noise"], "aka": "", "related": "", "desc": "孤立主义，这一词汇于1993年3月首次由The Wire杂志提出，灵感来源于20世纪90年代的专辑《Ambient 4: Isolationism》，Brian Eno对孤立主义作品有着很大的影响。这种音乐强调远离听众、听感“支离破碎”，经常使用重复的、不和谐的、通常是“悬而未决”的和声，同时受到了工业音乐和实验音乐的影响，重点营造一种不安、荒凉的感觉。1994年Kevin Martin的专辑《Isolationism》收录了孤立主义的一些例子。广义上可以认为孤立主义包含了Ambient、前卫音乐到日本噪音等的各个领域，后来经过一系列后期相关作品的发行，很多人认为Isolationism已经可以被归为Dark Ambient的子分支。相关音乐厂牌：Sombient Label、Isolationism Records、Malignant Records、Cold Spring、Manifold Records、Soleilmoon。", "chapter": "Ambient", "examples": ["Crevice - Jeff Greinke【专辑：Cities in Fog】"]}, "hauntology": {"name": "Hauntology", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Ambient分支）", "chapter": "早期流派/手法/理念", "examples": []}, "dungeon synth": {"name": "Dungeon Synth", "ups": [], "downs": [], "aka": "", "related": "", "desc": "(详见Ambient板块) Black Noise (详见早期板块)", "chapter": "Fusion", "examples": []}, "winter synth": {"name": "Winter Synth", "ups": ["Dungeon Synth"], "downs": [], "aka": "", "related": "", "desc": "Winter Synth是Dungeon Synth的一个子流派，由博主Balbulus于2013年创造，用于描述受到自然启发并反映自然力量的作品。与一般Dungeon Synth音乐相比，Winter Synth略显简约，侧重于营造一种开阔的感觉，同时还融入了雪、冰、森林和山脉的意象。由于强调极简主义，与普通的Dungeon Synth相比往往与Dark Ambient和Drone有更多的重叠。Winter Synth的共同特点包括：通过现场录制冬季风声来营造氛围、大量使用混响、绵长的Pad，以及具有闪烁晶体质感的合成器音色。音乐中经常没有打击乐，即使有，也仅限于一两件乐器。这些元素结合在一起，创造出冷峻而广阔的音景，通常反映出专辑封面中以冬季为主题的意象。Paysage d'Hiver的《Die Festung》是最早也是最著名的Winter Synth作品之一，2000年代早至中期的Vinterriket也曾创作过类似的作品。后来在2010年代崛起的乐队如Eislandschaft和Inoriand都直接受到了这些早期艺术家和Balbulus的博客的启发。", "chapter": "Ambient", "examples": ["Nightfall - Aindulmedir【专辑：Star Lore】"]}, "comfy synth": {"name": "Comfy Synth", "ups": ["Dungeon Synth"], "downs": [], "aka": "Cozy Synth、Cosy Synth", "related": "", "desc": "Comfy Synth是Dungeon Synth的一个子类，主要强调怀旧、伤感和孩童时期的氛围美学，加入了更多的New Age影响。起源可以追溯到2018年，最早创作这一流派的艺术家是Ornithologia，2019年末至2020年初，地下艺术家们在Bandcamp和YouTube上开创了这一流派。Comfy Synth通常是平静、柔和、舒缓的，有时是忧郁、苦乐参半的，通常使用低保真的朦胧的录音方式。Comfy Synth的相关意象通常包括可爱的图像、描绘动物的艺术品、树屋、壁炉、甜甜圈店、海边小屋和童话村，这些都可以在Grandma's Cottage、Tiny Mouse、The Friendly Moon、Childhood Memories等艺术家的作品中找到。尽管大多数Comfy Synth作品是温暖、平静的，但许多作品唤起听众的都是怀旧的黑暗一面，比如感觉遥不可及的旧记忆，或苦乐参半、忧郁的气氛，因为很多作品都有不和谐音甚至跑调的旋律，例如Unemployed Uncle Bob、Kolessa、Mum & Dad、Pooter the Clown、Old Man's Dream等艺术家的作品。", "chapter": "Ambient", "examples": ["Milk Glass - Grandma's Cottage"]}, "forest synth": {"name": "Forest Synth", "ups": ["Dungeon Synth", "Ambient", "Nature Recordings"], "downs": ["Garden Synth", "Mushroom Synth"], "aka": "Forest Ambient、Nature Synth、Nature Ambient", "related": "", "desc": "Forest Synth是Dungeon Synth的一种风格，它融入了Ambient和Nature Recordings，唤起人们置身森林的感觉。它可以与中世纪/史诗奇幻背景相结合，也可以更加阴郁、不安和孤独。Forest Synth一般缺乏Neo-Medieval Folk式的旋律与Medieval Synth/Martial Synth的打击乐，而是主要依靠氛围Pad音色和自然录音来营造气氛。作为Dungeon Synth的一种比较偏向Ambient的风格，与Winter Synth比较相似，但通常将听众笼罩在一种更温暖、更柔和的氛围中。水流声、昆虫声、两栖动物声和鸟鸣声是常见的自然音效。还可以加入类似孤独旅人演奏的木管乐器的声音。主题包括鬼魂出没的树林、在树荫下休息的托尔金生物，以及森林中水边的林地小动物。Forest Synth是Garden Synth的基础，Mushroom Synth也与之相关，但也受到了其他流派的影响。", "chapter": "Ambient", "examples": ["The Snaking Path - Malfet"]}, "sea synth": {"name": "Sea Synth", "ups": ["Dungeon Synth"], "downs": [], "aka": "Ocean Synth", "related": "", "desc": "带有海洋主题的Dungeon Synth，主题一般是异教/挽歌或者是讲述英雄的故事，主要的意象有金银岛、海盗、怪物（如巨型章鱼、海怪、克苏鲁）、风暴、暗礁、海底的黑暗，艺术家经常用海浪和海鸥的声音来制作歌曲里的FX音效。", "chapter": "Ambient", "examples": ["Diving to Heal the Fallen - Serpent's Isle"]}, "keller synth": {"name": "Keller Synth", "ups": ["Dungeon Synth", "Black Metal"], "downs": ["Tanzelcore"], "aka": "Kellersynth", "related": "", "desc": "Keller Synth是近年来从Dungeon Synth分支出来的一个流派，一说起源于萨尔州（德国）当地的黑金属场景。与Dungeon Synth的主要区别在于作品中大量使用了鼓组，此外大多数Kellersynth声音都是非常粗糙原始的，而且有比Dungeon Synth更具侵略性。Kellersynth经常对Dungeon Synth/黑金属的陈旧音乐形式进行讽刺，主题通常涉及到药物滥用，有时也会出现纳粹相关的主题。现代Kellersynth由Sigfrid开创，Grufti也是一个该场景的重要人物。此外，德国黑金属标签Narbentage和Domain of Darkness被认为在某种程度上与Kellersynth有关。", "chapter": "Ambient", "examples": ["Boromir - Druadan Forest"]}, "dungeon rap": {"name": "Dungeon Rap", "ups": ["Dungeon Synth", "Instrumental Hip-Hop", "Memphis Rap"], "downs": [], "aka": "", "related": "", "desc": "Dungeon Rap是器乐嘻哈的一种形式，出现在2010年代末的Bandcamp beat场景中，主要由器乐孟菲斯说唱制作人制作。该流派由乌克兰的DJ Sacred开创，德国的Akabxs和Shamane28等制作人也紧随其后。现在全球各地的制作人都有参与到这一新兴流派的创作，东欧制作人尤其突出，他们引入了更多Trap、Ambient甚至实验元素的影响。", "chapter": "Ambient", "examples": ["Blood Feast - DJ Armok"]}, "dungeon chiptune": {"name": "Dungeon Chiptune", "ups": ["Dungeon Synth", "Chiptune"], "downs": [], "aka": "", "related": "", "desc": "用电子游戏BGM的相关音乐制作工具（老式电脑、控制台、Tracker、MIDI声音芯片而非MIDI合成器）制作而成的一种低保真的Dungeon Synth风格，它的低保真风格是通过模仿80/90年代初电子游戏音乐的原始音频限制（即有限的音轨数量）和Chiptune流派的一些特征（例如曲目时长较短、音色比较嘈杂、更丰富的旋律线）来实现的。与黑金属不同，Dungeon Chiptune的灵感主要来自于游戏机/电脑上的RPG游戏，或是《龙与地下城》等桌上角色扮演游戏。", "chapter": "Ambient", "examples": ["Escape from the Evil Confraternity - Kobold【专辑：The Cave of the Lost Talisman（Youtube上只有Full Album视频）17:28 】"]}, "dungeonwave": {"name": "Dungeonwave", "ups": ["Dungeon Synth", "Synthwave"], "downs": [], "aka": "", "related": "", "desc": "Dungeonwave是最近出现的一个定义松散的融合曲风，植根于Dungeon Synth，并属Synthwave以及一些其他80年代怀旧的Synth流派（如Horror Synth和Spacesynth）的子分支。鼓和打击乐比一般的Dungeon Synth更突出，普遍带有非常明显的4/4节奏。", "chapter": "Ambient", "examples": ["Cloudy Getaways - Quest Master【专辑：Sword & Circuitry】"]}, "skweee": {"name": "Skweee", "ups": ["Electro", "Techno", "Chiptune", "Synth Funk"], "downs": [], "aka": "Conflict R&B", "related": "", "desc": "Skweee是2000年代中期在瑞典和芬兰等北欧国家发展起来的Electro流派。它的名字是由瑞典制作人Daniel Savio由于想从廉价设备（模拟合成器/鼓机）中“挤出”更多声音的愿望而命名的。Skweee的核心是创造一种“独特的合成的Funk音乐”，灵感来自Synth Funk，音乐通常带有简单的合成器音色，类似于Chiptune的音效，节奏适中，约为100BPM，范围在约65BPM到120BPM不等，有时也会有IDM式的音色设计和Hip-Hop节奏（尤其是G-Funk）。最早的Skweee唱片是由瑞典唱片公司Flogsta Danshall发行的，由Daniel Savio和Beem等瑞典艺术家制作。随后，芬兰厂牌Harmönia也很快成立，Mesak和厂牌创始人Randy Barracuda等艺术家为芬兰的Skweee场景奠定了基础。这种音乐风格在2000年代后期获得了一些国际声誉和媒体的报道，也是在这一时期，Skweee开始受到Dubstep的影响，对应地Skweee的元素被Wonky借鉴，特别是在Purple Sound的一些曲目中上留下了印记，其中也受到了类似的放克与电子游戏的影响。", "chapter": "Indie", "examples": ["Mouth Everest - Beem【https://www.youtube.com/watch?v=HEm7RK8CICM】"]}, "synthwave": {"name": "Synthwave", "ups": ["French House", "Techno", "Disco", "VGM", "Cyber Punk Culture", "Retro Culture"], "downs": ["Dreamwave", "Darksynth", "Cyber Synth"], "aka": "", "related": "Retrowave、Retro Electro、Neo 80s", "desc": "Synthwave音乐大部分灵感来自1980年代的合成音乐和流行文化，往往具有“未来主义”的主题，从Synth-pop、Progressive Electronic、Italo-Disco等汲取灵感。Synthwave音乐通常以电影配乐、游戏配乐为主，封面也极具特殊的视觉元素，深受1980年代的电影、电视节目、电子游戏等的影响。起源可以追溯到2000年代中期法国French House场景与GTA 1衍生的游戏相关场景。Synthwave的BPM常为90~130不等，Bassline常为八分音符/十六分音符均匀排列，音色几乎都是合成器音色，有些Synthwave还使用类似Pop Rock的鼓组，在直接听感上十分复古。", "chapter": "Indie", "examples": ["Midnight City - M83【https://www.youtube.com/watch?v=dX3k_QDnzHE】"]}, "early synthwave": {"name": "Early Synthwave", "ups": ["Electro House", "French House", "Synthwave"], "downs": [], "aka": "", "related": "", "desc": "Synthwave的起源可以追溯到2000年代中期的法国Electro House场景。Kavinsky将Electro House音乐与80年代电子音乐的元素结合在一起，创作了一系列受80年代启发的作品。不久之后，几位法国制作人如College、Anoraak和Minitel Rose也开始制作类似风格的音乐。还有一些知名的合成器浪潮风格的游戏配乐，如Drive和Hotline Miami受到了大众的欢迎，都归功于它的成功。Early Synthwave常形容仍然没有脱离Electro House/French House的早期Synthwave作品，音色、结构等有时甚至会比较“死板”，但独特的“复古未来”感已初具雏形。", "chapter": "Indie", "examples": ["Runaways - The Outrunners【https://www.youtube.com/watch?v=GumHr9vBxwg】"]}, "outrun": {"name": "Outrun", "ups": ["Synthwave"], "downs": [], "aka": "Outrun Electro", "related": "", "desc": "Outrun是一类受1986年老式超跑电子游戏影响的赛车主题音乐。Kavinsky几乎是凭一己之力创作了Outrun的音乐形式并成为了第一种Synthwave风格，最终在2013年他将自己的第一张专辑命名为Outrun。意象主要包括飞车、霓虹灯、棕榈树、迈阿密+洛杉矶、夜间驾车、日落等。Outrun是已知最早的Synthwave风格，也是Synthwave社区中最容易找到的风格之一。", "chapter": "Indie", "examples": ["Nightcall - Kavinsky【https://www.youtube.com/watch?v=30jrmzzgHLc】"]}, "vocal synthwave": {"name": "Vocal Synthwave", "ups": ["Synthwave"], "downs": [], "aka": "", "related": "", "desc": "Vocal以各种不同形式的美学和风格存在于Synthwave之中。这一流派在制作方法上最接近Synthpop，但植根于基础的Synthwave声音。貌似这只是一个没有那么重要的标签化叫法，但是Vocal作为Synthwave制作过程中的重要工具之一，能给Synthwave提供更多不同于普通Synthwave的制作方法（类比Vocal Trance）。这一流派领域的艺术家既有歌手又有制作人，Synthwave社区中很多著名的歌曲就是Vocal Synthwave。有时这种音乐也被称为Popwave。", "chapter": "Indie", "examples": ["Running In The Night (feat. Ollie Wride) - FM-84【https://www.youtube.com/watch?v=TvZskcqdYcE】", "Le Mirage - Dana Jean Phoenix"]}, "dreamwave": {"name": "Dreamwave", "ups": ["Synthwave"], "downs": [], "aka": "", "related": "", "desc": "接近经典Synthwave的子类型，发展更成熟。旋律遵循Synthwave，Kick-Snare架构和合成器声音均有保留。不同的是Dreamwave还会采用柔和的Bass与梦幻的主旋律，拥有更静谧、轻柔的整体氛围，也常常会有人声演唱，让人感受到放松愉悦。相对讲究律动的其他Synthwave，Dreamwave也更易接受、更大众化。", "chapter": "Indie", "examples": ["Purple Night - Ionov【https://www.youtube.com/watch?v=ukXdlwvpRjY】"]}, "chillsynth": {"name": "Chillsynth", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Synthwave分支）", "chapter": "Indie", "examples": []}, "sovietwave": {"name": "Sovietwave", "ups": ["Synthwave", "Synth-pop", "Soviet Culture"], "downs": [], "aka": "Soviet wave、Soviet-wave", "related": "", "desc": "具有与苏联相关主题的Synthwave，但早在Synthwave出现之前这种音乐/艺术风格就已经出现了，所以并不属于Synthwave子分支，而是介于Synthwave和Synth-pop之间的一种风格，与Synthwave并列发展。同样基于互联网，诞生于2010s初的后苏联国家，尤其是俄罗斯与白俄罗斯等。Sovietwave常常改编前苏联歌曲或采样旋律，也会采样相关演讲/电影台词。主流Sovietwave一般集中于美苏太空争霸等题材，以及其他前苏联的科幻流派，跟艺术风格“原子朋克”有交集。曲作的目的一般是回忆前苏联科技文化成果，往往鼓励听众追求梦想、回忆童年。与Laborwave不同，Laborwave更像是一种蒸汽波的变体，将各种流行曲目/知名曲目降速制作而成。", "chapter": "Indie", "examples": ["Youth - tiiiza【https://www.youtube.com/watch?v=TrvJnvxuPjM】", "Июнь - луч"]}, "fashwave": {"name": "Fashwave", "ups": ["Synthwave", "Vaporwave"], "downs": [], "aka": "", "related": "", "desc": "Youtube上2015年诞生的网上子流派，词语来源于“Fascist”（法西斯）一词，标题通常涉及政治与二战题材，创作的内涵常常具有极右特色，曲作也会加入有关主题的演讲片段作为采样，更多的是结合蒸汽波元素。 类似的命名方法也有不少，比如Trumpwave就是将特朗普竞选常用音乐选段和演讲作为采样与Synthwave/Vaporwave融合；另外还有Simpsonwave的说法，与Trumpwave类似，采样动画《辛普森一家》的台词等与Synthwave/Vaporwave融合。而Polishwave的说法则更接近于Sovietwave，即怀念二战期间的波兰等。", "chapter": "Indie", "examples": ["The Day Of The Lion - Xurious / Brahmin【https://www.youtube.com/watch?v=VUfgYeFSgxg】"]}, "futuresynth": {"name": "Futuresynth", "ups": ["Synthwave"], "downs": ["Spacewave"], "aka": "Future Synth", "related": "", "desc": "更专注描述未来主题、科幻小说和史诗的科幻战斗场景，Bassline更加激昂，但主要目的还是让听众产生类似“失重”的状态。制作人有Waveshaper、Robert Parker、Lazerhawk、Botnit、Dynatron、Fantastisizer、Ben Until、LVX、Leslie Nayoko、SkelOne等。", "chapter": "Indie", "examples": ["Stars of the Night - Dynatron【https://www.youtube.com/watch?v=8Z_lPZpfbo8】"]}, "spacewave": {"name": "Spacewave", "ups": ["Synthwave", "Futuresynth", "Space Music"], "downs": [], "aka": "Space Synth", "related": "", "desc": "Spacewave是Synthwave论坛中的一个小众流派，并没有被官方承认。它的视觉美学、音乐形式和歌曲标题都聚焦于太空、未来派、科幻小说题材的行星探索的主题。Aphasia Records厂牌以及很多其他地方的制作人是这种特殊风格的开创者。与Spacesynth有些相似，但与Spacesynth没有关联，这是两个完全不同的圈子。", "chapter": "Indie", "examples": ["Nocturn - ToneBox【https://www.youtube.com/watch?v=Mqo3BS_q-9E】"]}, "cyber synth": {"name": "Cyber Synth", "ups": ["Synthwave", "Cyber Punk Art"], "downs": [], "aka": "Cyberpunk Synth、Cyberpunk Synthwave、Cybersynth", "related": "", "desc": "Cyber Synth是Synthwave最主流的子分支之一，是一种十分电气、科幻的Synthwave，多以赛博朋克为音乐主题或视觉主题。Cyber Synth比Futuresynth/Spacewave更加动感、情绪紧张，Drop处也往往用电吉他做旋律音色。很多Cyber Synth作品都出自Outrun场景，有几位Cyber Synth制作人还将他们的作品发展成一种类似Darksynth听感的风格。制作人有ROBORG、Microchip Terror、Roex、Fixions、Zombie Hyperdrive等。", "chapter": "Indie", "examples": ["Nec Minus Ultra - ROBORG【https://www.youtube.com/watch?v=fmZoXcwodko】"]}, "darksynth": {"name": "Darksynth", "ups": ["Synthwave", "Synth-pop"], "downs": ["Horror Synth", "Slasherwave"], "aka": "Dark Synth、Dreadwave", "related": "Dark Synth Pop、Dark Synth-pop、Dark Synthpop", "desc": "Darksynth是Synthwave的黑暗面，和Dark Synth Pop可同义，Olivier Drago曾在一篇文章中将它描述为“The Darkness of Electro”，是主题更黑暗、更沉重、更悲惨的Synthwave子类型。Horror Synth Revival主要是受70~80年代恐怖电影原声带的影响，到了下一个十年，Synthwave制作人们开始将更黑暗、更沉重的声音融合到自己的音乐中。2012年，在Perturbator、Carpenter Brut、Dance With the Dead、Mega Drive的带领下，这种新的音乐风格诞生了，融入了更专注Bass的工业音乐的元素、更快的节奏，在乐迷中获得了巨大的成功。Darksynth领域的许多制作人实际上都有制作金属的经历，他们把对重金属的热爱从金属场景过渡到了Synthwave场景。如今，Darksynth已成为Synthwave领域中最流行的风格。相关制作人/乐队有Perturbator、Dance with The Dead、Daniel Deluxe、Carpenter Brut、Lazerpunk、Volkor X、Absolute Valentine、Hollywood Burns等。", "chapter": "Indie", "examples": ["Turbo Killer - Carpenter Brut【https://www.youtube.com/watch?v=er416Ad3R1g】"]}, "dark clubbing": {"name": "Dark Clubbing", "ups": ["Darksynth", "EBM", "Midtempo"], "downs": [], "aka": "EBSM", "related": "", "desc": "Dark Clubbing（EBSM即Electronic Body Synth Music）是Darksynth的一个分支，目前还只是个标签，但现在很多主流Darksynth/Dark Glitch Hop都可归类于此。其特点是较慢的节奏和来自Midtempo Bass的沉重的Bassline。这一流派可能也受到了Dark Disco和Techno Body Music的影响。", "chapter": "Indie", "examples": ["Antagonist - ALEX / TOKYO ROSE【https://www.youtube.com/watch?v=BdH-e807MV0】"]}, "slasherwave": {"name": "Slasherwave", "ups": ["Darksynth", "Dark Wave"], "downs": [], "aka": "", "related": "", "desc": "主要体现在GosT的音乐，将Darksynth和Dark Wave融合，特点是过度压缩的鼓组和失真、粘腻、“肮脏”的Bass，将Darksynth的本就非常突出的Bass做到极致。这一类别很多时候在直接听感上与Horror Synth区别不大，所以一般统称Darksynth而不做细致分类。", "chapter": "Indie", "examples": ["Behemoth - GosT【https://www.youtube.com/watch?v=KFMMHZBF18s】"]}, "horror synth": {"name": "Horror Synth", "ups": ["Darksynth"], "downs": ["Horror Movie Scores", "Horror Synth Revival"], "aka": "Electronic Horror、Horrorsynth", "related": "", "desc": "恐怖合成器，起源于20世纪70年代至80年代的恐怖电影配乐，如John Carpenter和Goblin创作的配乐，大量使用尖锐、粗糙的合成器音色以及阴森恐怖、令人毛骨悚然的合成Pad来营造气氛，突出音乐黑暗、令人不安、暴力、鬼魅的主题。当代Horror Synth艺术家使用现代计算机技术和经典合成器，受到John Carpenter、Goblin和其他70~80年代Horror Synth电影配乐作曲家的影响，并从他们那里汲取灵感。这些当代Horror Synth艺术家（如GosT、Zombi、Défago、Tommy Creep、Umberto、Werewolves in Siberia）创作的音乐保留了早期Horror Synth的风格，但许多人也在作品中加入了更快、更具舞蹈性的元素。制作人有VHS Glitch、TERRORTRON、Electric Dragon、Nightcrawler、Cristian Bergagna、Dakarius等。", "chapter": "Indie", "examples": ["Punti De Morte - The Exorcist GBG【https://www.youtube.com/watch?v=dDig1xvljag】"]}, "horror movie scores": {"name": "Horror Movie Scores", "ups": ["Horror Synth", "Film Score"], "downs": [], "aka": "", "related": "", "desc": "70年代是恐怖电影的黄金年代，使得Horror Synth融入到电影配乐中形成独特的流派成为可能。Goblin和Fabio Frizzi等意大利前卫艺术家因其电影原声音乐作品而广为人知，甚至John Carpenter等一些导演也亲自为自己的电影创作了音乐，并广受好评。这些原声音乐普遍有着狂热的粉丝。最近也有很多艺术家用更现代的制作手法复兴了这种音乐风格。", "chapter": "Indie", "examples": ["Sequence 8 - Fabio Frizzi【https://www.youtube.com/watch?v=MfNa_CTv8s4】"]}, "horror synth revival": {"name": "Horror Synth Revival", "ups": ["Horror Synth", "Progressive Electronic"], "downs": [], "aka": "", "related": "", "desc": "2000年代末的Horror Synth Revival主要受到了70年代经典恐怖音乐的影响，包括Goblin和Fabio Frizzi等乐队的意大利式恐怖音乐和John Carpenter 80年代的合成音色配乐。这种风格通常融合了Progressive Electronic，和80年代之前的类Synthwave音乐的影响。这一场景是对70年代至80年代初意大利、美国恐怖音乐的复兴，并希望从这些经典作品中汲取新的灵感。", "chapter": "Indie", "examples": ["Animism - Three Winters【https://www.youtube.com/watch?v=omSM9R7RsJA】"]}, "sweatwave": {"name": "Sweatwave", "ups": ["Synthwave"], "downs": [], "aka": "", "related": "", "desc": "Sweatwave是Synthwave的一种相对较小众的子分支。它的美学特征通常是作为BGM配上肌肉发达的大块头的视频，比如施瓦辛格早期的健美视频，以及有氧运动视频中的健身女性。一般来说，这种音乐是激昂的，大量使用吉他Solo，经常使用人声采样，是非常完美的80年代风格复古健身音乐。2015年三部重要的Sweatwave合辑的发布帮助了这一风格在Synthwave热潮中站稳脚跟，大量仿VHS录像、有氧视频、复古视频也经常能见到这类音乐的身影。", "chapter": "Indie", "examples": ["Iron Pumper - VHS Glitch【https://www.youtube.com/watch?v=P_RtuohLMzM】"]}, "sexwave": {"name": "Sexwave", "ups": ["Synthwave", "Italo Disco", "Synth Funk"], "downs": [], "aka": "", "related": "", "desc": "Sexwave是Synthwave的一种非常小众的风格，合成器音色的“浪漫”听感在它这里更进了一步，变成了更关注“情色”、“性爱”的听感，许多此类音乐视频的视频封面都是从80年代的成人杂志/照片中截取的，一些粉丝制作的视频也会包含80年代的R级电影片段。Sexwave制作人通过融合Italo Disco、Synth Funk、Dreamwave等使他们的作品听起来更适合这种场景。目前专注制作这一风格的制作人不多，曲目也较少。", "chapter": "Indie", "examples": ["Sexualizer - Perturbator【https://www.youtube.com/watch?v=YjHHb2jnTZY】"]}, "shredwave": {"name": "Shredwave", "ups": ["Synthwave", "AOR", "Rock", "Metal"], "downs": [], "aka": "", "related": "", "desc": "Shredwave是一种以吉他音色为主角的Synthwave新分支，曲目中有很多solo，但没有类似Darksynth的厚重合成器音色，基本上所有位置都留给了吉他的发挥。一些音乐是走AOR（Adult Oriented Rock）方向的，另一些则是走更摇滚的方向的，还有一些则是走金属的，但80年代的听感和合成器音色的融合仍然存在。Ultraboss是最早公开使用这个词去形容他的专辑的人之一，其他制作人也在类似的方向上制作了很多EP和专辑。", "chapter": "Indie", "examples": ["Real Thing - LeBrock【https://www.youtube.com/watch?v=lNKzugQhXJA】"]}, "chipwave": {"name": "Chipwave", "ups": ["Synthwave", "Chiptune"], "downs": [], "aka": "", "related": "", "desc": "Chipwave是一个新术语，用来形容将Synthwave与8-bit/Chiptune合成器相结合的歌曲，他们经常以电子游戏作为灵感来创作歌曲、视频等，很多专辑封面/合辑封面就来自于80年代的电子游戏。Chipwave艺术家有时将Synthwave、Chiptune与其他流派风格相结合，创造出更加多样化的结合体。", "chapter": "Indie", "examples": ["CPU - Zalza【专辑：Out of Memory】【https://www.youtube.com/watch?v=QFNOUqPtxNs】"]}, "retro edm": {"name":
