日本人对南韩Trot音乐的一种蔑称。", "chapter": "Fusion", "examples": ["야간열차 - 陈浩民"]}, "modern vina pop": {"name": "Modern Vina Pop", "ups": ["Vina Pop", "Vina Folk", "Vina House", "K-Pop/J-Pop"], "downs": [], "aka": "", "related": "", "desc": "随着Vina House的兴起和韩流日流的国际化发展，过去以芭乐音乐和民谣音乐为主要题材的越南流行乐逐渐脱离了过去的限制，加入了大量Electro Pop或Dance Pop元素，诞生了主流的Vina Pop。这类越南流行乐虽然主题上仍然是跟芭乐音乐等传统形式保持一致，但是因为电气化的缘故更适合改编和配乐，并得以更广阔的宣传。类似这样的例子还很多，越南只是典型例子，蒙古、哈萨克斯坦、菲律宾等国家都有类似的形式，尤其是本身就有深厚音乐土壤的柬埔寨。", "chapter": "Fusion", "examples": ["Kẻ Cắp Gặp Bà Già - 黄垂玲"]}, "industrial/electronic black metal": {"name": "Industrial/Electronic Black Metal", "ups": ["Black Metal", "Industrial Metal", "Electronic Music"], "downs": [], "aka": "", "related": "", "desc": "工业/电子黑金属，是挪威黑金属乐队Mysticum和Helheim(不是来自萨尔普斯堡的维京金属乐队)在1990s后期开创的一种风格，是黑金属与各类电子音乐的混合体，有时甚至直接包括Post-Industrial音乐本身。工业/电子黑金属常常有即兴演奏，包含非常尖锐的吉他音色，并且通常以黑金属风格融入紧凑的“机械”演奏，主题范围从撒旦崇拜到法西斯主义和军事理想，再到药物滥用和精神错乱。近年来越来越多电子音乐风格融入了这种极端的黑金属风格中，如EBM、Aggrotech、Hardcore等，扩展了这种音乐的范畴。", "chapter": "Fusion", "examples": ["With No Human Intervention - Aborym"]}, "cyber metal": {"name": "Cyber Metal", "ups": ["Industrial Metal", "Deathcore", "Black Metal", "Electronic Music"], "downs": [], "aka": "", "related": "", "desc": "Cyber Metal是Industrial Metal的一个创新性融合分支，不是网络所传的“Trance Metal”的别称，也不是“赛博朋克金属”的意思。Cyber Metal在音乐中融入了大量电子元素和未来主义元素。其特点是类似Death Metal沉重失真的吉他即兴演奏、类似Deathcore或Black Metal般咄咄逼人的人声，以及对电子乐器和编程音乐的高度强调。Cyber Metal的歌词通常涉及技术、反乌托邦和展望赛博朋克时代人类生存情况等。近年来这种风格越来越受欢迎，乐队甚至将网络金属乐元素融入他们的音乐中。", "chapter": "Fusion", "examples": ["Shield Mode - Oblivion Machine (偏电子)", "临界最终散射面 - 惊极乐队 (偏金属)"]}, "neue deutsche härte": {"name": "Neue Deutsche Härte", "ups": ["Industrial Metal", "Neue Deutsche Welle", "Techno"], "downs": [], "aka": "", "related": "", "desc": "Neue Deutsche Härte是一种德国音乐流派，一般译作“德国重金属新浪潮”。Neue Deutsche Härte融合了Industrial Metal、Hard Rock、Techno及其他电子音乐风格等。这种风格诞生于1994年德国乐队Rammstein的专辑《Sperm》，受Neue Deutsche Welle影响，Neue Deutsche Härte极度强调机械性的电子节拍和充满科技感的合成器音色。Neue Deutsche Härte的歌词常常涉及争议性或禁忌话题，拥有沉重的失真吉他和冷峻冰冷的人声，且通常以德语的形式展开。现在该风格甚至已经成为了工业金属(Industrial Metal)的代名词。", "chapter": "Fusion", "examples": ["Du Hast - Rammstein"]}, "electro soul": {"name": "Electro Soul", "ups": ["Soul", "Electro", "Synth Pop"], "downs": ["Neo Soul", "Future Soul"], "aka": "", "related": "", "desc": "Electro Soul(电子灵魂乐)是电子音乐与灵魂乐的混合物，其电子元素体现在其Bassline和合成器音色。Electro Soul的Soul组分不再是重点，更偏向于Future Funk/Electro Funk，听起来更接近于Electro Pop。Electro Soul诞生于上世纪八十年代末期，伴随Comtemporary R&B和Disco/Funk浪潮发生变革。有趣的是，Dubstep的Bassline也常常在Electro Soul音乐中得以体现，Disco的复古电子节拍和Hip-Hop的说唱元素也常常被运用在Electro Soul的制作当中。", "chapter": "Fusion", "examples": ["Jump Right In - NoMBe"]}, "future soul": {"name": "Future Soul", "ups": ["Electro Soul", "Downtempo"], "downs": [], "aka": "", "related": "", "desc": "Future Soul是基于Neo Soul音乐，加入Future Bass/Future Beats/Future Urban元素的音乐，类似于Future R&B与R&B的关系。 Neo Soul是Soul的一个子流派，起源于上世纪70年代末80年代初，并在1990s大幅度流行，中间沉匿十余年后在2010s末期复兴。Neo Soul是一种混合型流派，融合了Jazz、Funk、Electronica、Hip-Hop等，同时还加入了非洲音乐、拉丁音乐、摇滚和House舞曲的元素，形式多样。", "chapter": "Fusion", "examples": ["Green & Gold (Kartell Remix) - Kartell"]}, "rnbass": {"name": "RnBass", "ups": ["Comtemporary R&B", "Hip Hop", "Bass Music", "Electro-pop"], "downs": [], "aka": "", "related": "", "desc": "RnBass是R&B当代最电气化的形式，其不断发展的活力吸引了大量制作人参与其制作，其中尤其以美国西海岸和南韩最有代表性。RnBass保留了当代R&B的声音特点，保留了其各种抒情方式，但是与此同时加入了更多Electro-pop元素，并在R&B和Hip Hop长久以来的互相影响中吸收了后者的Hip Hop演绎模式和808鼓机的声音。这种流派由制作人JMaine创造，并由DJ Mustard推广开来，并诞生了很多热门歌曲，在嘻哈、流行、R&B榜单上都得到了嘉奖。这种风格也同样影响到了南韩团体的音乐制作，RnBass也当之无愧是最标新立异的R&B风格之一。", "chapter": "Fusion", "examples": ["Loyal - Chris Brown"]}, "electro/synth funk": {"name": "Electro/Synth Funk", "ups": ["Funk", "Synth Pop", "Post-Disco"], "downs": ["Tecnobrega"], "aka": "", "related": "", "desc": "上世纪八十年代，Synth Funk出现，用以对Disco进行回应，构成Pure Funk的基础的许多核心元素开始被电子乐器、鼓机、合成器所取代。受Kraftwerk影响，美国DJ Afrika Bambaataa于1982年开发了Electro Funk/Synth Funk。1980s后期，Pure Funk已经失去商业影响力，然而从迈克尔杰克逊到文化俱乐部的一系列流行音乐家还在使用Pure Funk节拍。1980s风靡一时的Synth Funk，正是结合了Post Disco与采用电子合成器取代部分实体乐器的时代特色Funk乐。1979~1987年间是Synth Funk的创作高峰时期，代表作包括1979年Micheal Jackson的《Don't Stop 'Til You Get Enough》、Earth, Wind & Fire的《Boogie Wonderland》等。", "chapter": "Fusion", "examples": ["Let's Groove - Earth,Wind & Fire", "More Bounce To The Ounce - Zapp"]}, "tecnobrega": {"name": "Tecnobrega", "ups": ["Synth Funk", "Dance Pop", "Brega", "carimbó", "lambada"], "downs": [], "aka": "", "related": "", "desc": "Tecnobrega是一种兴起于1990s巴西帕拉州和亚马逊州的融合性电子音乐，推动人是巴西组合Gang do Eletro。Tecnobrega混合了合成器放克乐、流行舞曲、民族音乐尤其是当地民族风格Brega等。Tecnobrega的节奏和旋律具有高度流行性，歌词通常涉及日常生活、爱情关系和社会矛盾等，因此受到各个阶层的人喜爱。近年来，这种风格逐渐获得国内外的认可，并衍生出一系列时尚风格、舞蹈艺术和视觉文化。该风格主要制作人包括：Gaby Amarantos、Banda Uó、Felipe Cordeiro、Gang do Eletro等。", "chapter": "Fusion", "examples": ["Reload - DJ Luiz Cláudio"]}, "acid jazz": {"name": "Acid Jazz", "ups": ["Jazz", "Funk", "Comtemporary R&B", "New School Hip-Hop"], "downs": [], "aka": "", "related": "", "desc": "Acid Jazz的诞生是戏剧化的。1980s，BBC Radio 1的唱盘骑师Gilles Peterson经常在伦敦西北部的Camden Town著名的Dingwalls Club做DJ。有一天他突发奇想将一张老式7-inch的Jazz Funk唱片《Mickey and the Soul Generation》放在唱机上加速播放，结果效果出乎意料的好，此时另一位唱盘骑师Chris Bangs说，“如果先前有Acid House，那这就是Acid Jazz”。之后不久的1987年，Gilles Peterson与Eddie Piller联合创办了Acid Jazz Records，标志着Acid Jazz的诞生。 Acid Jazz的主体实际上是Funk，而Acid也不指Acid Bassline而是类似于Acid Rock的“致幻”。1990s以来，Acid Jazz逐渐与电子音乐结合，涌现了一批知名制作人或乐队，将Acid Jazz这种风格捧上神坛。如今的Acid Jazz仍然在欧美音乐界保持着相当的活力，并且与Nu Jazz等风格逐渐靠拢。", "chapter": "Fusion", "examples": ["Virtual Insanity - Jamiroquai"]}, "funk carioca": {"name": "Funk Carioca", "ups": ["Hip Hop", "Gangsta Rap", "Dance Pop", "Miami Bass"], "downs": ["Funk Melody"], "aka": "Baile Funk, Rio Funk, Brazilian Funk", "related": "", "desc": "1980s中期诞生于巴西里约热内卢的一种电子舞曲，不受Funk乐的影响，风格特征来源于Miami Bass和Gangsta Rap。Funk Carioca通常采用808鼓机制作“Bum-Cha-Cha”的节奏并辅以葡萄牙语人声。2001年，《纽约时报》正式认定Funk Carioca是一种独立的风格，自此Funk Carioca开始逐步国际化发展并形成了很多分支。", "chapter": "Fusion", "examples": ["Chambrado do Nada - MC Bin Laden"]}, "funk melody": {"name": "Funk Melody", "ups": ["Dance Pop", "Funk Carioca", "Samba"], "downs": [], "aka": "", "related": "", "desc": "由DJ Marlboro和Grandmaster Raphael于1990s初期在巴西发展起来的一种Dance Pop流派，根植于Funk Carioca音乐，最初是以Freestyle作为主要展开方式，而如今则是在节拍的基础上添加了更多现代Dance Pop的元素，同时接受了Samba舞曲和Comtemporary R&B的影响。2000年代后面逐渐低迷，并向主流Dance Pop靠近。", "chapter": "Fusion", "examples": ["Sem querer - Ludmilla"]}, "funk ostentação": {"name": "Funk ostentação", "ups": ["Funk Carioca", "Hip-Hop"], "downs": [], "aka": "Ostentação Funk", "related": "", "desc": "同样诞生于1990s的一种Funk Carioca音乐的衍生品，在圣保罗的“新中产阶级”运动中产生，这种音乐同样基于Funk Carioca的节奏型，但是融入了更多嘻哈/说唱元素。ostentação在葡萄牙语里代表“炫耀”，这类音乐的主题和歌词也常常是炫耀资本或权力，或是涉及违法犯罪活动。Mc Boy do Charmes被认为是这种风格的推动者，而这种风格也在互联网上病毒式得传播。", "chapter": "Fusion", "examples": ["Zoo Girl - M.I.A."]}, "tecnocumbia": {"name": "Tecnocumbia", "ups": ["Cumbia", "Electro-pop"], "downs": [], "aka": "", "related": "", "desc": "Tecnocumbia是哥伦比亚的一种流行乐，但是其起源却是在墨西哥。Tecnocumbia一词由墨西哥开发，一开始是作为1980s初期墨西哥Cumbia音乐的变种发展起来的，其开创乐队被认为是Veracruz的Super Show de los Vazkez(1981)。Tecnocumbia最知名的代表人物是墨西哥德克萨斯唱作人Selena，她创作了很多在美墨两地大受欢迎的Tecnocumbia音乐。 Tecnocumbia在哥伦比亚的发展最为突出，以此为根据地诞生出各类不同的Tecnocumbia，如结合秘鲁Cumbia琴的秘鲁Tecnocumbia、融合安第斯民族音乐的安第斯Tecnocumbia。1992年，厄瓜多尔也诞生出了基于哥伦比亚Tecnocumbia的音乐形式并大获成功，而在智利则被称为“Cumbia Sound”。", "chapter": "Fusion", "examples": ["Como la Flor - Selena Quintanilla"]}, "electro tango": {"name": "Electro Tango", "ups": ["Electronic Music", "Tango Dance"], "downs": [], "aka": "", "related": "", "desc": "Electro Tango是专为舞厅诞生的舞曲风格，试图将传统Tango(探戈舞曲)的旋律和快速的行进与Electronica结合，例如鼓机更加突出的节奏和来自音序器更突出的Bassline。Electro Tango的形式与Electro Swing很相似，而且Electro Tango也会使用电子合成的手风琴音效。", "chapter": "Fusion", "examples": ["Queremos paz - Gotan Project"]}, "electro swing": {"name": "Electro Swing", "ups": ["Electro Jazz", "Swing/Swing Revival", "Jazz House"], "downs": [], "aka": "", "related": "", "desc": "最初出现于20世纪90年代Swing Revival场景之后，将Swing/爵士乐与电子舞曲结合，旨在重现20世纪20年代末至40年代中期的爵士乐氛围。经常直接采样爵士乐或乐器独奏，常用乐器有小号、单簧管、钢琴、萨克斯等，节拍使用4/4的House节奏，有时也可以用嘻哈节拍或Techno节拍。", "chapter": "Fusion", "examples": ["Panic - Caravan Palace"]}, "electro epic": {"name": "Electro Epic", "ups": ["Electronica", "Epic Music", "Symphony/Orchestra"], "downs": ["Epic Video Game Soundtrack"], "aka": "Epic Electro、Electronic Epic、Electronic Symphonic、Electronic Orchestral", "related": "", "desc": "Electro Epic是用来形容一类由编曲软件制作、可能有原声乐器辅助的史诗音乐，多数的表现为气氛宏大的管弦乐或交响乐，情感多数是昂扬振奋或感动人心的。Electro Epic音乐为了增强情感，制作人常常在音乐中添加人声独唱或和声、金属乐元素或其他合成器声音/采样/FX等。一般来说这类音乐很适合作为纪录片配乐或视频配乐，且相对来说成本更低，因此这类音乐在诞生以来以来都很受欢迎，某些情境下这类音乐与Soundtrack有明显交集。", "chapter": "Fusion", "examples": ["Victory - Two Steps From Hell"]}, "soundtrack": {"name": "Soundtrack", "ups": ["Can Music", "Electronic Music", "Furnishment music", "Ambient etc."], "downs": ["Epic Video Game Soundtrack", "Italian Soundtrack"], "aka": "", "related": "", "desc": "Soundtrack音乐，一般译为“原声带音乐”。Chosic上对其的描述是：这种类型的音乐经常用于电影和电视节目中，以增强场景的情感冲击力。它通常以管弦乐编曲为特色，重点是旋律和和声。音乐通常是史诗般的和宏伟的，非常强调创造一种戏剧性和紧张感。它还可以融合世界音乐和电子音乐的元素，创造出独特而难忘的音景。 实际上原声带音乐的概念范围远比描述大得多。有趣的是，原声带音乐的概念是伴随着电子音乐逐渐成型的，与“家具音乐”、“罐头音乐”、“电梯音乐”这些电子音乐初期发展的概念都有上下位关系，例如1948年Pierre Schaeffer的Etude Aux Chemins De Fer(火车奏鸣曲)，这首具象音乐实际上也是原声带音乐。原声带音乐与电子音乐相对来说是独立发展的，但是电子音乐确实也为原声带音乐提供了技术上的启发。现如今的原声带音乐已经不仅仅局限于交响乐、具象音乐、模块合成器音乐或Electro Epic了，而是向更多元的方向如流行乐、金属乐等非电子音乐发展。这里选取了1986年电视剧西游记的主题曲，这首歌本身既是电子音乐又是原声带音乐，相对来说比较有代表性。", "chapter": "Fusion", "examples": ["云宫迅音 - 许镜清"]}, "epic video game soundtrack": {"name": "Epic Video Game Soundtrack", "ups": ["Electro Epic", "VGM", "Soundtrack"], "downs": [], "aka": "", "related": "", "desc": "Soundtrack发展到今日已经形成相当可观的规模，已经不再局限于电视节目或电影了，而是向电子游戏、电视剧、动画番剧等发展。一般来说这类Soundtrack常常被称为“BGM”，或“OP”、“ED”等。而Electro Epic与Soundtrack的融合也是当下最流行的形式之一，因此Epic Soundtrack与VGM或游戏BGM的融合情况变得相当常见，这也像Folktronica一样，Soundtrack在游戏里的比重变得相当大，贯彻了萨蒂的“家具音乐”的理念，烘托了游戏某个情节或某段争斗的史诗感氛围，为Soundtrack找到了适合她的归宿之一。代表游戏有：《刺客信条》、《异度之刃》、《最终幻想》等。", "chapter": "Fusion", "examples": ["Control's Wishes - Steven Grove"]}, "psy trap": {"name": "Psy Trap", "ups": ["Trap", "Psy Trance"], "downs": [], "aka": "Psytrap", "related": "", "desc": "Psy Trap是一种新标签，疑似Psy Trance的新型融合分支，但由于它将Psy元素和Trap的独特结合引得不少制作人开始制作这种风格。这一流派一般有两种表现形式，一种是EDM Psy+EDM Trap式的Carnival式暴力拼接，另一种是用Trap与Psy Trance的紧密结合，弱化Trap的EDM属性，多采用小军鼓，整体多偏向Psy Trance。制作人：Anchor Hill，Zebbler Encanti Experience，Symbolico，Hullabalo0，Govinda。", "chapter": "Fusion", "examples": []}}};

const CC = {};
DATA.chapters.forEach(ch => { CC[ch.name] = ch.color; });

const OUTLINE = {};
DATA.chapters.forEach(ch => { OUTLINE[ch.name] = ch.tree; });

const GENRES = DATA.genres;

// Build all node elements
const container = document.getElementById('container');
let allNodes = [];
let descOnly = false;

function buildChapter(ch) {
  const trees = OUTLINE[ch.name];
  if (!trees || !trees.length) return null;
  
  const col = document.createElement('div');
  col.className = 'col';
  col.style.borderColor = ch.color + '33';
  
  const head = document.createElement('div');
  head.className = 'col-head';
  head.style.background = ch.color + '18';
  head.style.color = ch.color;
  let nodeCount = 0;
  function countNodes(n) { nodeCount++; if(n.children)n.children.forEach(countNodes); }
  trees.forEach(countNodes);
  head.innerHTML = ch.name + ' <span style="font-size:10px;opacity:.7">(' + nodeCount + ')</span>';
  head.onclick = function() {
    const body = col.querySelector('.col-body');
    body.style.display = body.style.display === 'none' ? '' : 'none';
  };
  col.appendChild(head);
  
  const body = document.createElement('div');
  body.className = 'col-body';
  
  function renderTree(nodes, level) {
    nodes.forEach(n => {
      const el = document.createElement('div');
      el.className = 'node l' + Math.min(level, 4);
      const hasDesc = !!GENRES[n.label.toLowerCase()];
      if (hasDesc) el.classList.add('has-desc');
      el.innerHTML = '<span class="dot" style="background:' + ch.color + '"></span>' + n.label;
      el.dataset.name = n.label;
      el.dataset.chapter = ch.name;
      el.dataset.hasDesc = hasDesc ? '1' : '0';
      el.dataset.level = level;
      el.onclick = function(e) {
        e.stopPropagation();
        document.querySelectorAll('.node.sel').forEach(x => x.classList.remove('sel'));
        el.classList.add('sel');
        showDetail(n.label, ch.name);
      };
      body.appendChild(el);
      allNodes.push(el);
      if (n.children) renderTree(n.children, level + 1);
    });
  }
  
  renderTree(trees, 0);
  col.appendChild(body);
  return col;
}

DATA.chapters.forEach(ch => {
  const col = buildChapter(ch);
  if (col) container.appendChild(col);
});

document.getElementById('ch-count').textContent = DATA.chapters.length + ' 篇章 · ' + allNodes.length + ' 节点 · ' + Object.keys(GENRES).length + ' 介绍';

// Detail panel
function showDetail(name, chapter) {
  const g = GENRES[name.toLowerCase()];
  const inner = document.getElementById('detail-inner');
  let h = '<h2>' + name + '</h2>';
  h += '<span class="chap" style="background:' + (CC[chapter]||'#888') + '22;color:' + (CC[chapter]||'#888') + '">' + (chapter||'') + '</span>';
  
  if (!g || !g.desc) {
    h += '<div class="no-desc">暂无详细介绍</div>';
    inner.innerHTML = h;
    document.getElementById('detail').classList.add('show');
    return;
  }
  
  if (g.aka) h += '<div class="aka">🏷 A.K.A. ' + g.aka + '</div>';
  
  h += '<div class="desc">' + g.desc + '</div>';
  
  if (g.ups.length || g.downs.length || g.aka || g.related) {
    h += '<div class="rels">';
    if (g.ups.length) {
      h += '<div class="rel-title" style="color:#f87171">⬆ 上位（影响/衍生来源）</div>';
      g.ups.forEach(u => h += '<span class="tag up">' + u + '</span>');
    }
    if (g.downs.length) {
      h += '<div class="rel-title" style="color:#4ade80;margin-top:6px">⬇ 下位（派生子风格）</div>';
      g.downs.forEach(d => h += '<span class="tag down">' + d + '</span>');
    }
    if (g.related) {
      h += '<div class="rel-title" style="color:#fb923c;margin-top:6px">≈ Related To</div>';
      h += '<span class="tag rel">' + g.related + '</span>';
    }
    h += '</div>';
  }
  
  if (g.examples && g.examples.length) {
    h += '<div class="ex-title">🎵 例曲</div>';
    g.examples.forEach(ex => h += '<div class="ex-item">' + ex + '</div>');
  }
  
  inner.innerHTML = h;
  document.getElementById('detail').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('show');
  document.querySelectorAll('.node.sel').forEach(x => x.classList.remove('sel'));
}

function scrollCols(amount) {
  document.getElementById('container').scrollBy({left:amount, behavior:'smooth'});
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.node.sel').forEach(x => x.classList.remove('sel'));
  if (!q) return;
  
  for (let el of allNodes) {
    if (el.dataset.name.toLowerCase().includes(q)) {
      el.classList.add('sel');
      el.scrollIntoView({behavior:'smooth', block:'center'});
      showDetail(el.dataset.name, el.dataset.chapter);
      return;
    }
  }
}

let descFilterOn = true;
function toggleDescFilter() {
  descFilterOn = !descFilterOn;
  const btn = document.getElementById('btn-show-desc');
  btn.classList.toggle('on', descFilterOn);
  applyFilter();
}

function applyFilter() {
  allNodes.forEach(el => {
    if (descFilterOn && el.dataset.hasDesc === '0') {
      el.style.display = 'none';
    } else {
      el.style.display = '';
    }
  });
}

function expandAll() {
  document.querySelectorAll('.col-body').forEach(b => b.style.display = '');
}

function collapseAll() {
  document.querySelectorAll('.col-body').forEach(b => b.style.display = 'none');
}

// Close detail on click outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node') && !e.target.closest('#detail') && !e.target.closest('#search')) {
    closeDetail();
  }
});

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
  if (e.key === 'ArrowLeft') scrollCols(-300);
  if (e.key === 'ArrowRight') scrollCols(300);
});

// Touch swipe support for detail panel
let touchStartY = 0;
document.getElementById('detail').addEventListener('touchstart', function(e) {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('detail').addEventListener('touchmove', function(e) {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 60 && this.scrollTop <= 0) {
    closeDetail();
  }
});

applyFilter();
console.log('神秘电子音乐体系 — 已加载 ' + allNodes.length + ' 个节点, ' + Object.keys(GENRES).length + ' 条详细介绍');
</script>
</body>
</html>
