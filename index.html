BPM间反复渲染黑暗冰冷有侵略性的氛围。此后发展中BPM逐渐降低，也辅以如Rolling Bass这样的元素。对合成器、打击乐、律动和低频部分的侧重高于旋律。", "chapter": "Trance", "examples": ["早期——Acceleration - Don Diablo", "现代——These Dogs Trust No One - John Askew"]}, "hard trance": {"name": "Hard Trance", "ups": ["UK Hard House", "Hard Trance"], "downs": ["Hard NRG"], "aka": "", "related": "", "desc": "（见Trance篇章） NRG 该声音早期有两种派别，A:UK Hard House派生，诞生于1995年左右的英国，即Nu-NRG，同时也是Rave场景的一个重要声音。B:欧洲(主要是荷兰德国)的Hard Trance声音出现一种变体，介于(Hard)House与Trance之间，融合了一些Hardcore元素，即Euro NRG。后来两者自身与互相融合发展出了更为强硬更为现代的形态Hard NRG。 如今的NRG声音两者已不做区分，统称为NRG或Filthy Hard House", "chapter": "HDM", "examples": ["Love Leaves No Scar (Hypasonic Remix) - LOL [1:59起始]"]}, "uplifting trance": {"name": "Uplifting Trance", "ups": ["Progressive Trance", "Dream Trance", "Hard Trance"], "downs": ["Orchestral Trance", "Techlifting Trance", "Hardlifting Trance", "Psylifting Trance"], "aka": "Emotional Trance、Euphoric Trance、Anthem Trance、Melodic Trance", "related": "", "desc": "Uplifting Trance是由Progressive Trance和Dream Trance演变而来的一种Trance音乐风格，时至今日已分为情感系（Abora为代表）和能量系（FSOE为代表）两大类。这种风格有别于Progressive Trance，更强调旋律，更频繁地使用“Buildup-Breakdown-Anthem”的曲式结构，同时受Hard Trance的影响，鼓点也更为突出。宽宏大气的沉浸式Breakdown是Uplifting Trance最具魅力的部分，一首Uplifting Trance是否成功很大程度上取决于Breakdown是否出彩。通常，Uplifting Trance的BPM在135-142之间，常为138和140（但也有速度较慢的例子），大量使用Supersaw堆叠，十分强调优美的旋律和琶音。Uplifting Trance一经诞生便成为最成功的Trance子类型之一，在20世纪90年代末到21世纪初大受欢迎，尤其是在英国，许多Uplifting Trance单曲都在单曲榜上霸榜，如Rank 1的《Airwave》和Ferry Corsten的Remix《Barber's Adagio for Strings》。与Uplifting Trance同时崛起的还有知名DJ，他们在世界各地巡演、制作音乐并经营自己的厂牌，如 Ferry Corsten、Tiësto、Armin van Buuren。由于许多知名艺术家都来自荷兰，Uplifting Trance有时也被昵称为“Dutch Trance”，有时Dutch Trance被形容为一种冗长的Uplifting Trance，这里不做区分。这一流派的流行影响了更多主流Trance风格的兴起，如Euro-Trance和Vocal Trance。尽管2001年后，由于在市场和俱乐部中的过度饱和，Uplifting Trance的人气有所下降，但它仍然是最受欢迎的Trance子流派之一，在Sensation和Tomorrowland等大型音乐节上都有演出。互联网的兴起也为这一流派在世界各地赢得了新的粉丝，Armin van Buuren的电台节目（自2001年起每周在荷兰ID&T电台播出）迅速在荷兰以外的国家赢得了约4000万听众，并为其他Trance电台节目也产生了影响。", "chapter": "Trance", "examples": ["Liberate - Daniel Kandi / Robert Nickson (经典)", "Querencia (Giuseppe Ottaviani Extended Rework) - Solarstone / Indecent Noise（现代）"]}, "orchestral trance": {"name": "Orchestral Trance", "ups": ["Uplifting Trance"], "downs": [], "aka": "Symphonic Trance、Orchestral Uplifting Trance、Orchestral Uplifting、Epic Trance", "related": "", "desc": "Orchestral Uplifting是近年来由Andy Blueman等制作人开创的Uplifting Trance子流派，特点在于其中使用的音色几乎都是交响乐中的常见乐器，包括长笛、合唱声部、小提琴、钢琴、号角、管弦乐鼓和其他乐器，仍保留了Uplifting Trance的基础结构，但Breakdown往往更长而且会突出非常Emotional的弦乐。这种音乐主要由Perceptive、Abora、Defcon、Blue Soho等厂牌发行，及其中的不少制作人制作，对其他曲目的“Orchestral Mix”也是这种音乐常见的制作手法之一。Ori Uplift是这一流派的主要DJ之一，他为这一场景制作了很多定期的或者年终的混音作品。", "chapter": "Trance", "examples": ["Ushio - New World"]}, "techlifting trance": {"name": "Techlifting Trance", "ups": ["Tech Trance", "Uplifting Trance", "Acid Trance", "Psytrance"], "downs": [], "aka": "Techlifting", "related": "", "desc": "Techlifting Trance是一种Tech Trance子分支，受到了Uplifting Trance以及部分Acid Trance和Psytrance的影响。顾名思义“Techlifting”一词是由“Tech”和“Uplifting”组成的。Techlifting Trance是Tech Trance的多种表现形式之一（其他形式有与Detroit Techno的融合、有与Balearic Trance的融合），但它是与Uplifting Trance的融合。很多Techlifting Trance最开始被归类为Tech Trance/Uplifting Trance，但随着越来越多的制作人开始制作这种风格的音乐，它的音色和结构变得更易辨认，也更具有Tech Trance+Uplifting Trance的特色。在音乐形式上，这种音乐的结构既有欢快、充满活力的Uplifting Trance元素，也有电气感、过载感十足的Tech Trance元素，还有Acid Trance和Psytrance元素。Techlifting Trance通常继承了Uplifting Trance的结构编排，如史诗管弦乐元素、很长的Breakdown、大片的琶音旋律，具有更复杂的鼓组编排，辅以科技感、工业感十足的Percussion/FX，合成器音色较“硬”，通常带有大量延迟效果，使得Techlifting Trance的音色厚重、侵略感十足。此外，Psytrance、Acid Trance的音效、合成器、编排以及高BPM，也为音乐带来了令人上瘾的节奏感。代表制作人有Harmonic Rush、Angry Man、Adam Ellis、Ellez Ria、John Askew等。代表厂牌有Mental Asylum Records、Diverted Music、Perfecto Fluoro等。", "chapter": "Trance", "examples": ["Jackknife - Sneijder"]}, "hardlifting trance": {"name": "Hardlifting Trance", "ups": ["Hard Trance", "Uplifting Trance"], "downs": [], "aka": "Hardlifting", "related": "", "desc": "Hardlifting Trance是一种更现代、更大众友好的Hard Trance类型，目前只是一个标签，指代2000s中后期受Uplifting Trance影响的Hard Trance，具有更现代化的制作手法和Uplifting般的氛围塑造，一般可理解为“Modern Hard Trance”，现如今的Hard Trance也一般指的是这种风格。Hardlifting Trance的速度保持在138BPM~145BPM，继承了Hard Trance的反拍Bass/反向Bass（作为Sub Bass），在此基础上再加上Uplifting Trance多层次的Mid Bass，Kick也是添加压缩、更“Hard”的Uplifting Trance Kick，一定程度上会削减琶音、主旋律的成分，转而用更失真、更具侵略性的Lead音色写主旋律，以强调混音精致的中低频组分，因此很多Hardlifting Trance作品听起来比Hard Trance、Uplifting Trance更“硬”，过载感更强。目前很多Hardlifting Trance并不是由Hard Trance社区内的制作人制作的，而主要是由Uplifting Trance制作人作为“副业”制作的。", "chapter": "Trance", "examples": ["Sunrise - Alphazone"]}, "psylifting trance": {"name": "Psylifting Trance", "ups": ["Psytrance", "Uplifting Trance"], "downs": [], "aka": "Psylifting", "related": "", "desc": "顾名思义这是一种“Psy”+“Uplifting”的结合体，保留了Uplifting Trance音色、旋律、编排等大部分特征，只是在Uplifting Trance本就复杂的Bass层中增加了一层非常明显的Psy Bassline，并通常为十六分音符排列（四连音）而非三连音，Kick更偏向Psytrance的“Laser Kick”但保留了Uplifting Trance Kick的厚重感、侵略感，所以听上去更像是Uplifting Trance的一个小变种。很多Psylifting制作人的灵感来自于FSOE常客James Dymond，现在Psylifting常作为Uplifting Trance制作人的“副业”制作。", "chapter": "Trance", "examples": ["See The Heaven 1962 - Ferkingge / Emma Wang / U. Baatar"]}, "progressive trance": {"name": "Progressive Trance", "ups": ["Trance", "Progressive House"], "downs": ["EDM Progressive Trance", "Bigroom Trance", "Electro Trance", "Trance 2.0", "Trance 3.0"], "aka": "", "related": "", "desc": "最初是20世纪90年代中期出现的一种新的Trance风格，比经典的德国风格更现代，也不同于当时流行的Goa Trance。Progressive Trance受到英国Progressive House音乐的影响，尤其是1995-96年短暂的Epic House运动（Epic House是旧式Progressive House和Progressive Trance之间的桥梁）。到了1997年，Sasha、John Digweed和许多Epic House制作人都改用了这种风格。Progressive Trance比经典Trance有着更优良的制作手法，旋律更优美，但比Epic House时长更短，也没有那么“Epic”。Progressive Trance通常有着非常长的Buildup和Breakdown，大约为130BPM，处在Progressive House的边缘，现代化的打击乐与鼓组在这种音乐中占有极其重要的地位。在新旧千年交替之际，由于Twilo俱乐部的出现，这种音乐逐渐变得更加深沉、黑暗，旋律性也有所降低，直到James Holden的Twinkle Prog（Progressive House的一个分支）再次改变了这种音乐的面貌。如果说Uplifting Trance是最主流的Trance子分支，那么Progressive Trance就是Trance的第二主流子分支了。普遍认为第一首Progressive Trance为1992年发行的Age of Love - Age of Love (Jam & Spoon Mix)，这种音乐在21世纪初达到鼎盛。", "chapter": "Trance", "examples": ["早期——Emergency - Paul van Dyk", "现代——Make Me Feel - Oliver Smith"]}, "bigroom trance": {"name": "Bigroom Trance", "ups": ["Progressive Trance", "Electro House", "Bigroom"], "downs": [], "aka": "", "related": "", "desc": "EDM浪潮下Progressive Trance融入Electro House/Bigroom的产物，模糊了Trance和EDM House的界限，以牺牲Trance的迷幻性为代价，换取了更强的电气感和舞动感，且具有很强的混响效果，氛围常常被描述为“大气”或“简约”，Kick与Bass也是简易而富有动感的，完美继承了Big Room House的声音优势，整体气质偏向EDM House，更适合主流电音界舞台播放。", "chapter": "Trance", "examples": ["My Harmony - Andrew Rayel"]}, "electro trance": {"name": "Electro Trance", "ups": ["Progressive Trance", "Uplifting Trance", "Electro House", "Complextro"], "downs": [], "aka": "", "related": "", "desc": "Electro Trance是Electro House作用于Progressive Trance的产物，将EDM Electro House/Bigroom House/Complextro的元素融合到Progressive Trance中，使音乐具有了类似EDM的结构、电气味十足的合成器音色与宏大的氛围，因此Electro Trance相对来说更接近EDM Electro House而非Progressive House。主要制作人包括：Aressa、Emata、Nhato、Taishi等。 Complextro Trance是Nhato、Taishi等日本Trance制作人基于Electro Trance提出的子概念，指主要表现形式是Complextro的Electro Trance/Trance 2.0，由于其标签性因而在这里不展示。", "chapter": "Trance", "examples": ["Enigma - Nhato", "Oblivio - Nhato"]}, "trance 2.0": {"name": "Trance 2.0", "ups": ["Progressive Trance", "pop EDM"], "downs": [], "aka": "FTP Trance、Forward-Thinking Progressive", "related": "", "desc": "EDM浪潮下衍生的又一种Trance分支，属Trance寻变中承上启下的产物。至于Forward-Thinking的含义，可理解为希望跟上时代的节奏，因此多数FTP Trance的篇幅较短。大部分Trance 2.0拥有2-3段Drop，并使用更趋近于House的鼓组。一三段Drop编排各有特色，有的使用类似Bigroom的减法编排， 且颗粒感强；有的则像Complextro缤纷复杂。而第二段Drop强调元素堆叠，侧链感强。整体比传统Progressive Trance更具“舞池功能性”。但这样的编排也削弱了Drop与Breakdown部分的渐进性和联系感，使得传统Progressive Trance那种旋律铺排和氛围感严重削弱，这也使得FTP Trance的评价两极分化——有人觉得这是Trance借尸还魂的产物，也有人认为这是Trance的一次进化。", "chapter": "Trance", "examples": ["Open End Resource (In My Next Life Mix) - Andrew Bayer & Alison May"]}, "trance 3.0": {"name": "Trance 3.0", "ups": ["Progressive Trance", "Tech Trance", "Techno"], "downs": [], "aka": "Mainstage Techno、Progressive Techno", "related": "", "desc": "近期出现的一个标签，你可以理解为Trance和Techno的“创新”性融合。近三年来Progressive Trance与Tech Trance/Techno的融合趋势，在Alex Sonata & TheRio、Genix以及Mat Zo的不少作品中都有这种趋势存在。争议性挺大，有观点认为不少Trance 3.0的作品大多丧失了Trance和Techno的主要精神内核，即Techno的舞池性和Trance的精神洗礼性。不过毕竟还处于早期发展阶段，或许还是可以给予一些耐心和期待的。", "chapter": "Trance", "examples": ["Breath Of The Wild - Alex Sonata & TheRio", "Gasoline - Shogun / Neo Tokyo"]}, "j-trance": {"name": "J-Trance", "ups": ["Trance"], "downs": ["J-Trancecore"], "aka": "", "related": "", "desc": "日本人做的音乐往往带有很强的所谓“日系特色”，“J-Trance”这一名词就用于形容此类编曲上有浓浓的日系氛围的Trance音乐。其中部分作品也多用日式和弦和中国传统的五声调式，有许多“古风”和“和风”的影子。J-Trance在很多同人音乐、动漫、东方二创作品和V家相关的作品中广泛存在，主要以Uplifting Trance和Progressive Trance为主。", "chapter": "Trance", "examples": ["Funabashi-JP - Vivit"]}, "cyber trance": {"name": "Cyber Trance", "ups": ["J-Trance", "Uplifting Trance", "Psylifting Trance", "Drum & Bass", "Doujin Music etc."], "downs": [], "aka": "", "related": "", "desc": "Cyber Trance最开始是代指2000s初期在日本出现的一种Trance，这类Trance带有浓厚Euro Trance和Hard Trance风味，并且在日本流行音乐榜单大受欢迎，可以视为A.K.A. J-Euro Trance。后续用来形容大量网络制作流传，但是保留Euro Trance风味的各类J-Trance。代表团体/企划或个人包括EXIT TRANCE、浜崎あゆみ、小室哲哉等。现今常常被用于形容东方Project同人Trance，主要包括带有Euro Trance风味的Hard Trance、Psylifting Trance、J-Trancecore以及Trancy Drum & Bass等。推荐专辑：《Cyber Trance Presents Ayu Trance 2》(2002)", "chapter": "Trance", "examples": ["绯色月下、狂咲の绝-1st Anniversary Remix- - nayuta"]}, "goa trance": {"name": "Goa Trance", "ups": ["Psychedelic Trance", "New Beat", "EBM"], "downs": ["Nitzhonot", "New School Goa"], "aka": "Goa", "related": "", "desc": "发源于1980s末，融入印度Goa岛上的Industrial乃至New Beat元素的Trance。BPM在130-150左右，长度很长，在8-12分钟左右。Goa Trance的初衷是通过催眠、脉动的旋律和节奏，帮助舞者体验一种集体的身体超越状态，类似于古代萨满教的舞蹈仪式。复杂而有变化的节奏型和突出的次低音频。Goa派对在视觉上有一个明确的特点--在服装和挂毯等装饰品上普遍使用荧光颜料，这些装饰品上的图案通常与外星人、印度教、其他宗教（尤其是东方）图像、蘑菇、萨满教和技术等主题有关。DJ台前以宗教物品为主题的神龛也是常见的装饰品。", "chapter": "Trance", "examples": ["Conflict (Live In New York 1997 Mix) - Green Nuns of the Revolution", "Ultimator! - Filteria"]}, "nitzhonot": {"name": "Nitzhonot", "ups": ["Goa Trance"], "downs": ["Old-School Nitzhonot", "Greek Uplifting", "Nitzhogoa"], "aka": "ניצחונות", "related": "", "desc": "Nitzhonot（源于希伯来语“נצחונות”，意为“胜利”）是一种源自Goa Trance的风格，诞生于上世纪90年代末的以色列和希腊。这种风格的特点是结合了特殊的Kick（被称为 “Laser Kick”）、果阿典型的中东方旋律以及145至155 BPM之间的较快节奏。希腊Nitzhonot后来的声音转变成了“Greek Uplifting”，是类似一种Uplifting Trance的音乐，但是失去了很多果阿音乐的影响，而以色列Nitzhonot后来的声音则转变成了Full-On Psytrance。Nitzhonot还有另一种形式，叫做Nitzhogoa。在Greek Uplifting摆脱果阿影响时，Nitzhogoa的特点是回归果阿的影响。到2000年代末，Nitzhogoa重新回到了“迷幻”的一面，回到了果阿音乐的传统，同时保留了Nitzhonot特有的高BPM和“Laser Kicks”。一般来说，这三种形式都属于Nitzhonot，此处不分开详细介绍。代表制作人有Eyal Barkan，Cyan和Cyber Planet，其中最著名的艺术家是Eyal Barkan，他于1998年发行的《Good Morning Israel》成为以色列最畅销的Trance专辑。", "chapter": "Trance", "examples": ["Good Morning Israel - Eyal Barkan"]}, "new school goa": {"name": "New School Goa", "ups": ["Goa Trance"], "downs": [], "aka": "Goa Revival", "related": "", "desc": "与“老派Goa”相比，“新派”的复杂程度更高，Kick和合成器的层次也更细腻，因此很容易辨认。有时“新派”曲目也会融入一些Full-On元素，如Rolling Bassline。此外，与Psytrance及其衍生物不同，新派Goa并不受限于“统一听感氛围”，因此可以在新派Goa作品中找到多种氛围：欢乐的、黑暗的、高昂的、渐进的等。新派Goa是一种远离Psytrance的“Goa复兴”形式，但加入了新的元素，从2003年开始逐渐有了新的制作人参与制作，宿主软件的翻新是这种流派产生新声音的关键原因。这一流派主要由Suntrip Records唱片公司发行。", "chapter": "Trance", "examples": ["In The Mouth Of Madness - Morphic Resonance"]}, "dark psytrance": {"name": "Dark Psytrance", "ups": ["Psy Trance"], "downs": ["Forest Psytrance", "Psycore", "Hi-Tech"], "aka": "Dark Psy Trance、Dark-Psy、Darkpsy、Killer Psytrance、Horrortrance", "related": "", "desc": "Dark Psytrance是Psytrance中一种更黑暗、更快速、更受工业音乐影响的子流派，以隐晦、深刻和末世感为特点，辅以黑夜/幽灵/邪恶等可怖的采样元素，使人进入关于死亡、夜晚和超神的冥想世界。Darkpsy更加注重氛围，有着更快的节奏（BPM常在150左右），有时甚至结合了Glitch元素，一般不使用人声，但采样很常见，采样通常取自恐怖或科幻电影。Darkpsy有几种并列的风格和子类型：其中一种风格被称为Cyberdelic，意思是“电子+迷幻”，使用了大量人工智能FX、激光和其他外星音效（此处不详细介绍）；Forest Psy在许多方面与Dark Psy非常相似，但“机械”相关的主题更少，而更侧重于环境噪音、自然氛围以及在黑暗迷幻森林中听到的诡异声音，速度也比Dark Psy稍快，编排注重极简，几乎没有Breakdown；Twilight/Night Full-On被视为Dark Psy和Full-On之间的桥梁；Hi-Tech/Psycore的节奏更快，是Dark Psy的一个分支。许多Dark Psy制作人都来自俄罗斯，因此有人也把这一流派称为“Russian Style”。德国制作人Xenomorph被认为是Dark Psytrance的先驱。", "chapter": "Trance", "examples": ["Obsidian - Evocatone"]}, "forest psytrance": {"name": "Forest Psytrance", "ups": ["Dark Psytrance"], "downs": [], "aka": "Forest Psy、Forest Psychedelic、Scandinavian Dark Psy", "related": "", "desc": "Forest Psy与Dark Psy有许多相似之处，但少了很多“机器人”或“恐怖”的主题，而是更注重环境噪音、自然氛围以及在黑暗迷幻森林中听到的诡异声音，几乎没有Breakdown。BPM也比Darkpsy稍快，在150-160之间，也可能更高。Battle of the Future Buddhas和Ka-Sol是Forest Psy的两位最重要的艺术家，他们受到DJ Jonas“原始森林派对”的声音的影响，创造了Forest Psy这一名称。这种风格在2000年代中后期得到巩固并开始流行，并催生了各种标签、艺术家和合辑，主要流行中心是斯堪的纳维亚国家。由于发行量和涉及的艺术家众多，Forest Psy的作品与作品时长甚至比大多数其他Psy流派都要多，在不少网站和社区中，Forest Psy都是最受欢迎的Psytrance子流派之一。", "chapter": "Trance", "examples": ["Random - Alderaan"]}, "psycore": {"name": "Psycore", "ups": ["Dark Psytrance", "Speedcore"], "downs": ["Dark Psycore"], "aka": "", "related": "", "desc": "Psycore是Dark Psytrance的一种形式，兴起于2010年代早期。Psycore与Hi-Tech Psytrance 有很强的关联性，具有和Hi-Tech Psytrance几乎相同的高BPM和音效设计，不过Hi-Tech的声音更加有活力，而Psycore则更黑暗、更具实验性。Psycore的最初声音可以在2000年代初至2010年代的Hi-Tech制作人（如Psykovsky和Zero-Blade）的作品中找到，但这一流派直到几年后才通过Luuli、Bizzare frequenCy等艺术家的作品真正形成。Psycore一般还可以通过其动态极少、催眠的声音特点与Hi-Tech区分，Hi-Tech的结构更为复杂，而Psycore通常非常单调。此外，Psycore的打击乐、鼓组比传统的Darkpsy更轻，只使用简单的“正弦”Kick，通常完全不使用Snare，这就为音效设计留出了更多空间，音效复杂且极富氛围，以带有大量混响的Pad和多层次音效设计为特色。由于强调实验性，Psycore从Dark Ambient、Glitch和其他极端的Psytrance子流派，甚至是Flashcore和Speedcore等Hardcore[EDM]相关流派中汲取灵感。Psycore的BPM范围也非常大，超过200BPM的作品非常常见，一些较新的作品甚至达到400BPM。这种音乐流派在美洲，尤其是拉丁美洲最为流行，但也有一个相当全球化的社区，来自欧洲和亚洲的艺术家也相当常见。它还与Forest Psytrance有很多重叠之处。尽管其社区规模庞大，但Psycore的影响力却不如其他相关形式的Psytrance，或许是因为Psycore的名称通常被用来描述包括Hi-Tech在内的各种 Psytrance和其他硬核风格，因而相对默默无闻。", "chapter": "Trance", "examples": ["Alien Spa - Fele"]}, "hi-tech": {"name": "Hi-Tech", "ups": ["Dark Psytrance", "Full-on Psy", "Psycore"], "downs": ["Hi-Tech Full-on"], "aka": "Hi-Tech Psy-Trance、Hi-Tech Psytrance、Hitek Psy", "related": "", "desc": "Hi-Tech是一种Psytrance风格，深受Dark Psytrance、Psycore和Full-On的影响，特点是将合成器的美学推向极致。就速度而言，Hi-Tech从170BPM到230BPM不等，使其与Psycore一起成为速度最快的Psy Trance风格。与Psycore不同的是，Hi-Tech更多的继承了Dark Psy的故障声音设计，合成器声音给人带来一种科幻、未来、外星氛围的感觉，但通常缺乏Darkpsy的“黑暗”氛围，而且通常是所有Psytrance中最不容易预测、最不稳定的一种。“Hi-Tech”这个词是由来自俄罗斯的Osom（Psykovsky & Kindzadza）发明的，用来描述他们的音乐，并在全球范围内发展成为一场比较大的运动。与Psycore肮脏粗糙的声音相比，Hi-Tech更注重干净的动态和制作细节，主题不一定是黑暗的，可以表达多种情绪。", "chapter": "Trance", "examples": ["Something Else - K-Freq"]}, "full-on": {"name": "Full-On", "ups": ["Psy Trance"], "downs": ["Twilight Full-On", "J-Hi-Tech"], "aka": "Full-On Psytrance、Fullon、Melodic Psytrance、Morning Trance、Morning Full-On、Club Psytrance、Isra-Trance、Israel Full-On", "related": "", "desc": "Full-On是一种Psytrance风格，本世纪初首先起源于以色列，主要影响来自于更适合电台播放的音乐类型，如Uplifting Trance和Electro House、未来主义旋律、电吉他演奏以及人声的使用。“Full On”一词的来源众说纷纭，有人认为源于以色列厂牌HOM-mega Productions于1998年发行的七张合辑系列中的第一张专辑，名为《Full On》；另有一些资料称来自Fullmoon音乐节的名称；也有人认为源于一个被广泛用于描述特别高能量音乐的短语/口语（“这曲子真是Full-On！”，可直译为“马力全开”或“过载感十足”）。Full-On现在已经成为Psytrance中最流行的一种形式，也许由于这种音乐有着丰富的低频、平易近人的旋律以及一些商业和流行元素，所以这种风格对大众市场最有吸引力。Full-On最容易辨认的元素是Rolling Bassline，即在4/4鼓点的每次敲击之间插入两三个Bass音符；音符的长度也非常短（每小节常见16个，最多32个）；以及更多的旋律、更加振奋人心的性质。Full-On的节奏更快、更激烈，约为145-150BPM。2002-2009年期间被认为是Full-on的“黄金时期”，它凭一己之力，在Progressive Psy席卷全球Psy界之前，使Psytrance偏离了Minimal Psytrance的本质。", "chapter": "Trance", "examples": ["Arambolian Nights - Electric Universe / Hujaboy", "Zen Ninja - Ajja"]}, "twilight full-on": {"name": "Twilight Full-On", "ups": ["Full-On", "Dark Full-On", "Dark Psytrance"], "downs": [], "aka": "Twilight、Twilight Psytrance、Night Full-On、South African Twilight、South African Full-On", "related": "Dark Full-On", "desc": "Twilight是形容高能量Psytrance音乐的一个名称，将过载感十足的Full-On形式与Dark Psy的氛围融合在一起，是Full-On的黑暗面，由于在Festival上常于夜间播放故得名“Twilight Full-on (Night Full-on)”。Twilight被认为是一种Dark Full-On子类型，BPM在145~150之间，特点是Bassline更快、更具侵略性，合成器声音更为失真，音效的丰富程度受到Darkpsy的启发，旋律的性质继承自Full-On，并带有黑暗的氛围。到2000年代中期，Twilight已成为一个认可度较高的流派/术语。Twilight还有另一种形式，叫做“South African Twilight”，更接近于Full-On。这种变体实际上是Twilight的最初形式，与其他地区的Twilight形式有所不同。一些南澳大利亚的唱片公司和艺术家都在制作这种风格，包括一些经常出现在南澳大利亚的合辑以及一些境外艺术家也会有所涉猎。本词条不考虑这些不同场景和国家之间的差异，将所有这些Twilight Psytrance统称为Twilight Psytrance。", "chapter": "Trance", "examples": ["Got A Feeling - Axiuz"]}, "j-hi-tech": {"name": "J-Hi-Tech", "ups": ["Full On", "Complextro", "J-core", "Hi-Tech"], "downs": [], "aka": "Complextro Full-On、Hi-Tech Full-On", "related": "", "desc": "正常提到J-Hi-Tech一般就是指Hi-Tech Full-On，也可以叫它Complextro Full-On，本质是日本改造的Night Full-On，速度偏慢，唯一接近正统Hi-Tech的一点可能就是有为数不多的Dark Psy要素了。也有指日本本土化的Hi-Tech，不过也有类似Night Full-On极具泵感的处理段。", "chapter": "Trance", "examples": ["Bad Actors - Anplode", "I Can Fly In The Universe - かめりあ [偏正统Hi-Tech例子]"]}, "suomisaundi": {"name": "Suomisaundi", "ups": ["Psy Trance", "Goa Trance", "Acid Trance"], "downs": [], "aka": "Finnish Psytrance、Psytronica、Spugedelic Trance", "related": "", "desc": "90年代中期，Psy Trance传播到芬兰后很快结合了本地的特色（Suomi这个单词在芬兰语的意思就是“芬兰”）。2000年，Tim Thick推出了“Thixx'n'Dixx”，这是一个以易于访问的格式托管大量Suomisaundi目录的网站（现已关闭，仅能在Internet Archive中查到一点点资料），有力地推动了这一流派在全世界的流行。该流派一般不像当前大多数Psytrance那样公式化，自由度较高。最显著的特点是，除了基本的Trance架构之外，它没有固定的规则。Suomisaundi的曲目旋律会很特别，深受早期Goa、Tribal House和Acid Trance的影响，同时也有Funk元素，让人联想到早期电子游戏的声音和氛围。一些制作人如Luomuhappo和Tekniset，在他们的音乐中融入了芬兰民谣元素，使他们的音乐更具有芬兰特色。芬兰的自然环境在芬兰音乐的发展方向上也发挥了重要作用，芬兰的森林里经常举行Suomisaundi派对，而相关歌曲和专辑也经常可以体现这一方面。歌曲中经常会出现失真的采样、复杂的效果和声效、细碎的Fill和Breaks，以及芬兰语或英语的人声采样，偶尔标题会带有自我讽刺的意味（这与向来“严肃”“传统”的Psy Trance区别开来）。有些人甚至将Suomisaundi描述为Trance音乐界的“无政府主义者”，因为与欧洲主流Psytrance音乐相比，他们的歌曲通常非常另类且前卫。自2000年以来，全球对Suomisaundi的兴趣大增，许多芬兰团体在国际上巡回演出，全球乐迷日益增多。在芬兰之外，俄罗斯、乌克兰、日本和澳大利亚的Suomisaundi受众最多。推荐专辑《Petoman's Peflett》- Texas Faggott。", "chapter": "Trance", "examples": ["Jäätelöautomaatti - Texas Faggott"]}, "psy tech": {"name": "Psy Tech", "ups": ["Psy Trance", "Techno", "Tech Trance"], "downs": [], "aka": "Psytech", "related": "", "desc": "Psy Tech诞生于千禧年末的德国，是一场更加简约的Psytrance运动，放弃了Trance的鼓组，取而代之的是更加厚重的Kick和更加机械的Techno甚至EBM元素。在最初的场景中，知名艺术家有The Delta和X-Dream组合的成员。这一新方向带来了一个全新的场景，产生了一系列专辑、合集和艺术家。但在同时发展的众多新兴Psytrance风格中，这只是昙花一现。到了2000年代中后期，新一波的制作人和唱片公司又将这种声音带了回来，并从主流Tech Trance中获得了更多灵感。这使得Psy Tech的声音更加多样化，包括了更多其自身的“Techno”和“Tech Trance”元素，以及该流派最初时的一些更黑暗、更原始的声音。这种流派与Techno篇章的新标签“Psy Techno”不同，Psy Tech仍然以Psytrance甚至是Tech Trance为基底，而Psy Techno只是一种听起来更“高科技”的Techno。", "chapter": "Trance", "examples": ["Proper Language (Opsy Remix) - Alic"]}, "progressive psytrance": {"name": "Progressive Psytrance", "ups": ["Psy Trance", "Progressive Trance"], "downs": ["Zenonesque"], "aka": "Minimal Psytrance、Progpsy、Psyprog、Psygressive", "related": "", "desc": "Progressive Psytrance是一种Psytrance风格，诞生于2000年代早期，由Psytrance与Progressive House+Trance融合而成。这种形式的Minimalist Trance可被视为是一种Progressive Trance，但与Progressive Trance相比有着更迷幻、更令人出神，有着来自Psytrance的更复杂的声音。与2000年代新一代Psytrance（BPM大多为140+）相比，它的特点是受到House音乐的影响，节奏通常较重也较慢，在130到140BPM之间，并具有更渐进、更大气的美感，由于节奏轻快，Psyprog常被形容为“欢快”的音乐。Psyprog与斯堪的纳维亚（尤其是瑞典）的制作人们有着地域性的联系，他们在Psyprog的萌芽期就推动了这种音乐的发展。在许多方面，Psyprog是各种音乐风格的累积与融合，但有两大趋势：一种接近Full-On（占多数），另一种则采用更简约的风格（因此经常被称为Minimal Psytrance），但很多人都认为没有必要把这种趋势分类成子流派。毫无疑问，Psyprog是与Full-On并列的最流行的Psy Trance风格之一。制作人包括Atmos、Cosma、FREq、Neelix、Ovnimoon、Son Kite、Tegma、Ticon、Vibrasphere。", "chapter": "Trance", "examples": ["Love is the Key - Ovnimoon", "Life Is Enough - E-Clip"]}, "zenonesque": {"name": "Zenonesque", "ups": ["Progressive Psytrance", "Psy Tech"], "downs": [], "aka": "Zenon、Zenon Sound", "related": "", "desc": "Zenonesque是2000年代中期兴起的一种Progressive Psytrance的子分支，起源于澳大利亚，主要特点是对Progpsy的实验性和Leftfield处理，偶尔会有“Funky”或“Jazzy”等元素的加持。Zenonesque最初的声音出现在澳大利亚的厂牌Zenon Records负责人Sensient的作品中，他的首张专辑《Blue Neevus》启发了当时许多新晋制作人。这一流派的名称是由音乐发行网站Ektoplazm的负责人创造的，很快就被认可这一曲风的制作人们所使用。这种音乐的特点是既有黑暗的元素，也有明亮的元素，以及更为“有机”的声音设计与更为“合成”的声音设计相结合，并营造深沉的迷幻氛围。不过，与Psyprog呈现出的更清晰、更干净的美感不同，Zenonesque的音色更硬、更机械，更接近于Psy Tech，甚至可以将Psy Tech的Kick和Bass融合到Zenonesque的作品中，速度比典型的Psytrance要低，BPM在130左右。Zenonesque在发展过程中声音产生了一些变化，有些小分支可能用“Dark Progpsy”描述较为贴切，但这一词汇并不能描述大多数的Zenonesque作品，此处也不将Zenonesque的其他变体细致分类。", "chapter": "Trance", "examples": ["Lovely Bones - Sensient"]}, "mainstream drum & bass": {"name": "Mainstream Drum & Bass", "ups": ["Drum & Bass", "Liquid Funk", "Jump Up"], "downs": ["Trancestep"], "aka": "Dancefloor Drum & Bass (更常见叫法)、Dancefloor DnB、Dancefloor D&B", "related": "", "desc": "2010年左右，一类不那么注重Bass和氛围塑造而是在Lead旋律和Vocal人声上下工夫的DnB出现了。这类DnB被坊间称为“Melodic Drum & Bass”。相比起其它的碎拍，听感更为简单，也更容易被普通听众所接受，被看做是Mainstream DnB的前身。 10s见证了许多电子风格听感的巨变，DnB也不例外。这类音乐也是大众对DnB的第一印象，在社交平台上也很火爆，你时常可以在游戏剪辑等各种领域的视频中见到它的身影（比如红眼特效），也被各大游戏厂商用作背景音乐，俨然已经成了燃曲的代名词。与DnB最初的样子相比较，我们很难说这两者是同一个东西。即便这样，它们的听感变化也并非不可考，是循序渐进的。不能说EDM化DnB是错误的，相反，这是一种趋势，是制作人自发地给碎拍注入新活力的行为。", "chapter": "Breakbeat", "examples": ["Beautiful Lies – B-Complex (Melodic)", "Vagrant - Feint / Veela (Dancefloor)", "Ancient tech- Mameyudoufu (Dancefloor)"]}, "breakbeat": {"name": "Breakbeat", "ups": ["Hip-Hop", "Acid House", "Techno"], "downs": ["Jungle", "Drum & Bass", "UK Garage", "Grime", "Dubstep"], "aka": "Breakbeats", "related": "Breaks", "desc": "Breakbeat是从Techno和House的4/4节拍中分离出来的一种流派，雏形出现于20世纪70年代末至80年代初，得益于英国Rave场景中从旧唱片中采样空鼓（如Amen Break、Funky Drummer）并用在自己的歌曲中的手法。最早是嘻哈制作人使用这一手法来制作自己的Disco Rap作品，到了20世纪80年代末期，随着非嘻哈音乐人开始尝试使用Breaks采样，Breakbeat逐渐成为了地下电子舞曲的一个重要的子流派。20世纪90年代初，随着Breakbeat Hardcore的发展，Breakbeats在电子舞曲中的使用越发增多，并成为一种重要的节奏类型，最终推动了早期Jungle、后来的Drum & Bass（两者通常被视为从“Breakbeat”这一母体流派中分离出来的）和许多其他风格的发展。Breakbeat作品一般保持在110~150BPM的节奏范围内，介于较慢的Downtempo、Hip-Hop与较快的Drum & Bass之间。“Breaks”和“Breakbeat”可认为同义也可认为不同义，一般来说“Breaks”指的是更广泛、更现代、甚至更“EDM”的碎拍音乐，这里不对两者进行区分。", "chapter": "Breakbeat", "examples": ["Freestyler - Bomfunk MC's【https://www.youtube.com/watch?v=ymNFyxvIdaM】", "Right Here, Right Now - Fatboy Slim"]}, "early breakbeat": {"name": "Early Breakbeat", "ups": ["Breakbeat", "Acid House", "Hip-Hop"], "downs": ["Breakbeat Hardcore", "Jungle"], "aka": "", "related": "", "desc": "纽约市的嘻哈音乐家们从经典Funk曲目中发掘并采样Breaks，寻找可以使用在自己作品中的合适Breaks采样。布鲁克林的Frankie Bones从多张唱片中提取Breaks采样，将其加速，并与粗糙的Acid音色和其他采样相结合，制作了他的Bonesbreak系列，这是早期Breakbeat的一个经典范例。这些音乐与东海岸嘻哈（East Coast Hip-Hop）一起出口到了英国。当时在英国，几个因素促成了Breakbeat的形成与发展：①嘻哈音乐已经与House音乐融合在一起，形成了一个“使用Breaks但听起来并不碎拍”的流派Hip House，一些其他House音乐也在大量使用Breakbeats；②英国嘻哈的加速版“Britcore”的诞生，带有硬核音乐的影响；③Ragga Hip-Hop将Breaks与Ragga toasts和舞池文化相结合；④英国的Bleep Techno音乐中也出现了一些早期的Breakbeat影响。在这种环境下，随着Acid House的衰落，最早的Breakbeat唱片开始与House相结合。正是在这种声音中，英国的Early Breakbeat在当地扎下了根，并为Breakbeat Hardcore和Jungle的出现铺平了道路。", "chapter": "Breakbeat", "examples": ["£10 (to get in) The Rave - Shut up and Dance【https://www.youtube.com/watch?v=6IDsZxgMtPM】"]}, "rave breaks": {"name": "Rave Breaks", "ups": ["Ravecore", "Breakbeat Hardcore", "Acid House", "Techno", "Breakbeat"], "downs": [], "aka": "", "related": "", "desc": "诞生于1990s前中期的Breakbeat风格，出人意料地起源于Breakcore的分支Ravecore。当时正值Rave风潮衰退期，很多制作人在制作Old School Ravecore音乐时脱离了原先的场景，转而将视线投向更柔和的Breakbeat/Breaks。Rave Breaks保留了Rave特性，易于跳舞，同时博采Acid House/Breaks、Techno、Hip Hop之众长，弱化了Ravecore的大失真混乱节拍，转而制作类似Breakbeat Hardcore类似的四四拍细密碎拍，对大众更友好。随着Rave风潮的死寂，Rave Breaks这个小场景随之迅速消失。", "chapter": "Breakbeat", "examples": ["Pulse - DJ Voodoo【https://www.youtube.com/watch?v=cSmKIcnF_yU】"]}, "west coast breaks": {"name": "West Coast Breaks", "ups": ["Breakbeat", "Progressive House", "Trance", "Techno"], "downs": ["Nu Skool Breaks", "Progressive Breaks"], "aka": "Funky Desert Breaks、West Coast Breakbeat", "related": "", "desc": "West Coast Breaks是20世纪90年代初期至中期出现的一种Breakbeat形式，由加利福尼亚制作人首创。West Coast Breaks将主要与嘻哈音乐相关的Breakbeat，以及“Rave”音乐、更具舞蹈性的Breakbeat衍生物（如Early Breakbeat、Miami Bass）与20世纪90年代的各种电子舞曲流派相结合。当时兴起的Trance和Techno的音乐潮流中“机械”、“未来主义”的声音和制作技术尤其具有影响力，Psytrance、Acid Trance、Acid Techno等音乐元素也偶有出现。虽然West Coast Breaks在一定程度上受到了早期英国Breakbeat Hardcore热潮的启发，但它最终更注重简洁、重复的制作，这与后来的Breakbeat/Drum & Bass潮流有部分相似之处，而不是Breakbeat Hardcore及其衍生品（如Jungle）那种原始而自由的声音。这一流派在兴起时与Trip Hop也有关联，Trip Hop Acid Phunk混音系列就是例证，但在声音上也有区别。另一种美国风格Florida Breaks与West Coast Breaks在同一时期兴起，两者关系密切，但Florida Breaks包含更多Electro元素，更依赖于原始采样，而West Coast Breaks则更像Progressive House，更迷幻，更依赖合成器。加州艺术家Treavor Walton、DJ John Kelley、Simply Jeff、Überzone是这种音乐早期成功不可或缺的人物，这种音乐很快也传到了大西洋彼岸，英国的DJ也开始推广这种音乐。Nu Skool Breaks音乐流派的诞生也受到了West Coast Breaks音乐的极大启发。Big Beat是一种更流行、更狂野的Breakbeat变体，也在同一时期出现，并将英国和美国的制作人都卷入其中。West Coast Breaks场景在20世纪90年代末逐渐消亡，但它对Nu Skool Breaks、Progressive Breaks等流派，以及像Psybreaks这样的小风格仍有影响力。", "chapter": "Breakbeat", "examples": ["Vapor Trail - The Crystal Method【https://www.youtube.com/watch?v=NBh16Nttu7U】"]}, "florida breaks": {"name": "Florida Breaks", "ups": ["Breakbeat", "Miami Bass", "Electro"], "downs": ["Nu Skool Breaks"], "aka": "Orlando Breaks、Tampa Breaks、The Orlando Sound", "related": "", "desc": "Florida Breaks是20世纪90年代中期在佛罗里达州发展起来的一种Breakbeat风格。Florida Breaks融合了嘻哈音乐的衍生元素，如Miami Bass、Electro，同时也受到了20世纪90年代电子舞曲流派（如House、Trance）的影响，以及其他与Breakbeat相关流派（如Breakbeat Hardcore）的影响，甚至还受到了当时正在发展的Drum & Bass的影响。该流派主要起源于嘻哈DJ，他们尝试使用更快速、更多切分的Breakbeats和突出的、驱动力更强的Bass，后来该流派在受到Progressive House、Trance、Acid House等流派启发的制作人中大受欢迎，这些元素的融合形成了后来的“The Orlando Sound”。尽管受到EDM音乐的影响，但与英国的Breakbeat音乐以及90年代中期的West Coast Breaks音乐相比，Florida Breaks仍然更接近于其嘻哈音乐的根源。该流派有时会从流行电影和其他主流音乐中提取爵士/Funk采样，Electro的继承元素、切分节奏和突出的Bass也是Florida Breaks的常见特征。Florida Breaks诞生以来，影响迅速蔓延到美国其他地区甚至英国。佛罗里达DJ Icey、Chris Fortier、DJ Stylus等人引领并普及了这一音乐流派，其中Icey对这一音乐流派的发展尤为重要。虽然该流派的鼎盛时期并不长，但它对后来的EDM潮流（如英国的Nu Skool Breaks）以及20世纪90年代中后期在大西洋两岸流行的Big Beat热潮都产生了巨大影响。", "chapter": "Breakbeat", "examples": ["FLooRi.D.A. (Dynamix II Remix) - Rabbit in the Moon【https://www.youtube.com/watch?v=xMlIoPf9iRw】"]}, "acid breaks": {"name": "Acid Breaks", "ups": ["Breakbeat"], "downs": ["Chemical Breaks", "Acid House", "Acid Techno", "Breakbeat Hardcore"], "aka": "Acid Breakbeat", "related": "", "desc": "Acid Breaks是一种加入了Acid音色（一般使用303），结合非“4 to the floor”节奏的Breakbeat。在Breakbeat上，既可以是采样的Breaks/Breakbeats节拍，也可以是用鼓机编排出的节奏，如Electro式节拍或Freestyle式节拍。这种音乐早在“Chemical Breaks”之前就已存在，但在早期的电子音乐场景中并不常见也没有流行。不过确实早在Big Beat出现之前，这些音乐就已大量存在，并在Acid House、Acid Techno、Bleep Techno、Breakbeat Hardcore等场景发挥了关键作用。Acid Breaks起源于20世纪80年代末的Acid House和Breakbeat场景，由于Josh Wink的《Higher State of Consciousness》等曲目以及The Crystal Method等其他艺术家的成功，Acid Breaks在随后几年中崭露头角，在West Coast Breaks场景中扮演了重要角色。在这一时期，Acid Breaks是Big Beat的前身，并且在当时具有极大的影响力。与其他Acid流派一样，该流派在20世纪90年代后逐渐衰落，但仍是地下电子舞曲领域的中流砥柱，Guau等DJ在随后的几十年中仍在不断推出新曲目。", "chapter": "Breakbeat", "examples": ["Paroles - Mike Ink【https://www.youtube.com/watch?v=fJhRo5K4iKg】", "Embryo - Rebirth"]}, "chemical breaks": {"name": "Chemical Breaks", "ups": ["Acid Breaks"], "downs": ["Big Beat"], "aka": "Electro Breaks1614|Chemical Breaks是Acid Breaks领域的一个专有名词，代表了第二波Acid Breaks，并掀起了第一波Big Beat的浪潮。Chemical Breaks融合了Acid House和Acid Techno中使用的经典303酸性音色，但加入了更重型、更狂放的碎拍。这种声音来自英国（Chemical Brothers、Fatboy Slim）和美国（Josh Wink、Crystal Method、Uberzone），并获得了世界范围内的认可与大量制作人的推崇。这种音乐通常采用高能量的Buildup、Breakdown和较多的失真效果，创造出适合舞池的声音。Chemical Breaks、Electro Breaks这些词偶尔也被用作形容Big Beat本身或West Coast Breaks的替代术语，但此处将其分开介绍。", "related": "", "desc": "", "chapter": "Breakbeat", "examples": ["Drop The Break - Cirrus【https://www.youtube.com/watch?v=lSh2fYhIQz4】"]}, "big beat": {"name": "Big Beat", "ups": ["Breakbeat", "Acid House", "Techno", "Rock", "Hip-Hop"], "downs": ["Blog House", "Electro House", "Progressive Breaks", "Fidget House"], "aka": "", "related": "Chemical Breaks", "desc": "Big Beat是Breakbeat的一个子流派，20世纪90年代中后期英国音乐媒体使用这一词语来形容The Chemical Brothers、Fatboy Slim、The Crystal Method、Propellerheads和The Prodigy的音乐，20世纪90年代后期在英国尤为流行。特点是编排过的Breakbeats和突出的Basslines，速度更慢但节拍更重，鼓点强劲到接近摇滚，同时又充满了Acid House和Techno的科技感音色。此外，各路制作人在曲子中会加入丰富的采样，扩展了音乐的内涵和煽动力。虽然Big Beat与Drum & Bass、Techno等相关流派有许多相同之处，但它的节奏相对适中（通常在120~140BPM之间），整体的歌曲结构与流行音乐并无太大区别。最终，在世纪之交左右，大多数艺术家都放弃了这种过于“同质化”的音乐风格，转而参与到Nu Skool Breaks的制作中。", "chapter": "Breakbeat", "examples": ["Smack My Bitch Up - The Prodigy【https://www.youtube.com/watch?v=S4GojQTu7iI】", "Setting Sun - The Chemical Brothers", "Firestarter - The Prodigy"]}, "progressive big beat": {"name": "Progressive Big Beat", "ups": ["Big Beat", "Progressive House", "Progressive Breaks"], "downs": [], "aka": "", "related": "", "desc": "有一种传统观点认为Big Beat是由Progressive Big Beat场景分裂出来而产生的，此处暂将这一词条放入Big Beat的子分支中。Progressive Big Beat场景的形成在很大程度上要归功于The Chemical Brothers的早期曲目和混音作品，这些作品最早可以追溯到1992年，当时他们最初以The Dust Brothers的名字发布作品。制作人Tom Rowlands和Ed Simons对Public Enemy、New Order和Cabaret Voltaire的作品非常钟情，并渴望将这些音乐融合在他们的作品中。92年，当时正流行对“舞曲的界限”相关话题的探讨，这一环境为他们提供了更多开辟新路的机会。90年代早期的Progressive House就由此诞生，Progressive House不受限于流派，吸收了当时几乎所有电子音乐流派的声音并混合在一起。Progressive Big Beat即加入更“前卫”元素的Big Beat，包括与Progressive Breaks场景的联系，并创造出相当广泛的可能性。Andrew Weatherall、Fluke、Underworld、Leftfield等艺术家接受了早期的前卫概念，证明了电子音乐可以在曲目、专辑甚至发展过程中融入多种音乐标签。", "chapter": "Breakbeat", "examples": ["Phat Planet - Leftfield【https://www.youtube.com/watch?v=LDkmaNfBOtU】"]}, "big beat house": {"name": "Big Beat House", "ups": ["Big Beat", "House"], "downs": [], "aka": "", "related": "", "desc": "随着Big Beat开始成为一种影响广泛的音乐流派，它的许多特点也开始融入到4 on the floor的House节拍中。重复的嘻哈采样、Acid旋律和Breakbeat式Breakdown等特点，帮助两种流派融合在了一起，形成了一种极富活力的音乐类型。这种交叉主要发生在欧洲，有时是对各种曲目的Big Beat House Remix。很多时候这种音乐被认为是Hip House的新形式。该流派创建之初还没有特定的名称或场景，但Big Beat+Funky或Hard House的融合形式已经创造出了许多令人无法忽视的人气作品。", "chapter": "Breakbeat", "examples": ["Where's Your Head At - Basement Jaxx【https://www.youtube.com/watch?v=5rAOyh7YmEc】"]}, "hard hop": {"name": "Hard Hop", "ups": ["Big Beat"], "downs": ["Industrial Breaks"], "aka": "", "related": "", "desc": "Omar Santana帮助创造了“Hard Hop”一词，这一词汇包含了The Prodigy和Junkie XL等乐队制作的最“强劲”的Big Beat风格，并将其进一步推向Lunatic Calm和Pitchshifter等乐队尝试的Industrial Breaks风格（这里不做介绍），是一种将Breakbeat重新带回Hardcore领域的音乐。《Tricked Out》等专辑和DJ Hardware发行的一系列节奏感更强的专辑，确定了这种音乐的特征：更快的Breaks、更“硬”的Acid和更重的节拍。虽然这种风格与最初的“Chemical Breaks”风格相去不远，即把Acid与简单的Big Beats结构混合在一起，但这种音乐声音更“硬”、速度更快。这个词一般专门用来形容Omar Santana的音乐，但现在也逐渐用来形容所有更“重”的Big Beat音乐。 Hard Hop有时也指一类受HDM影响的Hardcore Hip Hop，体现在节拍音色上，这里不多赘述。", "chapter": "Breakbeat", "examples": ["Come in Hard - Hardknox【https://www.youtube.com/watch?v=ZY1Tob-Dvlk】"]}, "leftfield breaks": {"name": "Leftfield Breaks", "ups": ["Breakbeat", "Trip Hop", "Downtempo"], "downs": [], "aka": "", "related": "", "desc": "Leftfield Breaks是对90年代末Big Beat时代主流之外的Breaks和Breakbeats的俗称。这些音乐并非想要被大众接受、变成当红热门曲目，而是深奥、奇特并富有艺术性的。这种音乐包含了部分Downtempo、器乐嘻哈、Trip Hop等领域，但听起来仍是一种中/高速的Breakbeat。Leftfield Breaks最早由Depth Charge、Meat Beat Manifesto、Andrew Weatherall等艺术家制作。同样，由于大多数艺术家并不拘泥于一种风格或节奏类型，一些Leftfield Breaks作品也同样可以被标记为Trip-Hop/Downtempo或其他Breakbeat场景。甚至有相当一部分一开始就很“怪异”的Big Beat，并不刻意追求大众、流行，而是专注于各种奇怪的采样和风格融合，于是这些作品也被归为了Leftfield Breaks而不是Big Beat。", "chapter": "Breakbeat", "examples": ["From Rusholme with Love - Mint Royale【https://www.youtube.com/watch?v=zE4xv1V3MCc】"]}, "funky breaks": {"name": "Funky Breaks", "ups": ["Breakbeat", "Big Beat", "Hip-Hop", "Funk", "Soul"], "downs": ["Nu-Funk"], "aka": "", "related": "", "desc": "Funky Breaks起源于Big Beat场景，在2000年代初受到重视并逐渐流行开来。Fatboy Slim、Freestylers、Wiseguys和一些美国的Breakbeat艺术家是这一风格的开创者，但现在这一流派也不断在涌现出New School的艺术家。Funky Breaks通常融入了嘻哈、灵魂乐和放克的元素，而较少使用Big Beat、Nu Skool Breaks场景中较为现代的元素。Skint厂牌也许是这一流派最初的推动者，Goodgroove Records、Finger Lickin' Records、Bomb Strikes、Jalapeno Records等厂牌则在接下来的十年中紧随其后，继承了这一潮流。后来，Nu-Funk和Ghetto Funk从这一场景中脱离出来，开创了一种更加“Midtempo”的声音，并且相比Funky Breaks，Nu-Funk和Ghetto Funk更注重“Plunderphonics”和“采样”的运用。", "chapter": "Breakbeat", "examples": ["Let the Record Play - The Breakbeat Junkie & DJP【https://www.youtube.com/watch?v=SkuZYUz2pcM】", "How Beautiful - Dr. Rubberfunk"]}, "nu-funk": {"name": "Nu-Funk", "ups": ["Funky Breaks", "Hip-Hop"], "downs": ["Ghetto Funk"], "aka": "Nu Funk", "related": "", "desc": "从2009年开始，Nu-Funk作为一个音乐市场中的术语，随着一系列唱片公司、博客和论坛的出现而兴起。Nu-Funk从Funky Breaks中分离出来，速度更慢，声音更“有机”。音乐形式上与Funky Breaks/Big Beat相似，但由于当时的Funky Breaks/Big Beat听起来更加狂放，于是它便从中分离开来。Nu-Funk的出现使Breakbeat的声音更加柔和，受到了更多嘻哈和放克音乐的影响。鼓组方面，虽然它经常使用采样，但有时也会使用真正的鼓手和乐队进行现场录制，如All Good Funk Alliance和Fort Knox Five。Ghetto Funk是从Nu-Funk发展而来的风格，比Nu-Funk更加流行，有着更肥厚、夸张的Bassline，嘻哈采样和各种Plunderphonics元素也更多。与Nu-Funk一样，速度大约在100-110BPM之间，但没有Nu-Funk的那种“有机感”，而是采用了更加厚重的合成器音效，以附和EDM的热潮。", "chapter": "Breakbeat", "examples": ["Top Billing - Featurecast【https://www.youtube.com/watch?v=pct30PYmocU】", "Noggins Groove - Pimpsoul"]}, "ghetto funk": {"name": "Ghetto Funk", "ups": ["Nu-Funk"], "downs": [], "aka": "Ghetto-Funk", "related": "", "desc": "2009年初，这个名字被用来描述有着更厚重的Bass的放克音乐。“Ghetto Funk”最初源于2009年末的一个博客（www.ghettofunk.co.uk），专为制作中速Breakbeat音乐的人而设，是人们寻找新音乐和新制作人的中心。随后，他们于2010年推出了同名厂牌Ghetto Funk，以发布艺术家们制作的音乐。很快，Ghetto Funk不仅成为用来描述他们的音乐的词汇，还成为Breaks领域中一种不断发展的新风格。“Ghetto Funk”厂牌在英国和加拿大受到了广泛关注，在2012年和2014年赢得了“International Breakbeat Awards”的最佳唱片公司奖。Ghetto Funk的特点是中速Breakbeat（通常在110BPM左右）、厚重的低音、常用Wobble Bass，鼓组强劲到有时听起来像Glitch Hop，并且经常加入嘻哈采样元素。Ghetto Funk拓展了Nu-Funk，加入了新的厚重Bass等元素，这些元素通常来自Dubstep、Bassline、Breaks和Drum & Bass。", "chapter": "Breakbeat", "examples": ["Got It Like That (Featurecast Remix) - Second Hand Audio【https://www.youtube.com/watch?v=_9MqcuY2Y58】"]}, "nu skool breaks": {"name": "Nu Skool Breaks", "ups": ["Breakbeat", "Drum & Bass", "Electro", "Hip-Hop", "West Coast Breaks", "Florida Breaks"], "downs": ["Tearout Breaks"], "aka": "Nu-Skool Breaks、Nu Breaks、Nu Skool Breakbeat、Nu Skool Breakz", "related": "", "desc": "Nu Skool Breaks是Breakbeat的一种，结合了Drum & Bass的“未来”感、Techno的元素、Dub的Bass和Breakbeat的节奏。该流派还突出了Electro和嘻哈音乐的影响，曲目的节奏一般为130至140BPM。TCR唱片公司创始人Rennie Pilgrem创造了这个词，以区别于当时更狂放的Big Beat场景，1998年他还通过英国的Kickin Records发行了两张非常成功的合辑《Nu Skool Breakz》和《Nu Skool Breakz Vol.2》。在英国，Stanton Warriors、Plump DJs、Krafty Kuts、Adam Freeland、Lee Coombs等乐队是这一场景的代表人物，有着主导地位。2000年代初还出现了“Tearout Breaks”场景，它将Nu Skool Breaks的声音与现代Drum & Bass相结合，变得更重、更快、更黑暗。这一场景可以被视为Nu Skool的一部分，但通常被视为Nu Skool的一个分支。Nu Skool在其他国家也很流行，在近十年的大部分时间里，Nu Skool Breaks都是Breaks的主流分支。", "chapter": "Breakbeat", "examples": ["Creepshow - Plump DJs【https://www.youtube.com/watch?v=TtGg1LEq5ZQ】"]}, "tearout breaks": {"name": "Tearout Breaks", "ups": ["Nu Skool Breaks", "Drum & Bass"], "downs": [], "aka": "", "related": "", "desc": "Tearout Breaks是Drum & Bass和Nu Skool Breaks的结合体，2000年代中期流行于英国，节奏明快而有力。Tearout是在Nu Skool Breaks和Bassline热潮之后发展起来的，这种音乐融合了Drum & Bass的Reese Bass、Hoover等侵略性很强的音色，并采用了类似的鼓组编排，BPM介于135-140之间。Tearout Breaks同时拥有Drum & Bass和Breakbeat乐迷的粉丝群，由于其音乐类型和受众相似，偶尔也会被归为Dubstep类型。当Breakstep在英国逐渐失去人气时，Tearout Breaks也是接替其地位的音乐类型之一。", "chapter": "Breakbeat", "examples": ["Under My Skin - CTRL-Z / Screwface Present Stereo:Type【https://www.youtube.com/watch?v=FtqKYgZ6Mrc】"]}, "ska breaks": {"name": "Ska Breaks", "ups": ["Breakbeat", "Ska"], "downs": [], "aka": "", "related": "", "desc": "1998年，Breakbeat界掀起了一股小热潮：Ska Breaks，这一流派将牙买加Ska舞曲带入了人们的视野，多张Ska Breaks专辑被发行，并最终收录在多张合集中，如《Skank You！》、《Skank You Too！》、《FSUK2*》、《21st Century Ska》。Ska及其舞蹈风格“The Skank”由Fatboy Slim发扬光大，随后短时间内就在英国流行开来。", "chapter": "Breakbeat", "examples": ["Skank Around - Skankaround Soundsystem【https://www.youtube.com/watch?v=v3f9jhuwV2c】"]}, "progressive breaks": {"name": "Progressive Breaks", "ups": ["Breakbeat", "Progressive House", "Trance", "West Coast Breaks"], "downs": [], "aka": "Prog Breaks、Progressive Breakbeat、Breaktrance", "related": "Atmospheric Breaks、Ambient Breaks", "desc": "Progressive Breaks是Breakbeat的一个子分支，继承了Progressive House和Trance的元素但不使用4/4节拍，起源于90年代初，于2010年代末期重新流行起来。与Progressive House一样，Progressive Breaks也是以重复且悠闲的Trance元素为中心，配以厚重而优美的合成器Lead、柔和的Pad、大混响与渐进感。曲目通常在120-130BPM左右，与其他Breakbeat子流派相比，Progressive Breaks的节拍相对简单，鼓点较为干净，也基本上不会使用Amen Break。不同的制作人还加入了各种各样的元素，如电钢琴、吉他、小提琴或邦戈鼓等现场乐器的录音（偶尔会有New Age、Ibiza Trance的影响）。在90年代中期，这种音乐风格在“前卫音乐”浪潮（见Progressive Big Beat的介绍）中逐渐融入了更加“前卫”的元素，变得更加深邃、厚重甚至黑暗。Progressive Breaks在00年代被认为与Nu Skool Breaks并列，但前者是Trance、Progressive House、Breakbeat的融合体，后者则是Drum & Bass、Techno、Breakbeat的融合体。从某种程度上说，Progressive Breaks可被认为是Trancestep（Trance 'n' Bass）的降速版。在2010年代后期，这一流派再次流行起来，在Anjunadeep和Silk Music等厂牌上得到传播，其制作人主要是英国新一代制作人，如Jon Gurd、Franky Wah、Trance Wax、Bicep。由于技术的进步，在声音上与90年代的声音相比发生了很大的变化，很多现代的Progressive House、Progressive Trance、Melodic Techno等将鼓组部分换成Breakbeat，我们就都叫它“Progressive Breaks”，但是需要注意，这一风格其实在早期Breakbeat的场景中就已存在，并且毫无疑问是Breakbeat最老派的分支之一。", "chapter": "Breakbeat", "examples": ["Glue - Bicep【https://www.youtube.com/watch?v=A7ZxRs45tTg】", "Sundial - Bicep"]}, "atmospheric breaks": {"name": "Atmospheric Breaks", "ups": ["Breakbeat Hardcore", "Jungle", "Hardcore", "Drum & Bass", "Digital Hardcore", "Industrial"], "downs": ["Atmospheric Breakcore", "Breakflash"], "aka": "Chemical Breaks", "related": "", "desc": "Electronica 范畴下，一类强调细碎节拍的特殊氛围向电子乐。舒缓的声音模式中添加了放克、爵士和 R&B 中的旋律与采样。 Dubcore (见HDM部分Pumpcore词条描述) Progressive Breaks 下:FTP Trance Progressive Breaks是一种非常新颖的类型，它基本上是由nu skool breaks and progressive house发展而来的。这种风格最著名的艺术家包括Digital Witchcraft, Momu, Hybrid。如今，考虑到Way Out West or Fluke的音乐风格，progressive house and progressive breaks之间的界限已经相当模糊。 Big Beat 进入90年代，像是Junior Boy's Own 和Heavenly Records 这样的厂牌开始发行速度更慢但节拍更重的breakbeat，吸引了一大批音乐人加入。音乐界将这种音乐称为big beat，它的鼓点强劲到接近摇滚，同时又充满了acid house和techno的科技感音色。此外，各路制作人在曲子中会加入丰富的采样，扩展了音乐的内涵和煽动力。以2001年为界，Big beat进入了衰退期，主要是因为领军人物的休整，以及big beat日渐流行化之后难以突破的瓶颈。 Breakcore 在90年代中晚期，Breakcore在Jungle, Hardcore和Drum &Bass三者的影响下形成。它使用更加复杂与微妙的碎拍形式，并在Hardcore的影响下速度进一步增加，善于使用各种彼此不直接相关的采样制造场景穿越的奇妙效果。进入21世纪后 Breakcore在互联网又进一步演化，涌现出不少优秀的网络制作人，元素也越来越多样化。 Lolicore 见日系电子", "chapter": "Fusion", "examples": []}, "tech funk": {"name": "Tech Funk", "ups": ["Breakbeat", "House", "Techno", "Electro"], "downs": [], "aka": "Techfunk、Tech-Funk", "related": "", "desc": "Tech Funk是在碎拍场景下诞生的子分支，融合了Breaks、House、Techno、Electro等元素，并有着向Electro House、Fidget House、Tech House、Indie Dance等方向发展的趋势。Elite Force被认为是Tech-Funk诞生并发展的关键人物，2008年他发行了一张合辑，收录了12年来25首Tech Funk的混音作品和再创作作品，包括制作人Miles Dyson、Rogue Element、Deepgroove、Dylan Rhymes和Calvertron等的作品。Meat Katie与Elite Force的合作始于2003年的《Toba》，2009年他们以“Dustbowl”为名推出了新的合作项目，后又以“Meat Katie & Elite Force”为名发行了一系列单曲。", "chapter": "Breakbeat", "examples": ["Mindfunkpsychedelic - Elite Force【https://www.youtube.com/watch?v=7oGE__7XB8g】"]}, "psy breaks": {"name": "Psy Breaks", "ups": ["Breakbeat", "Goa Trance", "Psytrance", "Nu Skool Breaks"], "downs": [], "aka": "Psybreaks、Psy-Breaks、Psychedelic Breaks、Psy Tech-Funk", "related": "", "desc": "Psybreaks是20世纪90年代中期从Psytrance场景兴起的一种Breakbeat形式。将碎拍与Goa Trance/Psytrance的元素结合在一起，通常在130至150BPM之间。早期的Psybreaks起源于Goa Trance，由制作人Digitalis、Mood Deluxe推广开来，结合了Breakbeat的Bass和鼓以及Goa Trance的旋律线。随着Psytrance逐渐比Goa Trance更加流行，Psytrance对Psybreaks的影响也越来越大。在2000年代后期，新的Psybreaks融合了更加具有侵略性的Psytrance Bass，有时还融合了工业音乐的Screech和Drum & Bass的节奏形式。Psybreaks包括了一些标签化的子分支，有Psychedelic Tech-Funk、Progressive Psybreaks，以及一些Nu Skool Breaks、Acid Breaks和Electro。Psybreaks的声音发展到现在，很多作品已经脱离了“Breakbeat”的范畴，鼓组越发规律，听起来更像是Psy+Midtempo、更现代化的Psydub，但是很多合辑仍然认为这种音乐属于“Psybreaks”。除了作为Breakbeat的一个子流派，Psybreaks在过去几十年中也在Psytrance中占有一席之地，并在声音和艺术美学等方面为经典Psychedelic风格提供了新的变化。Psybreaks的相关厂牌有Broken Robot Records、Luminus Music、Neom Recordings、VIM。", "chapter": "Breakbeat", "examples": ["Alien Flirtation - Nanosphere【https://www.youtube.com/watch?v=pBLwAAk48Jo】", "Anaesthetic - Akash"]}, "chip breaks": {"name": "Chip Breaks", "ups": ["Breakbeat", "Chipcore", "Plus (Bit Music)"], "downs": [], "aka": "Breakbit", "related": "", "desc": "一反常态地诞生于Breakcore场景的Breakbeat风格，跟Rave Breaks类似，Chip Breaks是Chipcore与Breakbeat“复分解”的产物，概念上表述为“将Chiptune音乐元素或早期电子游戏采样片段融入Breakbeat的产物”。这种风格在日本比较受欢迎，很多碎核或Artcore制作人或Game Boy User都会尝试制作这类音乐或Remix已有的电子游戏BGM，且通常与Hardcore Breaks [Internet]制作场景相关联。", "chapter": "Breakbeat", "examples": ["Sinisterrrrrrrr - Renard【https://www.youtube.com/watch?v=Dff2TBB9C9w】"]}, "edm breaks": {"name": "EDM Breaks", "ups": ["Florida Breaks", "US Bass", "Breakbeat", "EDM House", "Trap etc."], "downs": ["Hybrid Breaks"], "aka": "Progressive Breaks 3.0、Bass Breaks、Complextro Breaks", "related": "", "desc": "商业化制作的Breaks/Breakbeat音乐，节奏型来源于Florida Breaks，并传承了其结构，并将鼓组简化，仅保留切分模式。同时在其中加入EDM元素，尤其是EDM House子风格的特色加以改良。一般来说EDM Breaks有两种展开方式。第一类是将Complextro元素融入Florida Breaks里，形成具有独特音色的EDM Breaks，代表人物包括Tokyo Machine、Wuki等；第二类则是将US Bass与Florida Breaks融合在一起，有时候干脆做成第一段Drop是US Bass而第二段Drop做成类似Bass House的Breaks的模式，这种形式也是主流展开，代表人物包括RIOT、Getter、Kotek。还有部分制作人如Tule（Lost Sky）等干脆做成Reggaeton节奏型，这里暂且不视为EDM Breaks。", "chapter": "Breakbeat", "examples": ["FIGHT - Tokyo Machine【https://www.youtube.com/watch?v=qvBlHBHUTMs&t=81s】"]}, "hybrid breaks": {"name": "Hybrid Breaks", "ups": ["EDM Breaks", "Hybrid Trap", "Heavy Dubstep"], "downs": [], "aka": "Trap Breaks", "related": "", "desc": "EDM Breaks旗下的一个标签，由猫厂(Monster Cat Records)提出。Hybrid Breaks的说法类似于Hybrid Trap，是在EDM Breaks的基础上加入更多Bass上的音色设计得到的产物，通常来说这些音色来源于Hybrid Trap本身或者其他类似的风格如Heavy Dubstep、Riddim等。", "chapter": "Breakbeat", "examples": ["Sentinel - Noisestorm【https://www.youtube.com/watch?v=LKALcthKSwA】"]}, "dangdut": {"name": "Dangdut", "ups": ["Breakbeat", "Funk", "R&B", "Indonesian Folk", "Pop"], "downs": ["Funkot"], "aka": "", "related": "", "desc": "Dangdut原先是上世纪四十年代流行于印尼民间的一种传统民间舞曲风格，以Melayu乐音的基础上，添加了印度塔布拉鼓元素和阿拉伯滑音元素等，发展成一种印尼特有的现代流行乐。这个名词本质上是拟声词，是1970年代一家音乐刊物用来揶揄塔布拉鼓声音而造的词汇，却逐渐成为这种音乐的代名词。 现今的Dangdut一般指主流Dangdut，常常作为印尼广播剧片尾曲等出现。这类音乐在传统Dangdut的基础上加入了巴基斯坦和印度古调，进一步融合了Keroncong、Langgam、Degung、Gambus等流行乐风格，并将Breakbeat、Hip Hop和Rock、Comtemporary R&B融入制作中。这种音乐后来影响了Breakbeat Kota音乐和Funkot音乐，并促进了东南亚流行/舞曲的繁荣。", "chapter": "Breakbeat", "examples": ["Jamur - Cita Citata【https://www.youtube.com/watch?v=Uh07yRRlTPU】"]}, "funkot": {"name": "Funkot", "ups": ["Breakbeat", "House", "Hardcore", "Dangdut", "Drum & Bass"], "downs": ["Breakbeat Kota", "J-Funkot"], "aka": "Hardfunk、Hard Funk、House Kota、Indonesian Hardcore", "related": "", "desc": "Funkot是一种诞生于印度尼西亚雅加达的电子舞曲风格，受到2000年代初期的House和Dangdut影响，并在Kota区逐渐成型。Funkot在Dangdut Koplo音乐中吸收灵感，借用Trance或House的制作手法，并将速度拉高到160BPM~180BPM，更有甚者直接达到220BPM。Funkot之所以叫Funkot，是因为其融合了Funky Bassline。除此之外，Funkot还融入了808 Cowbell声音、印尼打击乐节奏和来着Eurodance的采样和旋律。Funkot音乐通常会在Intro或Outro部分添加很长的纯鼓组+反复的人声采样，这也使得Funkot很适合DJ制作和混音。有些Funkot的速度低于130左右且采用高度失真的鼓组，这种风格就称为Breakbeat Kota。2009年，DJ Jet Baron发现了Funkot音乐并着手制作，融合了Hardcore与J-Pop元素形成了J-Funkot，从此Funkot在日本名声大噪，甚至至今仍被误认为是日本的Breakbeat风格甚至日本的Drum&Bass风格。", "chapter": "Breakbeat", "examples": ["Trash - DJ Chadut【https://www.youtube.com/watch?v=KY0ttQh1Bhw】"]}, "breakbeat kota": {"name": "Breakbeat Kota", "ups": ["Funkot", "EDM House"], "downs": ["Jungle Dutch"], "aka": "Breakfunk、Indonesia Breakbeat、Breakbeat Indonesia、Breakbeat Indo", "related": "", "desc": "按定义来说，Breakbeat Kota是速度小于或等于130BPM的Funkot，实际上这种风格诞生年代要比Funkot晚。Breakbeat Kota同样诞生于印尼雅加达的Kota区，随着Funkot场景在2000s末到2010s初诞生。Breakbeat Kota同样从Dangdut koplo中汲取灵感，如Funkot那种切分鼓模式，但是速度更慢，歌曲更温和且旋律有趣。另外与Funkot不同的是，Breakbeat Kota会使用EDM House的结构(如Dutch House那种极简合成旋律)而非Funkot那种从Trance里吸收制作手法，因此诞生了子分支Jungle Dutch。另外Breakbeat Kota也对Progressive Breaks产生了结构上的影响。", "chapter": "Breakbeat", "examples": ["Goyang Ubur Ubur - Hendro Engkeng / Diego Takupaz【https://www.youtube.com/watch?v=s2qAOxOP_DY】"]}, "jungle dutch": {"name": "Jungle Dutch", "ups": ["Breakbeat Kota", "Dutch House", "Jungle Terror"], "downs": [], "aka": "Breakdutch、Breakbeat Jungle Dutch", "related": "", "desc": "Jungle Dutch是一种Breakbeat Kota子分支，于2010年代后期在印度尼西亚发展起来。顾名思义，该流派保留了Breakbeat Kota中的极简、高音调的Dutch House合成器音色的特征，以及典型的“koplo”节奏，但又结合了Jungle Terror的“部落式”鼓组编排，以及Jersey Club的切分节奏和Vocal Chops。Jungle Dutch在当地已经发展了几年，在2020年左右，这种音乐风格开始在印尼大受欢迎，许多DJ和混音师将他们的混音作品上传到SoundCloud和YouTube上，获得了不小的人气。此外，这一流派还随着2017年印尼TikTok的兴起而发展，Jungle Dutch DJ经常在TikTok上混音各种各样的当红歌曲，并作为自己的音乐与这一流派的宣传工具。", "chapter": "Breakbeat", "examples": ["Perubahan (Bam Bam Full Beat) - Nata HG【https://www.youtube.com/watch?v=4blixHklifI】"]}, "breakbeat hardcore": {"name": "Breakbeat Hardcore", "ups": ["Detroit Techno", "Bleep Techno", "Hip-Hop", "Breakbeat", "Acid House", "New Beat etc."], "downs": ["Jungle", "Drum & Bass", "Happy Hardcore"], "aka": "Old School Rave Hardcore、Oldskool Hardcore、Oldskool Rave", "related": "", "desc": "Breakbeat Hardcore（又叫Old School Rave Hardcore，常用译名:碎拍硬核）是九十年代初英国锐舞场景下诞生的一个曲风，他的出现也证明了当时人们对速度的追求。碎拍硬核典型特征是相对更快更硬核的Breakbeat、来自Detroit Techno的管弦、滑音钢琴、Bleep Techno的音色、Acid House那独一档的Acid Bassline和粗糙的碎拍采样以及变速人声、Hoover的运用。嗯，听起来很热闹，事实上也确实如此，这也使他比Rave Techno(Hardcore Techno前身)更具有舞池性，也将Rave带向了新的方向----甚至流行化。在93年前后，由于药物滥用等现象在锐舞运动中频出，一些限制锐舞举行的法律出台了，这导致碎拍制作人不得不寻求其它不依赖于锐舞场景的风格。这一掀起锐舞热潮的风格热度迅速下跌，取而代之的是Jungle/Dnb这类更平静甚至黑暗的碎拍音乐。厂牌有Kniteforce等。", "chapter": "Breakbeat", "examples": ["Hurt You So - Jonny L", "Don't Go (KICKS LIKE A MULE MIX)-awesome 3", "Buyaka - 罗百吉", "Trip II The Moon - Acen"]}, "toytown techno": {"name": "Toytown Techno", "ups": ["Techno", "Breakbeat Hardcore", "Rave"], "downs": [], "aka": "Kiddy Rave、Cartoon Rave", "related": "", "desc": "诞生于90年代早期，融入儿童节目或相关作品的采样。Toytown Techno本来是新闻界的一个术语，用来描述以儿童卡通和公共信息电影为样本的老式Rave唱片。这一趋势从The Prodigy的突破性歌曲\"Charly\"开始越来越大，出现了不少类似的歌。这股热潮持续了大约1991-93年。", "chapter": "Breakbeat", "examples": ["Ebeneezer Goode - Shamen"]}, "piano hardcore": {"name": "Piano Hardcore", "ups": ["Breakbeat Hardcore", "Rave Piano [Sample]"], "downs": ["Old School Happycore"], "aka": "", "related": "", "desc": "不同于Artcore子分支Pianocore，请勿混淆。 Piano Hardcore起源于1991年，衰退于1994年，是采用了未经过大量处理的标准钢琴采样(不包括Rhodes Piano和Stab Synth)的Breakbeat Hardcore，且不常使用4-on-the-floor节拍。整首歌曲的大部分时间都处在Uplifting的状态当中，也一般比Darkcore(见下一词条，非Jungle和Hardcore子分支)要更活泼。Piano Hardcore是Rave场景和Hardcore音乐场景的重要组成部分，最终这种声音也影响到了Old School Happycore。", "chapter": "Breakbeat", "examples": ["Out Of Space - The Prodigy"]}, "hardcore breaks": {"name": "Hardcore Breaks", "ups": ["Breakbeat Hardcore", "Breakbeat", "Hardcore"], "downs": ["Hardcore Breaks [Internet]", "Breakcore Revival"], "aka": "", "related": "", "desc": "现代配器意义上的\"硬核碎拍\"，在一些语境下不是风格，时常将现代技艺制作的Breakbeat Hardcore声音作为一些局部要素穿插在很多前卫编排的作品中。 作为风格时，诞生于Rave风潮结束后几年间，以专辑The Year Of The Rat EP最具代表性。这类音乐速度在155±10BPM区间里，用新的技术、音色和特殊的编排制作新的“Breakbeat Hardcore”音乐，弱化了Rave性和舞池性，增加了可欣赏性。这类音乐被称为“Hardcore Breaks”。(互联网Hardcore Breaks参考Post-Internet板块相应词条)", "chapter": "Breakbeat", "examples": ["Let The Music Flow (E-Lab Rat Remix) - Stu & Nee"]}, "jungle techno": {"name": "Jungle Techno", "ups": ["Bleep Techno", "Breakbeat Hardcore"], "downs": ["Jungle"], "aka": "", "related": "", "desc": "在Breakbeat Hardcore风华正茂之时，有一类音乐在其阴影下悄然冒头出现，当时这一音乐被称为“Jungle Techno/Hardcore Jungle”，这类音乐是Jungle——Breakbeat Hardcore取缔者——的前身。受到Breakbeat Hardcore的影响，一些Bleep Techno 制作人将Amen Break等碎拍采样加进他们的曲子，听起来就像是不那么Rave但是更稀碎的Breakbeat Hardcore，而这也是后来Jungle的一大特征。", "chapter": "Breakbeat", "examples": ["Tango - Time Bomb", "The Way - DJ Taktix"]}, "jungle": {"name": "Jungle", "ups": ["Breakbeat Hardcore", "Jungle Techno"], "downs": ["Darkcore Jungle"], "aka": "Old School Jungle", "related": "", "desc": "正如Simon Reynolds在其著作Generation Ecstasy: Into the World of Techno and Rave Culture中所言：“听听那些机械的舞曲，它们的听感千篇一律，重复的节奏只能给你提供出神的听感。Jungle则不一样，它带来的仿佛凝为实质的危险感打破了听众惯常形成的安全网，让我们不得不瞻前顾后，小心翼翼。” 或许Simon对jungle所带来的危险感可能存在夸大之处，但确实是jungle将breakbeat hardcore拉下锐舞的神坛。1992-1993年，碎拍制作人DJ Ron，DJ Hype等以Darkcore框架为基础制作Jungle Techno音乐，去除了Hoover，阴森的Ambient等等元素，加入一些器乐采样便形成了Jungle，它脱离了Breakbeat Hardcore的锐舞氛围，变得更加注重氛围渲染，要而言之，不是很rave也不是很core了。然后又加入加勒比海黑人引以为傲的雷鬼乐，形成了Ragga Jungle。Jungle拥有基于碎拍硬核的凸出节奏，深植Reggae和Hip-Hop基因， 段落间的突发性强，有一种骨子里的狂野原始狂欢状态。厂牌有Moving Shadow等。", "chapter": "Breakbeat", "examples": ["All the Crew Big Up - Roni Size & DJ Die"]}, "ragga jungle": {"name": "Ragga Jungle", "ups": ["Reggae", "Dancehall", "Jungle"], "downs": ["Hardstep"], "aka": "", "related": "", "desc": "90年代初风靡英国的Jungle子类型，以浓厚的牙买加当地文化与部分的帮派文化为特色，在1994~1995年间达到鼎盛。事实上给Jungle加上Reggae要素就是Ragga Jungle。如今谈到Jungle音乐，很多人想到的就是这种Jungle音乐，因为他是当时最受欢迎的Jungle分支。不过后来受到了主流音乐界的限制，并逐渐分流为其它Jungle子风格。制作人有Shy Fx，Dead Dred等", "chapter": "Breakbeat", "examples": ["Original Nuttah - UK Apachi / Shy FX"]}, "atmospheric jungle": {"name": "Atmospheric Jungle", "ups": ["Ragga Jungle", "Ambient", "IDM"], "downs": ["Liquid Funk", "Intelligent Jungle"], "aka": "", "related": "", "desc": "LTJ Bukem在Jungle里使用了大量的氛围音乐元素，提出了Atmospheric Jungle这个标签。这种Jungle的氛围感是如此强烈以至于听着Atmospheric Jungle你真的有一种置身丛林的感觉——也可以是宇宙中的“黑暗森林”。Atmospheric Jungle在Jungle音乐中的比重不小，并影响了之后Jazzstep, Liquidfunk等风格的发展。1996年LTJ Bukem发行的Logic Progression Vol.1是此风格早期作品的代表。", "chapter": "Breakbeat", "examples": ["Demon's Theme - LTJ Bukem"]}, "intelligent jungle": {"name": "Intelligent Jungle", "ups": ["Atmospheric Jungle", "Drum & Bass", "IDM", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "Intelligent Jungle之所以叫做“Intelligent”，正是因为它卓尔不群的缘故，敢于突破常规，这一点与IDM极其相似。Intelligent Jungle尝尝融入氛围元素，使用未来感、奇异特殊的Sample和FX，但是仍然保留了Jungle的淳朴味道。由于Intelligent Jungle诞生时期与Drum & Bass突破地下时间相差无几甚至更晚，因此Intelligent Jungle或多或少表现出Drum & Bass的味道。", "chapter": "Breakbeat", "examples": ["No One In The World - Locust"]}, "darkcore jungle": {"name": "Darkcore Jungle", "ups": ["Ragga Jungle", "Darkcore (Breakbeat Hardcore)"], "downs": ["Drum & Bass(Hardstep", "Techstep"], "aka": "", "related": "", "desc": "音乐真奇妙，在摆脱了Darkcore的Dark Ambient之后，于94年左右Goldie，Dillinja等制作人又成功让Jungle“黑化”成了Darkcore Jungle。这类Jungle富有侵略性，更加黑暗迷离。经常采用恐怖电影中的氛围与音乐元素，尖利的喊叫声，阴鸷的stab音色与更多的合成器元素。其音色被认为是早期DnB黑暗冷峻氛围的一个来源，也是Techstep等重型Drum & Bass分支的前身。", "chapter": "Breakbeat", "examples": ["Nightstalker - Skanna"]}, "nu-style jungle": {"name": "Nu-style Jungle", "ups": ["Jungle"], "downs": [], "aka": "", "related": "", "desc": "和Nu-style Techstep一样，Jungle也经历了一次复兴，一直在碎核圈活跃的amen break等经典碎拍采样在DnB圈吃灰许久后又重见天日了，这类音乐可以看做是新瓶装旧酒，保留Jungle的元素同时利用现代化的编曲手段将其展现出来。这类音乐的代表制作人包括Sully、Riffz等。", "chapter": "Breakbeat", "examples": ["Swandive - Sully"]}, "raggacore": {"name": "Raggacore", "ups": ["Ragga Jungle", "Dancehall"], "downs": ["Breakcore"], "aka": "", "related": "", "desc": "Ragga Jungle的极端化产物，受到了Digital Hardcore (详见Fusion板块)影响，特点是极端化的鼓编和失真处理，在某种程度上它比Breakcore还要早一些，其特点是Ragga和Dancehall的节奏和人声。其根源可以说可以追溯到Jungle制作人Remarc，他是最早将Ragga和Dancehall的人声与混乱的、复杂的Break节拍相混合的制作人之一。 虽然做这个风格的人很少，但它在Breakcore乐迷中占有不小的地位。", "chapter": "Breakbeat", "examples": ["Murdarah - Sumone"]}, "happy breakcore": {"name": "Happy Breakcore", "ups": ["Breakcore", "Furry EDM"], "downs": ["Dancecore (Internet)"], "aka": "", "related": "", "desc": "与Venetian Snares将碎核与古典结合不同，Shitmat、Sickboy、Drop The Time等DJ更喜欢用Mash Up、Happy Hardcore、Rave等形式演绎Breakcore，因此Happy Breakcore诞生了。Happy Breakcore常常采样大量meme、动漫或电影的音调样本(然后拉伸得稀奇古怪)，还将大量Gabber和Speed Bass元素融合进去，虽然混乱，但是足够令人发笑。", "chapter": "Breakbeat", "examples": ["Kiss The Spanner And Call Me Charlie - Shitmat"]}, "baroquecore": {"name": "Baroquecore", "ups": ["Breakcore", "Baroque Pop", "Classical Crossover"], "downs": [], "aka": "Classical Breakcore、Classicore", "related": "", "desc": "正如前面所说的Venetian Snares的“严肃派”古典音乐碎核，实际上真的存在一种叫做“Baroquecore”的标签。该标签由制作人Igorrr于2010的专辑《Baroquecore》提出，这种风格最大的特色就是将来自Baroque时期的古典音乐或Baroque Pop音乐融入到弱化鼓点的Breakcore当中，显得音乐更加严肃化。", "chapter": "Breakbeat", "examples": ["Dear Poet - Venetian Snares"]}, "metal breaks": {"name": "Metal Breaks", "ups": ["Breakcore", "Metal"], "downs": [], "aka": "Breakmetal、Breakcore Metal", "related": "", "desc": "Metal Breaks是一种将金属与Breakcore融合的实验形式。Breakcore的鼓组达成了实际金属乐队鼓组达不到的效果，而金属元素则为其增添了一层残酷和侵略性。与Cybergrind和MIDIgrind的不同之处在于，这种音乐并不是使用电子设备和鼓机来提高碾核音乐的速度、增强侵略性，而是大量使用Amen Break等Breakcore元素。Metal Breaks并不是一个确定的名字，最开始有很多人习惯用“Breakcore Metal”来称呼这种音乐，后来“Metal Breaks”这个名字才被慢慢接受。", "chapter": "Breakbeat", "examples": ["Very Noise - Igorrr"]}, "glitchcore": {"name": "Glitchcore", "ups": ["Digicore", "Glitchcore(详见Breakbeat领域)", "Trap", "Glitch"], "downs": ["Glitchsphere"], "aka": "", "related": "", "desc": "Glitchcore是从Robloxkore场景中分化出来的一种特定形式的Digicore，因为其视觉美学受到Glitch Art/Glitchcore影响，因此这种风格得名Glitchcore。Glitchcore制作人以Trap为基底，常常在Glitchcore音乐里添加大量Bitcrush元素和Glitch元素，对Kick强失真化处理，且伴随着神出鬼没的Hi-Hat，有着明显的不和谐故障噪音和主观上的卡顿感，因而被与Digicore区别出来。Glitchcore的创始人被认为是美国乐队100 gecs，定义专辑被认为是其专辑《1000 Gecs》(2019)，现今Glitchcore已成为Hyper Pop第二波浪潮的主力风格，但是某种程度上也带来了不可避免的商业化。", "chapter": "Post-Internet", "examples": ["money machine - 100 gecs", "gec 2 Ü - 100 gecs / Laura Les / Dylan Brady", "selfish - polearm"]}, "fakecore": {"name": "Fakecore", "ups": ["Breakcore", "Noisecore", "Digital Hardcore", "Industrial Hardcore"], "downs": [], "aka": "", "related": "", "desc": "Fakecore是2007年由Anti-Kati等Breakcore/Speedbass制作人提出的一个流派，起源于Fleet FM的一个每月地下专家广播节目“Deep Hard n Fakecore”，由Nelson和Auckland NZ等人主持策划，并由K5K(Anti-Kati)、P.P.Flo、DJ Beatmeter掌舵。Fakecore广受Industrial Hardcore影响，相对于其他Breakcore对Amen Break的细致化碎片化运用，Fakecore更倾向于将Digital Hardcore和Noisecore的元素破碎使用，鼓组极硬且故障感十足，这也是Fakecore与Speed Bass产生交集的原因。目前仅有少数制作人如撲殺少女工房等日系制作团体会制作这个风格。", "chapter": "Breakbeat", "examples": ["K5k - Anti-Kati"]}, "junglecore": {"name": "Junglecore", "ups": ["Jungle", "Raggacore", "Breakcore"], "downs": ["Yardcore"], "aka": "Electronica (曾用名)", "related": "", "desc": "Junglecore是Raggacore反作用于Jungle的表现，也是1990s英国Rave场景里的中坚力量。由于Breakcore的破碎采样的手法被运用到了Jungle里，导致Junglecore显得更加细碎，比Jungle音乐更具有丛林感。Junglecore也是当时少有的完全黑暗化、地下化的Breakcore分支。千禧年后该风格常常与Chipcore和Glitchcore交叉制作，并具有更多Breakcore特色。 注：有说法认为Electronica的说法曾被用于形容1990s一系列新式电子舞曲，包括Electro House、Progressive House、Trance、Big Beat、Junglecore等，因此此处的Electronica定义与后面独立分支Electronica意思不同，请注意区分。", "chapter": "Breakbeat", "examples": ["Deaf Dumb & Blind - DJ Bleed (Old)", "Daiki 大 Grate - Wan Bushi (New)"]}, "footcore": {"name": "Footcore", "ups": ["Footwork", "Breakcore", "Artcore"], "downs": [], "aka": "J-Footcore、Japanese Footcore", "related": "", "desc": "Footcore是Breakcore与Footwork的结合，融合了两者的节奏和美学。自2010年代初，Footwork在俱乐部音乐中获得许多人气以来，许多制作人在探索这种音乐的可能性时，对其进行了各种“杂交”。Footcore主要属于日本Breakcore场景（Kusoikore、Lolicore、Mashcore等），许多制作人都来自日本，或者是曾经的Footwork制作人。Footcore的特点有混乱、嘈杂、甚至于噪音化的鼓组，节奏感十足的编排，注重旋律，以及十分依赖采样，并经常从Footwork、其他Breakcore流派中汲取灵感。代表厂牌Dochakuso Records的一系列合辑清楚地展示了Footcore与其前辈的不同之处，就目前而言，Dochakuso的几张合辑已经足以巩固这一流派，以及确立Dochakuso Records在Footcore领域的地位。", "chapter": "Breakbeat", "examples": ["UTADA旅ですアナザー - pencil"]}, "ravecore": {"name": "Ravecore", "ups": ["Breakcore", "Jungle", "Breakbeat Hardcore", "Happy Hardcore", "Mashcore"], "downs": ["Rave Breaks"], "aka": "", "related": "", "desc": "Ravecore是Breakcore的一种子流派，这种音乐使用经典的Rave Stabs、Hoovers和钢琴Riff等Rave音乐中常见的音色与元素。Ravecore场景的Breakcore制作人经常在他们的歌曲中融入90年代的Jungle、Breakbeat Hardcore和Happy Hardcore等元素来发展这种风格。有说法认为Ravecore可被归类在Mashcore之下，但这种声音与Mashcore不同，Mashcore通常侧重于使用现有曲目采样混搭、拼贴成复杂的Breakcore作品，而Ravecore则通常只使用更普通的Rave采样。Ravecore的其中一些厂牌还专注于更“现代”的经典Rave音乐，包括Jungle、Breakbeat Hardcore和其他不属于Breakcore领域的风格。", "chapter": "Breakbeat", "examples": ["LCDNB - Dev/Null", "Soundbwoy Rave Adventures - Meow Meow", "seventy four (don the shell suit) - goreshit"]}, "chipcore": {"name": "Chipcore", "ups": ["Chiptune", "Breakcore"], "downs": ["Breakbit", "Happy Breakcore"], "aka": "", "related": "", "desc": "Chipcore是一类与芯片乐有交集的Breakcore音乐，常表现为芯片乐采样或游戏音乐(Game Boy Music)与Breakcore的融合体，因此也属于芯片乐旗下分支Plus的概念范畴内。Chipcore在日本的Nerdcore Techno场景里有着举足轻重的地位，在欧美圈则显得相对比较小众。", "chapter": "Breakbeat", "examples": ["Spastic Break Fest - Mr. Spastic", "Logoff - Sabrepulse"]}, "mashcore": {"name": "Mashcore", "ups": ["Breakcore", "DnB", "IDM"], "downs": [], "aka": "", "related": "", "desc": "Mashcore于2003年诞生于英国，即为Classic Mashcore。创始人为Shitmat，他把Splintered Jungle、Rave、Old School、Gabber和Plunderphonics等元素进行了一个Mashup，这种音乐被定义为Mashcore。你可以从Classic Mashcore听到Breakcore的影子，与Speedbass或是ChipBreak类似的听感，以及一些流行歌曲，电视节目的采样。之后Mashcore传入了日本，经改进变成了现在我们所听到的J-Mashcore。", "chapter": "Breakbeat", "examples": ["CirnoRHTL - Reizoko Cj"]}, "japanese mashcore": {"name": "Japanese Mashcore", "ups": ["Mashcore", "Lolicore", "J-core", "J-Pop"], "downs": ["Kusoikore"], "aka": "J-Mashcore", "related": "", "desc": "J-Mashcore去掉了Classic Mashcore的一些经典元素例如Splintered Jungle、Rave、Old School、Gabber和Plunderphonic，取而代之的是日本特色的Happy Hardcore、Japanese Freeform、Lolicore等元素，整体更偏向J-Core。", "chapter": "Breakbeat", "examples": ["One Of Us - かたぎり"]}, "lolicore": {"name": "Lolicore", "ups": ["Rave Music", "Techno", "Garmen Trance"], "downs": ["Breakbeat Hardcore", "Hardcore Techno", "Hardstyle"], "aka": "", "related": "", "desc": "见Breakbeat篇章下的Breakcore Mashcore 见Breakbeat篇章下的Breakcore Glitchcore 见Breakbeat篇章下的Breakcore Atmospheric Breakcore 见Breakbeat篇章下的Breakcore Depressive Breakcore 见Breakbeat篇章下的Breakcore Hard Dance篇 | Hard Dance 出现于20世纪90年代的术语，Hard Dance的概念于当时仅包括NRG、Hard Trance、Early Hardstyle等等一些“快速有弹性的音乐”。现在用于形容那些听感较为“强硬”的电子舞曲风格/标签，普遍认为是Hardcore和Hardstyle的各类分支。通常情况下Hard Dance Music是对多种风格的统称，无法指代任一种特定风格或作品。这一领域内的音乐BPM往往更为舞池所生，青睐使用重度失真的Kick Drum和Bassline，以及突出具有侵略性的Lead音色，各频段分配饱满，响度通常较大。", "chapter": "HDM", "examples": ["10000 Lovers - 罗百吉 (具体风格是Dancecore/Handz Up) [2:30起始]"]}, "kusoikore": {"name": "Kusoikore", "ups": ["Lolicore", "Shitcore", "Noise"], "downs": [], "aka": "", "related": "", "desc": "Kusoikore是Lolicore的一个分支，由日本制作人CDR首创。Kusoikore中的Kusoi/クソい意为shit/fuck。顾名思义，Kusoikore是Lolicore的一个更偏向噪音的变体，将Shitcore元素与噪音、Mashcore、Nightcore、Nerdcore Techno 和Glitch等融合在一起。随着CDR的作品在Breakcore社区的传播，一些制作人也开始制作这类声音，有些人甚至在The Worst唱片公司发行了自己的作品。", "chapter": "Breakbeat", "examples": ["Way To AMEN - Himeko Katagiri", "Melt vs. Melt (Expansion Kit) - Cyte"]}, "modern breakcore": {"name": "Modern Breakcore", "ups": ["Breakcore"], "downs": [], "aka": "", "related": "", "desc": "更趋于现代化制作的碎核，拥有更清晰的质感和固定的编排，并且逐渐向网络渗透，成为了一种后互联网美学风格，与故障艺术等均有交叉。经过十余年的沉淀后，碎核重新以新的形态活跃在互联网，这时的创作者包括Goreshit、かめりあ等。后续以Sewerslvt为首的网络电子音乐制作人掀起了网络碎核制作潮流，碎核逐渐脱离原本的定义，变成了更多样化的互联网亚文化碎拍音乐。", "chapter": "Breakbeat", "examples": ["Break the Silence - かめりあ"]}, "atmospheric breakcore": {"name": "Atmospheric Breakcore", "ups": ["Atmospheric Jungle", "Modern Breakcore"], "downs": ["Depressive Breakcore", "Chill Breakcore", "Hyper Trance", "Dariacore"], "aka": "", "related": "", "desc": "这更多是一种标签。与Atmospheric Breaks对应的也有Atmospheric Breakcore，在10年代晚期到现在迎来了一波复兴。并与Hypertrance运动遥相呼应。Atmospheric Breakcore拥有更接近Darkcore Jungle的鼓组，并大肆渲染氛围，营造飘飘然的氛围感，为情感造势。代表性的音乐人包括Sewerslvt, SPURME, Yung Lain等。有趣的是Atmosperic Jungle的诞生和流行地都是西方互联网而非日韩，这也与当下青少年心理状况有一定联系。", "chapter": "Breakbeat", "examples": ["Swinging In His Cell - Sewerslvt（2:40后）"]}, "depressive breakcore": {"name": "Depressive Breakcore", "ups": ["Atmospheric Breakcore", "Ambient"], "downs": ["Hyper Trance"], "aka": "", "related": "", "desc": "近几年新兴的一种Breakcore表现形式，类似于Atmospheric Breakcore不过听感很压抑、沉重，与当代年轻人亚文化紧密相连，故听众们贴上了“Depressive/抑郁的” 的标签。该流派的音乐在最近（大约2017之后）在互联网上（尤其是YouTube）广受欢迎，并与二次元文化交融在一起，涌现出Sewerslvt、SPURME等优秀的制作人。", "chapter": "Breakbeat", "examples": ["anybody can find love (except you.) - hkmori"]}, "chill breakcore": {"name": "Chill Breakcore", "ups": ["Drum & Bass", "Atmospheric Breakcore", "Depressive Breakcore"], "downs": ["Hyper Trance"], "aka": "Liquid Breakcore", "related": "", "desc": "隶属于Atmospheric Breakcore的子标签，特征是更加舒缓的氛围和富裕流动性的鼓组，氛围更为轻松，与Depressive Breakcore相比站在对面。不过近年来制作Chill Breakcore的制作人开始外延碎核的概念，使得Drum & Bass成为了互联网碎核的主要表达方式，一定程度上出现了乱标签的情况，Breakcore的制作也逐渐向Jungle/Drum & Bass靠拢，有时候甚至直接把Atmospheric Drum & Bass叫做Chill Breakcore。", "chapter": "Breakbeat", "examples": ["Something that leads me to you. - zphr"]}, "drum & bass": {"name": "Drum & Bass", "ups": ["Ragga Jungle", "Darkcore Jungle", "Techno", "Breakbeat", "Hardcore etc."], "downs": ["Halftime", "Techstep", "Jazzstep", "Dancefloor Drum & Bass"], "aka": "Drum and Bass、Drum 'n' Bass、DnB、D 'n' B、D&B、Drum&Bass", "related": "", "desc": "Jungle一词所涉及的文化背景过于浓重，使得一部分制作人想要跳出牙买加雷鬼的框架，开发一种独立的音乐形式，这就是Drum & Bass。这个词早期用来形容盗版唱片电台/海盗电台播放的灵魂和放克音乐，后来被电音制作人用来称呼减少了雷鬼元素之后的jungle音乐。1995年，Goldie发行专辑Timeless, 正式将Drum and bass推向舞池，赢得一片好评。在这张专辑中你可以听出所有之后风格的雏形：Liquidfunk、Techstep、Jump-up、Atmospheric DnB。Goldie精巧构思，将来自牙买加的狂野，来自美国的碎拍音乐和英国的古典积淀进行了完美缝合。从此开始，DNB成为英国电子乐引以为傲的文化印记。 另外，还有一种说法。据称是英国唱片公司发觉到Jungle音乐的市场，想要发掘这种音乐，但是考虑到大部分Jungle制作人群体都是黑人。为了迎合白人听众的喜好，将搬到地上流行起来的Jungle称为“Drum & Bass”。", "chapter": "Breakbeat", "examples": ["Angel - Goldie"]}, "nu-style hardstep": {"name": "Nu-style Hardstep", "ups": ["00s Hardstep", "Neurofunk"], "downs": ["Skullstep"], "aka": "", "related": "", "desc": "近年来随着Techstep回潮和Neuro Funk的流行，Hardstep融合了这些新的声音，发展出了Nu-style Hardstep。这种Hardstep听起来和Neurofunk比较像，不同之处是鼓组的节奏型仍然保持Hardstep节奏型，由于有一个空拍，显得压迫感更重一点，Bass也更偏向于Reese Rass的听感，撕裂感更强，是近年流行的特征。", "chapter": "Breakbeat", "examples": ["Legacy - Task Horizon"]}, "techstep": {"name": "Techstep", "ups": ["Darkcore Jungle", "Hardstep"], "downs": ["Neurofunk"], "aka": "", "related": "", "desc": "如果说听Darkcore是看恐怖电影的话，听Techstep就是科幻电影了。1995年，Ed rush和DJ Trace提出了Techstep这一概念，并带来了Techstep的第一首曲子：Mutant Jazz（Roller Instinct remix）。这种音乐以空旷缥缈的氛围音色和阴鸷狡猾的bassline营造零下70度的彻骨寒冷。Tech这个词并非来自底特律techno，而是代表从比利时传来的belgian techno. 正如其名，1982年的银翼杀手和1987年的机器警察等电影为Techstep提供了文化土壤。Techstep反对使用任何流行乐中的俗套人声、爵士元素，以工业感的音色设计对抗庸俗的消费主义。还融入了用于塑造工业空间的元素，鼓组自带写实的空旷感，以及仿照工业噪音所采用的高度失真的各类配器。在Techstep里你能听到各种各样的Sci-Fi声音：biubiu的激光声，冰冷的科幻氛围音和金属质感的鼓组。Techstep的Reese Bass也比之前的碎拍音乐更扭曲，类似酸性的转音滤波效果也更少，连绵不断、低频浑厚、有颗粒感（这种bass之后也被称为neuro bass）。大致上，可以说Techstep是第一个真正意义上的dnb子风格，因为它的听感已经与Jungle大相径庭。Metalheadz厂牌有许多Techstep的例子。 2020s左右，随着UK Dance和制作人Fred Again..的爆火，Techstep迎来了复兴热潮，一种部分继承了95s Techstep特质的DnB开始浮现，它们有着Techstep的听感——Sci-Fi音效，扭曲重复的鼓组，冰冷的bass，简单的架构，跟Neuro Funk更接近，但整体基调仍然保持着空洞与冷涩。", "chapter": "Breakbeat", "examples": ["Still Life (Photek Remix) - Goldie（Old）", "Thunder - Dom & Roland (Mid)", "Big Sound - Calyx & Teebee（New）"]}, "darkstep": {"name": "Darkstep", "ups": ["Techstep", "Darkcore Jungle"], "downs": ["Trancestep", "Neurofunk （00s）"], "aka": "Trancestep", "related": "", "desc": "Darkstep出现时间跟Techstep固定几乎差不多，如果不算Cross Breed的话，Darkstep无疑是Drum & Bass里最接近也是最像摇滚的子分支了。Darkstep就是Techstep框架去除Tech元素加入Dark Ambient形成的一种DnB，被认为是00s Neurofunk的先驱。由于融合了摇滚元素，打击感更强，常常出现16分鼓。当然，因为其迷幻性，也有将下文的Trancestep(DnB)与Darkstep混用名称的现象。", "chapter": "Breakbeat", "examples": ["Bitemark - Black Sun Empire", "Hostile - Dieselboy"]}, "jump up": {"name": "Jump Up", "ups": ["Jungle", "Hardstep", "Techstep"], "downs": ["Nu Jump Up"], "aka": "Jump-Up", "related": "", "desc": "在90s那一堆或氛围或深刻，听感不是很亲民的碎拍里，Jump up可以算得上一朵奇葩。在大节拍运动的影响下，它有着高bpm、简单的节奏、温暖风趣的旋律、肥厚的Wobble Bass、适合跳舞的律动，更加外露而狂野，甚至有时候还会夹杂一些Reggae，可以说是自Breakbeat Hardcore以来最快乐的碎拍之一了。 进入千禧年后，Jump Up产生了新的形式，这种形式的Jump Up拥有更加精简的鼓组和更简单的节奏，甚至与Dubstep产生了交集，充满了侵略感，不过这时的Jump Up仍保留着厚重的Bass。这时的Jump Up也适合新手EDM制作人模仿。 Nu Jump Up是Pendulum开创的新分支，保留了Jump Up的大致鼓组，但是制作上更接近Dancefloor Drum & Bass，不同的是Nu Jump Up融合的摇滚元素更多，更不像Jump Up。", "chapter": "Breakbeat", "examples": ["This Style - Shy FX (oldschool)", "Jump The Gun - Virtual Riot (newschool)"]}, "clownstep": {"name": "Clownstep", "ups": ["Jump Up", "Neurofunk", "Big Beat"], "downs": ["Jump up (Mainstream)/EDM Drum & Bass"], "aka": "", "related": "", "desc": "相比起一种独立的风格，Clownstep更像是对某些具有一定特征DnB的戏谑称呼。Clownstep有着在碎拍中少见的三连音swing节奏型，听起来很笨拙，适合舞池。2001年，Andy C与Shimon将Electro House的元素融入DnB，由此催生了Clownstep，Body Rock也被认为是第一首Clownstep。Clownstep出现即爆火，似乎预示了狭义EDM化DnB将于不久的未来席卷舞池，但是因此，这种风格也遭到了很多地下DnB制作人的批评。", "chapter": "Breakbeat", "examples": ["Mk Q - DJ Hazard"]}, "neurofunk": {"name": "Neurofunk", "ups": ["Techstep", "Darkstep"], "downs": ["Skullstep", "Neuro Hop"], "aka": "Neuro Funk、Neuro", "related": "", "desc": "厌倦了Techstep的空洞氛围和重复段落，碎拍制作人为了让Techstep听起来更猛更有活力，Neurofunk于1997年诞生。Neurofunk这一名字最早可以在Energy Flash: A Journey Through Rave Music and Dance Culture这本著作中看到。据解释，Neuro代表这类音乐听起来像脑神经活动，Neurofunk也确实是这种听感。作为Techstep的子风格，Neurofunk继承了其独特的科幻氛围，bpm加快，鼓组变重，元素也更多样化，并且Bass的调制程度进一步加深——正是因为这种失真Bass在Neurofunk中太过张扬，这种bass有了Neuro Bass这一称呼。随后，作为Techstep子风格的97s Neurofunk在99年之后逐渐销声匿迹，取而代之的是听起来更生猛更摇滚的主流Neurofunk。V Recordings厂牌中可以听到这种Neurofunk。 1999年后，Neurofunk逐渐吸收了Darkstep的特色，Bass的用法和编排接近现代手法。近年来，Neurofunk发展出了如今的主流表现方式，一跃成为Bass界最生猛的风格之一。Neurofunk最大的卖点就是其生动灵活的Neuro Bass，像破铜烂铁变成了活蹦乱跳的有机体。如果你对Bass有着极高的追求，那么Neurofunk绝对是最适合你的DnB风格。", "chapter": "Breakbeat", "examples": ["Splinter - Ed Rush / Optical / Fierce (old school)", "Winter War - Black Sun Empire (mid school)", "骤雨の狭間 – Silentroom (new school)"]}, "skullstep": {"name": "Skullstep", "ups": ["Techstep", "Darkstep", "Hardstep", "Metal", "Neuro Funk"], "downs": ["Cross Breed"], "aka": "", "related": "", "desc": "如果现实生活中你找不到人来敲你颅骨，而你又很想体验这种感觉，听Skullstep也许是你最佳的选择。和Neurofunk类似，Skullstep也是从Techstep分支出来的，甚至一度成为Techstep的代名词。这类音乐是DnB里最残忍最暴力的，以hardcore Jungle鼓为主要存在感和中高频，bassline的浑厚度和连续性明显要大于(强于)Techstep，并且更多倾向采用阴暗的氛围或主题，时而采样科幻或恐怖/惊悚体裁元素，且通常与四四拍Hardcore、死亡金属相关联。Skullstep使用的金属质感snare是其最大的特点，听起来就像真的有人往你的颅骨上狠狠地来上一锤(孙少安音)。", "chapter": "Breakbeat", "examples": ["Hard Way - Thrasher / Bong Ra / Limewax / The Har"]}, "jazzstep": {"name": "Jazzstep", "ups": ["Jungle", "Drum & Bass", "Jazz"], "downs": ["Liquidfunk"], "aka": "Jazz and Bass", "related": "", "desc": "Jazz一直是各种音乐的百搭元素，碎拍也不例外。在Jungle/Hardstep的基础上加上jazz元素就能得到爵爵子的Jazzstep。Jazzstep最早可见于Goldie的Inner City Life，爵士元素也是与DNB相伴相生的。除了萨克斯、木管、鼓刷等爵士乐配器之外，Jazzstep也引入了爵士乐的鼓组编排和旋律音阶。", "chapter": "Breakbeat", "examples": ["Jeamland 96 - B.L.I.M", "Mutant Jazz - UK Apache"]}, "liquidfunk": {"name": "Liquidfunk", "ups": ["Jazzstep"], "downs": ["Artcore"], "aka": "Liquid Drum & Bass、Liquid Drum and Bass、Liquid、Liquid Funk、Liquid DnB", "related": "", "desc": "94年左右，一些Atmospheric Jungle制作人尝试将自己的音乐变得不那么氛围化，更轻快，一种不同于之前厚重听感的Jungle/DnB由此诞生。Liquidfunk这一概念是在98年被Fabio提出的，这类音乐可以被大致称为proto-Liquidfunk。其制作人有ltj bukem，omni trio等。 当160-170bpm的鼓组与如流水般轻快的钢琴片段和空旷的环境音相碰撞，Liquidfunk便诞生了。1998年，Fabio和Sarah Sandy做了一些在dnb称霸的新型碎拍，他们把这种碎拍叫做“Liquidfunk”，他们也在自己厂牌Creative Source发表了同名专辑。2005年是Liquidfunk名声大噪之时，不计其数的厂牌和制作人开始着手这类音乐，包括Good Looking Records, Hospital Records和Liquid V等厂牌，High Contrast，London Elektricity，Calibre等制作人。DnB巨星Feint最初的几个作品也有Liquidfunk元素。 如今的Liquid Funk已经脱离了Jungle声音的约束了，变得更加轻盈活泼，应该算DNB中最清淡的一类。相较常规DnB的鼓组它有更多细小的节奏附点。总体来说节奏偏快，但作为Jazzstep的延续延展，时而融入一些oldskool（Jazz / Funk）元素，可以给听众制造一种清爽、轻盈而流动的听感。正是高bpm与轻松氛围这两个似乎冲突的特征才让Liquidfunk魅力独特。", "chapter": "Breakbeat", "examples": ["True Colours - JMJ & Richie (old)", "Memory Lane - Netsky (new)"]}, "sambass": {"name": "Sambass", "ups": ["Drum & Bass", "Samba", "Latin Jazz etc."], "downs": [], "aka": "Drum 'n' Bossa、Drum & Bossa、Drum 'n' Sambass、Drum & Samba、Samba & Bass、Brazilian Drum & Bass、Brazilian Sound", "related": "", "desc": "诞生于2001年的巴西的Drum & Bass亚流派，只在巴西等葡语地区流行过，曾被叫做Brazilian Drum & Bass。这种风格结合了DnB节奏和拉美音乐如Samba、Boss Nova、Latin Jazz的影响。据说由Fernando Porto & DJ Patife合作的单曲《Sambassiam》里首次被提及。主要制作人包括XRS Land、Bungle、DJ Marky等。", "chapter": "Breakbeat", "examples": ["Good Times - Bungle"]}, "microfunk": {"name": "Microfunk", "ups": ["Minimal Techno", "Minimal Drum & Bass", "IDM (Drill ‘n’ Bass)"], "downs": [], "aka": "Autonomic、Autonomic Sound", "related": "", "desc": "Drum & Bass融入IDM，glitch元素，以及Minimal音乐中的编排思路形成的风格，常与liquidfunk等轻量级DNB搭配使用。这类DnB有着类似Minimal Techno和Drill n Bass的俏皮听感，以对微小声音片段的处理见长，听Microfunk你会有一种asmr的舒适感，和Liquidfunk一样适合一个人静静欣赏。", "chapter": "Breakbeat", "examples": ["Alarm Clock - Microfunk Crew"]}, "drum funk": {"name": "Drum Funk", "ups": ["Drum & Bass", "Jungle", "Breakbeat"], "downs": [], "aka": "Edits、Choppage、Drumfunk、Drum-Funk", "related": "", "desc": "Drum Funk是Drum & Bass的一个早期流派，在世纪之交相当流行。这种风格并不注重旋律和架构，非常强调鼓编。因此Drum Funk常常被视为与Drum & Bass并列发展，因为其鼓组极端复杂，而声场强度则弱于Breakcore。The Project Paradox被认为是这种风格的先驱。", "chapter": "Breakbeat", "examples": ["Chords Of Sorrow - Nebula"]}, "atmospheric drum & bass": {"name": "Atmospheric Drum & Bass", "ups": ["Atmospheric Jungle", "Drum & Bass", "Ambient House"], "downs": ["Chill Breakcore"], "aka": "Ambient Jungle、Atmospheric Drum and Bass、Intelligent Drum and Bass", "related": "", "desc": "Atmospheric Drum & Bass是Atmospheric Jungle在Drum & Bass制作中的体现，出现在90s中期，特点是更快的Breakbeat鼓组和减弱声强的Kick和Bass。Atmospheric DnB是第一种重视旋律的Drum & Bass，常常使用缓慢、温暖的Bassline、干净的制作手法和慢节奏、充满氛围感的旋律，这些要素使得Atmospheric DnB更适合放松欣赏而非在舞池里播放。Atmospheric Jungle的代表性制作人LTJ Bukem也是Atmospheric Drum & Bass的开创者，Goldie、Photek等制作人也是这个风格的尝试者。后来随着Hardstep和Techstep的愈加流行，Atmospheric Drum & Bass退出主流市场，在地下对Jazzstep的声音做出影响。近年来，随着亚文化在后疫情时代的爆火，Atmospheric Drum & Bass逐渐以一种新的制作方式出现在公众视线里，并且跟随互联网逐渐流传开来。", "chapter": "Breakbeat", "examples": ["Music (Technicolour Rework) - LTJ Bukem (Old)", "Cyber Girlfriend - Aiku (New)"]}, "dreambreak": {"name": "Dreambreak", "ups": ["Drum & Bass", "Atmospheric Drum & Bass", "Jungle"], "downs": [], "aka": "", "related": "", "desc": "Dreambreak是由Goreshit提出的一个术语，后来由creakyboardz复兴，最后由Duskfall定义，用来描述Sewerslvt独创的“Atmospheric Drum & Bass”式音乐的新浪潮。在音乐上，这种风格强调氛围与“密度”，曲目通常以十分厚重的合成Pad音色、极度压缩的鼓组和复杂的音色层次为特色，鼓组使用Amen以及其他老派Breaks，所以经常以让人联想到Jungle或Breakcore的音乐形式。Dreambreak通常以突出的Bass为特色，与大多数现代Atmospheric Drum & Bass和Liquid Funk相比，Dreambreak更像一种“重型音乐”，声音明显不够“干净”、对大众友好，但它也同样重视歌曲氛围，混响对音乐氛围的营造有着非常大的作用。与之相似但风格迥异的是Depressive Breakcore，这是一种更快速、更压抑、更黑暗的风格，有时还与HexD、Lolicore、Neo Y2K、Hardcore Breaks等社区有关。", "chapter": "Breakbeat", "examples": ["Mr. Kill Myself - Sewerslvt"]}, "footwork jungle": {"name": "Footwork Jungle", "ups": ["Footwork", "Jungle", "Drum & Bass"], "downs": ["Footcore"], "aka": "Jungle Footwork、Future Juke、Jungle Juke", "related": "", "desc": "Footwork Jungle起源于2010年代早期UK Bass场景，后来在2010年代中期左右形成了一种成熟的风格，是一种Footwork+Drum & Bass音乐形式，BPM通常在160左右。这种音乐结合了Footwork的Percussion编排和切分节奏，以及DnB的Breaks和鼓点编排，将两者融合成一种风格，其特点是非常规的“疯狂”的鼓点和密集而不规则的节奏。许多Footwork Jungle制作人在采样时都会借鉴老式Footwork和老式DnB音乐的灵感，从而创造出一种更加变化多端的声音。虽然该流派名字里有“Jungle”，实际上Jungle也确实对这种音乐有着普遍的影响，但并非所有此类型的音乐都加入了Jungle元素，其他DnB流派（如Atmospheric Drum & Bass、Drumfunk甚至Jump-Up）也可能出现，除了特别融入的Footwork元素，Footwork相关流派（如Juke）、Ghettotech、Ghetto House、East Coast Club等风格的影响也不少见，某些制作人也将Hardcore Breaks、Breakbeat Hardcore、Darkside等流派的影响融入了这种风格。2010年代后期，一种寻求将Footwork与更新颖的元素相结合的音乐出现了，即“Footcore”，Footwork与Breakcore的结合体。", "chapter": "Breakbeat", "examples": ["Turbo Rave Artillery - Samurai Breaks"]}, "dubwise": {"name": "Dubwise", "ups": ["Drum & Bass", "Dub Reggae"], "downs": [], "aka": "Ragga Drum & Bass、Ragga Drum and Bass、Reggae Drum and Bass、Dubwise Drum and Bass、Dubwize、Dubwize Drum and Bass、Dubwise DnB", "related": "", "desc": "Dubwise是Drum & Bass的一个分支，出生于1998年，2000年开始流行，Dubwise已经在Drum&Bass的阴影下很长一段时间，大部分人在2000s中期之前都不知道它。最初的牙买加Dubwise由drums、deep bass、汽笛声采样和人声组成。在本世纪初，人们也仍然不认为Dubwise是DnB的一个分支，而是认为是“雷鬼音乐对Drum&Bass产生影响而诞生的风格”或“使用Dub bass的DnB”。虽然这种音乐与Ragga Jungle有一些相似之处，同样将Jungle与雷鬼、Dub的影响融合在一起，但Dubwise使用了更新的制作技术（2000年代后的DnB），减少了混乱原始的鼓点，采样更加精细，混音更加干净，Rave元素普遍减少，从而使其与前者的声音截然不同。Digital和Breakage被认为是这一流派的先驱，他们的一些作品如《So Vain / Mars》帮助这一流派得到了普及。后来的第二波制作人，如Aries、Benny Page、Theory、Division One，则从流派早期略显阴暗的声音中走了出来，进入了更温和的领域，并受到了当时新潮的Liquid Funk场景的影响。随着时间的推移，Totally Dubwise Recordings和Dubwise Station等专注于Dubwise的厂牌也相继成立。尽管雷鬼元素在2010年代的一些DnB风格（如Congo Natty的Dejay DnB风格）中变得更加突出，但Dubwise仍属于一种地下风格。", "chapter": "Breakbeat", "examples": ["Praise the King - Steve Heller"]}, "halftime": {"name": "Halftime", "ups": ["Drum & Bass", "Dubstep"], "downs": ["Halftime Neuro Funk (Tag)"], "aka": "Halftime Drum & Bass", "related": "", "desc": "Halftime是DnB的一种极简做法，更多利用了空拍或错拍去构造一种更多变莫测的节奏型。2010年，Black Sun Empire的专辑Lights and Wires积极拥抱了Dubstep时代的变化。The 405就是一首典型的Dubstep。Dubstep和Drum and Bass的碰撞造成了一个新的子流派的诞生：Halftime。从节奏型上看，Halftime也许更类似Dubstep而不是密集的Drum and Bass，所以是一种极其难分辨的风格。可以认为Halftime是Drum and Bass的灵活版：将Drum and Bass的主要底鼓和军鼓放慢一倍，但是保留Drum and Bass中精华的快速小打和镲乐器，给bass更多闪转腾挪的空间。", "chapter": "Breakbeat", "examples": ["Used Thug - Harka"]}, "industrial drum & bass": {"name": "Industrial Drum & Bass", "ups": ["Post-Industrial", "Drum & Bass"], "downs": ["Technoid/Techno Drum & Bass", "UK Dubstep"], "aka": "", "related": "", "desc": "在工业音乐与重金属流行时期诞生的DnB产物，将工业元素和Jungle/DnB结合起来，创新歌曲结构。由于这段时期正巧在Rave风潮期间，因此这类Drum & Bass仍有保留Hardcore Jungle的鼓组和音色。", "chapter": "Breakbeat", "examples": ["Escape - Limewax", "Hinterland - Cubanate"]}, "technoid": {"name": "Technoid", "ups": ["Industrial Drum & Bass", "Power Noise"], "downs": [], "aka": "/Related To: Techno Drum & Bass", "related": "", "desc": "属于Industrial Drum & Bass的子分支，从Power Noise/Rhythmic Noise场景中诞生，受到IDM、Experimental Techno和噪音音乐的灵感，此风格由德国厂牌Hymen Records提出。另外一种Technoid的意义是Techno和DnB的融合风格，此时又叫做Techno DnB，是Techstep和Neurofunk融合的结果，在此处暂不做区分。", "chapter": "Breakbeat", "examples": ["6ft Ditch - Raiden"]}, "psy drum & bass": {"name": "Psy Drum & Bass", "ups": ["Psy Trance", "Drum & Bass"], "downs": [], "aka": "Psy DnB", "related": "", "desc": "Psy DnB是一个标签，由制作人Rameses B首次提出。Rameses B也是该流派的代表制作人，最早出自90年代末期（1997年左右），在2000年后大量涌现，特点是将Psy Bass与DnB的鼓组融合在一起，一般来说也有两种形式，一种是将Psy Bassline融合进Drum & Bass的鼓编里；另一种则是Psy Trance等与Drum & Bass的生硬拼贴。", "chapter": "Breakbeat", "examples": ["King Slayer - Remeses B"]}, "electrostep": {"name": "Electrostep", "ups": ["Darkstep", "Jazzstep", "Electro House", "Rock", "Disco"], "downs": [], "aka": "", "related": "", "desc": "出现在2002前的Drum & Bass微流派。该流派沿袭了Darkstep的猛烈敲击，但是并没有那般压抑的氛围，反而继承了Jazzstep的轻松愉快，最大的特点则是来自Electro House电气化的声音。有时候这种风格甚至会融合摇滚或者Disco音乐甚至流行交响乐，显得更加多样化。这种风格据称由John B提出。", "chapter": "Breakbeat", "examples": ["For You See Me (John B Remix) (Howard Jones) - John B"]}, "artcore": {"name": "Artcore", "ups": ["Liquid Funk", "Melodic Drum & Bass", "J-core/Nerdcore"], "downs": ["Pianocore", "Requiem Trancecore [DJ Genki/Gram's Personal Tag]"], "aka": "", "related": "Artcore Drum and Bass", "desc": "艺术核Artcore是当今最流行的日系电子分支之一，最早使用于石川贵之的专辑《A》(2002年)，与Early Artcore流行年代相差无几，因此常被认为与Early Artcore有关。Artcore这个概念是用于形容那些管弦乐融入电子音乐鼓点间的产物。Artcore一般是以Drum & Bass形式出现的，但是也有以J-core和IDM形式出现的。制作人An、Sakuzyo、Onoken、xi、Feryquitous、ak+q为这种风格的代表人物。", "chapter": "Breakbeat", "examples": ["Lisrim - onoken"]}, "pianocore": {"name": "Pianocore", "ups": ["Artcore"], "downs": [], "aka": "", "related": "", "desc": "不同于Piano Hardcore，Piano Hardcore是一种Breakbeat Hardcore/Old School Happycore分支。 Pianocore是Artcore唯一子流派，特指那些以钢琴为主要配器或唯一配器的Artcore。这类Drum & Bass一般拥有一段流畅的Piano Lead Solo，并时常有Piano Lead跟随鼓点在Drop段或Break段出现。当然，这类音乐同样是常以Drum & Bass形式展开的。", "chapter": "Breakbeat", "examples": ["Wizdomiot - LeaF"]}, "post-dubstep": {"name": "Post-Dubstep", "ups": ["Dubstep", "Future Garage", "Alternative R&B", "UK Funky"], "downs": [], "aka": "", "related": "Ambient Dubstep", "desc": "Post-Dubstep是00年代后期从Dubstep和Future Garage场景发展而来的一种音乐流派，与Dubstep（尤其是2010s在全球大行其道的Brostep与UK Bass场景下的Tearout等）的激进而喧闹的趋势形成了鲜明对比。英国制作人们在Dubstep最狂热的时期决定逆潮流，将Dubstep做的更轻柔和有趣。在他们看来，Dubstep不应该沉湎于伦敦地下世界的陈旧气息，也不应该全面向商业投降，而应该结合有趣多彩的市民文化，体现出文艺、随性和内省的精神。Post-Dubstep放弃了失真、重型、低音炮的发展方向，转而向相反的方向发展，注重氛围，声音更温暖，结构更非传统，也不那么以派对为导向。Post-Dubstep继承并进一步发扬了Dubstep中自由、律动、破碎的节奏和沉重的Sub Bass，尤其受到了Burial作品的影响。节奏通常较慢，在110-130BPM之间，源于Dubstep，但通常与Dubstep格格不入，而是经常受到UK Funky的影响，偶尔也会受到Wonky、Footwork甚至IDM的影响。Post-Dubstep的特点是使用氛围Pad、安静的合成器和细腻的Pluck旋律，注重音色，还经常使用人声处理，无论是录音还是采样，通常都以Vocal Chops为特色。Post-Dubstep的另一个特点是融入了R&B、独立音乐流派的偏感性的元素与非电子乐元素，经常与同时代兴起的Alternative R&B和Chillwave产生交叉影响，导致了这是一种与20世纪90年代兴起的IDM/Electronica不同的声音，与当时充满活力的Rave音乐更是形成了鲜明对比。这一术语被认为起源于Mount Kimbie，他们的EP《Maybes》标志着这一流派的正式诞生。2010年，他们发行的Crooks & Lovers，结合了Dubstep、Future Garage、嘻哈、爵士、噪音摇滚的元素，让人耳目一新。同时James Blake的EP和同名专辑也大获成功，同样成为了这一流派的先驱。Jamie xx和SBTRKT很快也推出了自己的专辑，大大推动了Post-Dubstep音乐的流行。Hemlock Recordings和Hotflush Recordings等厂牌以及Joy Orbison、Deadboy、Koreless、Hackman、Bwana、Fantastic Mr Fox等制作人，尽管风格迥异，但都为这一流派做出了贡献。尽管Post-Dubstep在2010年代初期取得了巨大成功，但在后期却逐渐式微，大多数制作人都朝着不同的方向发展，有的甚至完全放弃了电子音乐的根基（如先驱Mount Kimbie和James Blake）。", "chapter": "UK Bass", "examples": ["Hero - Extreme Music【https://www.youtube.com/watch?v=xMjV-FDjeZA】"]}, "uk garage": {"name": "UK Garage", "ups": ["Garage House", "Breakbeat", "Jungle", "Reggae"], "downs": ["UK Funky", "Bassline", "Grime", "Dubstep", "Future Garage"], "aka": "UKG", "related": "", "desc": "UK Garage/UKG/车库音乐是一种主要来自英国的电子舞曲，从20世纪90年代初从Garage House场景中脱离出来，并在英国产生一系列变体。90年代初，北伦敦的DJ EZ把来自美国的Garage House速度进一步增加，并结合了英国盛行的的Breakbeat、Jungle、Reggae等元素，形成了Speed Garage、2-step等风格标签，这些音乐后来被统称为UK Garage。车库音乐经常受到各种具有“城市感”音乐流派的影响，如当代R&B、Hip-Hop，以及其他多种形式的电子音乐，比如Deep House、Drum & Bass、IDM等。UK Garage的主流流行度在千禧年前后达到顶峰，So Solid Crew和The Streets等艺术家都制作过曾在英国获得单曲榜冠军的车库作品。由于UK Garage融合了多种风格，因此诞生了许多子流派，包括Future Garage、2-step等。UK Garage与Garage House区分的根本之处在于，UK Garage形成了自己的碎拍声音，也就是后面要说的2-step鼓组。这个鼓组将是改变世界主流电子音乐的设计，直接对后来的Dubstep、Grime、Trap等音乐流派的发展都产生了很大的影响。", "chapter": "UK Bass", "examples": ["You & Me (feat. Eliza Doolittle) - Disclosure【https://www.youtube.com/watch?v=YdUPQ-UW8mE】"]}, "dark garage": {"name": "Dark Garage", "ups": ["UK Garage"], "downs": ["Grime", "Dubstep"], "aka": "", "related": "", "desc": "Dark Garage的定义较为模糊。最早可以追溯到90年代末Armand van Helden等人的作品，如《Spin Spin Sugar (Armand's Dark Garage Mix)》，此外还有一些乐评人将Burial的早期专辑《Burial》《Untrue》中的作品称为Dark Garage。总之，Dark Garage是UK Garage一种较为地下、黑暗的变体，并为多种更为明确的风格提供了基础。20世纪90年代末，由Wookie、Zed Bias、Shy Cookie、El-B、Artwork（DND乐队成员）等人制作的Dark Garage音乐为Grime和Dubstep奠定了基础。“DJ Narrows挖掘了Dark Garage的深层内涵：这是21世纪头几年开始流行的一种情绪化、颓废的UKG风格。这种声音后来被证明对Grime和Dubstep的发展都有重要影响。”", "chapter": "UK Bass", "examples": ["Murderous Style - Dub War【https://www.youtube.com/watch?v=24y1ZkTwlBM】", "Express - Ghost"]}, "speed garage": {"name": "Speed Garage", "ups": ["UK Garage", "Jungle", "Dub"], "downs": ["4×4 Garage", "Donk"], "aka": "", "related": "", "desc": "Speed Garage一般被认为是最早的UK Garage子风格，由DJ EZ首创，是纽约Garage/Garage House的“加速版”，有着非常明显的4 on the floor节奏，深受Jungle的影响，并结合了大量Jungle、Dub的元素。Speed Garage的特点有失真、厚实、有弹性的Bass，经常被拉长的人声等。唱片制作人、DJ、混音师Armand Van Helden是Speed Garage的先驱，几乎是凭借自己的混音作品一手开创并引领了这一音乐流派。Speed Garage在美国和英国都有流行，但声音上略有不同。Loop da Loop、187 Lockdown、Armand Van Helden被称为Speed Garage的三大核心混音师。Speed Garage的成功是短暂的，在1997年的音乐市场中占主导地位后便几乎销声匿迹，但它帮助UK Garage拉开了序幕，并在后续演变成了多种流派。", "chapter": "UK Bass", "examples": ["Gunman - 187 Lockdown【https://www.youtube.com/watch?v=j9kHflDyASI】", "The Line (Loop da Loop Uptown Mix) - Lisa Stansfield"]}, "2-step garage": {"name": "2-step Garage", "ups": ["UK Garage"], "downs": ["Dubstep"], "aka": "2-Step、2 Step、Dark Swing", "related": "", "desc": "2-step是20世纪90年代末流行的一种UK Garage音乐，在1997-1999年期间迅速发展，是与车库另一领域4×4对立的流派。这种音乐起源于伦敦，其特点是摇摆的节奏，很少遵循4 on the floor的节奏模式，而且节奏相对缓慢，与典型的其他俱乐部音乐格格不入。简单地理解，Speed Garage更多是提升了Garage House的速度，在附点上加入碎拍而非改变底鼓的传统排列，而从2-step开始，Garage逐渐摆脱4/4拍的底鼓排列，鼓点变得更加不规则和摇摆，Bassline也由此取得更多的发挥空间。2-step主要基于悠闲、放松的Funk节拍，音乐有着很强的质感，强调流畅而不抢耳的旋律、氛围和深沉、柔和的Bass。此外，无论是在唱片中还是在现场演出中，嘻哈元素在2-step中也很常见。这种音乐的创始人是MJ Cole和Wookie。", "chapter": "UK Bass", "examples": ["Northbound - Dusky【https://www.youtube.com/watch?v=TjTfBdQpJCA】"]}, "4×4 garage": {"name": "4×4 Garage", "ups": ["UK Garage", "Speed Garage"], "downs": ["Bassline"], "aka": "4×4", "related": "", "desc": "1999年，UKG的声音一分为二：4×4与2-step。随着趋势的变化，人们对2-step的关注度越来越高，逐渐抛弃了传统的4×4节拍。2000年代初，一大批才华横溢的新制作人在保留90年代经典音乐元素的同时，将4×4 Garage音乐重新带到音乐市场中。与经典的4×4最大的不同是，速度更快了一些，声音也更强调律动感、弹跳感以及错综复杂、R&B影响的Vocal Chops而不是完整的人声采样。这是一个非常有趣的时期，各种4×4音乐层出不穷，有了Qualifide、DJ Ski、Duncan Powell等新面孔与Club Asylum、Todd Edwards、Karl Brown等先驱一起制作，甚至El-B也用“El-Tuff”的名字与Karl Brown进行了一系列合作。4×4 Garage是一个过渡时期，常常与后来的Bassline场景混为一谈。在Bassline中，4×4节奏依然存在，但主要强调黑暗的Bassline。90年代末Speed Garage时代的许多曲目后来也被称为4×4，即“第二波Speed Garage浪潮”，这里不详细介绍。", "chapter": "UK Bass", "examples": ["You Are My All - Todd Edwards【https://www.youtube.com/watch?v=hawItSGIpi4】"]}, "bassline": {"name": "Bassline", "ups": ["UK Garage", "Speed Garage", "4×4 Garage", "UK Dubstep"], "downs": ["UK Jackin'"], "aka": "4×4 Bassline Garage、Bassline Garage、Niche", "related": "", "desc": "", "chapter": "UK Bass", "examples": ["Girl Thing - A1 Bassline【https://www.youtube.com/watch?v=2pLLqLQIwtM】"]}, "uk jackin'": {"name": "UK Jackin'", "ups": ["Bassline", "House"], "downs": ["Bass House"], "aka": "UK Jackin、UK Jackin House、House & Bass、Bassline House、Jackin Bass House", "related": "", "desc": "这一流派往往因为名字而与Jackin' House混为一谈，实际上不应如此。UK Jackin最初是一种场景，后来成为UKG & House的一种流派，在00代末从英国Bassline场景中发展出来，并成为北英格兰（尤其是伯明翰和利兹）各地俱乐部家喻户晓的一种流派。多年来，UK Jackin的声音不断演变。最早的UK Jackin以更俏皮的House风格为特色，包括126BPM左右的House节拍、来自流行/R&B歌曲的人声采样，以及类似于其前身（2000年代的Bassline Garage）的肥厚有弹性的Bass。简单地说，UK Jackin就是House节奏的Bassline音乐。UK Jackin一开始也是以House风格为特色，如钢琴旋律、说唱等，后来更加专注于Bass的表现，并从其当代兄弟流派UK Deep House、Deep Tech、Future House中汲取灵感，有时听起来也像G-House，但Bassline的制作有所不同，也不太注重黑暗的人声和嘻哈音乐的影响。UK Jackin的出现是Bassline衰退的结果：00年代末期，Bassline曾一度风靡全英，然而这种发源于英格兰北部的音乐风格很快就与毒品和暴力联系在了一起，为了避免“Bassline”在公众心目中造成更多问题，一些艺术家将这一流派与House的节奏和制作相融合，并将其更名为Jackin（一种流行的舞蹈风格）。这一流派由UK Jackin教父Chris Lorenzo创立，许多人认为，由Lorenzo、Jayye Jackin、Dappa D合作的《Come With Me》是第一首UK Jackin歌曲，三人随后又推出了《Let Me Clear My Throat》和《Love for Me》等歌曲。在新旧十年交替之际，UK Jackin很快进入了伦敦的市中心俱乐部。通过Marcus Nasty、Marcus Nasty、DJ Shorterz等DJ和电台推广人，UK Jackin无疑成为了英国俱乐部当时几年的必备音乐。尽管UK Jackin在英国俱乐部取得了一定的成功，但这种音乐风格在其早期的大部分时间里都停留在小场景中，甚至在俱乐部场景之外的英国其他地方几乎没有流行起来。近年来，这种音乐风格也日渐式微，在Bassline Revival、“Heavy Bass” Tech House、Deep Tech以及Slap House等新浪潮的冲击下，逐渐失去了人气。不过，近年来，随着Bassline的复兴，该流派在“Bassy House”运动中有所复苏，主要集中在美国的Night Bass等唱片公司，对同时流行的Bass House也产生了很大影响。", "chapter": "UK Bass", "examples": ["Hit List - Bleu Clair / Drinks On Me【https://www.youtube.com/watch?v=jGiiBep-RYY】"]}, "breakstep": {"name": "Breakstep", "ups": ["UK Garage", "Breakbeat", "Drum & Bass"], "downs": ["UK Dubstep"], "aka": "Breakbeat Garage", "related": "", "desc": "Breakstep是UK Garage的一个子流派，与其他子流派的不同之处在于Breakstep使用侵略感很强的Breakbeat节奏，而不是充满律动的2-step或4x4节奏，同时还注重厚重的Rolling Basslines，曲目中往往缺少UK Garage中的现代的R&B人声，音乐受到了强烈的Nu Skool Breaks、Techstep等流派的影响。2000年，这一流派迅速崛起，Deekline的《I Don't Smoke》和Zinc的《138 Trek》成为当时的当红曲目，它们各自的厂牌Rat Records和Bingo Beats也标志着Breakstep在
