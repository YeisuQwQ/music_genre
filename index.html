"Retro EDM", "ups": ["Synthwave", "Electronic Dance Music"], "downs": [], "aka": "R.E.D.M.", "related": "", "desc": "R.E.D.M.是由Electro、House、其他EDM制作人在脱离了Synthwave社区之外创作的音乐，他们偶尔会将自己音乐的视觉风格和音乐风格逐渐转换为Synthwave。这些音乐通常在非Synthwave的厂牌发布，并结合了其他流派元素以保证实验性、多样性，避免做成传统而模板化的Synthwave。", "chapter": "Indie", "examples": ["R.E.D.M. - VHS Dreams【https://www.youtube.com/watch?v=X3aT3p1oGEQ】"]}, "freshwave": {"name": "Freshwave", "ups": ["Synthwave", "R&B", "Freestyle"], "downs": [], "aka": "Retro R&B", "related": "", "desc": "Freshwave是Synthwave的一种小众风格，专注于“城市感”的80年代流行音乐和R&B电台，这些音乐融合了嘻哈、Old School Electro、Synth Funk、Boogie、Freestyle。只有少数制作人制作了向这一方向发展的Synthwave专辑，代表着从过去到现在Synthwave场景中被忽视的关键部分。说唱歌手Keith Masters一直是Freshwave重要艺术家之一，Dana Jean Phoenix和Miranda Carey等歌手也同样创作了很多这种音乐。其他艺术家如DJ Ten、Robots With Rayguns、Sunglasses Kid、Highway Superstar，都为不同的Freshwave风格做出了贡献。", "chapter": "Indie", "examples": ["Steal My Love - Sunglasses Kid / Miranda Carey【https://www.youtube.com/watch?v=jEzGNmbYEgc】"]}, "idm": {"name": "IDM", "ups": ["Ambient Techno", "Downtempo", "Breakbeat", "Jungle"], "downs": ["Drill 'n' Bass", "Flashcore", "Live Coding"], "aka": "Intelligent Dance Music、Braindance、Electronic Listening Music", "related": "", "desc": "IDM全称Intelligent Dance Music，即智能舞曲，“智能舞曲”一词诞生于90年代早期的英国、并流行于90年代至2005年，这是一种高度将当时欧洲盛行的电子类型加以融合带向更加实验的方向、供家中“聆听”而非用来跳舞的音乐。IDM由Ambient Techno的声音变化而来，随后消解了舞曲和舞池的联系，基于Breakbeat、与Jungle鼓组的紧密契合则造就了它更强的锐舞性，在电子音乐的基础上更趋向于Downtempo。在音乐形式上，由于IDM是个因融合性而诞生的类型，所以并没有圈死的定义，仅有几个大部分作品的共同点：注重氛围；工业化、细碎化、甚至失真且刺耳的Hi-Hats/乱七八糟的Percussion音色设计；基于碎拍/Jungle形式的鼓组。IDM也是中国最早的电子乐迷所追逐研究的风格之一，当时中国的电子乐迷听的最多的就是IDM和Trip Hop。制作人有Aphex Twin、The Orb、Autechre、The Black Dog、B12等。知名厂牌有Warp Records、Rephlex、Isophlux Records、Rising High、Fat Cat、Astralwerks、M-Tronic Records、Drop Beat、Suction、Schematic、Cytrax等。", "chapter": "Indie", "examples": ["Alberto Balsalm - Aphex Twin【https://www.youtube.com/watch?v=s4pQ5aj6vx8】", "Windowlicker - Aphex Twin"]}, "drill 'n' bass": {"name": "Drill 'n' Bass", "ups": ["IDM", "Drum & Bass"], "downs": [], "aka": "Experimental Jungle、Spunk Jazz、Fungle、Drill & Bass、Drill and Bass", "related": "", "desc": "Drill 'n' Bass起源于1995年的英国，流行于1998年，衰退于2000年。上世纪90年代中期，Aphex Twin、Squarepusher等英国电子乐制作人在接触到Drum & Bass后不久，就自然而然地将其改编成了自己的风格。Drill & Bass是一种“变异”形式的Breakbeat/Jungle音乐，依靠先进的DAW制作和细致的音色设计，将旧式中速Breakbeat改造成一种疯狂的、实验性的、甚至“随机”的电子音乐，由IDM衍生而来，也会加入Jungle、Breakbeat和Drum & Bass等元素。从1995年开始，有三位制作人率先推出了首批EP：Aphex Twin的《Hangable Auto Bulb EP》、Luke Vibert的Plug项目《Plug 1》和 Squarepusher的《Conumber e:p》。次年，上述制作人相继推出了更多专辑，其中最著名的是Plug的《Drum 'n' bass for Papa》和Squarepusher的首张专辑《Feed Me Weird Things》。很快，这股热潮传遍了世界，涌现出一批与Drill 'n' bass有着密切联系的艺术家，其中包括Animals on Wheels、Amon Tobin、Clifford Gilberto Rhythm Combination。该风格有时会与Breakcore相关联，制作人Venetian Snares等的歌曲有时会模糊两者之间的界限。代表制作人有Aphex Twin，Squarepusher，Luke Vibert，Kid606。", "chapter": "Indie", "examples": ["The Exploding Psychology - Squarepusher【https://www.youtube.com/watch?v=ruc0TnSSi9Y】", "Terminal Slam - Squarepusher"]}, "flashcore": {"name": "Flashcore", "ups": ["IDM", "Speedcore"], "downs": ["Proto-Flashcore", "Pure Flashcore", "Industrial Flashcore"], "aka": "", "related": "Flash", "desc": "Flashcore是一种较前卫的IDM子风格，也属Speedcore子分支，可以缩写为Flash（Flash是Flashcore的前身，现在Flash和Flashcore已经不做区分，现在的Flash常常指带有明显IDM听感的Flashcore，有时也包含了Pigeon Breakcore领域，又叫IDM-y Breakcore，参考i broke my robot的曲目），其特点是极其复杂的节奏结构，与Speedcore相同的强烈速度，单一风格的节拍序列，粗糙、纹理密集的幻听和超精细的数字音景相结合。噪音的大量使用以及实验性的打击乐技术，使得Flashcore在它所衍生的流派中，尤其是Breakcore、Speedcore和DJ文化中，具有很强的独特性。同时Flashcore非常讲究拼贴艺术，不同制作人的Flashcore各不相同，且随着年份的推移，Flashcore的声音越来越偏离Speedcore，而具有更强的实验特质。重要制作人：La Peste/Krystal Jesus、Neurocore、Atomhead、La Foudre、UndaCova、Mouse、Sedarka、Duncan Avoid、Kaebin Yield、Richard Devine、Datach’i、Xanopticon、Binray、Terminal 11、Qebrus、HFK、Satanoid、Icoste。", "chapter": "Indie", "examples": ["◙ - Qebrus【专辑：◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙◙】【https://www.youtube.com/watch?v=MaEmjammJIM&t=136s】（1：46开始）", "Gloom - TSVI / Loraine James (偏拼贴)", "Abyssal Remix - amaranth_todd / prox.Bleep (偏故障)", "Ungrokd - Xanopticon (偏碎核)"]}, "live coding": {"name": "Live Coding", "ups": ["IDM"], "downs": ["Algorave"], "aka": "", "related": "", "desc": "在过去的几年里，一种新的关于计算机音乐表演的跨媒体艺术领域崭露头角：现场编码。表演者在表演过程中制作或修改软件模拟出的乐器。这种技术的一个好处是，表演者可以在算法而非音符的领域内进行即兴表演，同时可以投屏源代码，让观众对所使用的算法有大致的感受，而不是传统计算机音乐中仅通过音乐本身对算法进行感知。由于该流派的“现场”性质，官方发行展示该流派的唱片并不多。", "chapter": "Indie", "examples": ["Humans Riding On Bicycles Taking Selfies - Kindohm【https://www.youtube.com/watch?v=cKaNd5kBK4s】"]}, "electronica": {"name": "Electronica", "ups": [], "downs": ["Funktronica", "Folktronica", "Indietronica"], "aka": "", "related": "", "desc": "Electronica并不是一种具体的音乐风格，而是一种电子音乐的范畴，被用于泛指一类不嘈杂的电子音乐，它先天就不是为了让人去尽兴Rave的，但依旧继承了些许舞曲节拍。一般来说Electronica会有几个共同点：注重氛围（不论是迷幻的、惬意的还是紧张的）；“minimal”化的鼓组以及处理得十分细节的鼓组编排；简单的音色设计；歌曲听起来“小巧且精致”。总体来说Electronica的节奏通常比较舒缓，与Chillout有点相似，但所承载的内容要更丰富变幻，表达的情感也丰富多样。由于是个范畴名词，通常也体现为不同的具体形态，根据配器不同可以分为Folktronica、Funktronica、Indietronica、Chillwave等。", "chapter": "Indie", "examples": ["Cirrus - Bonobo【https://www.youtube.com/watch?v=WF34N4gJAKE】", "No Good For Me - Kučka"]}, "funktronica": {"name": "Funktronica", "ups": ["Electronica", "Synth Funk", "Italo-Disco"], "downs": [], "aka": "", "related": "", "desc": "Funktronica大约起源于20~21世纪之交的北美东部，是一种结合了Synth Funk和Italo-Disco趋势的电子音乐。Funktronica在某些方面与Nu-Disco相似（也有Italo-Disco的元素），但更直接与80年代的Synth Funk相似，节奏比Nu-Disco稍快，旋律也没有那么顺滑、流畅，节拍是更轻快、细腻的，听感是幽默俏皮的。这种音乐强调使用复古采样器/音序器、电贝斯（经常使用Slap技巧）、声码器、电吉他、键盘和合成器，节奏通常由简单的4/4鼓点组成，与多数Funk和摇滚音乐类似，但鼓组中的骑钹（Ride Cymbals）并不常用。这种音乐通过简单的鼓编与Funky Bass的配合，达成一种特殊的律动感。Chromeo组合开创了Funktronica并将其列为一种音乐风格，与其他制作人的风格相比，他们的音乐风格更Funky、更复古，而且突破了Blog House/Electro House的束缚，最终成为了代表Funktronica制作人的典范。制作人/乐队有Chromeo、The Knocks、French Horn Rebellion、Marc Hamill等。", "chapter": "Indie", "examples": ["Don't Turn The Lights On - Chromeo【https://www.youtube.com/watch?v=TuM5pB4dE-A】"]}, "jazztronica": {"name": "Jazztronica", "ups": ["Electronica", "Jazz"], "downs": [], "aka": "", "related": "Nu-Jazz、Electro Jazz", "desc": "Jazztronica是一种电子乐和爵士的结合体，融合了Funk、Free Improvisation（自由即兴）等元素，不等于Jazz House、Nu-Jazz。与其他Jazz Fusion（如Acid Jazz）音乐相比，Jazztronica更偏向Electronica，更注重电子元素，本质上也可以非常实验性，更远离蓝调的影响，转而探索电子音乐的空灵和感性。", "chapter": "Indie", "examples": ["Contrails - Xeuphoria【https://www.youtube.com/watch?v=R6DW1dGGeys】", "Love for Sale (Ornithology Remix) - Chet Baker / Ornithology"]}, "indietronica": {"name": "Indietronica", "ups": ["Electronica", "Alternative Dance", "Indie Rock", "Synth-pop"], "downs": ["Chillwave"], "aka": "Indietronics、Indie Electronic、Lap-Pop", "related": "", "desc": "“独立电子乐/Indietronica”是独立摇滚和电子音乐的结合体，始于1990年代初期至中期，由Stereolab和Broadcast等摇滚乐队首次制作，由90年代的另类舞曲（Alternative Dance）和Altronica（另类舞曲与电子融合音乐的统称）演变而来，并受到了受到了Krautrock（泡菜摇滚）、Synth-pop等电子音乐形式的影响，但通常并不以舞曲为导向，而是融合了IDM和Glitch元素。虽然它是一个松散的流派，与Dance-Punk、Electropop、Electroclash、New Rave、Alternative Dance Revival和Electro House等流派都有重叠，但独立电子乐听起来实际上并不像这些流派中的任何一个。这是一种更加灵活多变的音乐，合成器和乐器基本上都用廉价、独立制作人负担得起的设备，保留了Electronica的灵性并加入独立摇滚的“卧室感”、“DIY感”，时至今日已成为一种流行的流派。2000年代初以后，由于录音和软件合成的便利性，制作人数量快速增长。其他制作人有múm、Lali Puna和Schneider TM。", "chapter": "Indie", "examples": ["莲花 - 龙宽九段【https://www.youtube.com/watch?v=p76nUqqdNWU】（1：24开始）"]}, "chillwave": {"name": "Chillwave", "ups": ["Indietronica", "Hypnogogic Pop"], "downs": ["Chillsynth", "Vaporwave"], "aka": "Dream-Beat", "related": "Glo-Fi", "desc": "出现于2000年代后期，最初是Glo-Fi和Hypnogogic Pop的代名词，往往模仿80年代的音乐，加入怀旧、梦幻的复古潮流元素，迷幻柔和的人声，大量的混响，BPM较慢，在直观听感上往往能让人联想到海浪、粉色气泡、橙子汽水之类的意象。“Chillwave”一词由Hipster Runoff在2009年提出，最初用于讽刺该流派，在此之前这些音乐被标记为Shoegaze、Dream-pop、Ambient、Indietronica，Washed Out的2009年单曲《Feel It All Around》直至现在仍然是最著名的Chillwave歌曲。注意Chillwave和Synthwave一类没有关系，仅是Indietronica分支，只不过在2010年代影响并催生了Vaporwave场景。", "chapter": "Indie", "examples": ["A Walk - Tycho【https://www.youtube.com/watch?v=AX6QSVdJe1Y】", "Pure - Blackbird Blackbird"]}, "ethnic electronica": {"name": "Ethnic Electronica", "ups": ["Electronica", "Turbo-Folk"], "downs": ["Folktronica"], "aka": "Ethnotronica、Ethno Electronica、Ethno Techno", "related": "", "desc": "Ethnic Electronica是民谣与电子最初结合而成的一种音乐类型，植根于地方特色传统乐器及地域文化，脱胎于Turbo-Folk，最后与Electronica/其他电子元素融为一体，往往结合原声摇滚和民谣元素。Ethnic Electronica的相关艺术家：Alt-J和Bon Iver等取得了相当大的商业成功，Bon Iver的专辑《22, A Million》（2016）和《i,i》（2019）在多个国家进入前十，并被格莱美提名。", "chapter": "Indie", "examples": ["Forest Of Souls - Feinheitsbrei【https://www.youtube.com/watch?v=DM-nAkukGKo】"]}, "folktronica": {"name": "Folktronica", "ups": ["Ethnic Electronica", "IDM", "Glitch"], "downs": ["Folktronica Soundtracks", "Lei Music", "Botanica"], "aka": "Laptop Folk", "related": "", "desc": "Folktronica是一种由Ethnic Electronica发展而来的电子音乐风格，融合了原声乐器的声音、当代民谣/各种传统民谣音乐的元素，用细小而轻巧的节拍搭配富有民族气息的深邃的氛围，音乐会尤其强调民谣风格中的原声吉他和弦乐。这种音乐通常受到了IDM、Glitch等音乐的制作手法、编排方式，以及Downtempo“节奏+氛围完美融合”形式的影响。虽然电子音乐制作人在20世纪90年代就开始尝试使用原声元素，但这一风格在21世纪初才开始崭露头角，Four Tet、The Books、Tunng等制作人/团体的早期作品都体现了这种音乐的特征。尽管Folktronica一直不温不火，但其风格却多种多样，一些艺术家使用较为传统的歌曲结构或现场乐器演奏，而另一些艺术家则完全使用采样，朝着更具实验性的方向发展，不过这些音乐带来的独特质感却是统一的。", "chapter": "Indie", "examples": ["Hands - Four Tet【https://www.youtube.com/watch?v=M2dPYRhSb4c】"]}, "folktronica soundtracks": {"name": "Folktronica Soundtracks", "ups": ["Folktronica", "VGM"], "downs": [], "aka": "Folktronica Video Game Soundtracks、Folktronica Video Game Music、Folktronica VGM", "related": "", "desc": "“电子游戏背景音乐”是许多小型Folktronica音乐家的理想归宿，他们能够通过原声乐器和电子乐器创造出新的音景与新的世界。尤其在过去的5年里，Bandcamp满足了音乐家们的需求，相关作品层出不穷，而小型独立游戏的火爆也让Folktronica制作人的创造力空前高涨。游戏中的Folktronica音乐，允许了制作人们更好地展现他们对原声乐器的知识储备和强大的掌控力，并在此基础上使用少量电子元素和更现代的音乐技术来实现更大众友好的民谣音乐。", "chapter": "Indie", "examples": ["春弦 - 横山克 / 塞壬唱片-MSR【https://www.youtube.com/watch?v=sgF-NOkeUBA】（2：07开始）"]}, "downtempo": {"name": "Downtempo", "ups": ["Ambient"], "downs": ["Chillout", "Trip Hop", "Balearic Beat", "Asian Underground"], "aka": "Downtempo Electronica、Downtempo Electronic、Downbeat", "related": "", "desc": "Downtempo是一种BPM较低的、悠闲的电子音乐风格，与氛围音乐类似但与氛围音乐的无节拍形式不同，通常带有节拍、Groove。节拍有时不断循环以实现一种催眠效果，而有时又比传统舞曲更复杂、更有特色。通常认为Downtempo包含了Chillout在内的很多音乐场景，如部分IDM、Trip Hop、Lounge、Balearic Beat、Nu-Jazz、Asian Underground等。典型的Downtempo是一种带有Funk/Soul/Jazz元素的缓拍舞曲，并没有严格的BPM要求（如BPM小于90/80才能叫做Downtempo），也并不是所有低BPM的曲目都能叫做Downtempo。", "chapter": "Indie", "examples": ["lust - Rei Harakami【专辑：[lust]】【https://www.youtube.com/watch?v=qe2JBMmuNgY】", "Sleepless - Flume"]}, "chillout": {"name": "Chillout", "ups": ["Downtempo", "Ambient"], "downs": [], "aka": "Chill-Out、Chill Out", "related": "", "desc": "虽然Chillout最受Ambient的影响，但并不属于Ambient的分支。最初的Chillout（1989年）与Ambient House混为一谈，被认为可以指代任何Easy Listening的音乐，2009年“Chillout”成为了一个术语，2013年Rick Snoman在一篇文章中写道“只要一首歌曲在120BPM以下且令人悠闲舒适，那么就可以归类为Chillout”，可见其定义松散。现代Chillout的普遍定义/听感是基于Ibiza/Balearic音色/氛围的慢速音乐，鼓组可4/4可2-step不做硬性要求，且鼓组有原声质感，常常加入一些零星的打击乐（Percussion），音色也常常加入原声乐器，但也不能缺了电子元素，一个厚重的Pad/Bass贯穿全曲或片段，也会用一些比较柔和的Trance元素。", "chapter": "Indie", "examples": ["Angelfalls (Particular Beach) - Ayla【https://www.youtube.com/watch?v=U8772T2CS1M】", "Astronomy - Bryan Milton"]}, "bit music": {"name": "Bit Music", "ups": ["Electronic Music"], "downs": ["8-bit/Chiptune", "FM Synthesis", "Sequencer & Tracker"], "aka": "", "related": "", "desc": "Bit Music是指由视频游戏机、电脑街机游戏中的声音芯片、音序器或者模拟这些声音的合成器所创作的电子音乐。在20世纪70年代初，街机游戏开始使用机箱内部的PSG声音芯片来播放数字音乐，该芯片可以将计算机代码转换为基本波形和模拟声音，80年代初出现了8-bit/Chiptune的声音，80年代中期出现了FM合成作为一种音乐输出的替代方法，1987年出现了Sequencer & Tracker（音序器与跟踪器音乐）。Bit Music现在被大量使用在RPG游戏中，影响了之后的Nintendocore、Melodic Metalcore，也影响了之后的Bitpop的出现与流行。", "chapter": "Indie", "examples": ["Yie Ar Kung-Fu - 東野美紀"]}, "8-bit/chiptune": {"name": "8-bit/Chiptune", "ups": ["Bit Music"], "downs": ["Fakebit"], "aka": "Chip Music", "related": "", "desc": "Chiptune的形式早于概念诞生，概念是源于1980s的黑客演示场景即Demoscene，而Chiptune的形式则是随着电子游戏配乐一同诞生的。最初的Chiptune通过PSG芯片发声，PSG芯片内置一个振荡器以发出基本声音波形，然后将这些声音波形组合成乐音。Chiptune的代表是1984年任天堂的SID芯片2A03，它内置了五个声音通道，以同时输出旋律、低音、鼓组和采样。由于内置2A03芯片的游戏机系统是八位系统，因此Chiptune也被叫做“八位音乐”，即8-bit。", "chapter": "Indie", "examples": ["Computer Games (Mark Gamble Micro-Mix IV) - イエロー・マジック・オーケストラ"]}, "fakebit": {"name": "Fakebit", "ups": ["Chiptune"], "downs": [], "aka": "9-bit、Post Chiptune", "related": "", "desc": "1990s后期，随着光盘刻录技术的涌现与流行，越来越多全品质音乐得以录入，摆脱了芯片需要压缩声音信号的限制，Chiptune逐渐没落，但仍有一部分制作人坚守阵地。1990s早期，任天堂发布Game Boy。千禧年后，Rolemodel发布了一款搭载在Game Boy上的编曲软件LittileSoundD，芯片乐形成复兴浪潮。一部分使用复杂编曲软件作曲的制作人或DJ顺应潮流，用软件模拟制作芯片乐，但这种行为遭到Game Boy使用者的嗤之以鼻，于是芯片乐制作人将这类使用编曲软件的制作人制作的类似芯片乐的音乐嘲讽地称为“Fakebit”，意为“虚假捏造的芯片乐”。由于Fakebit实际上已不属于严格意义上的芯片乐范畴，因此也被称为“9-bit”(Ishkur)。", "chapter": "Indie", "examples": ["Machine It - Sulumi(孙大威)"]}, "game boy music": {"name": "Game Boy Music", "ups": ["Chiptune", "Bit Music"], "downs": [], "aka": "VGM、Video Game Music、GBM", "related": "", "desc": "游戏音乐是芯片音乐诞生的根基。1971年电子游戏《Computer Space》是全球第一个有BGM的电子游戏，虽然这种BGM仅仅是电流噪音。1972年雅达利公司出品的乒乓游戏首次使用了PSG芯片发声以作BGM。直到1978年，游戏《太空入侵者》才正式出现可听的BGM，属于是游戏音乐真正的开山鼻祖，即便它只由四个音符组成。1980年的赛车游戏和吃豆人游戏让游戏音乐正式有了旋律，自此以后十余年就是世嘉公司和任天堂公司领导游戏音乐的发展，音乐芯片也随之进步。这类游戏音乐后来就被命名为“Game Boy Music”，也就是搭载在游戏机上的“掌机音乐”。", "chapter": "Indie", "examples": ["Go Straight (Original) - ベア・ナックルII 死闘への鎮魂歌 (MD版) - 古代佑三"]}, "digital fusion": {"name": "Digital Fusion", "ups": ["VGM", "Bit Music"], "downs": ["Chip Funk", "FM Synthesis Funk"], "aka": "Digifusion、Digifu", "related": "", "desc": "Digital Fusion是一个运动也是一个电子音乐流派，兴起于2000年代，是一种将现代的高保真制作手法应用于受到80/90年代计算机音乐（即VGM和Bit Music中使用的Tracker、合成技术和MIDI技术）的限制的音乐中。这种音乐将VGM/Bit Music中独特的旋律与Jazz Fusion、Smooth Jazz、Synth Funk、Cinematic Classical、甚至前卫摇滚、Progressive Electronic中较为大众友好的复杂性搭配在一起，有时还融合了现代的电子舞曲（如Future Bass、Electro House），这种音乐通常令人振奋、高技术性，或充满活力或轻柔忧郁。Digital Fusion可以是纯电子的，也可以加入Live乐器，通常是钢琴或鼓，甚至还可以采用“虚拟即兴演奏”的方式，即在现场表演独奏，并由音序器录制下来并修改演奏。Digital Fusion社区主要由在互联网上发布音乐的独立艺术家形成，但他们也在Ubiktune和DESKPOP Music等网络厂牌上找到了归宿。这种音乐风格在《蔚蓝》和《FEZ》等独立游戏的BGM中非常突出，在电视音乐中也有例子，如Aivi & Surasshu在动画《Steven Universe》中创作的原声带。Aivi Tran于2019年创造了“Digital Fusion”这一术语，作为社区内志同道合的音乐人团结在一起的旗帜，并迅速得到了社区的拥护。这一流派由于已经发展了很长时间，所以也有很多属于自己的子流派，如制作人Joshua Morse、Zachary Wilson偏向Funk/Synth Funk的分支：Chip Funk、FM Synthesis Funk等。这里不做细致介绍。", "chapter": "Indie", "examples": ["Scattered and Lost - Lena Raine"]}, "fm synthesis": {"name": "FM Synthesis", "ups": ["Bit Music"], "downs": [], "aka": "FM、FM Synth、Frequency Modulation Synthesis", "related": "", "desc": "FM合成是频率调制（Frequency Modulation）的缩写，是一种声音合成类型，将Chiptune的简单方波、三角波、锯齿波和噪声波与类似FM收音机中使用的调制振荡器结合在一起，创造了一种新的合成器声音，更有弹性、变化性且没那么刺耳。FM合成在1973年获得专利，1982年，Commodore 64计算机发售，采用了SID芯片，替代了PSG芯片。但随后不久Yamaha推出了FM芯片，Yamaha DX7在1983年成为了第一个使用FM合成的大规模生产的电子合成器。FM芯片的优势在于他可以使用一个振荡器去控制另一个振荡器，且具有更多的声音通道，以收获更多波形变换的声波并组合起来。日本啤酒馆老板兼作曲家、游戏制作家太田顺也(ZUN)是这种风格的代表。", "chapter": "Indie", "examples": ["ハルトマンの妖怪少女 - 上海アリス幻樂団(ZUN)"]}, "sequencer & tracker": {"name": "Sequencer & Tracker", "ups": ["Bit Music"], "downs": [], "aka": "Sequenced Game Music、Sample-Based Synthesis、MOD Music、MIDI Music、Modules、Amiga、Tracker Music", "related": "", "desc": "指从20世纪80年代末到90年代末为各种早期家用计算机和游戏控制台创作的音乐，主要是游戏配乐。这种音乐通常是在“Tracker”中创作的，这种软件用于将音频采样（通常是乐器声音）排成一定的序列组合成更大的作品。术语Amiga意指使用早期电脑音序器编曲软件编的曲目，由于是使用了音序器，因此也常简称为Tracker Music。", "chapter": "Indie", "examples": ["Surfing On A Sine Wave - Fearofdark"]}, "16-bit": {"name": "16-bit", "ups": ["Sequencer & Tracker"], "downs": [], "aka": "16bit", "related": "", "desc": "指使用带有16位音频硬件的游戏控制台创作的音乐。16-bit比8-bit在技术上更先进，声音更干净更清晰，在音色上更接近于与之类似的乐器，通常基于采样，音频质量更高，也有自己独特的合成声音。1984年任天堂发布八位系统后，1988年世嘉发布了十六位系统。十六位系统受限制更小，操作空间更大，因此用十六位系统制作的音乐被称为十六位音乐，即16-bit。", "chapter": "Indie", "examples": ["成歩堂龍一 ～異議あり! 2004 - 岩垂徳行"]}, "doskpop": {"name": "Doskpop", "ups": ["Sequencer & Tracker", "Spacesynth", "Electronic Dance Music"], "downs": [], "aka": "", "related": "", "desc": "兴起于20世纪90年代的Demoscene，融合了类似Chiptune的原始合成器声音和流行音乐的结构，主要受到了Italo Disco和Spacesynth的影响，后来逐渐被Trance、Techno、Breakbeat占据了主导地位。代表专辑: 《Lost Floppies Vol 2》、《Lost Floppies Vol 1》。", "chapter": "Indie", "examples": ["Shell Spread - Dubmood"]}, "keygen music": {"name": "Keygen Music", "ups": ["Sequencer & Tracker", "Demoscene"], "downs": [], "aka": "", "related": "", "desc": "Keygen Music常用译名为注册机音乐，因为这类音乐常常出现在早年游戏作弊器、修改器的注册页面上。同样是兴起于Demoscene，相对于Doskpop更多指向于Demoscene本身的含义。Demoscene场景中，黑客使用Cracktros展示自己的高超技巧，将画面和音乐压缩在占存很小的作弊器里并投放到目的软件界面进行替换，为此还专门衍生出相关赛事，极大地促进了芯片乐的繁荣。", "chapter": "Indie", "examples": ["Funky Stars - Quazar"]}, "black midi": {"name": "Black MIDI", "ups": ["Sequencer & Tracker", "MIDI Piano"], "downs": [], "aka": "Impossible Music、Kuro Gakufu", "related": "", "desc": "Black MIDI，国内鬼畜圈一般称其为“黑乐谱”，因其在电子编曲软件的虚拟演奏乐谱上堆叠大量音符，导致乐谱看起来杂乱无章，像煤炭涂黑了一样混乱。创作者常常是先创作音乐，然后添加大量装饰性音符块(一般不发声或声音很小)，使演奏界面(主要是MIDI钢琴)看起来充满花式纹样，然后将得到的音乐转成电子乐谱，形成一篇无法演奏的乐谱，然后调整参数使MIDI演奏软件去演奏这种音乐。一般来说黑乐谱会翻奏已有曲目如《Bad Apple!!!》、《Evans》、《U.N.オーエンは彼女なのか?》、《克罗地亚狂想曲》、《四季·夏》等，因此也在Doujin Music文化圈内，但是也有黑乐谱制作人会独立编曲，优秀作品如Sheet Music Boss的Rush系列和圆周率之歌(非初音未来演唱歌曲)及其衍生曲目(参见B站搬运视频：https://www.bilibili.com/video/BV1Jx411879C/) (MIDI:  Musical Instrument Digital Interface的简称，是一种用于电子乐器和其他设备之间通信的标准协议，诞生于1990s左右，时值16位计算机问世。它允许乐器、电脑和软件之间相互传递乐谱信息，而不是实际的音频信号。)", "chapter": "Indie", "examples": ["Rush E (Impossible Version) - Sheet Music Boss"]}, "plus": {"name": "Plus", "ups": ["Bit Music", "EDM", "Rock", "Pop etc."], "downs": [], "aka": "", "related": "", "desc": "Plus是一个松散的定义，顾名思义，Plus就是Bit Music + 其他音乐的意思。Fakebit作为Plus出现的情况非常高，再加上芯片乐电子声伊始至终都很受欢迎，因此Chiptune也常常作为一种音色元素参与到其他电子音乐风格中，如Chip Breaks就是Chiptune加Breakbeat，Chipstep则是Chiptune加US Bass，而Chip Thrash是加入了芯片乐元素的激流金属/敲击金属/鞭笞金属，Nintendocore也符合这个概念的定义。实际上很多音乐都有芯片乐音色，比方说Virtual Riot的《Energy Drink》、Zombie Nation的《Kernkraft 400》、Perfume的《再生》，这些音乐在定义上均是Plus风格。", "chapter": "Indie", "examples": ["Endgame - Waterflame"]}, "computer music": {"name": "Computer Music", "ups": ["Bit Music (Sequencer & Tracker)", "PC Technology"], "downs": ["Laptronica", "Algorave", "VOCALOID", "Black MIDI"], "aka": "", "related": "", "desc": "计算机音乐起源于1950s的计算机实验，是计算机技术在音乐创作中的应用的体现，帮助作曲家独立创作新的音乐或操作让计算机独立创造音乐，如算法生成、AI制作等。世界上第一台能够发出数字合成音的计算机是澳大利亚的CSIR Mark 1(后更名为CSIRAC)，由Trevor Pearcey和Maston Beard在1940年代后期设计和制造。数学家Geoff Hill对CSIR Mark 1进行编程以播放1950年代初期的流行乐，1951年，CSIR Mark 1独立演奏了柏忌上校进行曲。同年在英国，Christopher Strachey在Ferranti Mark 1上编程了英国国歌、Baa, Baa, Black Sheep和In The Mood三首歌(现可在Soundcloud上听到)。1956-1959年间，声学实验家Lejaren Hiller和Leanard Isaacson进行了一系列算法作曲实验，并在1957年的弦乐四重奏设计的Illiac组曲的首演中得以体现。1963年，Max Mathews在《Science》上发表了MUSIC III系统成果，最早包括《Analog #1 》(1961)。1964年，Jean-Claude Risset创作了《小男孩》(1968)计算机组曲，计算机音乐自此定型。后续还有很多声学工程师使用计算机编程演奏古典音乐或独立创作音乐，并启发了Algorave音乐。", "chapter": "Indie", "examples": ["Computer Suite From Little Boy : Flight And Countdown - Jean-Claude Risset"]}, "laptronica": {"name": "Laptronica", "ups": ["Livetronica", "Computer Music"], "downs": [], "aka": "", "related": "", "desc": "Laptronica是Livetronica和计算机音乐的结合体，其中笔记本电脑(Laptop)被用作即兴演奏乐器，因此Laptronica实际上是Laptop和Electronica/Livetronica的合成词汇。这个术语在1990s获得了一定程度的流行，并影响了后来的Live Coding、Algorave等。由于笔记本电脑的高度便携性，可以在任何时候演奏，因此广受即兴电子音乐家的欢迎，有些Laptronica爱好者甚至会自发组成笔记本电脑管弦乐队以创作即兴电子曲目。", "chapter": "Indie", "examples": ["In Yer Face - Farmers Manual"]}, "algorave": {"name": "Algorave", "ups": ["Computer Music", "Live Coding", "Music Programming Technology"], "downs": [], "aka": "", "related": "", "desc": "与其说Algorave是一种风格不如说它是一场即兴电子创作运动，代指Algorave场景，即实时自生成代码音乐衍生的一系列场景。2011年，Slub、Nick Collins、Alex McLean提出了Algorave一词，并在与英国伦敦举办了第一场Algorave音乐节。Algorave的基础表现形式多种多样，以Minimal Techno最为代表，“DJ”(实际上是程序员)通过编写源代码，操纵计算机实时生成代码从而创造电子舞曲。Algorave特点是随机生成的、不可预测的鼓和合成器声音，艺术家通常避免重复的旋律出现，在表演的过程中也经常出现错误，偏离艺术家的意图，但往往带来的是意想不到、令人惊讶的效果。这种新奇的计算机音乐/实验音乐/即兴音乐/电子舞曲及其场景也在全球范围内广受欢迎。", "chapter": "Indie", "examples": ["Full Circle - Renick Bell"]}, "vocaloid music": {"name": "VOCALOID Music", "ups": ["Computer Music", "Sound Collage", "Sequencer & Tracker etc."], "downs": ["UTAU Technology"], "aka": "ボーカロイド、ボカロ、VOCALO、博歌乐", "related": "", "desc": "VOCALOID是日本Yamaha公司首创的电子歌声合成技术及其应用软件的合称。截止今日，VOCALOID已经有了七个迭代，最新的VOCALOID β-STUDIO已于2024年4月停止支持。VOCALOID由Vocal和词缀-oid组合而成，-oid在英文中表示“类人的”，因此VOCALOID的概念接近于“拟歌声”、“能唱歌的东西”、“歌唱机器人”等，因此VOCALOID对应的虚拟形象被称为“虚拟歌姬”，用VOCALOID软件制作音乐的制作人或DJ被称为Vocaloid Producer，简称“P主”，熟知的p主包括米津玄师(ハチp)、大箭将也(Camellia)、wowaka[已故]、DECO*27、ピノキオピー等。VOCALOID是Sound Collage和计算机编程音乐的结合体产物，工作原理是将事先录制的无意义词段声源库(称为声库)、歌词和旋律加入到VOCALOID程序里，通过调节众多参数如速度(VEL)、音量(DYN)、呼吸度(BRE)、明亮度(BRI)、清晰度(CLE)、开口度(OPE)、性别值(GEN)、咆哮声(GWL)、空气音(AUR)和滑音相关参数后输出音乐成品，这种音乐就称为“VOCALOID Music”。 VOCALOID最初开发于2000年，时名Daisy Project。2003年，雅马哈正式发布第一款声库。2004年，雅马哈发布VOCALOID产品，分别是LEON、LORA、MIRIAM和MEIKO，2006年又补充上市KAITO。2007年，VOCALOID升级到VOCALOID2，同年雅马哈发布了初音未来和镜音双子，并在不久后各自出现了各自的虚拟形象，自此VOCALOID逐渐走红爆火。2009年，歌爱雪发布，标志着声库采样源不再限于成年人。2011年，VOCALOID 3发布，程序内参数和精密程度再一步提高，人气日文VOALOID也出现了VOCALOID 3形象和软件，不久后出现原理类似的UTAU技术，随后不久IA、GUMI、苍姬LAPIS、洛天依、言和、乐正绫、v-flower、Cyber Diva、Cyber Songman、VY1V3、VY2V3等其他公司或国家的VOCALOID产品相继涌现，VOCALOID也逐渐发展。2016年，人气角色初音未来拥有了中文声库“初音未来 V4C”。2022年后，VOCALOID 6发布，AI声库诞生并极大程度上方便了创作，但是某种程度上也遭到传统p主的反对。但是不得不说的是，VOCALOID是21世纪初电子音乐发展过程中最重要的一次技术革新，标志着计算机程序取代人声的可能，使个人制作变得更加容易，也贡献了一批优秀的卧室音乐人。", "chapter": "Indie", "examples": ["Tell Your World - 初音ミク/livetune"]}, "electro": {"name": "Electro", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Indie篇章）", "chapter": "Fusion", "examples": []}, "detroit electro": {"name": "Detroit Electro", "ups": ["Electro"], "downs": [], "aka": "", "related": "Techno Bass、Electro Techno", "desc": "1981年，Cybotron的《Alleys Of Your Mind》在Deep Space Records唱片公司发行，一种最古老的电子舞曲流派由此诞生。几年后，Cybotron在Fantasy Records唱片公司发行了专辑《Enter》，进一步发展了这一新的音乐流派——作曲家兼制作人Juan Atkins将其称为Techno音乐。Juan Atkins和他的乐队Belleville Three在底特律这座机器般的城市长大，受此影响，他们自己也接受了这种未来主义的理念，作为他们对Breakdance、Hip-Hop和电子舞曲日益流行的回应。90年代初，随着Electro-Funk的衰落和Miami Bass的诞生，一种新的声音应运而生，看似毫无关联却明显受到电子乐界两大势力：底特律和迈阿密的影响，这就是“Techno Bass”。在迈阿密它被认为是Miami Bass的子分支，只不过受到部分Detroit Techno的影响。然而在底特律，这种声音是被认为是“第二波Techno浪潮”（第二波Techno浪潮见Techno篇章的前言）的一部分，受到了更多Electro-Funk、Techno的影响，被称为“Detroit Electro”。Aux 88、DJ Di'jital、Posatronix等艺术家，都明显地将Techno音乐改造成了一种试图重振电子放克衰落后所失去的东西的音乐。", "chapter": "Indie", "examples": ["R-9 - Cybotron【https://www.youtube.com/watch?v=ZDWeIGEj96s】", "Clear - Cybotron"]}, "neo-electro": {"name": "Neo-Electro", "ups": ["Electro"], "downs": [], "aka": "", "related": "", "desc": "到1986年，就主流舞曲而言，最初的电音场景几乎消失殆尽。用Steve Mizek撰写的一篇关于Electro的综合文章的话来说：“随着80年代的到来，许多以嘻哈音乐为导向的场景选择保留Electro的808节拍，并摒弃未来主义主题，转而采用嘻哈中更常见的派对、街头主题。”90年代中期，英国著名DJ Dave Clarke发布了他的X-Mix：Electro Boogie，将更古老的电子乐带回了人们的视野。同时一个全新的场景“Neo-Electro”正在荷兰海牙市形成，其中包括Unit Moebius、I-F、Legowelt、Orgue Electronique等制作人，他们都深受Drexciya、Gerald Donald、James Stinson的歌曲以及其他制作人（The Other People Place、Transllusion、Dopplereffekt等）的启发。", "chapter": "Indie", "examples": ["The Rain Comes Down (Dcast Dynamics Remix) - Gosub【https://www.youtube.com/watch?v=VX8z0L-Vahg】"]}, "midtempo": {"name": "Midtempo", "ups": ["Melodic Bass", "Melodic Dubstep", "Midtempo Bass"], "downs": [], "aka": "Mid Tempo", "related": "", "desc": "Trap和Future Bass满足不了分类欲望的时候，就造就了Midtempo。注意此Midtempo是一种标签化的叫法，前身是Midtempo Bass，弱化了Midtempo Bass侵略性很强的Heavy Bass元素转而强调悦耳的旋律，理论上可以指代任何中速（90-105BPM左右）的音乐，此处也认为Midtempo包括Midtempo Bass，但为了与Midtempo Bass区别开来，本词条专指Melodic Bass/Melodic Dubstep等当代场景下出现的“旋律化”Midtempo。常见的Midtempo音乐形式有：更流行化、现代化的Synth-pop/Synthwave/Indie Dance；鼓组更加4/4、更加规律的Melodic Bass/Melodic Dubstep/Future Bass等2-step音乐；NEO-Trance、Hyper Trance场景的部分音乐等。目前Midtempo仍指代一个大的范畴，并没有严格的定义，但许多制作人已经非常乐意用这一词汇来形容他们的音乐。", "chapter": "Indie", "examples": ["Moving On - Outwild / RAABERS（Melodic Bass/Synth-pop形式）【https://www.youtube.com/watch?v=zAcR6lZC0Bk】", "Waves - FLØRALS（Chill Future Bass形式）"]}, "post-edm": {"name": "Post-EDM", "ups": ["Electronic Dance Music"], "downs": ["Emotional Dance Music"], "aka": "New EDM", "related": "Emotional Dance Music、Emo Dance Music", "desc": "Post-EDM是San Holo提出的一个概念，EDM衍生的子类型，将很多声学乐器、电声乐器以及后摇的元素融合在了电子舞曲里面。Post-EDM是EDM的一种全新概念，并不是音乐风格的性质，目前很少人在尝试制作它，更常见的是完全依赖于电脑宿主和MIDI技术的形式，是设计规整的纯数字化产物。但所谓的“Post-EDM”会倚重于真声乐器，并时而依赖乐队共同演绎一支作品，它拥有更多自然的声音，更加富有生机。制作人：San Holo，Yoe Mase。", "chapter": "Indie", "examples": ["i don't feel anything anymore - San Holo【https://www.youtube.com/watch?v=Tew5eBApbeM】"]}, "lei music": {"name": "Lei Music", "ups": ["Modern Classical", "Folktronica", "Ambient", "Art Pop", "Glitch", "UK Bass", "IDM etc."], "downs": [], "aka": "╰⋵⋰☗∰፨☼⑇", "related": "", "desc": "Lei Music是由Iglooghost于2020年提出的一个新的音乐类型，Iglooghost将其描述为“可以将其他纬度的怪异生命体召唤到人类世界的音乐”。在音乐形式上，Lei Music的结构通常是：以Modern Classical（原声乐器的演奏，如小提琴、钢琴、长笛等，包括人声的吟唱）的氛围铺底，加以Glitch、IDM式音效的点缀，并辅以各种电子元素的融合，如Ethnic Electronica/Folktronica的“民俗”感；Art Pop的前卫结构；Wonky Bass、Leftfield Bass等Bass音色元素，以非常现代的作曲手法结合在一起。这些元素通常不受限制，听起来像是可以任意出现在各种地方，鼓的位置也十分稀疏但非常自由，很多时候像是代表着一句乐段的“句号”。总结来说，这是一种将古典作曲手法/浪漫主义编曲应用到电子音乐中，并加以Glitch、IDM等元素的音乐。 Iglooghost在提出这一音乐类型后，随之成立了Gylph Institute²研究所，致力于Lei Music的研究。经过长期的演奏、实验与努力，Lei Music的真相得以触及。Iglooghost将这些召唤实体所产生的声音记录下来，制作成专辑《Lei Line Eon》，并把研究成果发表在https://www.leimusic.xyz上，阐明Lei Music这一概念。", "chapter": "Indie", "examples": ["Pure Grey Circle - Iglooghost【https://www.youtube.com/watch?v=mlunO8DMMQw】", "Lei Disk 「Radio•Broadcast」 - Iglooghost"]}, "botanica": {"name": "Botanica", "ups": ["Soundscape", "Ambient", "Glitch", "Folktronica"], "downs": [], "aka": "Petalcore", "related": "", "desc": "Botanica是一种新兴电子流派，2022年左右才开始出现，严格意义来讲不是一个“曲风”，甚至只能用听感来区分和形容。“Botanica”用来描述听感的起源是phritz的一个叫做“Botanica”的歌单，里面收录了他个人觉得有“grass type music”气息的歌曲。它结合了以下元素： ①Ableton插件特有的“Glitchy”、“有机的”、“ASMR式的”粒子合成式的音色设计； ②久石让式的古典乐+Porter Robinson式的能唤起舒适温暖回忆感的流行乐元素； ③Bass乐、电影音效设计和Folktronica的当代发展趋势。 2021年，Porter Robinson的专辑“Nurture”发布后给大众引入了Petalcore/Electronica/Indie-pop的听感，其中大量的采样和随机的音色拼贴打造成了特立独行的“Nurture风格”。后来大量艺人开始模仿Porter Robinson的实验+流行模板，并开始有人将编曲方面更注重于音色设计。 2022年，Alexander Panos的专辑“Nascent”发布。策划时间比Nurture要长，并在编曲方面变得更加随机化，加入更多IDM元素。由此也让音乐人们将歌曲主题从单纯的写生转到了写意（这里也是导致了后面Viznode、shameless.等人编曲风格的转变）。 2023年末时，shameless.在推特上发布一系列类似Alexander Panos写意风格的歌曲片段和音色设计，并配文Botanica，然后就开始推进Botanica进一步向另一个方面发展，并不再局限于phritz的歌单。 在这个时候Botanica的定义也出现了“广义”和“狭义”的区分，“广义”是指有人在Future Bass里运用Spectral Samples就是Botanica，“狭义”是指大众觉得只有“Viznode/Alexander Panos”的随机采样风格（Petalcore）才是Botanica。 2024年Botanica热潮爆发，并且许多制作人争相模仿。 Botanica中使用的技术本身并不新鲜，“植物、自然”相关的美学在音乐中也早已存在。由于Botanica类型的音乐涉及精细的音效设计和高质量的歌曲创作，第一批Botanica曲目的长度大部分都很短，相关大部分音效设计师都只上传5-20秒用于实验的音乐到Soundcloud和Instagram等平台。该流派制作的“挑战性”也鼓励了社区内音乐人的合作和方法交流。 在个人看来，Botanica一词被滥用的现象并不在少数，甚至大部分人神化了这个单词。现在的Botanica已经99%是Petalcore拼接艺术的成分了。 更多关于Botanica的资料： phritz的Botanica歌单（国内搬运，官方已停更）：https://music.163.com/playlist?id=7642024092&userid=268411320 Nurture - Porter Robinson：https://music.163.com/album?id=126338915&userid=268411320 Nascent - Alexander Panos：https://music.163.com/album?id=150272382&userid=268411320 Nurture延申，原声乐器参与类： Look at the sky (phritz cover) - phritz：https://music.163.com/so...", "chapter": "Indie", "examples": []}, "vaporwave": {"name": "Vaporwave", "ups": ["Post-Internet"], "downs": ["Dreampunk", "Future Funk", "Slushwave"], "aka": "Vapourwave", "related": "", "desc": "Vapor又叫Vapour，用于描述2010年代初出现在互联网上的电子音乐运动，与流派“蒸汽波”一起兴起，2010年Chuck Person（即Daniel Lopatin、OPN）的专辑《Chuck Person's Eccojams Vol.1》被认为是蒸汽运动的开始，因此早期蒸汽波也叫“Eccojams”。蒸汽波于2012年兴起，几乎所有蒸汽波音乐都基于采样，采样歌曲可以来自一些流行音乐（尤其是City Pop）、Contemporary R&B、Synth Funk、Smooth Jazz、Exotica*等。蒸汽波也产生了一种独特的美学，视觉方面的艺术作品融合了1980年代和1990年代初期的媒体和文化/亚文化元素，如赛博朋克、动漫、不常见的符号、全角字符等，大部分具有类似VHS的图像失真、伪影、故障。", "chapter": "Post-Internet", "examples": []}, "eccojams": {"name": "Eccojams", "ups": ["Vaporwave", "Post-Internet"], "downs": ["Segahaze"], "aka": "Echo Jams", "related": "", "desc": "作为第一种蒸汽波类型，Eccojams实际上早于蒸汽波音乐的概念诞生。Daniel Lopatin在互联网论坛上发布了专辑《Eccojams Vol. 1》，标志着Eccojams的诞生，也被认为奠定了未来Vaporwave概念的雏形。实际上Daniel Lopatin在采访中表示，Eccojams只是他随便做出来的玩笑，事实上确实如此，因为Eccojams里没有过多的类似主流蒸汽波音乐那种颓靡之气，而是采样Smooth Jazz到Dance-pop各种音乐，通过声音拼贴营造一种低保真、怀旧、迷幻感，这种手法深深影响了后续蒸汽波音乐的创作。", "chapter": "Post-Internet", "examples": ["Eccojams A2 - Chuck Person【专辑：Chuck Person's Eccojams Vol. 1】【https://www.youtube.com/watch?v=j6k7JC2her0】（1：16开始）"]}, "segahaze": {"name": "Segahaze", "ups": ["Vaporwave", "Eccojams", "Post-Internet"], "downs": [], "aka": "", "related": "", "desc": "Segahaze是一种非正式的蒸汽波子流派，部分根植于专辑《Eccojams: Vol. 1》中的电子游戏美学元素，并使用了与90年代早期电子游戏（例如Sega和Saturn上的游戏）相关的声音和图像。与大多数蒸汽浪潮子流派一样，这种美学有很大的重叠，但也有一些艺术家和作品明显属于这一领域。与后互联网蒸汽波不同的是，Segahaze并不会令人不安，也不像Eccojams那样“拧巴”，更有氛围感。这一流派也影响了很多当代艺术家以“游戏机”作为灵感来源，如Acetantina、US Golf 95、死のチャンネル，都在探索00年代电子游戏怀旧的声音，最新的Blank Banshee专辑《Music for Menus》也有这种类似的氛围。", "chapter": "Post-Internet", "examples": ["宇宙空間RPG - death's dynamic shroud.wmv【专辑：RPGウィンドウズ ビスタ】【https://www.youtube.com/watch?v=NBGJUhAFPIY&t=256s】（0：08开始）"]}, "muzakcore": {"name": "Muzakcore", "ups": ["Vaporwave", "Muzak"], "downs": [], "aka": "", "related": "", "desc": "Muzakcore是蒸汽波音乐中一个非正式但又不可或缺的子流派，尽管在审美上与大多数蒸汽波有着某种程度的联系，但严格意义上的Muzakcore却并不多见。Muzakcore放弃了传统蒸汽波朦胧、嘈杂的音景，强调比较干净、梦幻的声音，它的特点是听起来“无毒无害”、无侵略性、甚至是非常基本的声音。它的名字来源于一个定义模糊的音乐流派Muzak，Muzak是一个美国同名品牌的背景音乐，自1934年以来该词一直被用于形容这类音乐，也常被称为“Elevator Music”或“Lift Music”（电梯音乐），一般被描述为“听起来像处在商业环境中”的音乐。", "chapter": "Post-Internet", "examples": ["Cumulus Fractus - Eco Virtual【专辑：VIRTUAL大気中分析】【https://www.youtube.com/watch?v=RR1jtn4QVaQ】（1：29开始）"]}, "utopian virtual": {"name": "Utopian Virtual", "ups": ["Vaporwave", "Hypnagogic Pop"], "downs": ["Metrosong", "Faux-Utopian"], "aka": "Midiwave、Midijams", "related": "", "desc": "Utopian Virtual/乌托邦虚拟是一种蒸汽波风格，侧重于体现80/90年代商业电子音乐的美学，特别是与企业相关的背景音乐（类似“商务度假”、“虚拟度假”的场景）。该流派从各种元素中汲取灵感，尤其是New Age、Easy Listening和Smooth Jazz等，并受到Hypnagogic Pop和Synth-pop的影响。这一流派的灵感大多来自20世纪末的合成音乐、铃声和采样的比较“俗套”的声音，如早期游戏机和PC中的Sequencer & Tracker音乐。这个名字来源于James Ferraro于2011年创作的专辑《Far Side Virtual》，这一作品以技术乌托邦、怀旧氛围和批判企业为主题，抛弃了低保真和采样循环重复，换来了高保真、有层次的编曲。这张专辑也经常被认为是乌托邦虚拟成为一种音乐流派的催化剂。", "chapter": "Post-Internet", "examples": ["Birds of Paradise (Chiang Mai) - Bart Graft【专辑：Light and Space】【https://www.youtube.com/watch?v=9tZmE_Gmgzc】（0：42开始）"]}, "metrosong": {"name": "Metrosong", "ups": ["Utopian Virtual", "Plunderphonics"], "downs": [], "aka": "", "related": "", "desc": "Metrosong是一种比较小众的音乐流派，结合了Utopian Virtual、Library Music（图书馆音乐）、Plunderphonics的影响，视觉艺术一般是公司/企业/商业/图片库/平面艺术/Frutiger Aero/超现代化的图像。虽然对采样进行花里胡哨处理的声音拼贴作品相当常见，但这种音乐强调避免一般蒸汽波中对采样的“破坏性”处理（如低保真、失真、放慢采样速度等），而采用了干净的采样原本的声音。有些采样是自己写的，而大多数则依赖于“偷来”的采样（至少一个，经常很多个）。这种音乐的主题涉及很多，有反乌托邦，有调侃式的Faux-Utopian，还有对理想化的世界和人类之美的真诚憧憬等。", "chapter": "Post-Internet", "examples": ["Hopeful Tomorrow - Contour Architect【专辑：Newport Hypercity（Youtube上没有，Bandcamp上有）】"]}, "faux-utopian": {"name": "Faux-Utopian", "ups": ["Utopian Virtual", "Muzakcore", "Broken Transmission"], "downs": [], "aka": "", "related": "", "desc": "一说译为“假乌托邦”，风格借鉴了Muzak和Smooth Jazz等Utopian Virtual音乐的理念，并表达“对未来的憧憬不再那么乐观、世界是更加阴险的”的思想，试图揭示完美世界的人为性以及Vaporwave怀旧的虚假性。“假乌托邦”仅在于创作者的思想和表达的主题，而不是一种独特的声音技术，因此它经常与其他蒸汽波风格联系在一起，往往从Utopian Virtual开始，走向经典蒸汽波（Classic Vaporwave）或Broken Transmission。叙事感和整体专辑的氛围是这一流派的重点，但由于音乐上没有什么根本区别，Utopian Virtual和假乌托邦之间的界限往往模糊不清。Faux-Utopian所表现出的阴暗面一般通过Glitch音效、混乱的采样、简单但令人不安/忧郁的旋律来呈现，《Floral Shoppe》是第一张符合这些标准的专辑，随后被当作整个蒸汽波领域的参考标准。假乌托邦可以被认为是乌托邦虚拟的反面，于是有时也被称为Dystopian Virtual。", "chapter": "Post-Internet", "examples": ["ベイパーウェア MODERN COMPUTING - CYBEREALITYライフ【专辑：v i r t u a l r e s o r t ™】【https://www.youtube.com/watch?v=-hfD9PGnxCk】（0：22开始）"]}, "broken transmission": {"name": "Broken Transmission", "ups": ["Vaporwave"], "downs": ["Weatherwave", "Browser Beats"], "aka": "Signalwave", "related": "", "desc": "Broken Transmission也被称为Signalwave（其实也有Weatherwave的叫法，不过不常用），是蒸汽波的一个子流派，其特点是使用一系列简短的音乐片段来创作新的歌曲和音景，模仿或直接采样老式电视的放送片段，是一种真正的“被发现的声音”。Broken Transmission艺术家通常从广播、电视、广告、老歌中提取采样，并利用这些采样进行循环、失真化等各种修改。曲目通常很短，一般只有不到2分钟。这种风格的另一个灵感来源是老式气象频道的背景音乐，由此许多艺术家也创作了被称为Weatherwave的作品，他们通过采样或原创采样创作歌曲来重现气象频道的声音。这种风格往往听起来像是在深夜翻阅各种电视台，有时听了一小段曲目又再切换到另一个电台/频道。", "chapter": "Post-Internet", "examples": ["The First Night - Infinity Frequencies【专辑：Exit Simulation】【https://www.youtube.com/watch?v=ThOE46A841w】（0：28开始）"]}, "browser beats": {"name": "Browser Beats", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Broken Transmission分支）", "chapter": "早期流派/手法/理念", "examples": []}, "hypnagogic drift": {"name": "Hypnagogic Drift", "ups": ["Vaporwave", "Broken Transmission"], "downs": [], "aka": "", "related": "", "desc": "Hypnagogic Drift（以下叫迷幻漂移）是Vaporwave的一种子风格，主要是通过不断循环的失真采样来创造并探索恍若梦境的氛围，从而达到“溜大了”的效果。这种风格在Vaporwave发展初期由极具影响力的“骷 [Skeleton]”流行开来。虽然在音乐形式上它与Broken Transmission风格相似，但其独特之处在于，它的采样循环往往流畅而不间断，歌曲通常更长，从而营造出一种迷失在无限梦境中的感觉。这种风格还与Slushwave有许多共同点，Slushwave的标志性相位器效果（Phaser）为采样循环更增添了一层梦幻般的催眠效果，于是有些人也将迷幻漂移视为Slushwave的上位。迷幻漂移并不算是一种独立的风格，大多数被认为是迷幻漂移的作品，包括其定义专辑，都是Slushwave、Drone、Progressive Electronic、Utopian Virtual等风格的排列组合式融合。", "chapter": "Post-Internet", "examples": ["LOOK! - Topaz Gang【专辑：Cyprus Skate Plaza】【https://www.youtube.com/watch?v=n-yYHQJ13Zs】（0：33开始）"]}, "late night lo-fi": {"name": "Late Night Lo-Fi", "ups": ["Vaporwave", "Broken Transmission", "Hypnagogic Drift", "Urban Music"], "downs": ["VHS Pop"], "aka": "Late-Nite Lo-Fi", "related": "", "desc": "Late Night Lo-Fi是蒸汽波的一个子流派，旨在强调与80、90年代深夜电视节目相关的情绪和美学。公共广播频道、地方新闻频道以及80/90年代的一般深夜节目经常使用宽敞的城市和华丽灯光的视觉效果，并配以Smooth Jazz、Synth Funk、流行和其他易于接受的“城市感”音乐流派，为其深夜节目营造出一种独特的夜间氛围，并创造出一种积极的感觉。Late Night Lo-Fi从这些氛围中汲取灵感，采用了相同类型的采样和4:3 CRT TV、公共广播、繁华都市的夜景和闪烁的灯光等视觉效果，但在此之上加入了一层经过失真、混响和滤波等处理过的Lofi噪音颗粒，这种低保真处理又把这种积极的感觉拉入莫名的孤独、像电视失去信号的感觉中。Late Night Lo-Fi很可能脱胎于Broken Transmission或与之密切相关的Hypnagogic Drift，但与Broken Transmission相比，Late Night Lo-Fi更强调清楚的旋律，且不一定受制于不断循环的歌曲结构。这种特点在VHS Pop中体现得尤为明显，VHS Pop是Late Night Lo-Fi的一个分支，放弃了Late Night Lo-Fi的疏离感和Lofi噪音，表现得更乐观、音质更清晰。", "chapter": "Post-Internet", "examples": ["IBM Lotus Night - Lindsheaven Virtual Plaza【专辑：Daily Night Euphoria EP】【https://www.youtube.com/watch?v=bBrt9difLE8】（1：20开始）"]}, "vhs pop": {"name": "VHS Pop", "ups": ["Late Night Lo-Fi"], "downs": [], "aka": "", "related": "", "desc": "VHS Pop是Vaporwave的一个定义松散的子流派/场景，与Late Night Lo-fi一样采样的是80年代爵士乐和流行乐，但这是一个更轻快、更有活力的流派。VHS Pop的声音通常混合了一些经典的Vaporwave元素，并受到Synthwave、Chillwave、器乐嘻哈、House等音乐的影响，往往相比普通蒸汽波更有活力、更欢快，甚至会演变成听感更流畅的Future Funk。VHS Pop的意象有大城市、明亮的灯光、奢华、80年代的俱乐部和点唱机等，以及继承了其上位Late Nite Lo-fi中深夜广播和电视中的怀旧感。随着时间的推移，该流派的定义也发生了显著的变化，采用了更多种不同的流行元素，比如最近的“受蒸汽波影响的、但非Vaportrap式的器乐嘻哈”。", "chapter": "Post-Internet", "examples": ["Soft Heat - Whitewoods【专辑：Spaceship Earth】【https://www.youtube.com/watch?v=T4jpwER9dfU】（1：37开始）", "Summer Night - Untitled Archive / ESPRIT 空想"]}, "glo-fi": {"name": "Glo-Fi", "ups": ["Vaporwave", "Chillwave", "Hypnagogic Pop"], "downs": [], "aka": "Vapor2", "related": "Fringewave", "desc": "Vito James将“Vapor2”描述为Vaporwave声音的进化版：“它使Vaporwave的声音比以往任何时候都更加大胆”。“Vapor2”这个名字最初只是Dan Mason在Twitter上的一个玩笑，不过，正如eccodroid解释的那样，“我们（他和Dan Mason）一直觉得这个玩笑挺好笑的，直到我们真的开始把它当作一种流行趋势来认真对待。”这种演变旨在完善传统的蒸汽波音乐，主张蒸汽波需要“更高水平的制作”，在音乐形式上，Glo-Fi是更低保真、更复古的Chillwave，其特点是将Chillwave的怀旧/海滩情怀、Hypnagogic Pop的低保真迷幻感与蒸汽波的制作风格相融合，听起来像是一种层次复杂且精致的流行舞曲。", "chapter": "Post-Internet", "examples": ["Moonlight - S U R F I N G【https://www.youtube.com/watch?v=0SMgUlZrQ-o】（1：04开始）"]}, "metro-ko": {"name": "Metro-Ko", "ups": ["Vaporwave", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "Metro-Ko是一种美学、场景，也是一种音乐微流派，诞生于2012年11月，是对Vaporwave的反叛、继承与进一步发展。这种音乐在帖子中被形容为：“低保真、简约的Synth-pop，注重模拟音色的温暖感，曲目长度不超过4分钟，大量使用来自流行媒体的采样，很少循环播放，取而代之的是极致的氛围感，类似于‘更安静、收敛的Burial加上OPN加上Elite Gymnastics加上Grimes加上游戏原声带’的感觉。”Metro-Ko有着一种未来大都市的孤独感，受到新媒体（主要是互联网）、极简主义美学的影响，音乐中有着低保真流行乐、Ambient/Drone、Chopped & Screwed以及20世纪90年代中期至21世纪初电子音乐场景的影子（如Burial、Echospace和The Future Sound Of London）。截至2013年年中，这一场景的主要艺术家包括dear envy、G://2501 Goldleaf Table、Juche、mayaku 773、NewRomancer、Nightchase、NINGEN、Speedrest.、Tick/slave、Yakui、York Morgan。", "chapter": "Post-Internet", "examples": ["Infrastructure - Slowriot【专辑：Urbane Miasma（Youtube上没有，Bandcamp上有）】"]}, "vapornoise": {"name": "Vapornoise", "ups": ["Vaporwave", "Noise"], "downs": [], "aka": "Vapournoise、Noisewave", "related": "", "desc": "Vapornoise是公认的一个蒸汽波子流派，特点是利用噪音、信号干扰等颠覆性的声音。有些作品只是商业音乐/广告的音乐采样，在此之上添加效果，而更多的作品则在此基础上叠加一层刺耳的噪声。Vapornoise早已存在（2012年左右），但在“第二批蒸汽波”之后才逐渐流行起来（“第二批蒸汽波”见后蒸汽波的介绍），涌现了很多支持该流派的作品和该流派的讽刺性/批判性作品。", "chapter": "Post-Internet", "examples": ["➠__HyperSpace__➠ - ◂☆▸【专辑：☆☆SUPERSTAR星座☆☆】【https://www.youtube.com/watch?v=7jGutJHW7og】（7：24开始）"]}, "vaportrap": {"name": "Vaportrap", "ups": ["Vaporwave", "Trap"], "downs": [], "aka": "", "related": "", "desc": "Vaportrap是一种存在了很久的的蒸汽波音乐，它颇具争议性，因为它的听感与“第一批蒸汽波”并不一样（“第一批蒸汽波”见后蒸汽波的介绍），但却非常流行，从某种程度上说，它与Future Funk一样，定义了蒸汽波音乐的主流需求。Vaportrap融合了各种各样的采样，尤其是电子游戏音效、蒸汽波常用采样，但它的不同之处在于使用Beat来创造一种类似Trap/嘻哈的声音，这与大量蒸汽波作品中经常出现的“缓慢”的氛围完全不同。Vaportrap最早由这一流派最著名的艺术家Blank Banshee推广开来，现在已发展成为对蒸汽波音乐趋势的一次重新定义，并被一些听众认为这是一门蒸汽波制作人的必修课。", "chapter": "Post-Internet", "examples": ["Anxiety Online! - Blank Banshee【专辑：Blank Banshee 1】【https://www.youtube.com/watch?v=zcpiKIgjG74】（1：06开始）"]}, "mallsoft": {"name": "Mallsoft", "ups": ["Vaporwave"], "downs": [], "aka": "Mallwave", "related": "", "desc": "Mallsoft是蒸汽波音乐的一个子流派，最早出现于2012年，将蒸汽波音乐的主要特征与背景音乐/电梯音乐相融合。Mallsoft通常会对商场/购物中心常播放的音乐进行采样，如Easy Listening、Smooth Jazz等类型的背景音乐或类似Muzak的电梯音乐，有时还会混入一些Ambient的元素。除了蒸汽波中常见的制作手法外，Mallsoft艺术家还经常对采样使用大混响大延迟等效果。Mallsoft音乐给人一种身处拥挤的大型商场的感觉，有巨大的空间感和强烈的朦胧感，实际商场的现场录音也是常用的手段，2016年猫 シ Corp.的专辑《ショップ @ ヘルシンキ》就是一个例子，歌曲中使用了来自芬兰赫尔辛基商场的实地录音。在主题上，Mallsoft强调“怀旧”而“朦胧”的逛商场的感受，有时也会表达对逛商场和20世纪80-90年代消费主义的怀念，此外超资本主义、反资本主义的主题也很常见，另外，一些Mallsoft还会营造更加阴森不祥的氛围，唤起人们对废弃、空旷商场的感觉。Hantasi在2012年末发行的首张专辑《Vacant Places》是这一流派的早期代表作，这张专辑中加入了大量的延时和混响效果。在接下来的几年里，其他著名专辑包括식료품groceries的《슈퍼마켓Yes！We're Open》和猫 シ Corp.的《Palm Mall》。", "chapter": "Post-Internet", "examples": ["Palm Mall - 猫 シ Corp.【https://www.youtube.com/watch?v=ENkZGgARPS4&t=389s】（13：33开始）"]}, "future funk": {"name": "Future Funk", "ups": ["Vaporwave", "Funk", "House"], "downs": ["Anime Groove"], "aka": "Vaporboogie、Japanese Disco", "related": "", "desc": "2010年代初期出现于蒸汽波场景中，比旧蒸汽波更有活力，融合了French House和Synth Funk，不变的是歌曲中出现的来回变化的滤波效果、采样其他歌曲、低保真、卡带效果等蒸汽波传统艺能。Future Funk最常采样的音乐类型是City Pop，其次也常采样Boogie、Synth Funk、Disco音乐等，相当于分别是“日本迪斯科”和“欧美迪斯科”，由于采样音乐类型与歌曲的混音及编排不尽相同，从听感上便可以分成“日式Future Funk”和“欧美Future Funk”（采样音乐类型与听感的关系并不绝对）。Future Funk是最主流的蒸汽波子流派之一，其火爆程度甚至脱离了蒸汽波的约束，形成了自己的圈子，有些人也认为现在的“Future Funk”不属于蒸汽波音乐的子分支，当然这是由于每个人对“蒸汽波”的定义不同，Future Funk依然保留着蒸汽波的主要制作手法，如果能接受“制作手法继承了蒸汽波即可以认为属于蒸汽波”的话便可以认为Future Funk依然是蒸汽波子分支，或属于“广义蒸汽波”。", "chapter": "Post-Internet", "examples": ["Get Rdy - Desired【https://www.youtube.com/watch?v=R7-2dMq3ONA】（1：28开始）"]}, "anime groove": {"name": "Anime Groove", "ups": ["Future Funk"], "downs": [], "aka": "", "related": "", "desc": "Anime Groove是“日式Future Funk”的子分支，以动漫音乐采样为主角的Future Funk/French House型舞曲，在保留基本结构仍为Future Funk的基础上，采样歌曲通常是作为动漫op/ed/插曲的Anisong、J-Pop、J-Rock、Synth-pop、Dance-pop等，而且往往是相比City Pop、Boogie等类型来说更“新”的音乐，并且通常会强调歌曲中的女声（有时是人为调高了音调的）。一般来说，Anime Groove的听感要比Future Funk更轻松、清新、愉快，没有大多数Future Funk混音所带来的“厚重感”，并十分强调通过采样音乐与鼓组搭配出的“Groove”感。", "chapter": "Post-Internet", "examples": ["the new sweet groove - Plexi.【https://www.youtube.com/watch?v=2-mCpRYCM7A】（3：05开始）"]}, "dreampunk": {"name": "Dreampunk", "ups": ["Vaporwave", "Ambient", "Futurism"], "downs": [], "aka": "Dream Music", "related": "", "desc": "2015年英国厂牌Dream Catalogue提出了Dreampunk这一术语，这是一种受到Ambient和Progressive Electronic的影响，和Slushwave相似，但听感较为清晰、梦幻而神秘的音乐。这种音乐往往建立在抽象的音景之上，封面使用抽象的城市景观图像，并融入未来主义和赛博朋克元素，标题使用日文、汉字等，人声采样也会用日文对话或中文对话，体现反乌托邦主义。2015年初，2814发行了一张极其具有历史意义的专辑《新しい日の誕生》，之后便有更多新的小型厂牌和艺术家开始制作这一类型，经过不断的发行、多年的尝试，Dreampunk类型的作品在Bandcamp和其他平台上已如一片海洋。进入2020年代后，这一音乐流派已经从蒸汽波起源中脱离出来，成为一种特殊的独立音乐流派。时至今日，Dreampunk仍然是蒸汽运动中最受欢迎的子类型之一。", "chapter": "Post-Internet", "examples": ["nostalgia of slumber [am] - Echochamber【专辑：I'm Real, I'm Here】【https://www.youtube.com/watch?v=IOggGAAAl-M&t=1248s】（20：19开始）"]}, "churchwave": {"name": "Churchwave", "ups": ["Vaporwave"], "downs": [], "aka": "Christwave、Gospelwave", "related": "", "desc": "Churchwave据称是德克萨斯蒸汽波制作人Vacation Bible School在2018年创造的一个术语。Churchwave是指带有基督教元素或基督教音乐流派（如CCM）的蒸汽波，是一种类似废弃教堂大厅的声音。最早的发行是DEEPSEA 2014年的EP《Christwave EP》。2018年，来自德克萨斯州的蒸汽波制作人Vacation Bible School创造了Churchwave这个词，并开始推出更多这种风格的作品、文章和博客。也有很多其他艺术家参加了进来，包括HeReigns™和グルーヴィー [H O L Y] 使徒 12。", "chapter": "Post-Internet", "examples": ["A Frozen Little Suburb - Vacation Bible School【专辑：Advent in the Snow】【https://www.youtube.com/watch?v=G9P6xpMOLGQ&t=618s】（11：25开始）"]}, "slushwave": {"name": "Slushwave", "ups": ["Vaporwave", "Hypnagogic Drift"], "downs": [], "aka": "Phaserwave、Dreamtone", "related": "", "desc": "Slushwave一词至少可以追溯到2013年底，当时是由T e l e p a t h テレパシー能力者在SoundCloud和Bandcamp上为自己的几首曲目创造的标签。Slushwave被认为是Vaporwave的一个子流派，采用单一采样，营造氛围音乐的音景，并堆叠大量的效果和失真，最典型的是相位器、延迟和混响，形成了一种有别于典型Vaporwave的“泥泞”的声音。此外，Slushwave的另一个特点是很长的歌曲时长（超过6分钟），因为循环音轨通常会缓慢而大量地重复，以达到催眠效果。采样来源往往与典型Vaporwave相同，如80/90年代流行音乐和当代R&B，一些艺术家也会使用City Pop。Slushwave很可能诞生于Hypnagogic Drift场景下或至少受到了这种音乐的启发。从美学角度看，Slushwave通常是“夜间的”或特别“梦幻的”，曲目标题通常完全是日语或汉字，专辑封面通常是80/90年代女性的朦胧剧照。时至今日，Slushwave已成长为一个Vaporwave中不可或缺的代表类型，发行了许多知名的作品。", "chapter": "Post-Internet", "examples": ["水中夢 - 仮想夢プラザ【https://www.youtube.com/watch?v=2dbJbOsPorM&t=589s】（13：14开始）"]}, "hardvapour": {"name": "Hardvapour", "ups": ["Post-Internet", "Vaporwave", "Gabber", "Post-Industrial"], "downs": [], "aka": "Hard Vapor、Hard Vapour、Hardvapor", "related": "", "desc": "Hardvapour（硬蒸汽/硬蒸）是从Sandtimer的《Vaporwave is Dead》等其他一系列具有影响力的专辑中诞生出来的词汇，更像是与蒸汽波并列发展的流派而不是蒸汽波的子类型，最初在2015年末由wosX提出，刻意地反乌托邦美学主义，通常用类似Gabber的节拍，主题往往是毒品文化和赛博朋克，虽然有人认为这些俱乐部风格的音乐并非真正意义上的蒸汽波，但在直接听感上还是十分“蒸汽波”，并有着相似的美学。硬蒸没有严格的定义，只是在特征上全部站在蒸汽波的对立面，“如果说蒸汽波听起来像是从未来主义虚拟广场上传来的光鲜亮丽的商场杂音，那么硬蒸则是一群赛博朋克人劫持了这个广场，他们黑进高音喇叭，一边在荧光灯下投射莫名其妙的logo/图案，一边大声叫唤。”如今，Hardvapour仍是一种小众的子流派/美学，并且仍然有很多争议/批评者。", "chapter": "Post-Internet", "examples": ["No One - Halo Acid【专辑：No Dreams】【https://www.youtube.com/watch?v=KtsgTj_OCbU】（2：00开始）"]}, "oceangrunge": {"name": "Oceangrunge", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Seapunk分支）", "chapter": "Post-Internet", "examples": []}, "parody/satirical": {"name": "Parody/Satirical", "ups": ["Vaporwave"], "downs": [], "aka": "Vapormeme、Broporwave6395|Vapormeme是一个讽刺蒸汽波的术语，这种音乐的制作人往往在没有什么缘由地将蒸汽波的美学风格与各种风格混杂在一起，以一种混乱的方式呈现出来，毫无目的可言。同样，Vapormeme也有几张重要的专辑，基本上是要么是讽刺这一流派的制作方法，要么是恶搞蒸汽波的经典专辑。这些作品进一步利用了meme文化，而事实上Vaporwave音乐确实一直是meme文化的一部分。", "related": "", "desc": "", "chapter": "Post-Internet", "examples": ["無題 - The Darkest Future【专辑：Floral Shoppe 2】【https://www.youtube.com/watch?v=0xswbodQMnY】（Full Album视频里随便选一段就行）"]}, "post-vaporwave": {"name": "Post-Vaporwave", "ups": ["Vaporwave"], "downs": ["Deathdream", "Barber Beats", "Vapornoise"], "aka": "Post Vaporwave、Post-Vapourwave、Post Vapourwave", "related": "", "desc": "“经典蒸汽波”往往专注于乌托邦、虚拟世界、梦幻而温暖的场景，可以理解为“第一批蒸汽波”，而2014/2015年左右之后的蒸汽波即可理解为“第二批蒸汽波”，爱好者们经常用“后蒸汽波”这一标签来形容这种音乐。在音乐形式上，后蒸汽波是蒸汽波在保持10s初的基调的基础上，与现代嘻哈、House、DnB等其他电子元素结合的产物。相比于经典蒸汽波，后蒸汽波音乐的主题往往更加内省、收敛，经常描述黑暗、冷漠、暗淡、甚至死亡等场景。“后蒸汽波”并不意味着2015年前后蒸汽波形式有着非常明显的改变或非常明显的转折点，这只是一个诞生于互联网的不严谨的词汇，用来给部分符合描述的蒸汽波作品贴上标签而已，一般用来形容Slushwave、Vapornoise、Deathdream、Barber Beats等类型的音乐。", "chapter": "Post-Internet", "examples": ["BARREN - Orpheus Corporation™【专辑：BRUTAL（Youtube上没有，Bandcamp上有）】"]}, "deathdream": {"name": "Deathdream", "ups": ["Post-Vaporwave", "Broken Transmission", "Vapornoise"], "downs": [], "aka": "Dark Vaporwave", "related": "", "desc": "Deathdream更像是一个场景而不是一个严格的Vaporwave子流派，大约诞生于2015年末至2016年初，尽管在几年前的专辑里就已经有它的影子了。Deathdream的主要特点是借鉴了Broken Transmission和Vapornoise的极低保真音效，以及非常稀疏的极简主义采样，并被Dark Ambient式的Drone氛围音所覆盖。这一类型专辑最重要的共同点是关于死亡、神秘感、被遗弃等一系列主题。音乐常常会让听众迷失在朦胧的人声、呼啸声中来表达绝望，但有些专辑也会通过人声合唱或柔和的合成器音色来展现忧郁之情。噪音也是这些专辑的重要组成部分，小到传输中断造成的Glitch，大到能够完全覆盖音乐的刺耳风声。", "chapter": "Post-Internet", "examples": ["Alone - Chinese Hackers【专辑：░▒▓死▓▒░】【https://www.youtube.com/watch?v=MlaKHuUc3Kg】（0：44开始）"]}, "barber beats": {"name": "Barber Beats", "ups": ["Post-Vaporwave", "Trip Hop", "Chill-Out"], "downs": [], "aka": "", "related": "", "desc": "理发师节拍主要是由2010年代中后期的蒸汽波和更大规模的蒸汽运动发展而来，其特点是融合了Downtempo、Trip Hop、Instrumental Hip-Hop甚至是Nu Jazz的元素，与许多蒸汽波相比，该流派对蒸汽波精神/美学的“反讽”和自我指涉较少。此外该流派还摒弃了Dreampunk/早期蒸汽波等流派中突出的明亮感、大混响和超现实的声音，转而采用听起来更“有机”的音景，通常包括乐器Live采样，甚至是受New Age启发的部落鼓和打击乐。与其他蒸汽波不同的是，许多制作人故意模仿一种故意过时的、听起来像上世纪90年代的氛围，其中许多元素与上世纪90年代的地下Chill-Out音乐十分相似，偶尔甚至也会出现Atmospheric Drum & Bass、Ambient House和Progressive Breaks等流派的元素。“理发师节拍”这一说法是Aloe City Records为Haircuts for Men的风格创造的一个术语，并在2020年代使用范围迅速扩大。该流派在蒸汽波场景中也有着特别的批评，因为许多制作人过于依赖“偷来”采样，并将其重新混音制作理发师节拍，尤其是较老的蒸汽波曲目。理发师节拍通常具有与众不同的视觉风格（部分灵感来自于“酸性设计”的平面设计风格），使其有别于以往的蒸汽波，它的封面精致、奢华，通常都还会带有专门修过图的神话人物、古典雕塑等图像，并配以黑胶唱片风格的装饰设计。很长一段时间内即便是同时期的Slushwave被确立为Vaporwave子分支Barber Beats也没有相同的待遇，始终在地下音乐界内不温不火，只有近年来主流Vaporwave热度骤冷时，很多Barber Beats才出现在大众媒体上，甚至是以“Webcore”的形式出现。", "chapter": "Post-Internet", "examples": ["The Sweetest Taste In The World - Mabisyo【专辑：Hentai Jazz】【https://www.youtube.com/watch?v=-8tm4cZ1_Tk】（0：37开始）", "Blossom - DΛRKNΣSS"]}, "seapunk": {"name": "Seapunk", "ups": ["Post-Internet", "Vaporwave", "Breakbeat", "Abstract Hip-Hop etc."], "downs": ["Icepunk", "Slime Punk", "Ocean Grunge"], "aka": "", "related": "", "desc": "Seapunk是一种起源于千禧年后不久的网络美学浪潮，一定程度上跟Vaporwave相像。Seapunk词如其名，是以海洋美学为核心的艺术风格，并且伴生着一种音乐风格。这类音乐有类似蒸汽波的范围，同时会大量使用碎拍元素和水相关的音效/采样，烘托一种夏日海洋的场景。 Seapunk在一段时间内的外网非常流行，甚至Lady Gaga和Kety Perry的音乐里都会用到相关元素，随后这种风格的声音跟电子流行逐渐重合，该风格也逐渐消失，如今仅有少量蒸汽波/解构俱乐部制作人会制作这种音乐。 Seapunk也有少量分支，包括下面要介绍的Icepunk以及Slimepunk和Ocean Grunge等。实际上Seapunk与Vaporwave有很大交集，因此在2010s中后期二者区别已经趋于消失了。现有的代表制作人包括Ultrademon等。", "chapter": "Post-Internet", "examples": ["1996 - Ultrademon", "Yr So Wet 1.0 - Fire For Effect"]}, "icepunk": {"name": "Icepunk", "ups": ["Seapunk", "Witch House", "Cleancore {Aesthetics}"], "downs": [], "aka": "Icecore", "related": "", "desc": "Icepunk是Seapunk关系最近的子流派，也是对Seapunk美学的一个回应/批判。Icepunk的意象常常与积雪、冰瀑、雾凇等画面相关，主色调是青蓝色和白色，给人以一种冷峻的感受。Icepunk音乐跟Witch House有小范围交集，常用碎拍和压抑的合成器烘托冰冷的氛围。目前制作这种风格的制作人也很少，基本上是部分Witch House/Seapunk制作人参与制作。", "chapter": "Post-Internet", "examples": ["Hygieia - Lenticular Clouds"]}, "slimepunk": {"name": "Slimepunk", "ups": ["Seapunk", "Trap"], "downs": [], "aka": "Neon Ooze, Slime Punk", "related": "", "desc": "Slimepunk是一种Seapunk微流派，于2010年代初在互联网社区中出现。它的特点是以与粘液相关的流行文化参考为主的美学，包括Toxic Avenger、slime-time live、mountain-dew和toxic waste。与Vaporwave和Seapunk类似，这种美学是后互联网美学风格中不可或缺的一部分。Slimepunk音乐经常以厚重且失真的Bassline为特色，并且主要来自Post-Acid Scene，歌曲往往更具侵略性或听觉上的腐蚀性。虽然没有特定的Slimepunk声音，但Slimepunk美学是一个共同的统一因素，大多数Slimepunk艺术家在他们的音乐中都采用了大量类似的采样。", "chapter": "Post-Internet", "examples": ["Dark Artifact - G Jones"]}, "ocean grunge": {"name": "Ocean Grunge", "ups": ["Vaporwave", "Seapunk", "Grunge", "Ambient etc."], "downs": [], "aka": "Oceangrunge", "related": "", "desc": "Ocean Grunge是一种以音乐为中心的美学，被认为是2014年开始的Seapunk的黑暗版本。它从Seapunk和Vaporwave中汲取了很多元素，但通常与其他两个视觉媒介相关的彩色调色板相比，它应用了主观色彩感知上更深的氛围和色调，以换取更深邃的黑色、灰色和柔和蓝色色系。Ocean Grunge美学常常利用深海相关的美学意象，包括沉船和海洋深渊最深、最黑暗部分的水生生物，既现实又超现实。然而，如果Ocean Grunge主题碰巧是海底旅行主题相关，那么大量的黄色、白色、黑色、深靛色会创造出稍微丰富的色系。 音乐本身从早期的 Vaporwave、Drone、Nu-Metal和Grunge中汲取了很多灵感，并且确实与Witch House有一些相似之处，虽然Witch House有更多的诡异和空灵的气息，但Ocean Grunge往往是更空洞和令人沮丧的，不过Ocean Grunge仍然带有与海洋/海洋主题相关的美学特质。", "chapter": "Post-Internet", "examples": ["plastic energy コンセプチュアルデザイン (feat. Chichilcitlalli) - VANITAS命死 / Chichilcitlalli"]}, "hexd": {"name": "HexD", "ups": ["Vapor", "Hip-Hop", "Glitch", "Noise", "EDM", "Ambient"], "downs": ["HexD Jumpstyle", "Sextrance", "Surge"], "aka": "Hex、Hexxed", "related": "", "desc": "HexD是2019年出现在Soundcloud的一个微流派，最初由网络电子音乐组合Hexcastcrew开发。随后成员Stacy Minajj (tomoe_the undy1ng)发布混音作品《Rare RCB hexD.mp3》，标志着HexD的声音的正式确立。这首Mix由现有的Reptilian Club Boyz的曲目制成，被看做是第一首真正意义上的HexD音乐。 HexD更多表现为一种对声音的处理手法，特点是对人声尤其是混音素材进行大量Bitcrush，有时还会加速和提高音量，以及高度压缩和扭曲的制作，通常以Trap、Cloud Rap、Emo Rap等流派的现有材料为基础，以Trance、Breakbeat为背景。HexD音乐滥用延迟和重混响等附加音效，旨在营造一种梦幻、阴暗、超现实的氛围或怀旧感。不过当下更多音乐人则将重点放在未来主义、近乎机械的氛围上。同时，HexD音乐也是Vapor场景的衍生品，是蒸汽波的精神衍生物，多有超现实、神秘主义、自我讽刺的声音与美学的影响。 HexD具有强大的包容性，可以和Trance、Trap、Hardcore甚至J-Pop融合，形成大量分支，例如与Experimental Trap结合的子分支Crushed Trap、与Jumpstyle/Hardstyle融合的子分支HexD Jumpstyle/Internet Jumpstyle、与Hip-Hop结合的子分支Surge和Krushclub等。", "chapter": "Post-Internet", "examples": ["सोमवह्निप्रकाश - Xxtarlit⚸", "MP3PSYCHOSIS - Jxxl3s / taconiel"]}, "sextrance": {"name": "Sextrance", "ups": ["HexD", "Hard Trance", "Techno-Rave", "Hyper Techno"], "downs": [], "aka": "", "related": "", "desc": "Sextrance是HexD音乐的一个衍生分支，风格名来源可能是暧昧的动漫或电影采样。Sextrance脱胎于HexD Trance，二者目前的区别已经很小了。Sextrance听感上更接近基于Freeform形式的HexD，但是拥有更多Euro Dance/Hard Trance的声音特色。Sextrance声音同样相对粗糙，但是十分情绪化，因而很多Hyper Trance/Hyper Pop制作人也会去制作这种风格的音乐。 相关专辑：Sextrance Worldwide (2022)、Sextrance Worldwide Vol. 2 (2023) 代表制作人：Exodia、#ff85f7、dj saratonin、sienna sleep等。", "chapter": "Post-Internet", "examples": ["Evocation - Exodia"]}, "krushclub": {"name": "Krushclub", "ups": ["HexD", "Jersey Club", "Hyper Pop/Sigilkore", "EDM", "Drift House"], "downs": [], "aka": "KRUSHCLUB!", "related": "", "desc": "Krushclub是Lumi Athena用来形容自己音乐风格而造的复合词汇，由Krush(即Crush)和Club(来自Jersey Club)组成，因此音乐也具有类似Crushed Trap的HexD模糊感和Jersey Club的节奏型。除此之外，Krushclub还受到了Hyperpop流派Sigilkore的影响，导致音乐阴湿恐怖，模糊感很强烈。由于歌曲延续HexD精神，大量使用Bitcrush，使得锯齿状的声音频频出现。 近年来Krushclub受到UK Dance、House、Techno等主流EDM风格影响，诞生了标签“EDM Krushclub”，这种音乐更多地脱离了HexD的束缚，弱化了人声的比重，减少了锯齿状声音和Bitcrush效果，给人更多“孤独的欢快”的感觉，代表有作品Fluxxwave - Clovis Reyes。由于这类音乐常常有Drift House制作人跨界制作，因此常常被误认为“Phonk”。", "chapter": "Post-Internet", "examples": ["LOVE ME! - KIRXSHA", "Fluxxwave - Clovis Reyes"]}, "nightcore": {"name": "Nightcore", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Internet分支）", "chapter": "早期流派/手法/理念", "examples": []}, "post-nightcore": {"name": "Post-Nightcore", "ups": ["Nightcore", "Hyper Pop"], "downs": [], "aka": "Nightcore Revival", "related": "", "desc": "Nightcore的子分支，专指受到Plunderphonics以及其他音乐流派影响的Nightcore，从根源上讽刺Nightcore的作曲手法，将一些完全不应该升速（即用Nightcore手法处理）的歌曲用Nightcore手法处理（例如Nightcore常常采样的是类似Eurodance、Bubblegum Dance、Hands Up之类的音乐并升速，而Post-Nightcore采样的音乐是Future Bass、Trap、另类摇滚、当代R&B、独立民谣等），同时将动漫人物PS到各种图片中。尽管最初的目的是讽刺，但这些制作人们逐渐开始赋予它新的背景、概念，变成了一个流派，甚至于与蒸汽波、Hyperpop等场景有一定程度的相互影响。 概念Nightstep是一种特殊化的Post Nightcore，指专注于Dubstep/Heavy Dubstep的Nightcore Mix，因为场景仍属于Post Nightcore，故不在US Bass领域专门设立词条。", "chapter": "Post-Internet", "examples": ["Sugars & Spice - NEOCAFE【专辑：Vivian Girl Jams】", "Summer Ashes [Nightstep Edit] - Kevin Drew", "Forever Shining - Nightcore"]}, "froggycore": {"name": "Froggycore", "ups": ["Nightcore", "Drum & Bass", "Trap"], "downs": [], "aka": "", "related": "", "desc": "依据电子音乐维基的说法，Froggycore是Nightcore的一个子类型，使用与Nightcore类似的加速旋律或采样。将其与Nightcore区分开来的是该类型使用了Drum & Bass和Trap的元素。Froggycore起源于东海岸，在费城、纽约、亚特兰大和巴尔的摩产生了一小群艺术家。该流派被认为始于费城。该流派的常见手法包括使用混音人声或样本，并大量使用奇怪的音效。该流派中使用最广泛的音效是枪声，几乎每个艺术家都在使用，并且并非特定地区的艺术家所独有。 费城的Froggycore制作人经常使用老鹰队的音效（很可能是为了向该市的足球队致敬）；然而，在亚特兰大场景中，艺术家则常常使用Falcons的声音。", "chapter": "Post-Internet", "examples": ["Wasted - Juice Wrld / Lil Uzi Vert / Nightcore / Lil Stranger"]}, "robloxkore/digicore": {"name": "Robloxkore/Digicore", "ups": ["Hip-Hop", "Hyperpop"], "downs": ["Glitchcore"], "aka": "", "related": "", "desc": "Robloxkore A.K.A. Robloxcore 2010年代后期发展起来的一种嘻哈音乐，在后互联网/亚文化圈/Hyperpop场景中诞生，特点是大量使用合成器、夸张的制作手法、杂乱的Bassline和鼓组编排、故障音的大量使用、Autotune过的人声、大量堆叠切碎的采样/人声、节奏快、常使用动画作为载体，制作人经常会受到EDM（2010s）的影响，有时还会受到摇滚和流行的影响。Digicore通常更多偏向于嘻哈音乐的制作，这一点不同于明显EDM倾向的Hyperpop。Digicore在Tik Tok中的后互联网炫技视频的BGM中大量被使用，这也是为什么许多Hyperpop艺术家拒绝将自己的音乐描述为Digicore。这类音乐的封面通常是低画质、过饱和的DIY图片艺术，经常使用当代游戏和网上流行文化的元素（如Roblox和Minecraft）。很多Digicore制作人还会将Glitchcore和Digicore区分开来，还提出了一系列Hyperpop衍生的分支，如Glitchsphere、Dariacore等(均见下文)。", "chapter": "Post-Internet", "examples": ["1:15 - 8485 (Robloxkore)", "5g - brakence (Digicore)"]}, "glitchsphere": {"name": "Glitchsphere", "ups": ["Glitchcore", "Ambient", "Trap", "Pop Rap", "Wave etc."], "downs": [], "aka": "", "related": "", "desc": "Glitchsphere是一种基于Glitchcore、Digicore和氛围乐/Liquid Trap/Wave的一种Hyper Pop流派，由日本制作人Yandere于2019~2020期间提出，但是该标签实际上是坊间流传的说法，实际的情况是Yandere并未提出这种说法，不过这种音乐在互联网上尤其是东亚Hyper Pop圈已经相当流行，再加上其本身既融合了Glitchcore的失真节拍和汹涌情绪，又融合了浓厚的氛围感和Reese Bass等音色元素，因而被命名为“Glitchsphere”。Glitchsphere这个名词常常与New Wave Rap、Vinso、Tenoji等名词相关，因此也被认为是Soundcloud Rap/Hyper Pop的延伸。", "chapter": "Post-Internet", "examples": []}, "dariacore/hyperflip": {"name": "Dariacore/Hyperflip", "ups": ["Hyper Pop (2nd Stream)", "Breakcore", "Bit Music", "EDM", "Hybrid Trap etc."], "downs": [], "aka": "", "related": "", "desc": "Dariacore是一种亚文化衍生物，融合了meme文化和二次元要素，比如会大量采样动漫歌曲、同人音声、VTB直播实录、二游原声、J-Pop、欧美流行乐、网络meme等。Dariacore以爆炸失真、混乱的编排和极高频的snare为显著特征，并且极好地在Dubstep、Glitchcore之间做出了平衡。Dariacore由制作人Vektroid发明于2020年，由Jane Remover (A.K.A. Leroy, Zeke, DLTZK)发扬，并形成了定义专辑《Dariacore》(2021)。 Hyperflip则是形容主要由Breakcore、Jersey Club影响的Hyper Pop子流派，同样大量使用采样、模因引用、快节奏、混乱节奏和音高变化。一般认为hyperflip属于Dariacore或与之重合。", "chapter": "Post-Internet", "examples": ["I Hate You - ALICE GAS", "Can't be anything - Momone"]}, "animecore": {"name": "Animecore", "ups": ["Hyper Pop", "Digicore", "J-Pop", "Denpa", "Doujin Music etc."], "downs": [], "aka": "", "related": "", "desc": "Animecore最开始是一种互联网美学风格，主题上与宅文化、千禧年场景有交集，流行于2000s末期到2010s中期，旨在唤起观众对于萌系文化、童年时光的感情等，并吸引他们进行视觉上的演绎。一般的Animecore意象包括贴满墙壁的动漫周边、互联网流行动画如铃音等的相关亚文化同人作品等。Animecore场景的分化包括Trashy Animecore、Nightcore、Retro Animecore等。 Animecore作为曲风时专指一类大量融合二次元文化、日本动漫及同人文化场景的Hyper Pop/New Wave Rap，这些音乐常常与VOCALOID、一些电子游戏及同人(包括但不限于《偶像大师》系列、《东方Project》系列等)、一些经典萌系动画及同人创作(包括但不限于《美少女战士》、《魔法少女小圆》、《Angel Beats》、《侵略！乌贼娘》和《潜行吧！奈亚子》等)挂钩，并且常常以这些作品为主题，搭配电波系/伪音唱腔，以烘托一种甜味十足的萌系氛围。", "chapter": "Post-Internet", "examples": ["˙˚ʚ不安死✝︎ふぁんし〜♡ɞ˚˙ - THAIBEATZ, cyber milk"]}, "scenecore": {"name": "Scenecore", "ups": ["Hyper Pop", "Eurodance", "Punk Rock", "Anime Soundtrack etc."], "downs": [], "aka": "", "related": "", "desc": "Scenecore是一种首次诞生于2020年的Hyper Pop子分支，是对千禧年文化复兴场景的演绎。音乐常常使用千禧年流行的电子音乐作为基底，如Happy Hardcore、Eurodance等，并在此基础上采样电视动漫、新闻、非主流歌曲等原声并加入歌曲，形成一种奇特的怀旧感。目前制作这种音乐的主力军是98s~05s的年轻Hyper Pop制作人，因此音乐中充斥着千禧年左右的童年回忆之声，因此有些Scenecore也被国内Hyper Pop爱好者亲切地称为“娃娃丢音乐”。另外，Scenecore在风格上与Animecore和Digicore均有交集。", "chapter": "Post-Internet", "examples": ["Dreamcore - PATHETIC"]}, "hyper mandelão": {"name": "Hyper Mandelão", "ups": ["Hyper Pop (2nd Stream)", "Funk Mandelão", "Post-Industrial etc."], "downs": [], "aka": "Hyperfunky", "related": "", "desc": "Hyper Mandelão是Funk Mandelão与Hyper Pop合并的产物，诞生于2022年的巴西圣保罗。这种风格以Funk Mandelão为基，并在其上添加了大量Glitchcore、Digicore类似的声音纹理，并且将Post-Internet的声音融合进去，形成了这种奇特的Hyper Pop。这种风格的主要制作人包括DJ Mu540、DJ Ramemes 和 Pabllo Vittar等。 Funk Mandelão是2012年诞生于巴西圣保罗的一种风格，是Funk Caroica/Baile Funk的若干细小分支之一。MC Kekel、MC Bin Laden、MC GW、MC G15等街头艺术家抓住了Funk Carioca运动的好时机，创造了Hyper Mandelão，并由DJ Arana、DJ Henrique de Ferraz 和 DJ GBR等推广。Funk Mandelão拥有连续沉重的节拍和直白讽刺的歌词，且很适合为passinho伴舞，因而在年轻人当中很流行。", "chapter": "Post-Internet", "examples": ["Toma de Graça - Mu540 / DJ Turano / Mc Larisson"]}, "wave": {"name": "Wave", "ups": ["Electronic Music", "Grime", "Future Garage", "Trap", "Hip-Hop"], "downs": ["Hardwave"], "aka": "UK Wave、Euro Bass", "related": "", "desc": "Wave音乐起源于10年代中期，这个风格最知名的厂牌之一 Wavemob的主理人Klimeks只是用Wave来描述自己的音乐，后来Wave却逐渐演变成了这个音乐流派的名字。 虽然rym上的简介说Wave音乐诞生地点在英国伦敦，但是这种音乐的整体让人并不感到特别英式，它吸收了很多 Future Garage以及Trap/Dubstep和Witch House的影响，不得不提的是Cloud Rap似乎也与这个风格进行了某种程度上的混合，如果要形容Wave音乐给人带来的感觉，几个形容词可以大致概括:梦幻，冰冷，怀旧，未来感，情绪化.最初的Wave可以被大致定义为UK Wave，即主要受到 Dubstep/Grime的影响的类型，以及Trap Beat &808为主导的和Witch House进行融合的类型还有就是基本上可以被描述为Future Garage的类型，由于近年来Wave音乐商业化严重，一些厂牌/艺人为了追求成功把自己发行的架构变得愈加EDM化，虽然不乏良作，但是这种行为到了今天逐渐变成一种对抗的情绪，因而Wave被听众分化为Softwave以及Hardwave两种风格。", "chapter": "Post-Internet", "examples": ["Void - Rare"]}, "hardwave": {"name": "Hardwave", "ups": ["Wave Music"], "downs": ["Cyber Wave (Tag)"], "aka": "Hard Wave", "related": "", "desc": "2016年左右出现的Wave子分支，放弃了Hip-Hop为导向的起源，变成了更加现代化的电子舞曲，听感上和Neo Trance大同小异。它保留了Wave音乐中典型的Reese Bass和冰冷的合成器音色，但融合了更多元的鼓组模式和“Big Room”式的音色，受到Trance和Hardstyle的很大影响，具有更饱满更Uplifting的Supersaws，甚至于融合Brostep和Dancefloor DnB等。Skeler被认为是该流派的先驱者和定义者，其他制作人包括Juche、Ytho、Deadcrow、Ennja、Heimanu、Bafu、Teneki、Aekae等。", "chapter": "Post-Internet", "examples": ["F U L L  C O N T R O L - Skeler."]}, "softwave": {"name": "Softwave", "ups": ["Wave Music", "Hardwave", "Dark Trap"], "downs": [], "aka": "", "related": "", "desc": "2017年Hardwave在商业上的成功引发了听众的不满，于是Wave听众相对于Hardwave提出的一个新术语，脱胎于Hardwave但是听感上不满足商业定义的一类Wave，相当于对Hardwave的一种叛逆。Softwave更加注重冰冷感和机械感，根植于808节奏，融合了Dream Trance类似的感受，意图创造一种宽广的空间感。与Hardwave接近EDM不同，Softwave反而更接近UK Wave，歌曲更加细腻柔和。该标签的最知名创作者是Klimeks，相关专辑包括《Plastician Presents - Wavepool》系列(2~3)。", "chapter": "Post-Internet", "examples": ["Sine - Klimeks", "Ectoplasm - Celestial"]}, "neo grime": {"name": "Neo Grime", "ups": ["Hardwave", "Instrumental Grime"], "downs": ["Hyper Trance"], "aka": "Neo-Grime", "related": "", "desc": "Neo Grime是Wave融合进Instrumental Grime的产物，大体上表现为Wave的音色+Grime的节奏型，有时也会保留Grime那种肮脏的Bassline，与Reese Bass形成了一定的对比。Neo Grime大约出现于2019年，由互联网制作人gl00my等牵头制作，一般来说Wave制作人也会跨界制作Neo Grime，且Neo Grime制作融合空间更高，因而特色更丰富，不易商业化。代表制作人包括LJC、gl00my、unfold33等。", "chapter": "Post-Internet", "examples": ["夢 - LJC"]}, "neo-trance": {"name": "NEO-Trance", "ups": ["Ambient Trance", "Euro Trance", "Wave Music", "HI-NRG", "HDM", "UK Dance(Jungle", "Breakcore", "DnB", "UKG) etc."], "downs": ["Harlecore", "Hyper Trance"], "aka": "Neo Trance", "related": "", "desc": "近年来，传统的Trance音乐陷入严重的模板化、同质化已然成为不争的事实，她们也因此退出RAVE舞池。这样的状况也为某种全新理念的Trance舞曲提供了催化作用。Virtual Self (A.K.A. Porter Robinson)在2017年发行了同名专辑，NEO-Trance（Neo意即New）的理念应运而生。此后，各路制作人接踵而至，尝试制作能够在地下或前卫Club舞池混音和播放的新Trance，为这棵极具生命力的种子灌溉施肥。其中较有代表性是Famitsu在Hyperboloid发行的《Ethereal》、Mall Grab的《Sun Flower》。 从元素角度出发看，NEO-Trance跟 Ambient Trance、Classic/Euro-Trance、wave music、Hardcore 都有明显交集，有的甚至索性做成 Jungle、DnB、UKG 等英式电子舞曲的节奏型，故名称中的'NEO'带有强烈的自由主义创作色彩。 对于NEO-Trance，需要强调的一点是：外网媒体杂志在2000s早期给出的定义是站不住脚的，甚至有些多此一举。时至今日的现实也完全验证了这一点，而最初被叫做NEO-Trance的，现在其实早已演变成了Melodic Techno。所以笔者认为NEO（当然也囊括之后的Hyper）概念的元年是2017，而不是更早DJ MAG的牵强命名。", "chapter": "Post-Internet", "examples": ["ANGEL VOICES - Virtual Self", "Ghost Voices - Virtual Self"]}, "harlecore": {"name": "Harlecore", "ups": ["NEO-Trance", "Hyper Pop", "Breakbeat", "Eco Grime etc."], "downs": [], "aka": "", "related": "", "desc": "Harlecore是英国DJ兼制作人Danny L Harle于其2021年的定义专辑《Harlecore》提出的NEO-Trance流派标签，一般展开形式是Hardcore Breaks/Breakbeat Hardcore + NEO-Trance/Hyper Trance，风格名由其艺名Danny L Harle命名。这类NEO-Trance保留了部分Trance的特色，但是创新性的将Amen Break作为歌曲最主要元素，并且仍然遵循四四拍的节奏型。与此同时，Danny L Harle也会在歌曲中加入Hyper Pop元素或Eco Grime元素等，丰富了Harlecore的展开。目前仅有Danny L Harle (马甲：Dj Danny)和少量网络制作人制作这种NEO-Trance。", "chapter": "Post-Internet", "examples": ["On A Mountain - Danny L Harle / Dj Danny"]}, "hyper trance": {"name": "Hyper Trance", "ups": ["NEO-Trance", "Hard Trance", "Gabber", "Euro Dance", "Hardwave", "Atmospheric Breakcore", "Jungle", "Drift House etc."], "downs": [], "aka": "", "related": "", "desc": "HyperTrance的概念外沿甚至比 NEO-Trance 还要更广，因为她更晚被提出，算是NEO-Trance的进一步自我演化。2021年，Volant（现更名为nuphory）牵头众多网络制作人发行了合集《HYPERTRANCE Vol.1》。一般来说，我们将其视为HyperTrance的起点。此后，越来越多的制作人开始制作NEO-/HyperTrance音乐，并发展出不同的流派，其中较为突出的有： ①Hardcore/RAVE 派（Gabba和Hard Trance是最具体的表现型） ②Euro Dance/ Y2K派（更注重旋律、NRG属性，具有强烈的“千禧味儿”） ③Internet HYPER + Hardwave / Breakcore （从编曲到混音，互联网音乐特质明显） 在厂牌方面，除了以nuphory为轴心的网络派制作人社群，还有像TDJ的Collection Disques，兼具传统和前卫属性的Union Trance Mission…… 本就十分数字化的出身，也多少赋予了它在未来\"元宇宙\"世界如鱼得水的可能性。或者说，她跟许多后EDM时代兴起的电子音乐品种都有类似的特征：爆发于实力强劲的网络制作人，传播方式更依赖于自媒体，音色颠覆传统配器。可以说NEO-/Hyper Trance，很好地弥补了了如今主流 Trance 在舞池律动和创造性上普遍不足的缺憾。然而，近年来Hyper Trance的风潮反而在走低，nuphory除今年年初出产的寥寥几首Hyper Trance外，其他的全部都是毫无技术含量的流水线Drift House，而Aekae、Porter Robinson等制作人，转而将重心放到了更擅长的其他风格上，HyperTrance的未来将何去何从?这也是一个切峻的问题。", "chapter": "Post-Internet", "examples": ["Leave The World Behind - nuphory (Y2K派) [0:57起始]", "GET READY - nuphory (Y2K派) [2:24起始]", "Divergence - Luna Lenta (Y2K派) [1:41起始]", "Yxguden - Evian Christ （Rave）", "Pump the beat - nuphory (Rave派) [1:21起始]"]}, "deconstructed club": {"name": "Deconstructed Club", "ups": ["Trap", "Ballroom Club", "Batida", "Jersey Club", "Grime", "Hard Drum", "Post-Industrial etc."], "downs": ["Hyper Pop", "Reggaeton"], "aka": "Post-Club、Experimental Club、Club-Not-Club、Avant-Club", "related": "", "desc": "21世纪10年代在互联网环境下诞生的一种音乐形式，制作人/DJ们将各种节奏如Trap、Ballroom、Batida、Jersey Club、Grime等合并并与工业音乐的声音混合，这种音乐被称为解构俱乐部，这类音乐常常涉及种族主义、女权主义、殖民主义、未来主义等主题，具有侵略性、非寻常的声音设计，多使用金属敲击声、玻璃破碎声、枪声等，描绘末日般的音景，节奏常常切换，也会涉及无调性。其他有关“解构”的术语也随之出现，如费城ATM举办的“Club-Not-Club”就是把当代R&B、流行说唱、噪音、电影切片解构重组，莫斯科的“Angelwave俱乐部”是把Trance解构重组。解构俱乐部也对Raggaeton、Hyperpop等音乐产生了影响。", "chapter": "Post-Internet", "examples": ["Saith - CELES7E"]}, "eco grime": {"name": "Eco Grime", "ups": ["Eco-Futurism", "Ambient", "IDM", "Instrumental Grime"], "downs": [], "aka": "", "related": "", "desc": "2010年代中期由英国、东欧及世界各地的制作人在互联网上掀起的音乐风格。2015年Eco Futurism Corporation厂牌在悉尼成立。Eco-Grime代表一系列实验性的，受到Grime或IDM影响的舞曲作品，用更加自然的声音描述未来的图景，即在人类破坏环境之后，地球上的生物以塑料为生，一台巨大的全能超级计算机治理着兔子国的国民。一个不知名的原始捕食者将在五大洲追踪它的猎物并造成破坏。", "chapter": "Post-Internet", "examples": ["eco world - Eco Futurism Corporation"]}, "weightless grime": {"name": "Weightless Grime", "ups": ["Ambient", "Instrumental Grime", "Deconstructed Club"], "downs": [], "aka": "", "related": "", "desc": "Weightless Grime首次定义在2014年的同名专辑“Weightless”里。这类Grime最大的特点是引入了更多氛围元素，减少了Grime原先的沉重肮脏Bassline和Kick，有些曲目甚至直接删去了这些，反而加入了类似Hardwave的强烈Reese Bass和其它音效，使歌曲充满失重感。目前主要由网络独立厂牌制作这种音乐，表现方式也不尽相同，很多Weightless Grime甚至加入了解构俱乐部的制作手法，充满了互联网特色。", "chapter": "Post-Internet", "examples": ["raw^ - Sentinel [1:09起始]", "124th - Mssingno"]}, "grave wave": {"name": "Grave Wave", "ups": ["Post-Internet", "EBM", "Dark Wave", "Future Pop", "Witch House"], "downs": [], "aka": "", "related": "", "desc": "Grave Wave是疫情大流行时代期间逐渐出现的一种EBM/Dark Wave微流派，主要由网络Pop EBM乐队发起。这类音乐特点是阴暗的合成器和模糊朦胧的女声vocal，显得具有大气感和空间感。歌曲一般很短，形式偏向自由，部分曲目与Witch House有交集。Grave Wave作为一种视觉效果，常常与BDSM文化、工业哥特、吸血鬼、修女等意象有关，色调阴暗昏沉，有一种类似于墓地/坟山类似的死亡感氛围，常常令人不安。", "chapter": "Post-Internet", "examples": ["My Cage - Sexual Purity [0:45起始]"]}, "weird soundcloud": {"name": "Weird Soundcloud", "ups": ["Pop Music", "EDM", "Plunderphonics", "Deconstructed Club"], "downs": [], "aka": "Soundclown", "related": "", "desc": "近两年在Soundcloud上兴起的一个微流派，主旨是将流行乐、EDM和金属等其他曲风以一种意想不到的奇怪混音方式或者演绎方式组合起来，例如将Metalica的经典激流金属曲目《Enter The Sandman》的高潮部分“嫁接”在鸟叔的江南Style《Gangnam Style》的旋律上，显得“小丑”一般滑稽，故也被叫做“Soundclown”。目前国内基本上没有人制作这种音乐，相关资料很少，且这种音乐制作人可能面临侵权指控，故仅在外网小范围流行过。", "chapter": "Post-Internet", "examples": ["the end goodbye - DICKSQUAD [1:58起始]"]}, "dancecore": {"name": "Dancecore", "ups": ["Hardcore", "Breakcore", "Post-Internet"], "downs": ["Hyper UK Hardcore (Tag)"], "aka": "", "related": "", "desc": "如今这个网络时代，HDM之间的界限已经变得逐渐模糊，Breakcore和英系核甚至与速核的结合已经是大势所趋，此时Dancecore的概念应运而生，注意此处的Dancecore与Hands Up的概念完全不同，仅仅是撞名。Dancecore虽然风格主体是主流碎核，但是会以Hardcore/UK Hardcore/Speedcore等为宿主而展开，并且会使用后互联网音乐特色，因此也会有Hyper Hardcore/Hyper UK Hardcore/Hyper House等类似的说法。", "chapter": "Post-Internet", "examples": ["Banshee - Dan Larkin / DJ Kuroneko [0:43起始]"]}, "tänzelcore": {"name": "Tänzelcore", "ups": ["Keller Synth", "Hardcore Techno", "Rave", "HexD"], "downs": [], "aka": "", "related": "", "desc": "Tänzelcore是Keller Synth的一种互联网流派，融合了声音粗糙原始的Hardcore Techno，并以此为基本结构，在其上加入Keller Synth的黑暗诡异声音，使其听感上兼具Dungeon Synth的黑暗和Hardcore Techno的工业纹理。由于这种风格主要是基于互联网，因此这种风格经常出现无调性作品。Tänzelcore与Keller Synth一样，和黑金属共用一个场景，常常与巫毒、女妖、魔法、鬼魂等超自然主题相关，每年也会有Keller Synth爱好者打扮成巫医鬼怪等举办以这种音乐为主的派对。", "chapter": "Post-Internet", "examples": ["Der ultimative Trip - Ruprecht 4500 [3:11起始]"]}, "gorge": {"name": "Gorge", "ups": ["Juke", "Footwork", "Industrial", "Hip-Hop", "Gamelan Music", "Newari Folk", "Gharana etc."], "downs": [], "aka": "", "related": "", "desc": "按照Gorge.in网站的描述，Gorge音乐被描述成一种流行于尼泊尔和印度北部山区喜马拉雅山脉的俱乐部音乐，这种音乐的特点则是常使用扭曲的Tom鼓，反映\"攀登过程中坚硬的岩石和肌肉的收缩\"。这种音乐是身份未知而伟大的攀登者兼音乐家DJ Nanga创作的，他还创作了\"峡谷公共许可证\"，用来约束这类音乐的制作。但是喜马拉雅人似乎并不理解这种规定，将这种音乐发布至互联网。这种音乐一经发布便立刻传遍大江南北，并孳生了很多\"艺术性\"的作品。 通俗来讲就是一种Juke/Footwork音乐，以扭曲的Tom鼓为特色，灵感来源于喜马拉雅山区民俗音乐。不过实际上融合进去的音乐不止于此，印度尼西亚的甘美兰音乐也被纳入融合范围内。", "chapter": "Post-Internet", "examples": ["TENGU - SCIBATTLON [1:02起始]"]}, "webcore": {"name": "Webcore", "ups": ["Post-Intenet", "Lofi", "Ambient", "Indietronica", "Vaporwave", "Indie Pop", "Microtonal etc."], "downs": [], "aka": "Enawave、Internetcore", "related": "", "desc": "依照美学维基的说法，Webcore是一种互联网美学，表达了对1990年代初至2010年代初互联网文化的怀旧之情，从Memphis Lite、Frutiger Aero、Y2K Futurism美学中汲取灵感，与Vaporwave有很大交集。在视觉风格上的分支包括Old Web、Digital Horror、Weirdcore、Dreamcore类。 与Vaporwave、Seapunk类似，Webcore也是音乐随着视觉风格出现，不幸的是，Webcore音乐因为一些社会问题迟迟未能成型。目前的定义是：与Vaporwave相关，使用怪异合成器声音或微分音制作的、类似于Juke、IDM、Techno或其他风格的电子音乐。因此，目前Webcore包含的制作人范畴相当大，从Kraftwerk到Machine Girl都可能被列入这个范畴内。 一般来说，Webcore音乐是以秘鲁动画师Joel G.的Webcore系列ENA的流行与网络接力式创作怪谈Backrooms为基础发扬出来的，实际上这种音乐在其他一些怪诞类游戏里也常被提及，某种程度上促进了这种音乐的成型。而Dreamcore、Weirdcore、Traumacore、Poolcore、Cutecore等核类艺术的兴起也为Webcore音乐的发展提供了土壤，因此宣传这些互联网美学使其脱离小众是必要的。可笑且可悲的是，中文互联网上很多所谓“小众艺术喜好者”一方面拥护这种风格的同时反而强烈反对这种艺术的出圈，这也造成了国内这些互联网艺术相关圈子的恶臭和自闭与对外界的不良刻板印象；与此同时ENA粉丝常年与Backrooms粉丝无休止地打笔仗，互相争夺“歌曲首次使用之地”的无意义名号。等等这些行为都极大程度上严重影响了Webcore音乐在国内的发展。", "chapter": "Post-Internet", "examples": ["backroom labyrinth - Oliver Buckland [1:25起始]"]}, "witch house": {"name": "Witch House", "ups": ["Post-Industrial", "Chopped & Screwed", "Shoegaze", "Darkwave"], "downs": ["Drag", "Witch House Rap"], "aka": "Haunted House、Screwgaze、Crunk Shoegaze", "related": "", "desc": "Witch House是2000年代后期兴起的一种电子音乐形式，它融合了很多其他流派的元素，包括源自Southern Hip-Hop（尤其是孟菲斯说唱）的鼓点编排和节奏；Chopped & Screwed阴暗、催眠、超现实的音色设计和混音技术；极简、哥特式的Darkwave和Ethereal Wave等；2000年代后期Synth-pop和Indietronica（尤其是Chillwave）的空灵的制作手法；以及Shoegaze和Dream Pop梦幻般的音墙质感。Witch House不是House范畴内的，属于后工业分支，与Chillwave有相似之处，Witch House部分是可以结合流行乐甚至是Industrial。制作人们不想让他们的音乐被搜索到，所以标题往往含有奇怪的特殊字符（如Unicode码）。曲子的主题往往黑暗恐怖，人声加了大量混响和失真几乎辨别不出来词句。Witch House由SALEM一手开创，并由CRIM3S和Unison等后来的著名人物进一步发展。共同特点基本上是：在源自Hip-Hop的节奏、嘈杂的Bassline、很高音调的Lead以及嗡鸣厚重的合成器音色之上，铺设改变音调并经过大量处理的采样。", "chapter": "Industrial Music", "examples": ["Lost - CRIM3S【https://www.youtube.com/watch?v=a4uyJyZjBNU&rco=1】", "Δnthem Of Haze - Summer Of Haze"]}, "industrial": {"name": "Industrial", "ups": ["Industrial Music"], "downs": ["Power Electronics", "Death Industrial"], "aka": "", "related": "", "desc": "工业音乐流派的名称来源于Industrial Records，该厂牌由工业音乐先驱Throbbing Gristle于70年代中期创立。这时最初的工业音乐称为“Industrial”，属于第一波工业浪潮，一般称为“Industrial (1st Wave)”，这一时期的工业音乐满是工业化、实验性的噪音，与现在大众友好的“后工业”元素有很大的区别。这一浪潮在80年代早期至中期逐渐消退，与这些实验性很强的前辈相比，更电子化、大众化的“后工业”更能受大众喜爱。工业音乐既是一种听觉冲击，也是一种视觉冲击，许多乐队（最著名的是Throbbing Gristle）都很重视现场表演、声音实验。", "chapter": "Industrial Music", "examples": ["Cold - Nurse With Wound【专辑：Thunder Perfect Mind】【https://www.youtube.com/watch?v=A6bTDQEsXLo】"]}, "power electronics": {"name": "Power Electronics", "ups": ["Industrial", "Noise"], "downs": ["Death Industrial", "Circuit Bending"], "aka": "", "related": "", "desc": "来自1970年代和1980年代初期的工业音乐场景，大量使用合成器及其他电子设备来产生响亮刺耳的噪音，有时也加入尖叫的人声。据说起源于英国，因为Consumer Electronics、Sutcliffe Jügend和Whitehouse（Whitehouse于1982年在Psychopathia Sexualis LP中创造了Power Electronics这个词）等早期Power Electronics先驱人就居住在英国。Genocide Organ和Ramleh在此基础上发展、影响并普及了Death Industrial，这是一种融合了Dark Ambient的Power Electronics子流派。", "chapter": "Industrial Music", "examples": ["A. G. O. (Arresting Gear Operations) - Propergol【专辑：Renegade】【https://www.youtube.com/watch?v=nubPVssjutg】"]}, "death industrial": {"name": "Death Industrial", "ups": ["Power Electronics", "Dark Ambient"], "downs": [], "aka": "Dark Noise", "related": "", "desc": "死亡工业，噪音和工业音乐发展的产物，特点是在Power Electronics的噪音基础上加入Dark Ambient的元素。该流派通过Genocide Organ、Ramleh和Mz.412等人在1980年代后期开创，并融合了Dark Ambient元素，和Power Electronics一样也会加入刺耳的尖叫人声。2010年代以来，死亡工业成为了Trepaneringsritualen、Puce Mary和Lingua Ignota等独立艺术家的灵感来源，他们将更多的后工业元素美学和技术带入其中。这也影响了大多数当代艺术家，他们开始将Dark Wave、Power Noise和Minimal Synth等融合在一起。", "chapter": "Industrial Music", "examples": ["IF THE POISON WON'T TAKE YOU MY DOGS WILL - Lingua Ignota【https://www.youtube.com/watch?v=56SLCJ7Odzw】"]}, "post-industrial": {"name": "Post-Industrial", "ups": ["Industrial Music"], "downs": ["Industrial Rock", "Industrial Metal"], "aka": "", "related": "", "desc": "后工业音乐是一个概括性的术语，指的是由Throbbing Gristle、Einstürzende Neubauten、SPK等乐队开创的一种意图将工业音乐带出70年代末至80年代中期的声音，并在其中引入摇滚、EDM和金属等更传统的元素。在90年代末至2000年代初，Coil、Xiu Xiu、Neubauten以及Throbbing Gristle等乐队开始发展一种新的、更难归类的后工业音乐风格，推动工业音乐向前发展，不仅创造出了有趣的流派混合，而且创造出了完全独特的、只能用“后工业”来形容的音乐。", "chapter": "Industrial Music", "examples": ["Teenage Lightning 2005 - Coil【专辑：The Ape Of Naples】【https://www.youtube.com/watch?v=A5wmiN6Zmbw】"]}, "british post-industrial": {"name": "British Post-Industrial", "ups": ["Post-Industrial", "Industrial", "Dark Ambient"], "downs": [], "aka": "", "related": "", "desc": "Nurse With Wound、Coil和Current 93是三支有着几乎相同历史的乐队，他们的音乐中都有共同的元素。David Keenen在《England's Hidden Reverse》传记中描述了这三支乐队之间的联系。这些乐队共同跨越了第一批工业音乐、Dark Ambient、具象音乐和实验音乐等场景的部分领域，创作的音乐通常都带有恐怖、末日感和哥特式色彩，涉及宗教、仪式等主题。现在其他乐队也创作了很多工业+后工业+具象/实验+Dark Ambient的音乐，因此这些作品也可以被纳入此范围，但大多数情况下词汇“British Post-Industrial”默认只指的是这三支乐队的作品。", "chapter": "Industrial Music", "examples": ["Sea Armchair - Nurse With Wound【专辑：Spiral Insana】【https://www.youtube.com/watch?v=OXKN1QBjc-A】"]}, "christian industrial": {"name": "Christian Industrial", "ups": ["Post-Industrial"], "downs": [], "aka": "", "related": "", "desc": "Christian Industrial在20世纪90年代最为流行，其主要特点是在工业音乐中加入基督教歌词和意象。Christian Industrial的早期艺术家受到Throbbing Gristle、SPK和Whitehouse等工业音乐（及相关子流派）先驱的启发，后来还受到了EBM和Electro-Industrial艺术家的影响，如Front 242、Skinny Puppy、Front Line Assembly、Cabaret Voltaire。工业摇滚在Nine Inch Nails发行《Pretty Hate Machine》和《Broken》后进入大众视野，这两张专辑在很大程度上影响了Christian Industrial场景中的许多艺术家，如Mortal和Circle of Dust，这些团体反过来又催生了许多在音乐中融入宗教意象的工业摇滚和工业金属乐队，其中的很多艺术家通常都曾在Christian Metal/Punk乐队中演出过。这一场景在上世纪90年代中期达到顶峰，但到2000年，大多数艺术家要么转型，要么离开了音乐行业。Christian Industrial场景中最主流的曲目一般可以认为属工业摇滚的大范畴，其次是EBM，Dark Ambient听感的也有。", "chapter": "Industrial Music", "examples": ["September Warning - Mental Destruction【专辑：Straw】【https://www.youtube.com/watch?v=5a0yXIrxpig】"]}, "proto-ebm": {"name": "Proto-EBM", "ups": ["Post-Industrial", "Synth-pop"], "downs": ["EBM"], "aka": "", "related": "", "desc": "一个用来描述EBM前身/之后才被称为EBM的曲目的术语，主要出现在1980~1984年期间。这些曲目的共同特点是：非常工整的4 on the floor鼓点、切分Bassline、“命令式”的叫喊人声，专辑封面通常是现实主义的工人/工厂画面。这些曲目一般被描述为Minimal Synth、Synth Punk、Synth-pop等。", "chapter": "Industrial Music", "examples": ["Dirty - Hard Corps【https://www.youtube.com/watch?v=ukh8il7kEs0】"]}, "ebm": {"name": "EBM", "ups": ["Electronic Dance Music", "Post-Industrial"], "downs": ["New Beat", "Futurepop", "Electro-Industrial"], "aka": "Electronic Body Music、Aggrepo", "related": "", "desc": "EBM即Electronic Body Music，是工业音乐的一个分支，也是最早从工业音乐中分离出来的子流派之一，帮助了“第二批工业音乐”的定义。1970年代后期由Kraftwerk首次提出，但雏形出现于1980年代EBM先驱Front 242的歌曲中，将Post-Punk和工业音乐结合并明显突出工业元素。他们的音乐融合了Kraftwerk的元素、第一批工业乐队Throbbing Gristle和Portion Control的氛围和实验性，并与“电子朋克”先锋乐队Deutsch-Amerikanische Freundschaft（DAF）相融合。Front 242的EBM在他们的祖国比利时非常流行，并迅速传遍欧洲，然后传到北美和世界其他地方，在1989-1992年期间达到了流行的顶峰。到了90年代中期，EBM开始迅速脱离其基本结构，分裂为更柔和、更旋律化的EBM风格（Futurepop），和受Techno和Electro-Industrial音乐影响的更“硬”的EBM风格（Harsh EBM/Aggrotech），原本的EBM几乎完全消失。然而在本世纪初，一些新乐队和重新组建的乐队重新开始制作“Old School EBM”，并通过模仿早期的EBM声音而收获了一批新的听众。", "chapter": "Industrial Music", "examples": ["Headhunter - Front 242【https://www.youtube.com/watch?v=m1cRGVaJF7Y】"]}, "old school ebm": {"name": "Old School EBM", "ups": ["EBM"], "downs": [], "aka": "", "related": "", "desc": "新一批（1996年至今）纯粹、原始而又不可或缺的EBM类型。Old School EBM制作人的灵感来自于80/90年代早期的经典EBM艺术家，如Deutsch Amerikanische Freundschaft、Front 242、Nitzer Ebb、Leæther Strip和Pouppée Fabrikk，但改进了制作方法，使得Old School EBM更“友好”。所以虽然名字是“Old School EBM”，但是指代的是更加现代的EBM作品，而且带有大众更熟知的那种“工业感”，只不过因为诞生于EBM的“复古”浪潮之中所以叫“Old School”。", "chapter": "Industrial Music", "examples": ["3, 2, 1, Nein - Wulfband【https://www.youtube.com/watch?v=2j-17Vh_XAo】"]}, "frankfurt sound": {"name": "Frankfurt Sound", "ups": ["EBM", "Trance", "Synth-pop"], "downs": ["Goa Trance", "Psy Trance"], "aka": "", "related": "", "desc": "法兰克福电子音乐场景形成于80年代中期，是Synth-pop和EBM的结合体。Andreas Tomalla（又名Talla 2XLC）作为许多法兰克福厂牌的制作人，为法兰克福之声在全国范围内得到认可发挥了重要作用。如果说柏林的Techno场景与底特律的联系很近，那么法兰克福场景则与比利时电子场景有着千丝万缕的联系，并受到EBM和New Beat的巨大影响。1990年，这些元素结合在一起，形成了一种寿命很短的名为Techno-Trance的风格。1991年，著名DJ Sven Väth创办了传奇的Eye-Q厂牌，专门发行这种与Trance元素结合的“新Trance”风格。第二年，Väth创立了Harthouse专门发行更“硬”的曲目。时至今日，这两家厂牌发行的曲目都是法兰克福场景的经典。", "chapter": "Industrial Music", "examples": ["Alone (It's Me) - Abfahrt【https://www.youtube.com/watch?v=6A8oV14m5aE】"]}, "belgian new beat": {"name": "Belgian New Beat", "ups": ["EBM", "Techno"], "downs": ["Belgian Techno", "New Beat", "Belgian Acid House", "Old School Happycore"], "aka": "", "related": "", "desc": "比利时New Beat是上世纪八九十年代比利时的一种地下亚文化/音乐场景，在安特卫普和布鲁塞尔尤为兴盛，后来在西欧其他地区也开始流行。比利时New Beat通常跟R&S厂牌有很大关系，这一厂牌在普及这一音乐流派方面发挥了重要作用。Confetti's、Lords of Acid和Front 242等艺术家是New Beat的先驱，他们的歌曲融合了Techno、House和工业的元素。这场运动是比利时三大Rave场景的一部分。始于20世纪60年代的“Popcorn”音乐场景，后来逐渐演变成Belgian Acid House和New Beat。尽管如今New Beat已不再流行，但它对其他音乐流派（如Hardcore Techno、Gabber、Acid Techno、Acid Trance等）以及整个Rave文化仍起到了非常重要的作用。", "chapter": "Industrial Music", "examples": ["C In China - Confetti's【https://www.youtube.com/watch?v=p5HdsI47-go】"]}, "new beat": {"name": "New Beat", "ups": ["EBM", "Belgian New Beat"], "downs": ["Hard Beat", "Skizzo"], "aka": "", "related": "", "desc": "New Beat音乐主要起源于比利时，始于20世纪80年代末，尤其是1987年至1988年之间。它是EBM、Acid音乐、80年代中期Synth-pop和Dark Wave音乐在当地的融合产物。前身Belgian New Beat是在Destelbergen的Boccaccio夜总会出现的，这一时期持续时间很短，通常以降低音调（包括一些放慢节奏的Acid House和EBM）为特色，BPM在90-120之间。New Beat与更硬、节奏更快的EBM（第二批工业音乐）形成鲜明对比，偶尔也会出现明显的“性”主题、“流行”主题。到了1988年，受Acid House的影响，New Beat才逐渐发展成了一种更“硬”的声音。90年代早期的Belgian Techno逐渐发展起来，将New Beat留在了历史的长河中。也有一些New Beat艺术家继续致力于这一场景，他们后来的音乐也获得了一定的赞誉。Hard Beat是Nikki van Lierop于1989年提出的一个标签，尚未被认可。", "chapter": "Industrial Music", "examples": ["Resurrector - Randolph & Mortimer / Black Dahlia【https://www.youtube.com/watch?v=X4FZ1I0hXpM】"]}, "electro-industrial": {"name": "Electro-Industrial", "ups": ["EBM", "Industrial"], "downs": ["Dark Electro", "Elektro"], "aka": "Electro Industrial", "related": "", "desc": "Electro-Industrial是一个定义松散的术语，用来描述第二批工业音乐类似的声音，它融合了第一批乐队（如Throbbing Gristle、Psychic TV和Portion Control）的实验风格，并融入了新兴EBM场景中更多的可跳舞元素，创造出了激进、黑暗但大多适合跳舞的音乐，其中使用了电子乐器、循环旋律以及从采样（通常是电视、广播或电影）到电力工具和机械的“被找到的声音”。久而久之，对于大多数不了解工业音乐起源的人来说，这种风格甚至代表了“工业音乐”的最初定义。这些艺术家大多只使用电子乐器——鼓机、采样器、音序器、键盘，并喜欢用采样吉他代替Live吉他。这种风格由Skinny Puppy、Ministry、Front Line Assembly和KMFDM率先提出。这种工业音乐风格从1983年开始流行，影响力与日俱增，直到20世纪90年代初，工业摇滚（Industrial Rock）再次将这种音乐风格推向地下。与其他子流派不同的是，Electro-Industrial从未淡出人们的视线，而是通过不断涌现具有影响力的乐队来保持其生命力，这些乐队还融入了其他电子元素（Techno、Drum & Bass等）。", "chapter": "Industrial Music", "examples": ["FUTURE OF HELL - HEALTH【https://www.youtube.com/watch?v=7YOevnmJXKY】"]}, "elektro": {"name": "Elektro", "ups": ["Electro-Industrial"], "downs": [], "aka": "", "related": "", "desc": "Elektro是一个德国场景的术语，用于形容一些诞生于上世纪80年代末至90年代初的工业子流派，当时EBM的发展逐渐缓慢，主要是其分支Dark Electro和Electro-Industrial。除这两者之外还有一种被叫做“vanilla Elektro”，尽管其中也有一些其他元素的融合。这种音乐可以被看作是北美的原始Electro-Industrial场景中一种更适合舞池的变体，通常有着Trance的4 on the floor节拍，但保留了Skinny Puppy和Front Line Assembly式的失真人声和采样。德国厂牌Zoth Ommog是这一运动的先驱，但也有一些北美相关团体。Elektro也是早期EBM与Futurepop、Aggrotech之间缺失的一环。一些乐迷也把这种音乐叫做“Modern EBM”或“German Electro-Industrial”。", "chapter": "Industrial Music", "examples": ["Locked In Syndrom - [:SITD:]【专辑：Stronghold】【https://www.youtube.com/watch?v=I6LXOLn8QjU】"]}, "dark electro": {"name": "Dark Electro", "ups": ["EBM", "Electro-Industrial"], "downs": ["Aggrotech"], "aka": "", "related": "", "desc": "Dark Electro是20世纪90年代初在欧洲兴起的一种Electro-Industrial音乐。由yelworC和Placebo Effect等艺术家开创。与Skinny Puppy等颇具影响力的Electro-Industrial乐队相似，Dark Electro将EBM节拍与老派工业乐队的粗糙感结合在一起，但它更注重恐怖的音效和刺耳扭曲的人声，从而与那些追求听感“干净”的Electro-Industrial乐队（如Front Line Assembly）区分开来。继Leæther Strip的《Solitary Confinement》和:wumpscut:的《Bunkertor 7》等受EBM影响的“更黑暗”的专辑之后，Hocico等乐队开始融入Techno和Hardcore[EDM]的元素，将Dark Electro带入一个更具侵略性、节奏更快的领域。这种风格也被称为“Aggrotech”，很快便成为主流，因此有些人认为这两个词是同义词，但Dark Electro不一定如Aggrotech那样激烈和快速，发展到现在来看这两者也是完全不同的声音。", "chapter": "Industrial Music", "examples": ["Wasted Life - Electrovot【https://www.youtube.com/watch?v=eGD9TVbpHek】"]}, "aggrotech": {"name": "Aggrotech", "ups": ["Dark Electro", "Techno"], "downs": [], "aka": "Aggressive Techno、Harsh EBM、Terror EBM、Hellektro", "related": "", "desc": "2000年左右，结合了Suicide Commando和Funker Vogt的风格，一种新的工业子流派出现了，被称为Harsh EBM、Aggrotech（即Aggressive Techno的缩写）或Hellektro，将更高BPM的Techno音乐节奏、Electro-Industrial的失真人声和侵略性，以及EBM的循环重复，融合到更具侵略性的舞池音乐中。一般来说，Aggrotech使用的是近乎无调性的失真人声，主题通常是悲观的、军国主义的或与社会禁忌有关的。在音乐上，Aggrotech通常采用小调或无调性结构，并经常使用广播、电视和电影中的采样。与工业音乐的其他子流派不同，Aggrotech的音乐往往在不同的结构层次上有着不同的调制和失真，通常只留下一到两条“干净”的音轨——一般是旋律线、Bassline。由于绝大多数Aggrotech音乐的BPM都很高，失真程度也很高，因此不同乐队之间的风格往往难以区分。代表乐队有Hocico、Combichrist、Suicide Commando等。", "chapter": "Industrial Music", "examples": ["999999999 IN A DREAM - Ada Rook【专辑：UGLY DEATH NO REDEMPTION ANGEL CURSE I LOVE YOU】【https://www.youtube.com/watch?v=UVQxJFjDN08】", "Muß es eine Trennung geben - Schwarzblut"]}, "futurepop": {"name": "Futurepop", "ups": ["EBM", "Synth-pop", "Trance"], "downs": [], "aka": "Pop EBM", "related": "", "desc": "90年代末，当EBM开始失去人气时，VNV Nation、Covenant和Apoptygma Berzerk等乐队开始创作一种更新版本的EBM，深受Synth-pop音乐和Trance音乐的影响，并经常加入一些“哥特”元素。这种混合风格经常受到原教旨主义者和EBM十年老粉的嘲笑，但在地下俱乐部却颇受欢迎，并有着自己的粉丝群。", "chapter": "Industrial Music", "examples": ["Madman's Dream - Assemblage 23【https://www.youtube.com/watch?v=DY4_jPNJp6E】", "Fluchtreflex - Neuroticfish【专辑：Antidoron】"]}, "power noise": {"name": "Power Noise", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Post-Industrial分支） Power Electronics （见Industrial分支）", "chapter": "早期流派/手法/理念", "examples": []}, "martial industrial": {"name": "Martial Industrial", "ups": ["Post-Industrial", "Neoclassical Darkwave", "Dark Ambient", "Neofolk"], "downs": [], "aka": "Military Pop、Martial Pop", "related": "", "desc": "一种后工业风格，融合了传统欧洲军事游行的元素和根植于工业音乐的各种流派的影响，包括Neofolk的节拍、Dark Ambient的音景，以及Neoclassical Darkwave中古典音乐为导向的声音。常用军乐队乐器、合成器、架子鼓、音序器和采样器制作音乐。这类音乐经常使用战争、欧洲民族主义、政治集会、军事展示相关的图像，主题涉及电影、哲学、政治、宗教，如反世界主义、反平等主义等。", "chapter": "Industrial Music", "examples": ["Get Back - Laibach【专辑：Let It Be】【https://www.youtube.com/watch?v=D9w6SEtkeug】"]}, "industrial dance": {"name": "Industrial Dance", "ups": ["Post-Industrial", "Techno", "EBM", "Electro-Industrial"], "downs": [], "aka": "", "related": "", "desc": "随着Rave和Techno在欧洲的蓬勃发展，其中的部分场景自然而然地与工业音乐产生了交集，而工业音乐已经在90年代初经历了转型。EBM与工业摇滚是工业音乐里面十分偏向舞曲的流派，于是一些第二批工业代表人物将EBM和Electro-Industrial进一步带入舞曲领域，利用Acid House、Techno和Rave音乐的影响，将毒品、摩托车和性爱等元素融合到地下夜总会中，这一场景统称为工业舞曲/Industrial Dance。这种新的融合风格的共同特点是女声主唱、采样的使用，以及推动其他元素的结合以扩大受众范围。虽然工业舞曲并未成为一个公认的流派或广泛的概念，但它至少在人们的印象中出现过，而且是90年代末Futurepop兴起之前工业音乐的先驱，在如今的音乐市场中依然可以见到很多流行音乐/跳舞音乐带有着工业舞曲的影子。", "chapter": "Industrial Music", "examples": ["Juke-Joint Jezebel (Giorgio Moroder Metropolis Mix) - KMFDM【https://www.youtube.com/watch?v=y65Ube7XxAA】"]}, "industrial pop": {"name": "Industrial Pop", "ups": ["Post-Industrial", "Electro-pop"], "downs": [], "aka": "", "related": "", "desc": "工业流行音乐最初是一个定义松散的术语，用来描述融合了各种后工业子类型（如EBM、工业摇滚、Electro-Industrial）的一些制作技术的流行歌曲。然而到了10年代末期，这一流派的定义变得更加具体，它现在可以被定义为一种“前卫”的Electro-pop音乐，一种将流行人声旋律与更加粗糙的声音结合在一起的音乐。来自Aesthetic Perfection乐队的Daniel Graves通过制作Spotify播放列表和相关的视频，大力宣传了这一流派，使得当其他人曲风科普找资料时能更容易地找到例曲。", "chapter": "Industrial Music", "examples": ["What Do You Want From Me? - Bad Omens【https://www.youtube.com/watch?v=rFqAxnYGtRo】", "We Appreciate Power - Grimes"]}, "witch house rap": {"name": "Witch House Rap", "ups": ["Witch House", "Hip-Hop", "Trap"], "downs": [], "aka": "", "related": "", "desc": "Witch House在取得重大成功之后，逐渐形成了两种声音。一种是强调合成器、以Darkwave、Chillwave为根基，更注重哥特俱乐部的氛围的声音，另一种声音人们的探索就要少了很多，处在主要场景之外，但随着时间的推移这一场景仍然存在，即受到Southern Hip-Hop和Chopped & Screwed影响的声音，在很多早期Witch House的特立独行的艺术家身上可以找到这一声音的影子。在SALEM的《King Night》专辑中，Jack Donoghue用失真的Shoegaze吉他音色、Trap元素、缓慢但仍充满能量的合成器音色，讲述着谋杀、尾随、嗑药等Horrorcore类型的内容。虽然以嘻哈为基础的Witch House在许多圈子里并未流行起来，但这一场景对音乐界仍有着不小的影响：无论是2010年代中期西雅图说唱场景（Thraxxhouse、Blue Sky Black Death & Nacho Picasso等人的作品中使用了大量Witch House的元素），还是早期的Goth Money，甚至是更现代的作品，如Yung Lean，以及可能成为Witch House新方向的先驱Sematary和Ghost Mountain。", "chapter": "Industrial Music", "examples": ["Red River - SALEM【https://www.youtube.com/watch?v=87P04Vam2wQ】"]}, "andean new age": {"name": "Andean New Age", "ups": ["New Age"], "downs": [], "aka": "", "related": "", "desc": "New Age音乐的一个分支，深受安第斯土著音乐的影响，强调宁静和谐的氛围，通常大量使用排箫、长笛等音色。安第斯音乐是南美洲安第斯地区的一种音乐风格。最著名的Andean New Age乐队是Cusco，他们的专辑《Apurimac》取得了国际性的成功，并把Andean New Age推向世界，后来很多的Andean New Age艺术家都并不是来自安第斯。", "chapter": "早期流派/手法/理念", "examples": ["Montezuma - Cusco【https://www.youtube.com/watch?v=_AFT3BSPKpI】"]}, "electroacoustic music": {"name": "Electroacoustic Music", "ups": ["Modern Classical", "Neo Classicalism", "Electric Instrument"], "downs": ["Musique concrète", "Acousmatic"], "aka": "Electroacoustic、Electro-Acoustic、EA", "related": "", "desc": "电声音乐是在声学演奏（“不插电”）音乐的基础上运用实验电子（“插电”）技术，如loops、feedback、layering、delay、static/noise、backwards sampling等。往往也包括合成的声音，与Tape Music、Musique concrète、Acousmatic Music、Elektronische musik（这些术语都属电声领域，在当时可代替使用）密切相关。现场表演往往由一人或多人演奏原声乐器，另一人坐在电脑前实时应用声音处理技术。电声音乐的先驱，如Bernard Parmegiani和Karlheinz Stockhausen，都是典型的受过学院派训练的现代古典作曲家，他们的作品在编排上具有古典作曲的精致感，并倾向于以管弦乐器的声音为重点，而电声音乐涉及对各种声音的电子化处理，包括非源于乐器的声音（例Musique concrète）。尽管电声音乐起源于学术作曲领域，但严格来说它并不是一种古典风格。它已发展并扩展为学术性较弱、非惯用手法较多的风格，如EAI，并已渗入地下音乐，涉及到了Ambient、Drone、Noise或Sound Collage等元
