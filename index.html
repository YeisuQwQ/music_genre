<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>神秘电子音乐体系</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;font-family:'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;color:#e2e8f0;overflow:hidden;height:100vh}
#topbar{position:sticky;top:0;z-index:20;background:#060a14;padding:8px 12px;border-bottom:1px solid #1e293b;display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-height:48px}
#topbar input{flex:1;min-width:140px;max-width:300px;padding:7px 12px;border-radius:16px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s}
#topbar input:focus{border-color:#60a5fa}
#topbar button{padding:5px 10px;border:1px solid #334155;border-radius:12px;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s}
#topbar button:hover{background:#334155;color:#fff}
#topbar button.on{background:#1e40af;border-color:#60a5fa;color:#fff}
#topbar .ch-count{font-size:10px;color:#64748b;margin-left:4px}
#wrapper{display:flex;height:calc(100vh - 48px);overflow:hidden}
#container{display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:8px;gap:8px;flex:1;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#334155 #0b1120;-webkit-overflow-scrolling:touch}
#container::-webkit-scrollbar{height:7px}
#container::-webkit-scrollbar-track{background:#0b1120}
#container::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.scroll-btn{position:fixed;top:50%;transform:translateY(-50%);z-index:25;width:38px;height:38px;border-radius:50%;background:#1e293bee;border:1px solid #334155;color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.scroll-btn:hover{background:#334155;color:#fff}
.scroll-btn.left{left:10px}.scroll-btn.right{right:10px}
@media(max-width:768px){.scroll-btn{display:none}}
.col{flex:0 0 auto;min-width:200px;max-width:320px;display:flex;flex-direction:column;border-radius:10px;overflow:hidden;background:#0f172a44;border:1px solid #1e293b;transition:border-color .2s}
.col:hover{border-color:#334155}
.col-head{padding:9px 10px;font-size:13px;font-weight:700;text-align:center;color:#fff;border-radius:9px 9px 0 0;cursor:pointer;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 0;scrollbar-width:thin;scrollbar-color:#334155 transparent}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:#33415566;border-radius:2px}
.node{display:block;padding:4px 8px;margin:1px 2px;border-radius:4px;font-size:11px;cursor:pointer;color:#cbd5e1;border-left:3px solid transparent;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.node:hover{background:#1e293b88;color:#fff}
.node.sel{background:#1e3a5faa;color:#fff;border-left-color:#60a5fa}
.node.l0{font-weight:700;font-size:13px;padding:6px 10px;color:#f1f5f9;border-bottom:1px solid #1e293b44}
.node.l1{font-size:11px;padding-left:18px}
.node.l2{font-size:10px;padding-left:30px;color:#94a3b8}
.node.l3{font-size:10px;padding-left:42px;color:#94a3b8}
.node.l4{font-size:9px;padding-left:54px;color:#64748b}
.node .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;flex-shrink:0}
.node .has-desc{font-weight:500}
#detail{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#0f172af8;backdrop-filter:blur(16px);border-top:2px solid #3b82f6;border-radius:14px 14px 0 0;max-height:55vh;overflow-y:auto;padding:16px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px #00000066}
#detail.show{transform:translateY(0)}
#detail h2{font-size:18px;color:#60a5fa;margin-bottom:4px;padding-right:30px}
#detail .chap{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;margin-bottom:8px;font-weight:500}
#detail .desc{font-size:12.5px;line-height:1.8;color:#cbd5e1;margin:8px 0;text-align:justify}
#detail .aka{font-size:11px;color:#94a3b8;margin:2px 0}
#detail .rels{margin-top:10px;padding-top:10px;border-top:1px solid #1e293b}
#detail .rel-title{font-size:11px;font-weight:600;margin:6px 0 3px}
#detail .tag{display:inline-block;padding:3px 9px;border-radius:10px;margin:2px 4px 2px 0;font-size:10px;line-height:1.4}
#detail .tag.up{background:#f8717122;border:1px solid #f8717166;color:#f87171}
#detail .tag.down{background:#4ade8022;border:1px solid #4ade8066;color:#4ade80}
#detail .tag.aka{background:#a78bfa22;border:1px solid #a78bfa66;color:#a78bfa}
#detail .tag.rel{background:#fb923c22;border:1px solid #fb923c66;color:#fb923c}
#detail .ex-title{font-size:11px;font-weight:600;color:#94a3b8;margin-top:8px}
#detail .ex-item{font-size:10px;color:#64748b;margin:2px 0;padding-left:12px}
#detail .close-btn{position:sticky;top:0;float:right;background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;padding:4px 8px;z-index:5;line-height:1}
#detail .close-btn:hover{color:#fff}
#detail .no-desc{color:#64748b;font-style:italic;font-size:12px}
#node-count{font-size:10px;color:#64748b;text-align:center;padding:2px}
@media(min-width:769px){
  .col{min-width:220px;max-width:360px}
  .node{font-size:11.5px}
  #detail{left:auto;width:420px;right:0;top:0;bottom:0;max-height:100vh;border-radius:0;border-left:2px solid #3b82f6;border-top:none;transform:translateX(100%);padding:20px}
  #detail.show{transform:translateX(0)}
  #detail .close-btn{position:absolute;top:12px;right:14px;float:none}
}
@media(max-width:480px){
  .col{min-width:170px;max-width:260px}
  .col-head{font-size:11px;padding:7px 8px}
  .node{font-size:10px;padding:3px 6px}
  .node.l0{font-size:11px}
  #detail{max-height:65vh;padding:12px}
  #detail h2{font-size:15px}
  #detail .desc{font-size:11px}
}
</style>
</head>

</div>

<div id="wrapper">
<div id="container"></div>

</div>

]}]}, {"label": "Alternative Dance/Indie Dance", "children": []}]}], "genres": {"metal shade": {"name": "Metal Shade", "ups": ["Hard Bass", "UK Bounce", "Hardcore"], "downs": [], "aka": "Metalshade", "related": "", "desc": "Metal Shade是Hard Bass的一个音色上的特化标签，指一类具有金属敲击感的失真Donk Bass的Hard Bass音乐。除此之外，Metal Shade曲目一般要比普通Hard Bass更深邃黑暗，甚至采用恐怖的氛围；Donk Bass相较于Hard Bass更加密集，且一般BPM更快。Metal Shade同样是俄罗斯人提出的标签，出现于2005年的列宁格勒，由DJ Barabass提出。", "chapter": "House", "examples": ["Get Ready - Hard Liner"]}, "chicago house": {"name": "Chicago House", "ups": ["Disco", "Hip-Hop"], "downs": ["Acid House", "Italo House", "Hip House"], "aka": "", "related": "", "desc": "用于形容20世纪80年代左右在美国芝加哥诞生的早期House音乐。 “House”一词取自芝加哥知名舞厅Warehouse，驻场DJ Frankie Knuckles等人为推广这一音乐起到了非常大的作用。Disco、Funk、Rock、Hiphop这些早期音乐都或多或少影响了House的诞生。Chicago House代表着House最基本的特征如：4/4拍，厚实的Bassline，各种采样的运用。House作为那个时候的Club常播放的音乐，为许多欧美的社会边缘群体（比如非裔、黑人）提供了一个可以自由、尽兴地舞蹈的机会。随后也传播开来，极大地影响了如今的流行音乐格局。你仍然能在UK单曲榜里头听到特别多的十分流行的、更符合大众口味的House。", "chapter": "House", "examples": ["Rain Falls (David's 12\" Soakin Wet Mix) - Frankie Knuckles【https://www.youtube.com/watch?v=rC0iX_JvYaE】", "Surprise - Crystal Waters", "Lets Get Busy (Radio Mix) - Curtis Mc Claine And On The House", "Promised Land - Joe Smooth"]}, "piano house": {"name": "Piano House", "ups": ["Chicago House"], "downs": ["Modern Piano House"], "aka": "", "related": "", "desc": "Piano House是Chicago House衍生子类，兴盛期在90年代左右，旋律由钢琴和弦主导，“Piano”也被认为是Chicago House中的重要场景之一。其中“Piano”决定了New School式的创作理念，“House”则指Chicago House/美式Deep House的音乐形式，这意味着不是任何House子流派加上Piano Lead就能算Piano House的（如一些Deep House、Future House等）。90年代初，Piano House对舞曲爱好者产生了深远的影响。于是时至2010年代中期这种声音迎来了复兴（尤其是在英国）。英国双人组合Blonde以其极富感染力的钢琴旋律闻名，在这一复兴浪潮中扮演着重要的角色，他们的歌曲将90年代的Piano House Vibe与现代制作技术完美融合。《I Loved You》和《All Cried Out》等热门歌曲以振奋人心的钢琴、富有情感的歌声和极富感染力的旋律为特色。其他制作人如MK、Le Youth、Zac Samuel等在My Head Is a Jungle (MK Remix)、Voices (Le Youth Remix)、Hideaway (Zac Samuel Remix)等歌曲中也受到了90年代Piano House声音的影响。这里不对Modern Piano House进行介绍。", "chapter": "House", "examples": ["Get Get Down - Paul Johnson"]}, "acid house": {"name": "Acid House", "ups": ["Chicago House"], "downs": ["Acid Trance", "Acid Techno", "Breakbeat Hardcore"], "aka": "Chicago Acid House", "related": "", "desc": "同样发源于美国芝加哥，其标志性尖锐音色的来源于Roland TB-303合成器。1980年代，Acid House蔓延到英国和欧洲大陆后，受到了不少年轻人和Club的青睐。由于Acid House尖锐的酸性音色对耳膜具有特别的冲击力，这种音乐成为了不少当时的年轻人派对狂欢的首选。尤其是“Second Summer of Love”这一事件将这种音乐的热度推向了高峰。其“黄色笑脸”的表情符号也成为英国Rave爱好者形容Acid House的一个标志。这一词条仅介绍Chicago House场景下的Acid House，不包括UK Acid House。", "chapter": "House", "examples": ["Confusion's Revenge - Armando", "Box Energy - DJ Pierre", "Newsround - Ceephax Acid Crew", "Acid Track - Phuture"]}, "hip house": {"name": "Hip House", "ups": ["Chicago House", "Hip-Hop"], "downs": ["Ghetto House", "Ghettotech"], "aka": "House Rap", "related": "", "desc": "融合了说唱，嘻哈元素的House，发源于美国和英国，在Acid House的派对场景中开始流行。团体Jungle Brothers的厂牌“I'll House You”让硬核的嘻哈迷开始接受了这一形式的Hiphop，顺带也推动了House音乐的跨界传播。21世纪后，更为现代化、流行化的Hip House取得了商业上的成功，David Guetta、黑眼豆豆的早期作品就有几首Hip House。", "chapter": "House", "examples": ["Pump Up The Jam - Technotronic"]}, "detroit house": {"name": "Detroit House", "ups": ["Chicago House"], "downs": ["Detroit Techno", "Tech House"], "aka": "The New Dance Sound Of Detroit", "related": "", "desc": "在底特律独立发展起来的House。由于底特律在上世纪七八十年代经济日渐破产，底特律一些较为贫穷的DJ使用廉价的合成器制作了他们自己的House音乐。这种House深受极简主义影响，没有受到过多的Disco声音影响，摆脱了人声的限制，独立发展起来并派生出了Hi-Tech Soul音乐，Hi-Tech Soul即后续的Detroit Techno音乐。另外，Detroit House还保留有极强的工业感声音，这位后续的早期Tech House的出现奠定了基础。", "chapter": "House", "examples": ["It Is What It Is - Rhythim Is Rhythim"]}, "uk house": {"name": "UK House", "ups": ["Chicago House", "Techno", "Breakbeat"], "downs": ["Goa Trance", "UK Acid House", "UK Deep House"], "aka": "", "related": "", "desc": "芝加哥的House与底特律的Techno越来越受到世界瞩目的同时，英国也逐渐产生了自己的House音乐。1987年芝加哥DJ Steve “Silk” Hurley的‘Jack Your Body’拿下英国单曲榜单第一，随后英国产生了很多模仿作品，但是加入了英国特有的切分钢琴和碎拍，具有更好的旋律和结构，编曲更简洁，曲调更激昂活泼，偏向Disco的听感，宣示着Rave的诞生。再加上当时英国兴起的户外Live活动和ibiza岛的音乐的影响以及开始流行的摇滚分支Alternative Dance，让英国House逐渐具有其更鲜明的特色，直到1988年的Second Summer of Love的发行，引爆了Rave文化。", "chapter": "House", "examples": ["What Time Is Love? - The KLF"]}, "euro house": {"name": "Euro House", "ups": ["House", "Eurodance", "Dance-pop", "Euro-Trance"], "downs": [], "aka": "Euro-House、Eurohouse", "related": "", "desc": "发展于80年代末的欧洲。跟许多舞曲一样，Euro House也具有很强的律动性。这是一个与Eurodance平行发展，极具欧洲的特色的一种House音乐。BPM比Eurodance慢一些。在90年代，一些欧洲的乐队如Cappella和2 Brothers on the 4th Floor等致力于Euro House和Eurodance在欧洲流行市场的普及。", "chapter": "House", "examples": ["I'm Gonna Stay (This Time) - Thomastic (DJ Tonka)", "Oh Le Le (Diavola Club Rmx) - Pizza Boys"]}, "italo house": {"name": "Italo House", "ups": ["Chicago House", "Italo Disco"], "downs": [], "aka": "", "related": "", "desc": "发源于意大利的House音乐，与经典的Chicago House不同的是，它融合了Italo disco，加入更多的钢琴和弦元素，听上去要悦耳不少。1990s后期，你能在英国等各种欧洲榜单上面听到这种很钢琴的House，也说明在当时这种曲风非常受听众们追捧。", "chapter": "House", "examples": ["We Got The Love (Piano Version) - Touch of Soul"]}, "latin house": {"name": "Latin House", "ups": ["Latin music", "Reggaeton", "House"], "downs": [], "aka": "Latino House、Samba House、Latin EDM", "related": "", "desc": "出现在20世纪80年代后半期，一些制作人比如Liz Torres尝试将House音乐与拉丁美洲的民族音乐，如波多黎各、古巴、多米尼加等进行融合并在派对中播放，得到了不少听众的欢迎。可以视为这是House音乐与拉丁美洲民族音乐的融合的一种表现之一。", "chapter": "House", "examples": ["Samba Magic - Basement Jaxx", "Batucada (Elusive's Samba Vocals) - Spiller"]}, "kwaito": {"name": "Kwaito", "ups": ["Hiphop", "Hip House", "South African Music"], "downs": ["Afro House", "Gqom", "Amapiano"], "aka": "", "related": "", "desc": "Kwaito这个词起源于南非荷兰语 “kwaai”，当用作俚语时，相当于英语中的hot（热），是20世纪90年代兴起于南非约翰内斯堡的一种音乐流派，与当时的南非政治解放，反种族隔离浪潮息息相关。不少进步青年也会把宣传口号融入Kwaito的歌词里。之后Kwaito快速发展并在南非成为了主流。Kwaito融合了不少Hiphop元素，往往比一般的House音乐要慢，具有非洲民族乐器的采样，唱词方式相当特别。", "chapter": "House", "examples": ["Become The Tiger (feat. Sibot, Damon Albarn, Mr Jukes) - Africa Express", "Lafaki (Doggy Style) - Sandy B"]}, "gqom": {"name": "Gqom", "ups": ["House", "Kwaito", "Techno"], "downs": ["Sghubu"], "aka": "Gqomu、Igqomu", "related": "", "desc": "Gqom兴起于在2010年代初的南非德班，主要由制作人DJ Lag、二人组Rudeboyz、Griffit Vigo、Dominowe和Citizen Boy开创，Gqom的典型特征是极简、原始和重复的编排，没那么“4/4拍”， 主题较为抒情。这种流派得到了国际市场的关注。2021年南非音乐奖专门设置了一个“Gqom”奖（此前都归类于“Kwaito”）", "chapter": "House", "examples": ["Nyusa - DJ Lag / Okzharp"]}, "amapiano": {"name": "Amapiano", "ups": ["Kwaito", "Deep House", "Jazz"], "downs": [], "aka": "", "related": "", "desc": "Amapiano中的\"ama\"在祖鲁语中表示复数，这个流派的翻译可以理解为“钢琴”。于2012年在南非兴起。其特点是空气感的pad、具有冲击力的Basslines，并伴有高亢的钢琴旋律，更加强调氛围感，并且听感相当积极向上。在DBN Gogo、Focalistic等知名艺人的推动下，Amapiano已从地方性潮流发展为引爆全球的现象级音乐类型，取得了巨大的商业成功。2022.4月Beatport更是宣布“Amapiano”已经成为了一种全新的独立风格分类。", "chapter": "House", "examples": ["Alalahi (feat. Vyno Miller & Bontle Smith) - Kabza De Small / DJ Maphorisa"]}, "tribal house": {"name": "Tribal House", "ups": ["Deep House", "Tech House", "South American and African Tribe music"], "downs": [], "aka": "Tribal Tech House", "related": "", "desc": "与世界民族音乐相结合的一个House分支，受到了Garage House和Deep House的影响，后被认为属Tech House体系。Tribal House强调民族或土著音乐打击乐的元素（通常是康加鼓或其衍生的合成乐器），这种音乐本身没有明确的定义，听起来很容易让人联想到非洲和南美洲各部落的民族音乐，往往是House音乐的本土化体现，曲子的情感色彩也可以是千变万化的。", "chapter": "House", "examples": ["Bottom Heavy - Danny Tenaglia"]}, "balearic beat": {"name": "Balearic Beat", "ups": ["House", "Electronica", "Chillout"], "downs": ["Ibiza Trance/Balearic Trance"], "aka": "Balearic House、Ibiza House、Ibiza Chill-out", "related": "", "desc": "来到1980s的度假胜地伊比萨岛，那里的DJ将海滨，阳光，假日，Chillout的元素融合进音乐，并在派对上播放。之后那里的人们就用“Balearic beat”来形容这些音乐。虽然名字里头带有“beat”，但显然这是House音乐。往往还会融合Jazz、Italo-Disco和西班牙本土的音乐，极具地域化的特色。这个特色元素也逐渐被许多制作人所借鉴。", "chapter": "House", "examples": ["Driving Away From Home (Jim's Tune) - It's Immaterial"]}, "soulful house": {"name": "Soulful House", "ups": ["Jazz", "House", "Soul"], "downs": [], "aka": "", "related": "", "desc": "受爵士乐、灵魂乐相当大的流派，通常伴随着钢琴、吉他、贝斯等乐器，听感十分放松，Soulful House制作人时常与歌手和现场音乐家合作。这些曲子通常以典型的爵士管乐器独奏为特色，场景功能性很强。有时这种流派被认为是Nu-Jazz和Lounge等流派的舞曲版本。", "chapter": "House", "examples": ["Never Ending Love - Crackazat"]}, "ambient house": {"name": "Ambient House", "ups": ["Ambient", "House"], "downs": [], "aka": "", "related": "", "desc": "1990年代初期在英国发展的流派，将House的44拍与受Ambient影响的“冷静、舒缓”的氛围结合在一起，鼓组更偏向原声质感，和Chill House相比更多的是“飘起来”的特殊听感和静谧氛围。The Orb和The KLF的1990年代早期作品定义了这一流派，Ambient House也为Ambient Techno、Ambient Dub和Psybient的发展提供了坚实的基础。", "chapter": "House", "examples": ["Blue Room - The Orb"]}, "micro house": {"name": "Micro House", "ups": ["Minimal Techno", "Bitpop", "Minimalism"], "downs": [], "aka": "Minimal House、Buftech、Microhouse", "related": "", "desc": "一种受Minimalism（极简主义）和20世纪90年代的Techno强烈影响的house音乐的子分支。这一术语是美国记者Philip Sherburne为先锋音乐杂志《The Wire》的第209期，于2001年7月撰写的文章时提出的。往往采样极短的人声、乐器、静电、日常噪音等等。也时常与Ambient结合，使其更具一种科技美和极简美。", "chapter": "House", "examples": ["Huldra - Gidge"]}, "disco house": {"name": "Disco House", "ups": ["Chicago House", "Disco", "HI-NRG"], "downs": [], "aka": "", "related": "", "desc": "标签。顾名思义就是Disco与House的融合体，一般定义为Disco在进化成House的过程中诞生的中间体，既保有Disco的声音特色，又遵循了House的节奏和律动。近年来又涌现了一批新的“Disco House”，属于Disco/Nu-Disco作用于主流House音乐的结果，这类House的Disco组分更少，常表现为Funky的Disco旋律和Soul一般的律动。 还有一种说法认为Disco House是Euro House在90年代初的概念，该概念随后进化成French House。此处不遵循该说法。", "chapter": "House", "examples": ["Feel Your Body - Lifeforce", "What Happened To The Music - Joey Negro", "September (Phats & Small Remix) - Earth, Wind & Fire"]}, "funky house": {"name": "Funky House", "ups": ["Chicago House", "Funk", "Disco"], "downs": ["Nu-Disco"], "aka": "", "related": "", "desc": "受Funk乐影响较大的一个流派，Disco弦乐的使用在该流派中很常见， 采样也来自这两种风格。但坚持了House音乐的4/4拍，同时节奏也比较欢快。该流派在2000s初期很受欢迎，不过随着采样权利的严格，这一流派开始被Electro House所取代。尽管如此，该流派的Funky元素还是很大地影响了许多House音乐。Funky House相对于Disco House来说更加Solid，属于House的一种分支而非单纯的标签。Funky House大量使用Funk和Disco元素，加入了强烈的电气Bassline和浓郁的灵魂乐律动，并结合了以上世纪Funk为灵感的节拍，曲目速度一般保持在128BPM，比Disco House概念更加成熟，与Jackin' House亦有交集。", "chapter": "House", "examples": ["Speed Up - Funkerman"]}, "nu-disco": {"name": "Nu-Disco", "ups": ["Disco", "Funky House", "Rock", "Pop", "Electronic Dance Music"], "downs": [], "aka": "Nu Disco、NuDisco", "related": "", "desc": "Nu-Disco诞生于21世纪初期，脱胎于French House，被认为是七八十年代的Disco使用大量合成器被换上较现代化的制作手法，整体结构常伴随演唱或采样等来慢慢推进，充满了重复的鼓组的音乐。实际上Nu-Disco的House味道更多于原本的Disco，因此Nu-Disco常常被认为是House的一种，是House反作用于Disco的新产物。", "chapter": "House", "examples": ["Last Forever (feat. Sam Sparro) - Oliver", "Hypnotized - Purple Disco Machine"]}, "french house": {"name": "French House", "ups": ["French Electro", "House", "French Disco"], "downs": ["Blog House", "Synthwave"], "aka": "Neu-Disco、Filter House、Tekfunk、Tek Funk", "related": "", "desc": "由法国音乐家在20世纪90年代制作的House音乐风格，与法国电子音乐运动“French Touch”息息相关。那时Space Disco和Euro Disco在法国大受欢迎，受到这类音乐影响，House音乐也在法国呈本土化趋势。不少法国制作人开始往当时的音乐注入“法式风情”（French Touch），往音乐里加入独属于法国的元素，比如更为浪漫的人声等。而French House的特点为Bassline比较厚重、潮流，人声相当舒缓，抒情。French House（包括其他法国本土音乐）很快引起了英国市场的兴趣。Daft Punk、Cassius等人是公认的French House先驱。", "chapter": "House", "examples": ["Lady (Hear Me Tonight) - Modjo"]}, "blog house": {"name": "Blog House", "ups": ["Electro", "French House", "Electroclash"], "downs": [], "aka": "Bloghouse、Dirty Electro House", "related": "", "desc": "也是法国电子音乐运动“French Touch”浪潮下较为激进的一个产物，由French House演变而来且跟Electro电气元素息息相关，与French House不同的是，这种曲风更忠于探索与创新，而不必考虑流行元素。", "chapter": "House", "examples": ["Patrick 122 - Mr. Oizo"]}, "garage house": {"name": "Garage House", "ups": ["Disco", "Chicago House", "Dub", "Gospel"], "downs": ["UK Garage", "New Jersey Sound", "Gospel House"], "aka": "Garage、New York House、New York Garage、US Garage", "related": "", "desc": "Garage House最初由DJ Larry Levan在纽约Paradise Garage Club上的音乐选集中发展出来。该选集有不少Gospel、Dub、R&B和Disco音乐，这些元素的融合促使了Garage House的诞生，很快就推广到许多俱乐部中。Garage House更多具有来自黑人Gospel福音音乐的钢琴即兴演奏与灵魂女声采样，舞池性和娱乐性很强。90年代Garage House在英国风靡起来，并逐渐演化为UK Garage。", "chapter": "House", "examples": ["Changes - Kungs / Shadow Child", "Heaven Takes You Home - Swedish House Mafia"]}, "new jersey sound": {"name": "New Jersey Sound", "ups": ["Deep House", "Garage House", "Gospel"], "downs": [], "aka": "Jersey Sound、Zanzibar Music、Jersey House", "related": "", "desc": "", "chapter": "House", "examples": ["Try My Love - Janet Rushmore"]}, "gospel house": {"name": "Gospel House", "ups": ["Garage House"], "downs": [], "aka": "", "related": "", "desc": "Garage House的一种形式，更强调Gospel福音音乐元素，比如强调基督教信仰的“希望，爱与救赎”的歌词，丰富的和声，并且也会与44拍的节奏互相融合。该流派首先从Joe Smooth的“Promised Land”开始发展，随后在俱乐部中站稳了脚跟。现如今Gospel House的热度下降明显。", "chapter": "House", "examples": ["Rejoyce (Sean McCabe Vocal Mix) - Sakura & Co."]}, "leftfield house": {"name": "Leftfield House", "ups": ["House"], "downs": [], "aka": "", "related": "", "desc": "总体依旧围绕4x4拍进行，但它们的鼓编常表现为对原本刻板的四四拍，做了围绕轴心或前或后的偏移(或表达为相对不规则的构成)，且有频繁的空拍错拍，bass有经过多种扭曲/失真化处理（比如融入经典的电气元素Electro、Lofi低保真质感等），充满个性的另类的音效，BPM也可能不处于常态，可塑性强。", "chapter": "House", "examples": ["flight fm - Joy Orbison", "Lexapro Delirium - Sewerslvt"]}, "ballroom": {"name": "Ballroom", "ups": ["Hip House", "Ballroom Culture", "Hip-Hop (Culture)"], "downs": ["Deconstructed Club"], "aka": "Vogue Beats、Ballroom Beats", "related": "", "desc": "这个更多是一个文化—Ballroom Culture的产物，起源于美国纽约市的舞厅，往往是非裔美国人和拉丁裔地下LGBTQ+团体那里活动。一部关于少数群体和Vogue Dance的电影《 Paris Is Burning》将这种亚文化带到主流。与这种文化息息相关的House音乐则被称为Ballroom。节奏是往往很强硬、碎拍化、响亮，有标志性的“哐哐”声采样，并在混音中高度突出节奏；而旋律则不那么重要。一些制作人还结合了其他当代流派的元素，如Baltimore Club。 近年来这种文化在世界范围内已有不可忽略的影响力，如世界各地的Vogue Battle场景，即伴随Ballroom(实际还包括类似听感的Deconstructed Club等)跳Vogue Dance (折手舞)。这类舞蹈伴随锐舞场景和亚文化场景逐渐成型，舞蹈动作来自于时尚杂志造型、埃及壁画、中国武术、军队军姿、芭蕾舞舞步、街舞、京剧身段、性动作/BDSM、锐舞舞步、体操动作等，并在五六十年的发展历史中出现了“Old Way”、“New Way”、“Vogue Femme”三个流派。感兴趣的听众可以去B站搜索Voguing词条(甚至蔡依林的美人计这首歌的MV也有蔡依林跳Voguing的片段)。当然，有趣的是，即便是如此妖娆的动作，实际上大部分都是直男直女舞者而非少数群体参与Vogue Battle(笑)", "chapter": "House", "examples": ["Thunderscan - MikeQ / Sinjin Hawke"]}, "baltimore club": {"name": "Baltimore Club", "ups": ["Miami Bass", "Breakbeat", "House", "Hiphop"], "downs": ["Jersey Club", "Philly Club"], "aka": "Bmore Club、Bmore House、Bmore", "related": "", "desc": "发源于美国马里兰州的最大城市巴尔的摩（Baltimore）的俱乐部，该流派也因此得名。融合了Breakbeat元素，通常会有嘻哈元素（而且人声往往会切碎，循环重复处理）。Baltimore Club也跟舞蹈息息相关，广受当地非裔美国年轻人欢迎。后来也传播到了英国Rave场景上。有一部该音乐的纪录片可以一看：《Dark City Beneath the Beat》", "chapter": "House", "examples": ["Lemons - Diamond K"]}, "jersey club": {"name": "Jersey Club", "ups": ["Baltimore Club"], "downs": ["J-Jersey Club"], "aka": "", "related": "", "desc": "美国马里兰州的Baltimore Club传播到了新泽西州（Jersey）后也很受当地舞者的欢迎，新泽西州的DJ们热衷于跑到巴尔的摩去购买最新的Club唱片，然后把它们带回新泽西州的派对上播放。随后当地的DJ和制作人开始改良这些音乐，随后这些改良过的曲风就叫Jersey Club，剔除了Baltimore Club音乐的粗犷、原始和暴力的元素，取而代之的是平稳地多的人声和基调。舞蹈动作也没有那么激烈。21世纪后，该流派在日本也发展出与早期Jersey Club截然不同的模样。", "chapter": "House", "examples": ["Joyride - StayLoose"]}, "j-jersey club": {"name": "J-Jersey Club", "ups": ["Jersey Club", "J-core", "Kawaii Bass"], "downs": ["Future Jersey", "Future-core"], "aka": "", "related": "", "desc": "民间的叫法。J-Jersey Club只是Jersey Club的基础上加入各种各样的日式元素，例如融合Kawaii Bass。同样，强调旋律和可爱感，通常会使用可爱的人声采样，削弱鼓点的存在感，同时这种制作形式也会融入到Future-core中。目前主要做这种风格的制作人包括EmoCosine等。", "chapter": "House", "examples": ["MAGENTA POTION - EmoCosine"]}, "philly club": {"name": "Philly Club", "ups": ["Jersey Club", "East Coast Rap", "Trap"], "downs": [], "aka": "Philly Party Music", "related": "", "desc": "类似于Jersey Club是Baltimore Club在新泽西州的本土化提现，Baltimore Club在费城也得到了许多当地俱乐部的乐迷的欢迎。BPM会更快一些，融入Miami Bass，听感也十分碎。一般网络上的Philly Club音乐常常伴随说唱出现，导致部分听众将Philly Club当做Jersey Club Rap进行宣传，这实际上也是一种后互联网场景下的常见谬误。", "chapter": "House", "examples": ["B.O.B. - G-Buck"]}, "ghetto house": {"name": "Ghetto House", "ups": ["Chicago House"], "downs": ["EDM Ghetto House", "Ghettotech", "Footwork"], "aka": "Booty House", "related": "", "desc": "20世纪80年代后期，Chicago House已经发展地相当成熟，但这更多是在芝加哥北部的一些高档的俱乐部上播放的。而在当时南部的贫民窟区发展出了一种与Chicago House不大相同的一种风格—Ghetto House。这种音乐要粗犷得多，不复杂的鼓点，以及与当地的俚语和风俗相融合，有时带有一些露骨的歌词，名字也由贫民窟“Ghetto”得来。", "chapter": "House", "examples": ["1112 - DJ Deeon"]}, "ghettotech": {"name": "Ghettotech", "ups": ["Ghetto House", "UK Garage", "Techno"], "downs": [], "aka": "Detroit Club、Detroit Bass、Booty Bass、Booty Music", "related": "", "desc": "前底特律音乐记者Hobey Echlin将该风格描述为“Techno的快速节拍与说唱的Call and Response”相结合的流派，由DJ Disco D提出该词。表现为BPM比Ghetto House更快些，大约在145到160BPM，人声通常是重复的、粗糙的、露骨的，正如DJ Godfather所说的那样，“节拍真的很粗糙，很生硬，没有任何打磨”。受到不少元素比如Jungle、嘻哈和R&B的影响。", "chapter": "House", "examples": ["Footworka - DJ NEHPETS"]}, "juke house": {"name": "Juke House", "ups": ["Ghetto House"], "downs": [], "aka": "Juke、Jukin' House", "related": "", "desc": "形成于20世纪80年代末，比Ghetto House稍快些，BPM 150-165 左右，DJ兼舞者RP Boo制造了第一批这种曲风的典范作品。常常是为了舞蹈场景而服务的，与接下来的“Footwork”很相像，两者区别主要是Juke House遵循House结构，而Footwork不拘泥于House结构，它可以跟HDM或碎拍融合。", "chapter": "House", "examples": ["Ghost - Machine Girl"]}, "footwork": {"name": "Footwork", "ups": ["Ghetto House"], "downs": ["Footcore", "Footwork Jungle"], "aka": "", "related": "", "desc": "形成于20世纪80年代中后期，融合了更多的嘻哈元素，比Ghetto House更快的变体，通常在160bpm左右，但可以达到180bpm，往往不是很“4/4拍”，而倾向于Bass的展示。美国芝加哥的舞者们常常播放这种BGM来进行即兴斗舞比赛，也形成了以“Chicago juke”这种舞蹈为基础的社区文化。后来在21世纪10年代欧洲甚至日本也有出现并融合其他曲风，碎核子分支(Japanese) Footcore就是一个例子。", "chapter": "House", "examples": ["Baby Come On - RP Boo"]}, "edm ghetto house": {"name": "EDM Ghetto House", "ups": ["Ghetto House", "pop EDM"], "downs": [], "aka": "", "related": "", "desc": "由名字也能看得出来，这是经过EDM浪潮改造过的Ghetto House，在TCHAMI和Malaa等制作人的推动下，成为EDM市场不可忽视的一种曲风。表现为音色更弹，更加饱满，也会更加注重旋律的编排，更适合在舞池播放。只是现如今，比起“大费周章”地做一个EDM Ghetto House，\"慢速版\"似乎更适合摆烂的制作人，这种慢速版常常与“夜晚”“美女”“跑车”相关联，以一种相对不明所以的方式展现“冷峻”“严肃”“西格玛”的男性特征，此类慢速版和Slowed Slap House被Tik Tok等短视频媒体平台合称为“EA7音乐”。", "chapter": "House", "examples": ["Testarosa - Malaa"]}, "budots": {"name": "Budots", "ups": ["House"], "downs": [], "aka": "", "related": "", "desc": "大致形成于2010s菲律宾南部的达沃市，在比萨亚语区传播。相当本土化的一个House分支。其特点是大量使用打击乐、高亢的 \"tiw-ti-ti-tiw \"口哨Hooks，充满活力的节拍与幽默的声音效果，听感跟“土嗨”类似。通常没有构成流行歌曲的常见元素，如诗句、副歌和和弦等。Budots的产生与菲律宾的本土自由街舞文化息息相关，疯狂的舞蹈动作配上Budots音乐在互联网影响颇大。菲律宾街舞团体D'Squared Cru曾在2019年在中国的深圳卫视《起舞吧！齐舞》中以Budots音乐编舞，给评委留下了深刻印象。 (相关视频：https://www.bilibili.com/video/av21579690丨https://www.bilibili.com/video/av54549618）", "chapter": "House", "examples": ["Budots (Mix No. 1) - Mr. Budots", "Kiat Jud Day - Djkeinth"]}, "changa tuki": {"name": "Changa Tuki", "ups": ["House"], "downs": [], "aka": "Changa、Raptor House", "related": "", "desc": "发源于2000s左右的委内瑞拉加拉加斯，Changa tuki（又称Raptor House）是起源于委内瑞拉的House音乐子风格和文化。它更像是一种源于电子音乐的生活方式和舞蹈。 Changa文化与其他流派如雷鬼、萨尔萨等一起，是委内瑞拉人民之间的一大主流。它的舞者和支持者被称为tuki（s），它的舞蹈是一种贫民窟舞蹈的风格。DJ Baba、DJ Yirvin、Pocz和Pacheko等是代表制作人/DJ。知名制作人Arca也曾在Lady Gaga的Dawn of Chromatica的混音中采样了DJ Yirvin的Mételo sácalo。", "chapter": "House", "examples": ["Chumaenga - DJ BaBa"]}, "kidandali": {"name": "Kidandali", "ups": ["House", "EDM", "Afrobeats", "Kadongo Kamu"], "downs": [], "aka": "", "related": "", "desc": "Nation: Uganda/乌干达 随着穆塞韦尼的上台，乌干达经济腾飞，艺术文化和经济政治均得到高速发展。在1990s，Kidandali这种融合了民族特色的电子舞曲诞生了Kidandali音乐的特点是使用乌干达共和国（非洲东部）的本地的声音和采样。Kidandali是甘达语中的一个词，翻译过来的意思是 \"当地聚会 \"或\"庆祝\"。往往应用于当地的音乐会或者婚礼，派对场景。大多数情况下，Kidandali是在这种地方聚会和活动中播放或表演的音乐。随着厂牌Eagles Production的建立，优秀的Kidandali制作人越来越多，他们致力于推广乌干达音乐的发展。如今的Kidandali已然成为高度现代化的乌干达的文化标志之一，正领导着乌干达在文化上再一次震惊世界。", "chapter": "Ethnic", "examples": ["Tukikolemu - AK47 [1:11起始]"]}, "tech house": {"name": "Tech House", "ups": ["Techno", "House", "Deep House"], "downs": ["Deep Tech", "Rominimal", "Gangsta House", "Electro Tech House", "Tribal House", "Minimal Tech House", "Naughty Tech House"], "aka": "", "related": "", "desc": "早在20世纪90年代就已出现，算是House和Techno的折中尝试，但严格上划分应是House的一个分支，节奏和结构基本保持了House的特点，干脆而又弹跳感十足，通常比Techno略慢，Bassline低音混响感也比传统House浓重。Tech House已经是非常流行的舞曲流派，时至今日，主流EDM电音节基本都能听到Tech House，一般将这种更主流的Tech House叫做“Naughty Tech House”，这里不做区分。", "chapter": "House", "examples": ["PWR - Matroda / Bleu Clair"]}, "deep tech": {"name": "Deep Tech", "ups": ["Tech House", "Deep House", "UK Garage"], "downs": [], "aka": "Urban House、Low-Tech", "related": "", "desc": "Deep Tech是House的一个子流派，兴起于2010年代初的英国地下场景中的UK Garage和Tech House场景，植根于英国的Rave和Bass音乐，是对当时兴起的Grime、Dubstep、尤其是UK Funky等Bass Music的回应。Deep Tech融合了这些元素，同时回归到UK Garage/UK House中更直接、更易于跳舞的节奏。Deep Tech继承了Tech House的节奏和120-124BPM左右的速度、Bassline以及Tech House流行趋势（受德国Minimal Techno影响）中的极简主义，主要特点是融入了受Speed Garage影响的Shuffle节奏和合成器声音，以及UK Garage的典型“城市”听感，因此也被称为“Urban House”。Deep Tech还进一步强调深沉的Sub Bass，与其他UK Bass风格保持一致。此外，Deep Tech还融入了各种英国Rave的元素，如Acid House的合成器、Diva House/Breakbeat Hardcore的采样，甚至还有Bleep Techno的标志性音色。Deep Tech一定程度上受到了Deep House的影响，包括其Bassline和小三和弦，但Deep Tech缺少深情、轻松的氛围和柔和的打击乐，而是一种更有活力、更适合舞池的风格，同时Deep Tech与同一时期成为主流的“UK Deep House”风格也有关联，后者具有类似的元素，但往往旋律性更强，更适合电台播放。Deep Tech大约起源于2010年代初的地下场景，Mark Radford的Audio Rehab是这一流派最有影响力的厂牌，此外还有Nightshift、Hugo Massien、X5 Dubs、RS4等制作人。随后，House Entertainment、Eastside Records、Hot Creations等其他英国厂牌，以及Jamie Jones、Disclosure和Julio Bashmore等更受欢迎的制作人也相继推出了这一音乐流派。Deep Tech在整个英国都很流行，与一种标志性的舞蹈风格“Cutting Shapes”联系在一起。大约在2010年代中期，它甚至在社交媒体上掀起了一股“Shuffle Dance”视频风潮。在2010年代后期，由于No Art等唱片公司以及意大利的Dimmish和荷兰的Toman等国际制作人的参与，Deep Tech也传播到了英国以外的地区。", "chapter": "House", "examples": ["Open Your Eyes - Yann Fontaine"]}, "rominimal": {"name": "Rominimal", "ups": ["Tech House", "Techno", "Minimal House"], "downs": [], "aka": "", "related": "", "desc": "出现在2000s的罗马尼亚。在当时，在Catalin Ghinea创立的Sunrise公司的支持下，Rhadoo和不少制作人开始探索Minimal的与House音乐的制作方向，并融入他们的理念和标志性元素，致力于将Rominimal流派和DJ文化在罗马尼亚推广。这种流派辨识度很高，具有当地特色的社区文化。时至今日，这些艺术家们仍然在推广这一流派。 引用文章：发现宝藏—Rominimal 的诞生—罗马尼亚电子音乐的瑰宝", "chapter": "House", "examples": ["Vintage - Nu Zau / Sepp"]}, "gangsta house": {"name": "Gangsta House", "ups": ["Tech House", "Bass House", "Deep House"], "downs": ["Brazilian Bass"], "aka": "G-House", "related": "", "desc": "G-House兴起于2010年代中期，是一种深邃、黑暗的House音乐形式，特点是在简单短小但精悍的节拍上加入说唱采样。该流派后来又吸收了Bass House、Future House甚至Deep House的影响，但其独特的朦胧烟雾美感、低沉的人声和突出的节拍在整个发展过程中始终保持不变。一些制作人也受到了芝加哥早期流派以及Hip House的影响。Gangsta House日益增长的影响力和网络人气进一步吸引了一些Bass/Future House制作人，如Wax Motif、Malaa、Tchami、Destructo等，为这一流派引入了更新的声音。在整个2010年代，Sleazy G和Cuff等厂牌成为了该流派的主要中心。在2010年代后期，该流派的一个独特变体Brazilian Bass由巴西场景发展而来，后来Slap House也从中诞生，由Spinnin' Records相关的制作人在巴西以外的地区发展而成。", "chapter": "House", "examples": ["Grow Up - Volac"]}, "deep house": {"name": "Deep House", "ups": ["Chicago House", "Jazz", "Soul"], "downs": ["EDM Deep House", "Future House", "Brazilian Bass"], "aka": "", "related": "", "desc": "发源于1980s的芝加哥，由Marshall Jefferson和Larry Heard共同开创。与强调“舞池性”的一般House不同，Deep House崇尚听感的深度，更适合细品而非舞蹈，听感与爵士和灵魂乐有共通之处。今天听到的Deep House与早期Deep House已截然不同，但音乐基调一直都没有太大变化——即祛除杂念，让灵魂接受音乐的洗礼。这种深沉的元素一直受到制作人的追捧，时至今日，仍有不少带有Deep元素的House音乐在舞池、咖啡厅或者我们的设备上播放。", "chapter": "House", "examples": ["Another One... (For Larry) - Two Armadillos", "Ready For Your Love - Gorgon City (UK Deep House)"]}, "afro house": {"name": "Afro House", "ups": ["Deep House", "South African Music", "Kwaito"], "downs": ["Tribal House", "Amapiano"], "aka": "AfroHouse", "related": "", "desc": "起源于南非，融合了Deep House和南部非洲音乐的元素，听感很放松，略有催眠的效果。BPM较为多变（取决于制作人）。Afro House大约在2000s出现，Black Coffee被认为是该流派的有力推动者。到了2010s时在全球范围内流行，做了几年的冷板凳后，Amapiano的出现让这一流派又重新得到了当今市场的欢迎。", "chapter": "House", "examples": ["Africa Shine - Black Coffee / Mi Casa"]}, "jazz house": {"name": "Jazz House", "ups": ["Deep House", "Jazz"], "downs": [], "aka": "Jazz-House", "related": "Nu-Jazz", "desc": "由名字也不难看出这是爵士与House音乐碰撞在一起的产物。与Deep House的基调类似，融合Jazz的元素，编曲手法多样，但House音乐的比重更大些。当Jazz元素占比比House元素多时，则将这些音乐称呼为“Nu-Jazz”。", "chapter": "House", "examples": ["Smoke - Glenn Underground"]}, "lo-fi deep house": {"name": "Lo-Fi Deep House", "ups": ["Lo-Fi", "Deep House", "Jazz"], "downs": ["Vapor House [ZCHB's Personal Tag]"], "aka": "Lofi Deep House", "related": "", "desc": "Lo-Fi Deep House更多是表征一种制作手法，而并非一个具体的音乐风格。将Lo-Fi低保真制作手法运用到Deep House上。另外，往往也会将录制过程中的杂音、呼吸声等一并录制下来。当然，更多是出于艺术性考虑而刻意为之，使其多了许多低保真音乐共有的滤镜感。", "chapter": "House", "examples": ["Second Coffee - Computer Graphics"]}, "outsider house": {"name": "Outsider House", "ups": ["Deep House", "Lo-Fi"], "downs": [], "aka": "Outsider Dance、Raw House", "related": "", "desc": "该名词由由DJ Ben UFO和音乐记者Scott Wilson于2012年首次提出，结合了Deep House、Techno和Noise的元素。这种音乐运用Lo-Fi低保真技术制作，你可以这种技术当成一种声音滤镜，有些类似于第四代卡式磁带的质感。许多歌曲中的元素会被制作人有意的粗糙化，模糊化，形成一种独特的听感。", "chapter": "House", "examples": ["To Cold For Slugs - Lindsay Lowend"]}, "lo-fi house": {"name": "Lo-Fi House", "ups": ["Deep House", "Vaporwave", "Outsider House", "Jazz"], "downs": [], "aka": "Lofi House", "related": "", "desc": "Lo-fi House是2010年代中期发展起来的一种Outsider House形式，与早期的Outsider House不同，更依赖于Deep House元素的“夜间”、“怀旧”的氛围，以及一种独特的梦幻、低保真美学，而早期的Outsider House则更多融入了Techno，以及源自Acid Techno/Acid House的听起来更“刺耳”的合成器音色。Lo-fi House主要受到Anthony Naples和LA Vampires等制作人早期作品的影响，代表着早期Outsider House/Outsider Dance音乐中的一部分。这种风格主要由Lobster Theremin和Coastal Haze等厂牌，以及Mall Grab、DJ Seinfeld、Grant、DJ Boring、Ross From Friends、dj poolboi等艺术家推广，并通过YouTube、SoundCloud和Bandcamp等平台迅速在网上流行开来。现在“Lo-Fi House”这个名字变得更加大众化，很多制作人都会选择“Lo-Fi House”来形容自己的音乐，而“Lo-Fi House”与“Lo-Fi Deep House”两词已近乎没有区别。", "chapter": "House", "examples": ["Weird Japanese Girl - Desired", "Promethium Reprise - Midnight / YLXR"]}, "chill house": {"name": "Chill House", "ups": ["Chillout", "Ambient", "Deep House"], "downs": ["Organic House"], "aka": "", "related": "", "desc": "笼统的说，Chill House为Chillout和House的结合体，带有明显Chill氛围的House，有时会突出乐器的旋律。底鼓比较常规且Bass不会有明显的扁平化，可能带有Tropical House中的一些音色。继承了Chillout的放松，惬意的氛围感，给人以轻快的感觉。相应场景的功能性较强。", "chapter": "House", "examples": ["Reassurance - fwd/slash"]}, "organic house": {"name": "Organic House", "ups": ["Deep House", "Chill House"], "downs": [], "aka": "Organica、Playa Tech、Spiritual House", "related": "", "desc": "Chill House与Deep House （也可能带有Progressive元素）曲风衍生出的流派，具有决定性的在于配器选用，合理摒弃掉过于电子化和机械化的鼓组，更加讲究底鼓和军鼓的真实质感，并且通常来说质地不会偏重，给人轻快且明晰的听感，也有制作人会选择结合一些西亚/南亚的本土化乐器。Organic House更讲究崇尚，拥抱大自然的心态，近些年来比较流行。", "chapter": "House", "examples": ["Float On - Lee Burridge / Lost Desert"]}, "tropical house": {"name": "Tropical House", "ups": ["Deep House", "Balearic Beat", "pop EDM"], "downs": [], "aka": "Trop House、Summer House", "related": "", "desc": "该名词最初由Thomas Jack半开玩笑地形容他的音乐（历史总是相似的）。Tropical House有着热带特有的岛屿、海滩风情，听上去积极、放松，休闲。BPM比Deep House稍慢一点（100-115BPM）。常常采样一些热带乐器，如Steel drum、马林巴、吉他、萨克斯甚至长笛。Kygo和Robin Schulz将这一曲风带入了主流EDM的视野，在EDM市场上占有一席之地。这是夏日音乐的不二选择。", "chapter": "House", "examples": ["Firestone - Kygo"]}, "edm deep house": {"name": "EDM Deep House", "ups": ["Deep House", "pop EDM"], "downs": [], "aka": "", "related": "", "desc": "也是EDM浪潮下的产物。具有经典的EDM框架，层次感更明显。制作人往往注重人声在歌曲中的效果，也更适合流行市场。但不得不说与Deep House的目的大致相同—让人放松，去除杂念。近年来热度有所下降。", "chapter": "House", "examples": ["Superstar (Dirty Rush & Gregor Es Remix) - Mandee / Dirty Rush & Gregor Es / Maria Mathea"]}, "brazilian bass": {"name": "Brazilian Bass", "ups": ["EDM Deep House"], "downs": ["Slap House"], "aka": "", "related": "", "desc": "我相信只要是经常接触互联网的人，一定都听过Brazilian Bass。发源于2010s的巴西首都巴西利亚，Alok、Sevenn等知名DJ将其推上了主流电音界的舞台。与EDM Ghetto House有些相似，但两者感情基调不同，Brazilian Bass显然要积极一些。自从短视频开始统治世界后，这一类曲风已经不再是2016年左右那会在电音节播放的那种EDM的样子，而是随了大众的口味改造自己，变成了接下来要说的Slap House。", "chapter": "House", "examples": ["Temple - Zerky / Liu"]}, "slap house": {"name": "Slap House", "ups": ["Brazilian Bass", "pop EDM"], "downs": [], "aka": "Lithuanian Bass", "related": "", "desc": "这一名词主要由立陶宛的制作人开创，故在“Slap House”这一名词流行起来之前，这些音乐也称为“Lithuanian bass”，可以理解为更加流行的Brazilian Bass。Vocal很模版，很口水，旋律更加洗脑（主要体现在重复一些无意义的音，也就是Loop）。主要制作人为Imanbek、Topic、R3HAB。实际上Slap House和Brazilian Bass没有太多区别。同样的，套路化十分严重，几乎没有什么在制作层面上值得称赞的曲子。", "chapter": "House", "examples": ["All Around The World (La La La) - R3HAB / A Touch Of Class"]}, "future house": {"name": "Future House", "ups": ["pop EDM", "Deep House", "UK Garage"], "downs": ["Future Bounce"], "aka": "", "related": "", "desc": "制作人Tchami于2013年提出了这一名词，用于形容他在SoundCloud上发布的作品。这一流派有着金属且很有弹性质感的Bassline，旋律较为柔和。广受主流电音界的Raver们欢迎。近年来不少制作人开始尝试摆脱传统Future House的架构，开始尝试将这些元素融入到别的曲风中，比如Tech House。", "chapter": "House", "examples": ["Heaven To Me - Don Diablo / Alex Clare"]}, "future groove": {"name": "Future Groove", "ups": ["Groove House", "Future House", "Soul", "Funk"], "downs": [], "aka": "", "related": "", "desc": "标签。深受R&B、Soul、Funk影响的Future House并且融入Groove元素。你可以理解为Future House在这些元素的奇妙化学反应下的产物。", "chapter": "House", "examples": ["Yume - ASCO / Ki-Ri"]}, "future bounce": {"name": "Future Bounce", "ups": ["Future House", "pop EDM"], "downs": [], "aka": "", "related": "", "desc": "最早于2014年在互联网文化中诞生，相关作品在2016/17年左右出现爆发式的增长，由于Future Bounce在Future House的基础上Drop更加强调弹跳性，人声、旋律、编排也非常地流行化，促使这类流派非常适合Rave，也非常适合在主流音乐节播放。Mike Williams，Brooks，Mesto，Dropgun等人是突出贡献者。不过随着创新瓶颈基本到顶，Future Bounce也不可避免地走下坡路。", "chapter": "House", "examples": ["This Far (RudeLies Remix) - Raven & Kreyn / Nino Lucarelli / RudeLies"]}, "bass house": {"name": "Bass House", "ups": ["Riddim Dubstep", "Deep House", "Bass Music"], "downs": [], "aka": "", "related": "", "desc": "出现在2010s。顾名思义，这是House音乐与Bass音乐的融合。融合Deep House、Riddim Dubstep和UK Bass的元素，BPM通常在128左右，后来Bass House融合了诸多其他曲风，比如EDM Trap、Tech House等。Jauz、Valentino Khan等是其代表制作人，也经常会在US Bass主题的音乐节上播放。 Bro House (A.K.A. Dude House)是瑞典三人组合BROHUG提出的说法，由Bass House衍生而来，目前只是标签。这类Bass House的Bassline更接近于Brostep因而得名Bro House(也因为组合名)。同时Bro House在Verse和Intro上有浓厚的EDM Ghetto House风味，不过由于Bro House与Gangsta House定义接近且后者更加公认化，加之Bro House仍处于Bass House定义范畴，因此此处不做区分。", "chapter": "House", "examples": ["Edge - prime / Shapes"]}, "riddim house": {"name": "Riddim House", "ups": ["Bass House", "Brostep", "Riddm Dubstep"], "downs": [], "aka": "", "related": "", "desc": "存在争议的标签，可以理解为：沿用Riddm Dubstep中的Bass成分和调制方式，鼓点方面取而代之的是House的节拍，与Bass House极为相像。不过Riddim House的Bassline音色是Metallic Bass，Bass House使用的Bassline音色是Wobble Bass。", "chapter": "House", "examples": ["Weeble Wobble - Eliminate"]}, "speed house": {"name": "Speed House", "ups": ["Bass House"], "downs": ["Speed Bounce"], "aka": "150BPM House、High BPM Bass House、150BPM Bass House", "related": "", "desc": "Speed House这一术语是近年来在南加州以及一些电子音乐博客中描述的更快的House音乐，首次提出Speed House一词的可能是制作人Haus of Panda，目前这种音乐类型比较统一的称呼为Speed House，BPM在140~155浮动。该流派最早的影子在Bassline和UK Hardcore EDM化时已可见一斑。常被误认为Basscore和Hard Bounce。推荐制作人：Haus of Panda，ATRIP，ALRT，Moksi，Jauz，Sikdope，Gerald Le Funk。Speed Bounce属于Speed House的一种，多为加速的Big Room Bounce或Melbourne Bounce，目前这种的音乐类型较少。", "chapter": "House", "examples": ["Hooyah! - CHYL / Fahjah"]}, "speed bounce": {"name": "Speed Bounce", "ups": ["Future House", "Tech House", "Carnival", "Melbourne Bounce etc."], "downs": [], "aka": "Speed House（不同于上一词条）、Speed (Future) House", "related": "", "desc": "Speed House自诞生之初便不是一个风格上非常固定的标签，时至今日其说法仍存在分歧。除了上述的Speed Bass House，还有一种加速Future House、Tech House或Deep House的类似Trance的“Speed House”也成为了国内电音节的主流。这类音乐的制作手法类似于Bass House，只不过Speed Up的对象发生了变化，在听感上这种Speed House也偏向Carnival和UK Bounce的中间体，甚至有些曲目干脆用上了Donk Bass。不过有说法认为，这种Speed House是由我国制作人VESK GREEN首次提出的。", "chapter": "House", "examples": ["Fly With You - Sikdope / ALRT", "Enter Your Dream - VESK GREEN"]}, "progressive house": {"name": "Progressive House", "ups": ["House"], "downs": ["EDM Progressive House", "Deep Progressive House"], "aka": "Prog House", "related": "", "desc": "始于1990年代的英国，尽管在当时前卫摇滚颇有名气，但这里的“Progressive\"应该翻译成”渐进的“，因为它深受Trance音乐的影响，比较注重旋律和乐曲的渐进式编排，拍点强弱较不明显，强调情绪与氛围逐步推进和堆叠，节奏大致在120到134bpm左右，作品对时长没有特定的限制。元老级DJ Sasha为推动该曲风作出卓越的贡献。从诞生起到今日，仍然广受各路电音听众的欢迎。", "chapter": "House", "examples": ["Strobe - deadmau5"]}, "pizzicato prog": {"name": "Pizzicato Prog", "ups": ["Progressive House", "Trance"], "downs": [], "aka": "", "related": "", "desc": "这里的“Pizzicato”直译过来是“拨弦的”，其实是指老牌组合Faithless的标志性的拨弦式的音色（你可以在例曲中感受得到）。由于Faithless的商业成功和在英国和欧洲颇大的影响力，不少做Progressive House甚至Trance的DJ/制作人，比如Future Breeze、DJ Quicksilver等人都在紧跟这一潮流。这种音色的House和Trance逐渐占据了当时的舞池，于是不少人将他们的音乐称呼为Pizzicato Prog。", "chapter": "House", "examples": ["Bellissima - DJ Quicksilver", "Keep The Fire Burnin' - Future Breeze"]}, "deep progressive house": {"name": "Deep Progressive House", "ups": ["Progressive House", "Deep House"], "downs": [], "aka": "Deep Prog", "related": "", "desc": "从名字也能看出来是Progressive House与Deep House交汇的产物。比起它的爸爸Prog House，这种曲风不仅讲究渐进式的铺垫，也更加深沉，感情流露更加地细腻，含蓄。也往往更注重氛围，音色的塑造和一些需要仔细品味才能品尝出来的韵味。自疫情时代以来，这种曲风逐渐积攒了不少口碑和人气，已涌现了不少非常优秀的制作人，比如Marsh，Sultan + Shepard，Tinlicker等等。", "chapter": "House", "examples": ["Run Away - Ben Böhmer / Tinlicker / Felix Raphael"]}, "melodic progressive house": {"name": "Melodic Progressive House", "ups": ["Progressive House"], "downs": [], "aka": "", "related": "", "desc": "Progressive House的主要模式之一，结构和传统Progresssive House近似，但更注重绵延不绝的旋律，倚重亮色琶音pluck来构建旋律主体,乐器倾向性强，适合闲情逸致的生活中品赏。既不像EDM Progressive House适合主舞台烘托气势，也不像传统Progressive House那么平静，低调，与Melodic House相比则有更长更精密的安排，有更多的时间来施展制作人的技术水平和音乐理解。", "chapter": "House", "examples": ["Life Is About Moments - Mark & Lukas"]}, "edm progressive house": {"name": "EDM Progressive House", "ups": ["Progressive House", "pop EDM"], "downs": ["Melodic House"], "aka": "EDM Prog、Festival Progressive House、Festival Prog House、Progressive Big Room、Big Room Progressive House、Swedish Progressive House、Swedish House", "related": "", "desc": "在21世纪10年代EDM浪潮的背景下，瑞典浩室黑手党、Avicii和Calvin Harris等知名制作人/DJ推动了这一风格在全世界范围内的流行。与传统的Progressive House已有明显的区别，主要体现在有着“从Verse到Build-up到Drop”的经典EDM架构，更短的时长（往往低于4分钟），冲击感强得多的音色，朗朗上口的旋律，通常还附有歌词。由于其积极向上的主基调，这种风格让电子音乐从地下变为主流成为了可能，有力促动了当今的商业电子舞曲市场的发展。可惜近年来由于创新上限基本到顶，后疫情时代下热度下降明显，许多曾经靠EDM Prog起家的百大DJ都抛弃了这一曲风。", "chapter": "House", "examples": ["High on Life - Martin Garrix"]}, "melodic house": {"name": "Melodic House", "ups": ["EDM Progressive House"], "downs": [], "aka": "", "related": "", "desc": "", "chapter": "House", "examples": ["Shed A Light - David Guetta / Robin Schulz / Cheat Codes", "Life - Tobu"]}, "trouse": {"name": "Trouse", "ups": ["Trance", "House"], "downs": [], "aka": "", "related": "", "desc": "这是一个颇具争议的标签，是于形容Trance和House界限模糊不清的一些作品。Tiesto转型时提出的了“Trouse”这一名词，尽管不被乐迷认可，但实际上Trance和House的跨界融合现象早已存在。一般来说我们不会用这一标签去形容音乐，而是会用Progressive Trance、Deep Progressive House/Progressive House、Melodic House、Melodic Techno等去标记音乐，实际上这些音乐往往就是这些风格的变体或是多个风格的融合体。", "chapter": "House", "examples": ["Hometown - Simon Doty / Ursula Rucker"]}, "glitch house": {"name": "Glitch House", "ups": ["UK Hard House", "UK Bounce", "Scouse House", "NRG"], "downs": ["Hard Bass"], "aka": "", "related": "", "desc": "Glitchcore起源于上世纪90年代中期，隶属于Breakcore分支，与Breakcore非常相似，它们有许多相似特性，但Glitchcore的鲜明特征和元素是CD-Skipping/Television Static/Electronic Mistake的音频类型，Glitchcore的鼓通常很快，低音通常较深且充满力量，其中与House元素结合的Glitchcore即Glitch House，这一流派也常常和Future Funk有一定交集。，这首是Glitch House和Future Funk的共同体。 Bumping “Bumping”更多的是一种拟声词，起源是UK Hard House那种“Bump Bump”声的Donk Bass，或者说叫“Bamboo Bass”，即一种听起来邦邦响的失真Bass。Bumping一词就是形容这种带有这类Bass的UK Hard House。Bumping这个说法起源不晚，在各个国家都有分化的品类，尤其是在西班牙和俄罗斯最受欢迎，后者则是形成了如今“Hard Bass”声音。", "chapter": "Fusion", "examples": []}, "electro house": {"name": "Electro House", "ups": ["Electro Pop/Electroclash", "House"], "downs": ["Bass House", "EDM Electro House"], "aka": "", "related": "", "desc": "Electro House的特点是其低音部分的处理。通常是以嗡嗡作响的Bassline形式出现，或者用锯齿波和失真创造的Bassline。早期的Electro House电气味十足，Benny Benassi的早期作品，比如“Satisfaction”为这种风格打下了基础。后来这种曲风开始受到舞池的关注，David Guetta、Fedde Le Grand、Justice都在2000s早期制作这一类传统的Electro House。", "chapter": "House", "examples": ["Ghosts n Stuff (feat. Rob Swire) - deadmau5"]}, "fidget house": {"name": "Fidget House", "ups": ["Electro House", "Breakbeat Hardcore"], "downs": ["Dutch House", "Complextro", "Stutter House"], "aka": "Dirty Electro Fidget House", "related": "", "desc": "形成于2000年左右，Fidget House这一名词最初是由DJ/制作人Jesse Rose和Switch半开玩笑地形容他们的音乐。特点是突兀，Breakbeat Hardcore那样不那么“4/4拍”的节奏，Glitch音色的运用、听起来质感很“脏”的Bassline，还有比较怪异的人声切片，这些元素为Complextro的诞生奠定了基础，也促进了Glitch house和Stutter House的诞生。Fidget House流行于2009年左右，现已不流行。Fidget House一首最知名的曲目就是被誉为“曳步舞国歌”的Party Rock Anthem，这首歌在2012年左右获得了巨大的商业成功，甚至影响了其他国家尤其是韩国的电子舞曲风格。", "chapter": "House", "examples": ["Party Rock Anthem - LMFAO / Lauren Bennett / GoonRock"]}, "edm electro house": {"name": "EDM Electro House", "ups": ["Electro House", "Electroclash", "Pop EDM"], "downs": ["Bigroom", "Complextro"], "aka": "", "related": "", "desc": "也许是传统Electro House太无聊了，不少制作人尝试加入许多流行的元素诸如更明朗的人声，更饱满的电气Drop，于是乎EDM Electro House就此诞生，并受到许多听众喜爱。这种曲风适合在主流电音节播放。Knife Party、Porter Robinson、Zedd、Hardwell等人为EDM Electro House的普及起到不可磨灭的贡献。由这种曲风派生而来的子分支通常会相互影响，相互融合。", "chapter": "House", "examples": ["Eclipse - Hardwell", "Walk Thru Fire - Vicetone / Meron Ryan"]}, "complextro": {"name": "Complextro", "ups": ["EDM Electro House", "Dubstep", "Fidget House"], "downs": ["Moombahcore"], "aka": "", "related": "", "desc": "2010s时，制作人Porter Robinson用“Complextro”这一名词开玩笑地形容他的早期作品，尽管颇特不是这个流派的开创者，但后来人都用Complextro来称呼这种类型的音乐。Complextro强调音乐元素复杂性，糅合了不少比如Brostep，8-Bit，Glitch等元素，听感上很有“切碎”感，通常保持128左右的标准BPM，制作难度较大。这种做“加法”的制作理念引领了一股潮流，不少制作人纷纷参与其中。Knife Party、Vexento、F.O.O.L等是代表制作人。", "chapter": "House", "examples": ["Bad Intentions - Zomboy", "Power Glove - Knife Party", "Energy Drink - Virtual Riot"]}, "bigroom house": {"name": "Bigroom House", "ups": ["EDM Electro House"], "downs": ["Dutch House", "EDM Techno", "Future Rave"], "aka": "Bigroom、Big Room House、Big Room、Festival House", "related": "", "desc": "毫无疑问的舞池炸弹，拥有大空间感的Drum Kick，和有着巨大混响的Lead，旋律往往比较简单，辨识度比较高。在2015-2019年左右盛行于各大电音节。许多大牌DJ/制作人也靠着这种曲风得到了许多知名度。尽管这个曲风因为制作过于简单等原因受到不少批评，但显然这种曲风得到许多听众的喜爱。W&W、Blasterjaxx、Kevu等等是代表制作人。不过随着创新上限基本到顶，热度下降也十分明显。继承了这种曲风衣钵的或许是很EDM化的Techno。（比如现在的Hardwell和Maddix的作品）", "chapter": "House", "examples": ["Follow Me - Maddix / SaberZ", "Rave Culture - W&W", "Tremor - Dimitri Vegas / Martin Garrix / Like Mike"]}, "dutch house": {"name": "Dutch House", "ups": ["Bigroom House"], "downs": ["Bigroom", "Moombahton", "Melbourne Bounce"], "aka": "Dirty House、Dirty Dutch", "related": "", "desc": "Electro House的主要分支，起源于荷兰，Afrojack和DJ Chuckie等人有力推动了这种音乐的发展。特征为拉丁风格的鼓组，并不凸显强烈的Bassline，更多采用MIDI合成音色，歌曲结构十分简单，时常与Bigroom一同出现。随着Bigroom热度下降，制作Dutch House的制作人大多也开始了转型。", "chapter": "House", "examples": ["Take Over Control (feat. Eva Simons) - Afrojack"]}, "groove house": {"name": "Groove House", "ups": ["Bigroom House", "EDM Electro House", "EDM Progressive House"], "downs": [], "aka": "EDM Groove House", "related": "", "desc": "“Groove House”可以指代很多House作品，比如Tribal、Stutter等，还有一种非EDM的Groove House的标签化叫法，毕竟无Groove不成House。此处仅介绍Bigroom/Electro House下的Groove House场景。Groove House是Big Room House/Electro House的一个子流派，其特点是使用精简的Bass音色、合成器音色和部落打击乐，共同配合以实现极致的“Groove”感。音色搭配往往走极简路线，以强调丰富的鼓编，很多时候也会使用Rave Chord Stab音色。Groove House受到Acid House、Tribal House、少量的Tech House和Progressive House影响，与EDM/Festival Progressive House有着密切的联系，许多EDM Progressive House制作人都将Groove House作为自己的“副业”（如Axwell、Sick Individuals、Deniz Koyu、Dimitri Vangelis & Wyman等制作人），尽管这两种流派听起来并不相同。其他与Groove House关系密切的制作人还有Kryder、Tom Staar、Dannic等。目前“Groove House”一词仅限于Bigroom社区的制作人使用，并且已经有了许多该流派的采样包。Groove House主要由Axtone Records、Revealed Recordings、Protocol Recordings、Size Records等Bigroom/Festival Progressive House唱片公司发行，还有Kryder经营的Sosumi Records。", "chapter": "House", "examples": ["Ring The Alarm - Nicky Romero / David Guetta"]}, "jungle terror": {"name": "Jungle Terror", "ups": ["Bigroom House"], "downs": [], "aka": "", "related": "", "desc": "由荷兰制作人Wiwek创造该名词，起初Jungle Terror是用于形容Wiwek2010年左右在Soundcloud上发布的一系列EP。多采用部落鼓，采样动物的声音和各种奇怪的环境音，使得这一类风格很有“原始森林”的气息。尽管这样的形容可能会让你以为这一曲风十分“地下”，可实际上在2013~2016年该曲风在主流电音节大受欢迎，时常融合诸如EDM Trap、Techno、Moombahton等。可以认为Jungle Terror属于EDM的范畴。", "chapter": "House", "examples": ["Curious - Wiwek / Watch the Duck", "Azumba (Wiwek & Gregor Salto Remix) - Wiwek / Gregor Salto"]}, "edm psy": {"name": "EDM PSY", "ups": ["Mainstream Psy Trance", "Bigroom House"], "downs": [], "aka": "€DM P$¥", "related": "", "desc": "过度追求利润和现场效果的产物，也许EDM PSY更应该放到House里面。如果说Mainstream Psy Trance至少还保留了一点Psy Trance的韵味的话，EDM PSY则是彻头彻尾的EDM框架，彻彻底底地脱离了传统Psy Trance。只有Drop有那么一点点Psy的标志性三连音的元素，歌曲的其他部分在常见的EDM中基本能找到，基本没有在制作层面上值得称赞的作品。EDM PSY是这样，大牌制作人只需要整个炸场的Drop和随便搞点三连音采样就行了，而传统Psychedelic Trance听众想骂的就多了。", "chapter": "House", "examples": ["After Dark - Seven Lions", "Turn It Up - Armin van Buuren"]}, "melbourne bounce": {"name": "Melbourne Bounce", "ups": ["Dutch House", "EDM Electro House", "Mákina", "UK Bounce etc."], "downs": ["Psy Bounce", "Hard Bounce"], "aka": "Melbourne Sound", "related": "", "desc": "起源于2010年左右的澳大利亚墨尔本，各种不同的曲风如Mákina、Acid House、Hardcore Techno以及EDM浪潮交汇在一起的产物。特点是弹性十足的Drop，BPM 128-150，往往会比较重复。Will Sparks、TJR等人为该流派登上主流电音节舞台做出了相当大的贡献。国内常见的“DJ版”其实就是把墨尔本弹跳的Drop搬了过来并加上非常敷衍的制作。", "chapter": "House", "examples": ["Butterfly - Marnik / Hard Lights"]}, "psy bounce": {"name": "Psy Bounce", "ups": ["Melbourne Bounce", "Psy Trance", "EDM PSY"], "downs": [], "aka": "", "related": "", "desc": "EDM Psy浪潮下的产物。也还是Will Sparks推动了这一流派的发展，将Psy Trance标志性的鼓点融合进Drop里头，更加强调重复性。不过做这种曲风的人不多，也逐渐失去了市场。", "chapter": "House", "examples": ["Blow Your Mind - Lockdown"]}, "vina house": {"name": "Vina House", "ups": ["House", "Vina Pop", "Melbourne Bounce", "Eurodance"], "downs": [], "aka": "Vinahouse", "related": "", "desc": "自越南发展起来的当地风格的 House 音乐，BPM大约为140，Bass的音量往往拉的比较突出，节拍也较为简单。通常由使用越南流行歌曲（主要是V-Pop）的人声和旋律的混音组成。时常出现于越南的DJ场景。2020年前后，Vina House在中国国内通过网络短视频平台、自媒体等媒介得到广泛推广，并在俱乐部、夜店等场景受到欢迎，这也引发了国内电子音乐爱好者对相关现象的争议。", "chapter": "House", "examples": ["2 Phút Hơn (KAIZ Remix) - Pháo / KAIZ"]}, "moombahton": {"name": "Moombahton", "ups": ["Electro House", "Reggaeton", "Dutch House"], "downs": ["Moombahcore"], "aka": "", "related": "", "desc": "虽然是电子乐，但更多受到雷鬼的影响。最初由DJ Dave Nada将Afrojack对Silvio Ecomo和Chuckie的歌曲 \"Moombah!\"的混音从128 BPM放慢到108 BPM，并融入一些雷鬼的元素，从而创造了这一流派， 其名字也由此得来。Moombahton强调舞曲性，极具拉丁风情。尽管做这种音乐的人不多，但影响力缺不容忽视。Major Lazer和DJ Snake制作大热单曲《Lean On》就是一个典型。", "chapter": "House", "examples": ["真高兴 - 蒋亮", "Bun Up the Dance - Dillon Francis / Skrillex"]}, "moombahsoul": {"name": "Moombahsoul", "ups": ["Moombahton", "Soul", "R&B", "Jazz"], "downs": [], "aka": "", "related": "", "desc": "顾名思义，Moombahsoul就是Moombahton+Soul，仍然具有Moombahton的鼓组和节奏型，不过Moombahoul更加强调爵士，R&B等元素的应用。旋律也会轻松，平和一些。Moombahsoul的速度没有明确规定，一般来说BPM稍慢于Moombahton。", "chapter": "House", "examples": ["Love You Down - Sonora / Mundaca"]}, "uc hard house": {"name": "UC Hard House", "ups": ["Chicago House", "Hardcore Techno", "Gabber"], "downs": [], "aka": "Chicago Hard House、US Hard House", "related": "", "desc": "(见House篇章)", "chapter": "HDM", "examples": []}, "poky": {"name": "Poky", "ups": ["House", "Trance", "UK Bounce"], "downs": [], "aka": "Spanish Bounce", "related": "", "desc": "独立发源于西班牙的Hard House场景，曾一度被视为Scouse House的延伸，实则不然。Poky的声音更偏向于弱化的90s末Hard Trance，渐进感突出，唯一的区别可能是与UK Bounce如出一辙的弹跳感Kick。这种声音最后也没能保存下来，与UC Hard House一样消失在历史的长河里。如今主流的“EDM Hard House”(见HDM板块Big Room Hardstyle词条)已经更是没有保留任何一种古早Hard House形式声音。", "chapter": "House", "examples": ["I'm the 1 You're Looking 4 - Head Horny's"]}, "diva house": {"name": "Diva House", "ups": ["House", "Soul", "Disco"], "downs": ["Hardbag"], "aka": "Vocal House、Handbag House", "related": "", "desc": "这更多是一种文化现象，出现在20世纪90年代，与英国同性恋俱乐部文化息息相关。《当代英国文化百科全书》将其定义为“具有突出的女Vocal，Breakdowns，和频繁出现的钢琴。”在英国，Diva House是同性恋俱乐部的象征，那里播放的音乐也形容为“Diva House”，随后这一文化被LGBT文化所接受，并开始扩大该流派在主流音乐界的影响，比如麦当娜就受到过该流派的影响。随后这一流派的地位逐渐被前面提到的“Ballroom”代替。", "chapter": "House", "examples": ["Young Hearts Run Free - Kym Mazelle", "Show Me Love - Robin S"]}, "hardbag": {"name": "Hardbag", "ups": ["Diva House"], "downs": ["UK Hard House"], "aka": "Hardbag House", "related": "", "desc": "Hardbag早年常与Diva House混为一谈，实际上二者是存在区别的。在1990年代中期的英国Diva House场景中，Uplifting House音乐大量涌现，The Sharp Boys等英国制作人对这种声音提供了自己的诠释。他们通过将Disco Sample切成小循环，添加大量滤波器，以及纯粹为舞池创作音乐，还略微改进了BPM：这使得这种Diva House成为了UK Hard House的起源。", "chapter": "House", "examples": ["Radio (Extended Mix) - The Sharp Boys"]}, "uk hard house": {"name": "UK Hard House", "ups": ["Hardbag", "German Trance", "NRG"], "downs": ["Nu-NRG", "Hard Bounce", "Scouse House"], "aka": "", "related": "", "desc": "需要注意这和Chicago Hard House并不是一种东西，他不能被缩写为“Hard House”。你可以把他视作Slowed+Reversed版NRG，对的、没在和你开玩笑，事实上UK Hard House其实就是一个比较滑稽的风格，他的BPM在135-150，Hoover和Rave Stabs等Rave元素占据主导，之后的发展也出现了Donk Bass的声音，并且衍生出了Hard Bounce的形式，而后这种独特的Bass声音后来也被一种广为人知的风格使用，那个风格叫Hard Bass。", "chapter": "House", "examples": ["Future Acid House - Lisa Pin-Up"]}, "uk bounce": {"name": "UK Bounce", "ups": ["UK Hard House"], "downs": ["Hard Bounce", "Melbourne Bounce"], "aka": "Hard Bounce、Bouncy Hard House", "related": "", "desc": "英国最早的“Hard Bounce”指代的风格，首次出现于1999年。有着明显的弹跳感Kick和突出的反拍Bass，有些也常用未失真的Donk Bass，一定程度上继承了UK Hard House的特色，但是相对更主流一些。事实上大多数情况下都并不区分UK Bounce和其他英系Hard House，但是因为其声音影响到了后来的Hard Bounce与Melbourne Bounce，因此在这里稍微提及一下这个过渡态风格。", "chapter": "House", "examples": ["Heartbass (feat. Tommy Cash) - Salvatore Ganacci / Tommy Cash"]}, "hard-nrg": {"name": "Hard-NRG", "ups": ["NRG"], "downs": [], "aka": "", "related": "", "desc": "90s晚00s初UK Hard House发展出了Spanish Hard House，Bounce，Hard Dance等声音，Nu-NRG融合了上述形式变得多样，欧洲与英国的声音开始越来越激进，DJ Kristian称之为Hard-NRG。音乐性上更加Trancy，常常使用大混响和活泼的曲调，并且有着更现代化的音色。由于这些原因，Hard-NRG常常被误认为是Hard Trance。", "chapter": "HDM", "examples": ["Show Me A Sign (Technikal Remix) - Cube::Hard [4:23起始]"]}, "spanish hard house": {"name": "Spanish Hard House", "ups": ["UK Hard House", "Makina", "Happy Hardcore", "Bouncy Techno"], "downs": ["Hard Bass"], "aka": "", "related": "", "desc": "Spanish Hard House是一个相对较大的概念，泛指UK Hard House在西班牙或其他西欧地区出现的特色Hard House，这类Hard House承接了UK Hard House的声音，但是启发了其他UK Hard House声音如Hard Bounce和Hard Bass等。此处的Spanish Hard House主要包括三个术语：Scouse House、Bumping和Pump House，其中Bumping与Pump House定义相似，故仅采用两首曲目说明特点。 Scouse House诞生于20世纪90年代末的英国利物浦，但是属于Spanish Hard House领域，制作人汲取了Happy Hardcore快速、欢快的元素，使用标志性采样“Pipe”作为Offbeat Bassline来改造Hard House。Scouse House显然要比UK Hard House更活泼，更充沛些。另外，Scouse House还有一个特征性的音色，那就是极明显的Donk Bass，微弱失真且干脆利落，让它很具有辨识度，深深影响到了Hard Bass的声音。 Bumping更多是以一种声音的概念出现，起源是UK Hard House那种“Bump Bump”声的Donk Bass，或者说叫“Bamboo Bass”，即一种听起来邦邦响的失真Bass。Bumping一词就是形容这种带有这类Bass的UK Hard House。Bumping这个说法起源不晚，在各个国家都有分化的品类，尤其是在西班牙和俄罗斯最受欢迎，后者则是形成了如今“Hard Bass”声音。Pump House(A.K.A. Pumping)则是由Klubbheads在2002年创造的一种Hard House，衰退于2008年，特点也是Bamboo Bass和较快的节奏，在2006年左右的俄罗斯列宁格勒、西班牙以及英国、法国非常流行。有趣的是，外网对于这三种风格特色的介绍几乎完全相同，故笔者认为这三种仅仅是Spanish Hard House体系在不同时期的不同地点产生的同一种风格的不同表现。", "chapter": "House", "examples": []}, "hard bass": {"name": "Hard Bass", "ups": ["Scouse House", "Hardstyle", "UK hard house", "Powerstomp", "Techno etc."], "downs": ["Metalshade"], "aka": "Hardbass、Russian Hard Bass、Russian Hardbass、хардбасс、хард басс", "related": "", "desc": "(见House篇章)", "chapter": "HDM", "examples": []}, "hard bounce": {"name": "Hard Bounce", "ups": ["UK Bounce", "Hardcore", "UK Hard House", "Hardstyle"], "downs": [], "aka": "EDM Hard Bounce", "related": "", "desc": "随着听众人群的变化，传统的UK Bounce已经失去了市场，取而代之的是受其影响的Melbourne Bounce等。2015年，Dirty Palm改良了传统UK Bounce，保留了快速的听感甚至将BPM拉高到150BPM左右，并去掉了Donk Bass成分，取而代之的是Melbourne Bounce的EDM Lead和HDM极重的鼓组音色等，使其更接近于Hardstyle。如今的Hard Bounce常常能在Nightclub和电音节上出现，作为烘托气氛的音乐使Raver们随着音乐舞动起来，但是也逐渐被一些批评者认为是“土嗨”。", "chapter": "House", "examples": ["We Are The Ravers - Ben Nicky / Olly James / MC Stretch"]}, "future rave": {"name": "Future Rave", "ups": ["Bigroom", "Trance", "Techno", "pop EDM"], "downs": [], "aka": "", "related": "", "desc": "法国制作人David Guetta，丹麦制作人MORTEN于2020年提出的一个概念，通常以复古质感并带有高混响的锯齿波音色为Lead，具有空旷的空间感，并含有显著的Electro声音元素。作为一种新兴的类型，行业内对于Future Rave的理解和定义仍存在较大争议。近年来该流派的热度也开始有所下降，结构也日趋向EDM Techno靠近(倒不如说两种风格是双向奔赴)。", "chapter": "House", "examples": ["Greece 2021 - W&W / Martin Jensen / Linnea Schössow", "I’ll Take You High - Tiësto"]}, "color house": {"name": "Color House", "ups": ["Complextro", "Color Bass", "US Bass", "Future House"], "downs": [], "aka": "", "related": "", "desc": "一个民间传言的标签，一般来说是“Color Bass音色设计+House节奏型”的模式，广义上讲可以是金属感突出的Deep House/Future House等风格。通常不仅仅是Color Bass制作人跨界制作这种风格，具体细分有如下几种微流派： ①以Mo falk为代表的制作人，听感上更接近Complextro，使用EDM Electro House的结构，注重音色炫技式的编排； ②以OVSKY为代表的制作人，一般以Future House/Future Bounce作为歌曲基础，然后将Color Bass水晶质感的音色替代Future Bass的“敲钢桶”音色； ③Bass音乐人跨界制作，直接在Color Bass作品里将一部分drop节奏型换为House的四四拍，比如第一段Drop为Color Bass而第二段为House的拼贴式结构。 实际上光靠卷积混响和琶音做出Color效果难以将Color House变成一种真正意义上的曲风，因此要将这种风格变成独立风格还需要更广的传播和更多的尝试，现在也出现了Color音效与Bass House/Tech House融合的情况，因此相对来说Color House也更适合力求创新的制作人尝试。", "chapter": "House", "examples": ["Hyperborean - CamaCon"]}, "stutter house": {"name": "Stutter House", "ups": ["Fidget House", "Deep House", "Tech House"], "downs": [], "aka": "Flutter House、Tremolo House", "related": "", "desc": "Stutter直译过来是：“口吃”，不过在这里应该翻译成“反复出现的声音”，即采用DAW中的一些插件来实现一种“切片式”的Drop或者Vocal，搭配现代化的House音乐，给人一种非常特别的听感（比如视频演示的音乐），实际上这一制作手法在2010s初期就能在DAW上实现，只是最近随着Fred again..的爆火，The Chainsmokers等许多制作人的推广下，这一名词开始流行起来，事实上Modern Hardtek的子分支Stottercore实际上是第一种使用“Stutter”效果的电子音乐风格。有说法认为Stutter House是Fidget House的精神延续体，在这里由于缺乏证据故并不放入Fidget House旗下。", "chapter": "House", "examples": ["Lonely - VisionV / Phea"]}, "melodic techno": {"name": "Melodic Techno", "ups": ["Techno", "Progressive House", "Progressive Trance"], "downs": [], "aka": "", "related": "", "desc": "Melodic Techno是Techno的一个子流派，深受Trance音乐的影响，但节奏较慢，通常在120-125BPM之间，打击乐也比较柔和，一定程度上借鉴了Minimal Techno。Melodic Techno的特点是用干净而细腻的Pluck音色写小调琶音旋律，并通常带有大混响和立体声延迟，灵感来自Progressive House、Progressive Trance和2000年代中期的“NEO-Trance”潮流，并带有轻柔的Pad和Rolling Bassline，共同营造出一种令人联想到早期Trance音乐的“催眠”氛围。Melodic Techno的渐进式结构使其与后来的Trance音乐以及2010年代末期流行的更“硬”、更注重Drop的Techno音乐形成鲜明对比，因此常常被认为是90s Classic Trance的复兴。Melodic Techno在2010年代中后期确立了自己在Techno中的地位。Tale of Us和Mind Against是这一流派的先驱者，Stephan Bodzin和Recondite的作品对这一流派的影响尤为深远。在接下来的几年里，厂牌Diynamic Music和新成立的Afterlife成为了推动这一流派发展的主要厂牌，并推广了更多杰出制作人，如Undercatt、Innellea、ARTBAT等，取得了很大的成功。更多知名DJ也投身于制作这一流派，如Patrice Bäumel、Kölsch、Maceo Plex等。2010年代末，Melodic Techno在欧洲和南美一些国家大受欢迎，其成功与Techno的普遍流行以及融合了其他Trance/Progressive House的分支的元素（如Melodic House和Progressive Breaks）有着密切的关系。", "chapter": "Techno", "examples": ["Pegasus - Kevin de Vries【https://www.youtube.com/watch?v=glig-ngJXVY】", "Magia - Mathame / Franchino"]}, "detroit techno": {"name": "Detroit Techno", "ups": ["Chicago House", "Detroit House", "Disco"], "downs": ["Acid Techno", "Ambient Techno", "Bleep Techno"], "aka": "Hi-Tech Soul", "related": "", "desc": "诞生于1980s中期，源于美国底特律最初的声音。Juan Atkins、Kevin Saunderson、Derrick May等中产阶级的黑人DJ借鉴了以前的电子作品，包括处于美国芝加哥的House音乐，德国Kraftwerk发电站乐队和日本乐队Yellow Magic Orchestra的作品，开创出一种全新的声音——通过使用新的鼓机，特别是罗兰TR-808和TR-909，强调了这些音乐更黑暗、更机械重复的一面。这就是早期的Techno，并基本奠定了以后Techno的框架。尽管这种音乐很“黑人”，但不少Detroit Techno制作人在多个不同场合表示，他们的目标是让电子乐只关乎音乐而不是种族。", "chapter": "Techno", "examples": ["Strings Of Life - Rhythim Is Rhythim【https://www.youtube.com/watch?v=rFQZndywOR4】"]}, "bleep techno": {"name": "Bleep Techno", "ups": ["Techno", "UK Techno"], "downs": ["Breakbeat Hardcore", "UK Garage", "Grime"], "aka": "Bleep、Bleep and Bass、Bleep & Bass", "related": "", "desc": "20世纪80年代末至90年代初在英国电子音乐场景中短暂兴起的Techno分支。特点为干脆利落的节奏（经典的44拍和Breakbeat的元素）和厚重的Sub-bass，结合标志性的“哔哔（Bleep）”声音，营造出极为科幻迷乱的氛围。Bleep Techno的热度在90年代后期大幅下跌，并迅速融入到英国本土百花齐放的各类电子音乐风格中，尤其是Breakbeat Hardcore。因此，Bleep Techno也被认为是现代英国电子音乐的重要源头之一，由其衍生或受其影响而发展的风格包括Classic Hardcore、House、Jungle、Drum and Bass、UK Garage、Grime等。", "chapter": "Techno", "examples": ["LFO (Leeds Warehouse Mix) - LFO [2:42起始]【https://www.youtube.com/watch?v=miT8XyMz5t4】"]}, "yorkshire bleeps & bass": {"name": "Yorkshire Bleeps & Bass", "ups": ["Bleep Techno"], "downs": ["Breakbeat", "Jungle"], "aka": "Yorkshire Bleep & Bass、Yorkshire Bleep and Bass、Yorkshire Techno、Yorkshire Bass", "related": "", "desc": "Yorkshire Bleeps & Bass是Bleep Techno在约克郡的一个短暂且相当本地化的音乐运动，以1989-1991年英国北部城市西约克郡的布拉德福德和利兹以及南约克郡的谢菲尔德为中心。声音的特点是刺耳、时髦的极简主义、破坏扬声器的低音和电子哔哔声或其他未来主义声音。这种风格也催生了后续的Breakbeat Hardcore声音和Jungle音乐等。", "chapter": "Techno", "examples": ["Testone - Sweet Exorcist [3:26起始]【https://www.youtube.com/watch?v=5KK5uLsSvV0】"]}, "belgian techno": {"name": "Belgian Techno", "ups": ["EBM", "Rave", "Bleep Techno", "Acid House", "Belgian New Beat etc."], "downs": ["J-Rave Techno"], "aka": "Rave Techno、Belgian Hardcore、Belgian Rave、Techno Rave、Bretter Tekkno", "related": "", "desc": "当你把New Beat、Bleep Techno、Post-Industrial、EBM、Acid House风格杂糅到一块，就诞生了这一流派。Belgian Techno的BPM常常在120BPM~140BPM之间，快速且残酷的节拍被形容为“世界末日般的夸张”，戏剧性的管弦乐、充满威胁性的合成器音色与神出鬼没的人声Sample是它的特征。Belgian Techno一经面世最先在比利时生长，因此被称为“Belgian Techno”。又因为这种风格传遍欧洲锐舞场景，在1991~1994年间极其流行，甚至登上了流行音乐排行榜，因此又被称作“Rave Techno”。但这种风格即便在1994年便无人问津，依然对后世曲风形成了极大的影响。", "chapter": "Techno", "examples": ["Das Boot - U96 [2:15起始]【https://www.youtube.com/watch?v=YVxXbTk-zsQ】"]}, "acid techno": {"name": "Acid Techno", "ups": ["Techno", "Acid House", "Rave Music"], "downs": [], "aka": "", "related": "", "desc": "Acid Techno从Acid House场景中发展而来（一说也是从German Trance中发展而来的），起源于英国，据说是由Richie Hawtin以他的小号（F.U.S.E.和Plastikman）的名义提出的。80年代末期的Acid House音乐在许多制作人的脑海中留下了深刻的印象，他们深受这种音乐的影响，于是在90年代初一些Techno制作人将Roland TB-303的音色运用到了Techno中，产生了一种更有活力的声音。尽管Acid不一定必须用在更“硬”的Techno才算Acid Techno，但许多Acid Techno都是“Hard Acid Techno”，许多艺术家还将旋律性更强的Acid Techno元素结合在了早期的Classic Trance中。303乐器的落后（与当时的产品相比）与其声音的局限性最终导致Acid Techno逐渐退出了历史的舞台，但这一流派打响了Techno的第二波浪潮，为后面Ambient Techno以及一系列的子分支的诞生奠定了基础。", "chapter": "Techno", "examples": ["I'm Not Alone (Thomas Schumacher Remix) - Calvin Harris / Thomas Schumacher [3:04起始]【https://www.youtube.com/watch?v=qDxioymAggg】"]}, "ambient techno": {"name": "Ambient Techno", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Techno分支） Ambient Dub （见Ethnic篇章的Dub分支）", "chapter": "Ambient", "examples": []}, "minimal techno": {"name": "Minimal Techno", "ups": ["Techno", "Minimalism"], "downs": ["Deep Techno", "Industrial Techno", "Schranz"], "aka": "", "related": "", "desc": "1990s初，所有电子音乐的节奏越来越快，听感越来越“狂野”，Gabbar的出现就是典型的例子。Robert Hood、Richie Hawtin、Daniel Bell等制作人决定反对这种浪潮，更加注重音乐原本的严肃性和艺术性，并融入极简主义，Minimal Techno就此诞生。“只有必不可少的东西。只有必要的东西才能让人们动起来。我开始把它看成一门科学，一门让人们动起来的艺术，与他们的心灵、思想和灵魂对话。这是一种发自内心的有节奏的Techno。”——Robert Hood如此评价道。", "chapter": "Techno", "examples": ["Contain - Plastikman【https://www.youtube.com/watch?v=Hj5DDvRz5Zc】"]}, "deep techno": {"name": "Deep Techno", "ups": ["Minimal Techno", "Deep House"], "downs": [], "aka": "", "related": "", "desc": "Deep Techno是Minimal Techno的一种形式，用来描述更注重低音部分、更突出深邃氛围的Techno的一个标签，将Deep House的深邃、深沉的听感也带入的Techno的作品中。曲目一般非常长，基本上可以说是同一段Loop的不断循环，过程中只有细微的变化，听起来非常催眠。尽管Techno与Deep House的表达形式不同，但两者的理念是几乎一致的——即祛除杂念，让灵魂接受音乐的洗礼。由于是一种并不正规的标签化叫法，近年来很多时候与Hypnotic/Minimal/Dark Techno等同时出现，作为形容一类“催眠”Techno音乐的标签。", "chapter": "Techno", "examples": ["Dread - YYS【https://www.youtube.com/watch?v=Oq7bQo1xSBU】"]}, "dub techno": {"name": "Dub Techno", "ups": ["Minimal Techno", "Dub"], "downs": ["Ambient Dub Techno", "Space Techno"], "aka": "", "related": "", "desc": "Dub Techno融合了Minimal Techno的元素和Dub的特点，使用回声、混响、相位器效果和其他声音处理等来表达深邃的氛围和丰富的质感。尽管在之前就已经有一些Dub Techno作品，但Basic Channel通常被认为是这一流派的先驱，并帮助确立了这一流派。Basic Channel创立了一个同名厂牌，发布了大量Dub Techno作品，对不少制作人产生了很大的影响。厂牌Basic Channel于1995年关闭，但随后又出现了一系列类似的厂牌。其中最重要的是Chain Reaction，帮助了Monolake、Porter Ricks等受Dub影响的Minimal Techno制作人开创了自己的事业。Basic Channel仍然是Techno界一支较为神秘的乐队，他们回避采访，公布的信息稀少，化名各异，并在90年代末退出了舞台。不久之后，许多主题相似、受其影响的制作人涌现出来，开始对Dub Techno的声音进行各种模仿与改进。最终，这一代人将“Basic Channel”的风格命名为“Dub Techno”，并继续大力宣传这一流派，将这种音乐延续到下一个十年。在过去的十年中，该流派中的许多人开始将越来越多的氛围音乐和Dub元素融合在了Dub Techno作品中，即“Ambient Dub Techno”。该流派其他几位有影响力的制作人包括Porter Ricks、Monolake、Pole、Deepchord、Vladislav Delay、Andy Stott等。", "chapter": "Techno", "examples": ["Summer Haze - Deepchord Presents Echospace【https://www.youtube.com/watch?v=zbzP1Zy3U7Q】"]}, "ambient dub techno": {"name": "Ambient Dub Techno", "ups": ["Dub Techno", "Ambient Dub"], "downs": [], "aka": "", "related": "", "desc": "Ambient Dub和Dub Techno的可以说是一种非常常见的融合，Dub Techno一直在向更Ambient、更Dub的领域扩展，经常放弃4 on the floor的Techno节拍，转而倾向于传统的Dub节奏模式。90年代，Basic Channel专门创建了一个项目“Rhythm & Sound”来探索更“Dub”的声音，通过单曲和EP的方式发行这种Techno。Chain Reaction厂牌上的其他艺术家也纷纷效仿，如Erosion（原名Torsten Pröfrock）、Monolake、Fluxion和Vladislav Delay，除此之外也有很多不属于此厂牌的制作人参与制作。接下来一代的Dub Techno艺术家接受了Basic Channel的基本形式，但进一步探索Dub的节奏和Ambient的质感，并取得了相当大的成功。尽管“Ambient Dub Techno”仍不是一个已经流行起来的术语，但不可否认的是Techno的这一趋势已十分明显，场景也在逐渐做大。", "chapter": "Techno", "examples": ["Rigning Einn - Yagya【https://www.youtube.com/watch?v=0E6U4ga9quI】", "Evocation - cv313"]}, "space techno": {"name": "Space Techno", "ups": ["Dub Techno", "Ambient", "Space Music"], "downs": [], "aka": "", "related": "", "desc": "Space Techno是一种将氛围音乐和Dub Techno元素结合起来的音乐类型，它将Basic Channel、cv313、Deepchord等制作人的层次丰富的Pad和独特的Bass结构，与Biosphere、GAS、Luigi Tozzi等制作人的灵性的声音设计和电影氛围感融合在一起。在早期的Detroit Techno中，各种“太空”主题的元素就已经十分常见，制作人Jeff Mills和厂牌Axis Records就是典型的例子。该流派的一些制作人（如Fluxion、Vainqueur）还在自己的作品中加入Acid、Electro和Industrial的元素，以增加实验性，但总体来说，Space Techno“恍若隔世”般的氛围仍然保持不变，让人感觉像是在奇特的地貌中漫步，在漆黑的月海中潜水，或是在星际介质中纵横驰骋。", "chapter": "Techno", "examples": ["Orbital Resonance - Conforce【https://www.youtube.com/watch?v=lKuLGypWNzA】"]}, "uk techno": {"name": "UK Techno", "ups": ["Techno", "Breakbeat", "IDM"], "downs": [], "aka": "", "related": "", "desc": "1992年，英国出现了Early Breakbeat、Hardcore，Drum & Bass等场景，此外还有受到Spiral Tribe、Tech House影响的Free Tekno等风格。除了这些独立的音乐风格，还有一系列被忽视的但仍然很重要的音乐历史。1992-1996年间，UK Techno音乐在这些各种各样的音乐场景中表现得尤为突出，但是这一场景最后并没有流行开来。UK Techno并没有固定的音乐形式，也不是一个知名的Techno子流派，但对地下音乐/Rave场景产生了重要的影响。UK Techno通常具有较高的能量，充满活力，并不断循环旋律，有明显的Rave元素/Breakbeat元素，甚至还能见到IDM的影响。", "chapter": "Techno", "examples": ["Lost - Luke Slater's 7th Plain【https://www.youtube.com/watch?v=ObsABskxyYw】"]}, "hi-tech jazz": {"name": "Hi-Tech Jazz", "ups": ["Techno", "Nu-Jazz"], "downs": [], "aka": "", "related": "", "desc": "爵士乐和Techno是两种截然不同的音乐风格。Techno是“理性”音乐，而爵士则是“感性”音乐，且有很多即兴创作。但这并不妨碍Techno制作人在他们的作品中尝试融合这两种风格。描述这些实验作品的一个术语是“Hi-Tech Jazz”，但与其说是一种流派，不如说是早期Techno艺术家（尤其是Mad Mike Banks、Carl Craig、Dave Angel）创作的一种Nu-Jazz形式，在此之前Herbie Hancock等艺术家也已经通过使用合成器和爵士乐进行了这两种音乐之间的早期实验，但在大多数情况下，人们对Hi-Tech Jazz的印象最深的还是那些在作品中融合爵士元素的现代Techno制作人的音乐。", "chapter": "Techno", "examples": ["Saturday Night - Cobblestone Jazz【https://www.youtube.com/watch?v=aLQ2IUBG8cw】"]}, "wonky techno": {"name": "Wonky Techno", "ups": ["Techno", "Experimental"], "downs": [], "aka": "Experimental Techno、The Brighton Sound", "related": "", "desc": "Wonky Techno是一个相对较新的术语，指的是90年代的一种Techno音乐风格，它打破了公式化的4/4节拍的结构，尝试新的节奏形式，以及各种各样实验性的且令人震惊的创新。这种音乐的声音通常是“失真的”、“Stutter的”、“破碎的”、“扭曲的”，可以是非常适合舞池的跳舞音乐，也可以是非常实验非常抽象的音乐。Wonky Techno一词来源于Jerome Hill，他在伦敦一家名为Trackheads的唱片店工作时，收集了类似听感的Techno并将它们标记为“Wonky”。苏格兰的Sativa俱乐部是Wonky艺术家的聚集地之一，但英国布莱顿也是重要的场景并且有着更多的制作人，因此布莱顿之声（The Brighton Sound）这一绰号被广泛使用。", "chapter": "Techno", "examples": ["Bite & Scratch - Cristian Vogel【https://www.youtube.com/watch?v=bu3tKyBWaQg】"]}, "leftfield techno": {"name": "Leftfield Techno", "ups": ["Techno"], "downs": [], "aka": "", "related": "", "desc": "类似于Leftfield House，Leftfield Techno鼓编常表现为对原本刻板的四四拍，做了围绕轴心或前或后的偏移(或表达为相对不规则的构成)，且有频繁的空拍错拍，Bass有经过多种扭曲/失真化处理（比如融入经典的电气元素Electro、Lofi低保真质感等），充满个性的另类的音效，BPM也可能不处于常态，可塑性强。", "chapter": "Techno", "examples": ["Catch a Break - Ghost in the Machine【https://www.youtube.com/watch?v=9uWevW-LApg】", "Evolve - YYS / I/O输入输出 [1:28起始]", "Sulfur Alchemy (Wisna Remix) - Root Noise", "Pária - NØRBAK", "Hypnosis - Saturne"]}, "dark techno": {"name": "Dark Techno", "ups": ["Italian Techno", "Dark Ambient", "Drone"], "downs": ["Industrial Techno"], "aka": "Drone Techno、Headfuck Techno", "related": "", "desc": "慕尼黑的Prologue Music是德国最著名的Techno厂牌之一，通过意大利制作人Donato Dozzy、Giorgio Gigli等发布的一系列令人惊叹、独具特色的作品而声名鹊起，延续了Italian Techno的独特“黑暗”传统，这一时期的其他厂牌也在发布更“黑暗”的声音。Sandwell District也是00年代后期最重要的Techno厂牌之一，它不仅是一个音乐厂牌，同时也是一个由Regis、Function、Silent Servant、Female等人组成的制作团体。在2006年至2011年，该厂牌专攻Techno音乐，既拓展、又挑战了00年代中期占主导地位的极简美学。与此同时，Dark Techno的亲戚Industrial Techno也以更“硬”更机械的声音逐渐崭露头角。Dark Techno与之不同的地方在于它的声音“幽闭而空旷”。Stroboscopic Artefacts、Zooloft Records，以及其他许多小型厂牌在2010年代初纷纷涌现，将这一新兴流派发扬光大。许多人将其称为“Dark Techno”，一些人将其称为“Drone Techno”，而少数人则将其称为“Headfuck Techno”。Dark Techno是一场大规模的地下运动的一部分，旨在反对Minimal和商业化的Techno音乐。这种风格在意大利、德国、英国等地区都获得了不少关注、积极的讨论和支持。", "chapter": "Techno", "examples": ["Ninio (Henning Baer Rework) - Sawf【https://www.youtube.com/watch?v=hv_SfdCWW3g】", "Frequency One (Ness Remix) - Alessio Pili"]}, "industrial techno": {"name": "Industrial Techno", "ups": ["Dark Techno", "Dub Techno", "Minimal Techno", "Post-Industrial"], "downs": ["Birmingham Sound"], "aka": "", "related": "", "desc": "Industrial Techno是一种更“硬”、更黑暗的Techno音乐风格，发源于20世纪90年代，由Techno乐队Final Cut在1989年的专辑《Deep into the Cut》定义。与工业音乐一样，强调类似于工厂、机械的声音，融合了早期Industrial音乐中凄凉、嘈杂的声音和美学的影响，也经常融入Minimal Techno循环结构的元素和Dub Techno回响效果的元素。相关厂牌包括Downwards、Tresor、Sandwell District、Perc Trax、Blackest Ever Black。这种风格最初被称为“Birmingham Sound of Techno”，由Downwards厂牌以及Regis、Surgeon等制作人引领，最终组成了这一流派的代表组合British Murder Boys。从那时起，这一音乐流派的范围不断扩大，来自伯明翰和英国以外的制作人也层出不穷。在10年代初，Industrial Techno迎来了一波复兴，许多新的活力和制作人加入其中。", "chapter": "Techno", "examples": ["The Goose - Ansome / Ossian【https://www.youtube.com/watch?v=m0JuU-PWQio】", "Pedal To The Metal - Ansome"]}, "birmingham sound": {"name": "Birmingham Sound", "ups": ["Industrial Techno", "Post-Industrial", "Synth-pop"], "downs": [], "aka": "Birmingham Techno", "related": "", "desc": "Birmingham Sound是Industrial Techno的第一个明确的分支，也被视为Industrial Techno的前体。Birmingham Sound被认为是第一种将Techno从高级感中剥离出来的曲风，但并没有一般Industrial Techno中更吵闹更刺耳的元素，相比之下更加绵密、Trancy。该风格诞生于英国伯明翰的派对场景，深受1980s英国Synth-pop和Post-Punk影响，其杂乱的打击乐声音则可能来自英国的Tribe（见HDM篇章Tekno部分）音乐影响。代表音乐人有：Surgeon、Regis、Female等。", "chapter": "Techno", "examples": ["Body Unknown - Regis【https://www.youtube.com/watch?v=IB5qxZa8C0M】"]}, "tbm": {"name": "TBM", "ups": ["EBM", "Industrial Techno"], "downs": ["Italo Body Disco"], "aka": "Techno Body Music", "related": "", "desc": "顾名思义，Techno Body Music是Techno（尤其是Industrial Techno）和Electronic Body Music的交叉产物。通常情况下，Techno Body Music没有Vocal，它融合了EBM特有的错落有致的低音和Techno的重复性歌曲结构。上世纪90年代末，欧洲的一些电子乐制作人开始在他们的音乐中融入EBM的元素。这种趋势与新兴的电子碰撞场景同时发展，随着该场景开始衰落，与之有部分关联的艺术家，如The Hacker、DJ Hell、Green Velvet、Black Strobe和David Carretta，也开始转向这种Techno/EBM跨界风格。10年代末，由于Phase Fatale在Berghain俱乐部的驻场演出，以及aufnahme + wiedergabe等当地厂牌的出现，这一流派在柏林Techno界炙手可热。", "chapter": "Industrial Music", "examples": ["4 Floors of Whores - Tzusing【https://www.youtube.com/watch?v=vbUpuv8_fQE】"]}, "hard techno": {"name": "Hard Techno", "ups": ["Hardcore Techno", "New Beat"], "downs": ["Schranz"], "aka": "", "related": "", "desc": "Hard Techno是Techno的一种形式，1990s末在Schranz运动的推动下诞生，其特点是突出的Hard Kick，BPM通常在140-160左右，声音通常失真，具有很强的侵略性。Hard Techno的起源可以追溯到20世纪90年代早期的Acid Techno和Belgian Techno场景，这些流派中标志性的合成器音色在Hard Techno中也很常见。The Mover等Techno制作人会提高当时Techno作品的节奏（虽然说是提高节奏但当时通常不超过130BPM），并加入更重、更失真的鼓和合成器。这种声音在当时也常被称为“Hardcore Techno”，在西欧国家得到发展和普及，主要集中在Rave派对上。早期的Hardcore Techno音乐也很快演变成速度更快的Gabber，并向Hardcore[EDM]的方向继续发展，而Hardcore Techno的另一种声音便变成了Hard Techno。随着Freetekno和Hardcore的进一步发展，20世纪90年代中后期，Schranz在Hard Techno/Hardcore Techno场景中开始崛起。", "chapter": "Techno", "examples": ["She Wants You To Go Harder - Kozlov【https://www.youtube.com/watch?v=xJHKRH5hoQk】", "ACID DROP - Jon Connor"]}, "hard acid": {"name": "Hard Acid", "ups": ["Acid Trance", "Hard Acid Techno"], "downs": ["German Trance", "NRG", "Freefrom Hardcore", "Acidcore", "Goa Trance"], "aka": "", "related": "", "desc": "Hard Acid最早的形式为Techno，后续影响产生了Trance的形式，仍然强调对Roland TB-303机的酸性音色，附有强硬并带有侵略性的kick，BPM150左右。这种特殊的Acid声音后续影响了众多流派，与Psy Trance和HDM都有所交集。", "chapter": "Trance", "examples": ["Sandstorm - Darude"]}, "schranz": {"name": "Schranz", "ups": ["Hard Techno", "Minimal Techno"], "downs": [], "aka": "Schranz Techno、Schranz Hardtechno", "related": "", "desc": "诞生于1990s末的德国，关于“Schranz”这个术语众说纷纭：有观点认为其来自德国俗语“Schranzen”，意为在吃东西的过程中发出很多噪音；也有观点认为其是由“Schrei”和“Tanz”两个词组合而成，分别代表了“尖叫”和“舞蹈”。但基本认为是德国DJ Chris Liebing提出了这一名词。Schranz的BPM会很快，如今BPM基本处于150~170之间，不是很强调旋律，结构直接并简约。标志性音色包括失真的909底鼓和有“嗖嗖”声的Cymbal。是Hard Techno主力军，侵略性强，充满暗黑元素。Schranz在日本也广泛传播，siromaru是代表制作人。", "chapter": "Techno", "examples": ["Basic Branch - SveTec【https://www.youtube.com/watch?v=PnDT9kOLleA】"]}, "j-schranz": {"name": "J-Schranz", "ups": ["Schranz", "J-core"], "downs": [], "aka": "Schranzcore", "related": "", "desc": "J-Schranz是近年来在日本产生的Schranz本土化标签。J-Schranz保留了Schranz的强烈侵略性和失真音色，以及特色的Cymbal音色。但是在此基础上，日本制作人做出了一些改变，在结构上按照J-core的结构编排，将BPM提到180BPM上下，使其听起来更像Hardcore而非Techno。J-Schranz一般会加入大量来路不明的恐怖Vocal和轰响的Hoover音色，以及伊始至终贯彻整曲的Rave旋律。有些J-Schranz会干脆将Hardcore做成Techno的形式，这种情况也被称为J-Schranz，因此实际上J-Schranz与HDM之间的界限相当模糊。", "chapter": "Techno", "examples": ["Sunny & Regen - Shirasawa.A / C9【https://www.youtube.com/watch?v=2QDmMeEOiQM】"]}, "future techno": {"name": "Future Techno", "ups": ["Techno", "Electro House"], "downs": [], "aka": "", "related": "", "desc": "Future Techno指的是Electro House受到Techno的影响后产生的一种变体，它保留了这两种音乐共用的“重复性”的特征，但比Techno少，比Electro House多。保留了Electro House的元素，但旋律性上要差得多，音乐整体上来说通常也暗淡得多。BPM通常介于122~132之间，并以电气感的音色、Acid音色和其他模拟音色为特色。这种音乐还经常大量融合嘻哈元素，具有相当强的节奏感。该流派始于2010年代初，2012年，Bad Life的《Future Techno 1 VA》合辑为该流派正式命名并得到认可。Future Techno是一种相对小众的音乐流派，因此在这一领域只有几家唱片公司在发行这种音乐：GND Records、Bad Life、Lektroluv。其他厂牌如Turbo、Blood Music和Boys Noize Recordings也有该类型的唱片发行，但都不太突出。", "chapter": "Techno", "examples": ["Realness - Madame【https://www.youtube.com/watch?v=1XUCJyveFu8】", "UFO 61 - Sovnger x Lazy Flow"]}, "hardgroove": {"name": "Hardgroove", "ups": ["Techno", "Tech House", "Tribal House"], "downs": [], "aka": "Hard Groove、Tribal Techno、Hardgroove Techno", "related": "", "desc": "Hardgroove Techno是20世纪90年代中期兴起的一种Techno风格，在21世纪初达到人气巅峰。Hardgroove最显著的特点是使用充满律动感的Percussion，节奏通常是密集的、多层次的，并经常采样实录打击乐。由于Hardgroove的打击乐部分听起来更接近于House的感觉，而不是Detroit Techno、Acid Techno等老式Techno中更为“朴素”的鼓机Percussion，因此这种风格通常被视为Tech House的一种更快、更黑暗的变体。与这一时期的大多数其他俱乐部导向型Techno一样但与House不同的是，Hardgroove通常抛弃了华丽的Pad，将重点放在旋律上。由于Hardgroove的许多曲目都采样了地区化音乐（非洲音乐、西班牙裔美国音乐、巴西音乐等）的人声和打击乐，因此这一流派常被描述为“Tribal”或“桑巴风格”。Hardgroove大多在欧洲大陆被制作，因此其制作人很少有意识地从自己或特定的传统文化中汲取灵感，而是更倾向于从“世界音乐”中采样。Jeff Mills、Dave Angel是这一流派最早的先驱，Max Walder、Adam Beyer、Mark Broom、Ben Sims、Umek等制作人是这一流派在2000年代早期至中期鼎盛时期的知名制作人。", "chapter": "Techno", "examples": ["One More - Alarico【https://www.youtube.com/watch?v=sbJvNW6vFG0】"]}, "psy techno": {"name": "Psy Techno", "ups": ["Psy Trance", "Techno"], "downs": [], "aka": "", "related": "", "desc": "Psy Trance和Techno的融合，不过不难察觉到，这种类型并不是简单生硬的嫁接，而是把两者在构型、音色、BPM等多方面做了中和，细品挺微妙的。而且只有少数Goa Trance/Psy-Trance或Techno制作人在涉猎于此，这也是其冷门但保持着较高的技术水准，没有很多像Psy-Trance或Techno中许多“塑料制品”，目前它强调硬件加持的制作，合成器、鼓机等听感是非常真实的。", "chapter": "Techno", "examples": ["Trick or Tech - Egomorph【https://www.youtube.com/watch?v=HY8lM60oA0Y】"]}, "hypnotic techno": {"name": "Hypnotic Techno", "ups": ["Minimal Techno", "Dark Techno", "Dub Techno"], "downs": [], "aka": "", "related": "", "desc": "Hypnotic Techno不仅代表了现在的一场Techno热潮，还代表了90年代末的以前的一场Techno运动。目前这种音乐资料来源很少，但在Reddit、Discord和很多制作人都在用这个词来描述他们的音乐，与其他Techno流派不同，这个社区有着很多女性制作人。Hypnotic Techno与Minimal/Dark Techno不尽相同，但也比较相似，这是一种地下电子音乐，是一种催眠、富有氛围感的Techno类型。Hypnotic Techno起源于底特律和Säcko的极简主义作品，后来经过Basic Channel等制作人的筛选，变成了一种更加氛围化的音乐。“催眠”基本上是通过不断重复的旋律段来实现的，整体结构基本上就是深沉、厚重的鼓组上“飘”着大气质感的Pad/旋律，鼓组比较Minimal，不会有过多抢戏的Percussion/Hi-Hats，以保证能持续让人沉浸其中。", "chapter": "Techno", "examples": ["Sole Star - Polar Inertia【https://www.youtube.com/watch?v=nv2b3zwKWXo】", "Catarsi - Loris Grimaldi"]}, "peak time techno": {"name": "Peak Time Techno", "ups": ["Techno", "Electronic Dance Music"], "downs": [], "aka": "Peak-Time Techno", "related": "", "desc": "2010年代中期诞生的Techno子分支，脱离于主要围绕着Minimal Techno/Tech House的欧洲Techno场景，并在2010年代后期成为Techno最受欢迎的子风格之一。特点是更硬、更高能量的Techno声音，更面向现代与大众，是传统Techno向EDM舞台转型的一个标志性产物，吸收了各种EDM元素，如Trance、Hard Dance、Big Room等，主要BPM在125~135，又重又硬的（有时类似Hard Techno）的底鼓不断重复，相比于传统Techno多了一些Groove感，Bass肥厚又黑暗，还经常用黑暗的、低音调的合成器音色，不注重旋律或只使用简单的旋律，突出大混响、音色的压缩和白噪的使用。制作人：Charlotte de Witte、Spektre、Adam Bayer、A*S*Y*S、T78、HI-LO。", "chapter": "Techno", "examples": ["Rave Is Your Party - T78 / Max Jam【https://www.youtube.com/watch?v=6q_RYSZCEa4】"]}, "edm techno": {"name": "EDM Techno", "ups": ["Techno", "Electronic Dance Music"], "downs": ["Rave Room"], "aka": "", "related": "Bouncy Techno、Bigroom Techno", "desc": "", "chapter": "Techno", "examples": ["The Rave - Maddix【https://www.youtube.com/watch?v=ans88z-WLEo】"]}, "rave room": {"name": "Rave Room", "ups": ["EDM Techno", "EDM House"], "downs": [], "aka": "", "related": "", "desc": "Rave Room是英国EDM制作人Olly James开发的一种新式EDM Techno分支，融合了Future Rave、Hard Trance、Hard Bounce等主流EDM风格影响，并以这些风格为主要组分，以EDM Techno的名义发布，旨在“恢复经典Rave氛围”。歌曲一般充满活力且欢乐，但是一般情况下这类音乐比EDM Techno更商业化，且某种意义上已经丧失了Techno的特征，听起来更像Hard Acid Trance或Hard Bounce。", "chapter": "Techno", "examples": ["Techno On My Mind - Olly James【https://www.youtube.com/watch?v=2zVpJuMLzWE】"]}, "classic trance": {"name": "Classic Trance", "ups": ["House", "Techno", "EBM", "Classical"], "downs": ["Tech Trance", "Acid Trance", "Progressive Trance"], "aka": "", "related": "", "desc": "Trance首次作为一个术语是出现在爵士乐当中，这时期仅仅表达的是一种音乐感觉，阐述作品能够带给人十分轻盈、迷幻、出神的感觉。德国DJ Klaus Schulze发表的EP被视为是确立了电子领域概念的“Trance”名称。早期的Trance被认为是融合了House和Techno的一种更加旋律化的分支，在发展的过程中又吸收了Pop、Chillout、氛围、古典、电影配乐等多种音乐的元素，使得在早期基础之上变得更加多元化，并在1990年代之后成为独立且特点显著的电子音乐类型。BPM通常在128至140BPM之间，4/4拍，注重旋律、和声来营造长时间的出神氛围的一种音乐形式。90年代末期，Trance迎来全盛时代，成为世纪之交电子舞曲的“领头羊”。随后内部流派不断细分，最原始的Classic Trance也难觅踪迹了。", "chapter": "Trance", "examples": ["Flaming June - BT"]}, "acid trance": {"name": "Acid Trance", "ups": ["Trance", "Acid House"], "downs": ["Hard Acid Trance"], "aka": "", "related": "", "desc": "Acid Trance是第一波Trance浪潮的最初分支之一，20世纪90年代初在欧洲地区大受欢迎，尤其是在德国和比利时。Acid Trance保持了Acid House的基调和迷幻元素，并与Trance不断发展的结构相结合，在时间上基本与Acid Techno同时诞生。303 Bass的调制是Acid Trance的一个重要元素，这赋予了这一流派自己的音色、旋律与氛围，而经典Trance的旋律则较为平缓，而且通常是琶音写法。自90年代中期以来，该流派的流行度开始下降，到2000s的时候就很少人做了。但却对未来的其他Trance子流派产生了强大的影响，Goa Trance和Psytrance就是其中的代表，前者继承了Acid Trance的Acid元素，并加入了更多不拘一格的采样和乐器，而Psytrance则进一步贯彻了极简主义的循环重复和超现实主义的听感。Hard Trance也经常使用了这一流派的Acid音色，并通常加以失真，使其听起来更加欢快、更有能量。", "chapter": "Trance", "examples": ["Plasma - Radiotrance"]}, "vocal trance": {"name": "Vocal Trance", "ups": ["Trance", "Pop"], "downs": [], "aka": "", "related": "", "desc": "Vocal Trance是20世纪90年代初出现的一种Trance音乐形式，侧重于人声的表现。虽然很多经典Trance也可以有人声，但Vocal Trance在整体结构上通常更偏向流行歌曲，如偏向流行的旋律和和声等。到2000年代，Vocal Trance在欧洲国家已经非常流行，因为Vocal Trance将流行元素带入了Trance领域中，主唱大多为女性，有些作品已成为Trance的代表作。相比于Euro-Trance、Hands Up等其他Trance流派，Vocal Trance基本上没有受到Happy Hardcore、Eurodance的影响，保留了Trance的特有的饱和感与过载感，避免了这两种流派中较为“俗气”、“无脑”的声音，并保持在了Trance的定义范围内，减少了流派的交叉。", "chapter": "Trance", "examples": ["Sanctuary - Gareth Emery feat. Lucy Saunders"]}, "ambient trance": {"name": "Ambient Trance", "ups": ["Ambient", "Trance"], "downs": ["NEO-Trance"], "aka": "", "related": "", "desc": "Ambient Trance以放松、内省的主题将Trance特有的多层谐波和琶音合成器声音应用到氛围音乐中，通常使用比Trance慢得多的节奏，用更悠闲的节拍代替紧凑的4/4鼓模式，或完全不使用鼓。它大约与从各种风格的降速电子舞曲演变而来的类似氛围的流派比如Ambient House、Ambient Techno和Ambient Dub等一起出现，在音乐形式上与Dream Trance、Ibiza Trance、Progressive Breaks和Psybient非常相似。它们之间的显著差异主要与声音表达的氛围有关。Ambient Trance更关注细节，虽然还保留了Ibiza Trance的一些特征，但Ambient Trance更倾向于Ambient。最开始的Ambient Trance便是在氛围音乐中加入类似Trance的音序器、琶音，以制作一种更迷幻的氛围音乐，这一时期的作品直接影响了很多Downtempo、Chillout的音乐形式，并使它成为了NEO-Trance的根基之一。后来很多前卫Trance制作人也无意间制作了更现代的Ambient Trance形式，一般来说便是保持Uplifting Trance、Progressive Trance的结构但完全去掉鼓。", "chapter": "Ambient", "examples": ["Sun in Your Eyes - Above & Beyond"]}, "ibiza trance": {"name": "Ibiza Trance", "ups": ["Trance", "Balearic Beat"], "downs": ["Dream Trance"], "aka": "Balearic Trance", "related": "", "desc": "Ibiza Trance是一种电子舞曲流派，由Balearic Beat演变而来。Ibiza Trance的主要作品可追溯到上世纪90年代，也就是Balearic Beat出现几年之后，这种流派与Balearic Beat一样，保持了Ibiza原生的“Balearic”味道，但这种流派结合了Trance的节拍，BPM通常在125-135。与传统的Trance相比，Ibiza Trance通常没有那么强烈的过载感，而是更加放松，通常带有氛围化的前奏、许多Breakdown，侧重于旋律的表达，大量使用钢琴、弦乐器等原声乐器的演奏。Ibiza Trance以西班牙为发展中心，通常表现出很多拉丁风情和氛围，这使得该流派在许多方面与Dream Trance比较相似。伊比萨岛在舞曲历史上一直占有重要地位，是许多英国/欧洲游客及DJ的度假胜地，因为它与Trance音乐和Downtempo有着重要的联系，在Trance方面，伊比萨岛将这两种元素结合在一起，然后便成为了向全世界推出更前卫、更振奋人心的Trance音乐的主要地域。", "chapter": "Trance", "examples": ["Halcyon - Chicane"]}, "dream trance": {"name": "Dream Trance", "ups": ["Ibiza Trance", "House"], "downs": [], "aka": "Dream Dance、Dream House", "related": "", "desc": "早期Trance音乐的亚流派之一，特点是坚实的Trance鼓组和梦幻般的氛围，作曲时常常会加入大量钢琴元素，也正因如此，这类风格有很多出圈的名作。据传起源为Robert Miles为减少90年代初意大利夜店文化的发展所导致的高交通事故率（“Strage del Sabato Sera”即“星期六晚上的屠杀”）而在演出后播放慢节奏、平静的曲目。节奏型比较简单，拥有类似House的渐进感，在某些场合也常被称为Dream House或者Dream Dance。", "chapter": "Trance", "examples": ["X-Files (DJ Dado Paranormal Activity Mix) - DJ Dado"]}, "euro trance": {"name": "Euro Trance", "ups": ["Ibiza Trance", "Eurodance"], "downs": ["Hard Trance", "Hands Up"], "aka": "Euro-Trance、Eurotrance", "related": "", "desc": "Ibiza Trance融入Hard与Eurodance元素后的产物，最初作为Trance和Euro Dance的混合体出现，在90年代末到00年代初的世纪之交颇为流行。Euro Trance的BPM在130至140之间上下浮动，常常采用明亮的合成器音色，Drop相当明显，多数Euro Trance采用女声，具有典型的欧陆舞曲风味，并且影响了早期UK Hardcore的声音。Euro Trance和Hands Up听起来有相似之处，常常被混为一谈。实际上Hands Up的Bass和Kick更加厚重，而Euro Trance的曲调更轻快。", "chapter": "Trance", "examples": ["Ligaya - Gouryella"]}, "tech trance": {"name": "Tech Trance", "ups": ["Trance", "Techno"], "downs": ["Techlifting Trance"], "aka": "", "related": "", "desc": "起源于90年代中期的德国。在1990s至2000s前期，Tech Trance是由Techno结构辅以Trance元素组成的。而在2000s-2010s期间，Tech Trance迎来了商业化发展。响亮的Kick、强硬的Hi-Hats和简单粗犷的旋律，在135-145的
