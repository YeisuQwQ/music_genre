素。几乎所有电声音乐的化身，无论是早期的学术音乐还是近期的地下音乐，其风格都更注重运用抽象的声音创作“创造性”的质感，而并不关注歌曲结构或旋律。", "chapter": "早期流派/手法/理念", "examples": ["Roland Kayn - Rosonic【专辑：A Little Electronic Milky Way of Sound】【https://www.youtube.com/watch?v=3G0MBiTkSe4&t=1s】", "Philomel - Milton Babbit"]}, "eai": {"name": "EAI", "ups": ["Electroacoustic Music", "Free Improvisation", "Experimental Jazz"], "downs": ["Livetronica"], "aka": "Electroacoustic Improvisation、Electroacoustic Imoprov", "related": "", "desc": "EAI（Electroacoustic Improvisation的缩写，即电声即兴）的定义相当宽泛，但大多数作品都以安静、缓慢、极简的质感为特征，通常用电脑处理的非传统乐器（如模拟吉他等模拟乐器）来创作曲子。EAI在一定程度上受到自由即兴传统的影响，但淡化了其中与前卫爵士/实验爵士相关的元素与理念。对这一流派产生影响的有电子音乐（例如Noise、Drone）和电声音乐、美国实验作曲家John Cage、Morton Feldman和David Tudor的音乐、Pierre Schaeffer的具象音乐以及Helmut Lachenmann所谓的器乐具象音乐（Instrumental Musique concrète）等。英国自由即兴团体AMM，尤其是他们的吉他手Keith Rowe，为当代EAI的发展做出了贡献。该流派的独特性让它难以发展、难以进入主流，但在全球都具有EAI的狂热爱好者。", "chapter": "早期流派/手法/理念", "examples": ["Balcony II - Toshimaru Nakamura / Ken Ikeda / Tomoyoshi Date【专辑：Green Heights】【https://www.youtube.com/watch?v=qdCNioLBQLU】"]}, "musique concrète": {"name": "Musique concrète", "ups": ["Electroacoustic Music", "Classical Music", "Avant-Garde"], "downs": ["Tape Music"], "aka": "Concrete Music", "related": "", "desc": "具象音乐又名具体音乐，1948年由法国的Pierre Schaeffer提出，他公演的第一部具象音乐作品是《Etude aux Chemins de Fer》。具象音乐是电声音乐的分支，而电声音乐本身来源于古典音乐的发展，所以也可以认为具象音乐是广义古典音乐（严肃音乐：Classic Music/Serious Music）的分支。具象音乐就是直接对采录到的自然中已有的具体声响借助电子手段进行剪切、变速、横向叠加、倒放等处理来创作的音乐。具象音乐的创作，就是将来源各异的录音以创造性的后期制作技术，调变出传统乐器所不可能表现的音乐。这种录音强调声音的抽象造形性，其方法与造型艺术的几何构成、拼贴手法相似，同时远离了勋伯格的十二音列理论。艺术家有Pierre Schaeffer，Pierre Henry，Ivo Malec，François Bayle，Jonathan Prager，Bernard Parmegiani，Francis Dhomont，Michel Chion。", "chapter": "早期流派/手法/理念", "examples": ["Gesang der Jünglinge - Karlheinz Stockhausen / Studio für elektronische Musik des Westdeutschen Rundfunks, Köln【https://www.youtube.com/watch?v=nffOJXcJCDg】（9：23开始，电平升5dB）"]}, "tape music": {"name": "Tape Music", "ups": ["Musique concrète", "Experimental"], "downs": [], "aka": "", "related": "", "desc": "磁带音乐，磁带的发明给实验音乐领域带来了新的可能性，如具象音乐、电声音乐和声音拼贴。音乐家在磁带上捕捉录制的声音、乐器演奏的录音和合成的声音，以此来呈现新的原声乐曲，作曲家也可以使用电声音乐特有的方法来处理声音，一些作曲家（如Steve Reich和William Basinski）将其与极简主义结合在一起。", "chapter": "早期流派/手法/理念", "examples": ["Revolution 9 - The Beatles【https://www.youtube.com/watch?v=WgpfpyfaNKY】"]}, "early electronic": {"name": "Early Electronic", "ups": [], "downs": ["Electronic Classical Music", "Moogsploitation"], "aka": "", "related": "", "desc": "主要用来描述50-60年代的早期电子音乐，当时电子音乐还远未被大众了解。这些音乐使用了当时最先进的技术，包括艺术家自己制作的一些设备和电子乐器。这些音乐在当时都算是前卫音乐，个别音乐还在特定流派（如具象音乐、磁带音乐和电声音乐）中占有较大比重。大多数参与其中的音乐家都有创作古典音乐的背景，并曾参与过许多其他流派的音乐创作。", "chapter": "早期流派/手法/理念", "examples": ["Silver apples of the Moon - Morton Subotnick【https://www.youtube.com/watch?v=EelvKqhu1M4】"]}, "electronic classical music": {"name": "Electronic Classical Music", "ups": ["Early Electronic"], "downs": ["Moogsploitation"], "aka": "", "related": "", "desc": "1968年，在制作人Rachel Elkind的帮助下，Wendy Carlos发行了专辑《Switched-On Bach》，在这张专辑中，她使用Moog模块合成器演奏了巴赫的音乐片段。Wendy Carlos的这一杰作让公众认识了Moog合成器，显示了这种音色的灵活性，并为使用合成器演奏电子音乐奠定了基础。70年代初，日本人富田功雄接触到Wendy Carlos和Robert Moog的开创性作品，激发了他对合成古典音乐的兴趣。富田功雄将他对Space-Age合成器音乐的憧憬应用于他喜爱的现代作曲家德彪西、斯特拉文斯基和拉威尔的作品中。他的第一张专辑，1974年的《Snowflakes Are Dancing》甚至受到了美国古典音乐听众的喜爱，并获得了四项格莱美奖提名，接连推出的专辑也为20世纪70年代的古典与合成器融合热潮注入了真正激动人心的未来主义音乐。这是一个辉煌而短暂的时刻，电子音乐和古典音乐在这一时刻结合在一起并大受欢迎，这一场景也催生了更广为人知的“Moogsploitation”场景。电子古典音乐往往削弱了这些古典音乐/先锋作品的严肃性，与古典音乐本身并没有什么关系。", "chapter": "早期流派/手法/理念", "examples": ["Sinfonia to Cantata No. 29 - Wendy Carlos【专辑：Switched-On Bach】【https://www.youtube.com/watch?v=gz9hUPTjnI0】"]}, "moogsploitation": {"name": "Moogsploitation", "ups": ["Early Electronic", "Electronic Classical Music", "Electroacoustic Music", "Cinematic Music"], "downs": ["Synth-pop", "Space Age Pop"], "aka": "The Moog Era、Moog Music、Switched-On", "related": "", "desc": "Moogsploitation指的是世界上第一台商用合成器Moog所创造的电子音乐，以及1968年Wendy Carlos的《Switched-On Bach》使这一乐器流行起来之后所引发的热潮。Robert Moog于1964年首次推出了他的同名合成器，这种复杂的装置展示了一套独特的原始模拟音色，这种音色一般被描述为“饱满”、“丰富”、“肥厚”、“深沉”的。在Moog进入主流文化之后，20世纪60年代末至70年代出现了一波电子唱片浪潮“Novelty”，一些电子音乐人将Moog的独特音色与流行的旋律相融合，这一场景先于Synth-pop出现，并经常与Space Age Pop和其他Easy Listening风格重叠。其中最著名的例子包括Jean-Jacques Perrey的《The Amazing New Electronic Pop Sound of Jean Jacques Perrey》、Bruce Haack的《The Electric Lucifer》和Gershon Kingsley的《Music to Moog By》。与此同时，Moog也开始被用于电子音乐以外的领域。在20世纪60年代末，它曾出现在披头士、The Monkees和The Doors等多位流行/摇滚乐队的作品中。1970年，便携性更强的Minimoog面世，它成为了Yes、Emerson, Lake & Palmer等前卫摇滚乐队的主打产品，并在爵士乐和后来的迪斯科舞曲中得到广泛应用。70年代后，随着数字合成器和MIDI技术的发明，Moog音乐时代宣告结束。此后，Moog通常被用作一种流行的复古美学，90年代，一些Space Age Pop Revival和Downtempo乐队经常在其作品中使用模拟Moog音色。", "chapter": "早期流派/手法/理念", "examples": ["Popcorn - Gershon Kingsley【https://www.youtube.com/watch?v=OSRCemf2JHc】"]}, "soundscape": {"name": "Soundscape", "ups": ["Modern Classical", "Nature Sounds", "Experimental"], "downs": ["Biomusic", "Soundscape Ambient", "Botanica"], "aka": "", "related": "", "desc": "加拿大作曲家、环境学家R. Murray Schafer于20世纪60年代首次提出了“Soundscape”的概念，用来描述声学环境。自20世纪初作曲家们开始在作品中探索更多的声音以来，音景的概念一直是音乐不可或缺的一部分。从实验音乐、前卫音乐到电影配乐、流行音乐，音景的概念无处不在。这一术语一般指音乐中描绘的场景，在很多Ambient/Dark Ambient、Drone、Field Recordings中都会使用这一词汇，在当今的很多流行音乐也会使用音景来“讲述故事”。现如今部分Soundscape也从原本完全作为一种“概念”，变成了广义氛围乐的一种音乐。", "chapter": "早期流派/手法/理念", "examples": ["Fitter Happier - Radiohead【https://www.youtube.com/watch?v=8EoukRWQ-ec】"]}, "biomusic": {"name": "Biomusic", "ups": ["Soundscape", "Experimental"], "downs": ["Animal Sounds", "Birdsong", "Whale Song"], "aka": "", "related": "", "desc": "Biomusic是一种实验音乐形式，涉及由非人类创造或演奏的声音。该定义有时也扩展到包括人类直接以生物方式创造的声音，例如由作曲家的脑电波创作的音乐也可称为Biomusic，由人体在不使用工具或不属于人体的乐器的情况下创作的音乐也可称为Biomusic（歌唱或发声通常不在此定义范围内）。Biomusic可分为两个基本类别：完全由动物（或在某些情况下由植物）创作的音乐，以及基于动物声音但由人类作曲家编曲的音乐。有些音乐形式使用录制的自然声音作为音乐的一部分，例如New Age使用自然声音作为音景、氛围音乐有时使用混响和延时改良的Nature Sounds等。Biomusic还有许多其他意想不到的形式，比如通过植物的电流波动创造音乐，甚至使用动物记谱法：通常采用爪印的形式由动物创作乐谱。Biomusic还可以采取训练动物的形式，让它们在音乐表演中做出特定行为（例如训练鸟类唱歌）。", "chapter": "早期流派/手法/理念", "examples": ["Portable Gold and Philosophers' Stones - David Rosenboom【https://www.youtube.com/watch?v=5syRo9oluGE】"]}, "experimental": {"name": "Experimental", "ups": ["Avant-Garde Music", "Electroacoustic Music"], "downs": ["Minimalism", "Field Recordings"], "aka": "", "related": "", "desc": "实验音乐，1950s诞生/开始流行，更加极端地追求听感上的“新鲜感”、“创新感”，传统歌曲结构、组成部分、甚至存在形式如若有必要都需要给“新鲜感”让步，是一种痴迷于“做实验”的音乐。所谓实验性就是“音色到编排都是非同寻常的”，好的实验音乐满足的是好奇心，而不是耳朵。实验音乐存在的目的不在于好听，而是探索声音的边界，欣赏的也是这种对声音的探索。实验音乐更多的是听取音乐人对声音的探索，包括音色、采样、拼贴手法，听众一般不太会去考虑它们的音乐性在哪，或者说很少会去完整的当做一首歌去听，而是更加切片式的段落感受。制作人有EPROM、Lee Gamble、Bleep Bloop、Squarepusher、Alva Noto+Ryuichi Sakamoto、MYO、Caterina Barbieri。实验音乐包括实验电子，这里就不单独开一个实验电子的词条了。", "chapter": "早期流派/手法/理念", "examples": ["VI Scose Poise - Autechre【https://www.youtube.com/watch?v=29LCBNipLcI】"]}, "field recordings": {"name": "Field Recordings", "ups": ["Experimental"], "downs": ["Radip Broadcast Recordings", "Nature Recordings", "Biomusic"], "aka": "Phonography", "related": "", "desc": "表示一种录制传统音乐之外的发声现象的作曲理论，通常来源于自然界和人为来源，目的一般有记录动物声音用于教育，或者用作放松的背景音乐、营造氛围等。第一个开始实施这种理论的人是野生动物录音师Ludwig Koch（1889年），但在20世纪中期，就有“现场录音师”利用他们的录音创作作品的例子。但Field Recordings作为一种流派，通常只是捕捉简单、自然和复杂的环境噪音，因此，现场录音师的要求往往突破了录音设备的技术极限，于是很多录音师选择使用专业而便携式的录音技术来改进并扩大了这一类型的录音技术及其成果。Field Recordings的概念如今已变得模糊不清，许多艺术家都在进一步改变这一流派的声音（将其用作采样，并添加人造元素，从而被认为是Field Recordings）。如今，Field Recordings经常被用于Tribal Ambient、Mallsoft等流派，并且引起了人们对这两种流派以美学为中心的不断关注。", "chapter": "早期流派/手法/理念", "examples": ["Chinese Base Camp: Near a Stone Shelter - Geir Jenssen【专辑：Cho Oyu 8201m: Field Recordings From Tibet】【https://www.youtube.com/watch?v=c7nZ5SbbeqA】"]}, "radio broadcast recordings": {"name": "Radio Broadcast Recordings", "ups": ["Field Recordings"], "downs": [], "aka": "", "related": "", "desc": "Radio Broadcast Recordings是 Field Recordings的一个分支，由全球范围内的无线电广播录音组成，一般用于历史方面的记录，通常以低保真方式录制，声音也会失真、掺杂噪声。现在很多曲目也会使用无线电广播录音采样增加歌曲的怀旧感、历史感，Broken Transmission/Signalwave作品也常常与Radio Broadcast Recordings相互融合。", "chapter": "早期流派/手法/理念", "examples": ["Radio Freedom: Voice of the African National Congress and the People's Army Umkhonto We Sizwe - Various Artists【https://www.youtube.com/watch?v=hzE2xFGzcDg&t=1317s】"]}, "nature recordings": {"name": "Nature Recordings", "ups": ["Field Recordings"], "downs": ["Animal Sounds"], "aka": "Nature Sounds、Natural Sounds", "related": "", "desc": "录制自然之声，如瀑布、海洋、风暴、鸟鸣、鲸鱼叫声等。旗下有流派Animal Sounds（A.K.A. Animal Music），为了捕捉动物发出的声音而进行的录音。其他Nature Recordings大多是为了氛围音乐的制作，而Animal Sounds则主要是出于生物学上目的而录制的。Animal Sounds也有子分支Birdsong（A.K.A. Birdcalls、Bird Vocalization，录制鸟的鸣叫）、Insect Sounds（A.K.A. Bug Sounds、Insect Recordings，录制昆虫的鸣叫）、Whale Song（录制鲸鱼的鸣叫）。", "chapter": "早期流派/手法/理念", "examples": ["The Crossroads - Chris Watson【专辑：Stepping Into the Dark】【https://www.youtube.com/watch?v=RLSchE9TMLk】"]}, "minimalism": {"name": "Minimalism", "ups": ["Experimental", "Modern Classical"], "downs": ["Holy Minimalism", "Post-Minimalism", "Totalism"], "aka": "Minimal Music", "related": "", "desc": "极简主义音乐最初是美国纽约的一种实验音乐/古典音乐流派，命名于20世纪60年代，简约音乐这个名词是由简约主义（或极简主义）派生而来。简约音乐在1960年代时被提出作为实验音乐中的一种音乐风格，这个类型大多展现以下的特色：如果不具功能调性，则强调和谐的和弦；乐句、或较小单位的figure、motif、cell会不断重复，加以难以捉摸、缓慢的改变、长时间极少或没有改变的旋律；以持续的低音、节奏或长音的方式暂停音乐演进。极简主义作曲家：La Monte Young（简约音乐之父）、John Adams、Philip Glass、Steve Reich、Terry Riley、Arvo Pärt、Michael Nyman、久石让。", "chapter": "早期流派/手法/理念", "examples": ["Einstein on the Beach: Knee Play 1 - Philip Glass / Michael Riesman【https://www.youtube.com/watch?v=VJ_fpgL7McA】"]}, "reductionism": {"name": "Reductionism", "ups": ["Experimental", "Minimalism"], "downs": ["Onkyo", "Lowercase", "Wandelweiser"], "aka": "", "related": "", "desc": "还原主义是极简主义的一个更极端的流派，是90年代同时出现的几个场景的总称，例如柏林场景（称为Berlin Reductionism/柏林还原主义，后来也叫做Echtzeitmusik）、伦敦场景（有时叫New London Silence）、东京场景（叫做Onkyo）和Lowercase等。它们都专注于各种形式的“还原”，无论是响度动态的还原、歌曲结构的还原还是氛围上的还原，有些曲目甚至安静得“吓人”，通俗一点地说就是“更极端的极简主义”。由于其实验潜力和多样性，这些场景在上世纪90年代各自发展几年后，开始相互高度合作，相互交流想法和方法。其中包括Lowercase、Onkyo、安静的Modern Classical作品（主要是Chamber Music）和一些电声/EAI场景，这些场景通常包含Free Improvisation（自由即兴）甚至Indeterminacy（不确定性音乐）。", "chapter": "早期流派/手法/理念", "examples": ["Gussuri - Ryoko Akama【专辑：Code of Silence】【https://www.youtube.com/watch?v=1r83KwQfQac&t=932s】（18：13开始）"]}, "onkyo": {"name": "Onkyo", "ups": ["Reductionism"], "downs": [], "aka": "Onkyokei、Onkyo-kei、音響系", "related": "", "desc": "Onkyo是日本实验音乐的一种形式，侧重于探索声音的物理特性，而不是将音乐作为一种表达形式，基本上完全基于音乐家与作品之间的“互动”，因此该流派包含了各种不同的音乐家和美学。这些作品的表演通常都是极简的，其中一般包含大量的沉默段。很多时候Onkyo被认为是一种范围很广的音乐，是因为表演者所使用的乐器多种多样。通常情况下，音乐家会用振动的物体抵住接触式麦克风，以记录这些物体产生的原本听不见的振动，因此很多时候都认为Onkyo与Lowercase有较大的联系。同时这种风格也与自由即兴和EAI有联系，因为许多Onkyo表演都是即兴的，通常使用EAI乐器。", "chapter": "早期流派/手法/理念", "examples": ["Hitori de Sabishi - 杉本拓と佳村萠【专辑：Live in Saritote】【https://www.youtube.com/watch?v=TsIH3Jd8T5E&t=2432s】（39：22开始）"]}, "wandelweiser": {"name": "Wandelweiser", "ups": ["Reductionism"], "downs": [], "aka": "", "related": "", "desc": "Radu Malfatti认为，Wandelweiser音乐是“对沉默的评估和整合，而不是无意义的、永无止境的微弱声音”。John Cage是Wandelweiser的核心人物，他的音乐通常被称为“无声音乐”，Wandelweiser最初的起点也往往被认为是凯奇的作品《4'33\"》（1952年），这是继Alphonse Allais的《Marche funèbre》（1897年）和Erwin Schulhoff的《In Futurum》（1919年）之后，最著名也是最早完全由沉默构成的作品之一。“Wandelweiser”一词可能来自Wandelweiser Group，这是一个国际作曲家/演奏家团体，由荷兰出生的长笛演奏家Antoine Beuger和德国小提琴演奏家Burkhard Schlothauer于1992年创立。1993年，瑞士单簧管演奏家Jürg Frey应邀加入，随后，美国吉他演奏家Michael Pisaro、瑞士钢琴家Manfred Werder、奥地利长号演奏家Radu Malfatti、美国长号演奏家Craig Shepard等也相继加入。该乐团拥有自己的发行公司Edition Wandelweiser和自己的唱片公司Edition Wandelweiser Records。 Wandelweiser作曲家有：Antoine Beuger、Dante Boon、Daniel Brandes、Johnny Chang、Jürg Frey、Mark Hannesson、Eva-Maria Houben、Carlo Inderhees、Marcus Kaiser、Bin Li、Radu Malfatti、Anastassis Philippakopoulos、Michael Pisaro-Liu、Burkhard Schlothauer、Sam Sfirri、Craig Shepard、Thomas Stiegler、Taylan Susam、Stefan Thut、Emmanuelle Waeckerlé、Manfred Werder、Alfred Zimmerlin。", "chapter": "早期流派/手法/理念", "examples": ["Aufhören - Eva-Maria Houben / Ruth Walser / Barbara Müller-Hämmerli【https://www.youtube.com/watch?v=g4BsNI9ALSQ】"]}, "glitch": {"name": "Glitch", "ups": ["Experimental", "Noise"], "downs": ["Glitch Hop", "Glitch Pop", "Microsound"], "aka": "Clicks & Cuts", "related": "", "desc": "随着计算机辅助作曲慢慢取代了传统的模拟电子乐制作方法，可出现的声音范围也随之大大拓宽，于是在90年代后期出现了Glitch这一流派，国内爱好者称其为“毛刺”，属于一种实验电子风格，一般认为始于90年代初的德国。艺术家不再局限于序列化的打击乐、合成器和采样，而是探索可以想象到的任何声音，主要强调由故障数字技术产生的声音，包括崩溃、系统错误、硬件噪音、CD Skipping、卡带、数字失真等。这一由实验艺术家组成并创建的场景，影响了Experimental Techno、Glitch Pop、Glitch Hop、极简主义、数字拼贴、故障噪音等许多流派。Oval、Pole、Vladislav Delay等艺术家是早期Glitch场景的代表制作人，后来Mille Plateaux的合辑《Clicks + Cuts》首次定义了这一地下音乐运动，不仅探索了这一场景中大多数的艺术家，还探索了各种Glitch的声音。", "chapter": "早期流派/手法/理念", "examples": ["Wismut (Version) - Signal【https://www.youtube.com/watch?v=NTX918c1QiI】", "data.matrix - 池田亮司"]}, "sound art": {"name": "Sound Art", "ups": ["Experimental"], "downs": ["Oscilloscope Music"], "aka": "Sound Sculpture、Sound Installation & Sculpture、Sonic Art", "related": "", "desc": "声音艺术是当代艺术的一个跨学科分支，始于20世纪末，融合了实验音乐和视觉艺术的元素，以声音为主要媒介/主题。一般来说，声音艺术作品以声音装置或声音雕塑的形式出现，它们可以自我播放，连续不断，没有开始或结束。它们一般不需要表演者，但也可能包含观众参与的元素。声音艺术尤其注重空间和概念声音设计，主要使用非音乐性的声音，与实验音乐关系密切。它还与雕塑和行为艺术等其他艺术形式密切相关。很多音乐家也曾涉足声音艺术，Brian Eno的视听装置作品就是一个广受欢迎的例子。与其他形式的视觉艺术一样，声音艺术通常不受“时间”上的限制，观众可以选择在任何时间体验声音艺术作品。此外，空间概念也是一个经常探讨的话题，声音艺术作品结合Field Recordings、安装空间互动装置等情况并不少见。声音艺术作品通常不是音乐意义上的“表演”，作品通常是不确定的、可生成的。自动装置在声音艺术中扮演着重要角色。", "chapter": "早期流派/手法/理念", "examples": ["Harmonic Bridge - Bill Fontana【https://www.youtube.com/watch?v=L2KO38Z-2SU&t=91s】"]}, "oscilloscope music": {"name": "Oscilloscope Music", "ups": ["Sound Art"], "downs": [], "aka": "", "related": "", "desc": "“示波器音乐”是一种利用音频本身在示波器（矢量示波器/X-Y示波器）上产生视觉效果的音乐。通过使用示波器这种能在屏幕上显示电信号的设备，音乐家们能够用声音绘制出各种形状。这一名称来自Jerobeam Fenderson的同名专辑《Oscilloscope Music》，不久后便出现了示波器音乐的一波热潮，许多技术宅都用他们的大部分业余时间倒腾着用音乐在示波器上画画。 想要粗浅理解示波器音乐的原理可以通过下述网站来了解：", "chapter": "早期流派/手法/理念", "examples": ["Spirals - Jerobeam Fenderson【https://www.youtube.com/watch?v=kPUdhm2VE-o】（3：19开始）"]}, "sound collage": {"name": "Sound Collage", "ups": ["Experimental"], "downs": ["Epic Collage", "Microsound", "Plunderphonics"], "aka": "Sonic Collage、Sound Montage", "related": "", "desc": "声音拼贴是一种音乐技术，它将各种声音片段“切碎”并“拼贴”在一起，从而创造出一种听觉艺术作品。随着磁带这种媒体存储形式的诞生，具象音乐流派的艺术家们能够将录制在磁带上的各种声音进行抽象拼贴。磁带音乐和电声音乐的发展进一步推动了拼贴式音乐的发展——然而这些音乐大多局限于先锋派和古典音乐领域，Ιάννης Ξενάκης [Iannis Xenakis]、John Cage、Brion Gysin、William S. Burroughs和Terry Riley等艺术家利用拼贴作为催化剂，推动他们的艺术理念向前发展。直到20世纪60年代末到70年代（随着更多媒体技术的普及），艺术家们才开始将声音拼贴作为自己的主要创作方式。20世纪70年代末至80年代，“采样”的概念在音乐中兴起，Negativland等乐队引领了采样拼贴式音乐的潮流。John Oswald撰写了关于这种音乐风格的文章，并将其发展为“掠夺主义（Plunderphonics）”。工业音乐的兴起也使得拼贴音乐有着更多应用，Throbbing Gristle、Nurse With Wound和Big City Orchestra等乐队将采样拼贴在一起，创作出了更新奇的音乐作品。", "chapter": "早期流派/手法/理念", "examples": ["Soft Channel 008 - Giant Claw【专辑：Soft Channel】【https://www.youtube.com/watch?v=qknKgVOitgs】", "Consume Mao - Ground-Zero【专辑：革命京劇】"]}, "epic collage": {"name": "Epic Collage", "ups": ["Sound Collage", "Post-Industrial"], "downs": [], "aka": "", "related": "", "desc": "Epic Collage是音乐学家Adam Harper创造的一个术语，用来描述著名制作人Elysia Crampton及其NON Worldwide旗下成员的拼贴音乐形式。尽管Epic Collage音乐采用了解构俱乐部（Deconstructed Club）的主题元素，以及当代后工业音乐的“粗糙”的音色，但它并不一定是节拍驱动或俱乐部友好的，而是更多类似于氛围音乐、Glitch、噪音、New Age、Cinematic Classical、Nature Recordings或Progressive Electronic等流派。Epic Collage可能会借鉴Spoken Word、诗歌或广播剧的元素，最常见的表现形式是使用文字转语音、Spoken Word/念白片段以及各种流行媒体（电影或游戏中的对话等）的采样。Epic Collage艺术家通常将各种采样（如流行音乐、当代 R&B、Trap、新金属）处理得无法辨认词句，并拼贴进似乎不合适、听感“冲突”的氛围中，因此很多时候听感类似Mashups，但相比传统Mashups通常多了一种“厚重感”。", "chapter": "早期流派/手法/理念", "examples": ["Aztec Glue - Rắn Cạp Đuôi【专辑：Ngủ ngày ngay ngày tận thế】【https://www.youtube.com/watch?v=DRJdhNFOzJQ】"]}, "plunderphonics": {"name": "Plunderphonics", "ups": ["Experimental", "Sound Collage"], "downs": ["Break-In", "Chopped & Screwed", "Nightcore"], "aka": "", "related": "", "desc": "“Plunderphonics”是作曲家John Oswald于1985年在一篇题为“Plunderphonics, or Audio Piracy as a Compositional Prerogative”的文章中创造的术语。从那时起，这个词就被用于通过获取一个或多个现有音频录音，并以某种方式对其进行改动，从而创作出新作品的音乐，可以被认为是一种声音拼贴。说白了就是现在的制作人将一首歌或者一段演讲整段/大段采样用于歌曲中或二次创作的手法，这种手法也往往涉及到侵权的问题。", "chapter": "早期流派/手法/理念", "examples": ["Helter Stupid - Negativland【https://www.youtube.com/watch?v=f0P4D8ZXf1Y】"]}, "break-in": {"name": "Break-In", "ups": ["Plunderphonics"], "downs": [], "aka": "", "related": "", "desc": "Break-In是一种Comedy & Novelty音乐，由旁白人声提出问题或进行评论，然后由采样的流行歌曲的歌词来回答，这一类型在20世纪70年代尤其流行，并且很多人承认Break-In就是Plunderphonics的第一个子分支。Break-In是唱片制作人Dickie Goodman的创意，他将时下热门单曲的片段插到通常是新闻广播的小情节剧之中。“The Flying Saucer”（由Dickie Goodman和他的搭档Bill Buchanan创作）是他最成功的一首单曲。70年代初，由于成人怀旧热潮的兴起，青少年听众对其娱乐价值的青睐、以及Novelty的复苏，催生了更多的Break-In作品。Dickie Goodman和他的一些模仿者在这一时期重新出现在歌曲榜单上，但这些新的音乐的不同之处在于，它们反映的是令人沮丧的时事。", "chapter": "早期流派/手法/理念", "examples": ["Buchanan and Greenfield - The Invasion【https://www.youtube.com/watch?v=7Z6yHAmnLhk】"]}, "experimental plunderphonics": {"name": "Experimental Plunderphonics", "ups": ["Plunderphonics"], "downs": [], "aka": "", "related": "", "desc": "Experimental Plunderphonics是更受实验音乐影响的Plunderphonics形式（虽然Plunderphonics已经是实验音乐子类了），许多曲目都采用了这种形式。Mashups和Vaporwave是以更流行的形式或更特定的创作环境进一步贯彻掠夺主义的两种流派，很多实验掠夺主义也被归入了这两种场景下的一部分。", "chapter": "早期流派/手法/理念", "examples": ["More Plunderblunders - People Like Us【https://www.youtube.com/watch?v=2psrgINkLjc】"]}, "chopped & screwed": {"name": "Chopped & Screwed", "ups": ["Plunderphonics", "Hip-Hop"], "downs": ["Witch House"], "aka": "Chopped & Screwed Hip-Hop", "related": "", "desc": "Chopped & Screwed指的是一种Hip-Hop的混音技术，20世纪90年代在休斯顿嘻哈音乐界发展起来。具体做法是将BPM降到60-70之间，并运用skipping beats、record scratching、stop-time等技术，将原版音乐“切碎”。DJ Screw 是Chopped & Screwed Hip-Hop的鼻祖，他在90年代初发展了这一音乐流派。2000年DJ Screw去世后，Chopped & Screwed开始在其他地区流行起来，并成为Witch House发展的重要组成部分。", "chapter": "早期流派/手法/理念", "examples": ["Track 10 - Expressway Yo-Yo Dieting【专辑：Bubblethug】【https://www.youtube.com/watch?v=d1etimDkL9c】"]}, "plunderphonic house": {"name": "Plunderphonic House", "ups": ["Plunderphonics", "House", "Breakbeat"], "downs": [], "aka": "", "related": "", "desc": "受The Art of Noise、Mantronix和Steinski的影响，(KLF)、Coldcut、Bomb the Bass、M/A/R/R/S和S'Express等艺术家创作了以Breakbeat为基底的采样拼贴音乐，既有嘻哈的Funky感，又有足够快的节奏，适合与House音乐融合。很多对于这种流派的批评主要在于这种做法的重复性、对传统音乐技巧的蔑视，以及这些音乐是一种公然的“声音盗窃”。到了1988年左右，一些艺术家开始致力于制作这种可跳舞的拼贴音乐。但不久之后，版权诉讼就将这种音乐推向了阴影之中。有人评价说“这种来自采样游乐场的音乐仍处在未被开发的时代”。", "chapter": "早期流派/手法/理念", "examples": ["Hack 1 - Information Society【专辑：Hack】【https://www.youtube.com/watch?v=HvGhr2HJq30】"]}, "sampledelia": {"name": "Sampledelia", "ups": ["Plunderphonics", "Hip-Hop", "Electronic Dance Music"], "downs": ["Cut & Paste", "Plunderphonic Hip-Hop"], "aka": "", "related": "", "desc": "Cut & Paste/Plunderphonic Hip-Hop常用来指未经授权的、非实验性的、基于Hip-Hop文化的采样拼贴，而Sampledelia一词通常认为指代更广义的这一场景，它脱离了Hip-Hop音乐的类型束缚，扩展到了电子舞曲，并混搭大量的采样。由于命名的原因，有些人认为这一类型属Neo-Psychedelia的范畴，但从听感上来说两者并没有什么相同之处。虽然听感类似Mashups，但与Mashups还是有区别的，Sampledelia本质上仍然还是采样拼贴，只不过将“老式流行音乐”、“录音采样”、Spoken Word等拼贴的对象换成了电子音乐片段。不过很多Sampledelia发展到现在确实已经和EDM Mashup没什么两样，很多Mashup/Sampledelia作品也已不再硬性区分开来。", "chapter": "早期流派/手法/理念", "examples": ["Pop Culture - Madeon【https://www.youtube.com/watch?v=lTx3G6h2xyA】"]}, "mashups": {"name": "Mashups", "ups": ["Plunderphonics", "Early Club Mashups"], "downs": ["Mash Up Tek"], "aka": "Bastard Pop、Bootlegs、Loosely Bootlegs、Mashup、Mash-up", "related": "", "desc": "Mashups是将两段或多段片段的部分内容混合在一起而创作的歌曲，属Plunderphonics子流派。Mashup有很多制作方法，如将一首歌的人声提取出来搭配在另一首歌的伴奏上，或将各种采样片段搭配在自己做的Beat上等，并且混搭上各种各样的其他流派元素，可能会达到一种“出奇地好”的效果。当代Mashup音乐于2000-2001年在英国兴起。2002-2003年，“Mashup”一词传到美国后开始流行。2001年11月，音乐博客Boomselection.info诞生。这是第一个Mashups主题的博客，在Boomselection.info提供查找/下载Mashups音乐资源的渠道后不久，Grant McSleazy创建了在线论坛Get Your Bootleg On（GYBO），始建于2002年2月，如今GYBO已经发展成为Mashup社区的重要聚会场所之一。Mashups在英国以外的地区开始受到关注，在很大程度上要归功于互联网，它是最早真正依靠互联网在全球范围内受到关注的音乐类型之一。", "chapter": "早期流派/手法/理念", "examples": ["Idols (EDM Mashup) - Virtual Riot【https://www.youtube.com/watch?v=vZyenjZseXA】"]}, "deep internet": {"name": "Deep Internet", "ups": ["Plunderphonics", "Post-Internet", "Musique concrète", "Vaporwave"], "downs": ["Browser Beats", "Spamwave"], "aka": "", "related": "", "desc": "Deep Internet是Plunderphonics的一个子流派，由DJ Rozwell在2016年提出。与蒸汽波采样“音乐源”的做法不同，Deep Internet使用乱七八糟的YouTube视频和其他互联网媒体作为采样源（如PetitTube等网站），为了保证音乐够“Deep”，一般来说采样源视频的播放量通常在20次以下。在音乐形式上，Deep Internet听起来像是噪音与具象音乐的结合体，以及常常带有声音拼贴、Field Recordings、Glitch和蒸汽波的元素，一定程度上摒弃了传统的音乐性概念。2016年，/mu/上的讨论诞生了Deep Internet的第一波浪潮，但是大多数制作人在一个多月左右之后就停止了发布，到2018年12月，Deep Internet场景归于沉寂。在大多数制作人都离开了这个场景之后，Deep Internet又在其他地方重新崛起（约2022年），时不时就有新的相关作品发行，于是流行至今。一些制作人延续了早期原始粗糙的、随机拼贴视频的声音，而另一些制作人则在新的方向上发展了这种声音。", "chapter": "早期流派/手法/理念", "examples": ["esoteric action - sorryman / torrent my pets【专辑：wait】【https://www.youtube.com/watch?v=5yoK28A3eyw】（2：29开始）", "BoToX - AkuraVortex"]}, "turntable music": {"name": "Turntable Music", "ups": ["Experimental"], "downs": [], "aka": "", "related": "Turntablism", "desc": "转盘音乐，起源于20世纪上半叶，John Cage和Pierre Schaeffer等实验艺术家在创作中使用转盘（以及它播放的黑胶唱片）作为一种独特的乐器。现代音乐家Christian Marclay、大友良英[Otomo Yoshihide]、Martin Tétreault和Philip Jeck等将转盘音乐与自由即兴、噪音元素相结合。Turntablism是转盘音乐的姊妹风格，相比转盘音乐受到Hip-Hop的影响更大。", "chapter": "早期流派/手法/理念", "examples": ["All You Are Going to Want to Do is Get Back There - The Caretaker【https://www.youtube.com/watch?v=dtfTwqBfxgo】"]}, "futurism": {"name": "Futurism", "ups": ["Modern Classical", "Avant-Garde Music"], "downs": ["Noise"], "aka": "Futuristic Music、Futurist Music", "related": "", "desc": "未来主义运动开始于20世纪初，它的起点被认为是1909年由Filippo Tommaso Marinetti撰写的《未来主义宣言》，紧随其后的是Francesco Ballilla Pratella从1910年开始撰写的几份宣言。未来主义主要是意大利和俄罗斯作曲家的产物，特点是激进的态度，拒绝西方古典音乐形式和传统音乐工艺标准，并且迷恋机器发声等发声渠道。画家、雕塑家、自学成才的音乐家Luigi Russolo和他的兄弟一起发明了称为Innarumori的噪音乐器，并创作了几首歌曲。Luigi Russolo的发展被视为是噪音和电子音乐发展的关键。其他未来主义作曲家有Luigi Grandi、Александр Мосолов、George Antheil、Арсений Авраамов和Arthur Lourié，而未来主义的影响可以在Сергей Прокофьев、Arthur Honegger、Igor Stravinsky或Edgard Varèse的一些作品中找到。", "chapter": "早期流派/手法/理念", "examples": ["Trio n°3 - Opening Performance Orchestra【https://www.youtube.com/watch?v=gj-YMJB2PIQ】"]}, "noise": {"name": "Noise", "ups": ["Avant-Garde Music", "Futurism"], "downs": ["Harsh Noise", "Power Noise", "Power Electronics"], "aka": "", "related": "", "desc": "噪音音乐在新音源的拓展上走出了历史性的一步，使人们明确了乐音（即狭义的乐器发出的声音，如小提琴、圆号等）和自然界声音的界限。噪音音乐发展史上曾创意的使用了诸如马达、车床等机械来表达工业化的进程。意大利作曲家Luigi Russolo创作于1913年的《唤醒城市》开启了噪音音乐的先声，同时Luigi Russolo也是未来主义艺术运动的重要成员，所以未来主义艺术运动对噪音音乐的发展很重要。噪音音乐的出现表现了作曲家们回归自然的思想，虽然影响力不如偶然音乐与电子音乐，但也在一定程度上启发了后续新音乐的诞生。作曲家：Luigi Russolo（先驱），Merzbow（秋田昌美），Torturing Nurse（中国Harsh Noise代表）。", "chapter": "早期流派/手法/理念", "examples": ["Reticular Formation - C.C.C.C.【专辑：Cosmic Coincidence Control Center】【https://www.youtube.com/watch?v=zJ70hyeZH9c】"]}, "harsh noise": {"name": "Harsh Noise", "ups": ["Noise"], "downs": ["Harsh Noise Wall"], "aka": "", "related": "", "desc": "Harsh Noise是一种前卫音乐流派，作为噪音音乐的延伸。Harsh Noise继承了Noise的音乐结构和作曲原则，但增加了电子设备和失真的使用。自20世纪70年代以来，Harsh Noise已经发展成了一种“臭名昭著”的流派，对普通听众而言极具挑战性，以极高的门槛而闻名。不过，如果能以非玩笑的心态对待Harsh Noise，那么它就会像许多其他前卫艺术形式一样，在许多层面上都有可欣赏的点。", "chapter": "早期流派/手法/理念", "examples": ["Swallowing Scrap Metal No. 9 - Controlled Bleeding【专辑：Shanked and Slithering】【https://www.youtube.com/watch?v=uqgdiDWzegU】"]}, "harsh noise wall": {"name": "Harsh Noise Wall", "ups": ["Harsh Noise"], "downs": ["Ambient Noise Wall"], "aka": "HNW、Wall Noise、Noise Wall、Walling Noise", "related": "", "desc": "噪音响亮且失真，与其他Harsh Noise区别在于它在动态方面没有很大变化，整首曲子可能会产生缓慢的变化或直接没有变化。Noise Wall主要通过1990年代的美国噪音场景而声名鹊起，由Skin Crime等艺术家开创，由Richard Ramirez（笔名Werewolf Jerusalem）继承并发展。", "chapter": "早期流派/手法/理念", "examples": ["Blackened Torso - The Rita【https://www.youtube.com/watch?v=MfIt-0FjpwU&t=96s】"]}, "glitch noise": {"name": "Glitch Noise", "ups": ["Noise", "Glitch"], "downs": ["Hyper Glitch"], "aka": "", "related": "", "desc": "Glitch Noise是一个标签，指Glitch与Noise结合的一类音乐，在噪音音乐中仍是一个较小的流派。特点在于噪音之上的随机、刺耳的故障音。原来本是用作视频/影视中的特效音，后来成为一种噪音的独特流派，噪音部分也时常有Harsh Noise Wall的影子。", "chapter": "早期流派/手法/理念", "examples": ["Turning Point - Kevin Drumm【https://www.youtube.com/watch?v=8ZqoALeiJ24】"]}, "japanoise": {"name": "Japanoise", "ups": ["Noise"], "downs": [], "aka": "ジャパノイズ、Japanoizu", "related": "", "desc": "“日本”和“噪音”两个词的合成词，描述日本场景的噪音音乐，在1970年代末和1980年代初制作人Merzbow进一步抽象了噪音美学，确定了日本噪音的形成，并对噪音音乐成为一种独特的流派产生了重要影响。日本噪音制作人有Hijokaidan、Boredoms、C.C.C.C.、Incapacitants、KK Null、Yamazaki Maso、Solmania、K2、The Gerogerigegege、Mayuko Hino、Ruins和Hanatarash。", "chapter": "早期流派/手法/理念", "examples": ["Slave New Desart - Merzbow【https://www.youtube.com/watch?v=3wnMoqOdfwU】"]}, "black noise": {"name": "Black Noise", "ups": ["Noise", "Black Metal"], "downs": [], "aka": "Blackened Noise", "related": "", "desc": "Black Noise是一种极致体现黑金属刺耳、粗糙听感的子流派，通常将Dark Ambient、原始黑、噪音、Power Electronics等元素融合在一起。尽管这一音乐流派仍属小众音乐，但早在上世纪80年代末，当黑金属还处于萌芽阶段时，就有大量这种风格的音乐作品问世。这种风格主张混乱的听感，保留了黑金属的低保真制作手法，受到了很多黑金爱好者的喜爱。", "chapter": "早期流派/手法/理念", "examples": ["The Ecstasy Of Unbeing - Luminous Shadow【https://www.youtube.com/watch?v=emZ7cE8B1JE】"]}, "white noise": {"name": "White Noise", "ups": ["Noise", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "白噪，指各个频段都分布着几乎相同强度频率的噪声，现在流行的白噪作品很多都是改良过的白噪，往往用于催眠，单纯的白噪已经基本上成了曲子中的一种元素。", "chapter": "早期流派/手法/理念", "examples": ["Green Rain & Birds - Focus Noise【https://www.youtube.com/watch?v=iSTxrt4NDJw&t=8s】"]}, "new age": {"name": "New Age", "ups": ["Classical Music", "Pop", "Rock", "Folk"], "downs": ["Andean New Age", "Celtic New Age"], "aka": "", "related": "", "desc": "专注于和平、梦幻的旋律，通常旨在为听众提供放松、冥想或乐观的听感。可以采取不同的形式：电子New Age使用融合的合成器音色，长而持续的音符和简单的鼓组，而声学New Age常常用长笛、钢琴和吉他等乐器来营造平静的氛围。Mike Oldfield、Enigma、Popol Vuh和Vangelis是New Age杰出的艺术家。一些艺术家也将特定形式的民间音乐融合进去，如Enya和Clannad将New Age和Celtic Folk（凯尔特民谣）混合在一起创造出来Celtic New Age（凯尔特New Age），以及Cusco和Medwyn Goodall的南美风格影响并催生了Andean New Age的产生。", "chapter": "早期流派/手法/理念", "examples": ["Sadeness - Enigma【https://www.youtube.com/watch?v=4F9DxYhqmKw】（2：00开始，电平升5dB）"]}, "neoclassical new age": {"name": "Neoclassical New Age", "ups": ["New Age"], "downs": [], "aka": "", "related": "", "desc": "New Age音乐的一个分支，深受巴洛克音乐、古典时期早期音乐的影响，最常用的乐器是钢琴和弦乐，有时也可以通过MIDI合成，电子乐器可以少量使用，但很多时候完全不使用。虽然Neoclassical New Age音乐有各种各样的风格，但一般都有着旋律优美、和声丰富、器乐演奏的共同点。与大多数New Age音乐一样，是一种令人平静、舒适的音乐。", "chapter": "早期流派/手法/理念", "examples": ["Song From A Secret Garden - Secret Garden【https://www.youtube.com/watch?v=-sWnEWpS_fA】"]}, "celtic new age": {"name": "Celtic New Age", "ups": ["New Age", "European Music"], "downs": [], "aka": "", "related": "", "desc": "可以说是较为主流的New Age风格，著名女歌手有Enya和Loreena McKennitt，歌曲中含有大气般听感的节拍、空灵的人声，这些作品能唤起人们抽象而浪漫的情感，体现了卡尔特传说中有关仙女的故事。还有许多作品依赖器乐，如竖琴、口哨声、小提琴、键盘等。其他乐队/制作人有Llewellyn、Gary Stadler、Secret Garden、Dagda等。", "chapter": "早期流派/手法/理念", "examples": ["Orinoco Flow - Enya【https://www.youtube.com/watch?v=LTrk4X9ACtw】"]}, "japanese new age": {"name": "Japanese New Age", "ups": ["New Age", "Neoclassical New Age"], "downs": [], "aka": "", "related": "", "desc": "日本场景的New Age音乐，由于日本在氛围音乐、极简主义等音乐方面有着独特的场景，New Age场景也有着他们贡献出的独特的声音（氛围、极简主义、New Age等通常统称为Interior Music）。日本New Age往往结合了更多的Neoclassical New Age元素。高木正勝、吉村弘、久石譲、日向敏文等制作人是代表人物。", "chapter": "早期流派/手法/理念", "examples": ["汐 - 戸越 まごめ【https://www.youtube.com/watch?v=Zb-s666hJFo】"]}, "new age kirtan": {"name": "New Age Kirtan", "ups": ["New Age", "Kirtan"], "downs": [], "aka": "", "related": "", "desc": "南亚风格Kirtan在美国与New Age融合在一起诞生了New Age Kirtan，它比传统New Age更柔和，减少了对打击乐、地域风格的关注，经常使用小风琴，并且主要用梵文演唱，但使用西方风格的旋律和节奏，并且可能也使用西方乐器，有时会带有宗教色彩。20世纪90年代，随着瑜伽的兴起，这种风格也逐渐流行起来。相关艺术家有Krishna Das、Alice Coltrane等。", "chapter": "早期流派/手法/理念", "examples": ["Keshava Murahara - Alice Coltrane【https://www.youtube.com/watch?v=XcNhj5BlKsY】"]}, "native american new age": {"name": "Native American New Age", "ups": ["New Age"], "downs": [], "aka": "", "related": "", "desc": "Native American New Age是一种New Age流派，深受北美原住民音乐的影响，强调宁静和谐的氛围，经常使用圣歌唱法、鼓组和长笛，并一定程度上结合了一些轻松宁静的合成器声音。该流派于20世纪90年代开始流行。Native American New Age的主题包括灵性和原住民宗教（例如Native Flute Ensemble的《Gathering of Shamen》）、北美大陆的自然环境及保护环境的重要性（Ah*nee*mah的《The Spirit of Mesa Verde》），以及美国原住民的历史和他们的斗争（Peter Kater的《How the West Was Lost》）等。", "chapter": "早期流派/手法/理念", "examples": ["Between Worlds - Deborah Martin / Erik Wøllo【https://www.youtube.com/watch?v=YMjG4R9YE0o】"]}, "tibetan new age": {"name": "Tibetan New Age", "ups": ["New Age", "Himalaya Bowl"], "downs": [], "aka": "Tibetan Music", "related": "", "desc": "Tibetan New Age指的是一种将藏族音乐元素融入New Age音乐的趋势，最开始流行在1972年，通常被简称为“藏族音乐/Tibetan Music”，尽管这种音乐与传统西藏音乐通常并无多少相似之处，与西藏流行音乐也是不同的流派。最常见的就是把敲击金属碗类的声音或者各种铃声使用在音乐中，即结合了Himalaya Bowl的元素，也会使用各种佛教和道教文化中的乐器，有时也会将传统乐器和电子合成器结合使用，如果出现人声，最常见的是以吟唱的方式演唱。这种风格的第一张广为人知的专辑是1972年发行的专辑《Tibetan Bells》。Tibetan New Age通常与精神治疗密切相关，音乐通常用于冥想和脉轮调整。虽然这一流派的大多数音乐家都是西方人，但也有一些藏族后裔艺术家接受了这一流派，例如Yungchen Lhamo。", "chapter": "早期流派/手法/理念", "examples": ["Per Rig Chog Sum - Yungchen Lhamo【https://www.youtube.com/watch?v=6YVr-NPW3Rc】"]}, "new age revival": {"name": "New Age Revival", "ups": ["New Age"], "downs": [], "aka": "", "related": "", "desc": "New Age音乐于10年代以几种不同的形式复苏，2015-2017年左右是New Age Revival音乐主要的流行期。与最初的New Age一样，这种音乐也有定义松散和元素重叠的倾向。艺术家们的灵感基本上来源于80-90年代的复古文化、低保真磁带场景、氛围音乐和迷幻音乐，很多制作人会使用合成器，但也有少数人专攻原声甚至电声音乐。New Age Revival场景中很容易找到10年代早期的复古风格，如蒸汽波、Hypnagogic Pop，很多场景如数字合成、Smooth Jazz、气象频道、VGM、磁带音乐、日本New Age也可以找到New Age Revival的元素。", "chapter": "早期流派/手法/理念", "examples": ["Sea of Islands - Sign Libra【专辑：Sea to Sea】【https://www.youtube.com/watch?v=E60nHJNEn00】", "Healer - Iceblink【专辑：Carpet Cocoon】"]}, "nortec": {"name": "Nortec", "ups": ["Techno", "Hardcore", "Tijuana Traditional Music"], "downs": [], "aka": "", "related": "", "desc": "Nation: Maxico/墨西哥 Nortec是吸收了墨西哥提华纳地区民族音乐的一种电子舞曲，诞生于1999年的Techno音乐场景，流行于2001年的墨西哥北部，深受传到美国南部的Techno和Hardcore影响，使音乐在具有坚实强硬的Hard Techno底鼓和失真Hard Dance Bass的同时，又不失提华纳民谣的风趣或抒情。Nortec一般在靠近美国边境的城市制作，一些美国Techno DJ会将音乐带到提华纳地区，因此Nortec受美国电子音乐影响很深。另外一些制作人也会选择去蒂加纳和伊比萨岛旅游“取经”，为Nortec音乐提供新的发展趋势。代表制作人/企划: Nortec Collective Hiperboreal、Nortec Collective、Nortec: Bostich + Fussible。", "chapter": "Ethnic", "examples": ["Wonderful Life - Nortec Collective Hiperboreal [1:05起始]"]}, "dub": {"name": "Dub", "ups": ["Reggae", "Electronic Music", "Mixing Techniques"], "downs": ["Dub Reggae", "Ambient Dub", "Dubstep"], "aka": "", "related": "", "desc": "Nation：Jamaica/牙买加 “Dub以极致的混响闻名，因为它是混音台上玩出来的。”这句话不假。1950~1960年代，牙买加兴起了Sound System文化，唱片公司招募街头Selector来为听众打铝制唱片(Dubplate)来确定歌曲是否适合出版。当时的Selector在混音播放的过程中常有听众跟唱，于是有些Selector直接将麦克风递给了听众。其中做的最绝的是1960s中期的Reggae制作人sir Coxsonne，他提议删去人声，重点强调鼓和低音。这种方法被称为“Riddim”，当时唱片公司发行的唱片一般是A面放原曲，B面放Riddim过的曲子，这种销售手段就叫Dub，也就是Double(双面唱片)的口头语。自此Dub这个术语便出现了，后来的Dub Version即“伴奏版”之意。 Dub音乐则是专门指Riddim后的曲子，一般是以Reggae为基。King Tubby是Dub真正意义上的创始人，他运用数字电路知识将混音台改造成乐器，配合多轨录音系统将雷鬼乐的人声与配器分离开来并分配到混音台各个轨道上重调，加入大量回声、混响、延迟，将Bassline变成反复出现的轰隆隆声音，最后将这些要素重组，Dub就这样诞生了，Tubby的手法也被称为“Remix”。代表制作人包括: Scientist、Prince Jammy、Augustus Pablo，以及首次采用循环(Loop)和采样(Sample)的Lee Scratch Perry，和将Space Music、Jazz、Rock、Techno融入Dub中的Mad Professor等。Dub在全球很多国家和地区也很广受欢迎，尤其是牙买加、多米尼加、英国、一些非洲国家和我国云南省、广西壮族自治区等。 Dub音乐伴随着Sound System场景出现，Sound System场景中常常出现Battle现象，一般来说由两组人员组成，每组包含三人，包括调制设备正常运行和电路消耗的Engineer、调制歌曲重新混音的Selector(类似现在的DJ)和负责唱歌或者讲段子烘托气氛的Deejay(类似现在的MC)。Deejay文化后面跟随Dancehall等音乐进入欧美，融合Dozens文化现象形成了早期说唱/Hip-Hop；而Dub音乐直接跟随赴英黑人一起，形成了Jungle、Grime和Dubstep最初的声音——高延迟大混响的低沉Bass。", "chapter": "Ethnic", "examples": ["空 KONG - 蒋亮 [2:13起始]"]}, "dub poetry": {"name": "Dub Poetry", "ups": ["Dub"], "downs": [], "aka": "", "related": "", "desc": "除却去美国发展嘻哈的那一批Dub制作人，还有一些同样活跃于Sound System Battle的Dub制作人选择留在了牙买加，发展出了Dub Poetry。Dub Poetry除了传统Dub三人组以外，还加入了原声乐器的演奏，常常包含吉他、提琴等。Deejay一般更加严肃，会随着节奏演唱或朗诵赞美诗、圣咏或诗歌剧。这种独特的演绎方式是Dub最为严肃的表演形式，也更倾向于室内演奏。", "chapter": "Ethnic", "examples": ["Dread Times - Oku Onuora / AK7 [1:06起始]"]}, "dub reggae": {"name": "Dub Reggae", "ups": ["Dub", "Reggae"], "downs": [], "aka": "", "related": "", "desc": "Dub作为一种混音处理方式也影响了很多风格，除了后来的Dub Rave、Dub Techno等，Dub制作人也会将Dub反作用于Reggae音乐，创造出Dub Reggae。经过Dub Mix后的Reggae一般不仅加深了慵懒感，而且更加电声化、迷幻化、空灵化，加深了Reggae音乐的受欢迎度。同时Dub Reggae的Kick和Bass也被加大权重，因此Dub Reggae也更适合舞蹈。", "chapter": "Ethnic", "examples": ["Noi-Zee Boy - Pyrotechnist [0:58起始]"]}, "psydub": {"name": "Psydub", "ups": ["Dub", "Experimental Psy", "PsyBient"], "downs": [], "aka": "", "related": "", "desc": "Psydub 是电子音乐的一个子流派，结合了Experimental Psy的元素和Dub音乐对Kick和Bass的重视。它的特点是使用沉重的Bassline、迷幻的音效和空灵的人声，鼓组也不局限于Reggae鼓组。该流派通常融合了世界音乐的影响，例如印度古典音乐和中东节奏。Psydub 以其大气和内省的声音而闻名，为听众创造了冥想和精神体验。一般来说Psydub与Psychill/PsyBient有交集，因此很多Psydub的氛围性更鲜明。代表制作人包括Brujo's Bowl、Globular、Taiga乐队等。", "chapter": "Ethnic", "examples": ["Mazhalyk-Ta - Taiga乐队 [3:15起始]"]}, "ambient dub": {"name": "Ambient Dub", "ups": ["Dub", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "Ambient Dub是Ambient和Dub reggae的电子融合，前者具有独特的氛围，后者具有牙买加风格的Bassline、打击乐和迷幻的制作技巧。这一流派的名称是由英国的Beyond唱片公司从1992年的《Ambient Dub Volume 1: The Big Chill》开始的一系列同名合辑创造出来的。Waveform Records通常被认为是“美国的Beyond厂牌”，专门致力于Ambient Dub运动。该流派中的许多著名艺术家也融合了Ambient Techno和Megadog的 “Crusty Techno”元素，这导致人们对传统的Ambient Dub声音产生了一些混淆。虽然这些电子融合流派的界限模糊不清，但Ambient Dub确实可以从其独特的氛围、缓慢的节奏、混响/延时的大量使用，以及类似于传统Dub的对Bassline的强调中辨别出来。虽然严格意义上的Ambient Dub仍在有发行，但这种场景已于1996年消亡。", "chapter": "Ethnic", "examples": ["Ruination - Deadbeat [1:31起始]"]}, "afro dub": {"name": "Afro Dub", "ups": ["Dub", "Afro Music"], "downs": [], "aka": "", "related": "", "desc": "Dub音乐时至今日的范围已不再局限于Reggae Mix形式了，在一些非洲国家Dub非常流行，Dub音乐也变得本土化，并且与非洲爵士和Afrobeat甚至Jungle和Drum & Bass音乐结合，形成了形态各异百花齐放的Afro Dub音乐，非洲旋律融入了宽松的架构中，原生乐器的参与让其更加流行化，但是唯一不变的还是Dub音乐对Kick和Bass的重视。", "chapter": "Ethnic", "examples": ["Nanny Riddim - Juls [1:09起始]"]}, "dubtronica": {"name": "Dubtronica", "ups": ["Dub", "Electronica"], "downs": [], "aka": "", "related": "", "desc": "如今的Dub已经更多的作为一种元素参与到音乐当中，除了Dubstep和Dub Techno，Dubtronica也是一种不可忽视的声音，即便是这个名称很少提到。Dubtronica是Dub与Electronica的合成词，是将Dub Reggae或Psydub等Dub子分支融合到Electronica的产物，这类音乐保留了Dub那种悠长的节奏和慵懒恍惚的节拍，但是制作手法上部分脱离了Reggae的影响，听感上更现代、更都市化。", "chapter": "Ethnic", "examples": ["Irie - 4seen"]}, "reggaeton": {"name": "Reggaeton", "ups": ["Reggae", "Electronic Dance Music", "Dancehall"], "downs": ["Moombahton"], "aka": "Reggaetón、Reguetón", "related": "", "desc": "Nation: Panama、Puerto Rico（美国）/巴拿马，波多黎各（美国） Reggaeton是一种受到牙买加雷鬼乐影响的舞曲，据称首次出现于巴拿马，后在1980s传到美国波多黎各进行发展。1988年，Reggaeton一词首次被波多黎各歌手Michael Ellis提出，意为“庞大的雷鬼”(un reggae grande)。1994年，Daddy Yankee和DJ Playero在专辑《Playero 36》首次用Reggaeton来描述这种波多黎各地下电子舞曲风格，自此Reggaeton有了自己的名字，并流行到现在。现今的主要制作人包括: Daddy Yankee、DJ Nelson、DJ Eric、DJ Playero、Ivy Queen、Don Chezina等。 实际上第一首明确被定义为Reggaeton风格的曲目是DJ Playero和DJ Nelson的《Riddims》，这首歌确定了Reggaeton风格的特性: 根植于雷鬼和回响音乐、节奏鲜明的拉丁节奏、非裔美国人的嘻哈和欢快或忧伤的合成器节奏，这一点又与雷鬼的台风相符。最早Reggaeton被称为“Underground”或“Perreo”，经常带有与毒品，暴力，贫穷，友谊，爱情和性有关的歌词。Reggaeton的受欢迎程度最高，在1990s初期便火遍波多黎各，随后几年间又风靡到美国南部，即便这种风格在1995年遭到保守的波多黎各政府打击。在千禧年后，Reggaeton逐渐在欧美地区获得青睐，2004年Daddy Yankee发行的热门单曲《Gasolina》火爆全美，同年Dan Omar的《Pobre Diabla》在欧洲多国得到喜爱，展现了Reggaeton商业化的无限潜力。2005年，Reggaeton出现了Reggaeton+Bachata的新制作模式，在加勒比海地区得到复兴。2017年，Daddy Yankee的Despacito成为一首现象级知名Reggaeton曲目，并将这种风格推向全球，为拉丁美洲文化画上了浓墨重彩的一笔。", "chapter": "Ethnic", "examples": ["Despacito - Luis Fonsi / Daddy Yankee / Justin Bieber [1:24起始]"]}, "dembow": {"name": "Dembow", "ups": ["Reggaeton", "Dancehall", "Hip-Hop"], "downs": [], "aka": "Dembow Riddim, Jamaican Riddim, Son Bow", "related": "", "desc": "Dembow的叫法来源于1990年Shabba Ranks的歌曲《Dem Bow》，其根源是Reggaeton的Dembow Riddim或Jamaican Riddim。Dembow Riddim于80年代末和90年代初在牙买加的舞厅中出现。Dembow也称为Son Bow，由Kick, Kickdown, Palito, Snare, Timbal, Timballroll和Hi-hat Cymbal组成。dembow的打击乐模式受到Disco音乐和其他加勒比音乐（Soca，Calypso和Cadence）的影响，这给Dembow带来了泛加勒比风味。Poco Man Jam Riddim的创建者Steely＆Clevie通常被认为是创建了Dembow，核心是3 + 3 + 2（tresillo）节奏，并在4/4次低音鼓中得到补充。Dembow的速度更接近于Dancehall，而且与Reggaeton相比更注重说唱元素，因此Dembow音乐并不一定需要旋律的介入，这也是区分Dembow的一个手段。", "chapter": "Ethnic", "examples": ["La Gomita - Rochy RD [0:43起始]"]}, "dancehall": {"name": "Dancehall", "ups": ["Deejay", "Roots Reggae", "Pop Music", "Calypso"], "downs": ["Dembow", "Yardcore", "Dancehall Pop", "Reggaeton"], "aka": "", "related": "", "desc": "Nation: Jamaica/牙买加 同样起源于雷鬼乐大国牙买加，Dancehall则是起源于1970s的牙买加政治动荡，在Dub诞生地，一群年轻人又发扬了Deejay，并从中分化出Hip-Hop和Dancehall。承接了西非的表演形式，1969年，U-Roy首次尝试跟随“Riddim”(表意节奏，非Riddim Dubstep)进行说话，从而开创了说唱的早期形式，并催生出了Deejay这个职业，深深影响了Dub音乐。1980年代，Yellowman出道，并且在Dancehall音乐中延续了Deejay的模式，加入了大量明确政治和性指向的歌词，这使得Dancehall音乐深受牙买加年轻一代的追捧。 1980s后期到1990s，合成器节奏取代了人力并加快了速度、复杂了节拍，这也使得Dancehall区别于Reggaeton甚至影响了后者。Deejay的形式被其他演绎方式取代，歌曲的政治指向性和性相关词汇大大减少，更多面向舞池大众，加入了更多与享受、欢乐、爱情、比赛相关的元素，这也使Dancehall也离开牙买加逐渐流行于欧美音乐界，代表制作人包括Shabba Ranks、Ninjaman、Bounty Killer、Lady Saw、Lovindeer、J. Balvin、Sean Paul等。不过也有一部分Dancehall根植于黑人基督教元素，形成了另一种形式主题特殊的Dancehall音乐，代表人物包括Beenie Man等。", "chapter": "Ethnic", "examples": ["Arhbo - Ozuna / GIMS / RedOne / FIFA Sound [1:03起始]"]}, "yardcore": {"name": "Yardcore", "ups": ["Dancehall", "Raggacore"], "downs": [], "aka": "Speedhall", "related": "", "desc": "Yardcore是Dancehall的一种极端演绎方式。1994年，Raggacore脱胎于Ragga Jungle，成为了更混乱的Jungle形式，一定程度上开拓了Breakcore的赛道。Yardcore就是Raggacore作用于Dancehall的结果，这使得Dancehall曲目速度进一步提高，在牙买加节奏型的kick周围围绕大量破碎混乱的Snare和Hi-Hat，因此Yardcore也被叫做“Speedhall”。代表人物: Bong-ra等。", "chapter": "Ethnic", "examples": ["Dub Murderer - Bong-ra [3:20起始]"]}, "soca": {"name": "Soca", "ups": ["Electronic Dance Music", "Caribbean Music"], "downs": ["Ragga Soca"], "aka": "", "related": "", "desc": "Nation: Trinidad & Tobago/特立尼达和多巴哥 Soca音乐是一种起源于加勒比地区的流派，以其欢快的节奏和富有感染力的节奏而闻名。它融合了Calypso、Reggae和Dancehall的元素，创造出适合跳舞和聚会的音乐。Soca音乐常与狂欢节庆祝活动联系在一起，受到世界各地人们的喜爱。其动听的旋律和充满活力的节拍使其成为俱乐部和音乐节的热门选择。Soca音乐诞生于1970s，由特立尼达和多巴哥唱作人/音乐家Lord Shorty提出，旨在融合东印第安音乐和Calypso音乐，Soca随后依托Dancehall发展出类似Reggaeton的的节奏型。", "chapter": "Ethnic", "examples": ["Happy Song - Ghost Writers Trinidad / College Boy Jesse [0:53起始]"]}, "groove soca": {"name": "Groove Soca", "ups": ["Soca"], "downs": [], "aka": "", "related": "", "desc": "Groove Soca是Soca音乐当今主流表现方式之一，融合了Reggaeton和其他拉丁美洲电子舞曲，使其充满律动感，因而被称为“Groove Soca”。音乐在演绎的过程中常常伴有富有节奏的女声Vocal旋律说唱，增加了Groove Soca的舞曲性。", "chapter": "Ethnic", "examples": ["Oil Drum - Nailah Blackman / Travis World [1:02起始]"]}, "power soca": {"name": "Power Soca", "ups": ["Soca"], "downs": [], "aka": "", "related": "", "desc": "Power Soca相较于其他Soca风格更具有能量，一般会将速度提升至170BPM上下，与一般的Soca的132BPM形成鲜明的对比。Power Soca常常弱化Build Up部分的存在感，使用递进式Drop，佐以高速的重节拍，以及兴奋、欢愉的男声Vocal，让歌曲充满力量。", "chapter": "Ethnic", "examples": ["Shake The Place - Machel Montano / Destra [1:21起始]"]}, "asian underground": {"name": "Asian Underground", "ups": ["Asian Ethnic Music", "EDM"], "downs": [], "aka": "", "related": "", "desc": "Asian Underground是一个定义松散的流派，代指一系列地下电子音乐场景中出现的融合了亚洲音乐元素的电子音乐尤其是电子舞曲。一般来说形式包括Breakbeat、Drum & Bass等，也会有Trap元素(如Howie Lee的金蛇狂舞Remix)和Nu Gabber形式(如印度尼西亚乐队Gabber Modus Operandi)。一般来说这类音乐不包括日式电子音乐或电子流行，类似五音调式、都节调式等元素运用的地下电子音乐可以包含在这个范畴内，融合了民族音乐如民乐、甘美兰音乐等的地下电子音乐也算在内，如前面提到的Gorge音乐。", "chapter": "Ethnic", "examples": ["Trance Adiluhunxxx - Gabber Modus Operandi [4:32起始]"]}, "shamstep": {"name": "Shamstep", "ups": ["Sham Music", "Electronic Dance Music", "Dubstep"], "downs": [], "aka": "الدبكة", "related": "", "desc": "Nation: Palestine/巴勒斯坦 Shamstep是巴勒斯坦的一种民族电子舞曲，结合了巴勒斯坦阿拉伯人独特的Sham Music(沙姆音乐)和Sham舞蹈文化，首创同时也是曲风制作代表是巴勒斯坦和约旦乐队47SOUL。47SOUL创新性的将类似Reggaeton的节奏型赋予给传统沙姆音乐，加入了很多阿拉伯民族乐器如Shabbab奈依等流行于沙姆地区的民族乐器，以及很多具有迷幻性的合成器音色。47SOUL也会在音乐中添加阿拉伯语说唱，使音乐更加有民族风味的同时更加紧凑。定义/代表专辑：《Shamstep》(2015)。", "chapter": "Ethnic", "examples": ["Dabke System - 47SOUL [3:15起始]"]}, "chalga": {"name": "Chalga", "ups": ["Dance Pop", "Balkan Folk", "Reggaeton"], "downs": [], "aka": "", "related": "", "desc": "Nation: Bulgaria/保加利亚 Chalga是保加利亚流行民谣与电子舞曲结合的产物，融合了巴尔干民谣旋律和东方音乐配器，是保加利亚最受欢迎的音乐风格。Chalga的主题常常是多元化、贴近市民的，用幽默的方式反映了人们渴望财富、享受生活或者情色内容等话题，一定程度上在反映了民族特色的同时，揭示了社会深层次的问题。Chalga音乐诞生于上世纪90年代左右，由Turbo-Folk等影响发展而来，其中最有代表性同时也是最受欢迎的歌手是Azis，也就是国内网民常言的“保加利亚妖王”。代表专辑包括《Gadna Poroda》(2011)、《Azis 2014》(2014)等。", "chapter": "Ethnic", "examples": ["Hop - Azis [0:46起始]"]}, "turbo-folk": {"name": "Turbo-Folk", "ups": ["Balkan Folk", "EDM", "Dance Pop"], "downs": ["Ethnotronica"], "aka": "", "related": "", "desc": "Turbo-Folk是一种起源于巴尔干半岛的音乐流派，主要与塞尔维亚艺术家有关。Turbo-Folk在整个南斯拉夫区域(波斯尼亚和黑塞哥维那、斯洛文尼亚、黑山、克罗地亚、马其顿、塞尔维亚)和保加利亚、土耳其、阿尔巴尼亚都很流行。Turbo-Folk融合了当地民谣，加入了Euro Dance/Italo Dance或Dance Pop元素，在希腊、罗马尼亚、阿尔巴尼亚和保加利亚都有相似的风格。", "chapter": "Fusion", "examples": ["200/100 - Ana Nikolic"]}, "kuduro": {"name": "Kuduro", "ups": ["Batida", "Breakbeat", "Disco", "House etc."], "downs": [], "aka": "", "related": "", "desc": "Nation: Portugal/葡萄牙 Kuduro诞生在葡萄牙里斯本的bairros社区，制作人通常来自葡萄牙殖民地第一代和第二代移民的子女。当地的年轻人热衷于播放Batida，用Tarraxo/Kizomba的舞步倚歌和之。2005年，在Quinta do Mocho 长大的DJ Marfox与DJ Pausas、DJ Fofuxo、Nervoso和DJ Jesse共同创立了DJs Do Guetto，团队推动了这种流派的叛逆、快节奏。他将其与纽约早期的嘻哈音乐相提并论，那里充满了狂野、高风险的比赛和DIY派对场景。DJs Do Guetto crew 2006 年的合辑“DJ Do Guetto Vol. 1”是 Kuduro 具有里程碑意义的发行，这张混音带随后在个人立体声音响上流传，其制作人主导了街区派对。2010年，由里斯本唱片店负责人和推广人组成的专注于当代当地音乐的普林西比（Príncipe）第一次遇到了Kuduro，并向他们介绍了Batida音乐制作集。2011 年，Príncipe 发行了 Marfox 的首张 EP《Eu Sei Quem Sou》，自此Kuduro风格得以确立，并于2012年创办了Noite Príncipe俱乐部。如今Kuduro音乐已得到国际上的广泛承认，Warp厂牌甚至与DJ Nigga Fox签约，发布了很多具有里程碑意义的Kuduro音乐，助力了这种生根在葡萄牙首都的异乡音乐的发展传播。", "chapter": "Ethnic", "examples": ["Maria Costa - DJ Nigga Fox [0:51起始]"]}, "batida": {"name": "Batida", "ups": ["EDM", "Afrobeat"], "downs": ["Deconstructed Club [Influence]"], "aka": "", "related": "", "desc": "Nation: Angola/安哥拉 Batida 是一种起源于安哥拉的音乐流派，将传统的非洲节奏与电子节拍相结合。它的特点是其高能量、可跳舞的声音，并且经常以葡萄牙语或非洲语言的歌词为特色。近年来，Batida音乐越来越受欢迎，特别是在葡萄牙和其他葡萄牙语地区，并且引入了Soca、Dancehall音乐和声音设计细节，对结构俱乐部音乐产生了不可磨灭的影响。", "chapter": "Ethnic", "examples": ["Yambadi Mama - Konono N°1 / Batida [1:32起始]"]}, "afrobeat": {"name": "Afrobeat", "ups": ["Breakbeat", "Afro Music", "Hip-Hop"], "downs": ["Amapiano", "Afropiano"], "aka": "Afro Beats", "related": "", "desc": "Nation: Nigeria/尼日利亚 Afrobeat是一种融合了西非音乐元素的Breakbeat风格，出现于上世纪七十年代的非洲，在近年来逐渐脱离Breakbeat元素，反而加入了更多R&B元素和电子流行元素，并在世界范围内逐渐流行，影响了Afro Trap、Afro Drill等风格。它还受到美国爵士乐、灵魂乐和放克乐的影响，常常加入Soulful、高亢的人声、复杂的交叉结构和类似原声乐器的打击乐。Afrobeat音乐主要发明人是尼日利亚乐手Fela Kuti和他的乐队Nigeria 70，他常在音乐中将政治理念融合进去。在一次美国巡演后，Fela Kuti造了Afrobeat一词来形容他的音乐。", "chapter": "Ethnic", "examples": ["Commando - King Promise [1:06起始]"]}, "azonto": {"name": "Azonto", "ups": ["House", "Hip-Hop", "Afrobeat"], "downs": [], "aka": "", "related": "", "desc": "Nation: Ghana/加纳 Azonto首次出现在2010s前期的阿克拉沿海地区，这种音乐充满活力和激情，伴随着热舞引燃了加纳年轻人的热情。Azonto生来是为了音乐而出现的，因此Azonto常常注重舞曲节拍，更多的使用Hip-Hop元素。Fuse ODG是这种风格的先驱，同名歌曲《Azonto》也是这种风格的热门单曲，具有朗朗上口的歌词与易于舞蹈的节拍。Sarkodie的热门曲目《You Go Kill Me》也为这种风格添加了新的魅力。Azonto 超越了加纳的根源，在国际舞台上获得了认可。它成为全球舞蹈界的轰动，吸引了全世界艺术家、舞蹈家和音乐爱好者的关注。“Azonto Fever”蔓延到非洲和侨民，音乐视频、舞蹈挑战和受 Azonto 启发的活动成为一种全球现象。像阿萨莫阿·吉安（Asamoah Gyan）这样的加纳国际足球运动员将这种舞蹈融入了他们获胜的特技和动作中。", "chapter": "Ethnic", "examples": ["Balaya - A-Star [0:47起始]"]}, "balani show": {"name": "Balani Show", "ups": ["Electro", "Percussion Music(Instrument: Djembe", "Balafon etc.)"], "downs": [], "aka": "", "related": "", "desc": "Nation: Mali/马里 Balani Show是诞生于马里共和国首都巴马科的一种以当地打击乐和Balafon的演奏为基的特殊电子音乐。在Balani Show音乐中，速度常常被提升到170BPM左右，主要配器除了合成器以外就是balafon，也就是一种大木琴。早期Balani Show使用扬声器播放balafon旋律，如今则是被更加经济的合成器取代。Balani Show的产生是逐渐被发现的，Balani Show音乐人常常组队在街头庆祝活动或族群聚会上演奏音乐。这种音乐在巴马科年轻人群体里十分受欢迎，即便其遭到伊斯兰极端组织的威胁和传统音乐家的反对。代表专辑: 《Balani Show Super Hits - Electronic Street Parties from Mali》(2014)。", "chapter": "Ethnic", "examples": ["Goni Bala - DJ Bamanan [1:24起始]"]}, "coupé-décalé": {"name": "Coupé-décalé", "ups": ["EDM", "Electro Pop", "West Coast Folk Music"], "downs": ["Zouglou"], "aka": "", "related": "", "desc": "Nation: Côte d’Ivoire/科特迪瓦 Coupé-décalé是一种原产于科特迪瓦阿库佩的舞曲，灵感来源于阿库佩村的传统民族舞。音乐特点是充满热带风情的节拍和舒缓的歌唱。不过跟Zouglou不同的是，Coupé-décalé实际上是法国巴黎的夜总会诞生出的风格，居住在巴黎的科特迪瓦年轻人用这种音乐来抒发享乐情绪和对家乡的歌颂。在这种音乐重新回归到科特迪瓦时，该运动在科特迪瓦所有的夜总会风靡一时。Coupé一词据说是表示欢饮达旦的意思，而记者Usher Aliman采集到的传说是，两个词分别来自于“On coupe”和“On décalé”，意思就是“我们被骗，我们跑路”，一定程度上反映了这种场景在法律上的越界性。 Coupé-décalé不仅是一种音乐，一种舞蹈，更是一种时尚。截止2011年，这个词已经成为一张新的音乐现象，让科特迪瓦人在热舞中忘记经济政治军事上的多重压力。如今的Coupé-décalé已经融合了很多国家的音乐，包括刚果等，并且涌现了一批年轻的DJ如DJ Arafat、Debordeau、Mix Premier、Douk Saga等。代表专辑:《Héros national bouche-bée》(2011)", "chapter": "Ethnic", "examples": ["Saga cité - Douk Saga [1:24起始]"]}, "zouglou": {"name": "Zouglou", "ups": ["Coupé-décalé", "HI-NRG", "EDM", "West Coast African Music"], "downs": [], "aka": "", "related": "", "desc": "Nation: Côte d’Ivoire/科特迪瓦 Zouglou是诞生于科特迪瓦(象牙海岸)的一种电子舞曲风格，起源于流行于1960~1970的科特迪瓦民族音乐风格tohourou和aloucou。Zouglou初诞生于1980年代科特迪瓦阿比让Felix Houphouet-Boigny 大学生运动比赛的表演歌曲，在tohourou和aloucou的基础上加入了有趣的声音切片和即兴说唱这种音乐流行于2010s的大学生群体，极重的非洲节拍和法语快嘴说唱风格以及表达自由与狂欢主题的合成器旋律是其特征。2011年后Zouglou音乐产出平平，但是仍是科特迪瓦最受欢迎的电子舞曲流派，并且添加了很多新的元素。有趣的是，Zouglou并没有明确的词根源，而是形容这类音乐播放时学生张扬古怪的舞姿；一说是来源于短语“be ti lè zouglou”（它们像垃圾一样堆积如山），来源于Baoulé嘲讽大学生宿舍恶劣环境的报道。 Zouglou代表乐队： Magic System、Les Garagistes、Les Poussins Chocs等。参考专辑: 《D'Abidjan à Paris》(2012)。 参考文章： https://www.musicinafrica.net/magazine/zouglou-c%C3%B4te-d%E2%80%99ivoire", "chapter": "Ethnic", "examples": ["Chérie Coco (feat. Soprano) - Magic System / Soprano [1:07起始]"]}, "shangaan electro": {"name": "Shangaan Electro", "ups": ["South-Afrian Folk Music", "Free Tekno", "EDM"], "downs": [], "aka": "Tsonga Electro", "related": "", "desc": "Nation: South Africa、Mozambique/南非、莫桑比克 Shangaan Electro顾名思义就是Shangaan部落的民族电子音乐，实际上也确实如此。这种独特的风格诞生于2005年左右，自由即兴且欢快，吸收了莫桑比克南部和南非北部的Shangaan部落的音乐，将歌曲速度拉高到190BPM上下，并消去了大部分低音与沉重底鼓，使音乐即便听起来很快，但是充满了轻盈或者忙碌的感觉。这类音乐也被互联网媒体幽幽默风趣地称为“未来环保主义部落音乐” Shangaan Electro与Mbaqanga Jazz、Township Bubblegum、Tsonga Disco、Kwaito等音乐均有交集，创造者是Nozinja。其开创的同名厂牌让Shangaan Electro音乐在五年后打入世界市场，并在2015年形成小幅度复兴。该流派另一个代表性人物是DJ Khwaya，即便没有任何宣传，但他的音乐仍然在南非很受欢迎。现如今的Shangaan Electro音乐保持在地下的活跃，但是仍有不少制作人在网上坚持不懈地推出新音乐，甚至受到Warp Music厂牌的赞赏。推荐专辑: 《New Wave Dance Music from South Africa》(2010).", "chapter": "Ethnic", "examples": ["Nwampfundla - Tshetsha Boys [1:08起始]"]}, "xigaza": {"name": "Xigaza", "ups": ["South-Afrian Folk Music", "EDM", "Shangaan Electro"], "downs": [], "aka": "", "related": "", "desc": "Nation：Mozambique/莫桑比克 Xigaza是使用聪加语演唱的一种电子音乐，起源于莫桑比克南部的Shangaan部落。Xigaza一定程度上收到了Shangaan Electro的影响，但是听觉上聪加语电子流行乐的成分和嘻哈音乐对其的影响更加重，拥有充满活力的电子节拍和说唱hooks。Xigaza近年来越来越受主流电子音乐界的偏爱，逐渐走出地下，成为了聪加语文化的一个标志。", "chapter": "Ethnic", "examples": ["Va Ta Nyuma - KingWill [1:26起始]"]}, "mahraganat": {"name": "Mahraganat", "ups": ["Egypt Folk Music", "Hip-Hop", "EDM", "Global Bass"], "downs": ["Zanig"], "aka": "Electro Shaabi", "related": "", "desc": "Nation: Egypt/埃及 Mahraganat是一种埃及街头电子音乐风格，富有激情而激烈，在Hip-Hop和非洲节奏中做出了良好的中和，融合了埃及Shaabi音乐，在中东地区和欧美地区取得了相当大的人气。Mahraganat是埃及电子舞曲制作人3Phaz创造的风格，是Shaabi音乐的夸张化演绎，歌曲充斥着不和谐音程、极简主义合成器、类匪帮说唱的气氛、夸张的鼓点以及节日庆祝般的氛围。这类俱乐部式的音乐非常受埃及年轻人喜欢，嘈杂响亮的合成器旋律和爆响的电子鼓以及杂乱而不喧宾夺主的原声鼓采样让Mahraganat一夜之间成为埃及顶流风格，这也导致保守到极点的埃及音乐家工会的Hany Shaker立即出台政策禁止了这种音乐。现在越来越多的网络制作人甚至日本曲师也在尝试将Mahraganat的节拍融入作品中，这也让我们看到Shaabi音乐和其所代表的埃及节拍的未来。代表制作人: 3Phaz、Hamo Bika、Oka wi Ortega等。 相关网站资料: https://www.billboard.com/music/music-news/what-is-mahraganat-music-9343924/", "chapter": "Ethnic", "examples": ["Drill - 3Phaz [2:33起始]"]}, "guaracha [edm]": {"name": "Guaracha [EDM]", "ups": ["Cuban Dance Music", "Reggaeton etc."], "downs": [], "aka": "", "related": "", "desc": "Nation: Cuba/古巴 Guaracha是一种起源于古巴的舞曲，节奏快，歌词常常很滑稽。Guaracha一词适应时间实际上相当早，约在18世纪末到19世纪初就有使用，现今一般描述的Guaracha是一种电子舞曲的描述，主流表达方式是Guaracha [EDM]。Guaracha音乐最开始是在音乐剧和工人的舞蹈沙龙中被演奏，到今天一些电子音乐人将Cuban Jazz、Bolero和Reggaeton/Dancehall融合到Guaracha中，就形成了在全世界范围内相当流行的Guaracha [EDM]。Guaracha [EDM]音乐在听感上与Twerk、Moombahton和Dancehall有相似之处，这也是拉丁节奏的特征之一。", "chapter": "Ethnic", "examples": ["Bola Rebola - Tropkillaz / J. Balvin / Anitta / ZAAC [1:36起始]"]}, "rabòday": {"name": "Rabòday", "ups": ["Dance Pop", "Haitian Folk Music"], "downs": [], "aka": "", "related": "", "desc": "Nation: Haiti/海地 Rabòday是诞生于2000s中后期的海地的一种民族电子舞曲，起源于Rasin Music，即海地民族根源摇滚。Rabòday的概念来源于海地乐队Djakout的主唱Pouchon Duverger。当时该乐队意外的即兴创作了这种节奏，创造了Rabòday最开始的声音。Rabòday混合了传统海地流行音乐的节奏与海地根源摇滚的特色，创作者往往在其中添加一些政治社会理念。尤其在2010年海地大地震之后，Rabòday音乐也成为了海地年轻一代表达自己理想理念的途径之一。", "chapter": "Ethnic", "examples": ["Bengala (feat. Dj Xandy) - DJ SHYNE / DJ Xandy"]}, "zouk": {"name": "Zouk", "ups": ["African Folk Music", "Electro", "EDM"], "downs": [], "aka": "", "related": "", "desc": "Nation: Saint Lucia、France/圣卢西亚，法国 Zouk是一种流行于东加勒比海群岛地区的流行舞曲，主要是在圣卢西亚、多米尼加、海地和法国的瓜德罗普岛、马提尼克岛一带流行。Zouk融合了各种加勒比、非洲和北美的音乐风格，特色是其复杂的混音技术。法属安的列斯克里奥尔语术语Zouk最初是用来形容瓜德罗普岛和马提尼克岛上的通宵舞会，在舞会上播放的音乐一般被称为“Miziki Zouk”，这种音乐融合了海地流行乐(Compas和Cadence)、两岛的Beguine音乐和Cadence-lypso舞曲(一种海地节奏与特立尼达和多巴哥的Calypso舞曲的混合体，于1970s在多米尼加流行)。Zouk最初诞生于1979年的瓜德罗普混音师兼贝斯手Pierre-Edouard Décimus和吉他手Jacob Desvarieux组成的乐队Kassav'之手。1984年，随着乐队歌曲《Zouk-la sé sèl médikaman nou ni》取得商业上压倒性的成功，Zouk被公认为一种新的加勒比电子舞曲流派，并且成为了两岛和多米尼加、圣卢西亚的列斯克里奥尔语社区的文化标志。", "chapter": "Ethnic", "examples": ["Wép - Kassav' [1:33起始]"]}, "trival": {"name": "Trival", "ups": ["Ethnic Music", "EDM", "Hip-Hop", "Tribal Culture"], "downs": [], "aka": "Tribal Guarachero, 3ball", "related": "", "desc": "Nation: Maxico/墨西哥 Trival是诞生于2001年前后，发展于2007年，流行于2010s后的一种拉丁美洲电子舞曲，起源于墨西哥城，结合了哥伦比亚音乐和古巴音乐的特色。Trival最鲜明的特色是融合了当代墨西哥民族音乐如Technobanda、Tierra Caliente，并且吸收了其他电子舞曲风格的影响如Techno、Electro House、Reggaeton等，速度在140BPM到280BPM之间浮动。Trival现在最主要的发展地在哥伦比亚，并且涌现了一批知名的Trival制作人比如Victor Cardenas、Deyvi、DJ Travesura等，尤其是Farruko的Pepas这首歌，在整个欧美地区都相当流行。", "chapter": "Ethnic", "examples": ["Pepas - Farruko [0:49起始]"]}, "vude": {"name": "Vude", "ups": ["Fiji Folk Music", "Jazz/Blues", "Disco", "Rock", "Reggaeton", "Poem"], "downs": [], "aka": "", "related": "", "desc": "Nation: Fiji/斐济 Vude是斐济传奇女歌手Laisa Vulakoro创造的一种民族流行乐，融合了Disco、Rock、黑人流行乐和当地传统Meke节拍。Laisa Vulakoro于1981年正式投入音乐制作，并且加入了Bill Beddos的乐队Nostradamus Band，成为Melaia Dimuri的伴唱。Vulakoro在她怀上第一个孩子之后离开了沃里克，回到家乡在酒店演唱黑人流行乐或乡村音乐以供给生存。当时她认为，作为一名原住民艺术家，她不应该专注于爵士乐，而应该开发自己国家的音乐，于是她融合了Meke节拍，创造了Vude音乐，并根植于此数十年。如今随着互联网的普及，Vude音乐受到了新的一批网络制作人传承，成为了斐济不可磨灭的文化标志，甚至Vulakoro也被当地人推举为政治领袖，可见Vude音乐对斐济人的重要性。", "chapter": "Ethnic", "examples": ["Sweer Papadam - Laisa Vulakoro [1:01起始]"]}, "jazz fusion / electro jazz": {"name": "Jazz Fusion / Electro Jazz", "ups": ["Jazz", "Pop Music", "Electronic Music"], "downs": ["Nu Jazz", "Jazz Funk", "ECM Style Jazz", "Smooth Jazz", "Dark Jazz", "Jazztronica", "Jazz House", "Jazz Hop"], "aka": "Fusion、Fusion Jazz、Electronic Jazz、E-Jazz、Phusion、Future Jazz", "related": "", "desc": "Electro Jazz是一种结合了爵士乐、电子音乐和世界音乐元素的流派。它通常以现场乐器为特色，如铜管乐器和打击乐器，以及电子节拍和采样。音乐的特点是欢快和可跳舞的节奏，并融合了放克、灵魂和拉丁音乐的元素。近年来，这种流派越来越受欢迎，艺术家们将传统的爵士乐声音与现代电子制作技术相结合。 Nu Jazz是与Electro Jazz密切相关的一个条目，是1990s及以后一系列新式爵士乐的统称。这类爵士乐常常与Funk、Soul、EDM、Free Improvasation融合，概念上大体与Electro Jazz相同，此处暂不区分。", "chapter": "Fusion", "examples": ["Don't Shake(Ke-Ki Bootleg)  - 傅俊铭", "Forget It - Trix", "Future Shock - Herbie Hancock"]}, "alternative dance/indie dance": {"name": "Alternative Dance/Indie Dance", "ups": ["Post-Disco", "Electro", "Alternative Rock"], "downs": ["Baggy", "Grebo"], "aka": "", "related": "", "desc": "另类舞曲结合了拥有电子音乐结构、合成器采样和Post-Disco的展开方式和轻松的另类摇滚/独立摇滚风格。近年来大量另类流行/摇滚艺术家用电子舞曲来试验时，另类舞曲便得到了长足发展，并在线下获得了不小的人气，即便他看上去并不具备取代俱乐部电子舞曲的能力，但是凭借其对流行乐的亲和力和易结合性，另类舞曲还是成为另类摇滚文化的一种重要形式，并且吸引了更多怀揣着不同理念的艺术家将另类舞曲打造成形态各异的风格。New Order被认为是第一支另类舞曲组合，他们在1982~1983年的录音中出现了这种冰冷阴暗的后朋克与Kraftwerk的电子舞曲相结合的风格，被认为是另类舞曲的先河，并对Bristol Sound、Trip Hop音乐产生了影响。", "chapter": "Fusion", "examples": ["Get Innocuous! - LCD Soundsystem"]}, "baggy": {"name": "Baggy", "ups": ["Alternative Dance", "Psy Rock", "Indie Rock", "Britpop", "Dream Pop"], "downs": [], "aka": "Madchester", "related": "", "desc": "Baggy是英国80年代末至90年代初流行的独立舞曲风格Madchester的更通俗叫法，以其演奏者服装宽松合体而得名，与视觉上更邋遢更随性的Grebo区别开来。 Madchester是一种摇滚流派，于 1980 年代末和 1990 年代初在英国曼彻斯特发展起来。从现场出现的音乐混合了独立摇滚、迷幻摇滚和舞曲。与现场相关的艺术家包括 The Stone Roses、Happy Mondays、Inspiral Carpets、808 State、James、The Charlatans、A Guy Called Gerald 和其他著名乐队。", "chapter": "Fusion", "examples": ["Hearts And Minds - The Farm"]}, "grebo": {"name": "Grebo", "ups": ["Alternative Dance"], "downs": [], "aka": "Grebo Rock、Fraggie Rock、Fraggie", "related": "", "desc": "Grebo一词是由音乐报纸Melody Maker和NME创造的，指的是一种短暂的音乐风格和亚文化，集中在20世纪80年代末至90年代初的英国中部，是多种流派（Noise Pop、Hip-Hop、Indie-pop、Indie Rock、Industrial Rock、Plunderphonics、Punk Rock）的混合。声音是原始的、有未来感的，主题通常是冷战结束、信息时代的开始。Grebo诞生在80年代末/90年代初，伴随着涵盖朋克另类摇滚的狂欢亚文化出现，站在独立舞蹈、说唱摇滚和工业摇滚风格的邋遢一面，甚至融合了一些Crust Punk的理念，深受当时英国反主流朋克爱好者的喜爱。", "chapter": "Fusion", "examples": ["Surfin' U.S.M. (2012 Remaster) - Carter the Unstoppable Sex Machine"]}, "electro rock": {"name": "Electro Rock", "ups": ["Rock", "Electronics/Electro"], "downs": ["Dance Rock"], "aka": "Synthrock, Electrorock, Techno-rock, Digital Rock", "related": "", "desc": "Electro Rock是一个定义宽泛的术语，穿插在电子音乐和摇滚乐之间的音乐风格，在二者间做出了良好的平衡，不仅保留了摇滚独有的结构与配器，还创新性的加入了来自电子琴/合成器/计算机编曲软件的电子声响。这种相对较新的音乐流派的创作实际上始于 1950 年代，并缓慢发展到 1960 年代后期。然而，直到MIDI的发明，使许多电子乐器能够相互通信，并使乐器能够更容易和有效地演奏和录制，电子音乐和电子摇滚才完全融入音乐界。有些制作人甚至全盘使用合成器或编曲软件制作摇滚乐，这些不同场景诞生的特殊摇滚乐被统称为“Electro Rock”。", "chapter": "Fusion", "examples": ["玫瑰公园 - 超级市场", "Government Hooker - Lady Gaga"]}, "dance rock": {"name": "Dance Rock", "ups": ["Electro Rock", "Disco/HI-NRG"], "downs": [], "aka": "", "related": "", "desc": "Dance Rock是一种将舞曲的节奏与摇滚的原始能量相结合的流派。它的特点是大量使用电子乐器和合成器，以及朗朗上口的Hooks和Driving节拍。音乐通常具有复古的感觉，从 80 年代的新浪潮和后朋克中汲取灵感。人声通常带有紧迫感和激情，或者冷静严肃，增加了声音的整体强度，使得音乐具有更好的可舞蹈性。现在的Dance Rock代表乐队包括The Prodigy、Burka Band等。", "chapter": "Fusion", "examples": ["Your Silent Face - New Order", "I Care For You - Burka Band"]}, "future rock": {"name": "Future Rock", "ups": ["Electro Rock", "Space Rock", "Hardcore Punk"], "downs": ["7924|Future Rock是近几年形容一类模糊了电子音乐与摇滚乐范畴的摇滚乐", "这类摇滚乐将沉重的吉他即兴演奏与电子元素相结合", "创造出一种未来主义和电影般的声音。歌词经常探讨科幻小说", "技术和人类状况等主题。人声范围从强大和情感到扭曲和机器人", "增加了整体未来主义的氛围。音乐通常伴随着视觉上令人惊叹的现场表演。这类音乐的代表乐队包括STARSET", "Rave The Reqvien", "Rabbit Junk等。"], "aka": "", "related": "", "desc": "", "chapter": "Fusion", "examples": ["Monster - STARSET"]}, "rocktronic": {"name": "Rocktronic", "ups": ["Pop Rock", "Metal", "Melodic Bass", "Midtempo", "House"], "downs": [], "aka": "", "related": "", "desc": "下位: 约2022~2023期间兴起的一种制作手法，参考了Electronica的概念，Rocktronic代指那些将摇滚元素融入电子音乐的作品使用的手法，也被作为这类音乐的代名词。与Electro Rock不同的是，Electro Rock仍保留着原始的摇滚节奏，电子成分更像是一种锦上添花的元素，或是二者之间做到了良好的平衡。而Rocktronic则是将摇滚的吉他Riff等元素融合到EDM风格当中，例如以Melodic Dubstep/Speed Bounce为基础，将Drop的音色换成流行摇滚或华丽金属的Breakdown听感。目前制作这类音乐的制作人往往是EDM制作人，比如ILLENIUM等。", "chapter": "Fusion", "examples": ["Back 2 U - Bumpy / VANGUARD RECORDS"]}, "berlin school": {"name": "Berlin School", "ups": ["Krautrock", "Progressive Electronics"], "downs": ["Kosmische Musik", "Trance"], "aka": "", "related": "", "desc": "The Berlin School of electronic music，或简称Berlin School，译作“柏林学派”。是 1970 年代电子音乐的发展，由Klaus Schulze、Tangerine Dream和Ashra等柏林艺术家塑造。这种风格的特点是高音域的电吉他或合成器旋律高亢，伴随着复杂、变化的模拟音序器贝斯线。首席独奏者温暖、人性化的即兴创作与贝斯线冷酷、机器人般的精确度形成了鲜明的对比。经常添加风声效果，以及 Mellotron 合唱团、长笛或弦乐的洗涤声来增色。实验性或环境拉伸也并不罕见，尤其是作为介绍。大多数作品都是器乐性的，人声很少使用。 柏林学派是Krautrock的产物，之所以如此命名，是因为其大多数早期该风格的艺术家都来自德国柏林。该流派对太空音乐的认同使其与更具打击乐和节奏导向的Düsseldorf School不同，Düsseldorf School包括 Can、Cluster、Kraftwerk 和 Neu！。柏林学派过去是，现在仍然是一种相对独立的风格，对音乐的影响虽远不如Kraftwerk对Synth Pop和EDM的影响，但Ambient、Electronica、New-Age和Trance在一定程度上植根于柏林学派。该流派有时被认为是New-Age或Ambient的一个子分支，尽管它早于这两个术语的广泛使用。", "chapter": "Fusion", "examples": ["Love On A Real Train - Tangerine Dream"]}, "düsseldorf school": {"name": "Düsseldorf School", "ups": ["Krautrock"], "downs": [], "aka": "", "related": "", "desc": "Düsseldorf School 是一个音乐风格术语，通常用于描述德国杜塞尔多夫的音乐家们在 1970 年代末和 1980 年代初创建的电子音乐风格。这种音乐风格以其冰冷的氛围、重复的节奏和简化的旋律而闻名，并对随后的工业音乐和 techno 音乐产生了重大影响。Düsseldorf School与概念主义和极简主义也有关联，因此一些Krautrock曲目也属于这个学派。同样的，Düsseldorf School命名原因是因为大多数该风格的缔造者都来自德国杜塞尔多夫。", "chapter": "Fusion", "examples": ["Neu75! - The Heads"]}, "electronicore": {"name": "Electronicore", "ups": ["Nintendocore", "Melodic Metalcore", "Trance", "Pop Punk", "Deathcore", "Synth Pop"], "downs": ["Synthcore", "Trancecore (Fusion)", "Cybergrind"], "aka": "", "related": "", "desc": "Electronicore，国内硬核朋克圈一般称之为“电子核”。电子核是一种将Metalcore、Post Hardcore与电子音乐结合的类型，融合了合成器、Sample和编程鼓等电子元素。该流派通常具有明显的Glitch元素、尖叫的人声和干净的歌声。它结合了Metalcore的侵略性和强度与电子音乐的朗朗上口和舞蹈性。这种类型的乐队经常尝试不同的声音和纹理，创造出独特而动态的声音。 Trancecore是一个与Electronicore相关的术语，代指Trance Metal与Post Hardcore融合的产物，不代表HDM领域内的Trancecore。有时Electronicore与Trancecore可以互换概念，但是实际上二者是两种较为相近的风格。", "chapter": "Fusion", "examples": ["Angry People - Rabbit Junk (欧美系)", "Freely - PassCode (日韩系)"]}, "digital hardcore": {"name": "Digital Hardcore", "ups": ["Hardcore Punk", "Hardcore", "Techno", "Breakbeat etc."], "downs": ["Cybergrind", "Breakcore"], "aka": "", "related": "", "desc": "数字硬核是一种融合了硬核朋克和电子音乐元素的音乐类型，尤其是Breakbeat、Gabber、Raggacore、Post-Industrial。它于 1990 年代初期在德国发展起来，追随 Alec Empire 和 Atari Teenage Riot 等艺术家，蓬勃发展的场景以 Alec 的独立 DHR 标签为中心。它通常是高节奏和粗糙的，将Hardcore Punk和Riot Grrrl 的速度、沉重和态度与Hardcore Techno、Drum & Bass以及Industrial Rock等电子音乐相结合，同时有时也表现出与实验性噪音的密切关系。Digital Hardcore后面逐渐消失，并且分化出了Electronicore、Breakcore、Industrial Hardcore (New School)等分支的部分展示场景。 保留了电吉他的使用，并与采样器、合成器和鼓机一起演奏。虽然需要使用吉他和电子乐器，但传统的低音吉他和架子鼓是可选的。人声更多的是由乐队的一名以上成员大喊大叫而不是唱歌。通常，歌词是高度政治化的，并拥护左翼或无政府主义理想。", "chapter": "Fusion", "examples": ["Speed - Atari Teenage Riot"]}, "cybergrind": {"name": "Cybergrind", "ups": ["Grindcore", "Electronicore", "IDM", "Speedcore", "EDM", "Digital Hardcore"], "downs": ["Gabbergrind", "Cyber Goregrind", "Animegrind", "Dance Grindcore"], "aka": "Electrogrind", "related": "", "desc": "Cybergrind 是极端金属的一个子流派，结合了 Grindcore、电子音乐和实验噪音的元素。音乐的特点是快速、激进的鼓声、失真的吉他和经过大量处理的人声。歌词经常涉及技术、反乌托邦和社会评论等主题。该流派以其强烈而混乱的声音而闻名，节奏和风格常常在行进的过程中突然改变。Cybergrind起源于1990s后期的美国，并在日本演化出了更加具有特色的分支Gabbergrind(将Gabber/Terrorcore融入Cybergrind模式中)，代表乐队或个人包括：Agoraphobic Nosebleed、Igorrr、OZIGIRI等。", "chapter": "Fusion", "examples": ["Rejection Sensitivity Dysphoria - Thotcrime", "Jelly Tits (ゼリーおっぱい) - Alien Fucker"]}, "coldwave": {"name": "Coldwave", "ups": ["Post Punk", "New Wave"], "downs": ["Minimal Wave", "Dark Wave"], "aka": "", "related": "", "desc": "后朋子分支，起源于1970年代末至1980年代初的欧洲，黑暗、简约且对合成器高度依赖，主要在欧洲（尤其在法国、波兰、比利时）流行，并且主要由受英国后朋影响的乐队如Joy Division、Siouxsie、The Banshees组成。Coldwave继承了朋克的DIY美学，但听起来更“冷”，更被约束，并且通常无感情、声音超脱。Coldwave在1990年代受欢迎程度开始下降，2000年代初至中期重新兴起，这次复兴浪潮也催生了一个叫Minimal Wave的新流派。", "chapter": "Fusion", "examples": ["Minimum Love - Cephalosis"]}, "post punk revival": {"name": "Post Punk Revival", "ups": ["Post Punk", "Dance Punk", "Electroclash", "Proto Punk", "New Wave"], "downs": ["New Wave", "Maidcore"], "aka": "", "related": "", "desc": "起初，Post Punk是为了描述那些在 1970 年代末和 1980 年代初采用朋克并开始尝试更具挑战性的音乐结构、抒情主题和自觉的艺术基础形象的团体，同时保留朋克最初的反传统立场，如Joy Division、The Cure、Public Image Ltd.等乐队制作的音乐。在世纪之交，Post Punk再次出现在公众视野里，许多评论家用Post Punk来形容一类新的乐队制作的音乐，这些乐队吸收了Proto Punk的美学特质，融合了舞曲元素，可视为是Dance Punk的一部分，符合这一特质的乐队包括The Strokes、The Killers、The Bravery、The Rapture等。另外这段时间俄罗斯出现了吸收了Minimal Wave声音特质的、电子味道更浓厚的Post Punk，经常被称为“东欧后朋克”，代表乐队是Human Tetris、Molchat Doma等。这两个场景统称为“Post Punk Revival”运动。", "chapter": "Fusion", "examples": ["Клетка - Molchat Doma"]}, "new rave": {"name": "New Rave", "ups": ["Post Punk Revival", "New Wave", "Alternative Rock", "Acid House", "Disco"], "downs": [], "aka": "Nu-Rave", "related": "", "desc": "New Rave是一种融合了New Wave、Alternative Rock、Acid House、Disco等一系列元素的音乐类型，且风格多变。New Rave首次在2006年的英国出现，并流行于2008年，在2010年后该风格热度逐渐下降。New Rave起源于Post Punk Revival场景，是Dance Punk与Electroclash的孪生兄弟，但本身保持了类似Dance Punk的结构，但摇滚成分更接近于Electroclash。New Rave一词最早出现于《New Musical Express Magazine》上，被用来定义一种结合了New Wave与EDM的新风格。New Rave美学一定程度上与Rave场景美学有相似之处，荧光装饰等事物在演出现场随处可见，事实上有人认为New Rave是由乐队和支持者的形象和审美定义的，而非一些模糊的声音标准。 New Rave在我国相对其他后朋克来说更易于接受，有趣的是，大张伟在2014年创作的歌曲《倍儿爽》就是New Rave风格的音乐，因此不是网友谬传的“抄袭《江南Style》的风格”。", "chapter": "Fusion", "examples": ["Levitate - Hadouken!"]}, "maidcore": {"name": "Maidcore", "ups": ["Post Punk Revival", "Post Rock", "Post Metal", "Chiptune", "Synth Pop"], "downs": [], "aka": "", "related": "", "desc": "俄罗斯的女仆乐场景，常使用老旧的合成器和效果器声音，用强烈的反差和厚重的、类似Shoegaze的声场创造出致幻的效果。歌曲常常是抑郁的、病态的，反映了当代俄罗斯或者说全世界的青年一代的迷茫惶恐。Maidcore音乐涵盖范围相当广，虽然主要内容是Post Punk Revival和New Rave，但是也有制作人制作Indie Dance或者Electronica，这些场景统称为“Maidcore”。 Maidcore最开始是一类网络文化现象的统称，核心在俄罗斯而非日本，最初围绕一个叫做Toshiaki的女仆meme圈子(2004)产生，并且出现了一系列女仆形象(被称为“Nijiura Maids”)。2013年，俄罗斯互联网有人采用了Yakui The Maid的笔名创作音乐，因此Yakui The Maid变成了Maidcore音乐的奠基人，见证了后续Yabai The Maid、Ozoi The Maid、Iya The Maid等互联网音乐人的出道。2016年，专辑《Wonderland》发布，更多的人参与到2ch的Maidcore社区中，一定程度上却也拉低了制作的平均水平，甚至出现了盗用名称发布其他风格的曲目的现象，比如专注于使用老式苏联合成器和电脑编曲软件、电吉他的Yakui The Maid主攻Post Punk Revival，但是有人盗用其名称创作劣质的Noisecore音乐等。", "chapter": "Fusion", "examples": ["Narcolepsy - Yakui The Maid"]}, "new wave": {"name": "New Wave", "ups": ["Post Punk", "Disco/Pop"], "downs": ["Dark Wave", "Minimal Wave", "New Romantism"], "aka": "", "related": "", "desc": "新浪潮出现于1970年代后期，很大程度上受到1970年代中期朋克摇滚、流行摇滚的影响，后朋几乎与它同期出现。新浪潮依赖激进的电吉他旋律、复古合成器音色和大多数4/4拍导向的节奏。早期像Afrobeat、Disco等对这一流派产生了强烈的影响，Power Pop和Synth-pop也与新浪潮密切相关，新浪潮也与1980年代相关美学和音乐风格有交集。1990年代开始走下坡路，2000年代出现在很多Indie Rock（独立摇滚）中。", "chapter": "Fusion", "examples": ["Call Me - Go West"]}, "neue deutsche welle": {"name": "Neue Deutsche Welle", "ups": ["New Wave", "UK Post Punk", "Schlager", "Electro"], "downs": ["Neue Deutsche Härte"], "aka": "NDW", "related": "", "desc": "诞生于1979年末期的西德的地下运动，根源来自英国的Post Punk和美国的New Wave。这种风格融合Schlager特色，受Punk Rock、Synth Pop、Synth Punk、Post-Industrial影响，速度一般比主流美国New Wave快，更有工业感，并影响之后的Neue Deutsche Härte音乐。", "chapter": "Fusion", "examples": ["Fluss - Rheingold"]}, "dark wave": {"name": "Dark Wave", "ups": ["New Wave", "Cold Wave"], "downs": ["Neoclassical Dark Wave"], "aka": "", "related": "", "desc": "从New Wave中出现的子流派，借鉴了后朋风格，结合了黑暗、内省、悲伤、哥特式的氛围，虽然本属后朋子分支，但艺术家们逐渐开始加入合成器和鼓机，最终变成了一种黑暗的电子音乐，且尤其受Synth-pop的影响。Dark Wave一词也涵盖了摇滚中黑暗、哥特式的流派。", "chapter": "Fusion", "examples": ["Amelia - Cocteau Twins"]}, "ethereal wave": {"name": "Ethereal Wave", "ups": ["Darkwave", "Gothrock"], "downs": ["Synth Pop"], "aka": "", "related": "", "desc": "Dark Wave的一个子流派，由Cocteau Twins、This Mortal Coil和早期的Dead Can Dance开创。特点是大气质感的其他和女高音人声，营造出空灵、超现实和超凡脱俗的效果，也经常使用回声延迟等效果。Ethereal Wave最初从哥特摇滚场景演变而来，所以哥特摇滚对此流派产生了主要的影响，尽管后来许多艺术家受Dream-pop的影响较大。4AD Records和Projekt被普遍认为是Ethereal Wave最重要的两个厂牌。", "chapter": "Fusion", "examples": ["Nothing's Wrong - Tearwave", "The Bitter End - Girls Under Glass"]}, "neoclassical dark wave": {"name": "Neoclassical Dark Wave", "ups": ["Dark Wave", "Neo Classical"], "downs": [], "aka": "Neo Classical Dark Wave、Neoclassical Darkwave、Neo Classical Dark Wave", "related": "", "desc": "将黑暗忧郁的气氛与西方古典音乐相结合的流派，由乐队Dead Can Dance、Black Tape for a Blue Girl开创。这类音乐常常将Dark Ambient、古典音乐、空灵的人声混合在一起，常见乐器有钢琴、大提琴和其他弦乐器，Neo Folk也经常与Neoclassical Darkwave混合。", "chapter": "Fusion", "examples": ["Sis puella magica! - 梶浦由記"]}, "electro-darkwave": {"name": "Electro-Darkwave", "ups": ["Darkwave", "Post-Industrial"], "downs": ["Darkwave Synth"], "aka": "Electro Darkwave、Electro Dark Wave", "related": "", "desc": "Darkwave的两个主要分支是Ethereal Wave和Neoclassical Darkwave，此外，不少Darkwave爱好者也定义了Darkwave的第三大分支，称之为“Electro-Darkwave”。它的定义很简单：使用合成器和其他电子手段来营造与哥特摇滚类似的氛围的音乐类型。这一流派在德国曾被称为“Electrowave”，但由于近年来其他电子音乐风格的持续发展，可能会引发争议而弃用。一般来说Electro-Darkwave有两种形式：有着Darkwave式氛围的Dark Synth-pop，和受到EBM（如Project Pitchfork、In Strict Confidence）、Electro-Industrial（如L'âme Immortelle、Die Form）和Futurepop（如Diorama、BlutEngel）的影响的Darkwave作品。在Electro-Darkwave场景中还有一种被称为“Darkwave Synth”的新潮流，这是一种借鉴了80年代早期的Minimal Wave/Coldwave等流派的音乐。", "chapter": "Fusion", "examples": ["Seelenschmerz - Blutengel", "Zauberschloss - In Strict Confidence"]}, "darkwave synth": {"name": "Darkwave Synth", "ups": ["Electro-Darkwave", "Synth-pop", "Coldwave", "Gothic Rock"], "downs": [], "aka": "Dark Wave Synth", "related": "", "desc": "Darkwave Synth于2000年代后期兴起，主要融合了80年代早期的Synth-pop、Coldwave、后朋克等音乐类型，类似Oppenheimer Analysis、Fad Gadget、“Trilogy时代”的The Cure、Joy Division等的作品的声音，特点主要有冷漠的男声或女声、冰冷的模拟合成器与鼓机音色、黑白的“哥特式”图像等。“Darkwave Synth”只是用来形容这一浪潮的标签化叫法，很多Darkwave Synth音乐都被归类为哥特摇滚、后朋克、Minimal Synth，但这些作品都具有相似的、“Darkwave Synth”的听感。一般认为音乐合辑《The Minimal Wave Tapes Volume One》和《Cold Waves and Minimal Electronics Vol.1》真正掀起了这一浪潮。", "chapter": "Fusion", "examples": ["Raise the Skies - Kill Shelter / Antipole"]}, "death folk": {"name": "Death Folk", "ups": ["Dark Wave", "Indie Folk"], "downs": ["Apocalpse Folk", "Dark Folk"], "aka": "", "related": "", "desc": "起源于80年代，一般认为先驱者是英国乐队Death in June，同时具有工业和民谣的元素，僵直的人声、干燥的吉他和粗粝的工业之声，使此类音乐在可听性上与民谣相差甚远。Death Folk更像是国内乐迷的叫法，因为外网没有关于Death Folk的说法，但是Death Folk是一个较大的概念，包括相对来说比较容易接受的、听感更加明亮的Neofolk（新民谣）。主要乐队有Death in June、Current 93、Sol Invictus、Sixth comm等，厂牌有World Serpent、Eis & licht。", "chapter": "Fusion", "examples": ["Mockingbird - Current 93", "Bright Dead Star - Current 93"]}, "dark folk": {"name": "Dark Folk", "ups": ["Dark Ambient", "Neo Folk", "Death Folk"], "downs": [], "aka": "", "related": "", "desc": "黑暗民谣，最初与Neofolk（新民谣）和Apocalyptic Folk（天启民谣）等词混为一谈使用，用来描述一系列植根于后工业和后朋克的当代民谣音乐，但如今它主要指20世纪90年代中后期出现的一种特定的新民谣子流派。与最初的Apocalyptic Folk不同，它几乎没有什么后工业或后朋克的元素，相反，经常可以听到氛围和北欧民谣音乐的元素。此外，先锋新民谣乐队的实验性和末世感被摒弃，取而代之的是更加忧郁和简约的音景。人声可以是低沉的、空灵的、令人沮丧的并受传统民谣影响的，纯器乐曲目也很常见。就歌词而言，Dark Folk艺术家通常关注“黑暗”主题，如荒凉、沮丧、死亡以及异教、自然、历史等，并且通常以表演者的母语演唱。由于歌词和风格上的重叠，黑暗民谣与金属（尤其黑金属）音乐密切相关，许多艺术家将这两种流派结合在一起。Ulver的专辑Kveldssanger被广泛认为是其最早和最重要的作品之一，黑暗民谣也源于最初的新民谣运动，最著名的是Fire + Ice，对德国音乐界产生了巨大影响。建立该流派的其他艺术家有Orplid、Tenhi、Empyrium、Forseti、Darkwood等，其中大部分是德国和北欧人。如今，最重要的黑暗民谣场景主要在德国、芬兰、挪威和俄罗斯。", "chapter": "Fusion", "examples": ["Hoffnung - Nebelung"]}, "minimal wave": {"name": "Minimal Wave", "ups": ["New Wave", "Coldwave", "Pop Punk", "Minimalism"], "downs": ["Minimal Synth", "Synth Pop"], "aka": "Synth Wave", "related": "", "desc": "又叫Synth Wave（不同于Synthwave！），结合了New Wave、Coldwave、Synth-pop和Post-Punk中最电子化、最极简的形式。主要在1979~1985年间发展，尤其是在比利时、法国和德国，使用模拟合成器、鼓机和前MIDI电子设备，所以声音是稀疏的、业余的、极简的和低保真的，听感冷峻前卫。自2000年代中期以来，人们对Minimal Wave的爱好更加广泛。【推荐专辑：Suicide - Suicide】", "chapter": "Fusion", "examples": ["- - Lebanon Hanover"]}, "minimal synth": {"name": "Minimal Synth", "ups": ["Minimal Wave"], "downs": ["Synth Pop"], "aka": "", "related": "", "desc": "Minimal Wave一种更精简的形式，主要使用模拟合成器和电子设备演奏，经常淡化吉他的使用并偏向Synth-pop，冰冷的人声和合成器音色呈现出一种凄凉的美感，制作这类音乐所需的设备一般价格低廉，这使得该流派的声音更加独立、粗糙。", "chapter": "Fusion", "examples": ["Say It Back - Amiture"]}, "synth pop": {"name": "Synth Pop", "ups": ["Pop", "New Wave", "Minimal Wave", "Ethereal Wave etc."], "downs": ["Electro Pop"], "aka": "Synth-pop", "related": "", "desc": "更受电子乐的影响，起源可以追溯到1970年代初至中期，在1980年代获得了巨大的商业成功。与New Wave和Minimal Synth平行发展，突出旋律表现和合成器音色，受到Space Age Pop和Progressive Rock运动尤其是Progressive Electronic的影响，该流派最初由Krautrock（泡菜摇滚）乐队Kraftwerk首创。早期Synth Pop听起来更机械、稀疏，会出现吉他riff、前卫的Bassline、序列合成器等，现在一般意义上的Synth Pop是个大概念，广泛指主要使用合成器音色做配器的流行音乐，BPM属于Mid Tempo，听感柔和细腻。Synth-pop代表乐队/制作人有Depeche Mode、Pet Shop Boys、Yellow Magic Orchestra，更现代的Synth-pop代表有Ladytron、Cut Copy、CHVRCHES、Grimes、Crystal Castles、La Roux等。Synth-pop为其子风格奠定了基础，例如Bitpop和较为现代的EBM子流派Futurepop。", "chapter": "Fusion", "examples": ["Sweet Dreams (Are Made of This) - Eurythmics / Annie Lennox / Dave Stewart"]}, "new romantism": {"name": "New Romantism", "ups": ["New Wave", "Synth Pop", "Neo Classical", "Jazz"], "downs": [], "aka": "New Romantic", "related": "", "desc": "新浪漫主义是1979年至1984年间在英国流行的一个文化运动，起源于伦敦考文特花园的一个叫Blitz的小俱乐部，特征是其独特的时尚感，包括诗人衬衫、贵族装束和中性化的妆容等。新浪漫主义运动也诞生了一种独特的音乐风格，源于New Wave，大量使用合成器，通常与Synth-pop重叠，以及明显的Glam Rock（华丽摇滚）的影响。", "chapter": "Fusion", "examples": ["The Look Of Love - ABC"]}, "techno kāyo": {"name": "Techno Kāyo", "ups": ["Idol Kāyo", "Electro Pop", "Kāyokyoku"], "downs": ["Idol Kāyo [Influence Each Other]"], "aka": "Techno Pop", "related": "", "desc": "一种日本流行音乐，随着1980年代初Idol kayō场景的发展而发展，制作与Synth Pop相似，在日本通常被叫做Techno Pop，它起源于日本流行音乐的主要形式Kayōkyoku到后来的J-Pop的过渡期间，因此Techno Kayō被认为是J-Pop的直接先驱。", "chapter": "Fusion", "examples": ["夏 - 山口美央子", "夢飛行 - 山口美央子", "君に、胸キュン。-浮気なヴァカンス- - イエロー・マジック・オーケストラ", "Behind The Mask - イエロー・マジック・オーケストラ"]}, "electroclash": {"name": "Electroclash", "ups": ["Pop", "Synth Pop", "Electro House"], "downs": ["Electro Pop"], "aka": "Nouveau Disco、Neo-Electro、Synthcore", "related": "", "desc": "于1990年代后期出现在纽约和底特律以及整个德国和荷兰。它是1980年代各种Electro、New Wave、Electro-Disco、Synth Punk和Synth-pop的复兴产物，也主要受Techno的影响，使用极简的鼓组和Bassline，注重合成器部分。这个词由DJ Larry Tee发明，Electroclash与其他1980年代影响相关的EDM风格平行发展，例如1990年代后期/2000年代出现的Electro-pop、Dance Punk、Bitpop和Electro House浪潮，Electroclash运动在2000年代初期达到了顶峰，2000年代中期人气开始下降。早期的先驱者有I-F、Miss Kittin & The Hacker，制作人Ladytron、Goldfrapp、Scissor Sisters等将Electroclash全盛时期（2000年代初期）的影响加入到了他们的音乐中。", "chapter": "Fusion", "examples": ["City Grrrl - CSS / SSION"]}, "electro pop": {"name": "Electro Pop", "ups": ["Electroclash", "EDM"], "downs": ["Hyper Pop", "Techno Pop"], "aka": "", "related": "", "desc": "更受流行文化影响。2000年代出现的电子流行，特点是密集、复杂、分层的制作，通常伴随着模糊而温暖的电气音色/Bass，相比于Synth Pop进一步电气化，也更注重流行音乐的架构，不同程度上借鉴了Electro House等电子舞曲类型、Electroclash以及Synth Pop。尽管起源于地下电子音乐场景，但是很快便获得了主流成功，如流行歌手Kylie Minogue、Britney Spears、Robyn、Lady Gaga、Kanye West等。Electro Pop的流行一直持续到2010年代，并激发了更多EDM风格，与此同时经历了2000年代/2010年代互联网美学的洗礼和Bubblegum Bass的兴起后诞生了Hyper Pop。", "chapter": "Fusion", "examples": ["早期：Don't You Want Me - The Human League", "当代：Rise - Katy Perry"]}, "hyper pop": {"name": "Hyper Pop", "ups": [], "downs": [], "aka": "", "related": "", "desc": "(详见Post-Internet板块)", "chapter": "Fusion", "examples": []}, "dance-pop": {"name": "Dance-Pop", "ups": ["EDM(Disco", "HI-NRG etc.)", "Synth Pop", "Electro Pop"], "downs": ["Disco Pop", "Popcorn"], "aka": "Dance Pop", "related": "", "desc": "出现于1980年代初的流行音乐形式，从Disco和Post-Disco演变而来，与New Wave和Synth-pop一起主导了1980年代的流行音乐市场。Dance-pop特征有突出的4/4拍节奏、简单、朗朗上口的歌词和旋律。强调轻松、舞池友好的氛围。Dance-pop从1980年代的电子音乐中汲取灵感，1990年代受欢迎程度进一步上升，Kylie Minogue、Spice Girl获得成功，2000年代Electro-pop音乐人Lady Gaga、Kesha、Britney Spears、Katy Perry、Justin Timberlake等也开始着手制作Dance-pop并大力帮助这种流派的发展。 术语Techno Dance (A.K.A. Pop House)是描述1980s末到1990s英国的一系列电子舞曲的总称，是当时媒体为了描述这些从其他国家传播而来的电子舞曲，但是只会用“Techno”描述电子音乐从而产生的短语，包括早期Eurodance、Acid House、Trance、EBM等，例如Witch Doctor - The Cartoons。这个概念与Dance Pop相关，故放置此处展示，不单独列出词条。注意不要与Tech Trance曾经的子分支Tech Dance搞混了。", "chapter": "Fusion", "examples": ["前期：Despre tine - O-Zone", "后期：California Gurls - Katy Perry / Snoop Dogg"]}, "disco polo": {"name": "Disco Polo", "ups": ["Disco Pop", "Techno", "HI-NRG"], "downs": [], "aka": "", "related": "", "desc": "一种波兰流行音乐风格，由当地民歌和Dance Pop结合而成，最初流行于1990s前期，主要强调适合跳舞的节奏和入耳的旋律，人声音调高而清晰，常用电子乐器。最初源于Euro Disco或Italo Disco模式，歌词主题通常涉及爱情、节日、聚会、自由和生活方式等。", "chapter": "Fusion", "examples": ["Bujaj łbem do przodu - Bracia Figo Fagot"]}, "j-pop disco": {"name": "J-Pop Disco", "ups": ["J-Pop", "Disco Pop", "Nu Disco/Post-Disco"], "downs": [], "aka": "", "related": "", "desc": "当Disco Pop的风潮来到日本后，日本制作人将Disco Pop的制作模式融入J-Pop，并融合了时兴的Eurobeat等风格的音乐，诞生了J-Pop Disco。这种风格更多偏向于J-Pop，Disco组分在其中仅仅充当节奏补充等。", "chapter": "Fusion", "examples": ["Bad Apple!!! - のみこ"]}, "dancehall pop": {"name": "Dancehall Pop", "ups": ["Dance Pop", "Dancehall"], "downs": [], "aka": "", "related": "", "desc": "与Disco Pop类似，Dancehall Pop指Dancehall音乐与Dance Pop交叉的产物。Dancehall本身是美国波多黎各的流行舞曲，但是它的形式并不迎合大部分欧美音乐市场听众的口味，因此一部分欧美电音制作人会改良Dancehall音乐，去除其中对性爱和政治的主题，而加入了更多流行题材，Dancehall Pop由此诞生。", "chapter": "Fusion", "examples": ["PS5 - salem ilese / TOMORROW X TOGETHER / Alan Walker"]}, "romanian popcorn": {"name": "Romanian Popcorn", "ups": ["Dance Pop", "EDM"], "downs": [], "aka": "Popcorn", "related": "", "desc": "起源于2000年代中期的罗马尼亚，通常源自传统的民间风格，合成手风琴和铜管等音色十分常见，主要推动者有Edward Maya、INNA、Alexandra Stan。与1970年代至1980年代的Belgian Popcorn运动同名，但在音乐上两者没有关系。", "chapter": "Fusion", "examples": ["Amar Tu Vida - Elena Gheorghe"]}, "tecnorumba": {"name": "Tecnorumba", "ups": ["Dance Pop", "House", "Techno", "Makina"], "downs": [], "aka": "", "related": "", "desc": "将Rumba Flamenca的风格与最商业化的House、Techno、Makina等舞曲风格相结合，最初在1980年代末至1990年代初开发，因为Camela的成功而收获了主流人气的认可。", "chapter": "Fusion", "examples": ["Si no, ¡de qué! - Camela"]}, "township bubblegum": {"name": "Township Bubblegum", "ups": ["Dance Pop", "South African Music"], "downs": [], "aka": "", "related": "", "desc": "1980年代至1990年代初期在南非乡镇流行的以合成器为主的Dance-pop分支，从Disco和当地的一些音乐演变而来，深受1980年代流行、Synth-pop、Boogie、Synth Funk和R&B的影响。特点是流畅的听感、大量使用键盘和鼓机，经常使用土著人声等。艺术家有Brenda Fassie、Chicco、Yvonne Chaka Chaka等。该流派也促进了Kwaito的流行，并使其成为了House大家族中的一员。", "chapter": "Fusion", "examples": ["Private Lover - Yvonne Chaka Chaka"]}, "latin freestyle": {"name": "Latin Freestyle", "ups": ["Freestyle", "Latin Music"], "downs": [], "aka": "", "related": "", "desc": "一种舞蹈音乐形式，除了Freestyle中的Disco、Hip-Hop、电子音乐的影响之外，还显示了西班牙裔美国音乐的影响。Latin Freestyle在Freestyle中占主导地位。", "chapter": "Fusion", "examples": ["Silent Morning (12'' Club) - Noel Pagan"]}, "new jack swing": {"name": "New Jack Swing", "ups": ["Hardcore Hip-Hop", "Contemporary R&B", "Dance Pop", "Funk", "Boom Bap"], "downs": [], "aka": "", "related": "", "desc": "New Jack Swing起源于80年代末，最早在1986年Janet Jackson的专辑《Control》中具备雏形，制作人Jimmy Jam & Terry Lewis将80年代中期Hip-Hop粗犷、硬朗的质感带入了R&B。而公认的New Jack Swing的缔造者是Teddy Riley。Teddy本是一名Hip-Hop制作人，其风格是典型的80年代中后期Hardcore Hip-Hop，但R&B歌手Keith Sweat一再坚持与他合作，并于1987年发行了专辑《Make It Last Forever》，取得了极大的商业成功。1988年10月，乐评人Barry Michael Cooper将该流派命名为“New Jack Swing”，这张专辑也被视作第一张New Jack Swing专辑。New Jack Swing通常使用合成器和鼓机编曲，如Linn Drum、TR-808、TR-909，有着强劲的节拍和标志性的Orchestra Hit音色，并具有“Swing”的节奏感。早期的New Jack Swing受到了Dance Pop的影响，使用的合成器音色基本相同，而后期则更多地受Boom Bap的影响，大量采样70年代的Funk乐鼓间奏和管乐。80年代末到90年代初，New Jack Swing成为了黑人音乐的主流形式之一，Michael Jackson在90年代的大部分歌曲都是这种风格，以至于很多人认为是MJ开创了该流派。除了Teddy Riley、Jimmy Jam & Terry Lewis，该流派的主要制作人还有Babyface & L.A. Reid。进入90年代中期，New Jack Swing的流行性开始衰退，并逐渐消失。但在21世纪，依然有部分当代音乐人运用该流派的音乐元素并取得商业成功，如Bruno Mars和NewJeans。", "chapter": "Fusion", "examples": ["Bye Bye Baby - Madonna"]}, "indie pop": {"name": "Indie Pop", "ups": ["Pop", "Synth Pop/Electro Pop"], "downs": ["Shibuya-kei", "Sophisti-Pop", "Chamber Pop"], "aka": "Indie-pop", "related": "", "desc": "独立流行，一种使用流行音乐惯例架构、旋律轻松的流派。最开始艺术家通常使用摇滚乐器制作，也有些艺术家多使用电子音色、钢琴、弦乐，有时候不使用吉他，艺术家倾向于采用看起来原始且简单的作曲手法，从朋克的DIY精神中汲取作曲思想，从1960年代流行音乐、Power Pop、后朋等获取灵感。", "chapter": "Fusion", "examples": ["Nice Boys - TEMPOREX"]}, "shibuya-kei": {"name": "Shibuya-kei", "ups": ["Indie Pop", "Lounge", "Pop Rock", "EDM", "Yé-yé"], "downs": ["Neo Shibuya-kei", "Pico Pop", "J-Pop"], "aka": "", "related": "", "desc": "渋谷系，来自日本的流行音乐场景，起源于1980年代后期，并在1990年代初期流行起来，字面意思为“涩谷风格”，歌曲主要回归西方复古文化，早期先驱是Pizzacato Five，受到Lounge和Bossa Nova的影响很大，最初基于Neo-Acoustic（Indie-pop、Jangle Pop分支），后来Yé-yé、Psychedelic Pop、Exotica、Jazz、Dub、Funk、Disco等都融入了该流派中，还有艺术家带来了House和Downtempo的影响，1990年代中期所包含的风格更多样，包括Psychedelic Rock、Shoegaze、Indietronica、Neo-Psychedelia等。2000年代初期由一批年轻音乐家提出了“新涩谷系”，融合了J-Pop、Chiptune以及乐队Perfume的早期音乐元素。", "chapter": "Fusion", "examples": ["Milk Rock - 岭川贵子"]}, "neo shibuya-kei": {"name": "Neo Shibuya-kei", "ups": ["Shibuya-kei", "EDM"], "downs": ["Akishibuya-kei"], "aka": "Post Shibuya-kei", "related": "", "desc": "新涩谷系，被视为涩谷系音乐风潮过后再涩谷及周边城市兴起的类似于涩谷系制作手法的音乐，这类音乐与EDM的交融更多，也被视为涩谷系的延续，因此被称为“后涩谷系(Post Shibuya-kei)”。作为一种艺术风格时，新涩谷系指一系列与涩谷系美学类似的时尚，包括原宿系等。", "chapter": "Fusion", "examples": ["spiral da-hi! P.R.R. Mix - Serani Poji"]}, "pico pop": {"name": "Pico Pop", "ups": ["Shibuya-kei", "J-Pop/Denpa"], "downs": [], "aka": "Future Pop（与后工业分支不同）、フューチャーポップ、Picopop、Pico Pico Pop", "related": "", "desc": "比较小众的流行音乐，起源于2000年代初期，是“新涩谷系”的一部分，更多使用电子元素和更快速的节奏，与早期涩谷系场景相比音乐和专辑中有可爱、童趣的卡通美学的元素。", "chapter": "Fusion", "examples": ["Say!ファンファーレ! - 白上フブキ"]}, "hypnagogic pop": {"name": "Hypnagogic Pop", "ups": ["Indie Pop", "Hauntology", "Glo-Fi"], "downs": [], "aka": "", "related": "", "desc": "催眠流行音乐，出现于2000年代，是一场出现在地下新迷幻和噪音运动中的场景，这些艺术家对1970年代至1980年代的流行音乐产生回忆，通过低保真的手法制作这类新的流行音乐，经常使用或模仿老式录音技术、模拟合成器、复古音效等，如磁带、VHS等意象。艺术家常常受到Synth-pop、合成器配乐和New Age的影响。该流派的名字被创造于2009年，与同时代的Chillwave场景有时混为一谈，但相较于Chillwave更具流行音乐的特征，Hypnagogic Pop场景也影响了后来的Vapor运动。", "chapter": "Fusion", "examples": ["Saltwater - Geowulf"]}, "alternative pop": {"name": "Alternative Pop", "ups": ["Alternative Rock", "Pop"], "downs": ["Dark Pop", "Bedroom Pop"], "aka": "Alt Pop、Alt-Pop", "related": "", "desc": "另类流行一词自1980年代末的另类摇滚（Alternative Rock）。该风格自1980s以来就一直存在，但独特的、主流的另类流行直到2010年代初才出现。从更现代的音乐类型中汲取灵感，如Chamber Pop、Indietronica和Art Pop。虽然风格多样，但另类流行一般都偏向于更简约的编排，强调深沉、安静的人声，更梦幻、更平静、更郁闷的情绪，也结合了Electro-pop的合成器元素、Contemporary R&B的人声、Alternative R&B的大气质感和Downtempo风格的声音。在主题方面，另类流行偏向于自传，如讲述爱情、青春期和失恋等。新一代另类流行制作人创造出了更多可能性，如Billie Eilish称自己的歌曲叫Dark Pop（尚未被认可），以及来自Clairo和Rex Orange County的Bedroom Pop场景。", "chapter": "Fusion", "examples": ["Bike - ADOY"]}, "art pop": {"name": "Art Pop", "ups": ["Pop"], "downs": [], "aka": "", "related": "", "desc": "艺术家会从艺术学校所学中寻找灵感或在其他音乐/非音乐来源（如文学、电影、古典、戏剧、实验、电子等）中寻找灵感的一类流行音乐，许多艺术流行也可以被认为是“实验流行”或“前卫流行”，但是音乐不会像实验音乐前卫音乐那样难以接受。1990年代开始艺术流行逐渐注重电子音色的加入，现在的艺术流行多基于独立流行/独立摇滚背景，如 St. Vincent、Alt-J、Julia Holter等，也有来自Contemporary R&B场景的艺术家，如Janelle Monáe、FKA twigs等，还有基于Balled音乐或民族音乐的Björk等。【推荐专辑：Caroline Polachek - Pang】", "chapter": "Fusion", "examples": ["Billions - Caroline Polachek"]}, "psychedelic pop": {"name": "Psychedelic Pop", "ups": ["Psychedelic Rock", "Pop"], "downs": [], "aka": "Psy Pop", "related": "", "desc": "迷幻流行音乐是一种将迷幻摇滚（Psychedelic Rock）、迷幻民谣（Psychedelic Folk）、流行音乐结合的流派，强调明朗的曲风和类似Sunshine Pop的人声，但始终保留着超现实主义的音乐风格，经常使用回声、混响、镶边之类的效果，乐器上遵循流行摇滚的乐器，辅以1960年代早期到中期的流行唱片中的乐器比如特雷门琴、古筝、Tack Piano等。1970年代初之后人气急剧下降，1990年代有所复兴，并为新迷幻（Neo-Psychedelia）运动奠定了一定基础。", "chapter": "Fusion", "examples": ["Summer's Cauldron (Remastered 2001) - XTC"]}, "bitpop": {"name": "Bitpop", "ups": ["Chiptune (Plus)", "Electro Pop", "Doskpop"], "downs": [], "aka": "", "related": "", "desc": "一种Bit Music的融合风格，强调吸引人的旋律和较快的节奏，出现于21世纪初，从20世纪80年代末/90年代初的Demoscene发展而来。这种风格更接近Pop的模式而非Doskpop那种着重强调芯片乐组分的形式。", "chapter": "Fusion", "examples": ["Vanished - Crystal Castles"]}, "glitch pop": {"name": "Glitch Pop", "ups": ["Electro Pop", "Glitch", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "基于实验电子元素和现代流行音乐的流派，将来自Glitch、IDM等抽象的声音融入流行音乐中，主要受Synth-pop、Art Pop、Indietronica包括Alternative R&B的影响。【推荐专辑：Sweet Trip - Velocity : Design : Comfort】", "chapter": "Fusion", "examples": ["メグメル - eufonius", "Ray - chouchou", "Aquarium - Nosaj Thing"]}, "city pop": {"name": "City Pop", "ups": ["New Music", "Kāyokyoku", "Idol Kāyo", "Soft Rock", "Post Disco", "Pop Funk", "Synth Funk", "Jazz Fusion"], "downs": [], "aka": "", "related": "", "desc": "", "chapter": "Fusion", "examples": []}, "j-pop": {"name": "J-Pop", "ups": ["Idol Kāyo", "Synth Pop/Electro Pop/Dance Pop", "J-Rock"], "downs": [], "aka": "", "related": "", "desc": "1st Scene 1989年向平成时代过渡的一个日本流行音乐类型，从早期的Kayōkyoku、Idol Kayō、City Pop发展而来，并且采用了更广泛的西方音乐风格，通常用Electro-pop、Synth-pop、Dance-pop的手法制作，与流行摇滚和Visual Kei（视觉系）的结合也并不少见。J-Pop经常用于动画的op、ed，以及日本电影、电子游戏、电视剧的配乐中。 J-Pop最早据说由宇多田光提出并发扬，当时正值日本泡沫经济时代，过去十年流行的City Pop在当时显得过于幼稚和理想化，J-Pop就是作为一种更加“成熟”的概念出现在听众面前的。事实上J-Pop也比City Pop的内涵要更广，它不仅保留了City Pop的电子元素，还加入了R&B等风格。他几乎可以涵盖所有1980s以后的日本流行音乐，从影视配乐到独立乐队唱作，都可以用J-Pop来代表。代表制作人、乐队包括但不限于：宇多田光、米津玄师、水曜日のカンパネラ、铃木爱理、藤井风、神山羊等。 2nd Scene J-Pop一个重要市场就是日本影视，尤其是二次元动画。二次元文化和同人文化为J-Pop提供了广阔的发展土壤，且不说EVA，从1980s的日本动画算起，很多动画的OP或ED都可以算作J-Pop(J-Rock除外，如轻音少女)。许多动漫音乐作曲人为了彰显其手法，会将J-Pop做成形态各异的“二次元音乐”，这在某种程度上也极大的丰富了J-Pop的声音系统。代表制作人/歌手包括：泽野弘之、MYTH & ROID、nayuta等 3rd Scene 近年来随着电子音乐全球化进程，J-Pop也创新性地融合了欧美电子舞曲风格如Trap、House等，其中就包括GARNiDELiA乐团。其在2016年创作的《极乐净土》甚至在日本以外的互联网视频平台大幅度流行，例如2016年的B站，甚至打破了VOCALOID Music曲目《千本樱》常年霸榜的记录，也衍生出了很多翻唱/唱见作品和二创作品比如鬼畜调音等。另外，近年来也涌现出很多日本另类摇滚乐队，他们根植于日本当代年轻人心理状态开创了一个新日本流行场景，也就是下面我要说的“Noctural Scene”(译：夜好性)。", "chapter": "Fusion", "examples": ["One Last Kiss - 宇多田ヒカル  /  打上花火 - Darko / 米津玄师 (偏Pop)", "恋は渾沌の隷也 - 後ろから這いより隊G (偏Akiba)", "桃源恋歌 - GARNiDELiA (偏Dance)"]}, "denpa": {"name": "Denpa", "ups": ["Idol Kāyo", "EDM", "J-Pop", "Alternative Rock"], "downs": ["Akiba-Pop"], "aka": "Denpa Song、電波ソング、電波、萌えソング、Moe Song、Akiba-Pop", "related": "", "desc": "一种日本流行音乐，听感怪异但吸引人，利用走调的人声、奇怪或荒谬的歌词、拟声词、广播剧等元素，以及不同寻常的制作方式，并使用可爱的、高音调的动漫人声来达到“萌”的效果。Denpa通常以Bitpop、Synth-pop、Electro-pop风格制作，但逐渐偏向电子舞曲，会从J-Core甚至摇滚中汲取灵感。这一流派开始随着电子游戏（尤其是黄油）等场景形成，并受到J-Pop等早期电子流行的影响。", "chapter": "Fusion", "examples": ["Os-宇宙人 - 大亀あすか", "恋感 キミイロDelight! - ななひら"]}, "doujin music": {"name": "Doujin Music", "ups": ["Doujin Activity"], "downs": ["Doujin Trancecore"], "aka": "Otokei doujin", "related": "", "desc": "同人音乐的概念由同人活动生发出来，产生的目的与“独立”相近，表示一类以文化产品为原型创作的歌曲或以原曲为基础创作的改编作品。Doujin Music本身不是一个流派，而是一个概括性的说法，由于这个场景与日本流行音乐相关联，因而放置于此。Doujin Music通常由独立艺术家以低成本自行制作，计算机编曲录音软件通常是艺术家们利用的手段，因此大多数Doujin Music具有明显的合成味道，风格涵盖从摇滚、流行到Hardcore/J-core/Nerdcore Techno和其他EDM。近年来也出现了Chamber Pop或Big Band为基底的非电子全乐器演奏同人音乐，不过这里只阐述其关于电子音乐的内容。同人音乐的载体常常是游戏的周边创作，其中《东方Project》系列的同人音乐最为出名。", "chapter": "Fusion", "examples": ["インターネットサバイバー - COOL&CREATE / あやぽんず* / ビートまりお"]}, "semi-trot": {"name": "Semi-Trot", "ups": ["K-Pop", "Trot", "EDM"], "downs": [], "aka": "세미 트로트、Semi Teurotteu、Neo-Trot", "related": "", "desc": "Trot是二战后期南韩产生的一种新式民谣，就像美占时期的日本发展出Mood Kayo(1951年)一样，南韩也将朝鲜民谣与日本昭和民谣结合产生了Trot。Semi-Trot出现在1990年代中期，基于Trot的结构和节奏，随着K-Pop的发展受到诸如Electro-pop、Dance-pop、Pop Rock的影响，有时也受到韩国民谣的影响，歌曲情绪往往乐观开朗。2010年代以来该类型越来越向电子舞曲靠拢。代表人物包括洪真英、高耀太、苏志燮、金泫雅等。", "chapter": "Fusion", "examples": ["사랑의 배터리 - 洪真英"]}, "pon-chak disco": {"name": "Pon-Chak Disco", "ups": ["K-Pop", "Trot", "DPNK-Pop", "Eurodance", "Synth Pop"], "downs": [], "aka": "Techno Trot、뽕짝 디스코、ポンチャック、Trot Medley、Ppongtchak Disco", "related": "", "desc": "Pon-Chak Disco是Trot和Disco/Eurodance结合的产物，出现于2000s中后期的韩国舞厅。这类音乐常常保留了Trot的唱腔与曲调，跟Semi-Trot有交集，但总体上更像加速的Eurodance或Euro Techno舞曲，而另外在唱法和旋律上则借鉴了1990s的朝鲜流行乐(DPNK-Pop)特色。Pon-Chak是Pongchak的简写形式，是
