英国车库音乐界的地位。虽然取得了成功，但Breakstep很快就销声匿迹了，到2008年几乎已经成为了一种“过时”的声音。主要由于其更为流行的姊妹流派Dubstep从Breakstep场景中发展而来，Benga、Distance、Skream等艺术家的早期作品都受到了Breakstep很大的影响。另一个因素是，Deekline和Zinc后来主要以其他类型的作品而闻名，如Breakbeat、Drum & Bass等，再加上进入21世纪后，英国车库的流行度本身也在下降。到2000年代中期，著名的Breakstep制作人有Dub Child、Darqwan、Search & Destroy。", "chapter": "UK Bass", "examples": ["End Of Line - Vex'd / Search & Destroy【https://www.youtube.com/watch?v=1FMNcP8dnBE】"]}, "future garage": {"name": "Future Garage", "ups": ["UK Garage", "Post-Dubstep", "Ambient"], "downs": [], "aka": "Nu-Garage、Post-Garage、Space Garage、Minimal Garage、Atmospheric Garage", "related": "", "desc": "“Future Garage”这个名字的出现其实是为了帮助描述Post-Dubstep音乐，Post-Dubstep是对Dubstep的一种反动，融合了UK Garage的一些元素（尤其是2-step节奏模式）。Future Garage浪潮集合了众多DJ和制作人，他们对于车库音乐“可以变成什么样，以及应该变成什么样”有着共同的理解，Future Garage并不是车库音乐的一次重生，而是对车库音乐的一次重新认识，这种音乐只是新一代的开端，制作人们将车库音乐的精华与自己构思的美学相结合，创造出许多新的音乐探索途径。Future Garage是一种Post-Dubstep、Future Bass、Chillstep、UK Wave等在吸收了UK Garage以及2-step Garage鼓点的基础上，00年代初的一种非舞池导向的、更加实验性的Garage音乐。这种风格的典型特征是来自R&B歌曲的变调人声切片、温暖而暗涌的Reese Bass，幽暗而朦胧的合成器铺底音色、野外录音以及其它氛围音色，主题更多与大自然、神秘空旷的意境相关，速度一般在130-140BPM之间。Burial可以说是这一声音的最早开创者之一，但这一术语和声音的真正形成是通过制作人Whistla和他的L2S Recordings厂牌而确立为一种独立的声音的，并成为了一个不断发展的场景而备受听众推崇。但是要注意，Future Garage不等于Post-Dubstep，许多艺术家如James Blake、Mount Kimbie，制作的音乐都属Dubstep的对立面（即Post-Dubstep/Ambient Dubstep），但并不属于Future Garage。", "chapter": "UK Bass", "examples": ["The Daisy - Ross From Friends【https://www.youtube.com/watch?v=DfYV_iemp5Y】", "U Hurt Me - Burial", "Three Sided Shape - Scuba"]}, "uk funky": {"name": "UK Funky", "ups": ["UK Garage", "House", "Broken Beat"], "downs": ["Hard Drum"], "aka": "Funky、UKF、UK Funky House", "related": "", "desc": "UK Funky是于2000年代中期发展起来的一种电子舞曲流派，深受Broken Beat、Tribal House、Soca Music、Electro House、Afrobeat以及UK Garage、US Garage的影响。UK Funky本属House音乐的一部分，尽管它的名称中已经去掉了“House”，但许多人坚持认为它仍然是House场景的一部分，甚至有人直接称其“UK House”。UK Funky有着良好的俱乐部场景，部分原因是人们认为Bassline场景已经衰落，同时DJ Marcus Nasty首先提出并大力宣传了这种声音。UK Funky发展至今已逐渐包含了现代R&B、Grime和Skank mc'ing（Skank即Ska的舞蹈风格）等元素，以及该流派诞生之初的灵魂乐元素。2008-2009年UK Funky取得影响力的巅峰，在2010年后迅速衰落。近年来随着Supa D等音乐人的推动，UK Funky开始在流行乐中重拾其影响力。", "chapter": "UK Bass", "examples": ["Make It Funky For Me - Attacca Pesante / Shea Soul【https://www.youtube.com/watch?v=uXfAkBPlmvY】"]}, "hard drum": {"name": "Hard Drum", "ups": ["UK Funky", "Tribal House", "Grime"], "downs": ["Deconstructed Club"], "aka": "Heavy Perx", "related": "", "desc": "Hard Drum是UK Funky的一个子流派，于2010年代中后期在伦敦地下场景中兴起。2015年左右，一群年轻的制作人Lemonick、Superfície、Sudanim、Lobby、Neana等（其中大部分隶属于Sudanim & MM的Her Records厂牌）开始在Soundcloud将自己的音乐贴上“Hard Drum”的标签，2016年，这一流派的先驱NKC发起了“Even the Strong”。最初它是一个夜总会的名字，专门为制作人和DJ提供演奏Hard Drum音乐的机会。在成功举办了多场Rave后，Even the Strong创立了自己的厂牌，专门发行Hard Drum类型的作品。Hard Drum的特点是民族特色但质感硬实的鼓点，结合了UK Funky、Tribal House、Grime、Juke、Ballroom、Jersey Club、南非舞曲Gqom等概念。", "chapter": "UK Bass", "examples": ["Battery - Lurka【https://www.youtube.com/watch?v=_uviFwhJ_Rs】", "Main10 (Helix Remix) - Galtier"]}, "j-garage": {"name": "J-Garage", "ups": ["Speed Garage", "Future Garage", "J-Pop", "J-Jersey Club"], "downs": [], "aka": "", "related": "", "desc": "提到J-Garage很多人应该都会想到缝合大手子MEGAREX的《SED GAR》系列，虽然J-Garage并不是从这诞生，但是相信你也能猜出这是一个比较缝合的风格。日本曲师/音乐制作人一般会以Speed Garage或Future Garage为主要基础（有时也会使用4×4 Bassline Garage等其他风格），有时会融入Donk、Bass House等元素，甚至将Garage融入Future-core中，创造出几乎完全有别于原本风格的J-speed Garage或J-Future Garage等，甚至还出现了“Speed Future Garage”的标签。", "chapter": "UK Bass", "examples": []}, "grime": {"name": "Grime", "ups": ["2-step", "Ragga Jungle", "Dancehall", "Hip-Hop"], "downs": ["Eco-Grime", "Grindie", "UK Dubstep", "UK Drill"], "aka": "UK Grime", "related": "", "desc": "Grime起源于00年代初，在UK Garage退潮后，一些制作人想要创作更能体现伦敦地下生活，更关注被遗忘群体，更幽闭黑暗，同时也更真实的音乐。他们将2-Step与Jungle、Hip-Hop融合，加入更现实、冷酷的题材和黑暗氛围的弦乐和合成器音色，形成了UK Grime。Grime节奏较快，BPM可以达到140，大量运用切分音，强弱拍对比明显。最早的曲目包括Wiley的《Eskimo》，和Youngstar的《Pulse X》。2003年，Grime说唱歌手兼制作人Dizzee Rascal发行了专辑《Boy in da Corner》，歌词关注伦敦移民的生活百态，将Grime带入主流视野。00年代末，随着Dubstep和UK Funky的兴起，Grime开始走向衰落，许多Grime音乐人也开始转向其他EDM的创作，但也有一些音乐人把Grime和其他流派融合并使其流行。进入10年代，在Grime的影响下，UK Drill诞生了。Grime本是受Hip-Hop影响的音乐，而现在却反哺了Hip-Hop，可见该流派的生命力之顽强。", "chapter": "UK Bass", "examples": ["That's Not Me - Skepta【https://www.youtube.com/watch?v=_xQKWnvtg6c】", "Duppy - Skepta"]}, "grindie": {"name": "Grindie", "ups": ["Grime", "Indie Rock"], "downs": [], "aka": "", "related": "", "desc": "Grime与独立摇滚乐的混合体，2004年左右由Grime制作人Statik首次提出。Statik对当时的Grime音乐场景感到厌倦并希望引入一些新的元素。紧接着Akira the Don在2004年发布了一张Mixtape，用Grime改编数首摇滚与独立流行乐作品。2004年Marvin The Martian发行了“Stay Off The Kane”，这是第一首被明确定义为Grindie的作品。", "chapter": "UK Bass", "examples": ["That Boy That Girl - Hadouken!【https://www.youtube.com/watch?v=Vya-GTQaz5w】"]}, "darkside": {"name": "Darkside", "ups": ["Grime", "UK Drill", "Hardcore Hip Hop"], "downs": [], "aka": "", "related": "", "desc": "Darkside是Terminator开创的一个Grime子流派，台风阴暗凶险，内容一般是缓慢而黑暗暴力的，有硬核嘻哈的味道，但是配器听起来更加肮脏，有些Drakside甚至受到UK Drill的影响。少数MC会制作该类型的歌曲，代表人物是Shxdow等。Darkside可以理解成“Dark Grime”，加之Grime本身就比较黑暗肮脏，导致Darkside更不易被主流接受，因此Darkside始终是一种很地下的流派。", "chapter": "UK Bass", "examples": ["Ice Mode - Shxdow【https://www.youtube.com/watch?v=bq62gPMsTEg】"]}, "instrumental grime": {"name": "Instrumental Grime", "ups": ["Grime", "Dubstep", "UK Garage", "Jungle"], "downs": ["Sinogrime", "Eskibeat", "Weightless Grime", "Eco Grime"], "aka": "", "related": "", "desc": "Instrumental Grime是一种Grime的子流派，起源于2000年代初的英国。其特点是大量使用Grime节拍、Bass和合成器音色，几乎没有人声，通常融合了Dubstep、Garage和Jungle等元素。由于这是一种没有人声的Grime，制作人们便可以尽情地在编曲上发挥自己的创意。Instrumental Grime的音色狂放、原始、粗糙、有侵略感，注重营造黑暗、紧张的氛围。近年来，Grime音乐越来越流行，许多艺术家都将Instrumental Grime的元素融入自己的音乐中。这种音乐对后来的Dubstep（尤其是Purple Sound）产生了很大的影响。", "chapter": "UK Bass", "examples": ["Black Tide - Mr. Mitch【https://www.youtube.com/watch?v=MlQMmB54Abs】"]}, "sinogrime": {"name": "Sinogrime", "ups": ["Instrumental Grime", "East Asian Traditional Music/Asian Underground"], "downs": [], "aka": "", "related": "", "desc": "Sinogrime是一个几乎瞬间兴起的，并在诞生后常年保持少量输出的Grime子流派。Sinogrime的提出者是Dubstep教父和Hyperdub厂牌创始人Kode9，最开始Sinogrime只是他的一张合辑的混音标题，自2005年伊始便有了这类混音曲目。Sinogrime是他赴中旅行多次后，受汉文化影响想出的点子，于是他在他第七次前往中国旅行的过程中，收集了很多融合了模糊的“中国风元素”的Grime音乐，这些制作人包括Wiley、Jammer、Wookie、Wonder、Geeneus等，歌曲里充斥着中华乐器和老式香港功夫电影的采样。Dan Hancox更是评价Wiley的《Shanghai》是“上海高楼大厦的声音”像“一把钢剑干净利落地切开英国嘻哈的木制大厦”。 Sinogrime是Grime子流派里最具有未来感的流派，同时也是定义最不清晰的流派。如今Sinogrime制作人已经蜗居在Reddit上的一个项目上活跃，但是Kode9仍然对这一流派充满信心，并且在他的Hyperdub厂牌里发布了很多融入了大量中华古典乐器元素的Sinogrime音乐。值得一提的是，Sino-可能来源于词汇Sinologist，发音来源其实是古代欧洲对秦朝(Qin)的误读，例如古希腊的写法“Sinai”，因此Sino-成为了“中国的”的意思。现在Sinogrime的活跃制作人包括：Kode9、Wiley、Fatima Al Qadiri以及国人制作人Howie Lee(李化迪)等。", "chapter": "UK Bass", "examples": ["Szechuan(四川) - Fatima Al Qadiri【https://www.youtube.com/watch?v=KOWNgSE_XRs】"]}, "rhythm & grime": {"name": "Rhythm & Grime", "ups": ["Grime", "Comtemporary R&B"], "downs": [], "aka": "R&G、R'n'G", "related": "", "desc": "Rhythm & Grime是由Terror Danjah、DaVinChe、Scratcha DVA等制作人在2004-2005年开创的一个子类型，并得到了广泛的认同与支持。这一子流派将Grime与R&B融合在一起，展示了Grime更柔和的一面，通常伴随着R&B人声，同时保持了Grime 140BPM的“粗糙”声音。许多Grime制作人也制作了各种R&G曲目，Ruff Sqwad、Wiley、Kano、Skepta、Dizzee Rascal等。Blackjack、Iron Soul、Low Deep和Kid D等制作人也将R&G元素融入他们的作品中。2006年，Scratcha DVA发行了由22位不同歌手演唱而组成的专辑The Voice of Grime，让听众首次见识到了这种女性参加演唱Grime的音乐类型，并迅速发展为一个重要场景。", "chapter": "UK Bass", "examples": ["Fire - Ny / Purple【https://www.youtube.com/watch?v=JA368pWxFfs】"]}, "uk bass": {"name": "UK Bass", "ups": ["UK Garage", "Acid House", "Dub", "Ambient", "Jersey Club", "Hybrid Trap etc."], "downs": [], "aka": "", "related": "", "desc": "UK Bass是近几年出现的一个术语，据称诞生于北伦敦，但是其形态早于名词出现。本质上UK Bass代指的是一类英式舞曲，主要包含UK Dubstep及其分支、UK Garage及其分支、Bubblegum Bass、Wonky、Leftfield Bass以及少量受这些风格启发的Hybrid Trap、House等音乐，因此在SoundCloud又被冠以“UK Dance”的名号。UK Bass涵盖范围很广，但凡是符合“英国”“碎拍”“地下”等要素中的几样就能被归类为UK Bass，因此Eco Grime和部分Deconstructed Club有时也被算入该范畴。一般情况下UK Bass主要以以下几种形式出现： ①以Hard Drum/UK Funky/Juke/Deconstructed Club为基础，本身保留浓厚碎拍风味或智能舞曲感的，例如Breaks N' Pieces系列专辑； ②以流行的UK House或Jersey Club为基础，搭配来自UK Dubstep或Jungle的沉重Subbass的，例如英国音乐人Fred Again..、瑞典组合Swedish House Mafia、南韩女团NewJeans等； ③注重音色设计与旋律或律动的搭配，依托Wonky、Hybrid Trap或Leftfield Bass等的，例如美国Bass音乐人Skrillex、我国音乐人孟奇、十音、咸盐等的部分作品； ④以Ambient Garage/Future Garage/Post-Dubstep等注重氛围的分支为展开方式，例如英国制作人Sagat、Mount Kimbie等； ⑤围绕UK Jackin'或Bassline做文章，例如Night Bass厂牌和Warp厂牌等。", "chapter": "UK Bass", "examples": ["Hackney Parrot - Tessela【https://www.youtube.com/watch?v=D8FZF9O9qpI】", "Thievery - Arca"]}, "uk dubstep": {"name": "UK Dubstep", "ups": [], "downs": [], "aka": "", "related": "", "desc": "(见UK Bass部分)", "chapter": "Ethnic", "examples": []}, "deep dubstep": {"name": "Deep Dubstep", "ups": ["UK Dubstep", "Ambient"], "downs": ["Purple Dubstep", "Dungeon"], "aka": "", "related": "", "desc": "本属UK Dubstep体系内，由爱好者单独分类出来的一个标签，“Deep”一词用来形容歌曲的氛围与Sub Bass带给人的感觉。这种音乐讲究营造极强的纵向听觉空间，如深渊般的Bassline铺底，时而浮现成段的非规则、非机械化的鼓点，带给人一种缺氧的快感。一般来说，Deep Dubstep的节奏较慢，鼓组与打击乐趋向极简，Bass通常是经过处理的正弦波。Purple Dubstep和Dungeon Dubstep被认为是在Deep Dubstep场景中形成的，后来脱离出来成为独立的流派。Deep Dubstep经常受到氛围音乐和世界音乐的影响，以及其他更现代的元素，有很多作品已逐渐开始使用更加“刺激”、类似于“激光”的Bass音色。相关厂牌有Tempo、Chestplate、Tempa、Artikal、Planet Mu、DDD、Lion Charge、Sub Soldiers、Sentry Records、Deep Tempo Podcast。 Substep是US Bass语境下相对于Deep Dubstep提出的说法，整体上元素跟Deep Dubstep相差无几，但是Substep常常运用Heavy Dubstep/Riddim/Hybrid Trap的结构，在这里不做详细区分，详情可见文案内介绍。", "chapter": "UK Bass", "examples": ["Odyssey - Boylan / Youngsta【https://www.youtube.com/watch?v=DJBlQjoWoms】"]}, "purple dubstep": {"name": "Purple Dubstep", "ups": ["UK Dubstep", "Wonky", "Instrumental Grime"], "downs": ["US Dubstep"], "aka": "Purple Sound、Purple Wow、Purple", "related": "", "desc": "2009年，Joker、Gemmy和Guido将Grime、Dubstep和8-bit类的电子游戏原声音乐融合在一起，被称为“Purple Wow”，后来统一称为“Purple Sound”，被很多人认为是UK Dubstep向Brostep过渡过程中的特殊产物。Purple Sound在声音上听起来像80年代的Synth Funk和90年代的G-Funk，在Dubstep和Instrumental Grime的基础上加以创新，与传统Dubstep相比有更多的中高频能量，怪异和有娱乐性的音色。2009年，Dubstep内部出现了许多分裂出来的小场景，Purple Sound便是其中之一，许多相关制作人最初都被认为是Wonky运动的一部分，直到他们自己的声音被定义为Purple Sound。虽然这种声音并没有获得很多的主流人气，但很明显，Purple Sound是UK Dubstep场景中最热门的声音之一，它对流派融合的反思性运用甚至在Dubstep社区之外赢得了不少关注，并与其他流派的各种艺术家产生联系。", "chapter": "UK Bass", "examples": ["Computa Love - B. BRAVO【https://www.youtube.com/watch?v=zgLNzP_Wv6M】", "40 Karats (feat. Zackey Force Funk) - Salva"]}, "dungeon": {"name": "Dungeon", "ups": ["UK Dubstep"], "downs": [], "aka": "Dungeon Dubstep", "related": "", "desc": "大约在Brostep真正开始在美国兴起的时候（2010-2012年），Dubstep界的一些乐迷似乎有一种共同的情绪，那就是尽量远离这种声音。这种反应催生了Dubstep的一个新的子流派——Dungeon。这并不是一场严格意义上的大运动，很多时候也并不会认为这是一种特殊的流派，但在UK Dubstep的历史上确实是一个重要的场景，也可以认为是“最后一个场景”。与黄金时期的大多数UK Dubstep相比，Dungeon的主题要黑暗得多，Bass的音色设计也更有针对性，最常见的特点是光滑、清脆的Bass，往往营造出稀疏的氛围。Chestplate、Innamind和Artikal等厂牌利用这种新的声音，在社区中为自己开辟了一片天地。", "chapter": "UK Bass", "examples": ["Escher - Oxóssi【https://www.youtube.com/watch?v=QJ4cUbqk8zE】"]}, "wonky": {"name": "Wonky", "ups": ["UK Dubstep", "Grime", "Beat Scene"], "downs": ["Aquacrunk", "Purple Dubstep", "Post-Dubstep", "L.A Beat Scene"], "aka": "Street Bass、Future Blap", "related": "", "desc": "2008年，融合了Hip-Hop、Grime、Chiptune、Dubstep、Crunk、Glitch Hop等音乐流派的Wonky诞生于Beat Scene。Wonky音乐往往有一种迷失和沉醉的感觉，经常使用一些特殊的切分音与游离节拍，使音乐显得摇摇晃晃，Wonky一词也由此而来。相对于Grime，Wonky对人声的需求更少，更多需要感受其配器上的动态变化。Wonky最终影响并确立了Post-Dubstep的声音。英国音乐厂牌Hyperdub是这种流派的关键厂牌，英国的制作人Rustie、Joker、Hudson Mohawke，以及美国的J Dilla、Flying Lotus都对这种风格起到了推动作用。Wonky曾一度被称为Aquacrunk（已分开介绍），它还在Bristol催生了一种更明确、更稳定的声音，被称为Purple Sound，并在2009年取得了巨大成功。许多Wonky艺术家如今仍在创作这种风格，不断有新的艺术家参与到这一场景，还有一些小艺术家在各种小厂牌中大放异彩。", "chapter": "UK Bass", "examples": ["Riot - Flying Lotus【https://www.youtube.com/watch?v=Axtkw80WXCE】"]}, "aquacrunk": {"name": "Aquacrunk", "ups": ["Wonky", "L.A Beat Scene", "Glitch Hop", "Purple Dubstep", "Crunk"], "downs": ["Bubblegum Bass", "Brostep"], "aka": "Aqua Crunk、Lazer Bass", "related": "", "desc": "Aquacrunk是一种EDM形式，2008年左右在格拉斯哥兴起，其特点是受Dubstep、Grime影响的切分、Halftime节奏模式，Funky、泥泞的、像“水中”音效的合成器和音效设计，偶尔也有融合Southern Hip-Hop和Crunk元素。Aquacrunk主要由制作人Rustie开创，他发行了《Jagz the Smack》等一系列具有开创意义的EP，该流派在格拉斯哥和英国电子乐界曾风靡一时，在其他地方也有很多受众，但直到2010年代初，该流派的制作人普遍转而制作Future Bass和EDM Trap。Aquacrunk与Bristol的Purple Sound（偶尔与这一流派交叉）等Dubstep相关场景同时兴起，这两种流派都使用了受电子游戏音乐影响的音效设计，2000年代后期，Purple Sound和Aquacrunk经常交叉融合。Aquacrunk还与Dubstep中日益复杂的音色设计的趋势有着千丝万缕的联系，如Tearout和后来Brostep的发展。Aquacrunk的封面通常具有未来主义风格，干净整洁，“塑料感”十足，使人联想到各种“水生”的场景。虽然Aquacrunk在2010年代初逐渐式微、逐渐被后来的潮流所取代，但它对后来的Bass Music制作人仍有很大影响，甚至还影响了PC Music的Bubblegum Bass这种充满塑料感和弹跳感的声音。", "chapter": "UK Bass", "examples": ["3.30 - Hudson Mohawke【https://www.youtube.com/watch?v=6VSKAF7WJQ8】"]}, "ambient dubstep": {"name": "Ambient Dubstep", "ups": ["Post-Dubstep", "Ambient"], "downs": [], "aka": "", "related": "", "desc": "Ambient Dubstep是Post-Dubstep的一种主流展开方式，同样是一个标签。Ambient Dubstep一般指氛围感强烈的回响贝斯，且主要是UK Bass体系下的风格展开。这类Dubstep为塑造氛围感并不严格强调2-step节奏型，因此常常有类似Ambient Techno的展开。有时这种风格被视为与Post Dubstep等同，这里为了展示Post Dubstep的特色专门区分开来。代表制作人包括：MANKRIKK、Mount Kimbie等。", "chapter": "UK Bass", "examples": []}, "bubblegum bass": {"name": "Bubblegum Bass", "ups": ["UK Bass", "Wonky", "Grime", "Dance-Pop", "Post-Internet"], "downs": ["Hyperpop", "Deconstructed Club"], "aka": "", "related": "PC Music", "desc": "Bubblegum Bass是一种电子舞曲风格，起源于2013年，有着UK Bass的基因，特点是将流行音乐的“可爱”和“女性化”发挥到极致，歌曲中往往充斥着古灵精怪的独立流行音乐或人声采样，并配以受到UK Bass、Wonky影响的失真、狂放的节奏。在制作过程中往往强调弹力十足、塑料感十足、如泡泡糖般有弹性又甜甜的合成器音色，并进一步融合了各种俱乐部元素，包括Electro House、Balearic Beat、Trance、Footwork、Bubblegum Dance等。SOPHIE和A. G. Cook是这一流派最著名的两位艺术家，此外还有澳洲制作人Ninajirachi、Orange Milk Records旗下制作人Digifae等代表制作人，A. G. Cook的厂牌“PC Music”是这一流派最具代表性的厂牌，DIS杂志所讲述的“后互联网美学”也从声音和视觉上影响并完善了Bubblegum Bass的音乐形式。", "chapter": "UK Bass", "examples": ["Beautiful (2023 Edit) - A. G. Cook【https://www.youtube.com/watch?v=DCFvNFafeVA】"]}, "leftfield bass": {"name": "Leftfield Bass", "ups": ["UK Dubstep", "Deep Dubstep", "Halftime"], "downs": ["Global Bass"], "aka": "", "related": "", "desc": "Leftfield Bass是Bass音乐的一个标签化的叫法，诞生于2017年左右，指代所有以声音设计为重点的实验性Bass音乐风格，受到了Dubstep（尤其是Deep Dubstep）、Garage、Drum & Bass、Jungle、Hip-Hop和L.A Beat Scene（与Glitch Hop等场景共同属Beat Scene的附属场景）的影响。Leftfield Bass没有固定的特点，节奏范围也很大，但Leftfield Bass通常都是激进的、有侵略感的、强调合成器的表现，通过音色设计将Bass过度夸张化，产生一些在主流Dubstep中永远不会听到的独特声音，并带有浓重而“冰冷”的电子美感。", "chapter": "UK Bass", "examples": ["Observer - N²【https://www.youtube.com/watch?v=ciFdxuAf9XQ】"]}, "global bass": {"name": "Global Bass", "ups": ["Leftfield Bass", "Juke", "Moombahton"], "downs": [], "aka": "", "related": "", "desc": "Global Bass本身是一种自由形式的DJ手法，严格来说并不属于一种音乐流派，后来受到Leftfield Bass影响并被认为属Leftfield Bass子流派，由波特兰的DJ兼制作人JMay定义。Global Bass起源于纽约和伦敦的Bashment和Soundclash俱乐部，这种融合的新声音迎合了当地人的口味。00年代中期，Global Bass的声音开始在欧洲的Buraka Some Sistema、Radioclit和MIA等制作人/乐队的作品中体现出来，并在伦敦、纽约和其他地方发展壮大。在声音上，Global Bass是带有一定民族特性的实验性Bass Music，从巴尔干、亚洲、拉美、非洲到中东，所有将世界音乐元素与Bass Music结合起来的都可以算是Global Bass。Global Bass的宗旨是自由与随心所欲的融合，在音乐形式上或许并不适合传统Bass Music听众，但适合几乎全世界的派对舞者，是一种面向全球的舞曲。", "chapter": "UK Bass", "examples": ["Pink Oblivion - Yokaze【https://www.youtube.com/watch?v=1yjn8q_3A3Q】"]}, "melodic bass": {"name": "Melodic Bass", "ups": ["Melodic Dubstep", "Future Bass", "Melodic Trap"], "downs": ["Midtempo", "Cinematic Bass"], "aka": "", "related": "", "desc": "Melodic Dubstep融入更多Future Bass元素后的产物，旋律变化相对于Melodic Dubstep更少，但Lead更具有冲击力。Melodic Bass有Melodic Dubstep和Melodic Trap各自一半的基因，模糊了Bass乐和Trap乐的边界，听感非常靠近Heaven Trap，某种意义上是使用2-step鼓组的电子舞曲风格的一次胜利会师。代表制作人是ILLENIUM。", "chapter": "UK Bass", "examples": ["Needed You - ILLENIUM / Dia Frampton"]}, "crunkstep": {"name": "Crunkstep", "ups": [], "downs": [], "aka": "", "related": "", "desc": "(详见US Bass板块相应词条)", "chapter": "Hip-Hop/Trap/Future Bass", "examples": []}, "trapstep": {"name": "Trapstep", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见US Dubstep分支）", "chapter": "Hip-Hop/Trap/Future Bass", "examples": []}, "future-core": {"name": "Future-core", "ups": ["J-Happy Hardcore", "Future Bass", "Jersey Club"], "downs": [], "aka": "", "related": "", "desc": "彻头彻尾的日系标签，初定义为MEGAREX的专辑《FÜGENE》，Future Bass加Hardcore，Future-core一定程度继承J-Happy Hardcore和UK Hardcore的特征，融合了Future Bass、Jersey Club的一些元素加入，大多Future-core作品的Jersey Club要素时常溢出，很多人也调侃其为Jersey core（笑）", "chapter": "HDM", "examples": ["café + m!lk + chocolate - DJ Raisei"]}, "acidcore": {"name": "Acidcore", "ups": ["Hardcore Techno", "Acid House"], "downs": [], "aka": "", "related": "", "desc": "真·万物皆可酸( Acidcore是Hardcore Techno的一种主流表现方式，事实上很多Hardcore Techno都会带点Acid Bassline，Acidcore特指那些Acid Bassline很突出的Hardcore Techno。Acidcore与Hardcore Techno几乎是同时出现，由DJ Choose在1993年正式提出。", "chapter": "HDM", "examples": ["No End In Sight - V-Room"]}, "doomcore": {"name": "Doomcore", "ups": ["Hardcore Techno", "Industrial Hardcore"], "downs": ["Doom Techno [Tag]"], "aka": "", "related": "", "desc": "Early Doomcore诞生于1993年，与Hardcore Techno有很大交集。一般认为Doomcore是由Industrial Hardcore发展而来，但是二者没有分支关系。到了千禧年出现了新的一批Doomcore制作人，此时以New Doomcore的名义继续延续着Doomcore的未来。尽管Doomcore的BPM在130~150之间（当然有例外），比许多Hardcore流派慢了不少，但听感上往往侵略性更强。标志性的 TR-909 Kick Drum的使用方式与其他Hardcore类型不同，往往失真不会很严重，有时会加上混响的效果。类似于Doom Metal和Dark Ambient，注重阴沉、恐怖的氛围塑造。", "chapter": "HDM", "examples": ["World Of Chaos - Is:end"]}, "gabber": {"name": "Gabber", "ups": ["Hardcore Techno"], "downs": ["Happy Gabber", "Nu-style Gabber"], "aka": "", "related": "Gabba、Early Hardcore", "desc": "约1991诞生，在荷兰鹿特丹，Paul Elstak等制作人带动了一种更快的Hardcore形式，主要特征是沉闷扭曲的低音鼓的高速轰鸣。“Gabber”这个词来自阿姆斯特丹Bargoens俚语，意思是“朋友”。早期的Gabber也称为“Gabba”，是Hardcore Techno的一个子流派。Gabber及其亚文化在那时的荷兰非常流行，不少荷兰的青少年推崇这一音乐和背后的文化，最后成为了主流。无论是在鹿特丹乐坛还是欧洲其他地方都曾风靡一时。Gabber其实是一个很无聊的风格，毕竟大家基本都是“咚咚咚咚”的，所以没并没有留下带有深刻记忆点的曲子，而后到了Happy Gabber和Happy Hardcore才出现了被人们传颂的经典曲目。在这里的Gabber词条更多是一个统称。", "chapter": "HDM", "examples": ["A.E.I.O.U. - DJ Buby / The Stunned Guys"]}, "old school gabber": {"name": "Old School Gabber", "ups": ["Hardcore Techno", "Gabber"], "downs": [], "aka": "", "related": "", "desc": "Gabber最开始的形态，仍然保留着Hardcore Techno的Techno味道，失真情况并没有那么强烈，在听感上有点像后续法国Tekno场景的产物Pumpin。一开始Old School Gabber常常与Hardcore Techno交换名词使用，之后Old School Gabber便转化为常听到的类型，Hardcore Techno组分逐渐被其他元素所取代。（对例曲的制作人就是老铁，那时候他还在用Da Joker的身份发布音乐）", "chapter": "HDM", "examples": ["Willow - Tiësto"]}, "happy gabber": {"name": "Happy Gabber", "ups": ["Gabber", "Oldskool Rave Hardcore"], "downs": ["Makina", "Happy Hardcore"], "aka": "", "related": "", "desc": "出现于1990s早期。在英格兰的狂欢中占主导地位的Breakbeat Hardcore风格在苏格兰普遍不受欢迎。这归因于英国各地的地区音乐、文化和种族差异；Breakbeat在苏格兰被认为是 \"英国黑人的东西 \"和 \"外来的音乐文化\"。Gabber诞生后，由Scott Brown在英国推行了一个更易于接受的Gabber形式，他被称为Happy Gabber，在Gabber中融合了一些Rave的元素，例如Breakbeat、Rolling Piano、Rave Stabs以及滑稽的人声，弹跳性十足。而后也影响了Happy Hardcore。", "chapter": "HDM", "examples": ["Stars (Hardcore Remix) - Charly Lownoise & Mental Theo"]}, "dutch artcore": {"name": "Dutch Artcore", "ups": ["Gabber", "Breakbeat Hardcore"], "downs": [], "aka": "", "related": "", "desc": "Patrick van Kerckhoven (A.K.A. DJ Ruffneck)为了给他自己独特的音乐风格(后来被称为Dutch Artcore)提供一席之地，从而创立了Ruffneck Records厂牌，目的是将Breakbeat Hardcore带到荷兰。在该厂牌发行的所有唱片中，Breakbeat元素始终扮演着重要的角色，将他与撕裂的Juno合成器(如Hoover音色)和严重失真的Gabber Kick相结合，给整个Hardcore场景留下了永久的印象和独特的听觉。该厂牌从1993年开始运作，直到1997年该厂牌因经济官司停止了运作。 Gangsta Audiovisuals是Patrick van Kerckhoven与XSV断绝关系后再Ruffneck Records旗下继续经营的Hardcore厂牌，主要风格保持不变。它从1998年开始活跃，直到2001年该厂牌及其制作人转到了另一厂牌：Enzyme Records，并放弃了Dutch Artcore，转而制作Darkcore (详见Industrial Hardcore下位词条)和Industrial Hardcore。虽然Dutch Artcore在当时乃至现在都是一个很少使用的流派词汇，但是仍有一些荷兰厂牌在坚持Dutch Artcore音乐。", "chapter": "HDM", "examples": ["Ruffneck Reality - Hyperion"]}, "nu-style gabber": {"name": "Nu-style Gabber", "ups": ["Gabber"], "downs": [], "aka": "", "related": "", "desc": "90年代末期，最原始的Gabber声音开始变得不那么被人们欢迎，Gabber也跟随者降速运动的浪潮，慢慢演化出一种较慢且更硬的形式，即Nu-style Gabber。", "chapter": "HDM", "examples": ["Dancefloor Hardcore - Promo"]}, "millennium hardcore": {"name": "Millennium Hardcore", "ups": ["Nu-style Gabber"], "downs": ["Melodic Hardcore [Tag]", "Mainstream Hardcore"], "aka": "", "related": "", "desc": "在千禧年之际，一种更扭曲更硬的形式出现在大众前，他被人们称之为Millennium Hardcore，Nu-style到Millennium Hardcore也是最早的主流硬核的演变过程。BPM普遍没有我们现在听到的Hardcore那么快，大概在150-170。那时的Angerfist也是该流派的领军人物。同时也为更为主流、现代化的Hardcore提供了基础。", "chapter": "HDM", "examples": ["Cannibal - Angerfist"]}, "mainstream hardcore": {"name": "Mainstream Hardcore", "ups": ["Millennium Hardcore", "Nu-style Gabber"], "downs": [], "aka": "", "related": "", "desc": "加上个“Mainstream”，代表着这一名词用来形容那些如今我们所听到的主流Hardcore，现在我们所接触的Mainstream Hardcore是00年代末的形式逐步发展而来的，Kick从原来的粗糙感变得通透厚重，制作也越来越成熟，BPM也差不多是160~220。Angerfist、DJ Mad Dog、Miss K8、D-Fence等是代表DJ/制作人。", "chapter": "HDM", "examples": ["Dogfighter - DJ Mad Dog & Dave Revan"]}, "uptempo hardcore": {"name": "Uptempo Hardcore", "ups": ["Hardcore", "Industrial Hardcore"], "downs": ["Speedcore", "Terrorcore", "Noisecore"], "aka": "", "related": "", "desc": "1st Stage：早期发展 该流派最初是由DJ Partyraiser创造，速度比主流的Hardcore更快，BPM通常在185-220左右（当然有更快的例子），它的主要特点是Lo-fi低保真地制作，强烈、刺耳、失真的Kick，通常没有旋律。早期的Uptempo还比较接近Mainstream，因此也有不少主流硬核制作人会涉猎Uptempo的制作。该制作理念也影响了不少更为高速的Hardcore子分支。 2nd Stage：迈向现代 现代的 Uptempo Hardcore 除了速度较快以外，在鼓点上也更加激进。与 2012 - 2018 年间主流核所惯用的中低频较为扎实的鼓不同，其所用的鼓点的音头基本由高频失真音色所构成，使作品整体的听感趋向于尖锐失真感。在 2020 年后，这一类作品大有成为新主流的趋势。今天我们熟知的Pipe Kick和Zaag Kick这时期的产物。Zaag Kick由Dimitri K、The Dark Horror、MBK、Greedy Pussy Fuckerz等推广，近期又出现了一种更“抽象”的音色——Helied Kick，主要是EQUAL2、Semperfusion、Invaderz、MBK推广，代表厂牌是new.wave.music.。", "chapter": "HDM", "examples": ["Pussy Motherfuckerz (D-Fence Remix) - Endymion [1st stage]", "RIP - DRS & MBK [2nd stage]"]}, "terrorcore": {"name": "Terrorcore", "ups": ["Gabber", "Dark Ambient Scoress", "*Uptempo Hardcore"], "downs": ["Speedcore"], "aka": "", "related": "", "desc": "发源于1990s中期的荷兰鹿特丹（那里也是Gabbar的发源地），一般认为是Drokz提出了这一名词。BPM在160-300之间，往往采样恐怖电影（而且这些采样往往会失真+扭曲），歌曲整体如同字面意思一般很“恐怖”。现在一般作为Uptempo的一种形式。", "chapter": "HDM", "examples": ["I See You - Prime Directive", "The Cell - DRS & MBK & Madsin [Uptempo形式例子，不选用]"]}, "crossbreed": {"name": "Crossbreed", "ups": ["Oldskool Industrial Hardcore", "Skullstep", "Darkstep", "Hardstep", "Breakcore etc."], "downs": [], "aka": "Cross Breed, Crossbreed Hardcore, Core 'N' Bass", "related": "", "desc": "Crossbreed是完全将Hardcore渗透进Drum & Bass的极端类型，有时甚至将Kick的声音全部替换成失真Kick。Crossbreed建立在Industrial Hardcore的基础上，吸收了Skullstep和Darkstep的特色，结合了Hardcore中的高频重击底鼓与高BPM，以及Skullstep/Darkstep中的清脆军鼓。该风格据称首次诞生于2006年，由DJ Hidden与Eye-D组成的乐队The Outsider Agency首创。", "chapter": "HDM", "examples": ["Invisible - Strobcore & AK-Industry", "Requesting Backup - DJIPE"]}, "amigacore": {"name": "Amigacore", "ups": ["Industrial Hardcore", "Tracker Music", "Techno"], "downs": ["Cheapcore"], "aka": "Amiga Hardcore", "related": "Cheapcore", "desc": "Amigacore是Tracker Music的一种形式，指用第一代Amiga Tracker（如ProTracker、OctaMED）做出的类似Gabber的4/4 Hardcore [EDM]（如Gabber、Terrorcore、Speedcore、Industrial Hardcore、Bouncy Techno）。由于Amiga的Paula声音芯片仅有4个8位通道，采样率较低，Amigacore 的特点是8-bit的、原始的、粗糙的、干燥的极简主义声音，没有任何外部的现代效果，与其他Hardcore相比，作品往往特别重复、单调且更具侵略性，大多数作品都是单声道或伪立体声。Amigacore流行于20世纪90年代前半期，经常出现在各种合辑中，如Thunderdome，其中包括Neophyte、Hardsequencer和Patric Catani等艺术家的作品，因为Tracker是当时硬核音乐制作的主要方法之一，也是第一种真正廉价且容易获得的音乐制作手段。20世纪90年代中期，IBM PC上出现了更先进的Tracker，如FastTracker 2，音质更好，功能更强大，许多Tracker Music制作人开始转而使用它们，放弃了过时的设备。尽管如此，仍有一些制作人继续在Amiga上创作音乐，适当地为原始粗糙的硬核音乐增添亮色，从而将20世纪90年代早期硬核音乐中的“肮脏、低保真的声音”发扬光大。澳大利亚组合Nasenbluten和他的厂牌Bloody Fist Records是这一流派的代表。Cheapcore与之不同的是，它指的是一种类似的声音，但不一定用Amiga甚至Tracker制作。如今，Amigacore已成为一种极为小众的东西，几乎完全是在Tracker和Demoscene的框架内产生的。", "chapter": "HDM", "examples": ["Feeling Shit - Nasenbluten"]}, "abstractcore": {"name": "Abstractcore", "ups": ["Industrial Hardcore", "Noisecore", "Giltch"], "downs": ["Cybercore"], "aka": "", "related": "", "desc": "Abstractcore是一种由制作人主导的风格，常常在Industrial Hardcore或者Noisecore的基础上加入更多故障、噪音元素，或者类似电路扰动的声音，甚至将Kick都换为噪音或采样，创造一种几乎完全不可听的感受。目前少量Noisecore会制作这种风格。 而Cybercore则是制作人Neurocore将自己制作的Abstractcore称为“Cybercore”。Cybercore的特点是其特殊的未来感、赛博朋克感的故障噪音和采样，有时会采用Breakcore的结构。一般Kick也会更柔和，并且表现为电路脉冲式的故障音Kick，有时候听起来甚至像警铃。除此之外，Cybercore还会使用大气的氛围感，烘托一种冰冷但是近未来式的感受。目前这种风格占据了Abstractcore大部分作品，某种意义上这两个说法可以不用详细区分。", "chapter": "HDM", "examples": ["We Hate Russell - Venetian Snares", "Cold As A Cyborg - Neurocore"]}, "speedcore": {"name": "Speedcore", "ups": ["Gabbar", "Hardcore", "Hardcore Techno"], "downs": ["Splittercore", "Extratone"], "aka": "", "related": "", "desc": "出现在1990s中期，与Industrial Hardcore与Terrorcore等高速Hardcore同步发展。早期的Speedcore BPM在230-300之间，听感也比较Oldskool，但现如今的Speedcore已经很少低于300，一些子分支的BPM已经没有了限制（可以达到十万甚至九万级别），Kick通常不会很失真。Speedcore对HDM界影响甚远，在日本那边更是发展出了截然不同的形态。毫无疑问地，这是电子音乐领域里BPM最快的分支。", "chapter": "HDM", "examples": ["Welcome to Hell - Komprex & Nekrosystem"]}, "j-speedcore": {"name": "J-Speedcore", "ups": ["Speedcore", "J-core"], "downs": [], "aka": "", "related": "", "desc": "日本的Speedcore更为强调多变的节奏，注重旋律，多数的J-Speedcore不会太过注重失真表现，相对欧美Speedcore更容易接受", "chapter": "HDM", "examples": ["HAPPY★EMOTION - Rukadesu"]}, "suizidcore": {"name": "Suizidcore", "ups": ["Splittercore"], "downs": [], "aka": "", "related": "", "desc": "德国制作人Pressterror提出了一词用于形容他制作的Splittercore，主题极其黑暗。\"Pressterror的音乐让人失去理智,makes them wanna jump through the walls and commit suicide\"。听众们如此形容道。", "chapter": "HDM", "examples": ["Rebirth Of The Suizidcore (Hirn Flick Flack) - Pressterror"]}, "extratone": {"name": "Extratone", "ups": ["Speedcore"], "downs": ["Melodic Extratone", "Supertone", "Extraflash"], "aka": "", "related": "", "desc": "Speedcore的再度升级版，BPM大于等于1000都可以用 Extratone来形容。BPM过快，以至于几乎无法区分Kick了。", "chapter": "HDM", "examples": ["The Sounds ov Dying Gods - Neocoretex", "Uranoid - Diabarha"]}, "flextone": {"name": "Flextone", "ups": ["Extratone"], "downs": [], "aka": "Glitchcore（和Breakcore场景、Hyperpop场景的Glitchcore都不同）", "related": "", "desc": "Flextone是Extratone的一个子流派。这个词是由MG Mucus（DJ Mucus）发明的。它是“Flexing”和“Tone”的复合词。Flextone与Chaosequence类似。BPM随意高速或不确定。特点是音高变化快，频率范围宽，经常使用采样，同时也极大地扭曲了这些采样。Flextone听起来像噪音，因为它几乎没有旋律或节奏。制作人：MG Mucus、Kotaks、M.A.X The Distirgator 329、D.D.S.L.、Distorted Maniac、Cornhole Crucfixing。", "chapter": "HDM", "examples": ["Cornhole Crucfixing - Fasaa", "DJ Mucus - The Walking Schlop", "Kotaks - Pto。"]}, "melodic extratone": {"name": "Melodic Extratone", "ups": ["Extratone"], "downs": [], "aka": "", "related": "", "desc": "真就万物皆可Melodic（。如同字面，这是加入了旋律元素，弱化了鼓点的Extratone。或许是最容易入手的Extratone？另外如果你有兴趣听这类音乐，你或许该把目光投向某些日本制作人上。", "chapter": "HDM", "examples": ["Everything Falls Apart - Dr. Peacock & Aekhlorią [2分42后]", "Stars Can't Shine - Aekhlorią"]}, "supertone": {"name": "Supertone", "ups": ["Extratone"], "downs": [], "aka": "", "related": "", "desc": "波兰制作人Diabarha开创了这一术语，BPM在15000- 1.200.000之间（对，1.5万至120万）。有人认为这种音乐只是一种噱头，并无太多实际意义。至于为什么该流派有BPM上限，那是因为还有个叫“Hypertone”的东西。", "chapter": "HDM", "examples": ["The side of the dark -  Diabarha", "Melancholy - Hecatonchires"]}, "hypertone": {"name": "Hypertone", "ups": ["Extratone"], "downs": [], "aka": "", "related": "", "desc": "BPM大于1.200.000以上（对，120万）的核都可以用这个Hypertone来形容，恐怕这个世界上没有比这个BPM更快的标签了罢，完全听不见鼓点的声音。", "chapter": "HDM", "examples": ["Andromeda Galaxy - the omniverse", "Milky Way Galaxy - tatsuyangu"]}, "speed bass": {"name": "Speed Bass", "ups": ["Speedcore", "Breakcore", "Glitch", "Noise", "Experimental", "Gabber etc."], "downs": ["Spitbass", "Slug 'N' Bass"], "aka": "", "related": "", "desc": "Speedbass是一种电子音乐，隶属于Speedcore/Rave 场景的一个分支，也属于实验电子的范畴，起源于Speedcore，融合了Gabber和DnB/Jungle，它没有官方的定义，目的是反主流反传统。Speedbass诞生于90年代中期的美国西海岸，其他类似的场景也在北美发展，比如纽约的Hardcore Techno场景和威斯康星州的Heavy Bass Techno场景。主要制作人为Anti-Kati，其分支有Spitbass、Happy Speedbass、Slug 'n' Bass。", "chapter": "HDM", "examples": ["GeorDie Salvation (Original Mix) - Toecutter"]}, "spitbass": {"name": "Spitbass", "ups": ["Noise", "Speed Bass", "Minimalism", "Anti Music Sport"], "downs": [], "aka": "", "related": "", "desc": "Spitbass是Speed Bass的一个子流派，但是似乎它的存在是为了搞怪而被创造的。其特点是极高的频率和低保真的处理效果，以及噪音一般的混音处理，使得音乐具有完全不可听性。Spitbass之于电子音乐就像主流低质量Grindcore之于整个摇滚类体系，混乱、无法欣赏是他们的共同之处，最重要的是，他们的时长都很短----Spitbass甚至不存在长于15秒的歌曲(虽然Grindcore存在1秒的曲子)。", "chapter": "HDM", "examples": ["Tha Rite of Guitars - Anti-Kati"]}, "slug 'n' bass": {"name": "Slug 'N' Bass", "ups": ["Speed Bass", "Breakbeat Hardcore"], "downs": [], "aka": "", "related": "", "desc": "Slug 'N' Bass是Speed Bass的三大微流派之一，似乎继承了Happy Speed Bass的可听性，没有过于嘈杂的声场，显得节奏幽默滑稽。Slug 'N' Bass可能是Speed Bass里面最不像Speedcore的微流派了，他的鼓编更像Jungle或Raggacore，听感上则与Fakecore和IDM有相似之处。区别Slug 'N' Bass的最好方法就是听Bassline，Slug 'N' Bass有所有风格里独一份的Slug Bass，像是融合了Acid Bassline的尖酸和Vomit Bass的粘稠，给人以一种蛞蝓爬过耳朵的感受，也可能因此这种风格得名Slug 'N' Bass罢(笑)", "chapter": "HDM", "examples": ["Something Something Fakecore - Anti-Kati"]}, "uk tekno": {"name": "UK Tekno", "ups": ["Free Tekno", "Rave"], "downs": ["Tribe"], "aka": "UK Hard Techno", "related": "", "desc": "早期重要的Tekno流派，起源于 1990 年代初期的英国，不同于德国和荷兰的声音，更有Rave色彩。该场景初期主要由英国团体Spiral Tribe和Network领导，后续催生出了Tribe。", "chapter": "HDM", "examples": ["In From the Night - Planetary Assault Systems"]}, "tribe": {"name": "Tribe", "ups": ["Free Tekno"], "downs": ["Tribecore"], "aka": "Tribetek", "related": "", "desc": "Tribe是上世纪90s年代兴起于西欧地区(英国与比利时为主)的一种tekno音乐，，与Teknival场景强相关，常在其中播放。英国的Spiral Tribe对这种风格的成型做出了最大贡献，这种音乐常常表现为部落感的听感和强大的音响系统，尤其是Spiral Tribe的音乐最有代表性，因此也常被称为Spiraltek。另外，Tribe音乐常常不使用额外的采样与Vocal，这也是区分Tribe和其他Free Tekno的一个特点。", "chapter": "HDM", "examples": ["Forward The Revolution - Spiral Tribe"]}, "mental": {"name": "Mental", "ups": ["Free Tekno"], "downs": ["Mental Hardfloor"], "aka": "Mentaltek", "related": "", "desc": "Mental是Tribe的子分支，其特点是精神病式诡异的旋律和压抑窒息的氛围，鼓组也被处理成深沉不安的形式。奇怪的是，这种阴森奇诡、令人毛骨悚然的Tekno仿佛是被人为抹去了，整个中文互联网几乎都没有这种音乐的介绍，仅有少数Mental set可以收听。不过即便如此，这种音乐仍然影响了很多Hardtek子分支，形成了各异的分支。 B站上关于Mental/Mentalcore的DJ Set: $ђäяk - ACIDCORE MENTALCORE", "chapter": "HDM", "examples": ["DARKSIDE - MENTALTEK"]}, "french tek": {"name": "French Tek", "ups": ["Free Tekno", "House"], "downs": ["Heretik"], "aka": "Tek、French-tek", "related": "", "desc": "由DJ HS发明、由Lobotomy Inc.、Major Bryce、Grey C、Tranceball等电子音乐制作人推广的Free Tekno子分支，与法国的Teknival场景紧密相关。French Tek一般速度偏慢，结构简单，弹跳感充足，且旋律滑稽有趣。French Tek与Free Tekno相比底鼓更坚硬，且在发展成型过程中受到Hard House等风格的影响，使其成为当时的主流Rave音乐。与此同时，在安德卫普（比利时的一个城市）这种音乐得到了新的发展，新的制作人如Mark With A K等参与到French Tek的发展中，音乐中心逐渐转移到比利时并逐渐流行，影响了一干风格如Frenchcore、Jumpstyle等。", "chapter": "HDM", "examples": ["Come On (Mory Klein remix) - X-filter / Dj HS"]}, "tekclub": {"name": "Tekclub", "ups": ["French Tek"], "downs": [], "aka": "", "related": "", "desc": "French Tek的一个子分支，是French Tek早期表现形式/前身。这种风格的特点是环绕于Kick的破碎鼓组和坚实深沉的声音，听感上比French Tek更硬，俱乐部节奏具有十分Funky的感受。2001-2002年该风格在法国和比利时再度复兴，并为现如今的Frenchcore等形成了奠基。", "chapter": "HDM", "examples": ["Mambo - Dj Lb"]}, "heretik": {"name": "Heretik", "ups": ["Free Tekno", "French Tek"], "downs": [], "aka": "", "related": "", "desc": "Heretik本是一个来自于法国的地下Free Tekno/French Tek团体，诞生于1996年，由一群热爱电子音乐的听众组成，是Free Tekno地下运动的支柱。Heretik在法国组织了数十个Teknival派对 (如巴黎的Zenith) ，并在意大利和捷克举办Rave派对。由于Heretik的成员制作的风格各不相同，囊括了Techno、Tekno、Hardcore、Hardfloor等，久之他们形成了自己独特的Free Tekno声音，被媒体命名为“Heretik”音乐。Heretik自成一派，其音乐主要保存在Heretik成员压制的乙烯基唱片上或CD上，这些音乐对后来的Modern Hardtek和Hardcore的声音产生了影响，推动了音响系统在HDM内的发扬。", "chapter": "HDM", "examples": ["Cyberurier - Heretik System"]}, "early hardtek": {"name": "Early Hardtek", "ups": ["Free Tekno", "Hardcore"], "downs": ["Tribecore", "Pumpcore", "Modern Hardtek"], "aka": "", "related": "", "desc": "包括当时的Trance演化成了Hard Trance，不少音乐都变得越来越硬，越来越快。Free Tekno不断提高BPM，同时也让听感更“硬”，Early Hardtek(以下简称Hardtek)就从Tekno演化而来，并开始主导英国法国的派对。现在的Hardtek一般都指更为现代的Modern Hardtek，BPM在170-220左右，反拍贝斯尤为明显，与主流Frenchcore的界限更小。", "chapter": "HDM", "examples": ["Electrovore - Androgyn Network"]}, "tribecore": {"name": "Tribecore", "ups": ["Tribe", "Hardtek", "Frenchcore"], "downs": ["Tribecore Hardfloor", "J-Tribecore", "Tribecore Freecore", "Melodicious Tribecore"], "aka": "", "related": "", "desc": "在00年代初从Tribe音乐衍生出的更硬的变体，Frenchcore根植于在Hardtek的主要形式，一说：“Tribe和Frenchcore的混合物”，它通常带有工业元素和更Dancefloor的声音，底鼓更加饱满厚实，有时采用大量滑稽的采样。到了10年代，这种声音有了颓势，Modern Hardtek占据了主流地位。需要注意他是Hardtek原始声音的分支，而Raggatek和Jungletek属于Modern Hardtek。", "chapter": "HDM", "examples": ["Nuklear Circus - Kefran Narkotek"]}, "j-tribecore": {"name": "J-Tribecore", "ups": ["(Melodicious) Tribecore", "J-core/Nerdcore"], "downs": [], "aka": "", "related": "", "desc": "Tribecore在日本产生的变体，诞生年代不详，J-Tribecore不再局限于传统Tribecore的声音限制，广受Melodicious Tribecore的影响，倾向于使用激扬的旋律和游戏采样。J-Tribecore是J-core的一种常见展开方式，很多J-core作品甚至Artcore [J]都会在其中掺杂J-Tribecore Drop等。由于Tribecore特点是坚实的底鼓和嘈切而不混乱的配器，因此很受音乐游戏欢迎。主要制作人是日本电子音乐制作人/曲师USAO等。", "chapter": "HDM", "examples": ["invoker - USAO"]}, "pumpin": {"name": "Pumpin", "ups": ["Hardtek", "Tribe"], "downs": ["Pumpin Hardfloor"], "aka": "Pumpincore", "related": "", "desc": "诞生于1990s后期，创造者不详，但是的确是Hardtek领域内一个很重要的流派，特点是“泵”一般弹跳的Kick音色。", "chapter": "HDM", "examples": ["Johnny Stechinno - Fky"]}, "hardfloor": {"name": "Hardfloor", "ups": ["Hardtek", "Rave Techno", "EDM (Old Fasion)", "Tribe"], "downs": [], "aka": "", "related": "", "desc": "Hardfloor跟Tribecore有相似性，但是与之相比又略有不同。Hardfloor诞生于1996年，顾名思义更适合Dancefloor，更偏向于舞曲，充满活力，且更接近Modern Hardtek因而更具有Techno的味道，迷幻感更少(Mental Hardfloor除外)，编曲也常常更滑稽。Hardfloor的鼓组是清一色的4-on-the-4-floor节奏型的低音Kick，Snare和Hi-hat都很少见，因此EDM浪潮下衍生出的Pumpcore更接近Frenchcore或Modern Hardtek。Hardfloor是Tekno场景中相当重要的一种Rave声音，常与Tribe、Pumpin同时被提及，主要制作人包括佐藤直纪、Nout Heretik、Teska等。子曲风标签包括：Acid Hardfloor、Pumpin Hardfloor、Mental Hardfloor、Tribecore Hardfloor、EDM Hardfloor(Pumpcore [E])、Frenchcore Hardfloor等。", "chapter": "HDM", "examples": ["Public Pump 01 - Tekno's23", "Strikeout - Hardfloor"]}, "tribecore hardfloor": {"name": "Tribecore Hardfloor", "ups": ["Tribecore", "Hardfloor"], "downs": [], "aka": "", "related": "", "desc": "Hardfloor是Hardtek分支里包容性最好的一种子分支，很多风格都能与其融合，形成听感各异的子风格。Tribecore Hardfloor是Hardfloor的其中一种融合性分支，结构上保留了Hardfloor类似Techno的编排和快速的速度以及干练的低音鼓，但是融合了Tribecore的工业感和失真，与Frenchcore Hardfloor很相似，但是Tribecore Hardfloor的Kick更干硬。", "chapter": "HDM", "examples": ["Vitamine C-2020 Edit - DJ Looney"]}, "pumpin hardfloor": {"name": "Pumpin Hardfloor", "ups": ["Pumpin", "Hardfloor"], "downs": [], "aka": "Hardfloor To Pumpin'", "related": "", "desc": "Pumpin Hardfloor是早期Hardfloor的融合体现之一，Hardfloor结合了Pumpin极简的结构编排和泵一般弹跳的失真Kick音色。这种风格的特点与Pumpin最大的区别就是速度。Pumpin Hardfloor的速度仍保持在170BPM左右，且会使用三拍子节奏型，使其与地下舞池更适配。代表制作人包括Stephan Strube、Continuum等。", "chapter": "HDM", "examples": ["Fucking Society - Stephan Strube"]}, "tekcore": {"name": "Tekcore", "ups": ["Pumpin Hardfloor", "Modern Hardtek", "UK Tekno", "Hardcore"], "downs": [], "aka": "Happy Tekcore", "related": "", "desc": "Tekcore是Mat Weasel Busters提出的标签，风格基于Modern Hardtek，并添加了弹跳感的Kick等元素，因而实际上与Hardcore没有太多关系。Tekcore/Happy Tekcore起初在1997年被提出，被认为是Pumpin Hardfloor的子分支，隶属于Hardtek场景，有时。如今的Tekcore更多得与Modern Hardtek产生联系，属于后者风格体系之下。", "chapter": "HDM", "examples": ["Let's Go - Mat Weasel Busters"]}, "edm hardfloor": {"name": "EDM Hardfloor", "ups": ["Hardfloor", "Modern Hardtek", "Neuro Funk"], "downs": [], "aka": "Neuropumpcore、Pumpcore [E]", "related": "", "desc": "和Glitch Hop一样，Hardfloor在千禧年后不久的EDM浪潮中EDM化，形成了EDM Hardfloor。EDM Hardfloor保留了坚实的四四拍低音Kick，速度提升到190BPM左右，但是听感上跟Modern Hardtek区别已经不大。EDM Hardfloor拥有泵一样的抽吸感，因此被欧美地区的听众称为Pumpcore。注意此处的Pumpcore早于日本的Pumpcore概念，且更少受到US Bass影响，而是添加了很多类似Neuro Bass的失真Bassline，因此被认同日系Pumpcore的听众称为Neuropumpcore。EDM Hardfloor有一些分支，包括Hard Psy、Basscore等，这些风格随着日系Pumpcore的发展也或多或少受到后者的影响。创造者及代表制作人是澳大利亚DJ和制作人Alryk", "chapter": "HDM", "examples": ["Bass Wizard - Dustvoxx / Alryk"]}, "hard psy": {"name": "Hard Psy", "ups": ["EDM Hardfloor", "Psystyle", "Psy Trance"], "downs": [], "aka": "", "related": "", "desc": "Hard Psy是Pumpcore [E]的分支，不是Psystyle，即便二者有重合。Hard Psy是GOMMI、TYEGUYS、NOLEJ、ATTAQ等人制作的一类Hard Dance，以Pumpcore为基，加入了Hardstyle/Psystyle、EDM Psycore的元素，特点是坚实沉闷的Kick Roll辅以三连音Psy Bass，显得歌曲更接近HDM化的Psy Trance。Hard Psy的BPM保持在160BPM-180BPM，因此常有人将其误认为Psystyle或Psy Hardcore，实际上即使Hard Psy本身就是一种融合性的分支，跟这两种风格还是有明显差异。", "chapter": "HDM", "examples": ["Got You Love (Jakka-B Hard Psy Edit) - RIOT & Dirtyphonics"]}, "frenchcore/french hardtek": {"name": "Frenchcore/French Hardtek", "ups": ["Hardtek", "French Tek", "Hardcore"], "downs": ["Early Frenchcore"], "aka": "", "related": "", "desc": "Frenchcore原先只是法国的本土Hardcore Techno声音，主要体现在工业元素。 本土的French Tek声音在Hardtek化后，诞生了French Hardtek。French Hardtek虽比前者更硬，但是还保留着French Tek的框架。不久后便进化出了如今的Frenchcore。", "chapter": "HDM", "examples": ["Noise Theater - Micropoint"]}, "early frenchcore": {"name": "Early Frenchcore", "ups": ["Frenchcore", "Hardtek"], "downs": ["Frenchcore Hardfloor", "Modern Frenchcore"], "aka": "", "related": "", "desc": "形成于1990s后期，原先的法国的本土Hardcore Techno声音根植于Hardtek所产生，成为法国Hardtek主流形式。这种风格与其他Hardcore形式的不同之处在于速度更快，通常高至 190-250 BPM，以及响亮且失真的offbeat Bassline。千禧年之后基本脱离了Hardtek的影响，跟Melodic Hardcore(介于Milliennium Hardcore和Mainstream Hardcore的硬核声音)则更为接近。这里的Frenchcore与我们平日所说的不同，更多指代早期的形态。", "chapter": "HDM", "examples": ["Renegade Return - Radium"]}, "frenchcore hardfloor": {"name": "Frenchcore Hardfloor", "ups": ["Early Frenchcore", "Hardfloor", "Mental"], "downs": [], "aka": "", "related": "", "desc": "Hardfloor与Frenchcore的结合体，前文说过Hardfloor是一种包容性很强的Tekno风格，当时的Frenchcore一样流行于法国舞池，因此出现了Hardfloor+Frenchcore的结合形态。Frenchcore Hardfloor听感上跟Tribecore Hardfloor有很强的相似性，但是Frenchcore Hardfloor更注重轰鸣的Reversed Bass，鼓组相对来说就更拖沓。另外Frenchcore Hardfloor也受到Mental的影响因此会加入一大堆奇奇怪怪的采样，而并不重视旋律是否动听。Roms在2009年的专辑《Disjoncted Compilation 01》就是这种风格的典型代表专(专辑里也混有Mental Hardfloor和Hardtek)。", "chapter": "HDM", "examples": ["Full Power - Roms"]}, "euphoric frenchcore": {"name": "Euphoric Frenchcore", "ups": ["Modern Frenchore", "Modern Hardtek", "Euphoric Hardstyle", "Rawphoric"], "downs": [], "aka": "", "related": "", "desc": "Dr. Peacock和Sefa等Euphoric Frenchcore制作人从Hardstyle艺人那里汲取灵感并区别于早期的Frenchcore，改良出更主流，更旋律化，更具现代感的Frenchcore。该流派已经在主流HDM电音节上占据了不可忽视的位置，收到许多乐迷追捧。", "chapter": "HDM", "examples": ["Symphony Of Life - Sefa / D-Block & S-te-Fan"]}, "modern hardtek": {"name": "Modern Hardtek", "ups": ["Hardtek", "Frenchcore", "UK Hardcore"], "downs": ["Psytek", "Raggatek", "Jungletek", "Mash Up Tek"], "aka": "", "related": "", "desc": "Hardtek在2000年前后逐渐发展出了更现代化的声音，某种意义上也确实更流行化了。Modern Hardtek继承了UK Hardcore的愉悦感和旋律，使歌曲摆脱了Early Hardtek的阴沉，同时进一步提高速度，保持了法核200BPM的特色，共同营造出欢愉、振奋的效果。Modern Hardtek不是二者简单的结合，而是在两种风格中做出了平衡。它既不像Frenchcore那样工业化、粗糙拖沓，又不像UK Hardcore那样多变、Trancy，这使得Modern Hardtek有着独一无二的奇妙听感而广受欢迎，但总有人将其与Frenchcore搞混。代表制作人包括Billx、Slinks、Alryk等。", "chapter": "HDM", "examples": ["World Reality - Billx"]}, "stottercore": {"name": "Stottercore", "ups": ["Modern Hardtek", "Free Tekno"], "downs": [], "aka": "", "related": "", "desc": "在时下流行的Stutter House之前，实际上已经有更早的风格使用“Stutter”手法处理采样了，这种风格就是Stottercore。Stottercore是一种极少被人提起但是很创新的Free Tekno/Modern Hardtek分支，采样源是其他歌曲的选段，并切碎重复处理成类似卡顿的音效。另外Stotter在丹麦语的意思是“口吃”，因此Stottercore实际上也可以命名为“Stutter Tekno”。", "chapter": "HDM", "examples": ["En In Eens Zat Pipi Zonder Snuif - Frankentek / pyruf"]}, "raggatek": {"name": "Raggatek", "ups": ["Reggae", "Ragga Jungle", "Modern Hardtek"], "downs": [], "aka": "", "related": "", "desc": "由名字也可以看出这是Hardtek与雷鬼碰撞的产物。BPM往往提高到180-200之间。Ragga风格的人声往往是这类流派的主要元素。往往采用了kick bass与Amen breaks。", "chapter": "HDM", "examples": ["No Time - Vandal"]}, "jungletek": {"name": "Jungletek", "ups": ["Jungle", "Drum & Bass", "Modern Hardtek"], "downs": [], "aka": "", "related": "", "desc": "Jungletek的原理与Raggatek完全相同，只是把Ragga换成了Jungle & DnB。一般Jungletek从Jungle和DnB曲目中提取Bassline，并以Hardtek的形式进行再创造。作品也采用了kick bass与Amen breaks。", "chapter": "HDM", "examples": ["Fever - Slinks"]}, "happytek": {"name": "Happytek", "ups": ["Modern Hardtek", "Happy Hardcore"], "downs": [], "aka": "", "related": "", "desc": "随着Freetekno和Tribe演化成Modern Hardtek，它失去了原有的“迷幻”的声音，而采用了更快速、更有活力的硬核声音。Happytek是这一转变的重要组成部分，核心人物是Mat Weasel，他早期在自己的Tekno唱片中融合了Makina和Happy Hardcore的影响，创造了这种声音，后来Dr. Looney、Billx和日本的Tanukichi也开始制作这种音乐风格。日本其实是影响Happytek成为一种风格和一个场景的关键因素，Sharpnelsound厂牌将欧洲和日本的Hardtek制作人联合起来发行了一系列专辑与合辑。最终，厂牌Hardtek.jp由Tanukichi和DJ Sharpnel创立，延续了这一特殊的Hardtek风格。Happytek的特点是将改良的Freetekno声音与充满活力的UK Happy Hardcore元素、有趣的采样、略低于Frenchcore的节奏（一般为180-200BPM）融合在一起。", "chapter": "HDM", "examples": ["Monkeyterlude - Dr. Looney", "Shine - Mat Weasel Busters"]}, "pumpcore": {"name": "Pumpcore", "ups": ["Modern Hardtek", "US Bass", "Pumpin Hardfloor"], "downs": ["Basscore", "Japanese Pumpcore"], "aka": "", "related": "", "desc": "术语最早起源于日本，受US Dubstep影响，Pumpcore描述了Hardtek的快节奏和高能量版本，并且在一小群日本制作人中非常受欢迎，同时这个声音在日本市场比欧洲同行更受欢迎。本质是Hardtek和Bass Music结合的产物，部分曲目包含一些在现代EDM中偶尔可以看到的元素，例如Electro House、Complextro、Dubstep、Chiptune等。", "chapter": "HDM", "examples": ["Dynamite (Extended Mix) - USAO [日本]", "Evil Addict - Alryk [欧美]"]}, "basscore": {"name": "Basscore", "ups": ["Pumpcore", "US Bass"], "downs": [], "aka": "", "related": "", "desc": "标签，名字最早出自日本社团/厂牌Kusemono Records，是类似于Pumpcore的产物，也是融合了US Bass。由于是标签，Basscore不像Pumpcore有准确定性。不过Basscore这一形式在前几年欧美的主流EDM市场还是具有一定声量的", "chapter": "HDM", "examples": ["Turn Me On - AK47 x Inquisitive"]}, "old school happycore": {"name": "Old School Happycore", "ups": ["Breakbeat Hardcore", "Hardcore Techno"], "downs": ["UK Hardcore", "Freefrom Hardcore"], "aka": "Happy Hardcore、4-beat", "related": "", "desc": "盛行于1994-97年，Happy Hardcore主要从Happy Gabber的声音发展而来，继承了4/4的节拍，从Gabber中扭曲的Kick变为了听起来十分俏皮的Bouncey Kick，也延续了Breakbeat Hardcore中的Breakbeat元素、Hoover以及明亮的钢琴和振奋的人声。被定义为第一首Happy Hardcore的曲目是93年发布的Charly Lownoise & Mental Theo的Wonderfull Days，诞生于荷兰，不过大约在此之前就有类似的声音出现。他是英国Rave场景的一个新的声音，并且在荷兰和德国也有所发展.90年代后期Trance和Eurodance的声音更多得融入了Happy Hardcore，这时的Happy Hardcore的声音显得没有那么Happy了，也促成了Trancecore的诞生", "chapter": "HDM", "examples": ["Shooting Star (Euro Mix) - Bang! [4分21秒开始截取]"]}, "german happy hardcore": {"name": "German Happy Hardcore", "ups": ["Happy Hardcore", "Happy Gabber", "Breakbeat Hardcore", "German Trance"], "downs": [], "aka": "", "related": "", "desc": "德国是Happy Hardcore阵型中很小但很重要的一部分。它由英国的Breakbeat Hardcore、苏格兰的Bouncy Techno 和荷兰的Happy Gabber声音演变而来，形成了德国自己的声音。Dune、Blumchen和Scooter等艺术家也通过他们的商业倾向在世界范围内获得了成功", "chapter": "HDM", "examples": ["Can't Stop Raving - Dune"]}, "trancecore": {"name": "Trancecore", "ups": ["Euro Trance", "Happy Hardcore"], "downs": ["Freeform", "UK Hardcore", "J-Trancecore"], "aka": "", "related": "", "desc": "90年代末期产生，Trancecore并不能算作一个Genre，他是Happy Hardcore到Freeform或是UK Hardcore的一个过渡阶段，最初的声音出现在一些Happy Hardcore厂牌，跟随着这种声音发展，这部分制作人后来也去到了UK Hardcore的制作中。而在一些起步的Freeform厂牌，这种声音发展出了早期的Freeform形式", "chapter": "HDM", "examples": ["The 6th Gate - Dougal & Gammer"]}, "dutch trancecore": {"name": "Dutch Trancecore", "ups": ["Trancecore", "Gabber", "Hardcore"], "downs": ["Gabber Trance", "Dutch Freeform"], "aka": "", "related": "", "desc": "Dutch Trancecore诞生时间其实相当早，约1990年便有前体形式出现。1990~1995年间，当时的荷兰DJ融合了来自德国的Happy Hardcore和英国的UK Freeform，Dutch Trancecore这一流派便从Cenobite厂牌中被提出。当时的Dutch Trancecore受到荷兰Gabber文化的影响，具有粗野干脆的Gabber音色，因此后续也出现了一个类似的说法：Gabber Trance。 1996年开始，Dutch Trancecore走向了融合的道路，这一点与J-Trancecore很像，不过Dutch Trancecore更喜欢融合Trance音乐。Michel Klaassen (A.K.A. Leviathan)在1996年提出了Dutch Trancecore + Hard Trance/Goa Trance的形式，将Dutch Trancecore从类似Gabber的单调形态中解放出来，但是仍然保留了荷兰硬核声音。这一阶段的Dutch Trancecore也被叫做“Cenobite Style”“Trancecore”或“Psycore”。 2001年，现代化发展的UK Hardcore和Freeform声音再次入侵荷兰Dutch trancecore场景，并为之带来了更新的声音。荷兰制作人Ferox和Ki-Real主导了该风格的发展趋势，尤其是在Ferox的个人线上Trancecore.nl社区。另外，现今的Dutch Trancecore/Gabber Trance还有少量日系制作人尝试制作。", "chapter": "HDM", "examples": ["Thunderdrome - Rexanthony"]}, "freeform hardcore": {"name": "Freeform Hardcore", "ups": ["Euro Trance", "NRG", "Trancecore", "Acid"], "downs": ["FiNRG"], "aka": "Freeform", "related": "", "desc": "1990s，很多制作人都开始对Happy Hardcore场景中日渐同质化的声音感到不满，并且追求更硬的声音表现，于是Freeform的声音从Trancecore的声音中诞生了，结合酸性（Acid）音色、使用高速集中的被Filter扭曲（Twisted）过的短促滤波合成器音色、NRG的能量感和Euro Trance上的Supersaw，BPM通常在170上下或更高、氛围有可能是比较Trancey的等。最开始的Freeform都是指UK Freeform，后来这种声音影响范围扩大，催生出了FiNRG和J-Freeform这两个比较重要的音乐场景。可以认为，本词条是一个统称。 该流派B站UP主LandscapeMentha专门撰写了一篇长文章，接下来的子分支介绍也大量引用了该文章。感兴趣的可以看看：【介绍向】关于Freeform Hardcore与它衍生的音乐场景（*长文预警*）", "chapter": "HDM", "examples": ["Universe - Darren Styles"]}, "uk freeform": {"name": "UK Freeform", "ups": ["Freeform Hardcore", "Acid", "Trance"], "downs": ["FiNRG", "J-Freeform"], "aka": "", "related": "", "desc": "最原初的Freeform基本都是指的UK Freeform，“Freeform”这个概念一般认为是由DJ Sharkey所提出的。当时的很多制作人都开始对Happy Hardcore场景中日渐同质化的声音感到不满，包括Sharkey和当时还叫DJ Energy的Kevin Energy。为了破解Happy Hardcore的无聊怪圈，当时的一众制作人们选择通过杂志等渠道来推广Sharkey和凯文等人的这些融入了Trance音色氛围的Hardcore，他们需要一个新的名字来命名这些声音，Freeform就这么诞生了。 但到了Electronica Exposed时代出现的新制作人们制作的Freeform就已经开始有了一定的舍弃Trancy氛围向Twist派大转变的倾向（很大概率是FINRG系音乐人在此发行曲子带来的同期影响，下面会说明）。 随着一些老牌厂牌渐渐不再活跃（比如凯文的Nu Energy曾一度出现各种财务问题）和时代的变迁，老UK Freeform的风格也开始往现代方向转变。A.B开的Stamina Records算是一定程度上接过了Nu Energy的UK Freeform接力棒。不过A.B目前已经在2023.9.22的时候表示将退出Freeform的制作，虽然厂牌还囤着一些发行，但这样的事情依然是一个会影响到厂牌本身甚至UK Freeform场景的信号。", "chapter": "HDM", "examples": ["Polaris - Aryx [6分8秒开始截取]"]}, "finrg": {"name": "FiNRG", "ups": ["Freeform", "Psy Trance", "Acid Trance", "Hard NRG"], "downs": ["UK Freeform", "J-Freeform"], "aka": "Finish Freeform", "related": "", "desc": "由芬兰地区FINRG Recordings为首的一众制作人（Alek Száhala、DJ Rx、Carbon Based、Pain On Creation、Nomic、Re-Form、Epyx & Cyrez等人）带来的听感更加忧伤黑暗，Lead更加凶狠Twisted程度也更加凶猛并以其为歌曲主导部分的Freeform。同时FINRG这个名号也由此作为了这个地区的人创造出的声音的名字。 FINRG 的故事要从 2001 年说起，当时DJ Karri K发布了他简称为“FINRG”（注：NRG在这里一般都为Energy的缩写，所以此处即FI-NRG，FI=Finland即芬兰）的DJ Mix。Karri对建立国内首个100%芬兰硬舞厂牌充满憧憬，并很快将他的憧憬告诉了Carbon Based的成员和DJ Nemes。不久之后，事情就开始了，“FINRG001 : Carbon Based - Kraateri / Karri K & DFG - Be quiet”于2002年（注：Discogs记录的发行日期是2003年）发行。这张唱片在世界各地受到关注和好评。 作为芬兰本土的厂牌，“FINRG”这个称呼很好地诠释了什么是属于芬兰的NRG，即便FINRG Recordings本身关于Freeform的原创发行基本都是后期才渐渐多起来的（影响力可能更多来自开办的各种派对），但厂牌本身倒确确实实地成为了所有这些芬兰艺术家的中继站一样的存在。因此众人至今都用着这个词来概括他们的这些声音，他们的声音也持续影响着以后的所有人，包括上面提到的一些英国制作人和接下来将要提及的日本等国的人。", "chapter": "HDM", "examples": ["Eternal Cannon (DJ Rx Remix) - RaverRose / ThermalForce"]}, "j-freeform": {"name": "J-Freeform", "ups": ["Freeform", "J-core", "FiNRG"], "downs": [], "aka": "", "related": "", "desc": "J-Freeform同时受UK Freeform和FiNRG影响，其场景很杂很散，主要形式围绕着同人音乐与音乐游戏发展，风格氛围更偏向J-Trancecore。主要制作人有：Betwixt & Between、Alabaster、Le Dos-On。关于更详细的J-Freeform介绍则还是推荐B站UP主LandscapeMentha的文章： 【介绍向】关于Freeform Hardcore与它衍生的音乐场景（*长文预警*）", "chapter": "HDM", "examples": ["Fragile... (2011 Mix) - LV.4"]}, "powerstomp": {"name": "Powerstomp", "ups": ["Happy Hardcore", "Makina", "Gabber", "Early Hardstyle", "UK Hardcore"], "downs": ["Hard Bass", "*Makinastomp"], "aka": "Powerbounce", "related": "", "desc": "UK Hardcore的类似产物，也有一个说法是UK Hardcore子流派，创始人为DJ Kurt和Joey Riot，受Gabber和Makina影响多，与早期Hardstyle的Reverse Bass写法有异曲同工之妙，正如“stomp”一词，整曲尽显夸张的侧链Bassline和厚重的Kick，给人以强烈的跺脚感，通常175BPM最佳", "chapter": "HDM", "examples": ["Crazy Ass Bitch - S3RL [2分12秒开始截取]"]}, "complexcore": {"name": "Com 场景，相对于Euro NRG提出。1995年左右，英国的Hard House制作人与DJ推广了这种风格。不同于Euro NRG，基于UK Hard House，并且融合了Bleep Techno声音。有趣的是，这种风格的开创者也是Tony De Vit，音乐性上相比UK Hard HouseJ进行了提速并首先加入了Hoover等其他粗犷凶险的音色，元素。后来芬兰发展出了类似Freefrom的形式(Fi-NRG)，亚洲制作人尤其是日本制作人也捣鼓出了自己Rave化的NRG声音(参考我国制作人3R2的作品《Killer Machine》)，后来Nu-NRG与Euro-NRG发展出Hard-NRG时两者之间声音区别变小，已不作区分。代表人物包括Tony De Vit、CLSM、Ian M、Dj Dbc等。", "chapter": "HDM", "examples": ["Work It - Joy Foundation /Tony de Vit [3:05起始]"]}, "liquid hardcore": {"name": "Liquid Hardcore", "ups": ["UK Hardcore", "Techno", "Nu NRG", "Liquid Funk/Dubstep"], "downs": [], "aka": "", "related": "", "desc": "Liquid Hardcore是Technikore提出的一个新标签，这种风格以降速的UK Hardcore为基底，融合了Tekno和Nu-NRG的声音，弱化了Kick，加入了柔和微弱的旋律，整体台风向Trance偏移。这种音乐从根本上创新了Hardcore的定义，一定程度上也受到主流电音界的认可，不过由于其特殊性，暂且不将其归类到UK Hardcore旗下。这种标签目前在国内外都保持着不小的热度，也可能是未来UK Hardcore的发展方向之一罢。", "chapter": "HDM", "examples": ["Drench - Technikore [4:43起始]"]}, "jumpstyle": {"name": "Jumpstyle", "ups": ["UK Hard House"], "downs": ["Tekstyle", "Freestyle", "Dutch Jump", "HexD Jumpstyle"], "aka": "Jump、Jumper", "related": "", "desc": "出现于90年代末左右的比利时，这个曲风并没有以原本的形态延续下来，后来经过改造在00年代早期被荷兰人普及，影响了Hardstyle并共同发展，你可以把它视作降速的Gabber来听。BPM在135-140左右。它的特点是更容易接受，更容易让人舞蹈。尽管在2000s中后期它在商业上走下坡路，但这种制作思路仍然影响了不少流派如Euphoric Hardstyle。近年来Jumpstyle以新的形式(Freestyle、Tekstyle、HexD)的形式重新出现于商业市场，但是也丧失了大量原有的声音，跟90s末的比利时Jumpstyle更是相去甚远。现如今的Jumpstyle制作人包括: Mark With A K、Patrick Jumpen (已解散)等。 Jumpstyle音乐也催生了Jumpstyle舞蹈。Jumpstyle舞蹈在2005年的比利时成型并流行于荷兰、德国、西班牙、法国、俄罗斯等国家，2006年逐渐走入地下。Jumpstyle舞蹈标准适配速度在140BPM到170BPM间，为配合相应场景，有些Jumpstyle舞蹈配速在128BPM-190BPM间。Jumpstyle适配于Jumpstyle、Hardstyle、UK Hardcore、Trance音乐等。在近年来Yabujin等X主义视觉艺术家开拓了HexD+Jumpstyle/Hardstyle的模式，很多Jumpstyle制作人如Patrick Jumpen被发掘出，Jumpstyle形成了一次小幅度复兴，国内也有很多舞者甚至Shuffle舞者尝试并发展Jumpstyle", "chapter": "HDM", "examples": ["Holiday - Patrick Jumpen [1:43起始]"]}, "dutch jump": {"name": "Dutch Jump", "ups": ["Jumpstyle", "Gabber", "UC Hard House"], "downs": [], "aka": "", "related": "", "desc": "1997年，随着UC Hard House在西欧扎根，一些制作人尝试将UC Hard House这种听起来像慢速Gabber的House音乐与本土的Jumpstyle结合，获得了一种新的声音，这种声音主要由Paul Elstak (DJ Paul)和Jeroen Streuding (Neophyte)发扬，并在商业上取得了不小的成功，以至于后来Da Tekno Warriors都受到这种音乐的影响。由于这个场景相对独立于Jumpstyle总场景，中心在荷兰，因此被称为Dutch Jump。", "chapter": "HDM", "examples": ["Return - Klap's [1:47起始]"]}, "tekstyle": {"name": "Tekstyle", "ups": ["Hardtek", "Jumpstyle", "Techno"], "downs": [], "aka": "Tek & Jump、Tek", "related": "", "desc": "Tekstyle诞生于比利时东弗兰德斯的圣尼古拉斯镇，是Jumpstyle融合了Hardtek元素的产物，结构上更贴近Hardstyle，旋律更复杂，包含更多的Vocal和Sample，听感上在更旋律的Jumpstyle和更工业的French Tek之间摇摆不定。现如今已经几乎完全取代了Jumpstyle的位置，不少制作人都以Tekstyle的名义来发布单曲。", "chapter": "HDM", "examples": ["You're My Angel - Mark With A K [3:36起始]"]}, "xpiritualism jumpstyle": {"name": "Xpiritualism Jumpstyle", "ups": ["HexD", "Hardstyle", "Jumpstyle", "Glitch"], "downs": [], "aka": "HexD Jumpstyle", "related": "", "desc": "HexD音乐主要表现形式之一，由于Jumpstyle音乐早已销声匿迹因此现如今的Jumpstyle常常是指这类听感奇怪粗糙的“Jumpstyle”音乐。受到“X主义美学(Xpiritualism)”的影响，这种互联网“Jumpstyle”充满了Bitcrush和模糊处理的采样和人声切片，以及高度失真的Vocal和Kick、Bassline，使听感充满朦胧暧昧气氛或恐怖阴暗氛围，但是却完全失去了Jumpstyle该有的样貌。这类音乐常常不讲究音乐本身需要打磨的组分，主要是为了烘托气氛或阐述事件，因此这类音乐听感上常常是粗糙简陋的。不过辩证地说，这种音乐的确带火了Jumpstyle舞蹈。 这种音乐常常是伴随X主义风格的视频出现的，这类视频充斥着大量从血腥网站上截取的Gore片段、从老旧网络媒体平台(甚至可能停止运营)或过期网站上截得的画面、视频或录屏、YouTube等媒体上找到的Jumpstyle/Shuffle/DnB Step/Brisbane Stomp/C-Walk视频片段、诡异的/搞笑的电脑绘画/PS处理画面、B级电影或实验电影片段以及快速闪过的中文/日文/阿拉伯文等。制作者常常将画质降到最低，以凸显一种怀旧感或惊悚感。X主义美学起源于2010年至今的网络小众审美运动，专注于低画质数字拼贴、神秘主义、二次元、Gore文化等，创造表达一种粗糙、超现实、猎奇的视觉效果。这种美学的代表人物是立陶宛/朝鲜(自称)制作人Yabujin/DJ Gyrotta Zao等，结合近期的核类美学，因此不少人将这类音乐/美学误称为“Yabujincore”。", "chapter": "Post-Internet", "examples": ["Chalice of Mind 守卫大门的鲸鱼。 - Yabujin", "zetrakore xaos da jumping gargoylz - DJ Gyrotta Zao / Yabujin"]}, "nu hardstyle": {"name": "Nu Hardstyle", "ups": ["Early Hardstyle"], "downs": ["Euphoric Hardstyle", "Rawstyle", "Dubstyle"], "aka": "", "related": "", "desc": "雏形大概在05年，随着Hardstyle发展制作人们也开始使用更明亮的合成器声音，但市场主导仍然是闷厚的Kick和Bassline。Donkey Rollers可以说是后来Nu Hardstyle发展的奠基者了，同时他们也早在2005年的作品便出现了一种创造性的声音Crunchy Kick，也就是我们熟悉的那一声“Duang”，其实这也在他们的Strike Again 2004和Immeasurably上有了最开始的雏形。后来Noisecontrollers改造了这种声音，据他本人所述，这种Kick灵感的来源也便是Donkey Rollers在05年发布的作品Followers，并在CTRL.ART.DELETE上先使用了完全体的Crunchy Kick，这种声音随着后来与Headhunterz和Wildstyles合作的Tonight以及Headhunterz的Scarp Attack的爆热，相同形式的创作也如雨后春笋般涌现出来。我们今天听到的一些主流的Hardstyle就是Nu Hardstyle演变过来的", "chapter": "HDM", "examples": ["Sutra - Gostosa Ft. Tiff Lacey"]}, "dubstyle": {"name": "Dubstyle", "ups": ["Hardstyle", "Dubstep"], "downs": [], "aka": "", "related": "", "desc": "形成于2010年初，看名字也能猜出这是Dubstep和Hardstyle的融合体。Dubstyle由Headhunterz和Bernnan Heart联合开发，该风格倾向于使用反拍Wobble Bassline，并采用Hardstyle标志性的Kick，将它们与节奏、律动和dubstep节拍结合，通常是2-step或Breakstep节奏。但是Dubstyle出现以后没有太多的演化的发展。", "chapter": "HDM", "examples": ["Beautiful & Rich - Pavelow [1:33起始]", "Ragga Nation - 杨振龙 [1:33起始]", "Restles - Pavelow [1:31起始]"]}, "euphoric hardstyle": {"name": "Euphoric Hardstyle", "ups": ["Nu Hardstyle"], "downs": ["Euphoric Rawstyle", "Trancey Hardstyle"], "aka": "", "related": "", "desc": "1st Stage：原始形态 2010年后兴起，特点是富有感情的旋律、强调积极向上的主题和欢快的听感，在不少HDM乐迷中占据相当重要的位置。Euphoric的发展历程其实就是Kick模式和合成配器的进步的表现，大约13年开始脱离了Nu Hardstyle的影子，而在18年开始Crunchy Kick的Kick模式随着各类Rawstyle歌曲的兴起也慢慢淡出了人们的视野。尽管Euphoric Hardstyle近年有些走下坡路，但不可否认，Euphoric Hardstyle仍然在当今的电音界舞台上占据非常重要的位置。", "chapter": "HDM", "examples": ["The Next Generation - BLN & Firelite", "Accelerate - Code Black & Atmozfears [偏Emotional例曲]", "2nd Stage：“Euphoric Rawstyle”", "17年来随着Rawphoric的兴起，Rawstyle的Kick模式在Euphoric Hardstyle中成为了主流，一定程度上取代了传统的Euphoric Hardstyle形式，即在原本的Euphoric Hardstyle上换了Rawstyle的底鼓而来的形式。相比Melodic Rawstyle，主题也没那么黑暗，更多保留了Euphoric Hardstyle的特征，可以说仅仅只是Kick模式上的变化。"]}, "raw hardstyle": {"name": "Raw Hardstyle", "ups": ["Nu Hardstyle", "Hardcore", "Early Hardstyle"], "downs": ["Extra Rawstyle", "Experimetal Rawstyle", "Melodic Rawstyle"], "aka": "Rawstyle", "related": "", "desc": "现如今占据了主流HDM电音界舞台的Hardstyle子流派，Rawstyle的概念和名字出自Zatox与2010发布的一首曲子《Raw Style》，在这首之前发布B-Front和Frontliner的合作曲《Magic》在后来被“追封”为第一首Rawstyle曲目，该曲也为这种黑暗风格埋下了种子。Rawstyle之后的发展更多的从当时的Hardcore和Early Hardstyle汲取特点，听感往往会黑暗一些且更具有侵略性，Kick会更加失真且更硬，Rawstyle 通常非常具有实验性，编排也更加变幻莫测，不走寻常路。经常使用非常规的技术和方法来实现某些效果。不过在17年后，Melodic Rawstyle形式开始逐渐火热，制作原本具有黑暗氛围Rawstyle的制作人也越来越少了。现如今不少Hardstyle制作人基本都会涉猎Rawstyle的制作。同时也衍生出了不少听感不同的子分支，比如接下来即将提到的3个。", "chapter": "HDM", "examples": ["Masterclass - E-Force & Luna"]}, "melodic rawstyle": {"name": "Melodic Rawstyle", "ups": ["Rawstyle"], "downs": ["Rawphoric"], "aka": "", "related": "", "desc": "顾名思义，Melodic Rawstyle更注重旋律，Rawstyle的一种制作形式，更为强调旋律的Rawstyle，如今虽然原本的Darker Melody变得愈发明亮，但刻在灵魂的黑暗色彩并未完全消散。大约从17年开始这种旋律为主的Rawstyle逐渐占据Rawstyle主流地位，同时另一种更加Euphoric的形式“Rawphoric”也是这时开始流行起来的（Rawphoric只是Melodic Raw的一种小变体，正文就不过多赘述）", "chapter": "HDM", "examples": ["Rough With The Wolves - B-Front / Degos & Re-Done"]}, "experimental rawstyle": {"name": "Experimental Rawstyle", "ups": ["Xtra Raw", "Rawstyle", "Rave", "Acid Techno", "Hard Techno", "Color Bass", "Hypertrance", "Industrial Hardcore..."], "downs": [], "aka": "", "related": "", "desc": "虽说是极致标签向的东西，但有必要提一嘴。从2019至今，Rawstyle这片沃土被各路制作人不断地探索与开拓，将一些风格融入Rawstyle的制作，各种Kick类型和Kickroll编排被发掘，诞生了各式各样较为独特的曲子；并且在近几年来随着户外活动得以重新开放以及Hardstyle整体回暖，Rawstyle的开拓到达了一个顶峰时期。比较有代表性的制作人有Anderex、Devin Wild等 在近期，一种Color Bass x Rawstyle的形式也掀起一阵波澜，这种由小众制作人发掘的声音也让一些主流制作人尝试创作了一些曲目", "chapter": "HDM", "examples": ["No Resistance - Devin Wild [Rave/Techno偏向]", "Stay With Me - Synthsation [Color style例曲]"]}, "freestyle": {"name": "Freestyle", "ups": ["Dance Pop", "Synth Pop", "Boy Band Culture"], "downs": ["Latin Freestyle"], "aka": "", "related": "", "desc": "", "chapter": "Fusion", "examples": ["青苹果乐园 - 小虎队"]}, "hard drop": {"name": "Hard Drop", "ups": ["Hardstyle"], "downs": ["J-Hard Drop"], "aka": "", "related": "", "desc": "Hard Drop的形式早于名称诞生，最早可追溯到2014年Hardstyle制作人Dr.Rude开创的Hard Drop场景。Hard Drop正式被命名并被确立为Hardstyle的一个微流派在2015年，同样由Dr.Rude命名。Hard Drop的特点与主流Hardstyle区别其实并不算大，之所以叫这个名字是因为这种风格强调Drop的旋律，常常将旋律的声场拉到最大，并且不断重复，从预留的Build Up段一直延续到Drop结束，几乎听不到Build Up而直接从纯旋律突变到带有Hardstyle Kick的Drop。目前仅有部分Hardstyle制作人在跨界制作这种风格，参考专辑：《Dr Rude Presents Hard Drop》(2015)。", "chapter": "HDM", "examples": ["Refractory Period - GaziGaji [1:42起始]"]}, "subground": {"name": "Subground", "ups": ["Freestyle", "Bigroom House", "Electro House"], "downs": ["Zakistyle"], "aka": "", "related": "Zakistyle", "desc": "Subground是Activator于2011年初推出的一种Hard Dance类型，最初只在同名厂牌发行，但逐渐开始在其他厂牌发行，是QULT Radio的主要风格（由Geck-O主持）。2010年底，受到德国制作人Kamui和英国制作人Organ Donors的启发，Activator与几位意大利Hard Dance DJ讨论除了Hardstyle之外，Hard Dance的新概念，因为他们都认为整个场景非常“平淡”，需要另一种选择。基本上，他们的想法是回归本源：将古老的节拍与新颖的声音相结合。Activator想创造出一种既能与Hard Dance场景相匹配，又能与Electro场景相匹配的音乐。因此，他的音乐节奏较慢，BPM在130到135之间，但具有侵略性，Drop富有张力，重复的循环较少。一年后的2011年，他的作品《Darron》被收录在首个Subground标签中。Activator向Q-dance寄去了一个小时的Subground，并解释了这个概念，Q-dance给予了支持，并给了他在Defqon.1上展示Subground的机会。在接下来的几年里，主要是2014年，Subground在Hard Dance界大受欢迎，在QULT Radio以及其他活动中得到了不小的推广。", "chapter": "HDM", "examples": ["Wappie Love - Geck-O", "Buster - Acti [2:05起始]"]}, "techstyle": {"name": "Techstyle", "ups": ["Techno", "Hardstyle", "Freestyle"], "downs": ["Dark Techstep"], "aka": "", "related": "", "desc": "不同于Tekstyle，请勿混淆。 Techstyle最初是瑞典Hardstyle制作人Stana于2008年提出的个人风格，随后不久变成一个Hardstyle的半正式子流派。Techstyle是Techno和Hardstyle的结合体，将Industrial Techno的结构和音色融入到Hardstyle里，因此某种意义上来说Techstyle也属于Techno的子流派。目前Techstyle在Hardstyle制作人群体中也取得了不小的名气，部分脱离了Stana的个人特色。", "chapter": "HDM", "examples": ["Ego Suicide - Diablik / Oyaebu [4:41起始]"]}, "bigroom hardstyle": {"name": "Bigroom Hardstyle", "ups": ["Hardstyle", "Bigroom House", "Freestyle"], "downs": [], "aka": "Hard Room", "related": "", "desc": "是Bigroom和Hardstyle结合的一个混合性质的子风格，即Bigroom元素加上Hardstyle独特的Kick，也被称作Hard Room，曲速在128-150BPM，不过受近年Hardstyle普遍升速的一些影响，Hardstyle偏向的曲目会更快。一般外网贴的标签和简中互联网认为的 “EDM Hard House”，其实大部分是以Bigroom/House的曲速为主的Hard Room，也就是说 “EDM Hard House” 是标签而Bigroom Hardstyle或Hard Room才是更为准确的叫法", "chapter": "HDM", "examples": ["Back At 'Em - Max Enforcer (Hardstyle曲速偏向)", "Master Of The Drop - Aurede (House曲速偏向)"]}, "reverse bass": {"name": "Reverse Bass", "ups": ["Hardstyle"], "downs": [], "aka": "", "related": "", "desc": "Reverse Bass更多指的是一种制作手法，作为Hardstyle下的标签时全称为Reverse Bass Hardstyle，注意不要混淆。Reverse Bass通常逆转Bassline以创造一种非常弹跳而又具有冲击性的听感。现如今常常作为Hardstyle的Mid-intro部分出现，专门涉猎Reverse Bass的制作人不多了。", "chapter": "HDM", "examples": ["2003 - TNT"]}, "psystyle": {"name": "Psystyle", "ups": ["Psy Trance", "Hardstyle", "Hardcore"], "downs": [], "aka": "", "related": "", "desc": "只是用上了Psy-Trance极具标志性的Rolling Bassline（就是三连音Bass），不过很大程度上Psystyle跟Trance没多大的关系了。现在Psystyle往往成为出现在其他风格的Hardstyle作品的Mid-intro中，纯粹一头到尾的Psystyle反而很少见。Psystyle不仅可以指Hardstyle的变体，也可以指融合了Psy Trance的Hardcore。", "chapter": "HDM", "examples": ["Run With The Wolves - Wildstylez & E-Life"]}, "trancey hardstyle": {"name": "Trancey Hardstyle", "ups": ["Trance（Uplifting Trance）", "Nu-Hardstyle"], "downs": [], "aka": "Trancestyle", "related": "", "desc": "存在于民间的一个标签，用于形容那些将Trance（尤其是Uplifting Trance）的元素和架构融入到Hardstyle里面的音乐。这种形式甚至可以追溯到Nu Hardstyle时期。Horyzon、Synthsoldier、MKN等是代表制作人。不仅仅是Euphoric Hardstyle，如今也出现了融入了Trance元素的Rawstyle。", "chapter": "HDM", "examples": ["Speed Of Light - Horyzon Ft. Amitav", "Against Time - Devin Wild"]}, "j-core": {"name": "J-core", "ups": ["Nerdcore Techno", "UK Hardcore", "Trancecore"], "downs": ["Hard Renaissance"], "aka": "", "related": "", "desc": "J-core是一个较大的概念，广义上讲甚至囊括了Nerdcore Techno时期的作品，因此这里只阐述相对狭义一些的J-core概念。J-core生发于Nerdcore Techno场景，于2000s初期到中期逐渐成型，发展过程中吸收了Hardcore、Tekno、UK Hardcore等欧美HDM风格的特点，同时也从Hyper Techno、J-Pop、Trance等之中吸收灵感，起初与日本萌系文化和宅文化关系很大，后期主题开始多元化发展，但仍与动漫和视频游戏文化保持着密切的关系，大多数作品在同人展上独立销售。不少音乐节奏游戏如beatmania IIDX系列和Bemani系列经常用J-core来配对更高难度的曲目。逐渐地，J-core的场景下，“音乐节奏游戏”就成为了一个怎么也绕不开的一个重要话题。当然也孳生了大量“音游小鬼”，影响了J-core在国内的形象。 J-core的表现方式很多，大致也分为三种：①以UK Hardcore/Trancecore为灵感来源的，这类J-core主要表现为UK Hardcore的声音特质+日本流行/二次元音乐特色，广受Eurobeat、Euro Trance、Hands Up影响，速度在165BPM到190BPM之间浮动；②以Mainstream Hardcore/Terrorcore/Gabber为特色的，这类音乐与欧美的曲目差异不算特别大，但是日式风味明显，也适合刚入坑极端HDM的听众，代表包括To Mega Therion、t+pazolite、DJ Myosuke等；③以Tekno/Frenchcore为主要展开方式的，这类相对较少，基本是从Nerdcore Techno场景中进化而来的。", "chapter": "HDM", "examples": ["① 止マレ！ - Hommarju / HimiMai / Ma15 / Maki", "② Tales of Hardstyle - t+pazolite", "③ Unwelcome School - ミツキヨ"]}, "j-trancecore": {"name": "J-Trancecore", "ups": ["J-core", "UK Hardcore", "UK Freeform", "UK Trancecore", "Uplifting Trance"], "downs": ["Hard Renaissance"], "aka": "", "related": "", "desc": "一些日本制作人也把它叫做Energetic Hardcore，其来源是Uplifting Trance的别称之一Energetic Trance。它是UK Hardcore在日本本土化表现之一，后来的声音更多得趋于J-Trance", "chapter": "HDM", "examples": ["Reinforce - Sanaas"]}, "hard renaissance": {"name": "Hard Renaissance", "ups": ["J-core", "J-Trancecore*", "J-Freeform"], "downs": [], "aka": "", "related": "", "desc": "J-core的一种表现形式，目前比较主流。由DJ YOSHITAKA定义，最初是他给BEMANI的供曲中出现，以羽管钢琴为主的古典乐器来演绎J-core，而后发展到J-core主流位置，在如今的音游作品中你可以经常听到他的身影。需要注意的是：Renaissance Hardcore和Hard Renaissance并不是一个东西", "chapter": "HDM", "examples": ["Polarity Echo - Sad Keyboard Guy [截取最后一段Drop]"]}, "symphonic hardcore": {"name": "Symphonic Hardcore", "ups": ["J-core", "UK Hardcore", "Mainstream Hardcore"], "downs": [], "aka": "", "related": "", "desc": "本质上和Hard Renaissance区别不大，区别是Symphonic Hardcore如名字所述以交响乐为主的声音表现，但底层更趋近于正常日系UK Hardcore的表现形态，也可以附着于Mainstream Hardcore表现", "chapter": "HDM", "examples": ["Phoebus (Long Ver.) - Yooh"]}, "gothic hardcore": {"name": "Gothic Hardcore", "ups": ["J-core", "Mainstream Hardcore"], "downs": [], "aka": "", "related": "", "desc": "与Symphonic Hardcore类似，它主要注重哥特风的乐器声音，更多以Mainstream Hardcore的形式表现", "chapter": "HDM", "examples": ["Shatter World - Sylphix"]}, "j-happy hardcore": {"name": "J-Happy Hardcore", "ups": ["UK Hardcore", "Happy Hardcore"], "downs": ["Future-core"], "aka": "", "related": "", "desc": "说到底就是日本极为本土化的UK Hardcore，比较接近真正的Happy Hardcore，以Trancecore或老式UK Hardcore为基，Breakbeat、Rave Piano、Bouncy Kick和8-bit元素穿插，Lead表现十分的“Kawaii”和Trancey感，给人一种欢快愉悦的感觉", "chapter": "HDM", "examples": ["BOOM! BOOM! BOOM! (One More Turn Mix) - P*Light & mow*2"]}, "techcore": {"name": "Techcore", "ups": ["Hi-Tech Full-on", "UK Hardcore", "Pumpcore", "J-Trancecore", "J-Freeform"], "downs": [], "aka": "", "related": "", "desc": "同样也是产生于MEGAREX的名词，初出《TECHCORE EVANGELIX》，是日本人自己的Psy×Hardcore的表现形式，Tech一词取自日本本土化的Hi-Tech，也就是常说的Hi-Tech Full-on，通常1-Drop是将Hi-Tech Full-On的要素以硬核形式表现，听感稍微类似Basscore和Pumpcore，但有着独特的能量感，而2-Drop一般是类似Freeform、J-Trancecore或是UK Hardcore的表现。", "chapter": "HDM", "examples": ["HiTECK HEIST - NormalM"]}, "j-funkot": {"name": "J-Funkot", "ups": ["J-core", "Funkot"], "downs": [], "aka": "Hard Funk", "related": "", "desc": "在Funkot那部分我们提到，2009年，DJ Jet Baron发现了Funkot音乐并着手制作，融合了Hardcore与J-Pop元素形成了J-Funkot，从此Funkot在日本名声大噪，甚至至今仍被误认为是日本的Breakbeat风格甚至日本的Drum&Bass风格。实际上众所周知日式DnB应该是Artcore，J-Funkot更接近用Funkot的鼓编等展开的J-core，因此放置在此处不归类到Breakbeat体系。", "chapter": "HDM", "examples": ["balloon Flower  - Sakura Recordz! / 巡音ルカ"]}, "lovestep": {"name": "Lovestep", "ups": ["Future Bass", "R&B", "Dubstep"], "downs": [], "aka": "", "related": "", "desc": "Lovestep最初指2000年代末期Dubstep的一种变体，到2010年代早期至中期开始代表一种新的、有着柔和氛围的Future Bass，其特点是使用R&B风格的人声，歌曲结构流畅跌宕，使用切分节奏，旋律优美，常用Funky Bass、Wavy Bass和808鼓。这种音乐BPM较慢（60-90BPM左右），和弦进行、Vocal深受20世纪90年代Contemporary R&B音乐的影响，与同类音乐相比听感并不“饱满”、“丰富”（尤其是相比于Future R&B），而是一种“低饱和”的听感。由于这种音乐风格与Groove Bass有相似之处，因此在各种发行曲目中两种风格相互重叠的情况非常常见，53 Thieves的《After Hours》就是一个例子。随着53 Thieves两张EP的发行（after hours和missed calls），Lovestep的声音得到了巩固。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["what you do to me - 53 Thieves【https://www.youtube.com/watch?v=qDSDHpd8ld0】"]}, "hip-hop": {"name": "Hip-Hop", "ups": ["Reggae", "Funk", "Dozens Culture", "Political Poetry"], "downs": ["Breakbeat", "Boom Bap", "Trip Hop", "Trap"], "aka": "", "related": "Rap", "desc": "Hip-Hop于70年代初出现在美国东海岸的纽约布朗克斯区，最早并没有Rap，而是一种采样James Brown式Funk乐鼓间奏的节拍(Beat；这种手法直接影响了Breakbeat的诞生)。直到后来的MC开始在节拍上有韵律地讲话，才形成了“Rap”。Rap是一种强调节奏，通过“说”来表达的游戏，根源可以追溯到Deejay（一种雷鬼乐形式）和Political Poetry（一种爵士乐形式）以及Dozens（斗嘴文化）。Rap在发展的过程中，既出现了Disco Rap这样的商业派对音乐，也出现了Gansta Rap这样充满暴戾但反映现实的音乐，还有Conscious Rap这样内省化且富有批判性的音乐。需要注意的一点是，“Hip-Hop”不仅指一类音乐，而是一种包括了DJ、街舞、Rap、涂鸦的流行文化。Hip-Hop音乐和文化从90年代开始风靡全球，音乐上将Soul、R&B吸收进了自己的体系，直到今天还在诞生新的曲风。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Apache (Grandmaster Flash Mix) - Incredible Bongo Band/Grandmaster Flash"]}, "electro-funk": {"name": "Electro-Funk", "ups": ["Old School Hip-Hop", "Electronic Music", "Funk"], "downs": ["Electro"], "aka": "E-Funk", "related": "Electro", "desc": "Electro-Funk是受到James Brown式Funk乐和Kraftwerk式电子乐影响的一种早期Hip-Hop流派，与80年代中期Techno的形成密切相关。这种风格通常使用合成器和鼓机编曲，配以声码器或Talk Box处理的人声。80年代初，Afrika Bambaataa通过采样Kraftwerk的音乐并加入切分节奏模式的TR-808鼓点、弹跳的Bassline和充满激情的Rap，制作出了《Planet Rock》，定义了Electro-Funk这一流派最初的声音。这种风格意在用黑人式的、肉体的、充满激情的律动(Groove)来重新释义Kraftwerk、Gary Numan、Y.M.O.式的机械风格。Electro-Funk在后续发展出了两种倾向，一种是与早期Electro-Funk(使用TR-808鼓机和弹跳的Bass音色)更为相似的风格，这种风格在后期越来越电子化，被称为Electro；一种是受到Hardcore Hip-Hop影响的Electro-Funk(使用Oberheim DMX鼓机，没有弹跳的Bassline)，更突出底鼓(Kick)和军鼓(Snare)，Rap元素更多，有时也会包含搓碟音效。虽然Electro-Funk发展出的这两种风格听感大相径庭，但都保留了Funk的根源性。代表制作人和团体有Afrika Bambaataa & The Soulsonic Force、Grandmaster Flash & The Furious Five、Grandmixer D.S.T.、Whodini。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Scorpio - Grandmaster Flash & The Furious Five", "Crazy Cut (Long Version) - Grandmixer D.S.T.(变种)", "Looking for the Perfect Beat (Original 12\" Version) - Afrika Bambaataa & The Soulsonic Force(晚期)"]}, "hardcore hip-hop": {"name": "Hardcore Hip-Hop", "ups": ["Hip-Hop", "Hard Rock", "Hardcore Punk"], "downs": ["Britcore", "Horrorcore", "New Jack Swing"], "aka": "Hardcore Rap、Rock Rap、Punk Rap", "related": "", "desc": "Hardcore Hip-Hop指主要以侵略和对抗为主题的Hip-Hop音乐，体现在夸张的歌词、硬核的唱腔、鼓点、失真的配器等方方面面，主题通常是暴力、犯罪、性、政治诉求等。最早的Hardcore Hip-Hop出现于1984年的美国东海岸，纽约Hip-Hop团体Run-D.M.C.通过使用Oberheim DMC鼓机并结合摇滚乐，创造了一种前所未有的硬朗的Hip-Hop风格。他们的Rap唱腔强而有力又不失节奏感，歌词充满了积极向上的精神，同时受到了黑人和白人听众的喜爱。他们的出现打破了Disco Rap垄断Hip-Hop唱片业的局面，把来自街头的风格带入了主流并使其成为时尚。80年代中期，Hardcore Hip-Hop成为了Hip-Hop的主流风格，并传入了西海岸。80年代末，随着采样鼓机的兴起，制作人们开始尝试更复杂、细腻的编曲，于是不那么躁动的Boom Bap出现并取代了Hardcore Hip-Hop成为了主流。而Boom Bap也反过来影响了前者，使之不仅在制作上更复杂，也不失原本的硬核感，代表团体有Public Enemy、N.W.A和Wu-Tang Clan。当代的Hardcore Hip-Hop定义更加广泛，通常体现在Rapper的歌词和唱腔，如Eminem和6ix9ine。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["My Adidas - Run-D.M.C."]}, "britcore": {"name": "Britcore", "ups": ["Hardcore Hip-Hop", "Breakbeat"], "downs": [], "aka": "", "related": "", "desc": "Britcore是一种来自20世纪80年代末至90年代初的英国硬核嘻哈风格，以快速的节奏和说唱为特色，比一般的嘻哈节拍具有更高的BPM，主题更具政治性和战斗性，并用非常激进的方式表达。这一流派后来也传到了德国、荷兰和其他欧洲国家，90年代后期逐渐消失。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Dett - Demon Boyz"]}, "boom bap": {"name": "Boom Bap", "ups": ["New School Hip-Hop"], "downs": ["G-Funk", "Trip Hop", "Lofi Hip-Hop"], "aka": "", "related": "", "desc": "Boom Bap是发源于80年代末美国东海岸的Hip-Hop流派，是Hip-Hop中最重要的流派之一。“Boom Bap”是一个拟声词，指这种鼓组编排模式，即强调重拍的“Boom Kick”和“Broken Snare”并不断循环，用最少的配器创造最有律动的节拍，且并非机械性的节奏，而是有着“Swing(一种律动)”感。Boom Bap常用鼓机(SP-1200或MPC)采样制作，并且不仅采样鼓声，Soul、Funk、Jazz中的器乐演奏甚至人声都经常被采样的，Turntablism手法(见Experimental Music分支Turntable Music)也常出现。Boom Bap的出现是地下Hip-Hop场景对于当时主流的商业Hip-Hop(Disco Rap、Mid-School Hip-Hop)的反叛，保留了来自街头派对的粗糙质感，是忠于最原始的Hip-Hop文化的存在。Boom Bap在90年代至00年代发展到巅峰，以至于当时的许多流行音乐都有它的影子。进入10年代后，又诞生了如Lofi Hip-Hop和Chill Hop这样受到大众喜爱的流派。虽然现在的主流Hip-Hop已经不再流行使用Boom Bap的风格编曲，但是这种声音依然被一部分听众、Rapper和制作人青睐并传承。早期代表制作人和团体有Marlry Marl、Eric B.、Boogie Down Productions、Doug E. Fresh、EPMD、DJ Premier、Pete Rock、RZA；当代制作人和音乐人有Kanye West、The Alchemist、J. Cole、Onra、Chance The Rapper、Joey Ba$$等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Keep Risin' to the Top - Doug E. Fresh / The Get Fresh Crew"]}, "g-funk": {"name": "G-Funk", "ups": ["West Coast Hip-Hop", "Boom Bap", "Gangsta Rap"], "downs": ["Ratchet"], "aka": "Gangsta Funk", "related": "", "desc": "G-Funk是美国西海岸的一种Hip-Hop流派，它的起源可以追溯到1989年洛杉矶Hip-Hop团体Above the Law发行的专辑《Livin' Like Hustlers》。其中参与制作的Dr. Dre在1992年发行了专辑《The Chronic》，使这种风格进入了主流。G-Funk与当时东海岸的Hip-Hop形成了鲜明对比，虽然鼓点还是Boom Bap，但BPM更慢、更舒缓，配器更轻巧且富有层次，经常采样P-Funk(Psychedelic Funk)，使用标志性的正弦波(有时叠加锯齿波)的合成器滑音和深沉且浑厚的Moog Bass编曲，有时也会以弹音器、Funk吉他扫弦或哇音电吉他点缀，甚至还有柔和的R&B女声。早期的G-Funk其实还没有演化成现在这样自成一派的悠闲、慵懒(Chill)风格，而是像东海岸一样既有凶狠的，又有轻松的，但后者成为了主流。G-Funk使得主流听众不再认为所有的Hip-Hop都是“危险的”音乐，它创造出了一种独特的氛围，让人想到加州的阳光、海滩和Low Rider(低底盘车)。90年代中期，G-Funk遍布中西部和南部各州，一度成为主流的Hip-Hop音乐形式。代表音乐人和团体有Dr. Dre、Snoop Dogg、Nate Dogg、Warren G、Ice Cube、Twinz、Foesum等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Don't Get It Twisted - Twinz"]}, "brithop": {"name": "Brithop", "ups": ["New School Hip-Hop"], "downs": [], "aka": "UK Hip-Hop、UK Rap、British Hip-Hop、British Rap", "related": "", "desc": "Brithop最早出现在80年代的英国，早期的英国制作人通过模仿美国制作人的风格，同时加入雷鬼元素，造就了独特的英式Hip-Hop，该流派在90年代发展成了一种更流行、更具侵略性的风格。2000年代中期，随着Grime的出现，Brithop逐渐被取代。2010年代，由于UK Drill的出现，英国Hip-Hop的开始复兴。Afroswing（一种受Dancehall和Afrobeats影响的Hip-Hop风格）也在这一场景中蓬勃发展。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Fire - Lethal Bizzle"]}, "trip hop": {"name": "Trip Hop", "ups": ["New School Hip-Hop", "Boom Bap", "Downtempo"], "downs": ["Post Trip Hop"], "aka": "Bristol Hip-Hop", "related": "", "desc": "Trip Hop是英伦/欧洲舞曲的一种，它的名字来源是“ Trip+ Hip-Hop=Trip Hop”，因为它发源自英国的Bristol，因此最早时称作“Bristol Hip-Hop”。特点是把Hip-Hop节奏变慢，加入一些迷幻的味道，如很阴沉、肥厚的Bass，轻微但迷幻的合成音效，或是些唱片的采样，有时可能连唱片的杂音都会被故意采样进去。所以，Trip Hop可以描述为是种慢板的、迷幻的、有Jazz感觉的、带点Hip-Hop节奏的Breakbeat音乐。它虽然隶属跳舞音乐类，但其迷幻的特色已令它与一般跳舞音乐所有的明确节拍特色相去很远。同时Trip Hop也是早期中国电子音乐迷最早开始制作的流派之一，代表包括由田鹏和龙宽组成的双人独立电子组合龙宽九段等。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Justify My Love - Madonna"]}, "hyphy": {"name": "Hyphy", "ups": ["West Coast Hip-Hop"], "downs": ["Jerk"], "aka": "", "related": "", "desc": "Hyphy形成于90年代末的美国旧金山湾区，是湾区说唱歌手为了反对商业说唱而发起的，Hyphy的特点体现在合成器、Bass、搓碟和Rap等元素上，有着极重的节奏和快速的节拍。这个名字是“Hyperactive”的缩写，由Keak Da Sneak于1994年创造，Hyphy于2006年在全球范围内取得了突破，其热门歌曲来自E-40 、The Federation 、Too $hort 、Mistah FAB等，但很快就消失了。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Tell Me When To Go - E-40 / Keak da Sneak"]}, "jerk": {"name": "Jerk", "ups": ["Hyphy", "Sigilkore"], "downs": ["JerknB"], "aka": "Jerkin'、Jerk Music、Jerk Rap", "related": "", "desc": "Jerk的特点是稀疏的节拍、快速的节奏，歌曲时长普遍较短。早期的Jerk师承Sigilkore，听感上十分抽象，拥有极端的伴奏氛围，要么极其安静要么嘈杂不堪，以及极具冲击力的808鼓组。Rapper多身着紧身牛仔裤或鲜艳的衣服，主题往往是急躁不安的或者是关于色情的，这一场景源于人们对黑人说唱的刻板印象的拒绝。Jerk是Hyphy的直系后代，虽然Jerk人往往都会拒绝接受Hyphy。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Nigga Uhh Freestyle (DJ Ess Remix) - Wizz Havinn / DJ Ess"]}, "jerknb": {"name": "JerknB", "ups": ["Jerk", "Comtemporary R&B"], "downs": [], "aka": "Hoodtrap", "related": "", "desc": "JerknB是Jerk更主流、更现代化的表现形式，创始人是xaviersobased。JerknB承接了Jerk的特色的同时，更强调韵律、类Trap的节奏型以及取自Comtemporary R&B的旋律，看似不开心又没来由地开心的和弦进行。采用了大量人声采样和轻柔的合成器声音，军鼓的排布也十分不规则，制作上即便氛围更清晰但是仍旧很粗糙，不过这种奇怪的音乐在地下嘻哈圈里反而大受欢迎。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["patchmade - xaviersobased / Kashpaint"]}, "chill hop": {"name": "Chill Hop", "ups": ["New School Hip-Hop"], "downs": ["Jazzy Hop"], "aka": "", "related": "", "desc": "2017年，一种标记为“Chill Hop”或“Lofi Hip-Hop”的慢节奏音乐在YouTube音乐流媒体中流行起来，到2018年其中的几个频道就已经拥有数百万粉丝，Chill Hop几乎与Lofi Hip-Hop同时流行起来，两者都是基于互联网诞生的。外网对于Lofi Hip-Hop与Chill Hop没有做出区分，认为二者一样，个人认为Chill Hop更适合被描述为“雨夜学习”的场景，没有/少有低保真效果，氛围更加“慵懒、轻松”而不是Lofi Hip-Hop的“Emo”感，主要配器也是合成器而不像Lofi Hip-Hop那样主要体现原声乐器，鼓组也要整齐、紧凑不少。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Feeling Lost - Swørn"]}, "lofi hip-hop": {"name": "Lofi Hip-Hop", "ups": ["New School Hip-Hop"], "downs": [], "aka": "Lofi、Lofi Hop", "related": "", "desc": "可以认为Lofi Hip-Hop是一种Downtempo形式，于2010年代在YouTube上流行，并迅速成为网络模因，Nujabes和J Dilla被称为“Lofi Hip-Hop的教父”。在2020年疫情期间，Lofi Hip-Hop的流行度和知名程度更是明显上涨。这一流派主要和夜晚、悲情、抑郁、伤感、孤独等词语或场景相称，常常用低保真的原声乐器演奏，比Chill Hop更常用采样，甚至会直接采样整首歌曲，节拍继承了Hip-Hop但明显松散了许多，加入录音机声音/录像带声音/低保真的人物对话等也是常有的制作手段。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["campfire - elijah who / Toby Schay"]}, "instrumental hip-hop": {"name": "Instrumental Hip-Hop", "ups": ["Hip-Hop"], "downs": ["Phonk"], "aka": "", "related": "", "desc": "是指基本上没有Rap的Hip-Hop，采取最基本的方式即普通的器乐编曲，也有制作人进行跨风格的元素交融，Turntablism（见Experimental Music分支Turntable Music）手法也很常用。DJ Q-Bert、Grandmixer D.S.T.和Mix Master Mike等先驱在Hip-Hop中使其成为了一种独立的风格。现在的Instrumental Hip-Hop也有朝着Chill Hop/Jazzy Hop的倾向发展。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Air Signs - J Dilla"]}, "experimental hip-hop": {"name": "Experimental Hip-Hop", "ups": ["New School Hip-Hop"], "downs": ["Industrial Hip-Hop"], "aka": "", "related": "Abstract Hip-Hop", "desc": "Experimental Hip-Hop是一类Hip-Hop的统称，融入了实验性与古怪的音乐元素，是一种非传统的Hip-Hop音乐，包括非常规的歌曲结构、奇怪的节奏、不拘一格的乐器演奏、不知道从哪弄来的采样、不和谐或者完全无调的声音，也通常会结合其他与Hip-Hop无关的流派的元素。Experimental Hip-Hop制作人经常使用抽象的抒情主题，所以常和Abstract Hip-Hop交叉。这两种风格对许多地下Hip-Hop场景的风格产生了影响。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["God Breathed -  Kanye West"]}, "industrial hip-hop": {"name": "Industrial Hip-Hop", "ups": ["Experimental Hip-Hop", "Post-Industrial"], "downs": ["Pain (Rap)"], "aka": "Noise Rap", "related": "", "desc": "Industrial Hip-Hop起源于20世纪80年代末，是一种实验性的Hip-Hop流派，使用工业音乐的节拍和音色，以无调性、噪音、扭曲的鼓为特色，人声通常更具攻击性，有时会咆哮、喊叫，主题内容通常涉及反乌托邦和政治，其他工业音乐主题（如战争、性虐待、BDSM、邪教等）。2010年代后期，该流派也与解构俱乐部、Trap Metal等流派融合。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Get Got -  Death Grips", "The Fever (Aye Aye) - Death Grips", "Body & Blood - clipping."]}, "surge": {"name": "Surge", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Hiphop篇章）", "chapter": "Post-Internet", "examples": []}, "pop rap": {"name": "Pop Rap", "ups": ["New School Hip-Hop", "Pop Music", "Electronic Dance Music"], "downs": ["Futuristic Swag", "Bop"], "aka": "", "related": "", "desc": "Pop Rap是一个定义宽泛的术语，指和Pop结合的Rap，或者制作较为流行化、易于大众接受的Hip-Hop。这种风格早在80年代就已经出现，并且一直流行至今。说唱歌手MC Hammer通过采样80年代的Funk，并结合当时最流行的New Jack Swing，配以富有节奏感且没有脏话的Rap和动感的舞蹈，直接定义了Pop Rap这一流派。90年代末的说唱歌手Will Smith也以歌曲无脏话且符合大众审美而获得了较高的评价。21世纪，随着00年代末Dance Pop/EDM的兴起，Pop Rap也开始结合EDM，并在10年代初的主流乐坛大获成功(如Pitbull、Flo Rida、Nicki Minaj)。10年代还有以Drake为代表的音乐人结合把Trap、Contemporary R&B与Rap结合，优化了Hip-Hop的旋律性并获得成功。20年代，随着Tik Tok的兴起，Pop Rap也变成了一种短视频舞蹈BGM。从上面的发展脉络和代表音乐人可以看出，Pop Rap不仅在制作上会结合当时的主流音乐，也比较看重音乐人的外形、音色和个人魅力，本质上是一种唱片公司迎合主流市场的商业音乐，这也是Pop Rap被传统Hip-Hop界音乐人和听众诟病的原因。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Super Freaky Girl - Nicki Minaj"]}, "emo rap": {"name": "Emo Rap", "ups": [], "downs": [], "aka": "", "related": "", "desc": "（见Trap分支Emo Trap）", "chapter": "Hip-Hop/Trap/Future Bass", "examples": []}, "cloud rap": {"name": "Cloud Rap", "ups": ["New School Hip-Hop", "Chillwave"], "downs": ["Mumble Rap", "Melodic Rap", "Digicore", "Phonk"], "aka": "Trillwave", "related": "", "desc": "Cloud Rap是一种大约于2000年代末至2010年代初出现的一种Hip-Hop形式，特点是独特的放松、空灵、梦幻的大混响的制作方式。Cloud Rap起源于2000年代后期的地下Hip-Hop场景，许多Cloud Rap的先驱人物都受到了Witch House和Chillwave的影响，与许多早期的嘻哈风格相比，Cloud Rap通常更看重电子元素的融入，后来融入了南部Hip-Hop的影响，现在这个词的含义已经扩大并包含了许多风格，如Trap、Memphis Rap，甚至是Alternative R&B和蒸汽波。早期的Cloud Rap主题通常更深奥晦涩，现在的这类主题越来越少，许多Abstract Hip-Hop(抽象嘻哈)的制作人也被这种风格所影响，大气而古怪的音景成为了他们抽象而诗意的抒情的调色板。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Calcium - Bones"]}, "meren house": {"name": "Meren House", "ups": ["Merengue", "Tribal House", "New School Hip-Hop", "Reggaeton"], "downs": [], "aka": "", "related": "", "desc": "诞生于多米尼加的一种民族电子Hip-Hop风格。在多米尼加当地存在一种民族舞曲即默朗格舞曲，相传是古时奴隶阶级带上脚镣之后迫不得已发明的一种舞蹈，默朗格舞曲则是为这种舞蹈伴舞的音乐。在1990s后，随着House舞曲在全球的风靡和Hip-Hop的崛起，多米尼加音乐人开始尝试将House、Rap和Merengue舞曲结合在一起，诞生了以说唱为主导的电子默朗格舞曲说唱，即Meren House/Meren Rap。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Todos a Ganador - Tres Locos"]}, "glitch hop": {"name": "Glitch Hop", "ups": ["New School Hip-Hop"], "downs": [], "aka": "", "related": "", "desc": "最早的Glitch Hop起源于美国的Hip-Hop文化，是Hip-Hop与电子音乐结合发展的几个分支之一，在Hip-Hop的基础上加入了故障音，于90年代大幅度流行。制作人有Machinedrum、Dabrye、Prefuse 73、edIT、Jimmy Edgar、Lackluster、Proswell。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Animus Vox - The Glitch Mob", "Just Us - Shlohmo"]}, "melodic glitch hop": {"name": "Melodic Glitch Hop", "ups": ["EDM Glitch Hop"], "downs": [], "aka": "", "related": "", "desc": "标签，主要用来形容注重旋律的Glitch Hop，制作人有David Tipper、The Glitch Mob、KOAN Sound、Pegboard Nerds、Pretty Lights、GRiZ、TheFatRat、Hefe Heetroc。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Monody - TheFatRat"]}, "dark glitch hop": {"name": "Dark Glitch Hop", "ups": ["EDM Glitch Hop"], "downs": [], "aka": "", "related": "", "desc": "Dark Glitch Hop是由雏形Dark Synth Pop弱化合成器成分、增加Bass Music成分发展而来，并且加入了更多黑暗、冰冷的故障元素和机械的音色设计，由于是较为现代的分支所以不可避免地与其他相似风格融合在一起，如爆火的Rezz、1788-L等制作人的歌曲就经常被认为是Midtempo/Dark Synth Pop/New Beat的融合体(实际上这里所谓New Beat与真正的EBM分支New Beat完全不同，是外国媒体为了标新立异捏造的一个说法，但是恰好与这种老派后工业音乐撞名了)。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Humanity - Max Brhon"]}, "moombahcore": {"name": "Moombahcore", "ups": ["EDM Glitch Hop", "Brostep", "Complextro", "Moombahton"], "downs": [], "aka": "", "related": "Moombahstep", "desc": "Moombahcore是21世纪初出现的一种电子舞曲风格，源于Brostep、Complextro等其他电子舞曲，早期的Moombahcore的节奏型仍然保留了Moombahton的节奏型，而现在已经很少见，基本上都变成了Glitch Hop的节奏型。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Bangarang - Skrillex", "Spider - Teminite"]}, "neuro hop": {"name": "Neuro Hop", "ups": ["EDM Glitch Hop"], "downs": [], "aka": "Neurohop", "related": "", "desc": "诞生于2010年代初，结合了EDM Glitch Hop的摇摆感、Midtempo Breakbeat的元素和Neuro Bass。该流派主要体现侵略感的鼓组和机械的声音设计，80~120的BPM范围，以及放克乐和爵士乐的采样。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["If You Hadn't - Koan Sound / Culprate / Asa / Opiuo"]}, "funkstep": {"name": "Funkstep", "ups": ["EDM Glitch Hop", "Funky House", "Dubstep", "Drumstep", "Drum & Bass", "Electro House"], "downs": [], "aka": "Funky Glitch Hop", "related": "", "desc": "从Glitch Hop复兴浪潮中诞生，自2001年Dubstep运动以来，Funkstep获得了更多的听众，因此也获得了更多的唱片制作人来制作这种音乐风格。自2009年以来一些制作人就向听众传达Funkstep的概念，并发布了标题类似“Dubstep+Funky House=Funkstep”等一系列文章。Funkstep自2012年开始形成，并逐渐成为Glitch Hop的一种顶梁柱风格。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["You Get High - Pretty Lights"]}, "jazzy glitch hop": {"name": "Jazzy Glitch Hop", "ups": ["EDM Glitch Hop", "Jazz Fusion"], "downs": ["Glitch Swing"], "aka": "", "related": "", "desc": "标签，类似于Funkstep，Jazzy Glitch Hop指融合了Jazz元素的Glitch Hop。一般来说Jazzy Glitch Hop会在主歌部分展示Jazz段，然后以萨克斯等为主要配器引入Drop，形成一种类似Swing的慵懒感。一些Glitch Hop/Midtempo制作人会跨界制作这种风格标签的音乐，听感上实际更接近Melodic Glitch Hop。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Exogenesis - Geoplex", "Showtime - Kirara Magic"]}, "glitch swing": {"name": "Glitch Swing", "ups": ["EDM Glitch Hop", "Electro Swing"], "downs": [], "aka": "", "related": "", "desc": "标签，Glitch Swing就是Glitch Hop和Electro Swing的结合体，严格意义上并不是一种曲风，而是Glitch Hop的一种新形态，但这两者之间的合适程度不是一星半点，这一类型的音乐一经被发现就被大量制作，并成为主流的EDM Glitch Hop之一。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Insane - Black Gryph0n / Baasik"]}, "horrorcore": {"name": "Horrorcore", "ups": ["Southern Hip-Hop", "Hardcore Hip-Hop"], "downs": ["Memphis Rap", "Gore Rap", "Horrorcore Drill"], "aka": "Horror Hip-Hop、Horror Rap、Death Hip-Hop、Death Rap、Murder Rap", "related": "", "desc": "Horrorcore是来自美国南部的Hip-Hop风格，起源于80年代末。其内容和意象侧重于恐怖和病态，包括撒旦崇拜和自杀等主题。制作上听起来比其他Hip-Hop更黑暗，经常采样老式恐怖片。歌词内容血腥、暴力，十分夸张，被认为是对Hardcore Hip-Hop中暴力歌词的模仿。Horrorcore在后续的发展过程中被Memphis Rap吸收并改进，成为了更加阴暗恐怖的“Memphis Horrorcore”，而后者的名气逐渐超越了前者，使得Horrorcore不再是一种特定的风格而更像是一种元素(例如当代的Horrorcore Drill)。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Playa Hatas - DJ Paul / Juicy J / Gansta Boo", "Thinking About Your Death - Rozz Dyliams(当代)"]}, "gore rap": {"name": "Gore Rap", "ups": ["Horrorcore", "Death Metal", "Goregrind", "Dark Trap"], "downs": [], "aka": "Gore Hop", "related": "", "desc": "根植于Horrorcore精神，融合了血腥恐怖文化的一种嘻哈风格，此处的“Gore”指“血块”，引申为“血腥暴力”。在音乐上保留了Horrorcore对病态主题的侧重，更多地添加了邪典、残害相关的限制级意象。除此之外Gore Rap一般会采用更高的BPM和更加重的鼓组，有时甚至会融入残酷死亡金属(Brutal Death Metal)来增加音乐的表现力。一般来说Gore Rap的定义范围较为松散，因此也会存在用Rage风格、Mumble Rap风格展开的Gore Rap，但是其精神内核并未发生改变。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Wickedbitch90_666 - Kgp"]}, "memphis rap": {"name": "Memphis Rap", "ups": ["Southern Hip-Hop", "Horrorcore", "Chopped & Screwed", "Gansta Rap"], "downs": ["Crunk", "Trap", "Drill", "Plugg", "Phonk"], "aka": "Memphis Horrorcore", "related": "", "desc": "Memphis Rap由孟菲斯的DJ Spanish Fly在80年代末开创，这种音乐吸收了Horrorcore的恐怖氛围，通常使用TR-808鼓机编曲，有着突出且编排规整的Hit-Hat、三连音Flow(直接影响了2010s的Trap)、诡异的合成器音色和阴森的旋律，有时也会使用Cowbell(直接影响了2020s的Phonk)。来自休斯顿的DJ Screw发明了Chopped & Screwed(详见早期流派/手法板块)，将原先的音乐放慢使之更诡异黑暗(最初是为了模拟服用紫水的效果)，这种手法深远影响了南部(包括孟菲斯)的Hip-Hop。由于当时的音乐人条件较差，所以只能用简陋的设备录制成磁带在地下流传，因此现存的很大一部分Memphis Rap是听感粗糙、浑浊，仿佛来自史前的垃圾音质，且没有封面的磁带。90年代中后期，Triple 6 Mafia组建并发扬了Memphis Rap，他们的歌词充满了丧、愤怒的情绪，反映了孟菲斯这座城市的黑暗，受到了当地人的欢迎。Triple 6 Mafia后更名为Three 6 Mafia， 他们使这种风格从地下走向主流，但是Memphis Rap令人不安的听感始终没有变化，并影响了现在的Trap、Drill和Phonk。代表制作人、Rapper和团体还有Al Kapone、Tommy Right III、DJ Paul、Juicy J、Project Pat、8Ball & MJG。随着10年代Trap的兴起，新生代的大量孟菲斯Rapper和Trap制作人合作并保留了孟菲斯的味道，造就了新的Memphis Rap潮流，该潮流被Soundcloud等平台称为“Memphis Revival”。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Tear da Club Up - Three 6 Mafia"]}, "miami bass": {"name": "Miami Bass", "ups": ["Electro-Funk", "Southern Hip-Hop", "Dub"], "downs": ["Atlanta Bass", "Techno Bass", "Dirty South"], "aka": "Booty Bass", "related": "", "desc": "Miami Bass是一种舞曲性质的Hip-Hop流派，起源于1986年的迈阿密，受到了早期Electro-Funk的影响，具有极重极响亮的808 Bass，由Amos Larkins II在一次失败的混音中意外发明。特点是密集的808鼓点和更快的节奏，其中的808 Bass在当时声称能“震碎挡风玻璃”。80年代后期，诞生了更为极简的分支Techno Bass。Miami Bass的发扬者是南部Hip-Hop组合2 Live Crew，其中Luther Roderick(Uncle Luke)被认为是Southern Hip-Hop的元老，另一位成员Fresh Kid Ice则被誉为“第一个Miami Bass Rapper(同时也是第一位亚裔Rapper)”。由于他们的歌词大部分比较露骨(因此有了“Dirty South”的说法)，2 Live Crew卷入了一场关于创作合法性的官司，胜诉后，Miami Bass创作合法化，并于1990年在他们的专辑《Banned in the U.S.A》贴上了音乐史上第一个“脏标”。随后，DJ Magic Mike、Clay D等人将其发扬光大，并创新性地加入了R&B元素。1996年，Miami Bass开始逐渐消亡，但是激发了Atlanta Bass、Crunk等新兴风格的诞生。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Get It Girl - 2 Live Crew", "It's My Cadillac (Got That Bass) - DJ Freaky Fred / MC Nas-D"]}, "atlanta bass": {"name": "Atlanta Bass", "ups": ["Miami Bass"], "downs": [], "aka": "ATL Bass", "related": "", "desc": "Atlanta Bass是Miami Bass的一个分支，源于80年代的亚特兰大。在Miami Bass出现时，就已经有一些亚特兰大音乐人开始制作这种类型的音乐，但实际上Atlanta Bass在90年代才开始与Miami Bass产生差异。这一流派继承了Miami Bass中的“硬”808 Bass，有时会与速度较慢的Contemporary R&B结合，有着优美的旋律和比Miami Bass更慢的节奏，Bass也会相对弱化一些，因此很多人认为Atlanta Bass已经脱离了Miami Bass的范畴。", "chapter": "Hip-Hop/Trap/Future Bass", "examples": ["Space Jam - Quad City DJ's"
